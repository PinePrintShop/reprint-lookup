<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Ink Queue v12</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--yellow-dim:#E8E83230;--yellow-border:#E8E83250;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --sb-bg:#0A0A08;--sb-border:#1A1A16;--sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:Helvetica,Arial,sans-serif;
  --mono:Helvetica,Arial,sans-serif;
  --radius:4px;--radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

/* Stats bar - pill tab style matching catching queue */
.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;gap:6px;scrollbar-width:none;flex-shrink:0}
.stats-bar::-webkit-scrollbar{display:none}
.stat-cell{font-size:10px;font-weight:700;padding:5px 12px;border:1px solid var(--border-dk);border-radius:20px;background:var(--surface);color:var(--muted);white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);display:flex;align-items:center;cursor:pointer}
.stat-ct{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:rgba(0,0,0,.06);font-size:9px;padding:0 4px;margin-left:5px;color:var(--muted-lt);font-family:var(--mono)}
.stat-cell.active{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.stat-cell.active .stat-ct{background:rgba(232,232,50,.15);color:var(--yellow)}

/* Content area */
.content{padding:20px;max-width:none}

/* Date header */
.date-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond);padding:14px 0 4px;display:flex;align-items:center;justify-content:space-between}
.date-hdr:first-child{padding-top:0}
.date-hdr.today{color:var(--text)}
.date-hdr-right{font-weight:400;color:var(--muted-lt)}

/* Order header */
.order-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em;padding:10px 0 3px;font-family:var(--cond)}

/* Job card — exact catching queue */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:border-color .12s;margin-bottom:4px}
.job-card:hover{border-color:var(--border-dk)}
.job-card.ready{border-left:3px solid var(--green)}
.job-card.no-ink{border-left:3px solid var(--red-bd)}
.jc-thumb{width:48px;height:48px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.jc-thumb img{width:100%;height:100%;object-fit:cover}
.jc-thumb-ph{width:18px;height:18px;opacity:.2}
.jc-info{flex:1;min-width:0}
.jc-sup{font-size:9px;color:var(--muted-lt);letter-spacing:.04em;margin-bottom:1px;font-family:var(--mono)}
.jc-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--cond)}
.jc-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}

/* Tags */
.tag{font-size:8px;padding:2px 7px;border-radius:2px;white-space:nowrap;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid;font-family:var(--cond)}
.tag.k{background:var(--sb-bg);color:var(--yellow);border-color:var(--yellow-border)}
.tag.n{background:var(--surface);color:var(--muted);border-color:var(--border)}
.tag.r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}

/* Status */
.status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.status.pending{color:var(--muted-lt)}
.status.done{color:#fff;background:var(--green);padding:2px 6px;border-radius:2px}

/* Ready toggle button */
.ready-btn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .12s;white-space:nowrap}
.ready-btn:hover{border-color:var(--green);color:var(--green)}
.ready-btn.on{background:var(--green);border-color:var(--green);color:#fff}
/* Standard buttons — same as catching queue */
.btn{background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);color:var(--muted);font-size:9px;padding:5px 10px;cursor:pointer;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .1s}
.btn:hover{border-color:var(--text);color:var(--text)}
.btn.p{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.btn.p:hover{background:#1A1A16}
.btn.grn{background:var(--green-lt);border-color:#b8dfcc;color:var(--green-dk)}
.btn.grn:hover{background:#d4eddf}

/* Expanded detail — matches catching queue colorway card layout */
.job-detail{display:none;margin-bottom:0}
.job-detail.open{display:flex;flex-direction:row;min-height:340px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:4px;background:var(--surface)}

/* Left: PDF proof */
.detail-proof{width:45%;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.proof-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface);flex-shrink:0}
.proof-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.proof-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.proof-btn:hover{background:var(--sb-active)}
.proof-btn.nav{background:var(--bg);color:var(--muted);border:1px solid var(--border-dk)}
.proof-btn.nav:hover{color:var(--text);border-color:var(--text)}
.proof-page-info{font-size:9px;color:var(--muted-lt);font-family:var(--mono);min-width:32px;text-align:center}
.proof-canvas-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);cursor:pointer}
.proof-canvas-area canvas{width:100%;height:auto;display:block}
.proof-loading{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;font-family:var(--mono)}
.proof-none{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}

/* Right: ink list */
.detail-inks{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.inks-hdr{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;gap:8px}
.inks-hdr-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.inks-scroll{flex:1;overflow-y:auto}
.ink-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg)}
.ink-row:last-child{border-bottom:none}
.ink-chip{width:20px;height:20px;border-radius:3px;flex-shrink:0;margin-top:1px;border:1px solid rgba(0,0,0,.12)}
.ink-body{flex:1;min-width:0}
.ink-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em}
.ink-name-edit{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em;border:none;background:transparent;width:100%;outline:none;padding:0}
.ink-name-edit:focus{background:#fffbea;border-radius:2px;padding:1px 3px;box-shadow:inset 0 0 0 1px #f59e0b}
.ink-type-tag{display:inline-block;font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--cond);padding:1px 5px;border-radius:2px;margin-top:2px;border:1px solid}
.ink-recipe-wrap{margin-top:5px}
.ink-recipe{font-size:10px;font-family:var(--mono);color:#555;line-height:1.7;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;width:100%;resize:vertical;min-height:60px;outline:none}
.ink-recipe:focus{border-color:var(--green);background:#fff}
.ink-no-recipe{font-size:10px;color:var(--muted-lt);font-style:italic;font-family:var(--cond);margin-top:4px}
.inks-loading{padding:20px 14px;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}
.prev-section{padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.prev-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.prev-badge{font-size:8px;background:var(--sb-bg);color:var(--yellow);padding:1px 6px;border-radius:2px;border:1px solid var(--yellow-border)}
.print-notes{margin:8px 14px 0;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:7px 10px;flex-shrink:0}
.pn-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amb);font-family:var(--cond);margin-bottom:3px}
.pn-txt{font-size:11px;color:#7a4f00;line-height:1.5}

/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.err{margin:12px;padding:12px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a;font-family:var(--mono)}

/* Proof fullscreen modal — exact catching queue .pm pattern */
.pm{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
.pm.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.pm-nav{display:flex;gap:6px;align-items:center}
.pm-nav button{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-ct{font-size:11px;color:#555;min-width:30px;text-align:center;font-family:var(--mono)}
.pm-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px}
.pm-body canvas{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}
</style>
</head>

</div>
<div id="root"></div>

<!-- Proof fullscreen modal -->
<div class="pm" id="pmModal">
  <div class="pm-bar">
    <button class="pm-close" onclick="pmClose()">✕ Close</button>
    <span class="pm-fn" id="pmFn"></span>

      <span class="pm-ct" id="pmCt"></span>
      <button onclick="pmNext()">›</button>
    </div>
  </div>
  <div class="pm-body" id="pmBody"></div>
</div>

};

function getPantoneHex(inkName) {
  if (!inkName) return null;
  var upper = inkName.toUpperCase();
  // Try to extract Pantone number
  var m = upper.match(/PANTONE\s+([^\s\-]+)/);
  if (!m) return null;
  var code = m[1].trim();
  if (PANTONE_HEX[code]) return PANTONE_HEX[code];
  // Try numeric only (strip trailing letters like C, U, M)
  var numOnly = code.replace(/[CUM]$/, '');
  if (PANTONE_HEX[numOnly]) return PANTONE_HEX[numOnly];
  return null;
}

function inkTypeBadge(typeName) {
  if (!typeName) return '';
  var styles = {
    'Discharge':        'background:#e8f5ee;color:#1e6b45;border-color:#b8dfcc',
    'OW':               'background:#fef3e8;color:#c45c00;border-color:#f8c8a0',
    'EZP':              'background:#f2eeff;color:#5b3fa0;border-color:#c8b8e8',
    'Direct-to-fabric': 'background:#e8f7f9;color:#0e6b7a;border-color:#a8d8e0',
    'Graphics':         'background:#f0f0ea;color:#555;border-color:#d8d8d0',
  };
  for (var k in styles) {
    if (typeName.toLowerCase().indexOf(k.toLowerCase()) >= 0) {
      return '<span class="ink-type-tag" style="'+styles[k]+'">'+typeName+'</span>';
    }
  }
  return '<span class="ink-type-tag" style="background:var(--bg);color:var(--muted);border-color:var(--border)">'+typeName+'</span>';
}

// State
var pat = null, allJobs = [], inkCache = {}, openDetailId = null, activeFilter = "all";
var pdfCache = {}, pdfDocOpen = null, pdfPageOpen = 1, pdfTotalOpen = 1;
var pmPdfDoc = null, pmPage = 1, pmTotal = 1;

window.onload = function() {
  pat = localStorage.getItem('pine_at_key');
  if (!pat) { pat = prompt('Airtable token (patXXX...):'); if (!pat) return; localStorage.setItem('pine_at_key', pat); }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  loadJobs();

function api(path, opts) {
  opts = opts || {};
  return fetch('https://api.airtable.com/v0/' + BASE + '/' + path, {
    method: opts.method || 'GET',
    headers: { 'Authorization': 'Bearer ' + pat, 'Content-Type': 'application/json' },
    body: opts.body || undefined
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(j) { throw new Error(j.error ? j.error.message : 'HTTP ' + r.status); });
    return r.json();
  });
}

function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }
function toDateKey(d) { return d.toLocaleDateString('en-CA', { timeZone: 'America/Denver' }); }
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' })
    .replace(' AM', ' am').replace(' PM', ' pm');
}
function getOrderNum(fields) {
  var v = fields[F.orderNum];
  if (!v) return '';
  if (v.valuesByLinkedRecordId) {
    var vals = Object.values(v.valuesByLinkedRecordId);
    return vals.length && vals[0] && vals[0].length ? String(vals[0][0]) : '';
  }
  return '';
}
function getProof(fields) {
  var raw = fields[F.proofs];
  if (!raw) return null;
  var att = null;
  // Handle both REST formats: valuesByLinkedRecordId (multipleLookupValues) and flat array
  if (raw.valuesByLinkedRecordId) {
    Object.values(raw.valuesByLinkedRecordId).forEach(function(arr) {
      if (Array.isArray(arr)) arr.forEach(function(a) { if (a && a.url && !att) att = a; });
    });
  } else if (Array.isArray(raw)) {
    att = raw[0] || null;
  }
  if (!att) return null;
  return {
    url: att.url,
    thumb: (att.thumbnails && att.thumbnails.large && att.thumbnails.large.url) || null,
    filename: att.filename || '',
    isPDF: att.type === 'application/pdf'
  };
}
function getLoc(fields) {
  var v = fields[F.loc];
  if (!v) return '';
  return typeof v === 'object' ? (v.name || '') : v;
}
function getQty(fields) {
  var v = fields[F.qty];
  if (!v) return 0;
  if (v.valuesByLinkedRecordId) {
    var vals = Object.values(v.valuesByLinkedRecordId);
    return vals.length && vals[0] && vals[0].length ? (vals[0][0] || 0) : 0;
  }
  return 0;
}

// LOAD
function loadJobs() {
  document.getElementById('root').innerHTML = '<div class="loading"><div class="spin"></div>Loading ink queue...</div>';
  document.getElementById('statsBar').style.display = 'none';

  var end = addDays(new Date(), DAYS_AHEAD);
  document.getElementById('sRange').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
    end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  var flds = [F.imprintId, F.orderNum, F.startTime, F.loc, F.inks, F.inkNames,
    F.inkType, F.inksReady, F.isRepeat, F.prevImprint, F.printNotes,
    F.proofs, F.qty, F.customer, F.printDesc, F.press
  ].map(function(f) { return 'fields%5B%5D=' + f; }).join('&');

  var filter = encodeURIComponent(
    "AND(IS_AFTER({fldfqtIgcEfIlIeQk},DATEADD(TODAY(),-1,'days')),IS_BEFORE({fldfqtIgcEfIlIeQk},DATEADD(TODAY()," + (DAYS_AHEAD + 1) + ",'days')))"
  );
  var sort = 'sort%5B0%5D%5Bfield%5D=fldfqtIgcEfIlIeQk&sort%5B0%5D%5Bdirection%5D=asc';

  var records = [];
  function fetchPage(cursor) {
    var url = TI + '?returnFieldsByFieldId=true&' + flds + '&filterByFormula=' + filter + '&' + sort + (cursor ? '&offset=' + cursor : '');
    api(url).then(function(data) {
      records = records.concat(data.records || []);
      if (data.offset) { fetchPage(data.offset); return; }
      allJobs = records;
      renderAll();
    }).catch(function(e) {
      document.getElementById('root').innerHTML = '<div class="err">Load failed: ' + e.message + '</div>';
    });
  }
  fetchPage(null);
}

function setFilter(f) {
  activeFilter = f;
  // Update active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === f);
  });
  renderAll();
}

function renderAll() {
  var total = 0, ready = 0, noink = 0, repeat = 0;
  for (var i = 0; i < allJobs.length; i++) {
    var f = allJobs[i].fields;
    total++;
    if (f[F.inksReady]) ready++;
    if (!(f[F.inks] || []).length) noink++;
    if (f[F.isRepeat]) repeat++;
  }
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = total - ready;
  document.getElementById('sNoInk').textContent = noink;
  document.getElementById('sRepeat').textContent = repeat;
  document.getElementById('statsBar').style.display = 'flex';
  // Set active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === activeFilter);
  });

  // Group by date then by order
  var byDate = {};
  var today = toDateKey(new Date());
  var tom = toDateKey(addDays(new Date(), 1));

  for (var i = 0; i < allJobs.length; i++) {
    var r = allJobs[i];
    var st = r.fields[F.startTime];
    if (!st) continue;
    // Skip past dates (yesterday and before)
    var dk = toDateKey(new Date(st));
    if (dk < today) continue;
    // Skip presses that don't use ink
    var pressVal = r.fields[F.press];
    var pressStr = typeof pressVal === 'object' ? (pressVal && pressVal.name ? pressVal.name : '') : (pressVal || '');
    var pressLow = pressStr.toLowerCase();
    if (SKIP_PRESS.some(function(s) { return pressLow.indexOf(s) >= 0; })) continue;
    // Also skip records with location = Size Tag (no ink)
    var locVal = getLoc(r.fields).toLowerCase();
    if (locVal === 'size tag') continue;
    // Apply active filter
    var fInks = r.fields[F.inks] || [];
    if (activeFilter === 'ready' && !r.fields[F.inksReady]) continue;
    if (activeFilter === 'pending' && r.fields[F.inksReady]) continue;
    if (activeFilter === 'noink' && fInks.length > 0) continue;
    if (activeFilter === 'repeat' && !r.fields[F.isRepeat]) continue;
    if (!byDate[dk]) byDate[dk] = {};
    var on = getOrderNum(r.fields) || 'no-order';
    if (!byDate[dk][on]) byDate[dk][on] = [];
    byDate[dk][on].push(r);
  }

  if (!Object.keys(byDate).length) {
    document.getElementById('root').innerHTML = '<div class="empty">No jobs in the next ' + DAYS_AHEAD + ' days</div>';
    return;
  }

  var h = '<div class="content">';
  var dateKeys = Object.keys(byDate).sort();
  for (var d = 0; d < dateKeys.length; d++) {
    var dk = dateKeys[d];
    var orders = byDate[dk];
    var dayRecs = [];
    var orderKeys = Object.keys(orders);
    for (var o = 0; o < orderKeys.length; o++) dayRecs = dayRecs.concat(orders[orderKeys[o]]);
    var dayReady = dayRecs.filter(function(r) { return r.fields[F.inksReady]; }).length;

    var dObj = new Date(dk + 'T12:00:00');
    var dlabel, isToday = false;
    if (dk === today) { dlabel = 'Today — ' + dObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); isToday = true; }
    else if (dk === tom) { dlabel = 'Tomorrow — ' + dObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    else { dlabel = dObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }); }

    h += '<div class="date-hdr' + (isToday ? ' today' : '') + '">' + dlabel + '<span class="date-hdr-right">' + dayReady + ' / ' + dayRecs.length + ' ready</span></div>';

    for (var o = 0; o < orderKeys.length; o++) {
      var on = orderKeys[o];
      var recs = orders[on];
      var customer = recs[0].fields[F.customer] || '';
      // Order header above the group
      h += '<div class="order-hdr">Order ' + on + (customer ? ' · ' + customer : '') + '</div>';
      for (var j = 0; j < recs.length; j++) {
        // Pass customer and order num so each card can show them in jc-sup
        h += renderCard(recs[j], on, customer);
        h += '<div class="job-detail" id="detail-' + recs[j].id + '"></div>';
      }
    }
  }
  h += '</div>';
  document.getElementById('root').innerHTML = h;
}

function renderCard(rec, orderNum, customer) {
  var f = rec.fields;
  var id = rec.id;
  var impId = f[F.imprintId] || '—';
  if (!customer) customer = f[F.customer] || '';
  if (!orderNum) orderNum = getOrderNum(f);
  var printDesc = f[F.printDesc] || customer || impId;
  var loc = getLoc(f);
  var qty = getQty(f);
  var inks = f[F.inks] || [];
  var inkTypes = f[F.inkType] || [];
  var inkNames = f[F.inkNames] || '';
  var isReady = f[F.inksReady] || false;
  var isRepeat = f[F.isRepeat] || false;
  var proof = getProof(f);
  var thumb = proof ? proof.thumb : null;
  var printTime = fmtTime(f[F.startTime]);

  var cardCls = 'job-card' + (isReady ? ' ready' : '') + (!inks.length ? ' no-ink' : '');

  var h = '<div class="' + cardCls + '" id="card-' + id + '" onclick="toggleDetail(\'' + id + '\')">';

  // Thumb
  h += '<div class="jc-thumb">';
  if (thumb) h += '<img src="' + thumb + '" onerror="this.style.display=\'none\'">';
  else h += '<svg class="jc-thumb-ph" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
  h += '</div>';

  // Info
  h += '<div class="jc-info">';
  h += '<div class="jc-sup">' + impId + (printTime ? ' · ' + printTime : '') + '</div>';
  h += '<div class="jc-name">' + printDesc + '</div>';
  h += '<div class="jc-meta">';
  if (qty) h += '<span class="tag k">' + qty + ' pcs</span>';
  if (loc) h += '<span class="tag n">' + loc + '</span>';
  if (!inks.length) h += '<span class="tag r">No Inks</span>';
  else {
    for (var t = 0; t < inkTypes.length; t++) h += '<span class="tag n">' + inkTypes[t] + '</span>';
  }
  if (isRepeat) h += '<span class="tag k">↩ Repeat</span>';
  h += '</div></div>';

  // Right
  h += '<div class="jc-right">';
  h += '<span class="status ' + (isReady ? 'done' : 'pending') + '">' + (isReady ? 'Ready' : 'Pending') + '</span>';
  h += '<button class="ready-btn' + (isReady ? ' on' : '') + '" onclick="toggleReady(event,\'' + id + '\')">' + (isReady ? '✓ Ready' : 'Mark Ready') + '</button>';
  h += '</div>';

  h += '</div>';
  return h;
}

// TOGGLE DETAIL
function toggleDetail(id) {
  var detailEl = document.getElementById('detail-' + id);
  if (!detailEl) return;

  if (detailEl.classList.contains('open')) {
    detailEl.classList.remove('open');
    detailEl.innerHTML = '';
    openDetailId = null;
    return;
  }

  // Close any other open detail
  if (openDetailId && openDetailId !== id) {
    var prev = document.getElementById('detail-' + openDetailId);
    if (prev) { prev.classList.remove('open'); prev.innerHTML = ''; }
  }

  openDetailId = id;
  detailEl.classList.add('open');
  renderDetail(id, detailEl);
}

function renderDetail(id, el) {
  var rec = allJobs.find(function(r) { return r.id === id; });
  if (!rec) return;
  var f = rec.fields;
  var inks = f[F.inks] || [];
  var proof = getProof(f);
  var printNotes = f[F.printNotes] || '';
  var isRepeat = f[F.isRepeat] || false;
  var prevImprint = f[F.prevImprint] || [];
  var impId = f[F.imprintId] || '—';

  var h = '';

  // Left: proof
  h += '<div class="detail-proof">';
  h += '<div class="proof-toolbar">';
  h += '<span class="proof-lbl">Mockup / Proof</span>';

    h += '<button class="proof-btn" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\');event.stopPropagation()">⛶ Full PDF</button>';
  }

  // Use thumbnail img for inline display (PDF.js can't load Airtable URLs which require auth)

    var fullUrl = proof.url;

      h += '<div class="proof-canvas-area" style="cursor:pointer;background:var(--bg)" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\')">';
      h += '<img src="' + displayUrl + '" style="width:100%;height:auto;display:block" onerror="this.style.display=\'none\';this.parentNode.innerHTML+=\'<div style=padding:20px;color:#888;font-size:11px;font-family:var(--mono)>Could not load preview</div>\'">';
      h += '</div>';
    } else {
      h += '<div class="proof-canvas-area" style="cursor:pointer;background:var(--bg);padding:20px;display:flex;align-items:center;justify-content:center" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\')">';
      h += '<div style="font-size:10px;color:var(--muted);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em">Tap to open PDF</div>';
      h += '</div>';
    }
  } else {
    h += '<div class="proof-none">No proof on file</div>';
  }
  h += '</div>';

  // Right: inks
  h += '<div class="detail-inks">';
  h += '<div class="inks-hdr"><span class="inks-hdr-lbl">Inks (' + inks.length + ')</span></div>';

    h += '<div class="inks-loading">No inks assigned — needs attention</div>';
  } else {
    h += '<div class="inks-loading"><div class="spin" style="display:inline-block;margin-right:6px"></div>Loading recipes...</div>';
  }
  h += '</div>';

  if (printNotes) {
    h += '<div class="print-notes"><div class="pn-lbl">Print Notes</div><div class="pn-txt">' + printNotes + '</div></div>';
  }

  if (isRepeat && prevImprint.length) {
    var prevRecId = typeof prevImprint[0] === 'string' ? prevImprint[0] : prevImprint[0].id;

    h += '<div class="prev-lbl">Previous Run <span class="prev-badge">↩ Repeat</span></div>';

    h += '</div>';
  }

  h += '</div>';

  el.innerHTML = h;

  // Proof shown as thumbnail inline; full PDF opens in modal on tap

  // Load ink recipes

    loadInkRecipes(id, inks);
  }

  // Load previous inks
  if (isRepeat && prevImprint.length) {

    loadPrevInks(id, prevRecId);
  }
}

// PDF in detail panel
var detailPdfs = {};
function loadPdfInDetail(recId, url) {
  pdfjsLib.getDocument(url).promise.then(function(doc) {
    detailPdfs[recId] = { doc: doc, page: 1, total: doc.numPages };
    renderDetailPdfPage(recId);
  }).catch(function(e) {
    var el = document.getElementById('pcanvas-' + recId);
    if (el) el.innerHTML = '<div style="padding:16px;color:#888;font-size:11px">Could not load PDF</div>';
  });
}

function renderDetailPdfPage(recId) {
  var state = detailPdfs[recId];
  if (!state) return;
  var infoEl = document.getElementById('pinfo-' + recId);
  var canvasWrap = document.getElementById('pcanvas-' + recId);
  if (!canvasWrap) return;
  if (infoEl) infoEl.textContent = state.page + ' / ' + state.total;

  state.doc.getPage(state.page).then(function(page) {
    var width = canvasWrap.clientWidth || 300;
    var scale = width / page.getViewport({ scale: 1 }).width;
    var vp = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.cssText = 'width:100%;display:block';
    canvasWrap.innerHTML = '';
    canvasWrap.appendChild(canvas);
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
  });
}

function pdfPrevPage(recId) {
  event.stopPropagation();
  var state = detailPdfs[recId];
  if (!state || state.page <= 1) return;
  state.page--;
  renderDetailPdfPage(recId);
}

function pdfNextPage(recId) {
  event.stopPropagation();
  var state = detailPdfs[recId];
  if (!state || state.page >= state.total) return;
  state.page++;
  renderDetailPdfPage(recId);
}

// Full-screen PDF modal - fetches fresh URL before loading (operator v4 pattern)
function openPmPdf(recId, title) {
  var modal = document.getElementById('pmModal');
  var body = document.getElementById('pmBody');
  document.getElementById('pmFn').textContent = title || '';
  document.getElementById('pmCt').textContent = 'Loading...';
  body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;gap:8px"><div class="spin"></div><span style="font-size:10px;color:#666;font-family:var(--mono)">Fetching proof...</span></div>';
  modal.classList.add('open');

  // Re-fetch fresh signed URL from Airtable (stored URLs expire)
  var formula = "RECORD_ID()='" + recId + "'";
  api(TI + '?fields%5B%5D=' + F.proofs + '&filterByFormula=' + encodeURIComponent(formula) + '&returnFieldsByFieldId=true&pageSize=1')
    .then(function(data) {
      var rec = data.records && data.records[0];
      var raw = rec && rec.fields && rec.fields[F.proofs];
      var freshUrl = null, isPDF = false;
      if (raw && raw.valuesByLinkedRecordId) {
        Object.values(raw.valuesByLinkedRecordId).forEach(function(arr) {
          if (Array.isArray(arr) && arr[0] && arr[0].url && !freshUrl) {
            freshUrl = arr[0].url;
            isPDF = arr[0].type === 'application/pdf';
          }
        });
      }
      if (!freshUrl) { body.innerHTML = '<div style="padding:30px;color:#888;font-size:12px;font-family:var(--mono)">No proof on file</div>'; return; }

      if (isPDF) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        if (pmPdfDoc) { pmPdfDoc.destroy(); pmPdfDoc = null; }
        pdfjsLib.getDocument(freshUrl).promise.then(function(doc) {
          pmPdfDoc = doc;
          pmPage = 1;
          pmTotal = doc.numPages;
          pmRenderPage();
        }).catch(function(e) {
          body.innerHTML = '<div style="padding:30px;color:#888;font-size:12px;font-family:var(--mono)">Could not load PDF: ' + e.message + '</div>';
        });
      } else {
        // Image proof
        pmPdfDoc = null; pmTotal = 1;
        document.getElementById('pmCt').textContent = '1/1';
        var img = new Image();
        img.onload = function() { body.innerHTML = ''; body.appendChild(img); img.style.cssText = 'max-width:100%;max-height:100%;object-fit:contain;border-radius:4px'; };
        img.onerror = function() { body.innerHTML = '<div style="padding:30px;color:#888;font-size:12px">Could not load proof</div>'; };
        img.src = freshUrl;
      }
    }).catch(function(e) {
      body.innerHTML = '<div style="padding:30px;color:#888;font-size:12px;font-family:var(--mono)">Could not fetch proof: ' + e.message + '</div>';
    });
}


function pmRenderPage() {
  if (!pmPdfDoc) return;
  var body = document.getElementById('pmBody');
  document.getElementById('pmCt').textContent = pmPage + ' / ' + pmTotal;
  pmPdfDoc.getPage(pmPage).then(function(page) {
    var wrap = body;
    var availWidth = wrap.clientWidth || window.innerWidth || 800;
    var scale = Math.min((availWidth - 32) / page.getViewport({ scale: 1 }).width, 2.5);
    if (scale <= 0) scale = 1.5;
    var vp = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    body.innerHTML = '';
    body.appendChild(canvas);
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
  });
}
function pmPrev() { if (pmPage > 1) { pmPage--; pmRenderPage(); } }
function pmNext() { if (pmPage < pmTotal) { pmPage++; pmRenderPage(); } }
function pmClose() { document.getElementById('pmModal').classList.remove('open'); pmPdfDoc = null; }
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') pmClose(); });

// LOAD INK RECIPES
function loadInkRecipes(recId, inks) {
  var inkIds = inks.map(function(i) { return typeof i === 'string' ? i : i.id; }).filter(Boolean);
  var filter = 'OR(' + inkIds.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';

  api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
    '&fields%5B%5D=' + FI.name +
    '&fields%5B%5D=' + FI.pantone +
    '&fields%5B%5D=' + FI.type +
    '&fields%5B%5D=' + FI.recipe +
    '&fields%5B%5D=' + FI.mfr +
    '&filterByFormula=' + encodeURIComponent(filter)
  ).then(function(data) {
    var byId = {};
    (data.records || []).forEach(function(r) { byId[r.id] = r.fields; });
    renderInkRows(recId, inks, byId, false);
  }).catch(function() {
    var el = document.getElementById('inks-' + recId);
    if (el) el.innerHTML = '<div class="inks-loading">Could not load recipes</div>';
  });
}

function renderInkRows(recId, inks, byId, isPrev) {
  var el = document.getElementById((isPrev ? 'prev-inks-' : 'inks-') + recId);
  if (!el) return;

  var h = '';
  for (var i = 0; i < inks.length; i++) {
    var ink = inks[i];
    var iid = typeof ink === 'string' ? ink : ink.id;
    var iname = typeof ink === 'object' ? ink.name : null;
    var d = byId[iid] || {};
    var name = iname || d[FI.name] || iid;
    var pantone = d[FI.pantone] || '';
    var typeName = d[FI.type] ? d[FI.type].name : '';
    var recipe = d[FI.recipe] || '';
    var mfr = d[FI.mfr] ? d[FI.mfr].name : '';
    var hexColor = getPantoneHex(name);
    var chipStyle = hexColor
      ? 'background:' + hexColor + ';border-color:rgba(0,0,0,.15)'
      : 'background:var(--bg);border-color:var(--border)';

    h += '<div class="ink-row">';
    h += '<div class="ink-chip" style="' + chipStyle + '"></div>';
    h += '<div class="ink-body">';
    if (WRITES_ENABLED) {
      h += '<input class="ink-name-edit" value="' + escHtml(name) + '" onchange="localEditName(\'' + iid + '\',this.value)" />';
    } else {
      h += '<div class="ink-name">' + escHtml(name) + '</div>';
    }
    if (typeName || mfr) {
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">';
      if (typeName) h += inkTypeBadge(typeName);
      if (mfr) h += '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + mfr + '</span>';
      h += '</div>';
    }
    h += '<div class="ink-recipe-wrap">';
    if (WRITES_ENABLED) {
      h += '<textarea class="ink-recipe" rows="4" onchange="localEditRecipe(\'' + iid + '\',this.value)">' + escHtml(recipe) + '</textarea>';
    } else {
      if (recipe) {
        h += '<div class="ink-recipe" style="cursor:default">' + escHtml(recipe) + '</div>';
      } else {
        h += '<div class="ink-no-recipe">No recipe on file</div>';
      }
    }
    h += '</div>';
    h += '</div></div>';
  }
  el.innerHTML = h;
}

// LOAD PREVIOUS INKS
function loadPrevInks(recId, prevImprintRecId) {
  api(TI + '/' + prevImprintRecId + '?returnFieldsByFieldId=true' +
    '&fields%5B%5D=' + F.inks +
    '&fields%5B%5D=' + F.imprintId +
    '&fields%5B%5D=' + F.printNotes
  ).then(function(data) {
    var prevInks = data.fields[F.inks] || [];
    var prevId = data.fields[F.imprintId] || '—';
    var prevNotes = data.fields[F.printNotes] || '';

    var prevEl = document.getElementById('prev-' + recId);
    if (!prevEl) return;

    if (!prevInks.length) {
      prevEl.querySelector('div:last-child').innerHTML = '<span style="font-size:10px;color:var(--muted-lt)">No inks on ' + prevId + '</span>';
      return;
    }

    prevEl.querySelector('div:last-child').innerHTML = '<div id="prev-inks-' + recId + '"><div class="inks-loading"><div class="spin" style="display:inline-block;margin-right:6px"></div>Loading...</div></div>';

    var inkIds = prevInks.map(function(i) { return typeof i === 'string' ? i : i.id; }).filter(Boolean);
    var filter = 'OR(' + inkIds.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';

    api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
      '&fields%5B%5D=' + FI.name +
      '&fields%5B%5D=' + FI.pantone +
      '&fields%5B%5D=' + FI.type +
      '&fields%5B%5D=' + FI.recipe +
      '&fields%5B%5D=' + FI.mfr +
      '&filterByFormula=' + encodeURIComponent(filter)
    ).then(function(idata) {
      var byId = {};
      (idata.records || []).forEach(function(r) { byId[r.id] = r.fields; });
      renderInkRows(recId, prevInks, byId, true);

      if (prevNotes) {
        var prevEl2 = document.getElementById('prev-' + recId);
        if (prevEl2) {
          var pn = document.createElement('div');
          pn.className = 'print-notes';
          pn.style.marginTop = '8px';
          pn.innerHTML = '<div class="pn-lbl">Notes from ' + prevId + '</div><div class="pn-txt">' + escHtml(prevNotes) + '</div>';
          prevEl2.appendChild(pn);
        }
      }
    }).catch(function() {
      var el2 = document.getElementById('prev-inks-' + recId);
      if (el2) el2.innerHTML = '<div class="inks-loading">Could not load previous inks</div>';
    });
  }).catch(function() {
    var prevEl = document.getElementById('prev-' + recId);
    if (prevEl) prevEl.querySelector('div:last-child').innerHTML = '<span style="font-size:10px;color:var(--muted-lt)">Could not load</span>';
  });
}

// Local edit state (no writes)
var localEdits = {};
function localEditName(inkId, val) { if (!localEdits[inkId]) localEdits[inkId] = {}; localEdits[inkId].name = val; }
function localEditRecipe(inkId, val) { if (!localEdits[inkId]) localEdits[inkId] = {}; localEdits[inkId].recipe = val; }

// TOGGLE READY (writes disabled in this version)
function toggleReady(e, id) {
  e.stopPropagation();
  var rec = allJobs.find(function(r) { return r.id === id; });
  if (!rec) return;
  var cur = rec.fields[F.inksReady] || false;
  var nxt = !cur;
  rec.fields[F.inksReady] = nxt;

  var btn = e.currentTarget;
  btn.classList.toggle('on', nxt);
  btn.textContent = nxt ? '✓ Ready' : 'Mark Ready';

  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.toggle('ready', nxt);
    if (nxt) card.classList.remove('no-ink');
    else if (!(rec.fields[F.inks] || []).length) card.classList.add('no-ink');
  }

  var statusEl = card && card.querySelector('.status');
  if (statusEl) { statusEl.className = 'status ' + (nxt ? 'done' : 'pending'); statusEl.textContent = nxt ? 'Ready' : 'Pending'; }

  // Update stats
  var ready = allJobs.filter(function(r) { return r.fields[F.inksReady]; }).length;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = allJobs.length - ready;

  if (WRITES_ENABLED) {
    api(TI + '/' + id, { method: 'PATCH', body: JSON.stringify({ fields: { [F.inksReady]: nxt } }) })
      .catch(function(err) {
        rec.fields[F.inksReady] = cur;
        btn.classList.toggle('on', cur);
        btn.textContent = cur ? '✓ Ready' : 'Mark Ready';
        alert('Save failed: ' + err.message);
      });
  }
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
