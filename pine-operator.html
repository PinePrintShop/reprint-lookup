<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator View · Pine Central</title>
<link rel="icon" type="image/svg+xml" href="pine-favicon-black.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1e1e21;
    --border: #2a2a2e;
    --border2: #383840;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #4caf7d;
    --green-dim: #1e3d2c;
    --amber: #f5a623;
    --amber-dim: #3d2e10;
    --red: #e05555;
    --red-dim: #3d1818;
    --blue: #5b9bd5;
    --blue-dim: #1a2d44;
    --purple: #9b6dd4;
    --purple-dim: #2a1d40;
    --pine: #4caf7d;
    --font-mono: 'DM Mono', monospace;
    --font-ui: 'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-logo {
    width: 28px; height: 28px;
    background: var(--pine);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 14px; color: #000;
    letter-spacing: -0.5px; flex-shrink: 0;
  }
  .topbar-title { font-size: 14px; font-weight: 700; letter-spacing: 0.05em; color: var(--text); }
  .topbar-sep { width: 1px; height: 18px; background: var(--border2); }
  .topbar-sub { font-size: 11px; color: var(--text2); font-family: var(--font-mono); letter-spacing: 0.08em; }
  .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .live-dot { width: 7px; height: 7px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  .live-label { font-size: 10px; color: var(--text2); font-family: var(--font-mono); letter-spacing: 0.1em; }
  .shift-time { font-size: 11px; color: var(--text2); font-family: var(--font-mono); }
  .btn-sm {
    font-size: 11px; font-family: var(--font-ui); font-weight: 700;
    padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2); cursor: pointer;
    letter-spacing: 0.05em; transition: all 0.15s;
  }
  .btn-sm:hover { border-color: var(--text3); color: var(--text); }

  /* ─── LOGIN OVERLAY ─── */
  .overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.92);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .login-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 36px;
    width: 90%; max-width: 560px;
    display: flex; flex-direction: column; gap: 28px;
  }
  .login-modal h2 { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
  .login-modal p { font-size: 13px; color: var(--text2); line-height: 1.5; margin-top: -20px; }
  .login-section { display: flex; flex-direction: column; gap: 10px; }
  .login-section-label { font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 0.12em; text-transform: uppercase; }
  .press-assign { display: flex; flex-direction: column; gap: 8px; }
  .press-row-assign {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border-radius: 8px; padding: 10px 14px;
    border: 1px solid var(--border);
  }
  .press-row-assign-name { font-size: 12px; font-weight: 700; width: 120px; letter-spacing: 0.05em; }
  .press-row-assign-ops { display: flex; gap: 6px; flex-wrap: wrap; }
  .op-chip {
    font-size: 11px; font-family: var(--font-ui); font-weight: 600;
    padding: 4px 10px; border-radius: 20px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text2); cursor: pointer; transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .op-chip.selected { background: var(--pine); color: #000; border-color: var(--pine); }
  .op-chip:hover:not(.selected) { border-color: var(--text3); color: var(--text); }
  .login-actions { display: flex; gap: 10px; }
  .btn-primary {
    flex: 1; font-family: var(--font-ui); font-size: 13px; font-weight: 800;
    padding: 13px; border-radius: 8px; border: none;
    background: var(--pine); color: #000; cursor: pointer;
    letter-spacing: 0.06em; text-transform: uppercase; transition: all 0.15s;
  }
  .btn-primary:hover { background: #5dc98f; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ─── MAIN GRID ─── */
  .main { padding: 20px; }
  .machine-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ─── MACHINE CARD ─── */
  .machine-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
    display: flex; flex-direction: column;
  }
  .machine-card.running { border-color: var(--green); }
  .machine-card.stopped { border-color: var(--amber); }
  .machine-card.idle { border-color: var(--border); }

  .card-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .machine-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .icon-press { background: #1a2d1e; }
  .icon-heat { background: #3d1a0f; }
  .icon-emb { background: #1a1a35; }
  .icon-flat { background: #2a1a35; }
  .card-machine-info { flex: 1; }
  .card-machine-name { font-size: 13px; font-weight: 800; letter-spacing: 0.04em; }
  .card-machine-sub { font-size: 10px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.08em; margin-top: 1px; }
  .status-badge {
    font-size: 9px; font-family: var(--font-mono); font-weight: 500;
    padding: 3px 8px; border-radius: 20px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .badge-running { background: var(--green-dim); color: var(--green); }
  .badge-stopped { background: var(--amber-dim); color: var(--amber); }
  .badge-idle { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }
  .badge-no-job { background: var(--surface2); color: var(--text3); border: 1px solid var(--border); }

  /* operators row in header */
  .card-ops-row {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-wrap: wrap;
  }
  .card-ops-label { font-size: 9px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-right: 4px; }
  .op-pill {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--text2); background: var(--surface);
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.04em;
  }
  .op-pill.active { background: var(--pine); color: #000; border-color: var(--pine); }
  .op-pill:hover:not(.active) { border-color: var(--text3); color: var(--text); }

  /* ─── JOB SECTION ─── */
  .card-job { padding: 14px 16px; flex: 1; }
  .no-job-state {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px 16px; gap: 8px; text-align: center;
  }
  .no-job-icon { font-size: 28px; opacity: 0.3; }
  .no-job-text { font-size: 12px; color: var(--text3); font-family: var(--font-mono); }

  .job-order { font-size: 10px; font-family: var(--font-mono); color: var(--text3); letter-spacing: 0.1em; margin-bottom: 4px; }
  .job-title { font-size: 15px; font-weight: 700; line-height: 1.3; margin-bottom: 10px; }
  .job-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
  .job-chip {
    font-size: 10px; font-family: var(--font-mono);
    padding: 3px 8px; border-radius: 4px;
    background: var(--surface2); color: var(--text2); border: 1px solid var(--border);
  }
  .job-chip.highlight { background: var(--green-dim); color: var(--green); border-color: #1e5533; }

  /* progress bar */
  .progress-section { margin-bottom: 14px; }
  .progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.08em; }
  .progress-count { font-size: 11px; font-family: var(--font-mono); color: var(--text); }
  .progress-count span { color: var(--text3); }
  .progress-track {
    height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--green); border-radius: 3px;
    transition: width 0.5s ease;
  }
  .progress-fill.amber { background: var(--amber); }

  /* piece count input */
  .piece-input-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .piece-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); flex: 1; letter-spacing: 0.08em; }
  .piece-btn {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s; font-weight: 700;
  }
  .piece-btn:hover { background: var(--border2); }
  .piece-btn:active { transform: scale(0.92); }
  .piece-display {
    font-size: 20px; font-family: var(--font-mono); font-weight: 500;
    min-width: 50px; text-align: center; color: var(--text);
  }

  /* timer */
  .timer-row {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .timer-label { font-size: 10px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.08em; }
  .timer-display { font-size: 22px; font-family: var(--font-mono); font-weight: 500; letter-spacing: 0.05em; }
  .timer-display.running { color: var(--green); }
  .timer-display.stopped { color: var(--amber); }
  .timer-display.idle { color: var(--text3); }

  /* stop reason */
  .stop-reason-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-family: var(--font-mono);
    padding: 4px 10px; border-radius: 4px; margin-bottom: 12px;
    background: var(--amber-dim); color: var(--amber); border: 1px solid #5a3a00;
  }

  /* ─── CONTROLS ─── */
  .card-controls { padding: 12px 16px; border-top: 1px solid var(--border); }
  .btn-start {
    width: 100%; padding: 13px;
    font-family: var(--font-ui); font-size: 13px; font-weight: 800;
    border: none; border-radius: 8px; cursor: pointer;
    letter-spacing: 0.08em; text-transform: uppercase;
    transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-start.start-state { background: var(--green); color: #000; }
  .btn-start.start-state:hover { background: #5dc98f; }
  .btn-start.stop-state { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
  .btn-start.stop-state:hover { background: #5a1a1a; }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
  .btn-dot.pulse { animation: btnpulse 1s infinite; }
  @keyframes btnpulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.5;transform:scale(0.7);} }

  /* ─── STOP REASON MODAL ─── */
  .reason-overlay {
    position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,0.85);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(3px);
  }
  .reason-modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    padding: 28px;
    width: 90%; max-width: 380px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .reason-modal h3 { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
  .reason-modal p { font-size: 12px; color: var(--text2); margin-top: -8px; }
  .reason-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .reason-btn {
    padding: 12px 10px; border-radius: 8px;
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: var(--font-ui); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.03em; text-align: center;
  }
  .reason-btn:hover { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
  .reason-btn.full { grid-column: 1 / -1; }

  /* ─── SUMMARY BAR ─── */
  .summary-bar {
    display: flex; gap: 16px; padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .summary-bar::-webkit-scrollbar { display: none; }
  .summary-stat { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .summary-stat-val { font-size: 18px; font-weight: 800; font-family: var(--font-mono); letter-spacing: -0.02em; }
  .summary-stat-val.green { color: var(--green); }
  .summary-stat-val.amber { color: var(--amber); }
  .summary-stat-label { font-size: 9px; color: var(--text3); font-family: var(--font-mono); letter-spacing: 0.1em; text-transform: uppercase; }
  .summary-divider { width: 1px; background: var(--border); flex-shrink: 0; align-self: stretch; }

  /* ─── LOADING ─── */
  .loading-state {
    display: flex; align-items: center; justify-content: center;
    padding: 60px; gap: 10px; color: var(--text3);
    font-size: 12px; font-family: var(--font-mono);
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border2);
    border-top-color: var(--pine); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* hide/show */
  .hidden { display: none !important; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .machine-grid { grid-template-columns: 1fr; }
    .topbar-sub { display: none; }
    .login-modal { padding: 24px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-logo">P</div>
  <span class="topbar-title">OPERATOR VIEW</span>
  <div class="topbar-sep"></div>
  <span class="topbar-sub" id="shiftLabel">LOADING SHIFT...</span>
  <div class="topbar-right">
    <span class="shift-time" id="clockDisplay">--:--</span>
    <div class="live-dot"></div>
    <span class="live-label">LIVE</span>
    <button class="btn-sm" onclick="openLogin()">Change Operators</button>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar" id="summaryBar">
  <div class="summary-stat">
    <span class="summary-stat-val green" id="statRunning">0</span>
    <span class="summary-stat-label">Machines Running</span>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-stat">
    <span class="summary-stat-val" id="statPieces">0</span>
    <span class="summary-stat-label">Pieces Today</span>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-stat">
    <span class="summary-stat-val amber" id="statStopped">0</span>
    <span class="summary-stat-label">Stopped</span>
  </div>
  <div class="summary-divider"></div>
  <div class="summary-stat">
    <span class="summary-stat-val" id="statShiftTime">0:00</span>
    <span class="summary-stat-label">Shift Elapsed</span>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div id="loadingState" class="loading-state">
    <div class="spinner"></div>
    loading jobs...
  </div>
  <div class="machine-grid hidden" id="machineGrid"></div>
</div>

<!-- LOGIN OVERLAY -->
<div class="overlay hidden" id="loginOverlay">
  <div class="login-modal">
    <div>
      <h2>Who's working today?</h2>
      <p>Assign operators to machines. Tap a name to select. Multiple operators can share a machine.</p>
    </div>
    <div class="login-section">
      <div class="login-section-label">Press Assignments</div>
      <div class="press-assign" id="pressAssignRows"></div>
    </div>
    <div class="login-actions">
      <button class="btn-primary" onclick="submitLogin()">Start Shift →</button>
    </div>
  </div>
</div>

<!-- STOP REASON MODAL -->
<div class="reason-overlay hidden" id="reasonOverlay">
  <div class="reason-modal">
    <h3>Why are you stopping?</h3>
    <p id="reasonMachineName"></p>
    <div class="reason-grid" id="reasonGrid"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────
const BASE_ID = 'appJkaLk8DykjsgHR';
const TABLE_IMPRINTS = 'tbln9oAGvz2PNBZLV';
const TABLE_OPERATORS = 'tblQm9hy2WZCx9jnd';

// Airtable field IDs
const F = {
  imprintId:    'fldDFfwFQ9B20n2kT', // Imprint ID text
  orderNum:     'fldhBqGtBrkI6SqAn', // Order #
  designNick:   'fldDYBnwwV6Z4VLBc', // Design Nickname
  pressAssign:  'fldv59OGU7EkBVofo', // Press (singleSelect)
  startTime:    'fldfqtIgcEfIlIeQk', // Scheduled Start Time
  runTime:      'fldvAqPl6Yq3bxASW', // Allocated Production Time (seconds)
  qty:          'fldFipR4ddfqMPeAX', // Total Active Impressions
  screens:      'fldkQPyY8chFb6EdE', // Screen Count
  inkType:      'fldHjjQ5lzm66ox5j', // Ink Type
  location:     'fldyyFoiKCgGOpsGX', // Location (singleSelect)
  scheduled:    'fldYD2VrhaLfkXXkw', // Scheduled (checkbox) — filterable
  orderStatus:  'fldNROVFSsBwLUOYW', // Order Status Lookup (client-side filter only)
  runStarted:   'fldmnZof3Dce60JKv', // Run Started (checkbox)
  runFinished:  'fldFuDZ68QdUMt3pM', // Run Finished (checkbox)
  opName:       'fldTHbsn4OOw4VzNO', // Operator Name (formula)
  opSelect:     'fldv4VQ7tshYKREn0', // Operator (singleSelect)
};

const STOP_REASONS = ['Ink Change', 'Screen Issue', 'Break', 'End of Run', 'Other'];

const MACHINES = [
  { id: 'press1',    name: 'ROQ NEXT',    sub: 'PRESS 1',        icon: '🖨️', iconClass: 'icon-press',  pressKey: 'Press 1 - ROQ NEXT',        speed: 250 },
  { id: 'press2',    name: 'ROQ YOU',     sub: 'PRESS 2',        icon: '🖨️', iconClass: 'icon-press',  pressKey: 'Press 2 - ROQ YOU',         speed: 225 },
  { id: 'heat',      name: 'HEAT PRESS',  sub: 'HEAT TRANSFER',  icon: '🔥', iconClass: 'icon-heat',   pressKey: 'Heat press',                speed: null },
  { id: 'emb',       name: 'TAJIMA',      sub: 'EMBROIDERY',     icon: '🧵', iconClass: 'icon-emb',    pressKey: 'Embroidery - TAJIMA 6-Head', speed: null },
  { id: 'flatstock', name: 'FLATSTOCK',   sub: 'FLATSTOCK PRESS',icon: '📋', iconClass: 'icon-flat',   pressKey: 'Flatstock - M&R Saturn',    speed: null },
];

// ─── STATE ────────────────────────────────────────────────────────────────
let pat = null;
let operators = [];
let jobs = [];         // all scheduled imprints for today
let machineAssignments = {}; // machineId -> [opName, ...]
let machineState = {}; // machineId -> { status, startedAt, stoppedAt, stopReason, piecesCompleted, currentOpName, jobId }
let timers = {};
let shiftStart = null;
let pendingStopMachineId = null;

// ─── INIT ─────────────────────────────────────────────────────────────────
window.onload = async () => {
  pat = sessionStorage.getItem('pine_pat');
  if (!pat) {
    pat = prompt('Enter Airtable PAT:');
    if (!pat) return;
    sessionStorage.setItem('pine_pat', pat);
  }

  shiftStart = sessionStorage.getItem('pine_shift_start');
  if (!shiftStart) {
    shiftStart = new Date().toISOString();
    sessionStorage.setItem('pine_shift_start', shiftStart);
  }

  // Restore machine state if exists
  const savedState = sessionStorage.getItem('pine_machine_state');
  if (savedState) machineState = JSON.parse(savedState);
  const savedAssign = sessionStorage.getItem('pine_machine_assign');
  if (savedAssign) machineAssignments = JSON.parse(savedAssign);

  startClock();
  await loadData();

  const hasAssignments = Object.keys(machineAssignments).length > 0;
  if (!hasAssignments) {
    openLogin();
  } else {
    renderGrid();
  }
};

// ─── API ──────────────────────────────────────────────────────────────────
async function airtableFetch(endpoint, opts = {}) {
  const res = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${endpoint}`, {
    ...opts,
    headers: { Authorization: `Bearer ${pat}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  });
  if (!res.ok) throw new Error(`Airtable error ${res.status}`);
  return res.json();
}

async function loadData() {
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('machineGrid').classList.add('hidden');

  try {
    // Load operators
    const opData = await airtableFetch(`${TABLE_OPERATORS}?fields[]=${F.opName}&fields[]=${F.opSelect}`);
    operators = opData.records.map(r => ({
      id: r.id,
      name: r.fields[F.opName] || '?',
      color: r.fields[F.opSelect]?.color || 'greenLight2',
    }));

    // Load scheduled imprints with equipment assigned.
    // Order Status Lookup is multipleLookupValues — NOT server-side filterable.
    // Filter server-side only on fields that support it: Equipment (singleSelect) + Scheduled (checkbox).
    // Then filter client-side on status.
    // Filter: Equipment is set AND Scheduled = TRUE
    // Use simple field-name formula — field names are stable and safe here
    const filterFormula = encodeURIComponent("AND({Equipment}!='',{Scheduled}=TRUE())");
    const fields = [F.imprintId, F.orderNum, F.designNick, F.pressAssign, F.startTime, F.runTime, F.qty, F.screens, F.inkType, F.location, F.orderStatus, F.runStarted, F.runFinished];
    const fieldParams = fields.map(f => `fields[]=${f}`).join('&');
    const jobData = await airtableFetch(`${TABLE_IMPRINTS}?${fieldParams}&filterByFormula=${filterFormula}&sort[0][field]=${F.startTime}&sort[0][direction]=asc&pageSize=200`);

    const ACTIVE_STATUSES = ['On-Press','Received & Staged','Scheduled, Screened, & Inbound','Pre-press','Ordered - In Production','Ready to Order'];
    jobs = jobData.records
      .map(r => ({
        id: r.id,
        imprintId: r.fields[F.imprintId] || '—',
        orderNum: r.fields[F.orderNum] || '—',
        designNick: r.fields[F.designNick] || '',
        press: r.fields[F.pressAssign]?.name || '',
        startTime: r.fields[F.startTime] || null,
        runTimeSec: r.fields[F.runTime] || 0,
        qty: r.fields[F.qty] || 0,
        screens: r.fields[F.screens] || 0,
        inkType: r.fields[F.inkType]?.name || '',
        location: r.fields[F.location]?.name || r.fields[F.location] || '',
        status: (r.fields[F.orderStatus] || []).join(', '),
        runStarted: r.fields[F.runStarted] || false,
        runFinished: r.fields[F.runFinished] || false,
      }))
      // Client-side: keep active jobs only, exclude completed
      .filter(j => !j.runFinished && (j.status === '' || ACTIVE_STATUSES.some(s => j.status.includes(s))));

  } catch(e) {
    console.error('Load error:', e);
    alert(`Failed to load data.\n\n${e.message}\n\nCheck your PAT and try again.`);
  }

  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('machineGrid').classList.remove('hidden');
}

// ─── LOGIN ────────────────────────────────────────────────────────────────
function openLogin() {
  const overlay = document.getElementById('loginOverlay');
  const rows = document.getElementById('pressAssignRows');
  rows.innerHTML = '';

  MACHINES.forEach(m => {
    const currentOps = machineAssignments[m.id] || [];
    const row = document.createElement('div');
    row.className = 'press-row-assign';
    row.innerHTML = `
      <div class="press-row-assign-name">${m.name}<br><span style="font-size:9px;color:var(--text3);font-family:var(--font-mono)">${m.sub}</span></div>
      <div class="press-row-assign-ops" id="ops_${m.id}">
        ${operators.map(op => `
          <div class="op-chip ${currentOps.includes(op.name) ? 'selected' : ''}"
               onclick="toggleOpAssign('${m.id}','${op.name}',this)">
            ${op.name}
          </div>
        `).join('')}
      </div>
    `;
    rows.appendChild(row);
  });

  overlay.classList.remove('hidden');
}

function toggleOpAssign(machineId, opName, el) {
  el.classList.toggle('selected');
}

function submitLogin() {
  MACHINES.forEach(m => {
    const container = document.getElementById(`ops_${m.id}`);
    const selected = [...container.querySelectorAll('.op-chip.selected')].map(c => c.textContent.trim());
    machineAssignments[m.id] = selected;
  });
  sessionStorage.setItem('pine_machine_assign', JSON.stringify(machineAssignments));
  document.getElementById('loginOverlay').classList.add('hidden');

  if (!shiftStart) {
    shiftStart = new Date().toISOString();
    sessionStorage.setItem('pine_shift_start', shiftStart);
  }
  renderGrid();
}

// ─── RENDER ───────────────────────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('machineGrid');
  grid.innerHTML = '';

  MACHINES.forEach(m => {
    const card = buildMachineCard(m);
    grid.appendChild(card);
  });

  startTimers();
  updateSummary();
}

function getJobsForMachine(machine) {
  // Use startsWith for heat press since there are multiple variants (D3, Tag Press, Hat Press)
  // Use exact match for everything else
  if (machine.id === 'heat') {
    return jobs.filter(j => j.press.toLowerCase().startsWith('heat press'));
  }
  return jobs.filter(j => j.press === machine.pressKey);
}

function getActiveJob(machine) {
  const st = machineState[machine.id];
  if (st && st.jobId) {
    return jobs.find(j => j.id === st.jobId) || getJobsForMachine(machine)[0] || null;
  }
  return getJobsForMachine(machine)[0] || null;
}

function buildMachineCard(machine) {
  const st = machineState[machine.id] || { status: 'idle', piecesCompleted: 0 };
  const assignedOps = machineAssignments[machine.id] || [];
  const job = getActiveJob(machine);

  const statusClass = st.status === 'running' ? 'running' : st.status === 'stopped' ? 'stopped' : 'idle';
  const badgeClass = st.status === 'running' ? 'badge-running' : st.status === 'stopped' ? 'badge-stopped' : (job ? 'badge-idle' : 'badge-no-job');
  const badgeText = st.status === 'running' ? 'RUNNING' : st.status === 'stopped' ? 'STOPPED' : (job ? 'IDLE' : 'NO JOB');

  const card = document.createElement('div');
  card.className = `machine-card ${statusClass}`;
  card.id = `card_${machine.id}`;

  // Header
  let headerHTML = `
    <div class="card-header">
      <div class="machine-icon ${machine.iconClass}">${machine.icon}</div>
      <div class="card-machine-info">
        <div class="card-machine-name">${machine.name}</div>
        <div class="card-machine-sub">${machine.sub}</div>
      </div>
      <span class="status-badge ${badgeClass}">${badgeText}</span>
    </div>
  `;

  // Ops row
  let opsHTML = `<div class="card-ops-row">
    <span class="card-ops-label">Op</span>
    ${assignedOps.length === 0 ? '<span style="font-size:10px;color:var(--text3);font-family:var(--font-mono)">unassigned</span>' :
      assignedOps.map(op => `
        <div class="op-pill ${st.currentOpName === op ? 'active' : ''}"
             onclick="setActiveOp('${machine.id}','${op}')">${op}</div>
      `).join('')
    }
  </div>`;

  // Job section
  let jobHTML = '';
  if (!job) {
    jobHTML = `<div class="card-job"><div class="no-job-state">
      <div class="no-job-icon">⬜</div>
      <div class="no-job-text">no jobs scheduled</div>
    </div></div>`;
  } else {
    const pct = job.qty > 0 ? Math.min(100, Math.round((st.piecesCompleted || 0) / job.qty * 100)) : 0;
    const progressClass = pct >= 75 ? '' : pct >= 40 ? 'amber' : '';
    const runMins = job.runTimeSec > 0 ? Math.round(job.runTimeSec / 60) : null;
    const startFmt = job.startTime ? new Date(job.startTime).toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit',hour12:true}) : null;

    jobHTML = `<div class="card-job">
      <div class="job-order">ORDER ${job.orderNum} · ${job.imprintId}</div>
      <div class="job-title">${job.designNick || job.imprintId}</div>
      <div class="job-chips">
        <span class="job-chip highlight">${job.qty} pcs</span>
        ${job.screens ? `<span class="job-chip">${job.screens}C</span>` : ''}
        ${job.location ? `<span class="job-chip">${job.location}</span>` : ''}
        ${job.inkType ? `<span class="job-chip">${job.inkType}</span>` : ''}
        ${runMins ? `<span class="job-chip">~${runMins}m</span>` : ''}
      </div>

      ${st.status === 'stopped' && st.stopReason ? `
        <div class="stop-reason-badge">⏸ ${st.stopReason}</div>
      ` : ''}

      <div class="timer-row">
        <span class="timer-label">ELAPSED</span>
        <span class="timer-display ${st.status}" id="timer_${machine.id}">0:00:00</span>
      </div>

      <div class="progress-section">
        <div class="progress-header">
          <span class="progress-label">PIECES COMPLETED</span>
          <span class="progress-count" id="pcount_${machine.id}">${st.piecesCompleted || 0}<span> / ${job.qty}</span></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${progressClass}" id="pbar_${machine.id}" style="width:${pct}%"></div>
        </div>
      </div>

      <div class="piece-input-row">
        <span class="piece-label">ADJUST PIECE COUNT</span>
        <button class="piece-btn" onclick="adjustPieces('${machine.id}', -10)">−</button>
        <span class="piece-display" id="pdisplay_${machine.id}">${st.piecesCompleted || 0}</span>
        <button class="piece-btn" onclick="adjustPieces('${machine.id}', 10)">+</button>
      </div>
    </div>`;
  }

  // Controls
  const canStart = job !== null;
  let ctrlHTML = `<div class="card-controls">`;
  if (st.status === 'running') {
    ctrlHTML += `<button class="btn-start stop-state" onclick="stopMachine('${machine.id}')">
      <span class="btn-dot pulse"></span> STOP
    </button>`;
  } else if (st.status === 'stopped') {
    ctrlHTML += `<button class="btn-start start-state" onclick="startMachine('${machine.id}')">
      ▶ RESUME
    </button>`;
  } else {
    ctrlHTML += `<button class="btn-start start-state" ${!canStart?'disabled':''} onclick="startMachine('${machine.id}')">
      ▶ START
    </button>`;
  }
  ctrlHTML += `</div>`;

  card.innerHTML = headerHTML + opsHTML + jobHTML + ctrlHTML;
  return card;
}

// ─── MACHINE CONTROLS ─────────────────────────────────────────────────────
function startMachine(machineId) {
  const machine = MACHINES.find(m => m.id === machineId);
  const job = getActiveJob(machine);
  if (!job) return;

  const st = machineState[machineId] || {};
  const now = Date.now();

  machineState[machineId] = {
    ...st,
    status: 'running',
    startedAt: now,
    stoppedAt: null,
    stopReason: null,
    piecesCompleted: st.piecesCompleted || 0,
    currentOpName: st.currentOpName || (machineAssignments[machineId] || [])[0] || null,
    jobId: job.id,
    elapsed: st.elapsed || 0,
  };
  saveState();
  refreshCard(machineId);
  startCardTimer(machineId);
  updateSummary();
}

function stopMachine(machineId) {
  pendingStopMachineId = machineId;
  const machine = MACHINES.find(m => m.id === machineId);
  document.getElementById('reasonMachineName').textContent = `Stopping ${machine.name}`;

  const grid = document.getElementById('reasonGrid');
  grid.innerHTML = STOP_REASONS.map((r, i) =>
    `<button class="reason-btn ${i === STOP_REASONS.length-1 ? '' : ''}" onclick="confirmStop('${r}')">${r}</button>`
  ).join('');

  document.getElementById('reasonOverlay').classList.remove('hidden');
}

function confirmStop(reason) {
  document.getElementById('reasonOverlay').classList.add('hidden');
  const machineId = pendingStopMachineId;
  const st = machineState[machineId] || {};
  const elapsed = (st.elapsed || 0) + (Date.now() - (st.startedAt || Date.now()));

  machineState[machineId] = {
    ...st,
    status: 'stopped',
    stoppedAt: Date.now(),
    stopReason: reason,
    elapsed,
    startedAt: null,
  };

  if (timers[machineId]) { clearInterval(timers[machineId]); delete timers[machineId]; }
  saveState();
  refreshCard(machineId);
  updateSummary();
}

function setActiveOp(machineId, opName) {
  const st = machineState[machineId] || {};
  machineState[machineId] = { ...st, currentOpName: opName };
  saveState();
  // Just re-render the op pills
  const card = document.getElementById(`card_${machineId}`);
  if (!card) return;
  const machine = MACHINES.find(m => m.id === machineId);
  const assignedOps = machineAssignments[machineId] || [];
  const pills = card.querySelectorAll('.op-pill');
  pills.forEach(p => {
    p.classList.toggle('active', p.textContent.trim() === opName);
  });
}

function adjustPieces(machineId, delta) {
  const st = machineState[machineId] || {};
  const machine = MACHINES.find(m => m.id === machineId);
  const job = getActiveJob(machine);
  const maxQty = job ? job.qty : 9999;
  const current = st.piecesCompleted || 0;
  const newVal = Math.max(0, Math.min(maxQty, current + delta));

  machineState[machineId] = { ...st, piecesCompleted: newVal };
  saveState();

  // Update just the count displays
  const pdisplay = document.getElementById(`pdisplay_${machineId}`);
  const pcount = document.getElementById(`pcount_${machineId}`);
  const pbar = document.getElementById(`pbar_${machineId}`);
  if (pdisplay) pdisplay.textContent = newVal;
  if (pcount) pcount.innerHTML = `${newVal}<span> / ${maxQty}</span>`;
  if (pbar) {
    const pct = maxQty > 0 ? Math.min(100, Math.round(newVal / maxQty * 100)) : 0;
    pbar.style.width = pct + '%';
  }
  updateSummary();
}

// ─── TIMERS ───────────────────────────────────────────────────────────────
function startTimers() {
  MACHINES.forEach(m => {
    const st = machineState[m.id];
    if (st && st.status === 'running') startCardTimer(m.id);
    else updateTimerDisplay(m.id);
  });
}

function startCardTimer(machineId) {
  if (timers[machineId]) clearInterval(timers[machineId]);
  timers[machineId] = setInterval(() => updateTimerDisplay(machineId), 1000);
  updateTimerDisplay(machineId);
}

function updateTimerDisplay(machineId) {
  const el = document.getElementById(`timer_${machineId}`);
  if (!el) return;
  const st = machineState[machineId];
  if (!st || st.status === 'idle') { el.textContent = '0:00:00'; return; }
  const base = st.elapsed || 0;
  const extra = st.status === 'running' ? (Date.now() - (st.startedAt || Date.now())) : 0;
  const total = Math.floor((base + extra) / 1000);
  const h = Math.floor(total / 3600);
  const m = Math.floor((total % 3600) / 60);
  const s = total % 60;
  el.textContent = `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// ─── SUMMARY ──────────────────────────────────────────────────────────────
function updateSummary() {
  let running = 0, stopped = 0, pieces = 0;
  MACHINES.forEach(m => {
    const st = machineState[m.id];
    if (!st) return;
    if (st.status === 'running') running++;
    if (st.status === 'stopped') stopped++;
    pieces += st.piecesCompleted || 0;
  });
  document.getElementById('statRunning').textContent = running;
  document.getElementById('statStopped').textContent = stopped;
  document.getElementById('statPieces').textContent = pieces.toLocaleString();

  // shift elapsed
  const elapsed = Math.floor((Date.now() - new Date(shiftStart).getTime()) / 1000);
  const sh = Math.floor(elapsed / 3600);
  const sm = Math.floor((elapsed % 3600) / 60);
  document.getElementById('statShiftTime').textContent = `${sh}:${String(sm).padStart(2,'0')}`;
}

// ─── CLOCK ────────────────────────────────────────────────────────────────
function startClock() {
  const update = () => {
    const now = new Date();
    document.getElementById('clockDisplay').textContent =
      now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', second:'2-digit', hour12:true, timeZone:'America/Denver' });
    document.getElementById('shiftLabel').textContent =
      now.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', timeZone:'America/Denver' }).toUpperCase() + ' · MT';
    updateSummary();
  };
  update();
  setInterval(update, 1000);
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
function refreshCard(machineId) {
  const machine = MACHINES.find(m => m.id === machineId);
  const oldCard = document.getElementById(`card_${machineId}`);
  if (!oldCard) return;
  const newCard = buildMachineCard(machine);
  oldCard.replaceWith(newCard);
  const st = machineState[machineId];
  if (st && st.status === 'running') startCardTimer(machineId);
}

function saveState() {
  sessionStorage.setItem('pine_machine_state', JSON.stringify(machineState));
}
</script>
