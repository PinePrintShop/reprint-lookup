<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>LI Debug</title>
<style>body{font-family:monospace;padding:20px;background:#f5f5f5;}pre{background:#fff;padding:16px;border-radius:8px;overflow:auto;font-size:12px;white-space:pre-wrap;}</style>
</head>
<body>
<h2>Line Item API Debug</h2>
<button onclick="runTest()">Run Test</button>
<pre id="out">Click Run Test...</pre>
<script>
var PAT = sessionStorage.getItem('pine_pat');
if(!PAT){ PAT = prompt('PAT:'); sessionStorage.setItem('pine_pat', PAT); }

// The LI record we know has S:2 M:2 L:9 XL:5 2XL:1 Total:19
var LI_ID = 'recsg3FtRJ6mF102V';
var TLI = 'tblJx5UlwO7oMSk5H';
var BASE = 'appJkaLk8DykjsgHR';

async function runTest(){
  var out = document.getElementById('out');
  out.textContent = 'Running...\n';

  // Test 1: Single record GET, no params
  try{
    var r1 = await fetch('https://api.airtable.com/v0/'+BASE+'/'+TLI+'/'+LI_ID, {headers:{'Authorization':'Bearer '+PAT}});
    var j1 = await r1.json();
    out.textContent += '=== TEST 1: GET /table/recXXX (no params) ===\n';
    out.textContent += 'Keys in response: '+Object.keys(j1).join(', ')+'\n';
    if(j1.fields){
      var fkeys = Object.keys(j1.fields);
      out.textContent += 'fields count: '+fkeys.length+'\n';
      out.textContent += 'Has fldCZr5lB6Jx80lfG (S): '+(j1.fields['fldCZr5lB6Jx80lfG']||'NOT FOUND')+'\n';
      out.textContent += 'Has S: '+(j1.fields['S']||'NOT FOUND')+'\n';
      out.textContent += 'Has fldFfuKAcduwWQp8g (total): '+(j1.fields['fldFfuKAcduwWQp8g']||'NOT FOUND')+'\n';
      out.textContent += 'Sample keys: '+fkeys.slice(0,10).join(', ')+'\n';
    } else {
      out.textContent += 'NO fields key! Full response:\n'+JSON.stringify(j1,null,2).slice(0,500)+'\n';
    }
  }catch(e){ out.textContent += 'TEST 1 ERROR: '+e.message+'\n'; }

  out.textContent += '\n';

  // Test 2: Single record GET, with returnFieldsByFieldId=true
  try{
    var r2 = await fetch('https://api.airtable.com/v0/'+BASE+'/'+TLI+'/'+LI_ID+'?returnFieldsByFieldId=true', {headers:{'Authorization':'Bearer '+PAT}});
    var j2 = await r2.json();
    out.textContent += '=== TEST 2: GET /table/recXXX?returnFieldsByFieldId=true ===\n';
    if(j2.fields){
      out.textContent += 'Has fldCZr5lB6Jx80lfG (S): '+(j2.fields['fldCZr5lB6Jx80lfG']||'NOT FOUND')+'\n';
      out.textContent += 'Has S: '+(j2.fields['S']||'NOT FOUND')+'\n';
      out.textContent += 'Has fldFfuKAcduwWQp8g (total): '+(j2.fields['fldFfuKAcduwWQp8g']||'NOT FOUND')+'\n';
      out.textContent += 'Sample keys: '+Object.keys(j2.fields).slice(0,10).join(', ')+'\n';
    } else {
      out.textContent += 'NO fields key! Full:\n'+JSON.stringify(j2,null,2).slice(0,500)+'\n';
    }
  }catch(e){ out.textContent += 'TEST 2 ERROR: '+e.message+'\n'; }

  out.textContent += '\n';

  // Test 3: Single record GET, with fields[] filter + returnFieldsByFieldId
  try{
    var url3 = 'https://api.airtable.com/v0/'+BASE+'/'+TLI+'/'+LI_ID
      +'?fields%5B%5D=fldCZr5lB6Jx80lfG&fields%5B%5D=fldzTs1qKe9IBxxSn&fields%5B%5D=fldFfuKAcduwWQp8g&returnFieldsByFieldId=true';
    var r3 = await fetch(url3, {headers:{'Authorization':'Bearer '+PAT}});
    var j3 = await r3.json();
    out.textContent += '=== TEST 3: GET with fields[] + returnFieldsByFieldId ===\n';
    if(j3.fields){
      out.textContent += 'Full fields: '+JSON.stringify(j3.fields)+'\n';
    } else {
      out.textContent += 'Full response: '+JSON.stringify(j3).slice(0,500)+'\n';
    }
  }catch(e){ out.textContent += 'TEST 3 ERROR: '+e.message+'\n'; }
}
</script>
</body>
</html>
