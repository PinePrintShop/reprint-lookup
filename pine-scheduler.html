<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Central — Scheduler</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bebas+Neue&family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap');

:root {
  --bg:       #f4f4f2;
  --s1:       #ffffff;
  --s2:       #f9f9f8;
  --s3:       #f0f0ee;
  --b1:       #e5e5e2;
  --b2:       #d8d8d4;
  --b3:       #c4c4c0;
  --t1:       #1a1a1a;
  --t2:       #555;
  --t3:       #999;
  --lime:     #4a7200;
  --lime-bg:  #e8f5a0;
  --lime2:    rgba(74,114,0,.1);
  --lime3:    rgba(74,114,0,.04);
  --red:      #c0392b;
  --red2:     rgba(192,57,43,.08);
  --orange:   #c06000;
  --orange2:  rgba(192,96,0,.08);
  --blue:     #1a5fa0;
  --blue2:    rgba(26,95,160,.08);

  /* Press lane colors — rich for light bg */
  --c-p1:   #3d6e00;
  --c-p2:   #1a5fa0;
  --c-emb:  #6035a0;
  --c-d3:   #b04000;
  --c-tag:  #8a5c00;
  --c-hat:  #7a4f00;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  display: flex;
  flex-direction: column;
}

/* ─── HEADER ─────────────────────────────────────────────── */
.hdr {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 0 16px;
  height: 48px;
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: .12em;
  color: var(--lime);
  white-space: nowrap;
}
.wordmark span { color: var(--t3); }

.week-ctrl {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: 5px;
  padding: 0 6px;
  height: 30px;
}
.week-ctrl button {
  background: none; border: none; color: var(--t2);
  cursor: pointer; font-size: 16px; padding: 0 3px;
  transition: color .15s;
}
.week-ctrl button:hover { color: var(--lime); }
#weekLabel {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .04em;
  min-width: 160px; text-align: center; color: var(--t1);
}

.hdr-spacer { flex: 1; }

.btn {
  font-family: 'Barlow', sans-serif;
  font-weight: 600; font-size: 12px; letter-spacing: .04em;
  border: none; border-radius: 4px;
  padding: 0 13px; height: 30px; cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  transition: all .15s; white-space: nowrap;
}
.btn-lime { background: var(--lime); color: #000; }
.btn-lime:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-lime:disabled { opacity: .35; cursor: not-allowed; transform: none; filter: none; }
.btn-ghost { background: var(--s2); color: var(--t2); border: 1px solid var(--b2); }
.btn-ghost:hover { color: var(--t1); border-color: var(--b3); }

/* ─── LAYOUT ─────────────────────────────────────────────── */
.layout {
  flex: 1;
  display: grid;
  grid-template-columns: 256px 1fr;
  overflow: hidden;
  min-height: 0;
}

/* ─── SIDEBAR ─────────────────────────────────────────────── */
.sidebar {
  background: var(--s1);
  border-right: 1px solid var(--b1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sb-hdr {
  padding: 10px 12px;
  border-bottom: 1px solid var(--b1);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.sb-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  letter-spacing: .1em; text-transform: uppercase; color: var(--t2);
}
.sb-count {
  background: var(--lime); color: #000;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  border-radius: 10px; padding: 1px 8px;
}
.sb-body {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
}
.sb-body::-webkit-scrollbar { width: 3px; }
.sb-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

.sb-empty {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100%; gap: 8px;
  color: var(--t3);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; text-align: center; line-height: 1.6;
}
.sb-empty-icon { font-size: 28px; opacity: .4; }

/* ─── UNSCHEDULED JOB CARD ─────────────────────────────────── */
.ucard {
  background: var(--s2);
  border: 1px solid var(--b2);
  border-radius: 5px;
  padding: 8px 10px;
  cursor: grab;
  transition: border-color .15s, transform .12s, box-shadow .15s;
  user-select: none;
  position: relative;
}
.ucard:hover {
  border-color: var(--b3);
  transform: translateX(3px);
  box-shadow: -3px 0 0 var(--lime), 0 1px 4px rgba(0,0,0,.08);
}
.ucard.dragging { opacity: .45; cursor: grabbing; transform: none; box-shadow: none; }
.ucard.rush { box-shadow: -3px 0 0 var(--red); }
.ucard.asap { box-shadow: -3px 0 0 var(--orange); }

.uc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 6px; margin-bottom: 4px; }
.uc-client {
  font-weight: 600; font-size: 13px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.uc-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; border-radius: 3px;
  padding: 2px 5px; flex-shrink: 0;
}
.badge-rush { background: var(--red2); color: var(--red); }
.badge-asap { background: var(--orange2); color: var(--orange); }

.uc-design {
  font-size: 11px; color: var(--t2); margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.uc-chips { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; border-radius: 3px;
  padding: 1px 5px; border: 1px solid var(--b2);
  color: var(--t3); background: var(--bg);
}
.chip-sc  { color: var(--lime); border-color: rgba(198,241,53,.2); }
.chip-qty { color: var(--blue); border-color: rgba(75,150,255,.2); }
.chip-due { color: var(--t2); }
.chip-due.late { color: var(--red); border-color: rgba(255,59,59,.2); }
.chip-est { color: var(--b3); border-color: var(--b2); }
.chip-pallet { color: var(--t3); }

/* ─── CALENDAR ─────────────────────────────────────────────── */
.cal-area {
  display: flex; flex-direction: column; overflow: hidden;
}

.cal-col-grid {
  display: grid;
  grid-template-columns: 128px repeat(5, 1fr);
}

.cal-header {
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.cal-hdr-press {
  padding: 8px 10px;
  border-right: 1px solid var(--b1);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
  color: var(--t3); display: flex; align-items: flex-end;
}
.cal-hdr-day {
  padding: 8px 10px;
  border-right: 1px solid var(--b1);
  text-align: center;
}
.cal-hdr-day:last-child { border-right: none; }
.day-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--t2);
}
.day-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px; letter-spacing: .04em; line-height: 1;
  margin-top: 1px;
}
.cal-hdr-day.today .day-num { color: var(--lime); }
.cal-hdr-day.today .day-name { color: var(--lime); }

/* capacity bar */
.cap-track {
  height: 3px; background: var(--b1);
  border-radius: 2px; margin-top: 4px; overflow: hidden;
}
.cap-fill {
  height: 100%; border-radius: 2px;
  transition: width .4s ease, background .3s;
}

/* ─── CALENDAR BODY ─────────────────────────────────────────── */
.cal-body {
  flex: 1; overflow-y: auto; overflow-x: hidden;
}
.cal-body::-webkit-scrollbar { width: 5px; }
.cal-body::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 3px; }

.press-row {
  display: grid;
  grid-template-columns: 128px repeat(5, 1fr);
  border-bottom: 1px solid var(--b1);
  min-height: 80px;
}
.press-row:last-child { border-bottom: none; }

.press-label {
  background: var(--s1);
  border-right: 1px solid var(--b1);
  padding: 10px;
  display: flex; flex-direction: column; justify-content: center; gap: 3px;
  flex-shrink: 0;
}
.pl-dot {
  width: 7px; height: 7px; border-radius: 50%;
  margin-bottom: 2px;
}
.pl-name {
  font-weight: 600; font-size: 12px; line-height: 1.2;
}
.pl-machine {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: .05em; color: var(--t3);
  text-transform: uppercase;
}
.pl-cap {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; color: var(--t3); margin-top: 2px;
}

.day-cell {
  border-right: 1px solid var(--b1);
  padding: 5px;
  display: flex; flex-direction: column; gap: 3px;
  position: relative; min-height: 80px;
  transition: background .12s;
}
.day-cell:last-child { border-right: none; }
.day-cell.drop-over {
  background: var(--lime3);
  outline: 1px dashed rgba(198,241,53,.25);
  outline-offset: -3px;
}
.day-cell.over-warn { background: var(--orange2); }
.day-cell.over-cap  { background: var(--red2); }

/* capacity mini-bar per cell */
.cell-cap-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 2px; background: var(--b1);
}
.cell-cap-fill {
  height: 100%; transition: width .3s, background .3s;
}

/* ─── SCHEDULED BLOCK ───────────────────────────────────────── */
.sblock {
  border-radius: 4px;
  padding: 5px 7px;
  cursor: grab;
  transition: filter .15s, transform .12s;
  user-select: none;
  position: relative;
  overflow: hidden;
}
.sblock:hover { filter: brightness(1.15); transform: translateY(-1px); }
.sblock.dragging { opacity: .4; cursor: grabbing; transform: none; }

.sblock::before {
  content: '';
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 3px;
  background: rgba(255,255,255,.3);
}

.sb-client {
  font-weight: 600; font-size: 11px; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding-right: 14px;
}
.sb-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; opacity: .7; margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-time {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; opacity: .55; margin-top: 1px;
}
.sb-pallet-warn {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; color: #ffcc00; margin-top: 2px;
}

.sblock-rm {
  position: absolute; top: 3px; right: 3px;
  background: rgba(0,0,0,.3); border: none;
  color: rgba(255,255,255,.5); font-size: 10px; line-height: 1;
  width: 14px; height: 14px; border-radius: 2px;
  cursor: pointer; display: none;
  align-items: center; justify-content: center;
}
.sblock:hover .sblock-rm { display: flex; }
.sblock-rm:hover { background: rgba(255,50,50,.5); color: #fff; }

/* ─── STATUS BAR ─────────────────────────────────────────────── */
.statusbar {
  height: 28px;
  background: var(--s1);
  border-top: 1px solid var(--b1);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 18px;
  flex-shrink: 0;
}
.stat-item {
  display: flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; color: var(--t3); letter-spacing: .04em;
}
.stat-dot { width: 5px; height: 5px; border-radius: 50%; }

/* ─── AI PANEL ─────────────────────────────────────────────── */
.ai-panel {
  position: fixed; bottom: 38px; right: 16px;
  width: 300px;
  background: var(--s1);
  border: 1px solid var(--b2);
  border-radius: 8px;
  padding: 14px;
  box-shadow: 0 4px 24px rgba(0,0,0,.12), 0 1px 3px rgba(0,0,0,.08);
  z-index: 200;
  opacity: 0; transform: translateY(12px) scale(.97);
  pointer-events: none;
  transition: opacity .22s, transform .22s;
}
.ai-panel.show {
  opacity: 1; transform: none; pointer-events: all;
}
.ai-panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.ai-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--lime);
  display: flex; align-items: center; gap: 6px;
}
.ai-pulse {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--lime);
  animation: aipulse 1.4s ease-in-out infinite;
}
@keyframes aipulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.4; transform:scale(.75); }
}
.ai-close {
  background: none; border: none; color: var(--t2);
  font-size: 16px; cursor: pointer; line-height: 1;
}
.ai-body { font-size: 12px; color: var(--t2); line-height: 1.55; margin-bottom: 10px; }
.ai-detail {
  background: var(--s2); border: 1px solid var(--b2);
  border-radius: 4px; padding: 9px; margin-bottom: 10px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; color: var(--t2); line-height: 1.8;
}
.ai-detail .hi { color: var(--lime); }
.ai-detail .warn { color: var(--orange); }
.ai-actions { display: flex; gap: 6px; }
.btn-accept {
  flex: 1; background: var(--lime); color: #000;
  font-weight: 700; font-size: 11px; letter-spacing: .06em;
  text-transform: uppercase; border: none; border-radius: 4px;
  padding: 7px; cursor: pointer; transition: filter .15s;
}
.btn-accept:hover { filter: brightness(1.1); }
.btn-skip {
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--b2); font-size: 11px; font-weight: 600;
  letter-spacing: .04em; border-radius: 4px;
  padding: 7px 12px; cursor: pointer; transition: color .15s;
}
.btn-skip:hover { color: var(--t1); }

/* ─── LOADING ─────────────────────────────────────────────── */
.loader {
  position: fixed; inset: 0;
  background: rgba(244,244,242,.92);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 14px; z-index: 500;
}
.spin {
  width: 32px; height: 32px;
  border: 2px solid var(--b1);
  border-top-color: var(--lime);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loader-txt {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; letter-spacing: .1em; color: var(--t1);
}

/* ─── PALLET CHANGE INDICATOR ─────────────────────────────── */
.pallet-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--orange), transparent);
  margin: 1px 0;
  position: relative;
}
.pallet-divider::after {
  content: attr(data-label);
  position: absolute; left: 50%; top: -8px;
  transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; color: var(--orange);
  background: var(--bg); padding: 0 4px;
  white-space: nowrap;
}

/* ─── FOCUSED PRESS VIEW ──────────────────────────────────── */
.press-toggle-btn {
  background: none; border: none;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: .06em; text-transform: uppercase;
  color: var(--t3); cursor: pointer; padding: 2px 5px;
  border-radius: 3px; transition: all .15s; margin-top: 3px;
  border: 1px solid var(--b1);
}
.press-toggle-btn:hover { color: var(--t2); border-color: var(--b2); }

.press-focus-overlay {
  position: fixed; inset: 0;
  background: rgba(244,244,242,.96);
  z-index: 300;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .2s;
}
.press-focus-overlay.show { opacity: 1; pointer-events: all; }

.pfo-header {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px;
  background: var(--s1);
  border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.pfo-dot { width: 10px; height: 10px; border-radius: 50%; }
.pfo-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; letter-spacing: .1em;
}
.pfo-machine {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--t2); letter-spacing: .06em;
}
.pfo-cap {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--t3);
}
.pfo-spacer { flex: 1; }
.pfo-close {
  background: var(--s2); border: 1px solid var(--b2);
  color: var(--t2); font-size: 18px; line-height: 1;
  width: 32px; height: 32px; border-radius: 5px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.pfo-close:hover { color: var(--t1); border-color: var(--b3); }

.pfo-body {
  flex: 1; overflow: hidden;
  display: grid;
  grid-template-columns: 220px 1fr;
}

.pfo-sidebar {
  border-right: 1px solid var(--b1);
  background: var(--s1);
  display: flex; flex-direction: column; overflow: hidden;
}
.pfo-sb-hdr {
  padding: 10px 12px; border-bottom: 1px solid var(--b1);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--t2);
}
.pfo-sb-list {
  flex: 1; overflow-y: auto; padding: 8px;
  display: flex; flex-direction: column; gap: 4px;
}
.pfo-sb-list::-webkit-scrollbar { width: 3px; }
.pfo-sb-list::-webkit-scrollbar-thumb { background: var(--b2); border-radius: 2px; }

.pfo-cal {
  display: flex; flex-direction: column; overflow: hidden;
}
.pfo-cal-hdr {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  background: var(--s1); border-bottom: 1px solid var(--b1);
  flex-shrink: 0;
}
.pfo-day-hdr {
  padding: 10px 14px; border-right: 1px solid var(--b1); text-align: center;
}
.pfo-day-hdr:last-child { border-right: none; }
.pfo-day-hdr.today .pfo-day-num { color: var(--lime); }
.pfo-day-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: .1em; text-transform: uppercase; color: var(--t2);
}
.pfo-day-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 32px; line-height: 1; margin-top: 2px;
}
.pfo-cal-body {
  flex: 1; overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
}
.pfo-day-col {
  border-right: 1px solid var(--b1); padding: 8px;
  display: flex; flex-direction: column; gap: 5px;
  min-height: 300px; transition: background .12s;
}
.pfo-day-col:last-child { border-right: none; }
.pfo-day-col.drop-over { background: var(--lime3); outline: 1px dashed rgba(74,114,0,.2); outline-offset: -3px; }
.pfo-day-col.over-warn { background: var(--orange2); }
.pfo-day-col.over-cap  { background: var(--red2); }

/* Capacity summary bar in focus view */
.pfo-cap-row {
  display: grid; grid-template-columns: repeat(5, 1fr);
  border-bottom: 1px solid var(--b1);
  background: var(--s2); flex-shrink: 0;
}
.pfo-cap-cell {
  padding: 6px 14px; border-right: 1px solid var(--b1);
  display: flex; align-items: center; gap: 8px;
}
.pfo-cap-cell:last-child { border-right: none; }
.pfo-cap-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; color: var(--t2); white-space: nowrap;
}
.pfo-cap-track {
  flex: 1; height: 4px; background: var(--b1); border-radius: 2px; overflow: hidden;
}
.pfo-cap-fill { height: 100%; border-radius: 2px; transition: width .3s, background .3s; }

/* Bigger scheduled blocks in focus view */
.pfo-sblock {
  border-radius: 5px; padding: 8px 10px;
  cursor: grab; user-select: none; position: relative;
  transition: filter .15s, transform .12s;
}
.pfo-sblock:hover { filter: brightness(.95); transform: translateY(-1px); }
.pfo-sblock.dragging { opacity: .4; cursor: grabbing; transform: none; }
.pfo-sblock::before {
  content: ''; position: absolute; top: 0; left: 0; bottom: 0;
  width: 4px; border-radius: 5px 0 0 5px;

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const BASE_ID   = 'appJkaLk8DykjsgHR';
const TBL_IMP   = 'tbln9oAGvz2PNBZLV';
const AT_TOKEN  = null; // uses Anthropic proxy

// Airtable field IDs
const F = {
  name:     'fldZtgzzQicugfXtP',
  screens:  'fld8rgkIj1RPO97QU',
  press:    'fldv59OGU7EkBVofo',
  qty:      'fld6gdEkaxIsjc0hG',
  startTime:'fldfqtIgcEfIlIeQk',
  runSecs:  'fldvAqPl6Yq3bxASW',
  status:   'fldNROVFSsBwLUOYW',
  priority: 'fldMCyF3zHshhQLM5',
  dueDate:  'fldAl0uhEDCjqhHM4',
  inkType:  'fldjNCuaGOkWgzH2K',
  client:   'fldeLMIAC0ABQAjYJ',
  location: 'fldKQIL0rSJBSeC8S',
  garment:  'fldyyFoiKCgGOpsGX',
};

// Press lanes
const PRESSES = [
  { id:'Press 1 - ROQ NEXT',        key:'p1',   color:'#c6f135', cap:420, warn:480, label:'Press 1',       machine:'ROQ NEXT'    },
  { id:'Press 2 - ROQ YOU',         key:'p2',   color:'#4b96ff', cap:360, warn:420, label:'Press 2',       machine:'ROQ YOU'     },
  { id:'Embroidery - TAJIMA 6-Head',key:'emb',  color:'#b97fff', cap:300, warn:420, label:'Embroidery',    machine:'TAJIMA'      },
  { id:'Heat press - D3',           key:'hpd3', color:'#ff7a2f', cap:300, warn:390, label:'Heat Press D3', machine:'D3'          },
  { id:'Heat press - Tag Press',    key:'hptag',color:'#ffaa00', cap:300, warn:390, label:'Heat Press Tags','machine':'Tag Press' },
  { id:'Heat press - Hat Press',    key:'hphat',color:'#ffdd00', cap:240, warn:300, label:'Heat Press Hats','machine':'Hat Press' },
];

// Pallet type by print location
function getPalletType(locationName) {
  if (!locationName) return 'tee';
  const l = locationName.toLowerCase();
  if (l.includes('bandana') || l.includes('tea towel')) return 'bandana';
  if (l.includes('hood')) return 'hoodie';
  if (l.includes('sleeve')) return 'sleeve';
  return 'tee';
}

// Pallet change time between consecutive jobs (minutes)
function palletChangeCost(fromPallet, toPallet) {
  if (!fromPallet || fromPallet === toPallet) return 0;
  if (fromPallet === 'bandana' || toPallet === 'bandana') return 20;
  // tee <-> sleeve, tee <-> hoodie, sleeve <-> hoodie
  return 15;
}

// Within-run scrub penalty (minutes) added to job duration
function withinRunPenalty(job) {
  const pallet = getPalletType(job.location);
  const qty = job.qty || 0;
  if (pallet === 'hoodie') return 20; // tape change at end
  if ((pallet === 'tee' || pallet === 'sleeve') && qty > 300) return 15;
  if (pallet === 'bandana' && qty > 300) return 20;
  return 0;
}

// Run time estimate in minutes from historical data
function estimateRunMin(job, pressId) {
  const screens = job.screens || 1;
  const qty     = job.qty || 0;
  const pid     = pressId || '';

  // Embroidery
  if (pid.includes('Embroidery')) {
    if (qty <= 24)  return 45;
    if (qty <= 48)  return 70;
    if (qty <= 96)  return 120;
    if (qty <= 144) return 200;
    if (qty <= 360) return 450;
    return 600;
  }
  // Heat press - Tag
  if (pid.includes('Tag Press')) {
    if (qty <= 48)  return 30;
    if (qty <= 96)  return 60;
    if (qty <= 144) return 105;
    if (qty <= 216) return 150;
    return 330;
  }
  // Heat press - D3
  if (pid.includes('D3')) {
    if (qty <= 24)  return 30;
    if (qty <= 48)  return 40;
    if (qty <= 96)  return 75;
    if (qty <= 144) return 120;
    return 240;
  }
  // Heat press - Hat
  if (pid.includes('Hat Press')) {
    if (qty <= 48)  return 45;
    if (qty <= 96)  return 70;
    return 150;
  }

  // Screen print lookup table [screens][qty_bucket]
  // qty buckets: 1-48, 49-96, 97-144, 145-216, 217-360, 361-576, 577+
  const table = {
    1: [30, 35, 60,  87, 140, 172, 310],
    2: [30, 40, 50,  75, 115, 200, 315],
    3: [45, 60, 60,  90, 145, 158,   0],
    4: [50, 50, 72, 100, 150,   0,   0],
    5: [60, 65, 90,  90, 120,   0,   0],
    6: [60, 65, 92, 100,   0, 170, 240],
    7: [  0,  0,100, 120,   0, 180,   0],
    8: [  0,  0,130, 120,   0, 210,   0],
  };
  const qBucket = qty <= 48 ? 0 : qty <= 96 ? 1 : qty <= 144 ? 2 :
                  qty <= 216 ? 3 : qty <= 360 ? 4 : qty <= 576 ? 5 : 6;
  const sc = Math.min(Math.max(screens, 1), 8);
  const row = table[sc] || table[2];
  const val = row[qBucket];
  if (!val) {
    // fallback: nearest populated + 15 min buffer
    const nonZero = row.filter(v => v > 0);
    return nonZero.length ? Math.max(...nonZero) + 15 : 60;
  }
  // Round to nearest 15
  return Math.ceil(val / 15) * 15;
}

// Auto-assign press from job type
function autoAssignPress(job) {
  const g = (job.garment || '').toLowerCase();
  const inkType = (job.inkType || '').toLowerCase();
  if (g === 'embroidery') return 'Embroidery - TAJIMA 6-Head';
  if (g === 'bandana' || g === 'flatstock') return null; // bandana goes to screen, flatstock is separate
  if (inkType.includes('supacolor') && job.location === 'Size Tag') return 'Heat press - Tag Press';
  if (inkType.includes('supacolor') && (job.location || '').toLowerCase().includes('hat')) return 'Heat press - Hat Press';
  if (inkType.includes('supacolor') || inkType.includes('decopress') || inkType.includes('hem label')) return 'Heat press - D3';
  // Screen print assignment: ≥5 screens → Press 1 only; otherwise either
  const sc = job.screens || 1;
  if (sc >= 5) return 'Press 1 - ROQ NEXT';
  return null; // scheduler picks
}

// Shop day: 7am MT = 13:00 UTC
function shopOpen(dateStr) {
  return new Date(dateStr + 'T13:00:00.000Z');
}

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let weekStart = getWeekStart(new Date());
let allJobs   = [];      // all RFO jobs from Airtable
let scheduled = {};      // { recId: { pressId, dateStr, startMin, runMin, palletType, penaltyMin } }
let dragJobId  = null;
let dragSource = null;   // 'sidebar' | 'calendar'
let pendingSuggestion = null;

function getWeekStart(d) {
  const day = new Date(d);
  const dow = day.getDay(); // 0=Sun
  const diff = dow === 0 ? -6 : 1 - dow; // Monday
  day.setDate(day.getDate() + diff);
  day.setHours(0,0,0,0);
  return day;
}

function weekDates() {
  return [0,1,2,3,4].map(i => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });
}

function dateStr(d) {
  return d.toISOString().slice(0,10);
}

// ═══════════════════════════════════════════════════════════
// AIRTABLE FETCH
// ═══════════════════════════════════════════════════════════
async function fetchRFOJobs() {
  const fields = [F.name, F.screens, F.press, F.qty, F.startTime, F.runSecs,
                  F.status, F.priority, F.dueDate, F.inkType, F.client, F.location, F.garment];

  // Build field params
  const fieldParams = fields.map(f => `fields[]=${encodeURIComponent(f)}`).join('&');
  // Filter: status lookup contains "RFO" — use FIND on the lookup value
  const formula = encodeURIComponent(`OR(
  FIND("Ready to Order", ARRAYJOIN({${F.status}})),
  FIND("Ordered - In Production", ARRAYJOIN({${F.status}})),
  FIND("Scheduled, Screened", ARRAYJOIN({${F.status}})),
  FIND("Received & Staged", ARRAYJOIN({${F.status}})),
  FIND("Pre-press", ARRAYJOIN({${F.status}})),
  FIND("On-Press", ARRAYJOIN({${F.status}}))
)`);

  let allRecords = [];
  let offset = '';

  while (true) {
    const offsetParam = offset ? `&offset=${offset}` : '';
    const url = `https://api.airtable.com/v0/${BASE_ID}/${TBL_IMP}?${fieldParams}&returnFieldsByFieldId=true&pageSize=100&filterByFormula=${formula}${offsetParam}`;

    const res = await fetch(url, {
      headers: { 'Authorization': `Bearer ${window.AIRTABLE_KEY || ''}` }
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(`Airtable error: ${res.status} — ${errText}`);
    }
    const data = await res.json();
    allRecords = allRecords.concat(data.records || []);
    if (data.offset) {
      offset = data.offset;
      document.getElementById('loaderTxt').textContent = `Loading production queue… (${allRecords.length})`;
    } else {
      break;
    }
  }

  return allRecords;
}

async function saveSchedule(recId, pressId, startISO, runSeconds) {
  const url = `https://api.airtable.com/v0/${BASE_ID}/${TBL_IMP}/${recId}`;
  const fields = {};
  // press is a singleSelect — send the name string
  if (pressId !== undefined) fields[F.press] = pressId || null;
  if (startISO !== undefined) fields[F.startTime] = startISO || null;
  if (runSeconds !== undefined && runSeconds !== null) fields[F.runSecs] = runSeconds;

  // Don't send empty patch
  if (Object.keys(fields).length === 0) return true;

  const res = await fetch(url, {
    method: 'PATCH',
    headers: {
      'Authorization': `Bearer ${window.AIRTABLE_KEY || ''}`,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ fields })
  });
  if (!res.ok) {
    const err = await res.text();
    console.warn(`Save failed for ${recId}: ${res.status}`, err);
  }
  return res.ok;
}

// ═══════════════════════════════════════════════════════════
// SCHEDULING LOGIC
// ═══════════════════════════════════════════════════════════

// Get all scheduled jobs for a press on a date, sorted by start
function getPressDay(pressId, ds) {
  return allJobs
    .filter(j => {
      const s = scheduled[j.id];
      return s && s.pressId === pressId && s.dateStr === ds;
    })
    .sort((a,b) => (scheduled[a.id].startMin||0) - (scheduled[b.id].startMin||0));
}

// Total scheduled minutes for a press on a date (including penalties)
function pressLoad(pressId, ds) {
  return getPressDay(pressId, ds).reduce((sum, j) => {
    const s = scheduled[j.id];
    return sum + (s.runMin||0) + (s.penaltyMin||0);
  }, 0);
}

// Next available start minute (from 7am = 0) for a press on a date
function nextStartMin(pressId, ds, excludeId) {
  const jobs = getPressDay(pressId, ds).filter(j => j.id !== excludeId);
  if (!jobs.length) return 0;
  const last = jobs[jobs.length - 1];
  const s = scheduled[last.id];
  return (s.startMin||0) + (s.runMin||0) + (s.penaltyMin||0);
}

// Pallet type of the last job on a press/day (for transition cost)
function lastPalletType(pressId, ds, excludeId) {
  const jobs = getPressDay(pressId, ds).filter(j => j.id !== excludeId);
  if (!jobs.length) return null;
  return scheduled[jobs[jobs.length-1].id]?.palletType || 'tee';
}

// Schedule a job on a press/date — returns { startMin, runMin, penaltyMin, palletType }
function computeSlot(job, pressId, ds, excludeId) {
  const pallet   = getPalletType(job.location);
  const prevPal  = lastPalletType(pressId, ds, excludeId);
  const changeCost = palletChangeCost(prevPal, pallet);
  const within   = withinRunPenalty(job);
  const runMin   = estimateRunMin(job, pressId) + within;
  const penalty  = changeCost;
  const startMin = nextStartMin(pressId, ds, excludeId) + penalty;
  return { startMin, runMin, penaltyMin: penalty, palletType: pallet };
}

// Convert startMin (minutes from 7am MT) to UTC ISO string for a date
function startMinToISO(ds, startMin) {
  const base = shopOpen(ds); // 7am MT = 13:00 UTC
  base.setMinutes(base.getMinutes() + startMin);
  return base.toISOString();
}

// Find best press for a job on a given date
function findBestPress(job, ds) {
  const forced = autoAssignPress(job);
  const candidates = forced
    ? PRESSES.filter(p => p.id === forced)
    : PRESSES.filter(p => p.id.includes('Press 1') || p.id.includes('Press 2'));

  let best = null, bestLoad = Infinity;
  for (const p of candidates) {
    const slot  = computeSlot(job, p.id, ds, null);
    const load  = pressLoad(p.id, ds) + slot.runMin + slot.penaltyMin;
    const press = PRESSES.find(x => x.id === p.id);
    if (load <= press.cap && load < bestLoad) {
      bestLoad = load;
      best = { press: p, slot };
    }
  }
  // If nothing fits capacity, find least overloaded
  if (!best) {
    for (const p of candidates) {
      const slot = computeSlot(job, p.id, ds, null);
      const load = pressLoad(p.id, ds) + slot.runMin + slot.penaltyMin;
      if (load < bestLoad) {
        bestLoad = load;
        best = { press: p, slot };
      }
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════════════
// AUTO-SCHEDULE
// ═══════════════════════════════════════════════════════════
async function autoSchedule() {
  const btn = document.getElementById('autoBtn');
  btn.disabled = true;
  btn.textContent = '…Scheduling';

  const unscheduled = allJobs.filter(j => !scheduled[j.id]);
  if (!unscheduled.length) { btn.disabled = false; btn.textContent = '⚡ Auto-Schedule All'; return; }

  // Sort: rush first, then ASAP, then by due date
  const sorted = [...unscheduled].sort((a,b) => {
    const priA = a.priority?.toLowerCase() || '';
    const priB = b.priority?.toLowerCase() || '';
    if (priA.includes('hard') && !priB.includes('hard')) return -1;
    if (!priA.includes('hard') && priB.includes('hard')) return 1;
    if (priA.includes('asap') && !priB.includes('asap')) return -1;
    if (!priA.includes('asap') && priB.includes('asap')) return 1;
    return (a.dueDate||'9999') < (b.dueDate||'9999') ? -1 : 1;
  });

  const dates = weekDates().map(dateStr);

  for (const job of sorted) {
    // Try to group with same pallet type jobs — find a day that has matching pallet
    let placed = false;
    for (const ds of dates) {
      // Prefer days that already have same pallet type (garment stacking)
      const pallet = getPalletType(job.location);
      const forced = autoAssignPress(job);
      const candidates = forced
        ? PRESSES.filter(p => p.id === forced)
        : PRESSES.filter(p => p.id.includes('Press'));

      for (const p of candidates) {
        const existingJobs = getPressDay(p.id, ds);
        const hasSamePallet = existingJobs.some(j => (scheduled[j.id]?.palletType||'tee') === pallet);
        const slot  = computeSlot(job, p.id, ds, null);
        const load  = pressLoad(p.id, ds) + slot.runMin + slot.penaltyMin;
        const press = PRESSES.find(x => x.id === p.id);

        if (load <= press.cap && (hasSamePallet || existingJobs.length === 0)) {
          scheduled[job.id] = { pressId: p.id, dateStr: ds, ...slot };
          placed = true; break;
        }
      }
      if (placed) break;
    }
    // If not placed with matching pallet, just find first fit
    if (!placed) {
      for (const ds of dates) {
        const result = findBestPress(job, ds);
        if (result) {
          scheduled[job.id] = { pressId: result.press.id, dateStr: ds, ...result.slot };
          placed = true; break;
        }
      }
    }
  }

  // Recompute all start times sequentially per press per day
  recomputeAllStartTimes();

  // Save to Airtable in batches
  await batchSave();

  btn.disabled = false;
  btn.textContent = '⚡ Auto-Schedule All';
  render();
}

function recomputeAllStartTimes() {
  for (const press of PRESSES) {
    for (const ds of weekDates().map(dateStr)) {
      const jobs = getPressDay(press.id, ds);
      let cursor = 0;
      let prevPallet = null;
      for (const job of jobs) {
        const pallet  = getPalletType(job.location);
        const change  = palletChangeCost(prevPallet, pallet);
        const within  = withinRunPenalty(job);
        const runMin  = estimateRunMin(job, press.id) + within;
        const startMin = cursor + change;
        scheduled[job.id] = {
          ...scheduled[job.id],
          startMin, runMin, penaltyMin: change, palletType: pallet
        };
        cursor = startMin + runMin;
        prevPallet = pallet;
      }
    }
  }
}

async function batchSave() {
  const entries = Object.entries(scheduled);
  for (const [recId, slot] of entries) {
    const startISO = startMinToISO(slot.dateStr, slot.startMin);
    const runSecs  = (slot.runMin - withinRunPenalty(allJobs.find(j=>j.id===recId))) * 60;
    try {
      await saveSchedule(recId, slot.pressId, startISO, Math.max(runSecs, 900));
    } catch(e) { console.warn('Save failed for', recId, e); }
  }
  showSaved();
}

function showSaved() {
  const el = document.getElementById('statSaved');
  el.textContent = `✓ Saved ${new Date().toLocaleTimeString()}`;
  setTimeout(() => el.textContent = '', 4000);
}

// ═══════════════════════════════════════════════════════════
// AI SUGGESTION (via Claude API)
// ═══════════════════════════════════════════════════════════
async function suggestForJob(job) {
  const unscheduledJobs = allJobs.filter(j => !scheduled[j.id] && j.id !== job.id);
  const schedCtx = weekDates().map(d => {
    const ds = dateStr(d);
    return PRESSES.map(p => {
      const load = pressLoad(p.id, ds);

      return `${p.label} ${d.toLocaleDateString('en',{weekday:'short'})} ${pct}% full (${load}/${p.cap}min)`;
    }).join(', ');
  }).join('\n');

  const prompt = `You are a production scheduler for Pine Central, a screen printing shop.

Current schedule load (this week):

Job to schedule:

- Print location: ${job.location}

- Due: ${job.dueDate || 'Unknown'}
- Estimated run: ${estimateRunMin(job, autoAssignPress(job) || 'Press 1 - ROQ NEXT')}min

Respond in JSON only:
{
  "press": "<exact press id>",

  "reason": "<1-2 sentence explanation>",
  "warning": "<any conflict or concern, or null>"
}

Available dates: ${weekDates().map(d=>dateStr(d)).join(', ')}
Available presses: ${PRESSES.map(p=>p.id).join(', ')}`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 400,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  const data = await res.json();
  const text = data.content?.[0]?.text || '{}';
  const clean = text.replace(/```json|```/g,'').trim();
  return JSON.parse(clean);
}

function renderHeader() {
  const dates = weekDates();
  const fmt = d => d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('weekLabel').textContent =
    `${fmt(dates[0])} – ${fmt(dates[4])} ${dates[0].getFullYear()}`;

  const hdr = document.getElementById('calHeader');
  hdr.innerHTML = `<div class="cal-hdr-press">Press</div>`;
  const today = dateStr(new Date());
  dates.forEach(d => {
    const ds   = dateStr(d);
    const isT  = ds === today;
    const dayN = d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
    const dayD = d.getDate();

    // compute avg load across presses for capacity bar
    const loads = PRESSES.map(p => ({ load: pressLoad(p.id, ds), cap: p.cap, warn: p.warn }));
    const maxPct = Math.max(...loads.map(l => l.load / l.cap));
    const barColor = maxPct >= 1 ? '#ff3b3b' : maxPct >= .85 ? '#ff8800' : '#c6f135';

    hdr.innerHTML += `
      <div class="cal-hdr-day ${isT?'today':''}">
        <div class="day-name">${dayN}</div>
        <div class="day-num">${dayD}</div>
        <div class="cap-track">
          <div class="cap-fill" style="width:${Math.min(maxPct*100,100)}%;background:${barColor}"></div>
        </div>
      </div>`;
  });
}

function renderSidebar() {
  const unscheduled = allJobs.filter(j => !scheduled[j.id]);
  document.getElementById('sbCount').textContent = unscheduled.length;

  const body = document.getElementById('sbBody');
  if (!unscheduled.length) {
    body.innerHTML = `<div class="sb-empty"><div class="sb-empty-icon">✅</div>All jobs scheduled!</div>`;
    return;
  }

  // Sort: rush > asap > due date
  unscheduled.sort((a,b) => {
    const pa = (a.priority||'').toLowerCase(), pb = (b.priority||'').toLowerCase();
    if (pa.includes('hard') && !pb.includes('hard')) return -1;
    if (!pa.includes('hard') && pb.includes('hard')) return 1;
    if (pa.includes('asap') && !pb.includes('asap')) return -1;
    if (!pa.includes('asap') && pb.includes('asap')) return 1;
    return (a.dueDate||'9999') < (b.dueDate||'9999') ? -1 : 1;
  });

  body.innerHTML = unscheduled.map(j => {
    const isRush = (j.priority||'').toLowerCase().includes('hard');
    const isAsap = (j.priority||'').toLowerCase().includes('asap');
    const today  = dateStr(new Date());
    const isLate = j.dueDate && j.dueDate < today;
    const est    = estimateRunMin(j, autoAssignPress(j) || 'Press 1 - ROQ NEXT');
    const pallet = getPalletType(j.location);
    const palletLabel = { tee:'👕 Tee', sleeve:'💪 Sleeve', hoodie:'🧥 Hoodie', bandana:'🎀 Bandana' }[pallet] || pallet;

    return `
    <div class="ucard ${isRush?'rush':isAsap?'asap':''}"
         draggable="true"
         data-id="${j.id}"
         data-source="sidebar">
      <div class="uc-top">
        <div class="uc-client">${j.client || '—'}</div>
        ${isRush ? '<span class="uc-badge badge-rush">Rush</span>' : isAsap ? '<span class="uc-badge badge-asap">ASAP</span>' : ''}
      </div>
      <div class="uc-design">${j.name || ''}</div>
      <div class="uc-chips">
        ${j.screens ? `<span class="chip chip-sc">${j.screens}sc</span>` : ''}
        <span class="chip chip-qty">${j.qty||0}pcs</span>
        <span class="chip chip-due ${isLate?'late':''}">${j.dueDate ? fmtDate(j.dueDate) : 'No due'}</span>
        <span class="chip chip-est">${est}m</span>
        <span class="chip chip-pallet">${palletLabel}</span>
      </div>
    </div>`;
  }).join('');

  // Drag events for sidebar cards
  body.querySelectorAll('.ucard').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragJobId  = el.dataset.id;
      dragSource = 'sidebar';
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });

  // Drop back to sidebar (unschedule)
  body.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
  body.addEventListener('drop', e => {
    e.preventDefault();
    if (dragJobId && dragSource === 'calendar') {
      delete scheduled[dragJobId];
      recomputeAllStartTimes();
      render();
      saveDroppedUnschedule(dragJobId);
    }
  });
}

async function saveDroppedUnschedule(recId) {

  await saveSchedule(recId, null, null, null);
}

function renderCalendar() {
  const dates = weekDates();
  const body  = document.getElementById('calBody');

  body.innerHTML = PRESSES.map(press => {
    const cells = dates.map(d => {
      const ds    = dateStr(d);
      const jobs  = getPressDay(press.id, ds);
      const load  = pressLoad(press.id, ds);
      const pct   = Math.min(load / press.cap, 1);
      const isWarn = load >= press.warn;
      const isCap  = load >= press.cap;
      const barColor = isCap ? '#ff3b3b' : isWarn ? '#ff8800' : press.color;

      let prevPallet = null;
      const blocks = jobs.map((job, i) => {
        const s        = scheduled[job.id];
        const pallet   = s.palletType || 'tee';
        const change   = i > 0 && prevPallet && prevPallet !== pallet;
        const changeMin = palletChangeCost(prevPallet, pallet);
        prevPallet = pallet;

        const isRush = (job.priority||'').toLowerCase().includes('hard');
        const bg  = isRush ? '#2a1010' : hexWithAlpha(press.color, 0.15);
        const border = isRush ? 'rgba(255,59,59,.4)' : hexWithAlpha(press.color, 0.3);
        const textColor = press.color;

        const startLabel = minToTime(s.startMin);
        const endLabel   = minToTime(s.startMin + s.runMin);

        return `
          ${change ? `<div class="pallet-divider" data-label="↕ pallet +${changeMin}m"></div>` : ''}
          <div class="sblock"
               draggable="true"
               data-id="${job.id}"
               data-source="calendar"
               style="background:${bg};border:1px solid ${border};color:${textColor}">
            <div class="sb-client">${job.client||'—'}</div>
            <div class="sb-meta">${job.qty}pcs${job.screens?` · ${job.screens}sc`:''} · ${s.runMin}m</div>
            <div class="sb-time">${startLabel} → ${endLabel}</div>
            ${s.penaltyMin > 0 ? `<div class="sb-pallet-warn">+${s.penaltyMin}m change</div>` : ''}
            <button class="sblock-rm" data-id="${job.id}" title="Unschedule">×</button>
          </div>`;
      }).join('');

      return `
        <div class="day-cell ${isCap?'over-cap':isWarn?'over-warn':''}"
             data-press="${press.id}" data-date="${ds}">
          ${blocks}
          <div class="cell-cap-bar">
            <div class="cell-cap-fill" style="width:${pct*100}%;background:${barColor}"></div>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="press-row">
        <div class="press-label">
          <div class="pl-dot" style="background:${press.color}"></div>
          <div class="pl-name">${press.label}</div>
          <div class="pl-machine">${press.machine}</div>
          <div class="pl-cap">${press.cap}m cap</div>
        </div>
        ${cells}
      </div>`;
  }).join('');

  // Calendar drag events
  body.querySelectorAll('.sblock').forEach(el => {
    el.addEventListener('dragstart', e => {
      dragJobId  = el.dataset.id;
      dragSource = 'calendar';
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });

  body.querySelectorAll('.sblock-rm').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      delete scheduled[id];
      recomputeAllStartTimes();
      render();
      saveDroppedUnschedule(id);
    });
  });

  body.querySelectorAll('.day-cell').forEach(cell => {
    cell.addEventListener('dragover', e => {
      e.preventDefault();
      cell.classList.add('drop-over');
      e.dataTransfer.dropEffect = 'move';
    });
    cell.addEventListener('dragleave', () => cell.classList.remove('drop-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drop-over');
      if (!dragJobId) return;

      const pressId = cell.dataset.press;
      const ds      = cell.dataset.date;
      const job     = allJobs.find(j => j.id === dragJobId);
      if (!job) return;

      // Check screen count rule
      const sc = job.screens || 1;
      if (pressId === 'Press 2 - ROQ YOU' && sc >= 5) {
        showAIConflict(job, pressId, ds, `Press 2 can't handle ${sc} screens (max 4). Suggesting Press 1 instead.`);
        return;
      }

      // Place job
      const slot = computeSlot(job, pressId, ds, dragJobId);
      scheduled[dragJobId] = { pressId, dateStr: ds, ...slot };
      recomputeAllStartTimes();
      render();

      // Save to Airtable
      const s = scheduled[dragJobId];
      const startISO = startMinToISO(ds, s.startMin);
      const runSecs  = (estimateRunMin(job, pressId)) * 60;
      saveSchedule(dragJobId, pressId, startISO, runSecs).then(ok => {
        if (ok) showSaved();
      });

      // Trigger AI re-suggestion if load is high
      const load = pressLoad(pressId, ds);
      const press = PRESSES.find(p => p.id === pressId);
      if (load >= press.warn) {
        triggerAISuggestion(job, pressId, ds, load, press.cap);
      }

      dragJobId  = null;
      dragSource = null;
    });
  });
}

function showAIConflict(job, pressId, ds, message) {

    `<span class="hi">${job.client}</span> — ${job.screens} screens, ${job.qty}pcs\n` +

async function triggerAISuggestion(job, pressId, ds, load, cap) {
  document.getElementById('aiBody').textContent = 'Analyzing schedule impact…';
  document.getElementById('aiDetail').textContent = '—';
  document.getElementById('aiPanel').classList.add('show');

  try {
    const suggestion = await suggestForJob(job);
    document.getElementById('aiBody').textContent = suggestion.reason || 'Schedule looks tight.';
    document.getElementById('aiDetail').innerHTML =
      `Press: <span class="hi">${suggestion.press}</span>\n` +
      `Date: <span class="hi">${fmtDate(suggestion.date)}</span>` +
      (suggestion.warning ? `\n<span class="warn">⚠ ${suggestion.warning}</span>` : '');
    pendingSuggestion = { job, pressId: suggestion.press, ds: suggestion.date };
  } catch(e) {
    document.getElementById('aiBody').textContent = `Load at ${Math.round(load/cap*100)}% capacity. Consider moving a job to another day.`;
    document.getElementById('aiDetail').innerHTML = `<span class="warn">Could not reach AI service</span>`;
    pendingSuggestion = null;
  }
}

document.getElementById('aiSkip').addEventListener('click', () => {

document.getElementById('aiAccept').addEventListener('click', () => {
  if (!pendingSuggestion) return;
  const { job, pressId, ds } = pendingSuggestion;
  // Remove from current position if scheduled

  const slot = computeSlot(job, pressId, ds, null);

// HELPERS
// ═══════════════════════════════════════════════════════════
function fmtDate(ds) {
  if (!ds) return '—';
  const [y,m,d] = ds.split('-');
  return `${parseInt(m)}/${parseInt(d)}`;
}

function minToTime(min) {
  const total = 7 * 60 + (min || 0); // 7am base
  const h = Math.floor(total / 60) % 24;
  const m = total % 60;
  const ampm = h >= 12 ? 'pm' : 'am';
  const h12  = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${h12}:${String(m).padStart(2,'0')}${ampm}`;
}

function hexWithAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function parseLookup(val) {
  if (val === null || val === undefined) return null;
  if (typeof val === 'string') return val;
  if (typeof val === 'number') return val;
  // Airtable lookup: { linkedRecordIds: [...], valuesByLinkedRecordId: { recXXX: [value] } }
  if (val && val.valuesByLinkedRecordId) {
    const allVals = Object.values(val.valuesByLinkedRecordId).flat();
    const first = allVals[0];
    if (first === null || first === undefined) return null;
    if (typeof first === 'object' && first.name) return first.name; // singleSelect inside lookup
    if (typeof first === 'string') return first;
    if (typeof first === 'number') return String(first);
    return null;
  }
  if (Array.isArray(val)) {
    const first = val[0];
    if (!first) return null;
    if (typeof first === 'object' && first.name) return first.name;
    return first;
  }
  if (typeof val === 'object' && val.name) return val.name; // singleSelect
  return null;
}

// INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  document.getElementById('loader').style.display = 'flex';
  document.getElementById('loaderTxt').textContent = 'Loading production queue…';

  try {
    // Check for Airtable key
    if (!window.AIRTABLE_KEY) {
      const key = prompt('Enter Airtable Personal Access Token:');
      if (key) window.AIRTABLE_KEY = key;
      else throw new Error('No API key provided');
    }

    const records = await fetchRFOJobs();

    // Parse records — already filtered to Received & Staged / Scheduled,Screened at API level
    allJobs = records
      .filter(r => {
        // API already filtered, but double-check in JS
        const f = r.cellValuesByFieldId || {};
        const statusVal = f[F.status];
        if (!statusVal) return false;
        // Handle lookup structure: { valuesByLinkedRecordId: { recXXX: ['Status Name'] } }
        let statusStr = '';
        if (statusVal.valuesByLinkedRecordId) {
          const vals = Object.values(statusVal.valuesByLinkedRecordId).flat();
          statusStr = (vals[0] || '').toString();
        } else if (typeof statusVal === 'string') {
          statusStr = statusVal;
        }
        return statusStr.includes('Ready to Order') ||
               statusStr.includes('Ordered - In Production') ||
               statusStr.includes('Scheduled, Screened') ||
               statusStr.includes('Received & Staged') ||
               statusStr.includes('Pre-press') ||
               statusStr.includes('On-Press');
      })
      .map(r => {
        const f = r.cellValuesByFieldId || {};
        const pressVal = f[F.press];
        const pressName = pressVal?.name || null;
        const priorityName = parseLookup(f[F.priority]) || ''; // parseLookup handles select objects

        // Due date is a lookup datetime — extract date part
        const dueDateRaw = parseLookup(f[F.dueDate]);
        const dueDate = dueDateRaw ? String(dueDateRaw).slice(0,10) : null;

        return {
          id:       r.id,
          name:     f[F.name] || '',
          screens:  typeof f[F.screens] === 'number' ? f[F.screens] : 0,
          qty:      typeof f[F.qty] === 'number' ? f[F.qty] : 0,
          client:   f[F.client] || '',
          garment:  f[F.garment] || '',
          location: f[F.location]?.name || '',
          inkType:  f[F.inkType]?.name || '',
          dueDate,
          priority: priorityName || '',
          // If already has a scheduled press/start, preload into scheduled
          scheduledPress: pressName,
          scheduledStart: f[F.startTime] || null,
          scheduledSecs:  typeof f[F.runSecs] === 'number' ? f[F.runSecs] : null,
        };
      });

    // Preload already-scheduled jobs
    scheduled = {};
    for (const job of allJobs) {
      if (job.scheduledPress && job.scheduledStart) {
        const startDt = new Date(job.scheduledStart);
        const ds      = dateStr(startDt);
        const shopOpenDt = shopOpen(ds);
        const startMin   = Math.round((startDt - shopOpenDt) / 60000);
        const runMin     = job.scheduledSecs ? Math.round(job.scheduledSecs / 60) : estimateRunMin(job, job.scheduledPress);
        const pallet     = getPalletType(job.location);
        scheduled[job.id] = {
          pressId: job.scheduledPress,
          dateStr: ds,
          startMin: Math.max(startMin, 0),
          runMin,
          penaltyMin: 0,
          palletType: pallet,
        };
      }
    }

    document.getElementById('loader').style.display = 'none';
    render();

  } catch(e) {
    document.getElementById('loaderTxt').textContent = `Error: ${e.message}`;
    console.error(e);
  }
}

  // Sidebar — unscheduled jobs that could go on this press
  const unscheduled = allJobs.filter(j => {
    if (scheduled[j.id]) return false;
    // Show jobs that are compatible with this press
    const forced = autoAssignPress(j);
    if (forced && forced !== press.id) return false;
    return true;
  });

  const sb = document.getElementById('pfoSbList');
  if (!unscheduled.length) {
    sb.innerHTML = `<div class="sb-empty"><div class="sb-empty-icon">✅</div>All compatible jobs scheduled</div>`;
  } else {
    sb.innerHTML = unscheduled.map(j => {
      const isRush = (j.priority||'').toLowerCase().includes('hard');
      const isAsap = (j.priority||'').toLowerCase().includes('asap');
      const est = estimateRunMin(j, press.id);
      const palletLabel = { tee:'👕', sleeve:'💪', hoodie:'🧥', bandana:'🎀' }[getPalletType(j.location)] || '';
      return `<div class="ucard ${isRush?'rush':isAsap?'asap':''}"
                   draggable="true" data-id="${j.id}" data-source="focus-sidebar">
        <div class="uc-top">
          <div class="uc-client">${j.client||'—'} ${palletLabel}</div>
          ${isRush?'<span class="uc-badge badge-rush">Rush</span>':isAsap?'<span class="uc-badge badge-asap">ASAP</span>':''}
        </div>
        <div class="uc-design">${j.name||''}</div>
        <div class="uc-chips">
          ${j.screens?`<span class="chip chip-sc">${j.screens}sc</span>`:''}
          <span class="chip chip-qty">${j.qty}pcs</span>
          <span class="chip chip-est">${est}m est</span>
        </div>
      </div>`;
    }).join('');
  }

  // Drag events for focus sidebar cards
  sb.querySelectorAll('.ucard').forEach(el => {
    el.addEventListener('dragstart', e => {
      focusDragId = el.dataset.id;
      focusDragSource = 'focus-sidebar';
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });

  // Drag events for focus calendar blocks
  body.querySelectorAll('.pfo-sblock').forEach(el => {
    el.addEventListener('dragstart', e => {
      focusDragId = el.dataset.id;
      focusDragSource = 'focus-cal';
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
  });

  // Remove buttons
  body.querySelectorAll('.pfo-sblock-rm').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      delete scheduled[btn.dataset.id];
      recomputeAllStartTimes();
      renderFocusView();
      saveDroppedUnschedule(btn.dataset.id);
    });
  });

  // Drop zones for focus calendar
  body.querySelectorAll('.pfo-day-col').forEach(cell => {
    cell.addEventListener('dragover', e => { e.preventDefault(); cell.classList.add('drop-over'); });
    cell.addEventListener('dragleave', () => cell.classList.remove('drop-over'));
    cell.addEventListener('drop', e => {
      e.preventDefault();
      cell.classList.remove('drop-over');
      const id = focusDragId;
      if (!id) return;
      const ds = cell.dataset.date;
      const job = allJobs.find(j => j.id === id);
      if (!job) return;
      // Screen count guard
      if (press.id === 'Press 2 - ROQ YOU' && (job.screens||1) >= 5) {
        alert(`Press 2 max 4 screens — this job needs ${job.screens} screens. Use Press 1.`);
        return;
      }
      const slot = computeSlot(job, press.id, ds, id);
      scheduled[id] = { pressId: press.id, dateStr: ds, ...slot };
      recomputeAllStartTimes();
      renderFocusView();
      const s = scheduled[id];
      saveSchedule(id, press.id, startMinToISO(ds, s.startMin), estimateRunMin(job, press.id) * 60).then(() => showSaved());
      focusDragId = null; focusDragSource = null;
    });
  });

  // Drop back to focus sidebar = unschedule
  sb.addEventListener('dragover', e => { e.preventDefault(); });
  sb.addEventListener('drop', e => {
    e.preventDefault();
    if (focusDragId && focusDragSource === 'focus-cal') {
      delete scheduled[focusDragId];
      recomputeAllStartTimes();
      renderFocusView();
      saveDroppedUnschedule(focusDragId);
      focusDragId = null; focusDragSource = null;
    }
  });
}

// Add "Expand" button to each press label when rendering calendar
const _origRenderCalendar = renderCalendar;
// (focus view is triggered by press-toggle-btn clicks set up in renderCalendar)

</script>

  <div class="pfo-header">
    <div class="pfo-dot" id="pfoDot"></div>
    <div>
      <div class="pfo-title" id="pfoTitle">—</div>
      <div class="pfo-machine" id="pfoMachine">—</div>
    </div>
    <div class="pfo-cap" id="pfoCap"></div>
    <div class="pfo-spacer"></div>
    <button class="pfo-close" id="pfoClose">×</button>
  </div>
  <div class="pfo-body">
    <div class="pfo-sidebar">
      <div class="pfo-sb-hdr">Unscheduled for this press</div>
      <div class="pfo-sb-list" id="pfoSbList"></div>
    </div>
    <div class="pfo-cal">
      <div class="pfo-cal-hdr" id="pfoCalHdr"></div>
      <div class="pfo-cap-row" id="pfoCapRow"></div>
      <div class="pfo-cal-body" id="pfoCalBody"></div>
    </div>
  </div>
</div>
