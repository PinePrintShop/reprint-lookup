<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator View · Pine Central</title>
<link rel="icon" type="image/svg+xml" href="pine-favicon-black.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2ef;--border:#e8e8e4;--border2:#d0cec7;
  --text:#111110;--text2:#6b6860;--text3:#b0ada6;
  --pine:#2d6a4f;--pine-light:#edf7f2;--pine-mid:#9fd4b8;--pine-dark:#1e4d38;
  --amber:#8a5200;--amber-light:#fff8ee;--amber-mid:#ffd58a;
  --red:#a32d2d;--red-light:#fff0f0;
  --blue:#1a5fa8;--blue-light:#eff6ff;
  --font-mono:'DM Mono',monospace;--font-ui:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{width:26px;height:26px;background:var(--pine);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0;}
.topbar-title{font-size:13px;font-weight:600;color:var(--text);}
.topbar-sep{width:1px;height:16px;background:var(--border2);}
.topbar-machine{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--pine-light);color:var(--pine-dark);border:1px solid var(--pine-mid);font-family:var(--font-mono);}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.crew-pills{display:flex;gap:4px;}
.cpill{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.cpill.ops{background:var(--pine-light);color:var(--pine-dark);border-color:var(--pine-mid);}
.cpill.qc{background:var(--blue-light);color:var(--blue);border-color:#b5d4f4;}
.topbar-clock{font-size:11px;font-family:var(--font-mono);color:var(--text2);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--pine);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-back{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-family:var(--font-ui);}
.btn-pat{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;font-family:var(--font-ui);}

/* VIEWS */
.view{display:none;}.view.active{display:block;}
.hidden{display:none!important;}

/* MACHINE SELECT */
.select-wrap{padding:20px 16px;max-width:640px;margin:0 auto;}
.select-heading{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px;font-family:var(--font-mono);}
.machine-list{display:flex;flex-direction:column;gap:8px;}
.msb{display:flex;align-items:center;gap:14px;padding:16px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color 0.15s;text-align:left;width:100%;font-family:var(--font-ui);}
.msb:hover{border-color:var(--pine);background:var(--pine-light);}
.msb-icon{width:40px;height:40px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:var(--font-mono);flex-shrink:0;}
.ip1{background:#e8f5ee;color:#1e4d38;}.ip2{background:#e2f4ec;color:#085041;}
.iht{background:#fff0eb;color:#712b13;}.iem{background:#f0effe;color:#3c3489;}.ifs{background:#eaf4ff;color:#0c447c;}
.msb-info{flex:1;}
.msb-name{font-size:14px;font-weight:600;color:var(--text);}
.msb-sub{font-size:11px;color:var(--text2);margin-top:1px;font-family:var(--font-mono);}
.msb-right{display:flex;align-items:center;gap:8px;}
.msb-jobs{font-size:11px;color:var(--pine);font-family:var(--font-mono);}
.status-dot{width:8px;height:8px;border-radius:50%;}
.sd-idle{background:var(--border2);}.sd-running{background:var(--pine);}.sd-stopped{background:var(--amber-mid);}
.msb-arrow{font-size:18px;color:var(--text3);}

/* CREW CHECKIN */
.checkin-wrap{padding:20px 16px;max-width:520px;margin:0 auto;display:flex;flex-direction:column;gap:18px;}
.checkin-heading{font-size:18px;font-weight:600;}
.checkin-sub{font-size:13px;color:var(--text2);margin-top:-10px;}
.crew-section{display:flex;flex-direction:column;gap:8px;}
.crew-role-label{font-size:10px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;}
.crew-chips{display:flex;gap:6px;flex-wrap:wrap;}
.crew-chip{font-size:12px;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);color:var(--text2);cursor:pointer;transition:all 0.15s;}
.crew-chip.sel-ops{background:var(--pine);color:#fff;border-color:var(--pine);}
.crew-chip.sel-qc{background:var(--blue);color:#fff;border-color:var(--blue);}
.crew-chip:hover:not(.sel-ops):not(.sel-qc){border-color:var(--text2);color:var(--text);}
.btn-checkin{padding:14px;border-radius:8px;border:none;background:var(--pine);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-ui);}

/* JOB LIST */
.jl-wrap{padding:14px 16px;max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.jl-heading{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--font-mono);margin-bottom:2px;}
.job-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color 0.15s;display:flex;align-items:center;gap:12px;padding:14px 16px;}
.job-row:hover{border-color:var(--pine);}
.job-row.running{border-color:var(--pine);border-width:2px;}
.jr-thumb{width:52px;height:52px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.jr-thumb img{width:100%;height:100%;object-fit:cover;}
.jr-ph{width:26px;height:20px;border:1.5px solid var(--border2);border-radius:3px;}
.jr-info{flex:1;min-width:0;}
.jr-order{font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:0.06em;margin-bottom:2px;}
.jr-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jr-chips{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.jr-chip{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:var(--font-mono);}
.jr-chip.hi{background:var(--pine-light);color:var(--pine-dark);border-color:var(--pine-mid);}
.jr-chip.warn{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid);}
.jr-due{font-size:10px;color:var(--amber);font-family:var(--font-mono);margin-top:3px;}
.jr-arrow{font-size:20px;color:var(--text3);}
.no-jobs{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px;font-family:var(--font-mono);}

/* PRESS VIEW */
.pv-wrap{padding:14px 16px;max-width:680px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}

/* job card */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.job-card.running{border-color:var(--pine);border-width:2px;}
.job-card.stopped{border-color:var(--amber-mid);border-width:2px;}

/* proof */
.proof-block{background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:20px;min-height:200px;cursor:pointer;position:relative;}
.proof-img{max-width:100%;max-height:260px;border-radius:6px;object-fit:contain;}
.proof-ph{display:flex;flex-direction:column;align-items:center;gap:8px;}
.proof-ph-box{width:80px;height:64px;border:2px solid var(--border2);border-radius:6px;}
.proof-hint{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.proof-tap{position:absolute;bottom:10px;right:10px;font-size:10px;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-family:var(--font-mono);}

.job-info{padding:14px;}
.job-order-line{font-size:10px;color:var(--text3);font-family:var(--font-mono);letter-spacing:0.08em;margin-bottom:4px;}
.job-name{font-size:17px;font-weight:600;line-height:1.3;margin-bottom:6px;}
.due-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--amber);font-family:var(--font-mono);}
.due-dot{width:6px;height:6px;border-radius:50%;background:var(--amber-mid);}

.chips{display:flex;gap:5px;flex-wrap:wrap;padding:10px 14px;border-top:1px solid var(--border);}
.chip{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:var(--font-mono);}
.chip.hi{background:var(--pine-light);color:var(--pine-dark);border-color:var(--pine-mid);}
.chip.warn{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid);}

.note-row{padding:9px 14px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-start;}
.note-tag{font-size:9px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;width:60px;flex-shrink:0;padding-top:2px;}
.note-val{font-size:12px;line-height:1.5;}

.timer-section{padding:16px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.timer-left{display:flex;flex-direction:column;gap:3px;}
.timer-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-mono);}
.timer-since{font-size:10px;color:var(--text3);font-family:var(--font-mono);}
.timer-big{font-size:38px;font-weight:500;font-family:var(--font-mono);line-height:1;letter-spacing:-0.02em;}
.timer-big.idle{color:var(--text3);}
.timer-big.running{color:var(--pine);}
.timer-big.stopped{color:var(--amber);}

.stop-badge{margin:0 14px 10px;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-family:var(--font-mono);padding:5px 10px;border-radius:5px;background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid);}

.ctrl-row{padding:12px 14px;border-top:1px solid var(--border);display:flex;gap:8px;}
.btn-start{flex:1;padding:13px;border-radius:8px;border:none;background:var(--pine);color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-ui);}
.btn-start:hover{background:#245a41;}
.btn-stop{flex:1;padding:13px;border-radius:8px;border:2px solid var(--amber-mid);background:transparent;color:var(--amber);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font-ui);}
.btn-stop:hover{background:var(--amber-light);}

/* section cards */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.section-head{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-mono);}
.section-action{font-size:11px;color:var(--pine);cursor:pointer;font-weight:500;}
.section-preview{font-size:10px;color:var(--text3);font-family:var(--font-mono);}
.print-notes-body{padding:12px 14px;font-size:13px;line-height:1.6;}
.no-heads{padding:20px 14px;text-align:center;font-size:12px;color:var(--text3);font-family:var(--font-mono);}

/* head table */
.heads-table{width:100%;border-collapse:collapse;}
.heads-table th{font-size:9px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;background:var(--surface2);font-weight:400;}
.heads-table td{font-size:11px;padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--font-mono);}
.heads-table tr:last-child td{border-bottom:none;}

/* head form */
.head-form{padding:14px;display:flex;flex-direction:column;gap:10px;}
.hf-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.hf-row:last-of-type{border-bottom:none;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-label{font-size:9px;font-family:var(--font-mono);color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;}
.field-input{font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font-ui);width:100%;}
.field-input:focus{outline:none;border-color:var(--pine);}
.field-select{font-size:13px;padding:8px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font-ui);width:100%;cursor:pointer;}
.field-select:focus{outline:none;border-color:var(--pine);}
.hf-actions{display:flex;gap:8px;}
.btn-save-head{flex:1;padding:11px;border-radius:7px;border:none;background:var(--pine);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-ui);}
.btn-add-head,.btn-cancel{padding:11px 14px;border-radius:7px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font-ui);}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0.92);display:flex;align-items:center;justify-content:center;}
.lightbox img{max-width:92vw;max-height:88vh;border-radius:8px;object-fit:contain;}
.lb-close{position:absolute;top:18px;right:20px;font-size:14px;color:#fff;cursor:pointer;background:rgba(255,255,255,0.12);border:none;border-radius:6px;padding:7px 14px;font-family:var(--font-ui);}

/* stop reason */
.modal-overlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;justify-content:center;}
.reason-sheet{background:var(--surface);border-radius:16px 16px 0 0;padding:24px 20px 32px;width:100%;max-width:520px;display:flex;flex-direction:column;gap:12px;}
.reason-sheet h3{font-size:15px;font-weight:600;}
.reason-sheet p{font-size:12px;color:var(--text2);margin-top:-4px;}
.reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.reason-btn{padding:13px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:13px;font-weight:500;cursor:pointer;}
.reason-btn:hover{border-color:var(--amber-mid);background:var(--amber-light);color:var(--amber);}

/* loading */
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--text3);font-size:12px;font-family:var(--font-mono);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pine);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* error */
#errorPanel{display:none;margin:16px;padding:14px;background:var(--red-light);border:1px solid #ffb3b3;border-radius:10px;font-family:var(--font-mono);font-size:12px;color:#7a1a1a;white-space:pre-wrap;line-height:1.5;}
</style>
</head>
<body>

<div class="topbar" id="topbar">
  <div class="logo">P</div>
  <span class="topbar-title">Operator View</span>
  <div class="topbar-sep hidden" id="tbSep"></div>
  <span class="topbar-machine hidden" id="tbMachine"></span>
  <div class="topbar-right">
    <div class="crew-pills hidden" id="tbCrew"></div>
    <span class="topbar-clock" id="clockDisplay"></span>
    <div class="live-dot"></div>
    <button class="btn-back hidden" id="btnBack" onclick="goBack()">← Back</button>
    <button class="btn-pat" onclick="resetPAT()">⚙ PAT</button>
  </div>
</div>

<div id="errorPanel"></div>

<div class="view active" id="viewLoading">
  <div class="loading-wrap"><div class="spinner"></div>loading...</div>
</div>

<div class="view" id="viewSelect">
  <div class="select-wrap">
    <div class="select-heading">Choose your machine</div>
    <div class="machine-list" id="machineList"></div>
  </div>
</div>

<div class="view" id="viewCheckin">
  <div class="checkin-wrap">
    <div class="checkin-heading" id="checkinHeading">Who's on this press?</div>
    <div class="checkin-sub">Select everyone working this machine today.</div>
    <div id="checkinRoles"></div>
    <button class="btn-checkin" onclick="submitCheckin()">Start on this machine →</button>
  </div>
</div>

<div class="view" id="viewJobs">
  <div class="jl-wrap">
    <div class="jl-heading" id="jlHeading">Today's jobs</div>
    <div id="jlItems"></div>
  </div>
</div>

<div class="view" id="viewPress">
  <div class="pv-wrap" id="pvWrap"></div>
</div>

<div class="lightbox hidden" id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">Close</button>
  <img id="lbImg" src="" alt="Proof">
</div>

<div class="modal-overlay hidden" id="reasonOverlay">
  <div class="reason-sheet">
    <h3>Why are you stopping?</h3>
    <p id="reasonSub"></p>
    <div class="reason-grid" id="reasonGrid"></div>
  </div>
</div>

<script>
const BASE='appJkaLk8DykjsgHR',TI='tbln9oAGvz2PNBZLV',TO='tblQm9hy2WZCx9jnd';
const F={
  imprintId:'fldDFfwFQ9B20n2kT',orderNum:'fldhBqGtBrkI6SqAn',designNick:'fldDYBnwwV6Z4VLBc',
  press:'fldv59OGU7EkBVofo',startTime:'fldfqtIgcEfIlIeQk',runTime:'fldvAqPl6Yq3bxASW',
  qty:'fldFipR4ddfqMPeAX',screens:'fldkQPyY8chFb6EdE',inkType:'fldHjjQ5lzm66ox5j',
  loc:'fldyyFoiKCgGOpsGX',status:'fldNROVFSsBwLUOYW',
  runStarted:'fldmnZof3Dce60JKv',runFinished:'fldFuDZ68QdUMt3pM',
  notes:'fldNuEzGIYI8FWqXu',proofs:'fldUOIfCd22MxevRm',
  due:'fldf57VIkt82rO1iQ',garment:'fldWOGis0z1VaGuEj',
  headData:'fldv2Skz7LGib7UJE',isToday:'fldq1VzzuxVavP7cm',
  opSelect:'fldv4VQ7tshYKREn0',
};
const STOP_REASONS=['Ink change','Screen issue','Registration off','Break','End of run','Other'];
const DUROMETERS=['70','65-90-65','70-90-70'];
const OFF_CONTACTS=['.5','1','2'];
const WRITES_ENABLED=false;

const MACHINES=[
  {id:'p1',name:'ROQ NEXT',sub:'Press 1',ic:'ip1',pressKey:'Press 1 - ROQ NEXT',heads:12,
   crew:[{role:'Press Ops',multi:true},{role:'Quality Control',multi:false}]},
  {id:'p2',name:'ROQ YOU',sub:'Press 2',ic:'ip2',pressKey:'Press 2 - ROQ YOU',heads:7,
   crew:[{role:'Press Ops',multi:true},{role:'Quality Control',multi:false}]},
  {id:'ht',name:'HEAT PRESS',sub:'Heat transfer',ic:'iht',pressKey:'Heat press',heads:null,
   crew:[{role:'Operator',multi:false}]},
  {id:'em',name:'TAJIMA',sub:'Embroidery',ic:'iem',pressKey:'Embroidery - TAJIMA 6-Head',heads:null,
   crew:[{role:'Operator',multi:false}]},
  {id:'fs',name:'FLATSTOCK',sub:'Flatstock press',ic:'ifs',pressKey:'Flatstock - M&R Saturn',heads:null,
   crew:[{role:'Operator',multi:false}]},
];

let pat=null,ops=[],jobs=[],activeMid=null,crew={},mState={},timerId=null,shiftStart=null,pendingStop=null;

// ── INIT ──────────────────────────────────────────────────────────────────
window.onload=async()=>{
  pat=sessionStorage.getItem('pine_pat');
  if(!pat){pat=prompt('Enter Airtable PAT:');if(!pat)return;sessionStorage.setItem('pine_pat',pat);}
  shiftStart=sessionStorage.getItem('pine_shift_start')||new Date().toISOString();
  sessionStorage.setItem('pine_shift_start',shiftStart);
  try{mState=JSON.parse(sessionStorage.getItem('pine_op_state')||'{}');}catch(e){}
  try{crew=JSON.parse(sessionStorage.getItem('pine_op_crew')||'{}');}catch(e){}
  startClock();
  await loadData();
  showView('viewSelect');
  renderMachineList();
};

function resetPAT(){
  sessionStorage.removeItem('pine_pat');
  pat=prompt('Enter Airtable PAT:');
  if(!pat)return;
  sessionStorage.setItem('pine_pat',pat);
  location.reload();
}

// ── API ───────────────────────────────────────────────────────────────────
async function api(path){
  const res=await fetch('https://api.airtable.com/v0/'+BASE+'/'+path,{headers:{'Authorization':'Bearer '+pat}});
  if(!res.ok){
    let m='Airtable '+res.status;
    if(res.status===401||res.status===403)m='Bad PAT ('+res.status+'). Tap ⚙ PAT to re-enter.';
    else try{const j=await res.json();m+=': '+(j.error?j.error.message:JSON.stringify(j).slice(0,80));}catch(e){}
    throw new Error(m);
  }
  return res.json();
}
async function apiPatch(path,fields){
  const res=await fetch('https://api.airtable.com/v0/'+BASE+'/'+path,{
    method:'PATCH',headers:{'Authorization':'Bearer '+pat,'Content-Type':'application/json'},
    body:JSON.stringify({fields})
  });
  if(!res.ok){let m='Save failed '+res.status;try{const j=await res.json();m+=': '+JSON.stringify(j).slice(0,80);}catch(e){}throw new Error(m);}
  return res.json();
}
function q(tbl,flds,formula,sort){
  const p=flds.map(f=>'fields%5B%5D='+f);
  if(formula)p.push('filterByFormula='+encodeURIComponent(formula));
  if(sort){p.push('sort%5B0%5D%5Bfield%5D='+sort);p.push('sort%5B0%5D%5Bdirection%5D=asc');}
  p.push('pageSize=100','returnFieldsByFieldId=true');
  return tbl+'?'+p.join('&');
}

// ── LOAD ──────────────────────────────────────────────────────────────────
async function loadData(){
  try{
    const od=await api(TO+'?fields%5B%5D='+F.opSelect+'&pageSize=50&returnFieldsByFieldId=true');
    ops=od.records.map(r=>{
      const v=r.fields[F.opSelect];
      return{id:r.id,name:typeof v==='string'?v:(v&&v.name)||'?'};
    }).filter(o=>o.name!=='?');

    const flds=[F.imprintId,F.orderNum,F.designNick,F.press,F.startTime,F.runTime,
                F.qty,F.screens,F.inkType,F.loc,F.status,F.runFinished,
                F.notes,F.proofs,F.due,F.garment,F.headData];
    const jd=await api(q(TI,flds,"AND({Equipment}!='',{Is Today (Local)}=1)",F.startTime));
    jobs=jd.records.map(r=>{
      const f=r.fields;
      const pv=f[F.press];const press=typeof pv==='string'?pv:(pv&&pv.name)||'';
      const iv=f[F.inkType];const ink=typeof iv==='string'?iv:(iv&&iv.name)||'';
      const lv=f[F.loc];const loc=typeof lv==='string'?lv:(lv&&lv.name)||'';
      const rawP=f[F.proofs]||[];
      const proofs=Array.isArray(rawP)?rawP.filter(p=>p&&p.url).map(p=>({
        url:p.url,thumb:(p.thumbnails&&p.thumbnails.large)?p.thumbnails.large.url:p.url
      })):[];
      const st=f[F.status]||[];
      const due=Array.isArray(f[F.due])?(f[F.due][0]||''):(f[F.due]||'');
      const garn=Array.isArray(f[F.garment])?f[F.garment].join(' '):(f[F.garment]||'');
      return{
        id:r.id,imprintId:f[F.imprintId]||'--',orderNum:f[F.orderNum]||'--',
        designNick:f[F.designNick]||'',press,startTime:f[F.startTime]||null,
        runTimeSec:f[F.runTime]||0,qty:f[F.qty]||0,screens:f[F.screens]||0,
        ink,loc,status:Array.isArray(st)?st.join(', '):st,
        runFinished:f[F.runFinished]||false,
        notes:f[F.notes]||'',proofs,due,garment:garn,
        headData:f[F.headData]||''
      };
    }).filter(j=>!j.runFinished);
  }catch(e){
    console.error(e);
    const ep=document.getElementById('errorPanel');
    ep.style.display='block';ep.textContent='ERROR: '+e.message;
    document.getElementById('viewLoading').classList.remove('active');
  }
}

function startCheckin(mid){
  activeMid=mid;
  const m=MACHINES.find(x=>x.id===mid);
  document.getElementById('checkinHeading').textContent="Who's on "+m.name+"?";
  const rolesEl=document.getElementById('checkinRoles');
  rolesEl.innerHTML='';
  const cur=crew[mid]||{};
  m.crew.forEach(cd=>{
    const label=cd.multi?(cd.role.endsWith('s')?cd.role:cd.role+'s'):cd.role;
    const sel=cur[cd.role]||(cd.multi?[]:'');
    const selNames=cd.multi?(Array.isArray(sel)?sel:[sel].filter(Boolean)):(sel?[sel]:[]);
    const roleClass=cd.role==='Quality Control'?'qc':'ops';
    const safeRole=cd.role.replace(/\W/g,'_');
    const sec=el_(rolesEl,'div','crew-section');
    el_(sec,'div','crew-role-label').textContent=label;
    const chips=el_(sec,'div','crew-chips');
    chips.id='cc_'+mid+'_'+safeRole;
    ops.forEach(op=>{
      const chip=el_(chips,'div','crew-chip'+(selNames.includes(op.name)?' sel-'+roleClass:''));
      chip.textContent=op.name;
      chip.dataset.multi=cd.multi;
      chip.dataset.role=roleClass;
      chip.onclick=()=>toggleChip(chip,roleClass);
    });
  });
  showView('viewCheckin');
}

function toggleChip(el,roleClass){
  if(el.dataset.multi==='true'){el.classList.toggle('sel-'+roleClass);}
  else{el.parentElement.querySelectorAll('.crew-chip').forEach(c=>{c.className='crew-chip';});el.classList.add('sel-'+roleClass);}
}

function submitCheckin(){
  const m=MACHINES.find(x=>x.id===activeMid);
  const assign={};
  m.crew.forEach(cd=>{
    const safeRole=cd.role.replace(/\W/g,'_');
    const el=document.getElementById('cc_'+activeMid+'_'+safeRole);
    if(!el)return;
    const roleClass=cd.role==='Quality Control'?'qc':'ops';
    const sel=[...el.querySelectorAll('.sel-ops,.sel-qc')].map(c=>c.textContent.trim());
    assign[cd.role]=cd.multi?sel:(sel[0]||'');
  });
  crew[activeMid]=assign;
  sessionStorage.setItem('pine_op_crew',JSON.stringify(crew));
  const m2=MACHINES.find(x=>x.id===activeMid);
  document.getElementById('tbMachine').textContent=m2.name+' · '+m2.sub;
  showView('viewJobs');
  renderJobList();
}

function renderSavedHeads(container,headData){
  container.innerHTML='';
  if(!headData){el_(container,'div','no-heads').textContent='No head settings saved yet.';return;}
  let heads=[];
  try{heads=JSON.parse(headData);}catch(e){}
  if(!heads.length){el_(container,'div','no-heads').textContent='No head settings saved yet.';return;}
  const tbl=el_(container,'table','heads-table');
  const thead=el_(tbl,'thead',null);const tr0=el_(thead,'tr',null);
  ['Head','Color','PSI','Duro','Flash°C','Dwell','Speed','Off Contact'].forEach(h=>el_(tr0,'th',null).textContent=h);
  const tbody=el_(tbl,'tbody',null);
  heads.forEach(h=>{
    const tr=el_(tbody,'tr',null);
    [h.head,h.color,h.psi,h.durometer,h.flashTemp,h.flashDwell,h.speed,h.offContact]
      .forEach(v=>el_(tr,'td',null).textContent=v||'--');
  });
}

function openHeadForm(job){

}

function addHeadRow(){

async function saveHeads(job){
  if(!WRITES_ENABLED){alert('Preview mode — writes disabled. Set WRITES_ENABLED=true to go live.');return;}
  const rows=document.getElementById('headFormRows').children;
  let existing=[];
  try{if(job.headData)existing=JSON.parse(job.headData);}catch(e){}
  for(let i=0;i<rows.length;i++){
    const head=document.getElementById('hf_head_'+i).value;
    if(!head)continue;
    existing.push({
      head:parseInt(head),
      color:(document.getElementById('hf_color_'+i)||{}).value||'',
      psi:(document.getElementById('hf_psi_'+i)||{}).value||null,
      durometer:(document.getElementById('hf_duro_'+i)||{}).value||'',
      flashTemp:(document.getElementById('hf_flash_'+i)||{}).value||null,
      flashDwell:(document.getElementById('hf_dwell_'+i)||{}).value||null,
      speed:(document.getElementById('hf_speed_'+i)||{}).value||null,
      offContact:(document.getElementById('hf_offcontact_'+i)||{}).value||'',
    });
  }
  try{
    await apiPatch(TI+'/'+job.id,{[F.headData]:JSON.stringify(existing)});
    job.headData=JSON.stringify(existing);
    document.getElementById('headForm').classList.add('hidden');
    renderSavedHeads(document.getElementById('savedHeads'),job.headData);
  }catch(e){alert(e.message);}
}

// ── TIMER ─────────────────────────────────────────────────────────────────
function startRun(){
  const job=activeJob();if(!job)return;
  const st=mState[activeMid]||{};
  mState[activeMid]={status:'running',startedAt:Date.now(),stoppedAt:null,stopReason:null,jobId:job.id,elapsed:st.elapsed||0};
  saveState();renderPressView();startTimer();
}

function triggerStop(){
  pendingStop=activeMid;
  document.getElementById('reasonSub').textContent='Stopping '+MACHINES.find(x=>x.id===activeMid).name;
  const grid=document.getElementById('reasonGrid');grid.innerHTML='';
  STOP_REASONS.forEach(r=>{
    const btn=el_(grid,'button','reason-btn');btn.textContent=r;btn.onclick=()=>confirmStop(r);
  });
  document.getElementById('reasonOverlay').classList.remove('hidden');
}

function confirmStop(reason){
  document.getElementById('reasonOverlay').classList.add('hidden');
  const id=pendingStop,st=mState[id]||{};
  const elapsed=(st.elapsed||0)+(Date.now()-(st.startedAt||Date.now()));
  mState[id]={...st,status:'stopped',stoppedAt:Date.now(),stopReason:reason,elapsed,startedAt:null};
  if(timerId){clearInterval(timerId);timerId=null;}
  saveState();renderPressView();
}

function startTimer(){
  if(timerId)clearInterval(timerId);
  timerId=setInterval(updateTimer,1000);updateTimer();
}

function updateTimer(){
  const el=document.getElementById('timerDisplay');if(!el)return;
  const st=mState[activeMid];
  if(!st||st.status==='idle'){el.textContent='0:00:00';return;}
  const total=Math.floor(((st.elapsed||0)+(st.status==='running'?Date.now()-(st.startedAt||Date.now()):0))/1000);
  el.textContent=Math.floor(total/3600)+':'+pad(Math.floor((total%3600)/60))+':'+pad(total%60);
}

}

// ── HELPERS ───────────────────────────────────────────────────────────────
function el_(parent,tag,cls,attrs){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style')el.style.cssText=v;else el.setAttribute(k,v);});
  parent.appendChild(el);return el;
}
function mkchip(parent,text,cls){
  const c=el_(parent,'span','jr-chip'+(cls?' '+cls:''));c.textContent=text;
  // Also works for .chip in press view - reuse jr-chip style via .chip alias
  c.className='chip'+(cls?' '+cls:'');
  return c;
}
function mkField(parent,label,type,id,attrs){
  const g=el_(parent,'div','field-group');
  const lbl=el_(g,'label','field-label');lbl.textContent=label;lbl.htmlFor=id;
  const isSelect=type==='select';
  const inp=el_(g,isSelect?'select':'input',isSelect?'field-select':'field-input');
  inp.id=id;
  if(!isSelect){inp.type=type;if(attrs)Object.entries(attrs).forEach(([k,v])=>inp.setAttribute(k,v));}
  return inp;
}
function fmtDate(d){
  if(!d)return'';
  try{return new Date((d.includes('T')?d:d+'T12:00:00')).toLocaleDateString('en-US',{month:'short',day:'numeric'});}
  catch(e){return d;}
}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Denver'});}
function pad(n){return String(n).padStart(2,'0');}
function saveState(){sessionStorage.setItem('pine_op_state',JSON.stringify(mState));}
