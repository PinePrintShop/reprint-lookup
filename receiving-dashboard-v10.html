<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Dashboard v10 — Pine Central</title>
<style>
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--yellow-dim:#E8E83230;--yellow-border:#E8E83250;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --sb-bg:#0A0A08;--sb-border:#1A1A16;--sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:Helvetica,Arial,sans-serif;
  --mono:Helvetica,Arial,sans-serif;
  --radius:4px;--radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

.tok-modal{display:none;position:fixed;inset:0;z-index:900;background:rgba(0,0,0,.55);align-items:center;justify-content:center}
.tok-modal.open{display:flex}
.tok-box{background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius-lg);padding:20px;width:320px;max-width:90vw}
.tok-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:12px;font-family:var(--cond)}
.tok-inp{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);padding:7px 10px;font-size:12px;font-family:var(--mono);color:var(--text);margin-bottom:10px}
.tok-inp:focus{outline:none;border-color:var(--green)}
.tok-inp::placeholder{color:var(--muted-lt)}
.tok-footer{display:flex;justify-content:flex-end;gap:6px}

.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;gap:6px;scrollbar-width:none;flex-shrink:0}
.stats-bar::-webkit-scrollbar{display:none}
.stat-cell{font-size:10px;font-weight:700;padding:5px 12px;border:1px solid var(--border-dk);border-radius:20px;background:var(--surface);color:var(--muted);white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);display:flex;align-items:center;cursor:pointer;transition:all .1s}
.stat-ct{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:rgba(0,0,0,.06);font-size:9px;padding:0 4px;margin-left:5px;color:var(--muted-lt);font-family:var(--mono)}
.stat-cell.active{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.stat-cell.active .stat-ct{background:rgba(232,232,50,.15);color:var(--yellow)}
.stat-cell.alert-ct .stat-ct{background:rgba(192,57,43,.1);color:var(--red)}

.action-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{flex:1;position:relative;display:flex;align-items:center}
.search-inp{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);padding:6px 28px 6px 10px;font-size:12px;font-family:var(--sans);color:var(--text)}
.search-inp:focus{outline:none;border-color:var(--green)}
.search-inp::placeholder{color:var(--muted-lt)}
.search-clr{position:absolute;right:8px;background:none;border:none;color:var(--muted-lt);cursor:pointer;font-size:14px;display:none;line-height:1}
.search-clr.show{display:block}

.btn{background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);color:var(--muted);font-size:9px;padding:5px 10px;cursor:pointer;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .1s}
.btn:hover{border-color:var(--text);color:var(--text)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn.p{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.btn.p:hover{background:#1A1A16}
.btn.grn{background:var(--green-lt);border-color:#b8dfcc;color:var(--green-dk)}
.btn.grn:hover{background:#d4ede0}
.btn.red{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.btn.red:hover{background:#fce8e8}
.btn.amb{background:var(--amb-bg);border-color:var(--amb-bd);color:var(--amb)}

.tag{font-size:8px;padding:2px 7px;border-radius:2px;white-space:nowrap;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid;font-family:var(--cond)}
.tag.k{background:var(--sb-bg);color:var(--yellow);border-color:var(--yellow-border)}
.tag.n{background:var(--surface);color:var(--muted);border-color:var(--border)}
.tag.r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.tag.amb{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.tag.grn{background:var(--green-lt);color:var(--green-dk);border-color:#b8dfcc}

.list-area{padding:12px 16px;display:flex;flex-direction:column;gap:4px}
.date-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond);padding:14px 0 4px}
.date-hdr.today{color:var(--text)}

.order-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .12s;margin-bottom:4px}
.order-group:hover{border-color:var(--border-dk)}
.order-hd{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;user-select:none}
.order-open .order-hd{border-bottom:1px solid var(--border)}
.onum{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--green);letter-spacing:-.01em;white-space:nowrap;line-height:1}
.ocust{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--cond)}
.ometa{display:flex;gap:4px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.ochev{font-size:10px;color:var(--muted-lt);transition:transform .15s;flex-shrink:0;margin-left:4px}
.order-open .ochev{transform:rotate(180deg)}

.li-wrap{display:none}
.order-open .li-wrap{display:block}
.li{border-top:1px solid var(--border)}
.li-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;cursor:pointer;transition:background .1s}
.li-row:hover{background:#fafafa}
.li-exp .li-row{background:#fafafa;border-bottom:1px solid var(--border)}
.li-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;padding-top:2px}
.li-ref{font-size:9px;color:var(--muted-lt);letter-spacing:.04em;font-family:var(--mono)}
.li-name{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--cond)}
.li-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px}
.li-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}

.li-detail{display:none;padding:14px 12px;background:var(--bg)}
.li-exp .li-detail{display:block}
.detail-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.dm{display:flex;flex-direction:column;gap:2px}
.dl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--cond)}
.dv{font-size:12px;font-family:var(--mono);color:var(--text)}
.dv.red{color:var(--red)}
.dv.amb{color:var(--amb)}
.dv.grn{color:var(--green);font-weight:700}
.dv.lg{font-size:16px;font-weight:700;letter-spacing:.01em}
.dv.lg.red{color:var(--red)}
.dv.lg.amb{color:var(--amb)}
.dv.lg.grn{color:var(--green)}

.size-wrap{overflow-x:auto;margin-bottom:12px}
.size-tbl{width:100%;border-collapse:collapse;font-size:12px}
.size-tbl th{padding:5px 8px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--surface);border:1px solid var(--border);text-align:left;font-family:var(--cond)}
.size-tbl th.ra{text-align:right}
.size-tbl th.grn{color:var(--green)}
.size-tbl td{padding:5px 8px;border:1px solid var(--border);background:var(--surface);font-family:var(--mono)}
.size-tbl tr.tot td{background:var(--bg);font-weight:700;border-top:2px solid var(--border-dk)}
.s-lbl{color:var(--muted);font-size:11px;font-weight:700}
.s-ord{color:var(--text)}
.s-ext{color:var(--muted);font-size:11px}
.ainp{width:60px;background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);padding:4px 6px;font-family:var(--mono);font-size:12px;color:var(--text);transition:border-color .12s;-moz-appearance:textfield}
.ainp::-webkit-outer-spin-button,.ainp::-webkit-inner-spin-button{-webkit-appearance:none}
.ainp:focus{outline:none;border-color:var(--green);background:var(--green-lt)}
.dc{text-align:right}
.fill-btn{background:none;border:none;color:var(--muted-lt);font-size:10px;cursor:pointer;padding:2px 5px;border-radius:var(--radius);font-family:var(--mono);transition:all .1s;white-space:nowrap}
.fill-btn:hover{background:var(--green-lt);color:var(--green)}
.fill-btn.filled{color:var(--green);opacity:.6;text-decoration:line-through}

.dpill{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;border:1px solid;white-space:nowrap}
.dpill.ok{background:var(--green-lt);color:var(--green-dk);border-color:#b8dfcc}
.dpill.sh{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.dpill.ov{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.dpill.em{background:var(--bg);color:var(--muted-lt);border-color:var(--border)}

.ms-block{border-radius:var(--radius);padding:10px 12px;margin-bottom:10px}
.ms-block.flagged{background:var(--red-bg);border:1px solid var(--red-bd)}
.ms-block.inprog{background:var(--amb-bg);border:1px solid var(--amb-bd)}
.ms-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;font-family:var(--cond)}
.ms-block.flagged .ms-title{color:var(--red)}
.ms-block.inprog .ms-title{color:var(--amb)}
.ms-note{color:var(--text);line-height:1.45;font-size:12px}

.ms-form{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--border-dk)}
.ms-form.open{display:block}
.ms-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px;font-family:var(--cond)}
.ms-ta{width:100%;background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius);padding:7px 9px;font-size:12px;font-family:var(--sans);color:var(--text);resize:vertical;min-height:60px}
.ms-ta:focus{outline:none;border-color:var(--red)}
.ms-ta::placeholder{color:var(--muted-lt)}
.ms-actions{display:flex;gap:6px;margin-top:7px}

.action-row{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;gap:8px;margin-top:4px}
.action-left{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.err-box{margin:12px 16px;padding:10px 12px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a;font-family:var(--mono)}

.jc-thumb{width:72px;height:72px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer}
.jc-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.jc-thumb-ph{width:28px;height:28px;opacity:.15}
.pm{display:none;position:fixed;inset:0;z-index:800;background:rgba(0,0,0,.92);flex-direction:column}
.pm.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0;border-bottom:1px solid #222}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.pm-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px}
.pm-body img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}
.pm-loading{color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--sb-bg);color:#fff;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 12px;border-radius:var(--radius);z-index:999;font-family:var(--cond);border:1px solid var(--sb-border);animation:tup .18s ease}
.toast.ok{border-color:var(--green)}
.toast.ok::before{content:'OK  ';color:var(--green)}
.toast.err{border-color:var(--red)}
.toast.err::before{content:'ERR  ';color:var(--red)}
@keyframes tup{from{opacity:0;transform:translateY(6px)}to{opacity:1}}

.print-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center}
.print-overlay.open{display:flex}
.print-box{background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius-lg);padding:20px;min-width:280px;max-width:400px;width:90%}
.print-hdr{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;font-family:var(--cond)}
.print-ord{font-size:24px;font-weight:700;font-family:var(--mono);color:var(--text);margin-bottom:3px}
.print-cust{font-size:13px;color:var(--muted);margin-bottom:16px;font-family:var(--cond)}
.print-footer{display:flex;gap:8px;justify-content:flex-end}
</style>
</head>
<body>

<div class="tok-modal" id="tokModal">
  <div class="tok-box">
    <div class="tok-title">Airtable API Token</div>
    <input type="password" class="tok-inp" id="tokenInput" placeholder="pat•••••••••••••••••••••••••••••••••••••••••" onkeydown="if(event.key==='Enter')connectToken()">
    <div class="tok-footer">
      <button class="btn p" onclick="connectToken()">Connect</button>
    </div>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-cell active" id="sf-all" onclick="setFilter('all',this)">All<span class="stat-ct" id="sAll">—</span></div>
  <div class="stat-cell" id="sf-urgent" onclick="setFilter('urgent',this)">Urgent<span class="stat-ct" id="sUrgent">—</span></div>
  <div class="stat-cell" id="sf-misship" onclick="setFilter('misship',this)">Mis-ships<span class="stat-ct" id="sMisship">—</span></div>
  <div class="stat-cell" id="sf-overdue" onclick="setFilter('overdue',this)">Overdue<span class="stat-ct" id="sOverdue">—</span></div>
</div>

<div class="action-bar">
  <div class="search-wrap">
    <input type="text" class="search-inp" id="searchInp" placeholder="Search order #, customer, PO, garment..." oninput="onSearch(this.value)">
    <button class="search-clr" id="searchClr" onclick="clearSearch()">x</button>
  </div>
  <button class="btn" id="refreshBtn" onclick="loadData()" style="white-space:nowrap;flex-shrink:0">Refresh</button>
</div>

<div id="listArea">
  <div class="loading"><div class="spin"></div>Enter token to load</div>
</div>

<div class="pm" id="pmModal">
  <div class="pm-bar">
    <button class="pm-close" onclick="pmClose()">Close</button>
    <span class="pm-fn" id="pmFn"></span>
  </div>
  <div class="pm-body" id="pmBody"><div class="pm-loading">Loading...</div></div>
</div>

<div class="print-overlay" id="printOverlay">
  <div class="print-box">
    <div class="print-hdr">Receiving Label</div>
    <div class="print-ord" id="poOrd"></div>
    <div class="print-cust" id="poCust"></div>
    <div class="print-footer">
      <button class="btn" onclick="closePrint()">Cancel</button>
      <button class="btn p" onclick="doPrint()">Print Label</button>
    </div>
  </div>
</div>

<script>

var WRITES_ENABLED=true;
var EXCLUDE_STATUS=['Completed','Shipped'];

var F={
  ref:'fldU6oLyZnxhhm2kX',

var SIZES=[
  {l:'XS',ok:'oXS',ak:'aXS',ek:'eXS'},{l:'S',ok:'oS',ak:'aS',ek:'eS'},
  {l:'M',ok:'oM',ak:'aM',ek:'eM'},{l:'L',ok:'oL',ak:'aL',ek:'eL'},
  {l:'XL',ok:'oXL',ak:'aXL',ek:'eXL'},{l:'2XL',ok:'o2XL',ak:'a2XL',ek:'e2XL'},
  {l:'3XL',ok:'o3XL',ak:'a3XL',ek:'e3XL'},{l:'4XL',ok:'o4XL',ak:'a4XL',ek:'e4XL'},
  {l:'5XL',ok:'o5XL',ak:'a5XL',ek:'e5XL'},{l:'OSFA',ok:'oOSFA',ak:'aOSFA',ek:'eOSFA'},
  {l:'6XL',ok:'o6XL',ak:null,ek:null}
];

var allRecords=[],currentFilter='all',searchTerm='',pending={},fillState={},openOrds={},openLines={},printOrdNum=null,toastTimer;

function getToken(){return localStorage.getItem('pc_token')||sessionStorage.getItem('pc_token')||'';}

window.addEventListener('DOMContentLoaded',function(){
  var t=getToken();
  if(t){loadData();}
  else{document.getElementById('tokModal').classList.add('open');}
});

function connectToken(){
  var t=document.getElementById('tokenInput').value.trim();
  if(!t){toast('Enter a token first','err');return;}
  localStorage.setItem('pc_token',t);
  sessionStorage.setItem('pc_token',t);
  document.getElementById('tokModal').classList.remove('open');
  loadData();
}

async function loadData(){
  var token=getToken();
  if(!token){document.getElementById('tokModal').classList.add('open');return;}
  var btn=document.getElementById('refreshBtn');
  btn.textContent='...';btn.disabled=true;
  document.getElementById('listArea').innerHTML='<div class="loading"><div class="spin"></div>Loading orders...</div>';
  try{
    var raw=await fetchAll(token);
    pending={};fillState={};
    allRecords=raw.filter(function(r){
      if(fv(r,'ordered')!==true)return false;
      var isMisship=fv(r,'misship')===true&&fv(r,'misshipResolved')!==true;
      if(fv(r,'received')===true&&!isMisship)return false;
      if(orderNum(r)<MIN_ORDER)return false;
      var st=getStatus(r);
      var isActiveMisship=isMisship&&fv(r,'misshipInProgress')===true;
      if(!isActiveMisship&&EXCLUDE_STATUS.indexOf(st)>=0)return false;
      var pt=fv(r,'productType');
      if(pt){var ptn=typeof pt==='object'?pt.name:String(pt);if(INCLUDE_PRODUCT_TYPES.indexOf(ptn)<0)return false;}
      var qty=Number(fv(r,'totalQty')||0);if(qty<=0)return false;
      var gn=String(fv(r,'garmentName')||'').toLowerCase();if(gn.indexOf('shipping')>=0)return false;
      return true;
    });
    renderAll();updateStats();
  }catch(e){
    document.getElementById('listArea').innerHTML='<div class="err-box">Load failed: '+esc(e.message)+'</div>';
    toast('Load failed','err');
  }finally{btn.textContent='Refresh';btn.disabled=false;}
}

async function fetchAll(token){
  var records=[],offset=null;
  var filterFormula='AND({'+F.ordered+'}=TRUE(),OR({'+F.received+'}!=TRUE(),{'+F.misship+'}=TRUE()))';
  do{
    var p=new URLSearchParams();
    Object.values(F).forEach(function(id){p.append('fields[]',id);});
    p.set('returnFieldsByFieldId','true');
    p.set('filterByFormula',filterFormula);
    p.set('sort[0][field]',F.printDate);
    p.set('sort[0][direction]','asc');
    if(offset)p.set('offset',offset);
    var res=await fetch('https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID+'?'+p,{headers:{Authorization:'Bearer '+token}});
    if(!res.ok){var d=await res.json();throw new Error(d.error&&d.error.message?d.error.message:'API '+res.status);}
    var data=await res.json();
    records=records.concat(data.records||[]);
    offset=data.offset;
  }while(offset);
  return records;
}

function fv(r,key){var id=F[key];if(id===undefined)return undefined;return(r.fields&&r.fields[id]!==undefined)?r.fields[id]:((r.cellValuesByFieldId&&r.cellValuesByFieldId[id]!==undefined)?r.cellValuesByFieldId[id]:undefined);}

function orderNum(r){
  var v=fv(r,'orderNum');
  if(!v)return 0;
  if(typeof v==='number')return v;
  if(typeof v==='object'&&v.valuesByLinkedRecordId){var a=Object.values(v.valuesByLinkedRecordId);for(var i=0;i<a.length;i++){if(a[i]&&a[i][0])return Number(a[i][0]);}return 0;}
  return parseInt(v)||0;
}

function getStatus(r){
  var v=fv(r,'orderStatus');
  if(!v)return '';
  if(typeof v==='object'&&v.valuesByLinkedRecordId){var a=Object.values(v.valuesByLinkedRecordId);for(var i=0;i<a.length;i++){if(a[i]&&a[i][0])return String(a[i][0]);}return '';}
  if(Array.isArray(v))return v[0]?String(v[0]):'';
  return String(v);
}

function supName(r){
  var f=fv(r,'supplierName');
  if(f&&typeof f==='string'&&f.trim())return f.trim();
  var v=fv(r,'supplier');
  if(!v)return '';
  if(Array.isArray(v))return v.map(function(s){return s.name||s;}).join(', ');
  return v.name||String(v);
}

function getGarmentName(r){
  var g=fv(r,'garmentName');
  if(g&&typeof g==='string'&&g.trim())return g.trim();
  return fv(r,'customer')||'Unknown Garment';
}

function getThumbUrl(r){
  var v=fv(r,'proofImages');
  if(!v||!Array.isArray(v)||!v.length)return null;
  var p=v[0];
  return (p.thumbnails&&p.thumbnails.large&&p.thumbnails.large.url)?p.thumbnails.large.url:p.url||null;
}

function getLargeUrl(r){
  var v=fv(r,'proofImages');
  if(!v||!Array.isArray(v)||!v.length)return null;
  var p=v[0];
  return (p.thumbnails&&p.thumbnails.large&&p.thumbnails.large.url)?p.thumbnails.large.url:p.url||null;
}

function getPD(r){
  var v=fv(r,'printDate');
  if(v&&!(typeof v==='object'&&v.error))return{date:String(v),isDue:false};
  var dv=fv(r,'dueDate');
  if(dv){
    if(typeof dv==='object'&&dv.valuesByLinkedRecordId){var vals=Object.values(dv.valuesByLinkedRecordId);for(var i=0;i<vals.length;i++){if(vals[i]&&vals[i][0])return{date:String(vals[i][0]).split('T')[0],isDue:true};}}
    if(typeof dv==='string')return{date:dv.split('T')[0],isDue:true};
  }
  return null;
}

function daysUntil(ds){
  if(!ds)return null;
  var pts=ds.split('/');
  var d=pts.length===3?new Date(parseInt(pts[2]),parseInt(pts[0])-1,parseInt(pts[1])):new Date(ds);
  if(isNaN(d.getTime()))return null;
  var t=new Date();t.setHours(0,0,0,0);
  return Math.round((d.getTime()-t.getTime())/86400000);
}

function fmtDate(ds){
  if(!ds)return '';
  var d=new Date(ds+'T12:00:00');
  if(isNaN(d.getTime()))return ds;
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function groupByOrder(records){
  var map={};
  records.forEach(function(r){
    var num=orderNum(r);if(!num)return;
    if(!map[num])map[num]={num:num,customer:fv(r,'customer')||'Unknown',printDate:null,isDue:false,records:[]};
    map[num].records.push(r);
    var pd=getPD(r);
    if(pd&&(!map[num].printDate||daysUntil(pd.date)<daysUntil(map[num].printDate))){map[num].printDate=pd.date;map[num].isDue=pd.isDue;}
  });
  return Object.values(map).sort(function(a,b){
    var da=daysUntil(a.printDate),db=daysUntil(b.printDate);
    if(da===null&&db===null)return a.num-b.num;
    if(da===null)return 1;if(db===null)return -1;return da-db;
  });
}

function applyFilter(groups){
  var result=groups;
  if(currentFilter==='urgent')result=result.filter(function(g){var d=daysUntil(g.printDate);return d!==null&&d<=4;});
  else if(currentFilter==='misship')result=result.filter(function(g){return g.records.some(function(r){return fv(r,'misship')===true&&fv(r,'misshipResolved')!==true;});});
  else if(currentFilter==='overdue')result=result.filter(function(g){return g.records.some(function(r){var d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;});});
  if(searchTerm){
    result=result.map(function(g){return Object.assign({},g,{records:g.records.filter(function(r){return matchSearch(r,g.num);})});}).filter(function(g){return g.records.length>0;});
  }
  return result;
}

function updateStats(){
  var groups=groupByOrder(allRecords);
  var total=groups.length;
  var urgent=groups.filter(function(g){var d=daysUntil(g.printDate);return d!==null&&d<=4;}).length;
  var misship=allRecords.filter(function(r){return fv(r,'misship')===true&&fv(r,'misshipResolved')!==true;}).length;
  var overdue=allRecords.filter(function(r){var d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;}).length;
  document.getElementById('sAll').textContent=total;
  document.getElementById('sUrgent').textContent=urgent;
  document.getElementById('sMisship').textContent=misship;
  document.getElementById('sOverdue').textContent=overdue;
  var msCell=document.getElementById('sf-misship');
  if(misship>0){msCell.classList.add('alert-ct');}else{msCell.classList.remove('alert-ct');}
}

function renderAll(){
  var groups=applyFilter(groupByOrder(allRecords));
  var area=document.getElementById('listArea');
  if(!groups.length){area.innerHTML='<div class="empty">No pending orders</div>';return;}
  var html='<div class="list-area">';
  var lastDK=null;
  groups.forEach(function(g){
    var days=daysUntil(g.printDate);
    var dk;
    if(!g.printDate)dk='none';
    else if(days<0)dk='overdue';
    else dk=g.printDate;
    if(dk!==lastDK){
      var lbl,cls='date-hdr';
      if(dk==='none')lbl='No date set';
      else if(dk==='overdue'){lbl='Overdue';cls='date-hdr';}
      else if(days===0){lbl='Today';cls='date-hdr today';}
      else if(days===1)lbl='Tomorrow';
      else lbl=fmtDate(g.printDate);
      html+='<div class="'+cls+'">'+lbl+'</div>';
      lastDK=dk;
    }
    html+=renderGroup(g);
  });
  html+='</div>';
  area.innerHTML=html;
}

function renderGroup(g){
  var days=daysUntil(g.printDate);
  var pfx=g.isDue?'Due':'Prints';
  var urgTag='';
  if(days!==null&&days<0)urgTag='<span class="tag r">Overdue</span>';
  else if(days!==null&&days===0)urgTag='<span class="tag r">'+pfx+' Today</span>';
  else if(days!==null&&days<=4)urgTag='<span class="tag r">'+pfx+' in '+days+'d</span>';
  else if(days!==null&&days<=7)urgTag='<span class="tag amb">'+pfx+' in '+days+'d</span>';
  var hasMisship=g.records.some(function(r){return fv(r,'misship')===true&&fv(r,'misshipResolved')!==true;});
  var misTag=hasMisship?'<span class="tag r">Mis-ship</span>':'';
  var cnt=g.records.length;
  var isOpen=openOrds[g.num];
  return '<div class="order-group'+(isOpen?' order-open':'')+'" id="og-'+g.num+'">'
    +'<div class="order-hd" onclick="togOrd('+g.num+')">'
    +'<span class="onum">#'+g.num+'</span>'
    +'<span class="ocust">'+esc(g.customer)+'</span>'
    +'<div class="ometa">'+urgTag+misTag+'<span class="tag n">'+cnt+' line'+(cnt!==1?'s':'')+'</span>'
    +'<button class="btn" style="font-size:8px" onclick="event.stopPropagation();openPrint('+g.num+',\''+esc(g.customer)+'\')">Label</button>'
    +'</div>'
    +'<span class="ochev">v</span>'
    +'</div>'
    +'<div class="li-wrap" id="lw-'+g.num+'">'
    +g.records.map(function(r){return renderLI(r,g);}).join('')
    +'</div>'
    +'</div>';
}

function renderLI(r,g){
  var id=r.id;
  var gname=getGarmentName(r);
  var sup=supName(r);
  var po=fv(r,'po')||'';
  var arr=fv(r,'arrival')||'';
  var isMisship=fv(r,'misship')===true;
  var isResolved=fv(r,'misshipResolved')===true;
  var isInProg=fv(r,'misshipInProgress')===true;
  var msDetails=fv(r,'misshipDetails')||'';
  var arrDays=arr?daysUntil(arr):null;
  var arrOvr=arrDays!==null&&arrDays<0;
  var activeSizes=SIZES.filter(function(s){return (fv(r,s.ok)||0)>0;});
  var pendActs=pending[id]||{};
  var isExp=openLines[id];
  var tO=activeSizes.reduce(function(s,z){return s+(fv(r,z.ok)||0);},0);
  var tE=activeSizes.reduce(function(s,z){return s+(z.ek?(fv(r,z.ek)||0):0);},0);

  var liTags='';
  if(sup)liTags+='<span class="tag n">'+esc(sup)+'</span>';
  if(po)liTags+='<span class="tag n">PO: '+esc(po)+'</span>';
  if(arr&&arrOvr)liTags+='<span class="tag r">Arr. '+fmtDate(arr)+'</span>';
  else if(arr)liTags+='<span class="tag n">Arr. '+fmtDate(arr)+'</span>';
  if(isMisship&&!isResolved)liTags+=isInProg?'<span class="tag amb">Mis-ship In Progress</span>':'<span class="tag r">Mis-ship</span>';

  var hasPend=Object.keys(pendActs).length>0;
  var rightPill='<span class="dpill em">—</span>';
  if(hasPend){
    var tExp=0,tAct=0;
    activeSizes.forEach(function(s){var o=fv(r,s.ok)||0,e=s.ek?(fv(r,s.ek)||0):0;tExp+=o+e;tAct+=Number(pendActs[F[s.ak]]||0);});
    var d=tExp-tAct;
    if(d===0)rightPill='<span class="dpill ok">Match</span>';
    else if(d>0)rightPill='<span class="dpill sh">-'+d+'</span>';
    else rightPill='<span class="dpill ov">+'+Math.abs(d)+'</span>';
  }

  var sizeRows=activeSizes.map(function(s){
    var oVal=fv(r,s.ok)||0,eVal=s.ek?(fv(r,s.ek)||0):0;
    var aStored=s.ak?pendActs[F[s.ak]]:undefined;
    var aDb=s.ak?fv(r,s.ak):undefined;
    var aVal=aStored!==undefined&&aStored!==null?aStored:(aDb!==undefined&&aDb!==null&&aDb!==''?aDb:'');
    var dp=deltaHtml(oVal,eVal,(aVal!==''&&aVal!==null)?aVal:null);
    var inp=s.ak?'<input type="number" min="0" class="ainp" id="ai-'+id+'-'+s.l+'" value="'+(aVal!==''&&aVal!==null?aVal:'')+'" placeholder="0" oninput="onInp(this,\''+id+'\',\''+s.ak+'\',\''+s.ok+'\',\''+(s.ek||'')+'\',\''+g.num+'\')">'
      :'<span style="color:var(--muted-lt)">—</span>';
    var fb=s.ak?'<button id="fb-'+id+'-'+s.l+'" class="fill-btn'+(fillState[id+'-'+s.l]?' filled':'')+'" onclick="quickFill(\''+id+'\',\''+s.l+'\',\''+s.ak+'\',\''+s.ok+'\',\''+(s.ek||'')+'\',\''+g.num+'\','+(oVal+eVal)+')">'+Number(oVal+eVal)+'</button>':'';
    return '<tr><td class="s-lbl">'+s.l+'</td><td class="s-ord">'+oVal+'</td><td class="s-ext">'+(eVal>0?'+'+eVal:'—')+'</td><td>'+inp+'</td><td class="dc"><div style="display:flex;align-items:center;justify-content:flex-end;gap:4px"><span id="dr-'+id+'-'+s.l+'">'+dp+'</span>'+fb+'</div></td></tr>';
  }).join('');

  var tActs=Object.values(pendActs);
  var tA=tActs.length?tActs.reduce(function(s,v){return s+(Number(v)||0);},0):null;
  var totDelta=tA!==null?deltaHtml(tO,tE,tA):'<span class="dpill em">—</span>';

  var msBlockHtml='';
  if(isMisship&&!isResolved){
    msBlockHtml=isInProg
      ?'<div class="ms-block inprog"><div class="ms-title">Replacement Ordered</div><div class="ms-note">'+esc(msDetails||'Replacement has been ordered from supplier.')+'</div></div>'
      :'<div class="ms-block flagged"><div class="ms-title">Mis-ship Flagged</div><div class="ms-note">'+esc(msDetails||'No details recorded.')+'</div></div>';
  }

  var msFormHtml='<div id="msf-'+id+'" class="ms-form">'
    +'<div class="ms-lbl">Describe the mis-ship issue</div>'
    +'<textarea class="ms-ta" id="mst-'+id+'" placeholder="e.g. Received 5 Larges instead of 5 Mediums..."></textarea>'
    +'<div class="ms-actions">'
    +'<button class="btn red" onclick="saveMisship(\''+id+'\',\''+g.num+'\')">Flag Mis-ship</button>'
    +'<button class="btn" onclick="cancelMisship(\''+id+'\')">Cancel</button>'
    +'</div></div>';

  var resolveBtn=(isMisship&&!isResolved)?'<button class="btn grn" onclick="resolveMisship(\''+id+'\',\''+g.num+'\')">Mark Resolved</button>':'';
  var flagBtn=(!isMisship||isResolved)?'<button class="btn" onclick="toggleMsForm(\''+id+'\')">Flag Mis-ship</button>':'';
  var recvBtn='<button class="btn p" id="rb-'+id+'" onclick="markRecv(\''+id+'\',\''+g.num+'\')">Mark Received</button>';

  var thumbUrl=getThumbUrl(r);
  var thumbHtml=thumbUrl
    ?'<div class="jc-thumb" onclick="event.stopPropagation();pmOpen(\''+id+'\',\''+esc(gname)+'\')"><img src="'+thumbUrl+'" onerror="this.parentNode.innerHTML=\'<svg class=jc-thumb-ph viewBox=\\\"0 0 24 24\\\" fill=none stroke=currentColor stroke-width=1.5><rect x=3 y=3 width=18 height=18 rx=2/><path d=\\\"M3 9l4-4 4 4 4-5 4 6\\\"/></svg>\'"></div>'
    :'<div class="jc-thumb"><svg class="jc-thumb-ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-5 4 6"/></svg></div>';

  return '<div class="li'+(isExp?' li-exp':'')+'" id="li-'+id+'">'
    +'<div class="li-row" onclick="togLI(\''+id+'\',\''+g.num+'\')">'
    +thumbHtml
    +'<div class="li-left">'
    +'<div class="li-ref">'+esc(fv(r,'ref')||id)+'</div>'
    +'<div class="li-name">'+esc(gname)+'</div>'
    +'<div class="li-tags">'+liTags+'</div>'
    +'</div>'
    +'<div class="li-right">'+rightPill+'<span class="tag k">'+tO+' pcs</span></div>'
    +'</div>'
    +'<div class="li-detail" id="ld-'+id+'">'
    +'<div class="detail-meta">'
    +(sup?'<div class="dm"><span class="dl">Supplier</span><span class="dv">'+esc(sup)+'</span></div>':'')
    +(po?'<div class="dm"><span class="dl">PO</span><span class="dv">'+esc(po)+'</span></div>':'')
    +(arr?'<div class="dm"><span class="dl">Expected Arrival</span><span class="dv lg'+(arrOvr?' red':(arrDays!==null&&arrDays<=2?' amb':''))+'">'+(fmtDate(arr)||(arr||''))+(arrOvr?' — OVERDUE':'')+'</span></div>':'')
    +'<div class="dm"><span class="dl">Print Date</span><span class="dv lg'+(getPD(r)&&daysUntil(getPD(r).date)!==null&&daysUntil(getPD(r).date)<=4?' red':'')+'">'+((getPD(r)&&fmtDate(getPD(r).date))||'—')+'</span></div>'
    +'<div class="dm"><span class="dl">Ordered Total</span><span class="dv">'+tO+(tE>0?' +'+tE+' extras':'')+'</span></div>'
    +'</div>'
    +msBlockHtml
    +(thumbUrl?'<div style="margin-bottom:10px"><button class="btn" onclick="pmOpen(\''+id+'\',\''+esc(gname)+'\')">View Proof</button></div>':'')
    +'<div class="size-wrap"><table class="size-tbl">'
    +'<thead><tr><th style="width:50px">Size</th><th>Ordered</th><th>+Extra</th><th class="grn">Actual</th><th class="ra">+/−</th></tr></thead>'
    +'<tbody>'+(sizeRows||'<tr><td colspan="5" style="color:var(--muted-lt);padding:10px;font-size:11px">No sized quantities</td></tr>')
    +'<tr class="tot"><td class="s-lbl">Total</td><td class="s-ord">'+tO+'</td><td class="s-ext">'+(tE>0?'+'+tE:'—')+'</td><td id="ta-'+id+'">'+(tA!==null?tA:'—')+'</td><td class="dc" id="td-'+id+'">'+totDelta+'</td></tr>'
    +'</tbody></table></div>'
    +msFormHtml
    +'<div class="action-row"><div class="action-left">'+flagBtn+resolveBtn+'</div>'+recvBtn+'</div>'
    +'</div>'
    +'</div>';
}

function deltaHtml(o,e,a){
  if(a===null||a===undefined||a==='')return '<span class="dpill em">—</span>';
  var exp=o+(e||0),d=exp-Number(a);
  if(d===0)return '<span class="dpill ok">Match</span>';
  if(d>0)return '<span class="dpill sh">-'+d+'</span>';
  return '<span class="dpill ov">+'+Math.abs(d)+'</span>';
}

function togOrd(num){
  var el=document.getElementById('og-'+num);if(!el)return;
  if(openOrds[num]){delete openOrds[num];el.classList.remove('order-open');}
  else{openOrds[num]=true;el.classList.add('order-open');}
}

function togLI(id,ordNum){
  if(openLines[id]){delete openLines[id];}else{openLines[id]=true;}
  var g=groupByOrder(allRecords).filter(function(x){return x.num===Number(ordNum);})[0];
  if(g){var lw=document.getElementById('lw-'+ordNum);if(lw)lw.innerHTML=g.records.map(function(r){return renderLI(r,g);}).join('');}
}

function toggleMsForm(id){var f=document.getElementById('msf-'+id);if(f)f.classList.toggle('open');}
function cancelMisship(id){var f=document.getElementById('msf-'+id);if(f)f.classList.remove('open');var ta=document.getElementById('mst-'+id);if(ta)ta.value='';}

function onSearch(val){
  searchTerm=val.trim().toLowerCase();
  document.getElementById('searchClr').className='search-clr'+(searchTerm?' show':'');
  renderAll();
}
function clearSearch(){document.getElementById('searchInp').value='';onSearch('');}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.stat-cell').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderAll();
}

function matchSearch(r,oNum){
  if(!searchTerm)return true;
  var q=searchTerm;
  if((fv(r,'customer')||'').toLowerCase().indexOf(q)>=0)return true;
  if((fv(r,'po')||'').toLowerCase().indexOf(q)>=0)return true;
  if(String(oNum||'').indexOf(q)>=0)return true;
  if((getGarmentName(r)||'').toLowerCase().indexOf(q)>=0)return true;
  return false;
}

function onInp(inp,recId,ak,ok,ek,ordNum){
  if(!pending[recId])pending[recId]={};
  pending[recId][F[ak]]=inp.value===''?null:Number(inp.value);
  var r=allRecords.filter(function(x){return x.id===recId;})[0];if(!r)return;
  var activeSizes=SIZES.filter(function(s){return (fv(r,s.ok)||0)>0;});
  var oVal=fv(r,ok)||0,eVal=ek?fv(r,ek)||0:0,aVal=inp.value===''?null:Number(inp.value);
  var sz=activeSizes.filter(function(s){return s.ak===ak;})[0];
  if(sz){var dc=document.getElementById('dr-'+recId+'-'+sz.l);if(dc)dc.innerHTML=deltaHtml(oVal,eVal,aVal);}
  var tO=activeSizes.reduce(function(s,z){return s+(fv(r,z.ok)||0);},0);
  var tE=activeSizes.reduce(function(s,z){return s+(z.ek?(fv(r,z.ek)||0):0);},0);
  var acts=pending[recId]||{};
  var allFilled=activeSizes.filter(function(s){return s.ak;}).every(function(s){return acts[F[s.ak]]!==null&&acts[F[s.ak]]!==undefined&&acts[F[s.ak]]!=='';});
  var tA=activeSizes.filter(function(s){return s.ak;}).reduce(function(s,z){return s+Number(acts[F[z.ak]]||0);},0);
  var taEl=document.getElementById('ta-'+recId),tdEl=document.getElementById('td-'+recId);
  if(taEl)taEl.textContent=allFilled?tA:(tA+'+');
  if(tdEl&&allFilled)tdEl.innerHTML=deltaHtml(tO,tE,tA);
}

function quickFill(id,sl,ak,ok,ek,ordNum,fillVal){
  var key=id+'-'+sl,inp=document.getElementById('ai-'+id+'-'+sl);if(!inp)return;
  if(fillState[key]){fillState[key]=false;inp.value='';}else{fillState[key]=true;inp.value=Number(fillVal);}
  var btn=document.getElementById('fb-'+id+'-'+sl);
  if(btn){if(fillState[key])btn.classList.add('filled');else btn.classList.remove('filled');}
  onInp(inp,id,ak,ok,ek,ordNum);
}

async function markRecv(recId,ordNum){
  var token=getToken();if(!token){toast('No token','err');return;}
  if(!WRITES_ENABLED){toast('Writes disabled','err');return;}
  var btn=document.getElementById('rb-'+recId);
  btn.disabled=true;btn.textContent='Saving...';
  try{
    var updates=pending[recId]||{};
    var fields=Object.assign({},updates);fields[F.received]=true;
    var res=await fetch('https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID+'/'+recId,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
    if(!res.ok){var d=await res.json();throw new Error(d.error&&d.error.message?d.error.message:'API '+res.status);}
    var recvdCustomer='';
    var rr=allRecords.filter(function(r){return r.id===recId;})[0];
    if(rr)recvdCustomer=fv(rr,'customer')||'';
    delete pending[recId];
    allRecords=allRecords.filter(function(r){return r.id!==recId;});
    delete openLines[recId];
    animateOut('li-'+recId,Number(ordNum));
    toast('Marked received','ok');
    openPrint(Number(ordNum),recvdCustomer);
  }catch(e){toast('Error: '+e.message,'err');btn.disabled=false;btn.textContent='Mark Received';}
}

async function saveMisship(recId,ordNum){
  var token=getToken();if(!token){toast('No token','err');return;}
  if(!WRITES_ENABLED){toast('Writes disabled','err');return;}
  var ta=document.getElementById('mst-'+recId),details=ta?ta.value.trim():'';
  if(!details){toast('Describe the issue first','err');return;}
  var btn=document.querySelector('#msf-'+recId+' .btn.red');if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    var fields={};fields[F.misship]=true;fields[F.misshipDetails]=details;fields[F.misshipInProgress]=true;
    var res=await fetch('https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID+'/'+recId,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
    if(!res.ok){var d=await res.json();throw new Error(d.error&&d.error.message?d.error.message:'API '+res.status);}
    var rec=allRecords.filter(function(r){return r.id===recId;})[0];
    if(rec&&rec.fields){rec.fields[F.misship]=true;rec.fields[F.misshipDetails]=details;rec.fields[F.misshipInProgress]=true;}
    toast('Mis-ship flagged','ok');
    refreshOrderRow(Number(ordNum));
    updateStats();
  }catch(e){toast('Error: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='Flag Mis-ship';}}
}

async function resolveMisship(recId,ordNum){
  var token=getToken();if(!token){toast('No token','err');return;}
  if(!WRITES_ENABLED){toast('Writes disabled','err');return;}
  var btn=document.querySelector('#li-'+recId+' .btn.grn');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    var fields={};fields[F.misshipResolved]=true;
    var res=await fetch('https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID+'/'+recId,{method:'PATCH',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
    if(!res.ok){var d=await res.json();throw new Error(d.error&&d.error.message?d.error.message:'API '+res.status);}
    allRecords=allRecords.filter(function(r){return r.id!==recId;});
    delete openLines[recId];
    animateOut('li-'+recId,Number(ordNum));
    toast('Mis-ship resolved','ok');
  }catch(e){toast('Error: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='Mark Resolved';}}
}

function animateOut(elId,ordNum){
  var el=document.getElementById(elId);
  if(!el){updateStats();renderAll();return;}
  el.style.transition='opacity .2s,transform .2s';
  el.style.opacity='0';el.style.transform='translateX(10px)';
  setTimeout(function(){
    var grp=el.closest('.order-group');
    var rem=grp?grp.querySelectorAll('.li').length:0;
    if(rem<=1){
      if(grp){grp.style.transition='opacity .2s';grp.style.opacity='0';setTimeout(function(){delete openOrds[ordNum];updateStats();renderAll();},220);}
    } else {
      el.remove();updateStats();
      refreshOrderRow(ordNum);
    }
  },220);
}

function refreshOrderRow(ordNum){
  var g=groupByOrder(allRecords).filter(function(x){return x.num===ordNum;})[0];
  if(!g)return;
  var lw=document.getElementById('lw-'+ordNum);
  if(lw)lw.innerHTML=g.records.map(function(r){return renderLI(r,g);}).join('');
}

function openPrint(ordNum,customer){
  printOrdNum=ordNum;
  document.getElementById('poOrd').textContent='Order #'+ordNum;
  document.getElementById('poCust').textContent=customer||'';
  document.getElementById('printOverlay').classList.add('open');
}
function closePrint(){document.getElementById('printOverlay').classList.remove('open');printOrdNum=null;}
function doPrint(){
  if(!printOrdNum)return;
  var win=window.open('','_blank','width=420,height=320');
  if(!win){toast('Allow pop-ups for labels','err');return;}
  var cust=document.getElementById('poCust').textContent;
  var dateStr=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  win.document.write('<html><head><title>Label #'+printOrdNum+'</title>');
  win.document.write('<style>body{font-family:Helvetica,Arial,sans-serif;text-align:center;padding:24px}h1{font-size:52px;margin:0;font-weight:700}p{font-size:18px;color:#555;margin:6px 0}small{font-size:13px;color:#999}button{margin-top:16px;padding:8px 20px;font-size:14px;cursor:pointer}@media print{button{display:none}}</style>');
  win.document.write('</head><body>');
  win.document.write('<h1>#'+printOrdNum+'</h1>');
  win.document.write('<p>'+cust+'</p>');
  win.document.write('<small>Received '+dateStr+'</small><br>');
  win.document.write('<button onclick="window.print()">Print</button>');
  win.document.write('</body></html>');
  win.document.close();
  closePrint();
}

function pmClose(){document.getElementById('pmModal').classList.remove('open');}

function pmOpen(recId,label){
  var modal=document.getElementById('pmModal');
  var body=document.getElementById('pmBody');
  var fn=document.getElementById('pmFn');
  fn.textContent=label||'Proof';
  body.innerHTML='<div class="pm-loading">Loading...</div>';
  modal.classList.add('open');
  var token=getToken();
  if(!token){body.innerHTML='<div class="pm-loading">No token</div>';return;}
  var formula="RECORD_ID()='"+recId+"'";
  fetch('https://api.airtable.com/v0/'+BASE_ID+'/'+TABLE_ID
    +'?fields[]='+F.proofImages
    +'&filterByFormula='+encodeURIComponent(formula)
    +'&returnFieldsByFieldId=true&pageSize=1',
    {headers:{Authorization:'Bearer '+token}})
  .then(function(res){return res.json();})
  .then(function(data){
    var rec=data.records&&data.records[0];
    if(!rec){body.innerHTML='<div class="pm-loading">Not found</div>';return;}
    var v=rec.fields&&rec.fields[F.proofImages];
    if(!v||!Array.isArray(v)||!v.length){body.innerHTML='<div class="pm-loading">No proof image</div>';return;}
    var p=v[0];
    var url=(p.thumbnails&&p.thumbnails.large&&p.thumbnails.large.url)?p.thumbnails.large.url:p.url;
    if(!url){body.innerHTML='<div class="pm-loading">No image URL</div>';return;}
    var img=new Image();
    img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;border-radius:4px';
    img.onload=function(){body.innerHTML='';body.appendChild(img);};
    img.onerror=function(){body.innerHTML='<div class="pm-loading">Could not load image</div>';};
    img.src=url;
  })
  .catch(function(){body.innerHTML='<div class="pm-loading">Error loading proof</div>';});
}

function toast(msg,type){
  document.querySelector('.toast')&&document.querySelector('.toast').remove();
  clearTimeout(toastTimer);
  var t=document.createElement('div');t.className='toast '+(type||'ok');t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(function(){t.remove();},3000);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
