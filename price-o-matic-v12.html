<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price-O-Matic v12 — Pine Central</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --bg:#F2F2EE; --bg-soft:#F8F8F5; --surface:#fff;
    --border:#E5E5E0; --border-dk:#D0D0CA;
    --text:#0D0D0B; --muted:#888880; --muted-lt:#BBBBB5;
    --yellow:#E8E832; --yellow-dim:#E8E83230;
    --green:#1e6b45; --red:#c0392b;
    --sans:Helvetica,Arial,sans-serif;
    --cond:'Helvetica Neue',Helvetica,Arial,sans-serif;
    --mono:'Courier New',monospace;
    --radius:4px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
  body{padding:14px;max-width:1400px;margin:0 auto}

  /* TOPBAR */
  .topbar{background:var(--text);color:var(--yellow);padding:10px 16px;border-radius:var(--radius);display:flex;justify-content:space-between;align-items:center;gap:12px}
  .topbar .brand{font-family:var(--cond);font-size:15px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
  .topbar .brand .v{font-size:10px;color:var(--muted-lt);font-family:var(--mono);font-weight:400;letter-spacing:1px;margin-left:6px}
  .topbar .right{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .topbar .preset-lbl{font-family:var(--cond);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--yellow);opacity:0.5;margin-right:4px}
  .preset-btn{background:transparent;border:1px solid var(--yellow);color:var(--yellow);padding:5px 10px;border-radius:3px;font-family:var(--cond);font-size:10px;letter-spacing:0.5px;cursor:pointer;font-weight:700;white-space:nowrap}
  .preset-btn:hover{background:var(--yellow);color:var(--text)}
  .topbar .actions{display:flex;gap:6px;margin-left:8px;border-left:1px solid #333;padding-left:10px}
  .topbar .actions button{background:transparent;border:none;color:var(--muted-lt);font-family:var(--cond);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:5px 8px}
  .topbar .actions button:hover{color:var(--yellow)}

  /* GARMENT STRIP */
  .garment-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-top:10px;display:grid;grid-template-columns:100px 140px 170px 1fr;gap:14px;align-items:center}
  .fg{display:flex;flex-direction:column;gap:4px}
  .fg label{font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
  .fg input.num{font-family:var(--mono);font-size:14px;padding:7px 10px;background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);width:100%}
  .fg input.num:focus{outline:none;border-color:var(--text);background:#fff}

  .toggle-group{display:flex;gap:5px;flex-wrap:wrap}
  .toggle-btn{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-family:var(--cond);font-size:10px;letter-spacing:0.5px;cursor:pointer;font-weight:700;color:var(--text);transition:all .1s}
  .toggle-btn:hover{border-color:var(--text)}
  .toggle-btn.on{background:var(--green);color:#fff;border-color:var(--green)}

  .imp-area{margin-top:10px;display:grid;gap:8px;align-items:stretch}
  .imp-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
  .col-head{background:var(--bg-soft);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
  .col-name{font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:900;color:var(--text)}
  .col-price{font-family:var(--mono);font-size:14px;color:var(--green);font-weight:700}
  .col-price.empty{color:var(--muted-lt)}
  .col-remove{background:transparent;border:none;color:var(--muted-lt);font-size:16px;cursor:pointer;padding:0 4px;line-height:1;font-family:var(--sans)}
  .col-remove:hover{color:var(--red)}
  .col-body{padding:10px 12px;flex:1}

  .type-tiles{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:10px}
  .type-tile{background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius);padding:8px 2px;text-align:center;font-family:var(--cond);font-size:9px;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;font-weight:700}
  .type-tile:hover{border-color:var(--text)}
  .type-tile.on{background:var(--text);color:var(--yellow);border-color:var(--text)}
  .type-tile .ico{display:block;font-size:18px;margin-bottom:2px;line-height:1}

  .field-block{margin-bottom:10px}
  .field-block .lbl{font-family:var(--cond);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-bottom:4px}
  .num-pill{background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;padding:5px 0;font-size:12px;text-align:center;cursor:pointer;font-family:var(--mono);user-select:none}
  .num-pill:hover{border-color:var(--text)}
  .num-pill.on{background:var(--text);color:var(--yellow);border-color:var(--text)}
  .num-grid-9{display:grid;grid-template-columns:repeat(9,1fr);gap:3px}
  .num-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:3px}
  .num-grid-6{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
  .num-grid-5{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
  .choice-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:3px}
  .choice-pill{background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;padding:6px 3px;font-family:var(--cond);font-size:9px;text-align:center;cursor:pointer;font-weight:700;letter-spacing:0.3px;text-transform:uppercase}
  .choice-pill:hover{border-color:var(--text)}
  .choice-pill.on{background:var(--text);color:var(--yellow);border-color:var(--text)}
  .select-compact{background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;padding:7px 8px;font-family:var(--sans);font-size:12px;width:100%;color:var(--text)}
  .select-compact:focus{outline:none;border-color:var(--text);background:#fff}
  .spinner-inline{display:flex;align-items:center;gap:6px;margin-top:6px}
  .spinner-inline input{flex:1;background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:var(--mono);font-size:13px;text-align:center}
  .spinner-inline button{background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;width:28px;height:28px;font-size:14px;cursor:pointer;font-family:var(--mono)}
  .spinner-inline button:hover{border-color:var(--text)}
  .spinner-inline .lbl{font-family:var(--cond);font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);font-weight:700}

  .add-imp{background:transparent;border:1px dashed var(--muted-lt);border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-family:var(--cond);font-size:10px;letter-spacing:1px;text-transform:uppercase;font-weight:700;padding:16px;min-height:300px}
  .add-imp:hover{border-color:var(--text);color:var(--text)}
  .add-imp .plus{font-size:32px;line-height:1;margin-bottom:8px;font-weight:400}

  .bottom{display:grid;grid-template-columns:1fr 1.4fr;gap:8px;margin-top:10px}
  .price-card{background:var(--surface);border:1px solid var(--border);padding:18px 14px;border-radius:var(--radius);text-align:center}
  .price-card .lbl-tag{font-family:var(--cond);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-weight:700}
  .price-card .big{font-family:var(--mono);font-size:52px;font-weight:700;line-height:1;color:var(--text);letter-spacing:-1px}
  .price-card .line-total{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:6px}
  .price-card .btn-pdf{margin-top:14px;display:inline-block;background:var(--yellow);color:var(--text);padding:9px 18px;border-radius:3px;font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:900;cursor:pointer;border:none}
  .price-card .btn-pdf:hover{background:#d9d91f}

  .breaks-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .breaks-head{background:var(--bg-soft);border-bottom:1px solid var(--border);padding:8px 12px;font-family:var(--cond);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .breaks-table{width:100%;font-size:13px}
  .breaks-table td{padding:7px 12px;border-bottom:1px solid var(--border);font-family:var(--mono)}
  .breaks-table td:first-child{font-family:var(--cond);font-weight:700;letter-spacing:1px}
  .breaks-table td:last-child{width:36px;text-align:center;padding:0}
  .breaks-table tr.hl{background:var(--yellow-dim)}
  .breaks-table tr.hl td:first-child::before{content:'▸ '}
  .qty-cell{cursor:pointer;padding:3px 6px;margin:-3px -6px;border-radius:3px;display:inline-block}
  .qty-cell:hover{background:var(--border);outline:1px dashed var(--muted)}
  .qty-cell-input{font-family:var(--cond);font-weight:700;letter-spacing:1px;font-size:13px;width:70px;padding:3px 5px;border:1px solid var(--text);border-radius:3px;background:#fff;outline:none}
  .qty-delete{background:none;border:none;color:var(--muted-lt);font-size:14px;cursor:pointer;padding:8px 10px;line-height:1}
  .qty-delete:hover{color:var(--red)}
  .add-qty{padding:7px 12px;display:flex;gap:6px;align-items:center;background:var(--bg-soft);border-top:1px solid var(--border)}
  .add-qty input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:5px 8px;font-family:var(--mono);font-size:12px}
  .add-qty input:focus{outline:none;border-color:var(--text)}
  .add-qty button{background:var(--surface);border:1px solid var(--border-dk);border-radius:3px;padding:5px 12px;font-family:var(--cond);font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:700}
  .add-qty button:hover{border-color:var(--text)}

  .empty-state{background:var(--surface);border:1px dashed var(--border-dk);border-radius:var(--radius);padding:32px 20px;margin-top:10px;text-align:center}
  .empty-title{font-family:var(--cond);font-size:14px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);margin-bottom:6px}
  .empty-sub{font-family:var(--sans);font-size:12px;color:var(--muted)}

  /* S&S LOOKUP BANNER */
  .ss-banner{margin-top:10px;padding:10px 14px;border-radius:var(--radius);background:var(--text);color:var(--yellow);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .ss-banner.error{background:#fdf2f2;color:#c0392b;border:1px solid #f5c6c6}
  .ss-banner.loading{background:var(--bg-soft);color:var(--text);border:1px solid var(--border)}
  .ss-banner-name{font-family:var(--cond);font-size:13px;font-weight:900;letter-spacing:0.5px;text-transform:uppercase}
  .ss-banner-prices{display:flex;gap:14px;flex-wrap:wrap}
  .ss-banner-price{font-family:var(--mono);font-size:12px}
  .ss-banner-price .lbl{color:var(--muted-lt);font-size:10px;margin-right:3px}
  .ss-banner-price strong{color:var(--yellow);font-weight:700}
  .ss-banner-close{background:transparent;border:1px solid var(--muted);color:var(--muted-lt);padding:3px 8px;font-family:var(--cond);font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border-radius:3px;margin-left:auto}
  .ss-banner-close:hover{color:var(--yellow);border-color:var(--yellow)}
  .ss-banner.error .ss-banner-name{font-family:var(--sans);font-weight:700;font-size:13px;letter-spacing:normal;text-transform:none}
  .ss-banner.error .ss-banner-close{color:#c0392b;border-color:#c0392b}
  .ss-spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:sp 0.6s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  /* PRODUCT TAB BAR */
  .tab-bar{display:flex;gap:2px;margin-top:10px;border-bottom:1px solid var(--border)}
  .tab-btn{background:transparent;border:1px solid transparent;border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;padding:10px 18px;font-family:var(--cond);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;color:var(--muted);cursor:pointer;position:relative;top:1px}
  .tab-btn:hover:not(.disabled){color:var(--text)}
  .tab-btn.on{background:var(--surface);border-color:var(--border);color:var(--text);border-bottom:1px solid var(--surface)}
  .tab-btn.disabled{color:var(--muted-lt);cursor:not-allowed}
  .tab-btn .soon{font-size:8px;color:var(--muted-lt);margin-left:5px;letter-spacing:1px;text-transform:lowercase;font-weight:400;font-style:italic}
  .tab-content{}

  /* PRODUCT TABS */
  .product-tabs{display:flex;gap:2px;margin-top:8px;background:var(--text);border-radius:var(--radius);padding:4px;overflow-x:auto}
  .product-tab{background:transparent;border:none;color:var(--muted-lt);padding:8px 18px;font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;border-radius:3px;white-space:nowrap;transition:all .1s}
  .product-tab:hover{color:var(--yellow)}
  .product-tab.on{background:var(--yellow);color:var(--text)}
  .product-tab.disabled{color:#444;cursor:not-allowed;opacity:.5}
  .product-tab.disabled:hover{color:#444}
  .product-view{display:none}
  .product-view.on{display:block}

  /* BANDANA-specific */
  .bandana-strip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:10px;display:grid;grid-template-columns:120px 1fr 1fr;gap:18px;align-items:start}
  .bandana-color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
  .bandana-color-pill{background:var(--bg-soft);border:1px solid var(--border);border-radius:3px;padding:10px 0;font-size:14px;text-align:center;cursor:pointer;font-family:var(--mono);font-weight:700;user-select:none}
  .bandana-color-pill:hover{border-color:var(--text)}
  .bandana-color-pill.on{background:var(--text);color:var(--yellow);border-color:var(--text)}
  .bandana-color-pill.disabled{opacity:.3;cursor:not-allowed;background:#F0F0EC;color:var(--muted-lt)}
  .bandana-color-pill.disabled:hover{border-color:var(--border)}
  .bandana-addons{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
  .bandana-warning{background:#fffbeb;border:1px solid #fde68a;color:#92400e;padding:8px 12px;border-radius:var(--radius);margin-top:8px;font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:0.5px}

  @media (max-width:900px){
    .topbar{flex-wrap:wrap}
    .topbar .right{width:100%}
    .garment-strip{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Price-O-Matic <span class="v">v12</span></div>
  <div class="right">
    <span class="preset-lbl">Quick Quote:</span>
    <button class="preset-btn" data-preset="1color">1-color tee</button>
    <button class="preset-btn" data-preset="2color">2-color tee</button>
    <button class="preset-btn" data-preset="frontback">Front + back</button>
    <button class="preset-btn" data-preset="fleece3">Fleece 3-color</button>
    <button class="preset-btn" data-preset="hemlabel">Hem label</button>
    <div class="actions"><button onclick="resetAll()">Reset</button></div>
  </div>
</div>

<!-- PRODUCT TABS -->
<div class="product-tabs">
  <button class="product-tab on" data-product="apparel">Apparel</button>
  <button class="product-tab" data-product="bandana">Bandanas</button>
  <button class="product-tab disabled" disabled title="Coming soon">Flatstock</button>
  <button class="product-tab disabled" disabled title="Coming soon">Patches &amp; Labels</button>
</div>

<!-- APPAREL VIEW -->
<div class="product-view on" id="view-apparel">
<!-- S&S LOOKUP INFO BANNER (populated by JS after successful lookup) -->
<div class="ss-banner" id="ssBanner" style="display:none"></div>

<div class="garment-strip">
  <div class="fg"><label>Qty</label><input class="num" type="number" id="qty" value="100" min="1" step="1"></div>
  <div class="fg">
    <label>Garment cost</label>
    <div style="display:flex;gap:4px;align-items:center">
      <input class="num" type="number" id="garmentCost" value="5.00" min="0" step="0.01" style="flex:1;min-width:0">
    </div>
  </div>
  <div class="fg">
    <label>S&amp;S lookup</label>
    <div style="display:flex;gap:4px;align-items:center">
      <input class="num" type="text" id="ssStyle" placeholder="e.g. 1717" style="flex:1;min-width:0;text-transform:uppercase">
      <button class="toggle-btn" id="ssLookupBtn" style="flex-shrink:0" onclick="ssLookup()">Look up</button>
    </div>
  </div>
  <div class="fg"><label>Delivery options</label>
    <div class="toggle-group" style="margin-top:2px">
      <button class="toggle-btn" data-toggle="fleece">Fleece</button>
      <button class="toggle-btn" data-toggle="shipping">Shipping</button>
      <button class="toggle-btn" data-toggle="asColourLow">AS Colour &lt; $500</button>
    </div>
  </div>
</div>

<div class="imp-area" id="impArea"></div>

<div class="empty-state" id="emptyState">
  <div class="empty-title">Pick an impression type to see pricing</div>
  <div class="empty-sub">Tap one of the tiles above — Screen, Supa, Deco, Emb, or Tag</div>
</div>
</div>

<!-- BANDANA VIEW -->
<div class="product-view" id="view-bandana">
  <div class="bandana-strip">
    <div class="fg"><label>Qty</label><input class="num" type="number" id="bnQty" value="100" min="1" step="1"></div>
    <div class="fg">
      <label>Print colors</label>
      <div class="bandana-color-grid" id="bnColorGrid"></div>
    </div>
    <div class="fg">
      <label>Bandana hangers (includes application)</label>
      <div class="toggle-group" style="margin-top:2px">
        <button class="toggle-btn" data-bn-toggle="hangers">Add Hangers</button>
      </div>
    </div>
  </div>
  <div class="bandana-addons">
    <div class="fg">
      <label>Ink changes ($35 each)</label>
      <div class="num-grid-4" id="bnInkChangeGrid"></div>
    </div>
    <div class="fg">
      <label>Custom ink mixes ($35 each)</label>
      <div class="num-grid-4" id="bnInkMixGrid"></div>
    </div>
    <div></div>
  </div>
  <div class="bandana-warning" id="bnWarning" style="display:none"></div>
</div>

<div class="bottom" id="bottomArea" style="display:none">
  <div class="price-card">
    <div class="lbl-tag">Price / Piece @ <span id="priceQty">100</span> pcs</div>
    <div class="big" id="bigPrice">$12.00</div>
    <div class="line-total" id="lineTotal">$1,200.00 line total</div>
    <button class="btn-pdf" onclick="downloadPDF()">📄 Download Quote PDF</button>
  </div>
  <div class="breaks-card">
    <div class="breaks-head" id="breaksHead">Quantity Price Breaks · click any qty to edit · sorted ascending</div>
    <table class="breaks-table"><tbody id="breaksBody"></tbody></table>
    <div class="add-qty">
      <input type="number" id="addQtyInput" placeholder="Custom qty" min="1" step="1">
      <button onclick="addCustomQty()">+ Add Qty</button>
      <button style="margin-left:auto" onclick="resetBreaks()">Reset Breaks</button>
    </div>
  </div>
</div>

<script>
/* RATES — Option C. Owner edits this block. Future v4: fetch from Airtable. */
const RATES = {
  overhead: { facilityEquipmentPayroll:133000, operatingHoursPerMonth:180, profitabilityGoal:0.12, setupTakedownMinPerScreen:12, numberOfPresses:2, utilization:0.60, inkChangeFee:35 },

/* MATH (ported from POM 9000 sheet, math verified against spreadsheet in v1 tests) */
function computedOverhead(){const o=RATES.overhead;const h=(o.facilityEquipmentPayroll/o.operatingHoursPerMonth)*(1+o.profitabilityGoal);return{singlePressHourCost:(((1-o.utilization)*h)+h)/o.numberOfPresses};}
function supacolorQtyTier(qty,isGang,sheets){const n=isGang?sheets:qty;if(n<20)return 1;if(n<50)return 2;if(n<100)return 3;if(n<200)return 4;if(n<300)return 5;if(n<500)return 6;if(n<1000)return 7;if(n<2500)return 8;if(n<5000)return 9;return 10;}
function supacolorTransferCost(recipe,size,qty,imprintsPerGang){const m=RATES.supacolor[recipe];if(!m)return 0;const si=RATES.supacolorSizes.indexOf(size);if(si<0)return 0;const isGang=size.includes('GANG');const sheets=qty/(imprintsPerGang||1);const tier=supacolorQtyTier(qty,isGang,sheets);const p=m[tier-1][si];return p==='NA'?null:p;}
function decopressQtyTier(qty){if(qty<50)return 1;if(qty<100)return 2;if(qty<200)return 3;if(qty<300)return 4;if(qty<500)return 5;if(qty<1000)return 6;if(qty<2500)return 7;if(qty<5000)return 8;return 9;}
function decopressTransferCost(mat,size,qty){const m=RATES.decopress[mat];if(!m)return 0;const si=RATES.decopressSizes.indexOf(size);if(si<0)return 0;return m[decopressQtyTier(qty)-1][si];}
function embroideryQtyBand(qty){if(qty<50)return'25-49';if(qty<75)return'50-74';if(qty<100)return'75-99';if(qty<150)return'100-149';if(qty<300)return'150-299';if(qty<500)return'300-499';return'500+';}
function embroideryPrice(qty,band){return(RATES.embroidery[embroideryQtyBand(qty)]&&RATES.embroidery[embroideryQtyBand(qty)][band])||0;}
function priceScreenprint(imp,qty){const o=RATES.overhead;const{singlePressHourCost}=computedOverhead();const s=Number(imp.screens)||0;const ic=Number(imp.inkChanges)||0;const pt=imp.printType||'Tees / Totes';const fi=Number(imp.fleeceImpressions)||0;const setup=(o.setupTakedownMinPerScreen/60)*s;let iph;if(pt==='Combined')iph=((fi/qty)*RATES.impressionsPerHour['Fleece'])+(((qty-fi)/qty)*RATES.impressionsPerHour['Tees / Totes']);else iph=RATES.impressionsPerHour[pt]||RATES.impressionsPerHour['Tees / Totes'];const run=qty/iph;const printP=(run+setup)*singlePressHourCost;const inkF=(o.inkChangeFee*ic)/qty;return(printP/qty)+inkF;}
function priceSupacolor(imp,qty){const t=supacolorTransferCost(imp.supRecipe||'Wearable',imp.supSize||'4 X 4',qty,Number(imp.supImprintsPerGang)||1);if(t==null)return null;const g=Number(imp.supImprintsPerGang)||1;const pp=(t/g)+(RATES.supacolorInboundShipping/qty)+(0.25*(g-1));return RATES.supacolorPressFee+(pp*(1+RATES.supacolorMarkup));}
function priceDecopress(imp,qty){const t=decopressTransferCost(imp.decoMaterial||'Sim Woven / Twill',imp.decoSize||'2.5 X 2.5',qty);const pp=t+(RATES.decopressInboundShipping/qty);const fee=(imp.decoApplication==='Embroidery')?3.75:4.25;return fee+(pp*(1+RATES.decopressMarkup));}
function priceEmbroidery(imp,qty){return embroideryPrice(qty,imp.embStitchBand||'Up to 5,000');}
function priceSizeTag(imp,qty,is1C){const sheets=Math.max(10,Math.ceil(qty/12));const tier=supacolorQtyTier(sheets,true,sheets);const m=RATES.supacolor[is1C?'1C Wearable':'Wearable'];const sp=m[tier-1][10];if(sp==='NA')return 0;return(sp/12)+RATES.sizeTagCutPressFee;}
function impressionPrice(imp,qty){if(!imp||!imp.type||qty<1)return 0;switch(imp.type){case'Screenprint':return priceScreenprint(imp,qty);case'Supacolor':return priceSupacolor(imp,qty)||0;case'Decopress':return priceDecopress(imp,qty);case'Embroidery':return priceEmbroidery(imp,qty);case'Size Tags 1C':return priceSizeTag(imp,qty,true);default:return 0;}}
function garmentPricing(s){const c=Number(s.garmentCost)||0;const fl=s.fleece?0.50:0;const sh=!s.shipping?0:(s.fleece?1.50:0.65);const as=s.asColourLow?c*0.06:0;return(c*1.10)+fl+sh+as;}
function computeApparelAt(qty,s){const imps=s.impressions.map(i=>impressionPrice(i,qty));const impSum=imps.reduce((a,b)=>a+b,0);const garment=garmentPricing(s);const subtotal=garment+impSum;const pricePerPiece=Math.round(subtotal/0.05)*0.05;return{impPrices:imps,garmentPrice:garment,subtotal,pricePerPiece,lineTotal:pricePerPiece*qty};}

/* BANDANA MATH */
function bandanaQtyTierIdx(qty){
  // Round UP to nearest tier (better for customer). Tiers: [50, 75, 100, 150, 200, 300, 500].
  // For qty > 500 we use the 500+ bucket (same price).
  const tiers=RATES.bandana.qtyTiers;
  for(let i=0;i<tiers.length;i++){ if(qty<=tiers[i]) return i; }
  return tiers.length-1; // 500+
}
function bandanaBasePrice(qty, colors){
  const row=RATES.bandana.grid[colors];
  if(!row) return null;
  const tierIdx=bandanaQtyTierIdx(qty);
  const p=row[tierIdx];
  return (p==='NA') ? null : p;
}
function bandanaHangerRate(qty){
  // Find the rate at the HIGHEST hanger tier <= qty. Walk up until we exceed.
  const tiers=RATES.bandana.hangerTiers;
  const rates=RATES.bandana.hangerRates;
  let rate=rates[0];
  for(let i=0;i<tiers.length;i++){ if(qty>=tiers[i]) rate=rates[i]; }
  return rate;
}
function computeBandanaAt(qty, s){
  const basePrice=bandanaBasePrice(qty, s.colors);
  if(basePrice==null) return null; // invalid combo
  const hangerPerPc=s.hangers ? bandanaHangerRate(qty) : 0;
  const inkFees=(RATES.bandana.inkChangeFee*s.inkChanges)/qty;
  const mixFees=(RATES.bandana.customInkMixFee*s.customInkMixes)/qty;
  // Bandana prices are final (already rounded to clean $0.05 increments).
  // No gross-up, no rounding — pass through directly. Add-ons layer on top as real per-piece costs.
  const pricePerPiece=basePrice+hangerPerPc+inkFees+mixFees;
  return{basePrice,hangerPerPc,inkFees,mixFees,pricePerPiece,lineTotal:pricePerPiece*qty};
}

/* PRODUCT-DISPATCHING computeAt */
function computeAt(qty, s){
  if(STATE.product==='bandana') return computeBandanaAt(qty, STATE.bandana);
  return computeApparelAt(qty, s);
}

/* STATE */
const EMPTY_IMP=()=>({type:null,printType:'Tees / Totes',screens:3,inkChanges:0,fleeceImpressions:0,supSize:'4 X 4',supRecipe:'Wearable',supImprintsPerGang:1,decoSize:'2.5 X 2.5',decoMaterial:'Sim Woven / Twill',decoApplication:'Heat Press',embStitchBand:'Up to 5,000'});
const STATE={
  product:'apparel',
  qty:100,garmentCost:5.00,fleece:false,shipping:false,asColourLow:false,
  breaks:[],impressions:[EMPTY_IMP()],
  bandana:{qty:100, colors:1, hangers:false, inkChanges:0, customInkMixes:0}
};

/* RENDER */
const IMP_TYPES=[{k:'Screenprint',i:'🖨️',n:'Screen'},{k:'Supacolor',i:'🎨',n:'Supa'},{k:'Decopress',i:'⚙️',n:'Deco'},{k:'Embroidery',i:'🧵',n:'Emb'},{k:'Size Tags 1C',i:'🏷️',n:'Tag'}];

/* PRODUCT-AWARE active-quote gate */
function activeQty(){return STATE.product==='bandana' ? STATE.bandana.qty : STATE.qty;}
function setActiveQty(v){if(STATE.product==='bandana') STATE.bandana.qty=v; else STATE.qty=v;}
function hasActivePrice(){
  if(STATE.product==='bandana'){
    // A valid bandana combo must exist (not a 3/4-color <100 situation)
    return bandanaBasePrice(STATE.bandana.qty, STATE.bandana.colors) != null;
  }
  return STATE.impressions.some(i=>!!i.type);
}
function hasActiveImpression(){return hasActivePrice();} // legacy name kept for any other callers

/* PRODUCT TAB SWITCHING */
function switchProduct(p){
  STATE.product = p;
  document.querySelectorAll('.product-tab').forEach(btn=>btn.classList.toggle('on', btn.dataset.product===p));
  document.querySelectorAll('.product-view').forEach(v=>v.classList.toggle('on', v.id==='view-'+p));
  // Quick-quote presets only apply to apparel — hide them on bandana
  const presetRow=document.querySelector('.topbar .right');
  document.querySelectorAll('.preset-btn,.preset-lbl').forEach(el=>{el.style.display = p==='apparel' ? '' : 'none';});
  // Regenerate default breaks for new product's qty
  regenerateDefaultBreaks();
  renderAll();
}

/* BANDANA RENDERING */
function renderBandana(){
  const b=STATE.bandana;
  // Color pills — disable 3/4 when qty<100
  const belowMin = b.qty<100;
  const colorGrid=document.getElementById('bnColorGrid');
  colorGrid.innerHTML=[1,2,3,4].map(n=>{
    const disabled=(n>=3 && belowMin);
    const on=(b.colors===n && !disabled);
    return `<div class="bandana-color-pill ${on?'on':''} ${disabled?'disabled':''}" data-bn-color="${n}" ${disabled?'title="Requires 100+ pieces"':''}>${n} color${n>1?'s':''}</div>`;
  }).join('');
  // If user had 3/4 selected and qty drops below 100, auto-reduce to 2
  if(belowMin && b.colors>=3){b.colors=2;}
  // Ink change pills
  renderPillRow('bnInkChangeGrid', [0,1,2,3], b.inkChanges, 'inkChanges', true);
  renderPillRow('bnInkMixGrid', [0,1,2,3], b.customInkMixes, 'customInkMixes', true);
  // Hanger toggle
  document.querySelectorAll('[data-bn-toggle]').forEach(btn=>btn.classList.toggle('on', !!b[btn.dataset.bnToggle]));
  // Warning banner
  const warn=document.getElementById('bnWarning');
  if(belowMin){
    warn.textContent='⚠ 3-color and 4-color bandanas require a minimum of 100 pieces.';
    warn.style.display='block';
  } else {
    warn.style.display='none';
  }
  // Wire listeners (fresh each render)
  colorGrid.querySelectorAll('.bandana-color-pill').forEach(el=>{
    if(el.classList.contains('disabled')) return;
    el.addEventListener('click',()=>{STATE.bandana.colors=Number(el.dataset.bnColor);renderAll();});
  });
  document.querySelectorAll('[data-bn-toggle]').forEach(btn=>{
    btn.onclick=()=>{const f=btn.dataset.bnToggle;STATE.bandana[f]=!STATE.bandana[f];renderAll();};
  });
  // Qty input
  const qi=document.getElementById('bnQty');
  if(qi && !qi._wired){qi._wired=true;
    const h=()=>{STATE.bandana.qty=Number(qi.value)||0;regenerateDefaultBreaks();renderAll();};
    qi.addEventListener('input',h);qi.addEventListener('change',h);
  }
}

function renderPillRow(containerId, values, currentValue, field, isBandana){
  const host=document.getElementById(containerId);
  if(!host) return;
  host.innerHTML=values.map(n=>{
    const lbl=(n===3)?(currentValue>=3?currentValue:'3+'):n;
    const on=(n<3 && currentValue===n) || (n===3 && currentValue>=3);
    const isThreePlus = n===3;
    return `<div class="num-pill ${on?'on':''}" data-pill-val="${n}" data-pill-field="${field}" data-pill-3plus="${isThreePlus?1:0}">${lbl}</div>`;
  }).join('');
  host.querySelectorAll('.num-pill').forEach(el=>{
    el.addEventListener('click',()=>{
      const v=Number(el.dataset.pillVal);
      const target = isBandana ? STATE.bandana : STATE;
      if(el.dataset.pill3plus==='1'){
        if((target[field]||0)<3) target[field]=3;
      } else {
        target[field]=v;
      }
      renderAll();
    });
  });
}
function renderAll(){
  if(STATE.product==='apparel'){
    renderImpressions();
  } else if(STATE.product==='bandana'){
    renderBandana();
  }
  const active=hasActivePrice();
  document.getElementById('bottomArea').style.display=active?'grid':'none';
  const empty=document.getElementById('emptyState');
  // Empty state only applies to apparel view — bandana has its own warning banner
  if(STATE.product==='apparel'){
    empty.style.display=active?'none':'block';
  } else {
    empty.style.display='none';
  }
  if(active){renderBottom();renderBreaks();}
  syncToggles();
}
function syncToggles(){document.querySelectorAll('[data-toggle]').forEach(btn=>{btn.classList.toggle('on',!!STATE[btn.dataset.toggle]);});}

function renderImpressions(){
  const host=document.getElementById('impArea');
  const count=STATE.impressions.length;
  const addCol=count<4?' 140px':'';
  host.style.gridTemplateColumns=`repeat(${count},1fr)${addCol}`;
  const cols=STATE.impressions.map((imp,idx)=>renderImpCol(imp,idx)).join('');
  const addBtn=count<4?'<div class="add-imp" onclick="addImpression()"><span class="plus">+</span>Add impression</div>':'';
  host.innerHTML=cols+addBtn;
  attachImpressionListeners();
}

function renderImpCol(imp,idx){
  const price=(imp.type)?`$${impressionPrice(imp,STATE.qty).toFixed(2)}/pc`:'—';
  const priceCls=imp.type?'col-price':'col-price empty';
  const removeBtn=idx>0?`<button class="col-remove" onclick="removeImpression(${idx})" title="Remove">×</button>`:'';
  return `<div class="imp-col">
    <div class="col-head">
      <span class="col-name">Impression ${idx+1}</span>
      <div style="display:flex;align-items:center;gap:8px"><span class="${priceCls}">${price}</span>${removeBtn}</div>
    </div>
    <div class="col-body">${renderTypeTiles(imp,idx)}${renderImpFields(imp,idx)}</div>
  </div>`;
}

function renderTypeTiles(imp,idx){return '<div class="type-tiles">'+IMP_TYPES.map(t=>`<div class="type-tile ${imp.type===t.k?'on':''}" data-imp="${idx}" data-pick="${t.k}"><span class="ico">${t.i}</span>${t.n}</div>`).join('')+'</div>';}

function renderImpFields(imp,idx){
  if(!imp.type)return '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:8px 4px">Pick an impression type above.</div>';
  switch(imp.type){
    case'Screenprint':return renderScreenFields(imp,idx);
    case'Supacolor':return renderSupaFields(imp,idx);
    case'Decopress':return renderDecoFields(imp,idx);
    case'Embroidery':return renderEmbFields(imp,idx);
    case'Size Tags 1C':return '<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:4px 0">Gang sheet of 12 · min 10 sheets · priced off 1C Wearable matrix</div>';
  }
  return '';
}

function renderScreenFields(imp,idx){
  const screens=Number(imp.screens)||0;
  const isOver8=screens>8;
  const pills=[1,2,3,4,5,6,7,8].map(n=>`<div class="num-pill ${screens===n?'on':''}" data-imp="${idx}" data-field="screens" data-val="${n}">${n}</div>`).join('');
  const overPill=`<div class="num-pill ${isOver8?'on':''}" data-imp="${idx}" data-pick9plus="1">${isOver8?screens:'9+'}</div>`;
  const ics=[0,1,2,3].map(n=>{
    const lbl=n===3?(imp.inkChanges>=3?imp.inkChanges:'3+'):n;
    const on=(n<3&&imp.inkChanges===n)||(n===3&&imp.inkChanges>=3);
    if(n===3) return `<div class="num-pill ${on?'on':''}" data-imp="${idx}" data-ink3plus="1">${lbl}</div>`;
    return `<div class="num-pill ${on?'on':''}" data-imp="${idx}" data-field="inkChanges" data-val="${n}">${lbl}</div>`;
  }).join('');
  const pts=[['Tees / Totes','Tees/Totes'],['Fleece','Fleece'],['Combined','Combined']];
  const ptsHtml=pts.map(([k,lbl])=>`<div class="choice-pill ${imp.printType===k?'on':''}" data-imp="${idx}" data-field="printType" data-val="${k}">${lbl}</div>`).join('');
  const fiBlock=imp.printType==='Combined'?`<div class="field-block"><div class="lbl">Fleece impressions</div><div class="spinner-inline"><button type="button" onclick="spinnerAdj(${idx},'fleeceImpressions',-1)">−</button><input type="number" value="${imp.fleeceImpressions}" min="0" data-imp="${idx}" data-field="fleeceImpressions"><button type="button" onclick="spinnerAdj(${idx},'fleeceImpressions',1)">+</button></div></div>`:'';
  const screenSpinner=isOver8?`<div class="spinner-inline" style="margin-top:6px"><span class="lbl">Count:</span><button type="button" onclick="spinnerAdj(${idx},'screens',-1)">−</button><input type="number" value="${screens}" min="1" data-imp="${idx}" data-field="screens"><button type="button" onclick="spinnerAdj(${idx},'screens',1)">+</button></div>`:'';
  const inkSpinner=imp.inkChanges>=3?`<div class="spinner-inline" style="margin-top:6px"><span class="lbl">Count:</span><button type="button" onclick="spinnerAdj(${idx},'inkChanges',-1)">−</button><input type="number" value="${imp.inkChanges}" min="3" data-imp="${idx}" data-field="inkChanges"><button type="button" onclick="spinnerAdj(${idx},'inkChanges',1)">+</button></div>`:'';
  return `<div class="field-block"><div class="lbl">Screens</div><div class="num-grid-9">${pills}${overPill}</div>${screenSpinner}</div>
    <div class="field-block"><div class="lbl">Ink changes</div><div class="num-grid-4">${ics}</div>${inkSpinner}</div>
    <div class="field-block"><div class="lbl">Print type</div><div class="choice-grid-3">${ptsHtml}</div></div>
    ${fiBlock}`;
}

  const opts=['Up to 5,000','5,000 - 7,500','7,500 - 10,000','10,000 - 15,000','15,000 - 20,000','Patch Application','Woven Label Application','Hem Label Application'];
  const html=opts.map(o=>`<option ${imp.embStitchBand===o?'selected':''}>${o}</option>`).join('');

function attachImpressionListeners(){
  document.querySelectorAll('.type-tile').forEach(el=>el.addEventListener('click',()=>{const idx=Number(el.dataset.imp),pick=el.dataset.pick;STATE.impressions[idx].type=(STATE.impressions[idx].type===pick)?null:pick;renderAll();}));
  document.querySelectorAll('[data-imp][data-field][data-val]').forEach(el=>el.addEventListener('click',()=>{const idx=Number(el.dataset.imp),f=el.dataset.field,raw=el.dataset.val,val=isNaN(raw)?raw:Number(raw);STATE.impressions[idx][f]=val;renderAll();}));
  document.querySelectorAll('[data-pick9plus]').forEach(el=>el.addEventListener('click',()=>{const idx=Number(el.dataset.imp);if((STATE.impressions[idx].screens||0)<=8)STATE.impressions[idx].screens=9;renderAll();}));
  document.querySelectorAll('[data-ink3plus]').forEach(el=>el.addEventListener('click',()=>{const idx=Number(el.dataset.imp);if((STATE.impressions[idx].inkChanges||0)<3)STATE.impressions[idx].inkChanges=3;renderAll();}));
  document.querySelectorAll('select[data-imp][data-field]').forEach(el=>el.addEventListener('change',()=>{const idx=Number(el.dataset.imp),f=el.dataset.field;STATE.impressions[idx][f]=el.value;renderAll();}));
  document.querySelectorAll('.spinner-inline input').forEach(el=>{
    el.addEventListener('input',()=>{const idx=Number(el.dataset.imp),f=el.dataset.field,v=Number(el.value);if(Number.isFinite(v)&&v>=0){STATE.impressions[idx][f]=v;renderBottom();renderBreaks();}});
    el.addEventListener('blur',()=>renderAll());
  });
}

function spinnerAdj(idx,field,delta){const cur=Number(STATE.impressions[idx][field])||0;const min=(field==='screens')?1:0;STATE.impressions[idx][field]=Math.max(min,cur+delta);renderAll();}
function addImpression(){if(STATE.impressions.length<4){STATE.impressions.push(EMPTY_IMP());renderAll();}}
function removeImpression(idx){if(idx===0)return;STATE.impressions.splice(idx,1);renderAll();}

function renderBottom(){
  const qty=activeQty();
  const c=computeAt(qty,STATE);
  if(c==null){return;} // invalid combo, bottom stays hidden (handled upstream)
  document.getElementById('priceQty').textContent=qty;
  document.getElementById('bigPrice').textContent='$'+c.pricePerPiece.toFixed(2);
  document.getElementById('lineTotal').textContent='$'+c.lineTotal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})+' line total';
}

function roundTo25(n){return Math.round(n/25)*25;}
function regenerateDefaultBreaks(){
  if(STATE.product==='bandana'){
    // Bandana breaks are always the 7 spreadsheet tier boundaries.
    // The "500+" row is represented as qty=500 but rendered with a "+" suffix.
    STATE.breaks=[...RATES.bandana.qtyTiers];
    return;
  }
  const b=activeQty();
  const tiers=[b,roundTo25(b+25),roundTo25(b+75),roundTo25(b+150)];
  STATE.breaks=[...new Set(tiers)].filter(n=>n>0).sort((a,b)=>a-b);
}
function sortBreaks(){STATE.breaks=[...new Set(STATE.breaks)].filter(n=>n>0).sort((a,b)=>a-b);}
function editBreakAt(i,newQty){
  const n=Number(newQty);
  if(!Number.isFinite(n)||n<1){renderAll();return;}
  if(STATE.product==='bandana'){
    // Snap the edit to the nearest valid tier
    const tiers=RATES.bandana.qtyTiers;
    let nearest=tiers[0];let bestDist=Math.abs(n-tiers[0]);
    for(const t of tiers){const d=Math.abs(n-t);if(d<bestDist){bestDist=d;nearest=t;}}
    STATE.breaks[i]=nearest;
    // Dedupe in case the snap collapsed two rows onto one tier
    STATE.breaks=[...new Set(STATE.breaks)].sort((a,b)=>a-b);
  } else {
    STATE.breaks[i]=Math.round(n);
    sortBreaks();
  }
  renderAll();
}

function deleteBreakAt(i){if(STATE.breaks.length<=1)return;STATE.breaks.splice(i,1);renderAll();}

function addCustomQty(){
  if(STATE.product==='bandana') return; // disabled on bandana
  const el=document.getElementById('addQtyInput');const n=Number(el.value);
  if(!Number.isFinite(n)||n<1)return;
  STATE.breaks.push(Math.round(n));sortBreaks();el.value='';renderAll();
}

function resetBreaks(){regenerateDefaultBreaks();renderAll();}

function renderBreaks(){
  const host=document.getElementById('breaksBody');
  const activeQ=activeQty();
  const isBandana=STATE.product==='bandana';
  const tiers=RATES.bandana.qtyTiers;
  const activeTierIdx=isBandana ? bandanaQtyTierIdx(activeQ) : -1;

  host.innerHTML=STATE.breaks.map((qty,i)=>{
    const c=computeAt(qty,STATE);
    // For bandana: highlight the tier the entered qty falls into (not exact match)
    // For apparel: highlight exact match with activeQty
    let isHighlighted;
    if(isBandana){
      const thisTierIdx=tiers.indexOf(qty);
      isHighlighted = (thisTierIdx===activeTierIdx);
    } else {
      isHighlighted = (qty===activeQ);
    }
    // Bandana "500+" label for the top tier
    const isTopTier=isBandana && qty===500;
    const qtyLabel=isTopTier ? '500+' : qty;
    const enteredTag = isHighlighted ? (isBandana ? ` (qty ${activeQ})` : ' (entered)') : '';
    // Bandana rows don't get inline edit or delete
    const qtyCell = isBandana
      ? `<span class="qty-cell" data-idx="${i}" title="Click to edit — will snap to nearest tier">${qtyLabel}${enteredTag}</span>`
      : `<span class="qty-cell" data-idx="${i}" title="Click to edit">${qtyLabel}${enteredTag}</span>`;
    const deleteCell = isBandana
      ? '<td></td>'
      : `<td>${STATE.breaks.length>1?`<button class="qty-delete" data-del="${i}" title="Remove">×</button>`:''}</td>`;

    if(c==null){
      return `<tr class="${isHighlighted?'hl':''}">
        <td>${qtyCell}</td>
        <td style="text-align:right;color:var(--muted);font-style:italic">not available</td>
        <td></td>
        ${deleteCell}
      </tr>`;
    }
    // Line total for bandana top tier uses activeQty if highlighted, else the tier's minimum qty
    const lineQty = isTopTier ? (isHighlighted ? activeQ : 500) : qty;
    const lineTotal = c.pricePerPiece * lineQty;
    return `<tr class="${isHighlighted?'hl':''}">
      <td>${qtyCell}</td>
      <td style="text-align:right">$${c.pricePerPiece.toFixed(2)}</td>
      <td style="text-align:right">$${lineTotal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
      ${deleteCell}
    </tr>`;
  }).join('');

  host.querySelectorAll('.qty-cell').forEach(el=>{
    el.addEventListener('click',()=>{
      const idx=Number(el.dataset.idx);const cur=STATE.breaks[idx];
      const input=document.createElement('input');input.type='number';input.value=cur;input.min=1;input.className='qty-cell-input';
      el.replaceWith(input);input.focus();input.select();
      let committed=false;const commit=()=>{if(committed)return;committed=true;editBreakAt(idx,input.value);};
      input.addEventListener('blur',commit);
      input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();commit();}else if(e.key==='Escape'){committed=true;renderAll();}});
    });
  });
  host.querySelectorAll('.qty-delete').forEach(el=>el.addEventListener('click',()=>deleteBreakAt(Number(el.dataset.del))));
  const add=document.getElementById('addQtyInput');
  if(add&&!add._wired){add._wired=true;add.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();addCustomQty();}});}

  // Show/hide the Add Qty + Reset footer based on product
  const addFooter=document.querySelector('.add-qty');
  if(addFooter) addFooter.style.display = isBandana ? 'none' : 'flex';

  // Update breaks header text based on product
  const breaksHead=document.getElementById('breaksHead');
  if(breaksHead){
    breaksHead.textContent = isBandana
      ? 'Bandana Price Tiers · your quantity tier is highlighted'
      : 'Quantity Price Breaks · click any qty to edit · sorted ascending';
  }
}

function attachTopListeners(){
  const bindNum=(id,f,isQty)=>{const el=document.getElementById(id);const h=()=>{STATE[f]=Number(el.value)||0;if(isQty)regenerateDefaultBreaks();renderAll();};el.addEventListener('input',h);el.addEventListener('change',h);};
  bindNum('qty','qty',true);
  bindNum('garmentCost','garmentCost',false);
  document.querySelectorAll('[data-toggle]').forEach(btn=>btn.addEventListener('click',()=>{STATE[btn.dataset.toggle]=!STATE[btn.dataset.toggle];renderAll();}));
  document.querySelectorAll('[data-preset]').forEach(btn=>btn.addEventListener('click',()=>applyPreset(btn.dataset.preset)));
  document.querySelectorAll('.product-tab:not(.disabled)').forEach(btn=>btn.addEventListener('click',()=>switchProduct(btn.dataset.product)));
}

function applyPreset(key){
  const newImp=()=>EMPTY_IMP();
  const presets={
    '1color':()=>{const i=newImp();i.type='Screenprint';i.screens=1;i.printType='Tees / Totes';STATE.impressions=[i];},
    '2color':()=>{const i=newImp();i.type='Screenprint';i.screens=2;i.printType='Tees / Totes';STATE.impressions=[i];},
    'frontback':()=>{const a=newImp(),b=newImp();a.type='Screenprint';a.screens=1;a.printType='Tees / Totes';b.type='Screenprint';b.screens=1;b.printType='Tees / Totes';STATE.impressions=[a,b];},
    'fleece3':()=>{const i=newImp();i.type='Screenprint';i.screens=3;i.printType='Fleece';STATE.impressions=[i];STATE.fleece=true;},
    'hemlabel':()=>{const i=newImp();i.type='Embroidery';i.embStitchBand='Hem Label Application';STATE.impressions=[i];}
  };
  if(presets[key]){presets[key]();renderAll();}
}

function resetAll(){if(!confirm('Clear all inputs and start over?'))return;location.reload();}

function downloadPDF(){
  const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'pt',format:'letter'});
  const pageW=doc.internal.pageSize.getWidth();const marginX=60;
  doc.setFillColor(13,13,11);doc.rect(0,0,pageW,80,'F');
  doc.setTextColor(232,232,50);doc.setFont('helvetica','bold');doc.setFontSize(22);
  doc.text('PINE PRINT SHOP',marginX,40);
  doc.setFontSize(10);doc.setTextColor(187,187,181);
  doc.text('QUANTITY PRICE BREAKDOWN',marginX,58);
  doc.setTextColor(13,13,11);
  const today=new Date();const dateStr=today.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  doc.text(dateStr,pageW-marginX,40,{align:'right'});
  let y=120;
  doc.setFont('helvetica','bold');doc.setFontSize(11);doc.text('SCOPE',marginX,y);y+=16;
  doc.setFont('helvetica','normal');doc.setFontSize(10);
  buildScopeLines().forEach(l=>{doc.text(l,marginX,y);y+=14;});
  y+=20;
  doc.setFillColor(242,242,238);doc.rect(marginX,y,pageW-marginX*2,26,'F');
  doc.setFont('helvetica','bold');doc.setFontSize(10);doc.setTextColor(136,136,128);
  doc.text('QUANTITY',marginX+12,y+17);doc.text('PRICE / PIECE',pageW/2+30,y+17);doc.text('LINE TOTAL',pageW-marginX-12,y+17,{align:'right'});
  doc.setTextColor(13,13,11);y+=26;
  const tiers=[...STATE.breaks].sort((a,b)=>a-b);
  tiers.forEach((qty,i)=>{
    const c=computeAt(qty,STATE);const is=qty===STATE.qty;
    if(is){doc.setFillColor(232,232,50);doc.rect(marginX,y,pageW-marginX*2,28,'F');}
    else if(i%2===1){doc.setFillColor(248,248,245);doc.rect(marginX,y,pageW-marginX*2,28,'F');}
    doc.setFont('helvetica','bold');doc.setFontSize(12);
    doc.text(qty+' pcs'+(is?'  ★':''),marginX+12,y+19);
    doc.setFont('courier','normal');doc.setFontSize(12);
    doc.text('$'+c.pricePerPiece.toFixed(2),pageW/2+30,y+19);
    doc.text('$'+c.lineTotal.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),pageW-marginX-12,y+19,{align:'right'});
    y+=28;
  });
  y+=20;
  doc.setFont('helvetica','italic');doc.setFontSize(8);doc.setTextColor(136,136,128);
  doc.text('Prices include 3% merchant fee. Rounded up to nearest $0.25.',marginX,y);
  doc.save('pine-quote-'+today.toISOString().slice(0,10)+'.pdf');
}

function buildScopeLines(){
  const lines=[];
  lines.push(`Qty: ${STATE.qty} pieces · Garment: $${(Number(STATE.garmentCost)||0).toFixed(2)}${STATE.fleece?' · Fleece':''}${STATE.shipping?' · Shipped':''}${STATE.asColourLow?' · AS Colour <$500':''}`);
  STATE.impressions.forEach((imp,idx)=>{
    if(!imp.type)return;
    let desc='';
    switch(imp.type){
      case'Screenprint':desc=`${imp.screens} screen${imp.screens>1?'s':''}, ${imp.printType}${imp.inkChanges?', '+imp.inkChanges+' ink changes':''}`;break;
      case'Supacolor':desc=`${imp.supRecipe} / ${imp.supSize}${imp.supImprintsPerGang>1?' · '+imp.supImprintsPerGang+' per gang':''}`;break;
      case'Decopress':desc=`${imp.decoMaterial} / ${imp.decoSize} · ${imp.decoApplication}`;break;
      case'Embroidery':desc=imp.embStitchBand;break;
      case'Size Tags 1C':desc='Gang sheet, 12 up';break;
    }
    lines.push(`Imp ${idx+1} (${imp.type}): ${desc}`);
  });
  return lines;
}


/* ============================================================
   S&S ACTIVEWEAR LOOKUP
   Ported from pine-purchasing-v46. Uses same Cloudflare Worker proxy.
   ============================================================ */
const SS_PROXY='https://pine-workers.stephen-dab.workers.dev/proxy';
const ssCache={}; // style key -> tier-price result

function ssPriceForSize(sku){
  // Use salePrice when it's lower than customerPrice (matches Purchasing logic).
  // Falls back to customerPrice, then piecePrice as last resort.
  if(sku.salePrice && sku.customerPrice && sku.salePrice < sku.customerPrice) return sku.salePrice;
  return sku.customerPrice || sku.piecePrice || 0;
}

function ssExtractTiers(products){
  // Group SKUs by size tier, take the max price in each tier (defensive).
  const TIER_SZ={'XS':'c1','S':'c1','M':'c1','L':'c1','XL':'c1','2XL':'c2','3XL':'c3','4XL':'c4','5XL':'c4','OSFA':'c1'};
  const tiers={c1:0,c2:0,c3:0,c4:0};
  products.forEach(p=>{
    const size=(p.sizeName||'').toUpperCase();
    const tier=TIER_SZ[size]||'c1';
    const price=ssPriceForSize(p);
    if(price && price>tiers[tier]) tiers[tier]=price;
  });
  return tiers;
}

function renderSSBanner(state){
  const el=document.getElementById('ssBanner');
  if(!el) return;
  if(state.kind==='hidden'){el.style.display='none';el.innerHTML='';return;}
  el.style.display='flex';
  el.className='ss-banner';
  if(state.kind==='loading'){
    el.classList.add('loading');
    el.innerHTML=`<span class="ss-spinner"></span><span class="ss-banner-name">Looking up ${escHtml(state.style)} on S&amp;S…</span>`;
    return;
  }
  if(state.kind==='error'){
    el.classList.add('error');
    el.innerHTML=`<span class="ss-banner-name">${escHtml(state.message)}</span><button class="ss-banner-close" onclick="ssClearBanner()">Dismiss</button>`;
    return;
  }
  // Success
  const t=state.tiers;
  const priceChips=[];
  if(t.c1) priceChips.push(`<span class="ss-banner-price"><span class="lbl">XS-XL:</span><strong>$${t.c1.toFixed(2)}</strong></span>`);
  if(t.c2) priceChips.push(`<span class="ss-banner-price"><span class="lbl">2XL:</span><strong>$${t.c2.toFixed(2)}</strong></span>`);
  if(t.c3) priceChips.push(`<span class="ss-banner-price"><span class="lbl">3XL:</span><strong>$${t.c3.toFixed(2)}</strong></span>`);
  if(t.c4 && t.c4!==t.c3) priceChips.push(`<span class="ss-banner-price"><span class="lbl">4XL+:</span><strong>$${t.c4.toFixed(2)}</strong></span>`);
  el.innerHTML=
    `<span class="ss-banner-name">${escHtml(state.productName)}</span>`+
    `<div class="ss-banner-prices">${priceChips.join('')}</div>`+
    `<button class="ss-banner-close" onclick="ssClearBanner()">Dismiss</button>`;
}

function ssClearBanner(){renderSSBanner({kind:'hidden'});}

function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

async function ssLookup(){
  const input=document.getElementById('ssStyle');
  const raw=(input.value||'').trim();
  if(!raw){input.focus();return;}
  // Send the style number DIRECTLY to the worker. No map, no translation.
  // Worker forwards as ?style=<raw> to S&S, which accepts style numbers like "1717", "3001",
  // or brand-qualified like "Gildan 5000".
  const key=raw.toLowerCase();
  if(ssCache[key]){
    applySSResult(ssCache[key]);
    return;
  }
  renderSSBanner({kind:'loading',style:raw});
  try{
    const resp=await fetch(`${SS_PROXY}/products/${encodeURIComponent(raw)}/`);
    const ct=resp.headers.get('content-type')||'';
    if(!ct.includes('json')) throw new Error(`S&S returned non-JSON (${resp.status})`);
    const products=await resp.json();
    // S&S returns an errors array on not-found rather than an empty products array
    if(!Array.isArray(products)){
      const msg=(products && products.errors && products.errors[0] && products.errors[0].message) || 'Style not found on S&S';
      throw new Error(msg);
    }
    if(!products.length) throw new Error('Style not found on S&S');
    const tiers=ssExtractTiers(products);
    const productName=(products[0].styleName||raw).toUpperCase();
    const brand=products[0].brandName||'';
    const fullName=brand ? `${brand} ${productName}` : productName;
    const result={productName:fullName, tiers, style:raw};
    ssCache[key]=result;
    applySSResult(result);
  } catch(e){
    renderSSBanner({kind:'error',message:`Lookup failed for "${raw}": ${e.message}. You can type the garment cost manually.`});
  }
}

function applySSResult(result){
  renderSSBanner({kind:'success',productName:result.productName,tiers:result.tiers});
  // Fill Garment Cost with XS-XL price
  if(result.tiers.c1){
    const gc=document.getElementById('garmentCost');
    gc.value=result.tiers.c1.toFixed(2);
    STATE.garmentCost=result.tiers.c1;
    renderAll();
  }
}

// Wire Enter key on the style input
(function(){
  const tryWire=()=>{
    const el=document.getElementById('ssStyle');
    if(el && !el._wired){
      el._wired=true;
      el.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();ssLookup();}});
    }
  };
  // Try now and on DOM load
  tryWire();
  document.addEventListener('DOMContentLoaded',tryWire);
})();

regenerateDefaultBreaks();
attachTopListeners();
renderAll();

</script>
