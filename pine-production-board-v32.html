<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pine Central — Production Board v32</title>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
:root{
  --bg:#F2F2EE; --surface:#fff; --bg-soft:#F8F8F5;
  --border:#E5E5E0; --border-dk:#D0D0CA;
  --text:#0D0D0B; --muted:#4A4A44; --muted-lt:#888880;
  --yellow:#E8E832; --green:#1e6b45; --red:#c0392b; --amb:#b7791f; --amb-bg:#faf2e2;
  --sb-bg:#0A0A08;
  --sans:Helvetica,Arial,sans-serif; --mono:'Courier New',monospace;
  --divider:#D0D0CA;
  --platen:#9A7B2E; --platen-ln:#E0B062;
  /* Fluid scale (v23): board grows with the display — fits a laptop, fills a 44" TV,
     never clips. The row is tuned to occupy ~91% of a column at ANY width (see the
     +1.85vw margin), so the full imprint ID always fits. Tune here; all sizes scale together. */
  --c-icon:clamp(18px,1.55vw,60px);   /* icon column width */
  --c-lc:clamp(26px,2.5vw,96px);      /* location column width */
  --c-nc:clamp(16px,1.5vw,58px);      /* colors column width */
  --c-gap:clamp(4px,0.5vw,16px);      /* row column gap */
  --c-qtmin:clamp(38px,3.4vw,120px);  /* qty min width */
  --f-id:clamp(16px,1.5vw,64px);      /* imprint ID (priority — sized to always fit) */
  --f-qt:clamp(15px,1.4vw,56px);      /* qty */
  --f-lc:clamp(11px,1.05vw,42px);     /* location / colors text */
  --f-icon:clamp(14px,1.3vw,50px);    /* status glyph */
  --f-hdr:clamp(15px,1.5vw,60px);     /* column header (PRESS 1) */
  --f-rib:clamp(9px,0.8vw,26px);      /* split ribbon */
  --f-title:clamp(20px,1.9vw,64px);   /* PRODUCTION title */
  --f-date:clamp(16px,1.55vw,52px);   /* date */
  /* Sticky-note fluid sizing (v25) — scales with the display like everything else */
  --note-w:clamp(150px,14vw,460px);   /* note width */
  --note-h:clamp(110px,10vw,330px);   /* note min height */
  --note-fs:clamp(14px,1.25vw,40px);  /* note text */
  --note-bar:clamp(20px,1.7vw,54px);  /* grab bar height */
  --note-btn:clamp(18px,1.5vw,46px);  /* rotate/delete hit area */
  --note-btnfs:clamp(13px,1.05vw,30px);
  --note-grip:clamp(11px,0.9vw,26px);
  --note-padx:clamp(9px,0.9vw,26px);
  --note-padb:clamp(11px,1vw,30px);
  --note-barpad:clamp(6px,0.6vw,16px);
  --note-rz:clamp(15px,1.5vw,36px);    /* resize grip (bottom-right corner) */
}
/* Dark theme overrides for the TV */
.pb.dark{
  --bg:#0A0A08; --surface:#141410; --bg-soft:#101010;
  --border:#26261F; --border-dk:#33332A;
  --text:#F2F2EE; --muted:#BBBBB5; --muted-lt:#888880; --amb-bg:#2a2213;
  --divider:#2A2A22;
  --platen:#E0B062; --platen-ln:#7A6020;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
.pb{height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ── Top bar ── */
.pbtop{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:2px solid var(--text);background:var(--surface)}
.pbtitle{font-weight:700;font-size:var(--f-title);letter-spacing:.06em}
.pbdate{font-weight:700;font-size:var(--f-date);color:var(--text)}
.pbdate .dow{color:var(--muted-lt);font-size:clamp(11px,0.9vw,26px);letter-spacing:.08em;text-transform:uppercase;margin-right:8px;font-weight:700}
.pbnav{display:flex;align-items:center;gap:6px}
.nav-btn{font-size:16px;font-weight:700;width:34px;height:34px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.nav-btn:hover{border-color:var(--text)}
.pb-spacer{flex:1}
.pbctl{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:7px 13px;border-radius:20px;border:1px solid var(--border-dk);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap}
.pbctl:hover{border-color:var(--text);color:var(--text)}
.pbctl.on{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.pb-asn-tag{font-size:11px;font-weight:700;color:var(--amb);letter-spacing:.04em;text-transform:uppercase}

/* ── Grid ── */
.pbgrid{flex:1;display:grid;min-height:0;overflow:hidden}
.pbcol{border-right:1px solid var(--divider);min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pbcol:last-child{border-right:none}
.pbch{flex-shrink:0;padding:clamp(10px,1vw,28px);border-bottom:3px solid}
.pbcm{font-weight:700;font-size:var(--f-hdr);letter-spacing:.04em}
.pbops{display:flex;flex-wrap:wrap;gap:clamp(4px,0.5vw,12px);margin-top:8px;min-height:clamp(22px,1.8vw,52px)}
.op{font-size:clamp(13px,1.1vw,34px);font-weight:700;background:var(--sb-bg);color:var(--yellow);border-radius:4px;padding:clamp(5px,0.5vw,14px) clamp(9px,0.9vw,24px);letter-spacing:.02em;cursor:pointer}
.op .x{opacity:.5;margin-left:5px}
.op:hover .x{opacity:1}
.op-add{font-size:clamp(12px,1.05vw,32px);font-weight:700;color:var(--muted-lt);border:1px dashed var(--border-dk);border-radius:4px;padding:clamp(5px,0.5vw,14px) clamp(9px,0.9vw,24px);cursor:pointer}
.op-add:hover{border-color:var(--text);color:var(--text)}

.pbrows{flex:1;overflow-y:auto;padding:6px 6px 12px}
.jr{display:grid;grid-template-columns:var(--c-icon) 1fr var(--c-lc) var(--c-nc) auto;gap:var(--c-gap);align-items:center;padding:clamp(8px,0.85vw,26px) clamp(6px,0.6vw,18px);position:relative;cursor:pointer}
.jr:hover{background:var(--bg-soft)}
.jr.done .st,.jr.done .iid,.jr.done .lc,.jr.done .nc,.jr.done .qt{color:var(--muted-lt)}
.jr.done::after{content:"";position:absolute;left:6px;right:8px;top:50%;height:3px;background:var(--text);border-radius:2px;pointer-events:none}
.jr+.jr{border-top:1px solid var(--bg-soft)}
/* Arrange mode (v31) — local reorder within a press; drag styling only, no data writes */
.pb.arranging .jr{cursor:grab}
.pb.arranging .jr:active{cursor:grabbing}
.pb.arranging .jr .iid{cursor:grab;text-decoration:none}
.pb.arranging .jr::before{content:"\2630";position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--muted-lt);pointer-events:none;opacity:.7}
.jr.dragging{opacity:.4}
.jr.drop-above{box-shadow:inset 0 3px 0 var(--green)}
.jr.drop-below{box-shadow:inset 0 -3px 0 var(--green)}
.jr.split.drop-above{box-shadow:inset 3px 0 0 var(--amb),inset 0 3px 0 var(--green)}
.jr.split.drop-below{box-shadow:inset 3px 0 0 var(--amb),inset 0 -3px 0 var(--green)}
.pbrows.drop-col{background:var(--green-lt);outline:2px dashed var(--green);outline-offset:-4px}
#arrangeBadge{display:none;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--amb);background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:20px;padding:5px 12px;white-space:nowrap}
#arrangeBadge.on{display:inline-flex}
#arrangeReset{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--amb);background:none;border:1px solid var(--amb-bd);border-radius:20px;padding:2px 9px;cursor:pointer}
#arrangeReset:hover{background:var(--surface)}
.jr .st{font-size:var(--f-icon);text-align:center;line-height:1}
.jr .iid{font-family:var(--mono);font-weight:700;font-size:var(--f-id);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jr .lc{font-size:var(--f-lc);font-weight:700;color:var(--muted);text-align:center}
.jr .nc{font-family:var(--mono);font-size:var(--f-lc);color:var(--muted);text-align:center}
.jr .qt{font-family:var(--mono);font-weight:700;font-size:var(--f-qt);text-align:right;min-width:var(--c-qtmin)}
/* Split job (v22/v23): amber ribbon strip above a normal data row.
   The left bar is an inset box-shadow — draws the same 3px line but costs ZERO
   layout width, so a split row is never tighter than a normal one (was clipping the ID). */
.ribbonA{font-family:var(--sans);font-size:var(--f-rib);font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--amb);background:var(--amb-bg);padding:clamp(3px,0.35vw,10px) clamp(8px,0.8vw,22px);margin:6px 0 0;box-shadow:inset 3px 0 0 var(--amb)}
.ribbonA + .jr.split{padding-top:clamp(6px,0.6vw,18px)}
.jr.split{box-shadow:inset 3px 0 0 var(--amb)}
.pdiv{display:flex;align-items:center;gap:9px;padding:8px 6px}
.pdiv .ln{flex:1;height:2px;background:var(--platen-ln)}
.pdiv .tx{font-size:14px;font-weight:700;color:var(--platen);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.col-empty{padding:22px 12px;color:var(--muted-lt);font-size:16px;font-style:italic}

/* ── Legend ── */
.pbleg{flex-shrink:0;display:flex;gap:26px;align-items:center;padding:12px 20px;border-top:1px solid var(--divider);background:var(--bg-soft)}
.lg{font-size:16px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:7px}
.lgln{display:inline-block;width:18px;height:2px;background:var(--platen-ln)}
.pb-upd{margin-left:16px;font-size:12px;color:var(--muted-lt);font-weight:700}
.pb-shop{margin-left:auto;font-size:15px;font-weight:700;color:var(--text)}
.pbstats{flex-shrink:0;display:grid;border-top:2px solid var(--text);background:var(--surface)}
.ps-cell{border-right:1px solid var(--divider);padding:10px 14px;min-width:0}
.ps-cell:last-child{border-right:none}
.ps-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.ps-lbl{font-weight:700;font-size:14px;letter-spacing:.04em}
.ps-pct{font-family:var(--mono);font-weight:700;font-size:17px}
.ps-bar{height:11px;border-radius:6px;background:var(--bg-soft);border:1px solid var(--border);overflow:hidden;margin:7px 0 5px}
.ps-fill{height:100%;border-radius:6px 0 0 6px;transition:width .5s ease}
.ps-sub{font-family:var(--mono);font-size:13px;color:var(--muted)}
.ps-stretch{font-size:12px;font-weight:700;color:var(--muted-lt);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-stretch.hot{color:var(--green)}
.ps-stretch.prep{color:var(--amb)}
.ps-stretch[data-col]{cursor:pointer}
.ps-stretch[data-col]:hover{text-decoration:underline}
.sg-sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--green);margin:14px 0 8px}
.sg-sec.amb{color:var(--amb)}
.sg-row{border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:var(--bg-soft)}
.sg-row.rec{border-color:var(--green);background:var(--green-lt,#e8f5ee)}
.sg-row-top{display:flex;align-items:center;justify-content:space-between;gap:8px}
.sg-iid{font-size:18px;font-weight:700;font-family:var(--mono);letter-spacing:-.01em}
.sg-rec-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--green)}
.sg-cust{font-size:13px;font-weight:700;margin-top:3px}
.sg-garm{font-size:12px;color:var(--muted);margin-top:1px}
.sg-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.sg-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 7px;border-radius:4px;border:1px solid var(--border-dk);background:var(--surface);color:var(--muted);white-space:nowrap}
.sg-tag.qty{background:var(--sb-bg);color:var(--yellow);border-color:var(--sb-bg)}
.sg-empty{font-size:13px;color:var(--muted);padding:8px 0}
.ps-empty{color:var(--muted-lt);font-size:13px;font-style:italic;padding-top:6px}

/* ── Modal (assign / roster / token) ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50}
.ov.on{display:flex}
.modal{background:var(--surface);color:var(--text);border-radius:10px;border:1px solid var(--border-dk);width:min(440px,92vw);max-height:86vh;overflow:auto;padding:18px 20px}
.modal h3{font-size:15px;font-weight:700;letter-spacing:.02em;margin-bottom:3px}
.modal .sub{font-size:12px;color:var(--muted-lt);margin-bottom:14px}
.chipwrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pick{font-size:14px;font-weight:700;padding:7px 12px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer}
.pick.sel{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.pick.sel::after{content:' ✓'}
.pick .rm{color:var(--red);margin-left:7px;font-weight:700;opacity:.6}
.pick .rm:hover{opacity:1}
.addrow{display:flex;gap:8px;margin:10px 0 4px}
.addrow input{flex:1;font-size:14px;padding:8px 10px;border:1px solid var(--border-dk);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--sans)}
.btn{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:8px 14px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--text)}
.btn.primary{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
.hint{font-size:11px;color:var(--muted-lt)}
.loader{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--sb-bg);color:var(--yellow);font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;z-index:60;display:none}
.loader.on{display:block}
.verbadge{font-size:10px;color:var(--muted-lt);font-weight:700;font-family:var(--mono)}
/* ── Imprint overview popup (v27) — tap an Imprint ID for a read-only order-at-a-glance ── */
.jr .iid{cursor:pointer}
.jr .iid:hover{text-decoration:underline;text-decoration-thickness:2px;text-underline-offset:3px}
.iov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:70;padding:20px}
.iov.on{display:flex}
.icard{background:var(--surface);color:var(--text);border-radius:12px;border:1px solid var(--border-dk);width:min(720px,95vw);max-height:92vh;overflow:auto;box-shadow:0 12px 44px rgba(0,0,0,.35)}
.ic-top{display:flex;align-items:flex-start;gap:12px;padding:16px 18px 12px;border-bottom:1px solid var(--border)}
.ic-id{font-family:var(--mono);font-weight:700;font-size:30px;line-height:1;letter-spacing:-.01em}
.ic-sub{font-size:15px;font-weight:700;margin-top:7px}
.ic-ord{font-family:var(--mono);color:var(--muted-lt);font-weight:700}
.ic-x{margin-left:auto;font-size:24px;line-height:1;color:var(--muted-lt);cursor:pointer;border:none;background:none;padding:0 4px;flex-shrink:0}
.ic-x:hover{color:var(--text)}
.ic-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.ic-chip{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:3px 10px;border-radius:20px;border:1px solid var(--border-dk);color:var(--muted);white-space:nowrap}
.ic-chip.hard{background:#fdece9;border-color:var(--red);color:var(--red)}
.ic-chip.asap{background:#eef7f1;border-color:var(--green);color:var(--green)}
.ic-chip.split{background:var(--amb-bg);border-color:var(--amb);color:var(--amb)}
.ic-body{padding:14px 18px 18px}
.ic-mock{width:100%;height:clamp(240px,48vh,520px);background:var(--bg-soft);border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-bottom:10px;cursor:zoom-in}
.ic-mock img{max-width:100%;max-height:100%;display:block}
.ic-mock .ph{color:var(--muted-lt);font-size:13px;font-weight:700;padding:24px;text-align:center}
.ic-pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:14px}
.ic-pg{font-size:20px;font-weight:700;line-height:1;width:38px;height:32px;border-radius:8px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center}
.ic-pg:hover:not(:disabled){border-color:var(--text)}
.ic-pg:disabled{opacity:.35;cursor:default}
.ic-pgn{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--muted);min-width:56px;text-align:center}
.ic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px 18px}
.ic-f{display:flex;flex-direction:column;gap:2px;min-width:0}
.ic-fl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt)}
.ic-fv{font-size:15px;font-weight:700;word-break:break-word}
.ic-notes{margin-top:4px}
.ic-note{background:var(--bg-soft);border:1px solid var(--border);border-left:3px solid var(--amb);border-radius:6px;padding:9px 12px;margin-top:9px;font-size:13px;white-space:pre-wrap;line-height:1.42}
.ic-note .ic-fl{display:block;margin-bottom:3px}
.draw-canvas{position:fixed;inset:0;z-index:40;pointer-events:none;touch-action:none}
.draw-canvas.on{pointer-events:auto;cursor:crosshair}
.draw-tools{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:45;display:none;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border-dk);border-radius:30px;padding:9px 16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.draw-tools.on{display:flex}
.dt-sw{width:26px;height:26px;border-radius:50%;border:2px solid var(--border-dk);cursor:pointer;padding:0}
.dt-sw.sel{border-color:var(--text);transform:scale(1.14)}
.dt-sep{width:1px;height:26px;background:var(--border)}
.dt-size{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-dk);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.dt-size.sel{border-color:var(--text)}
.dt-size i{background:var(--text);border-radius:50%;display:block}
.dt-btn{font-size:14px;font-weight:700;padding:8px 13px;border-radius:20px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap}
.dt-btn:hover{border-color:var(--text)}
.dt-btn.sel{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.dt-stamps{display:flex;align-items:center;gap:5px;max-width:44vw;overflow-x:auto;overflow-y:hidden;padding:2px 0}
.dt-stamp{flex:0 0 auto;width:34px;height:34px;padding:0;border:2px solid var(--border-dk);background:#fff;border-radius:50%;cursor:pointer;overflow:hidden}
.dt-stamp:hover{border-color:var(--text)}
.dt-stamp.sel{border-color:var(--yellow);box-shadow:0 0 0 2px var(--yellow)}
.dt-stamp img{width:100%;height:100%;object-fit:cover;object-position:50% 32%;display:block}
.dt-tip{position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-100%);background:var(--sb-bg);color:var(--yellow);font-size:12px;font-weight:700;letter-spacing:.04em;padding:4px 9px;border-radius:5px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.25);opacity:0;transition:opacity .05s}
.dt-tip.show{opacity:1}
.dt-tip::after{content:"";position:absolute;left:50%;top:100%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--sb-bg)}
.draw-canvas.stamping{cursor:copy}
/* ── Time Off ─────────────────────────────── */
.pbgridwrap{flex:1;position:relative;min-height:0;display:flex}
.bnd{width:calc(var(--f-icon)*0.85);height:calc(var(--f-icon)*0.85);fill:currentColor;vertical-align:-4px;display:inline-block}
.to-panel{position:absolute;right:16px;bottom:16px;width:320px;max-height:calc(100% - 28px);display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border-dk);border-radius:10px;box-shadow:0 6px 22px rgba(0,0,0,.20);z-index:30;overflow:hidden}
.to-panel.collapsed{max-height:none}
.to-panel.collapsed .to-body{display:none}
.to-panel.collapsed .to-add{display:none}
.to-panel.collapsed .to-h{border-bottom:none}
.to-collapse{font-size:13px;line-height:1;color:var(--muted-lt);background:none;border:none;cursor:pointer;padding:2px 4px;transition:transform .15s}
.to-panel.collapsed .to-collapse{transform:rotate(180deg)}
.to-out-ind{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#fff;background:var(--red);border-radius:3px;padding:2px 7px}
.to-out-ind:empty{display:none}
.to-nm{flex:1;min-width:0}
.to-rt{display:flex;align-items:center;gap:8px;flex-shrink:0}
.to-del{font-size:15px;line-height:1;color:var(--muted-lt);background:none;border:none;cursor:pointer;padding:0 3px;border-radius:4px}
.to-del:hover{color:var(--red)}
.to-del.armed{color:#fff;background:var(--red);font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px}
.to-panel.on{display:flex}
.to-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:2px solid var(--text);cursor:move;user-select:none}
.to-t{font-weight:700;font-size:15px;letter-spacing:.06em;color:var(--text)}
.to-h-btns{display:flex;align-items:center;gap:6px}

.to-x{font-size:18px;line-height:1;color:var(--muted-lt);background:none;border:none;cursor:pointer;padding:2px 6px}
.to-body{flex:1;overflow:auto;padding:4px 0 8px}
.to-sec{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);padding:10px 14px 3px}
.to-row{display:flex;align-items:baseline;justify-content:space-between;gap:10px;padding:6px 14px}
.to-row .to-nm{font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}

.to-badge{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;background:var(--red);color:#fff;border-radius:3px;padding:2px 6px}
.to-pend{font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--amb);border:1px solid var(--amb);border-radius:3px;padding:2px 6px;cursor:pointer}
.to-none{padding:8px 14px;font-size:12px;color:var(--muted-lt)}
.to-form{display:flex;flex-direction:column;gap:10px;margin:6px 0 4px}
.to-form label{display:flex;flex-direction:column;gap:4px;font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:var(--muted)}
.to-form input{font-size:14px;padding:8px 10px;border:1px solid var(--border-dk);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--sans)}
.to-form .opt{font-weight:400;text-transform:none;letter-spacing:0;color:var(--muted-lt)}
.to-form-row{display:flex;gap:10px}
.to-form-row label{flex:1}
.to-err{color:var(--red);font-size:12px;font-weight:600;min-height:16px;margin:8px 0 2px}

/* ── Sticky notes (v24/v25): float over the board; pass-through layer, notes are interactive ── */
.notes-layer{position:fixed;inset:0;z-index:35;pointer-events:none}
.note{position:absolute;width:var(--note-w);min-height:var(--note-h);pointer-events:auto;
  background:linear-gradient(155deg,#e4f66a 0%,#d4ef44 55%,#c6e735 100%);

  display:flex;flex-direction:column;transform-origin:center center;transition:box-shadow .12s;

<script>
// ══════════════════════════════════════════════════
// CONFIG / DATA LAYER  (lifted from pine-scheduler — identical plumbing)
// ══════════════════════════════════════════════════
const BASE  = 'appJkaLk8DykjsgHR';
const TABLE = 'tbln9oAGvz2PNBZLV';
const F = {
  screens:  'fld8rgkIj1RPO97QU',
  press:    'fldv59OGU7EkBVofo',
  qty:      'fldFipR4ddfqMPeAX',   // Active Impressions
  start:    'fldfqtIgcEfIlIeQk',   // Scheduled Start Time
  ink:      'fldjNCuaGOkWgzH2K',
  client:   'fldeLMIAC0ABQAjYJ',
  loc:      'fldKQIL0rSJBSeC8S',
  garment:  'fldyyFoiKCgGOpsGX',
  imprintId:'fldHjjQ5lzm66ox5j',
  ready:    'fldzVhAgy4FnzQX2a',
  runSecs:  'fldvAqPl6Yq3bxASW',  // Run Time (seconds) — scheduler's planned duration
  complete: 'fldFuDZ68QdUMt3pM',  // Run Complete checkbox — operator app ticks this on finish
  runEnd:   'fldtoIc7CRd5sXeBS',  // Run End Actual (last-modified time of the complete checkbox)
  liLink:   'fldsvntAy1QHEoDAg',  // Line Items link — used to sum ordered qty as a stable fallback
};
const FIELDS = [F.screens,F.press,F.qty,F.start,F.ink,F.client,F.loc,F.garment,F.imprintId,F.ready,F.complete,F.runEnd,F.runSecs,F.liLink];
const FP = FIELDS.map(f=>'fields[]='+f).join('&');
const BASE_URL = `https://api.airtable.com/v0/${BASE}/${TABLE}?${FP}&returnFieldsByFieldId=true&pageSize=100`;

// Board columns — each maps to one or more Equipment values.
const COLS = [
  {key:'p1',  label:'PRESS 1',    tint:'#C9C5F0', bar:'#4038B0', match:['Press 1 - ROQ NEXT']},
  {key:'p2',  label:'PRESS 2',    tint:'#B3D5EE', bar:'#1565A0', match:['Press 2 - ROQ YOU']},
  {key:'emb', label:'EMBROIDERY', tint:'#DCC6F4', bar:'#6B2FB5', match:['Embroidery - TAJIMA 6-Head'], contains:['embroider','tajima']},
  {key:'heat',label:'HEAT PRESS', tint:'#B6DEE5', bar:'#0E7C8C', match:['Heat press - D3','Heat press - Tag Press','Heat press - Hat Press'], contains:['heat press']},
  {key:'flat',label:'FLATSTOCK',  tint:'#EFE2C2', bar:'#8A6D1E', match:['Flatstock - M&R Saturn'], contains:['flatstock','saturn']},
];
function colOf(pressName){
  if(!pressName) return null;
  for(const c of COLS){ if(c.match.includes(pressName)) return c; }
  const p = pressName.toLowerCase();
  for(const c of COLS){ if((c.contains||[]).some(s=>p.includes(s))) return c; }
  return null;
}

// ── SPLIT PRESS (v20) ─────────────────────────────────────────────────────
// A single imprint tagged Equipment "Press 1 & 2 - SPLIT" runs across BOTH presses
// at once. colOf() returns null for it (no column match), so before this it fell off
// the board entirely. Mirror operator v110 / catching v135: show the imprint on P1 and
// P2, auto-halving the qty — ceil to P1, floor to P2 — so odd totals reconcile exactly
// (2500 -> 1250+1250, 401 -> 201+200). Each half gets a SYNTHETIC id ('rec...#p1'/'#p2')
// so the board's per-card done-override, impression snapshot, and jobIndex — all keyed on
// job id — track the two halves independently instead of colliding on the shared record id.
function isSplitPress(name){ return !!name && name.toLowerCase().includes('split'); }
function splitHalves(j){
  const full = j.qty||0;
  const mk = (suf,half,q,ck)=> Object.assign({}, j, {
    id: j.id+suf, realId: j.id, qty: q,
    isSplit:true, splitHalf:half, splitFull:full, splitCol:ck
  });
  return [ mk('#p1','P1',Math.ceil(full/2),'p1'), mk('#p2','P2',Math.floor(full/2),'p2') ];
}
// Route a parsed job into its column bucket(s). Non-split behaves exactly as before, unless a
// local cross-press move (moveMap) redirects it. Split jobs ignore moveMap (never movable).
function pushJobToCols(j, groups, moveMap){
  if(isSplitPress(j.pressName)){
    const [p1,p2] = splitHalves(j);
    if(groups.p1) groups.p1.push(p1);
    if(groups.p2) groups.p2.push(p2);
    return;
  }
  let c = colOf(j.pressName);
  if(moveMap && (j.id in moveMap)){                 // local move override (v32) → new press column
    const mc = COLS.find(x=>x.key===moveMap[j.id]);
    if(mc) c = mc;
  }
  if(c && groups[c.key]) groups[c.key].push(j);
}

const LOC_ABBR = {
  'back':'Bk','front':'F','left chest':'LC','right chest':'RC','left sleeve':'LS','right sleeve':'RS',
  'back hem':'BH','front hem':'FH','size tag':'Tag','pocket':'Pkt','hood':'Hd','bandana':'Dana',
  'tea towel':'TT','flatstock':'Pos','multiple locations':'Mult'
};
function abbrLoc(loc){
  if(!loc) return '';
  const k = loc.toLowerCase().trim();
  if(LOC_ABBR[k]) return LOC_ABBR[k];
  return loc.length<=4 ? loc : loc.slice(0,3);
}

// ── default roster (editable in-app) ──
const DEFAULT_ROSTER = ['TJ','Gabe','Erik','Dawson','Dylan','Kyle','Whitney','Hannah','Juan','Garrett','Chris','Austin'];

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let target = new Date();           // the day being viewed
let dayJobs = {};                  // { colKey: [job,...] }
let stretchJobs = {};              // { colKey: [job,...] } — tomorrow's READY jobs, candidate stretch work
let prepJobs = {};                 // { colKey: [job,...] } — tomorrow's NOT-ready jobs, for the prep hint
let pickerCol = null;              // col key being assigned in the modal

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOWS=['SUN','MON','TUE','WED','THU','FRI','SAT'];

// Local-day string (floor time, not UTC) — board groups by the local print date.
function localDateStr(d){ const x=new Date(d); const off=x.getTimezoneOffset(); return new Date(x.getTime()-off*60000).toISOString().slice(0,10); }
function todayLocal(){ return localDateStr(new Date()); }

function dbg(){ try{ console.log.apply(console, arguments);}catch(e){} }
function setLoader(t){ const l=document.getElementById('loader'); if(t){l.textContent=t;l.classList.add('on');} else l.classList.remove('on'); }

// ── token ──
// storage that never throws — board stays usable even where localStorage is blocked (sandboxes, locked-down browsers)
function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }

function bootToken(){
  window.AT_KEY = lsGet('pine_at_key') || '';
  return !!window.AT_KEY;
}

// ── localStorage: roster + assignments ──
function getRoster(){
  try{ const r=JSON.parse(lsGet('pine_pb_roster')); if(Array.isArray(r)&&r.length) return r; }catch(e){}
  return DEFAULT_ROSTER.slice();
}
function saveRoster(arr){ lsSet('pine_pb_roster', JSON.stringify(arr)); }
function getAssignAll(){ try{ return JSON.parse(lsGet('pine_pb_assign'))||{}; }catch(e){ return {}; } }
function getAssign(ds, colKey){ const all=getAssignAll(); return (all[ds]&&all[ds][colKey])||[]; }
// ── done / crossed-off marks (per day, by imprint record id) ──
function getDoneAll(){ try{ return JSON.parse(lsGet('pine_pb_done'))||{}; }catch(e){ return {}; } }
let doneMem={};   // in-memory cache so cross-offs reflect instantly without a refresh
function getDone(ds){ if(!(ds in doneMem)) doneMem[ds]=getDoneAll()[ds]||[]; return doneMem[ds]; }
function getDoneTsAll(){ try{ return JSON.parse(lsGet('pine_pb_donets'))||{}; }catch(e){ return {}; } }
let doneTsMem=null;
function getDoneTs(ds){ if(!doneTsMem) doneTsMem=getDoneTsAll(); if(!doneTsMem[ds]) doneTsMem[ds]={}; return doneTsMem[ds]; }
// ── press-complete overrides (per day, by imprint id) ──
// auto-done = the operator's Run Complete checkbox. A tap on the board records a LOCAL
// override that can force the opposite either way; the override is dropped automatically
// once the press agrees with it again, so it never goes stale.
function getOvrAll(){ try{ return JSON.parse(lsGet('pine_pb_cross'))||{}; }catch(e){ return {}; } }
let ovrMem=null;
function migrateCross(cross){
  try{ const legacy=JSON.parse(lsGet('pine_pb_done'))||{};   // fold old manual cross-offs in once
    Object.keys(legacy).forEach(ds=>{ (legacy[ds]||[]).forEach(id=>{
      if(!cross[ds]) cross[ds]={}; if(cross[ds][id]===undefined) cross[ds][id]=true; }); });
  }catch(e){}
  return cross;
}
function getOvr(ds){ if(!ovrMem) ovrMem=migrateCross(getOvrAll()); if(!ovrMem[ds]) ovrMem[ds]={}; return ovrMem[ds]; }
function saveOvr(){ try{ lsSet('pine_pb_cross', JSON.stringify(ovrMem||{})); }catch(e){} }

// ── local run-order (v31) — Arrange mode ──
// Day-keyed, per-press sequence of row ids the production manager set by dragging. Lives only
// on this browser (the TV's computer); never written to Airtable. On load, each column sorts by
// this list first; jobs the manager hasn't touched fall in after, by scheduled start. Day-scoped,
// so an arrangement clears itself tomorrow. Row ids match the render ids (split halves use '…#p1').
let arrangeMode=false;
let orderMem=null;
function getOrderAll(){ try{ return JSON.parse(lsGet('pine_pb_order'))||{}; }catch(e){ return {}; } }
function getOrderDay(ds){ if(!orderMem) orderMem=getOrderAll(); if(!orderMem[ds]) orderMem[ds]={}; return orderMem[ds]; }
function saveOrder(){ try{ lsSet('pine_pb_order', JSON.stringify(orderMem||{})); }catch(e){} }
function dayHasOrder(ds){ const d=getOrderDay(ds); return COLS.some(c=> Array.isArray(d[c.key]) && d[c.key].length); }
function clearDayOrder(ds){ const d=getOrderDay(ds); COLS.forEach(c=> delete d[c.key]); saveOrder(); }
// Reorder one column's jobs: saved ids first (in saved order), then the rest by scheduled start.
function applyLocalOrder(ds, groups){
  const day=getOrderDay(ds);
  COLS.forEach(c=>{
    const seq=day[c.key]; if(!Array.isArray(seq)||!seq.length) return;
    const pos={}; seq.forEach((id,i)=> pos[id]=i);
    (groups[c.key]||[]).sort((a,b)=>{
      const pa=(a.id in pos)?pos[a.id]:Infinity, pb=(b.id in pos)?pos[b.id]:Infinity;
      if(pa!==pb) return pa-pb;                                   // both pinned, or one pinned
      return new Date(a.startISO)-new Date(b.startISO);           // neither pinned → by start time
    });
  });
}
// Persist the current on-screen order of one press column as the manager's sequence.
function saveColumnOrder(ds, colKey){
  const day=getOrderDay(ds);
  day[colKey]=(dayJobs[colKey]||[]).map(j=>j.id);
  saveOrder();
}

// ── local cross-press moves (v32) ──
// Day-keyed map of rowId → pressKey the manager dragged a card to. Applied at bucketing time so a
// moved imprint shows on the new press; its Airtable Equipment is untouched. Local to this browser,
// day-scoped, cleared tomorrow. Split halves are never moved cross-press (would break the pairing).
let moveMem=null;
function getMoveAll(){ try{ return JSON.parse(lsGet('pine_pb_move'))||{}; }catch(e){ return {}; } }
function getMoveDay(ds){ if(!moveMem) moveMem=getMoveAll(); if(!moveMem[ds]) moveMem[ds]={}; return moveMem[ds]; }
function saveMove(){ try{ lsSet('pine_pb_move', JSON.stringify(moveMem||{})); }catch(e){} }
function dayHasMove(ds){ return Object.keys(getMoveDay(ds)).length>0; }
function clearDayMove(ds){ const d=getMoveDay(ds); Object.keys(d).forEach(k=> delete d[k]); saveMove(); }
let doneNow=new Set();   // effective crossed-off ids for the current render
let jobIndex={};         // id -> job, for the tap handler
// Fold the press checkbox + local overrides into one done-set; prune stale overrides; stamp finish times.
function effDoneSet(ds, jobs){
  const ovr=getOvr(ds), ts=getDoneTs(ds); let dirtyOvr=false, dirtyTs=false;
  const set=new Set();
  jobs.forEach(j=>{
    const auto = j.complete===true;
    let eff;
    if(j.id in ovr){
      if(ovr[j.id]===auto){ delete ovr[j.id]; dirtyOvr=true; eff=auto; }  // press caught up → drop override
      else eff=ovr[j.id];
    } else eff=auto;
    if(eff){ set.add(j.id); if(!ts[j.id]){ ts[j.id]=(auto&&j.runEndMs)?j.runEndMs:Date.now(); dirtyTs=true; } }
  });
  if(dirtyOvr) saveOvr();
  if(dirtyTs){ try{ lsSet('pine_pb_donets', JSON.stringify(doneTsMem||{})); }catch(e){} }
  return set;
}
function toggleDone(ds, id){
  const arr=getDone(ds), ts=getDoneTs(ds); const i=arr.indexOf(id);
  if(i>=0){ arr.splice(i,1); delete ts[id]; } else { arr.push(id); ts[id]=Date.now(); }
  const all=getDoneAll(); all[ds]=arr.slice();
  try{ lsSet('pine_pb_done', JSON.stringify(all)); }catch(e){}
  try{ lsSet('pine_pb_donets', JSON.stringify(doneTsMem||{})); }catch(e){}
}
// ── impression snapshot: remember the highest impression count seen per imprint per day,
//    so the day's total stays stable even if Active Impressions counts down as jobs finish ──
function getImpSnapAll(){ try{ return JSON.parse(lsGet('pine_pb_imp'))||{}; }catch(e){ return {}; } }
function applyImpSnapshot(ds, jobs){
  const all=getImpSnapAll(); const day=all[ds]||{};
  jobs.forEach(j=>{ const v=Math.max(j.qty||0, day[j.id]||0); day[j.id]=v; j.impr = v>0 ? v : (j.orderedQty||0); });
  all[ds]=day; lsSet('pine_pb_imp', JSON.stringify(all));
}
function setAssign(ds, colKey, names){
  const all=getAssignAll(); all[ds]=all[ds]||{}; all[ds][colKey]=names;
  lsSet('pine_pb_assign', JSON.stringify(all));
}

// FETCH
// ══════════════════════════════════════════════════
async function atFetch(url){
  let records=[], offset='';
  while(true){
    const res = await fetch(url+(offset?'&offset='+encodeURIComponent(offset):''), {headers:{'Authorization':'Bearer '+window.AT_KEY}});
    if(!res.ok){ const t=await res.text(); throw new Error('Airtable '+res.status+': '+t.slice(0,150)); }
    const data = await res.json();
    records = records.concat(data.records||[]);
    if(data.offset){ offset=data.offset; setLoader('Loading… ('+records.length+')'); } else break;
  }
  return records;
}
function getLookupStr(val){
  if(!val) return '';
  if(typeof val==='string') return val;
  if(val.valuesByLinkedRecordId){ const v=Object.values(val.valuesByLinkedRecordId).flat()[0]; return v?(typeof v==='object'?v.name||'':String(v)):''; }
  if(Array.isArray(val)){ const v=val[0]; return v?(typeof v==='object'?v.name||'':String(v)):''; }
  if(typeof val==='object') return val.name||'';
  return '';
}
function palletOf(loc, ink){
  if(!loc) return 'tee';
  const l=loc.toLowerCase(), i=(ink||'').toLowerCase();
  if(l.includes('bandana')||l.includes('tea towel')) return 'bandana';
  if(l.includes('tote')||l.includes('bag')||l.includes('flatstock')||l.includes('poster')) return 'tote';
  if(l.includes('hood')) return 'hoodie';
  if(l.includes('sleeve')) return 'sleeve';
  if(i.includes('headwear')||i.includes('supacolor - hat')||i.includes('1c headwear')) return 'hat';
  return 'tee';
}
function parseRecord(r){
  const f=r.fields||r.cellValuesByFieldId||{};
  const pressVal=f[F.press], locVal=f[F.loc], inkVal=f[F.ink];
  return {
    id:r.id,
    imprintId: f[F.imprintId]||'',
    screens: typeof f[F.screens]==='number'?f[F.screens]:0,
    qty: typeof f[F.qty]==='number'?f[F.qty]:0,
    client: f[F.client]||'',
    garment: f[F.garment]||'',
    loc: locVal?.name||(typeof locVal==='string'?locVal:''),
    ink: inkVal?.name||(typeof inkVal==='string'?inkVal:''),
    pressName: pressVal?.name||(typeof pressVal==='string'?pressVal:null),
    startISO: f[F.start]||null,
    ready: typeof f[F.ready]==='string'?f[F.ready]:'',
    runSecs: typeof f[F.runSecs]==='number'?f[F.runSecs]:0,
    complete: f[F.complete]===true,
    runEndMs: f[F.runEnd] ? Date.parse(f[F.runEnd]) : 0,
    liIds: Array.isArray(f[F.liLink]) ? f[F.liLink].map(x=> typeof x==='string'?x:(x&&x.id)||'').filter(Boolean) : [],
    orderedQty: 0,   // filled after a batched Line Items fetch (stable fallback when Active Impressions zeroes)
  };
}

// ── ordered-qty fallback (v30) ──
// Active Impressions (F.qty) is a REMAINING-to-print rollup that zeroes when the operator
// marks a run complete, so completed jobs otherwise contribute 0 to the day's totals. Sum
// the linked Line Items' Total Quantity for a stable ordered count and stash it on each job;
// the row + stats fall back to it only when Active Impressions has zeroed. Same source Operator
// switched to in v81. Soft-fails: on any error the board just keeps the Active-Impressions view.
const LI_TABLE = 'tblJx5UlwO7oMSk5H';
const LI_QTY   = 'fldFfuKAcduwWQp8g';   // Line Items — Total Quantity (ordered)
async function fetchOrderedQtys(jobs){
  const ids = Array.from(new Set(jobs.reduce((a,j)=> a.concat(j.liIds||[]), []))).filter(Boolean);
  if(!ids.length) return;
  const qtyById = {};
  try{
    for(let i=0;i<ids.length;i+=40){
      const chunk = ids.slice(i,i+40);
      const formula = 'OR('+chunk.map(id=>"RECORD_ID()='"+id+"'").join(',')+')';
      const url = 'https://api.airtable.com/v0/'+BASE+'/'+LI_TABLE+'?fields[]='+LI_QTY
        +'&returnFieldsByFieldId=true&pageSize=100&filterByFormula='+encodeURIComponent(formula);
      const recs = await atFetch(url);
      recs.forEach(r=>{ const q=(r.fields||{})[LI_QTY]; qtyById[r.id]= typeof q==='number'?q:0; });
    }
  }catch(e){ dbg('ordered-qty fetch failed (using Active Impressions only)', e); return; }
  jobs.forEach(j=>{
    const full = (j.liIds||[]).reduce((s,id)=> s+(qtyById[id]||0), 0);
    j.orderedQty = j.isSplit ? (j.splitHalf==='P1' ? Math.ceil(full/2) : Math.floor(full/2)) : full;
  });
}

async function loadDay(){
  if(!window.AT_KEY){ promptToken(); return; }
  const ds = localDateStr(target);
  setLoader('Loading…');
  // window: target-1 .. target+2 (UTC bounds), then filter to local print date client-side
  const lo=new Date(target); lo.setDate(lo.getDate()-1);
  const hi=new Date(target); hi.setDate(hi.getDate()+2);
  const loISO=lo.toISOString().slice(0,10), hiISO=hi.toISOString().slice(0,10);
  const formula = encodeURIComponent(`AND({${F.press}}!="",IS_AFTER({${F.start}},"${loISO}"),IS_BEFORE({${F.start}},"${hiISO}"))`);
  let recs=[];
  try{ recs = await atFetch(BASE_URL+'&filterByFormula='+formula); }
  catch(e){ setLoader(''); alert('Could not load schedule:\n'+e.message); return; }
  setLoader('');

  const tomo=new Date(target); tomo.setDate(tomo.getDate()+1);
  const tomoStr=localDateStr(tomo);
  const parsed = recs.map(parseRecord);

  const groups={}; COLS.forEach(c=>groups[c.key]=[]);
  parsed
    .filter(j=> j.startISO && localDateStr(new Date(j.startISO))===ds)
    .forEach(j=> pushJobToCols(j, groups, getMoveDay(ds)));
  // order each column by scheduled start time, then apply any local Arrange-mode override
  Object.keys(groups).forEach(k=> groups[k].sort((a,b)=> new Date(a.startISO)-new Date(b.startISO)));
  applyLocalOrder(ds, groups);
  const flat=[]; Object.keys(groups).forEach(k=>groups[k].forEach(j=>flat.push(j)));
  await fetchOrderedQtys(flat);
  applyImpSnapshot(ds, flat);

  // Stretch candidates = tomorrow's READY (👍) jobs per press, biggest first.
  // If a team blows through today, these are the ready-to-pull jobs they can grab for bonus.
  const stretch={}; COLS.forEach(c=>stretch[c.key]=[]);
  parsed
    .filter(j=> j.startISO && localDateStr(new Date(j.startISO))===tomoStr && (j.ready||'').includes('👍'))
    .forEach(j=> pushJobToCols(j, stretch));
  Object.keys(stretch).forEach(k=> stretch[k].sort((a,b)=> (b.qty||0)-(a.qty||0)));
  stretchJobs = stretch;

  // not-ready tomorrow jobs per press → "prep to unlock" hint when a press is caught up
  const prep={}; COLS.forEach(c=>prep[c.key]=[]);
  parsed
    .filter(j=> j.startISO && localDateStr(new Date(j.startISO))===tomoStr && !(j.ready||'').includes('👍'))
    .forEach(j=> pushJobToCols(j, prep));
  prepJobs = prep;

  dayJobs = groups;
  render();
  loadTimeOff().then(renderTimeOff);
}

// RENDER
// ══════════════════════════════════════════════════
function render(){
  const ds = localDateStr(target);
  document.getElementById('dow').textContent = DOWS[target.getDay()];
  document.getElementById('dnum').textContent = MONTHS[target.getMonth()]+' '+target.getDate();
  const isToday = ds===todayLocal();
  document.getElementById('asnTag').textContent = isToday ? '' : '◀ assigning '+(ds>todayLocal()?'ahead':'past');

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = 'repeat('+COLS.length+',1fr)';
  const dark = document.getElementById('pb').classList.contains('dark');
  // effective crossed-off = press Run Complete checkbox, with local overrides folded in
  jobIndex={}; const allJobs=[];
  COLS.forEach(c=> (dayJobs[c.key]||[]).forEach(j=>{ jobIndex[j.id]=j; allJobs.push(j); }));
  doneNow = effDoneSet(ds, allJobs);

  grid.innerHTML = COLS.map(c=>{
    const jobs = dayJobs[c.key]||[];
    const hdrBg = dark ? c.bar : c.tint;
    const hdrTx = dark ? '#fff' : '#0D0D0B';
    const ops = getAssign(ds, c.key);
    const opHtml = ops.map(n=>`<span class="op" data-col="${c.key}" data-name="${esc(n)}" title="Remove ${esc(n)}">${esc(n)}<span class="x">×</span></span>`).join('')
      + (ops.length<3 ? `<span class="op-add" data-col="${c.key}">+ add</span>` : '');

    let rows='';
    if(!jobs.length){ rows = `<div class="col-empty">— nothing scheduled —</div>`; }
    else {
      let prevPal=null;
      jobs.forEach(j=>{
        const pal = palletOf(j.loc, j.ink);
        if(prevPal && prevPal!==pal){ rows += `<div class="pdiv"><span class="tx">platen</span><span class="ln"></span></div>`; }
        prevPal = pal;
        const ready = (j.ready||'').includes('👍');
        const band  = pal==='bandana';
        const st = band ? BANDANA_SVG : (ready ? '👍' : '');
        const nc = j.screens>0 ? j.screens : '—';
        const qtv = j.qty>0 ? j.qty : (j.orderedQty||0);
        const qt = qtv>0 ? qtv : '—';
        const dn = doneNow.has(j.id) ? ' done' : '';
        // SPLIT (v22) — ribbon above a fully-normal data row. The row is byte-identical
        // to a non-split row (full ID + qty intact); the ribbon carries the split flag +
        // full order total. Press identity is implied by the column, so no P1/P2 text.
        if(j.isSplit){
          rows += `<div class="ribbonA">\u00BD Split \u00B7 ${(j.splitFull||0).toLocaleString()} total</div>`;
        }
        rows += `<div class="jr${dn}${j.isSplit?' split':''}" data-id="${j.id}" data-col="${c.key}"${arrangeMode?' draggable="true"':''}${j.isSplit?` title="Split run — this press runs ${j.qty} of ${(j.splitFull||0).toLocaleString()} total"`:''}>`
          + `<span class="st">${st}</span>`
          + `<span class="iid" title="Tap for order overview" style="color:${hdrTx==='#fff'&&dark?'var(--text)':'var(--text)'}">${esc(j.imprintId||'—')}</span>`
          + `<span class="lc">${esc(abbrLoc(j.loc))}</span>`
          + `<span class="nc">${nc}</span>`
          + `<span class="qt">${qt}</span>`
          + `</div>`;
      });
    }
    return `<div class="pbcol">`
      + `<div class="pbch" style="background:${hdrBg};border-color:${c.bar}">`
      +   `<div class="pbcm" style="color:${hdrTx}">${c.label}</div>`
      +   `<div class="pbops">${opHtml}</div>`
      + `</div>`
      + `<div class="pbrows" data-col="${c.key}">${rows}</div>`
      + `</div>`;
  }).join('');

  // wire operator clicks
  grid.querySelectorAll('.op-add').forEach(b=> b.onclick=()=> openAssign(b.dataset.col));
  grid.querySelectorAll('.op').forEach(b=> b.onclick=()=>{
    const names = getAssign(ds, b.dataset.col).filter(n=>n!==b.dataset.name);
    setAssign(ds, b.dataset.col, names); render();
  });
  // tap a job to cross off / undo. The press auto-crosses via the Run Complete checkbox;
  // a tap records a LOCAL override (either direction) so the floor can still drive the board.
  // Suspended while Arrange mode is on, so a drag can't misfire the cross-off.
  if(!arrangeMode){
    grid.querySelectorAll('.jr').forEach(r=> r.onclick=()=>{
      const id=r.dataset.id, job=jobIndex[id];
      const auto = job ? job.complete===true : false;
      const ovr=getOvr(ds);
      const cur = (id in ovr) ? ovr[id] : auto;   // current effective state
      const want = !cur;
      if(want===auto){ delete ovr[id]; }          // back in agreement with the press → drop override
      else { ovr[id]=want; }
      saveOvr();
      const ts=getDoneTs(ds);
      if(want){ if(!ts[id]) ts[id]=Date.now(); } else { delete ts[id]; }
      try{ lsSet('pine_pb_donets', JSON.stringify(doneTsMem||{})); }catch(e){}
      r.classList.toggle('done', want);
      if(want) doneNow.add(id); else doneNow.delete(id);
      renderStats();
    });
    // tap the Imprint ID itself → read-only order overview. stopPropagation keeps the row's
    // cross-off from also firing, so the two interactions live on the same row without colliding.
    grid.querySelectorAll('.jr .iid').forEach(el=> el.addEventListener('click', ev=>{
      ev.stopPropagation();
      const row=el.closest('.jr'); if(row) openImprint(row.dataset.id);
    }));
  } else {
    wireArrangeDrag(ds);
  }
  syncArrangeUI(ds);

  renderStats();

  const now=new Date();
  document.getElementById('updStamp').textContent = 'updated '+now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}

// ── Arrange-mode drag engine (v32) ──
// HTML5 drag. Reorder within a press, OR move a card to another press. A cross-press move records a
// local reassignment (moveMap) so it survives reload; a same-press drag just re-sequences. Split
// halves can only reorder within their own press. Everything here is local — nothing touches Airtable.
let dragId=null, dragCol=null, dragIsSplit=false;
function clearDropMarks(){
  document.querySelectorAll('.jr.drop-above,.jr.drop-below').forEach(r=> r.classList.remove('drop-above','drop-below'));
  document.querySelectorAll('.pbrows.drop-col').forEach(el=> el.classList.remove('drop-col'));
}
// Move a card within/between columns, persist order (+ reassignment if cross-press), re-render.
function moveJob(ds, id, fromCol, toCol, targetId, below){
  const src=dayJobs[fromCol]; if(!src) return;
  const from=src.findIndex(j=>j.id===id); if(from<0) return;
  const moved=src.splice(from,1)[0];
  const dst=dayJobs[toCol]; if(!dst){ src.splice(from,0,moved); return; }
  let to;
  if(targetId){ to=dst.findIndex(j=>j.id===targetId); if(to<0) to=dst.length; else if(below) to+=1; }
  else to=dst.length;                         // dropped on empty column area → append
  dst.splice(to,0,moved);
  if(fromCol!==toCol){                         // cross-press → record reassignment + persist both orders
    const mv=getMoveDay(ds);
    const natural=colOf(moved.pressName);        // dragging back to its scheduled press drops the override
    if(natural && natural.key===toCol) delete mv[id]; else mv[id]=toCol;
    saveMove();
    saveColumnOrder(ds, fromCol);
  }
  saveColumnOrder(ds, toCol);
  clearDropMarks();
  dragId=null; dragCol=null; dragIsSplit=false;
  render();
}
function wireArrangeDrag(ds){
  const grid=document.getElementById('grid');
  grid.querySelectorAll('.jr').forEach(r=>{
    r.ondragstart=e=>{ dragId=r.dataset.id; dragCol=r.dataset.col; dragIsSplit=!!jobIndex[dragId]?.isSplit;
      r.classList.add('dragging');
      try{ e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain', dragId); }catch(_){} };
    r.ondragend=()=>{ r.classList.remove('dragging'); clearDropMarks(); dragId=null; dragCol=null; dragIsSplit=false; };
    r.ondragover=e=>{
      if(dragId===null) return;
      if(dragIsSplit && r.dataset.col!==dragCol) return;         // split halves: same-press reorder only
      e.preventDefault();
      const rect=r.getBoundingClientRect(); const below=(e.clientY-rect.top)>rect.height/2;
      clearDropMarks(); if(r.dataset.id!==dragId) r.classList.add(below?'drop-below':'drop-above');
    };
    r.ondrop=e=>{
      if(dragId===null) return;
      if(dragIsSplit && r.dataset.col!==dragCol){ clearDropMarks(); return; }
      e.preventDefault(); e.stopPropagation();                   // don't also bubble to the column zone
      const targetId=r.dataset.id; if(targetId===dragId){ clearDropMarks(); return; }
      const rect=r.getBoundingClientRect(); const below=(e.clientY-rect.top)>rect.height/2;
      moveJob(ds, dragId, dragCol, r.dataset.col, targetId, below);
    };
  });
  // column body as a drop zone — handles empty columns and dropping below the last row
  grid.querySelectorAll('.pbrows').forEach(zone=>{
    const col=zone.dataset.col;
    zone.ondragover=e=>{
      if(dragId===null) return;
      if(dragIsSplit && col!==dragCol) return;
      e.preventDefault();
      if(e.target===zone){ clearDropMarks(); if(col!==dragCol) zone.classList.add('drop-col'); }
    };
    zone.ondrop=e=>{
      if(dragId===null) return;
      if(e.target!==zone) return;                                // a row handled it
      if(dragIsSplit && col!==dragCol){ clearDropMarks(); return; }
      e.preventDefault();
      moveJob(ds, dragId, dragCol, col, null, false);            // append to end of this press
    };
  });
}
function syncArrangeUI(ds){
  const badge=document.getElementById('arrangeBadge');

function fmtDur(min){ min=Math.round(min); if(min<60) return min+'m'; const hh=Math.floor(min/60), mm=min%60; return mm?(hh+'h '+mm+'m'):(hh+'h'); }
function fmtClock(ts){ const d=new Date(ts); let hh=d.getHours(); const mm=d.getMinutes(); const ap=hh<12?'a':'p'; hh=hh%12||12; return hh+(mm?(':'+String(mm).padStart(2,'0')):'')+ap; }
function jobDurMin(j){ return j.runSecs>0 ? j.runSecs/60 : (j.qty>0 ? (j.qty/FALLBACK_PPH)*60 : 0); }
function minutesLeftToday(){ const now=new Date(); const end=new Date(now); end.setHours(SHIFT_END_HOUR,0,0,0); return (end-now)/60000; }
// Time-aware stretch: surface ONE ready job sized to the time left today.
// If nothing fully fits, suggest STARTING the biggest and carrying it into tomorrow.
function buildStretch(c, ahead){
  const cands = stretchJobs[c.key]||[];          // tomorrow's ready jobs, sorted biggest-first
  const ds=localDateStr(target), isToday = ds===todayLocal();
  const left = isToday ? minutesLeftToday() : null;
  if(!cands.length){
    // nothing ready to pull — if caught up, nudge to prep tomorrow's not-ready work
    const prep = prepJobs[c.key]||[];
    if(ahead && prep.length){
      const ppcs = prep.reduce((s,j)=>s+(j.qty||0),0);
      return `<div data-col="${c.key}" class="ps-stretch prep">↗ Prep to unlock — ${ppcs.toLocaleString()} pcs (${prep.length} job${prep.length>1?'s':''}) need screens/ink</div>`;
    }
    return '';
  }
  if(left!=null && left<=0) return ahead ? '<div data-col="${c.key}" class="ps-stretch hot">🎯 Done for the day</div>' : '';
  // biggest job that fully fits today; else biggest (start now, finish tomorrow)
  let pick, carry=false;
  if(left!=null){
    pick = cands.find(j=> jobDurMin(j)<=left);
    if(!pick){ pick=cands[0]; carry=true; }
  } else { pick = cands[0]; }
  if(!pick) return '';
  const isDana = (pick.loc||'').toLowerCase().includes('bandana');
  const unit = isDana ? 'Danas' : 'pcs';
  const qty = pick.qty||0;
  const id  = '#'+esc(pick.imprintId||'—');
  const cnt = qty.toLocaleString()+' '+unit;
  const dur = jobDurMin(pick); const durStr = dur>0 ? ' · ~'+fmtDur(dur) : '';
  let finishedStr='';
  if(isToday){
    const ts=getDoneTs(ds); let last=0;
    (dayJobs[c.key]||[]).forEach(j=>{ if(doneNow.has(j.id) && ts[j.id]) last=Math.max(last, ts[j.id]); });
    if(last) finishedStr=' · done '+fmtClock(last);
  }
  const leftStr = left!=null ? ' · '+fmtDur(left)+' left' : '';
  if(!ahead) return `<div data-col="${c.key}" class="ps-stretch">↗ Stretch next: ${id} · ${cnt}${durStr}</div>`;
  if(carry){
    let got='';
    if(dur>0 && left!=null){
      const done=Math.min(qty, Math.round((qty/dur)*left/10)*10);
      if(done>0){ const endLbl=fmtClock(new Date().setHours(SHIFT_END_HOUR,0,0,0)); got=` · ≈${done.toLocaleString()} ${unit} by ${endLbl}`; }
    }
    return `<div data-col="${c.key}" class="ps-stretch hot">🎯 Stretch — start ${id} · ${cnt}${durStr}${got} · finish tmrw${finishedStr}</div>`;
  }
  return `<div data-col="${c.key}" class="ps-stretch hot">🎯 Stretch — pull ${id} · ${cnt}${durStr}${leftStr}${finishedStr}</div>`;
}
function renderStats(){
  const ds = localDateStr(target);
  const doneSet = doneNow;
  const stats = document.getElementById('stats');
  if(!stats) return;
  stats.style.gridTemplateColumns = 'repeat('+COLS.length+',1fr)';
  let shopTot=0, shopDone=0;
  stats.innerHTML = COLS.map(c=>{
    const jobs = dayJobs[c.key]||[];
    if(!jobs.length) return `<div class="ps-cell"><div class="ps-top"><span class="ps-lbl">${c.label}</span></div><div class="ps-empty">— idle —</div></div>`;
    let tot=0, done=0;
    jobs.forEach(j=>{ const v=j.impr||0; tot+=v; if(doneSet.has(j.id)) done+=v; });
    shopTot+=tot; shopDone+=done;
    const pct = tot ? Math.round(done/tot*100) : 0;
    const ahead = tot>0 && done>=tot;   // finished today's baseline → stretch unlocked
    const stretchLine = buildStretch(c, ahead);
    return `<div class="ps-cell">`
      + `<div class="ps-top"><span class="ps-lbl">${c.label}</span><span class="ps-pct">${pct}%</span></div>`
      + `<div class="ps-bar"><div class="ps-fill" style="width:${pct}%;background:${c.bar}"></div></div>`
      + `<div class="ps-sub">${done.toLocaleString()} / ${tot.toLocaleString()} impr</div>`
      + stretchLine
      + `</div>`;
  }).join('');
  stats.querySelectorAll('.ps-stretch[data-col]').forEach(el=> el.onclick=()=> openStretchDetail(el.dataset.col));
  const shopPct = shopTot ? Math.round(shopDone/shopTot*100) : 0;
  const shopEl = document.getElementById('shopTot');
  if(shopEl) shopEl.textContent = shopTot ? `Shop today: ${shopDone.toLocaleString()} / ${shopTot.toLocaleString()} impr · ${shopPct}%` : '';
}

// IMPRINT OVERVIEW POPUP (v27)
// Tap an Imprint ID → read-only order-at-a-glance. One lazy single-record GET on the
// imprint (NO fields[] filter → avoids the 422 when a listed field can't resolve). Every
// value shown resolves on the imprint itself via lookups/formulas, so no order/LI hop.
// Mockup = proof page 1 rendered locally with PDF.js (remote Airtable thumbnails don't
// hotlink as <img> on the shop iPads — operator v92 lesson). Read-only: no writes.
// ══════════════════════════════════════════════════
const IF = {
  orderNum:  'fldZAIMnXPYF9LiXq',  // Order Number Lookup (number[])
  type:      'fldjNCuaGOkWgzH2K',  // Imprint Type (singleSelect) — the board calls this "ink"
  inkNames:  'fldMM5hp8kEpo3KKT',  // Ink Names Search (formula → comma string)
  printNotes:'fldNuEzGIYI8FWqXu',  // Print Notes (multiline)
  schedNotes:'fldjlfaH3dOBCtuTM',  // Scheduling Notes (multiline)
  status:    'fldNROVFSsBwLUOYW',  // Order Status Lookup
  priority:  'fldMCyF3zHshhQLM5',  // Priority lookup (Hard Deadline / ASAP)
  proof:     'fldUOIfCd22MxevRm',  // Proof Images lookup (attachments, from Line Items)
};
let impCache = {};    // realId -> { fields, pages?, pdfDocs?, rendered? } — per-session, re-open is instant
let impSeq = 0;       // guards a slow fetch from painting over a newer open
let impPager = null;  // { realId, seq, idx } for the currently-open popup's proof pager

if(window.pdfjsLib){ try{ pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; }catch(e){} }
function pdfReady(){ return !!window.pdfjsLib; }

// Flatten a v0 lookup value (array | valuesByLinkedRecordId | scalar) to its first scalar.
function firstLookup(val){
  if(val==null) return '';
  if(typeof val==='string'||typeof val==='number') return val;
  if(Array.isArray(val)){ const v=val[0]; return v==null?'':(typeof v==='object'?(v.name||''):v); }
  if(val.valuesByLinkedRecordId){ const v=Object.values(val.valuesByLinkedRecordId).flat()[0]; return v==null?'':(typeof v==='object'?(v.name||''):v); }
  if(typeof val==='object') return val.name||'';
  return '';
}
// Pull attachment objects out of the proof lookup (handles array / valuesByLinkedRecordId).
function extractProofs(val){
  if(!val) return [];
  let arr = Array.isArray(val) ? val : (val.valuesByLinkedRecordId ? Object.values(val.valuesByLinkedRecordId).flat() : [val]);
  arr = arr.flat ? arr.flat() : arr;
  return arr.filter(a=> a && typeof a==='object' && a.url);
}
function proofIsPdf(att){
  const t=(att.type||'').toLowerCase(), n=(att.filename||att.url||'').toLowerCase();
  return t.indexOf('pdf')>=0 || n.slice(-4)==='.pdf';
}
// Build the imprint's flat page list: each PDF attachment contributes its actual pages,
// each image attachment contributes one. Docs are loaded once (for numPages) and cached.
async function buildProofPages(realId, atts, seq){
  const cache = impCache[realId];
  if(!cache.pages){
    cache.pdfDocs = cache.pdfDocs || {};
    cache.rendered = cache.rendered || {};
    const pages=[];
    for(let ai=0; ai<atts.length; ai++){
      const att=atts[ai];
      if(proofIsPdf(att) && pdfReady()){
        try{
          const doc = await pdfjsLib.getDocument({url:att.url}).promise;
          if(seq!==impSeq) return;
          cache.pdfDocs[ai]=doc;
          for(let pn=1; pn<=doc.numPages; pn++) pages.push({ai, att, page:pn, pdf:true});
        }catch(e){ dbg('proof doc load failed', e); pages.push({ai, att, page:1, pdf:false}); }
      } else {
        pages.push({ai, att, page:1, pdf:false});
      }
      if(seq!==impSeq) return;
    }
    cache.pages = pages.length ? pages : [{ai:0, att:atts[0], page:1, pdf:false}];
  }
  if(seq!==impSeq) return;
  impPager = { realId, seq, idx:0 };
  showProofPage(0);
}

// Render (or recall from cache) one page of the sequence into the mockup, and sync the bar.
async function showProofPage(idx){
  const p = impPager; if(!p) return;
  const cache = impCache[p.realId]; if(!cache || !cache.pages) return;
  const pages = cache.pages; if(idx<0 || idx>=pages.length) return;
  p.idx = idx;
  renderPager(pages.length, idx);
  const pg = pages[idx];
  if(cache.rendered[idx]){ icMockImg(cache.rendered[idx], pg.att.url); return; }
  if(pg.pdf){
    icMockPh('Loading page\u2026');
    const src = await renderPdfPage(cache, pg.ai, pg.att.url, pg.page);
    if(impPager!==p || p.idx!==idx || p.seq!==impSeq) return;   // navigated away / superseded
    if(src){ cache.rendered[idx]=src; icMockImg(src, pg.att.url); }
    else { icMockPh('Page unavailable \u2014 tap to open proof'); document.getElementById('icMock').dataset.src=pg.att.url; }
  } else {
    cache.rendered[idx]=pg.att.url;   // image attachment — signed URL renders fine as <img>
    icMockImg(pg.att.url, pg.att.url);
  }
}

async function renderPdfPage(cache, ai, url, pageNum){
  try{
    let doc = cache.pdfDocs[ai];
    if(!doc){ doc = await pdfjsLib.getDocument({url}).promise; cache.pdfDocs[ai]=doc; }
    const page = await doc.getPage(pageNum);
    const base = page.getViewport({scale:1});
    const vp   = page.getViewport({scale:Math.min(2.5, 1000/base.width)});
    const cv   = document.createElement('canvas');
    cv.width=vp.width; cv.height=vp.height;
    await page.render({canvasContext:cv.getContext('2d'), viewport:vp}).promise;
    return cv.toDataURL('image/png');
  }catch(e){ dbg('page render failed', e); return ''; }
}

function openImprint(jobId){
  if(!window.AT_KEY){ promptToken(); return; }
  const job = jobIndex[jobId] || {};
  const realId = job.realId || jobId;              // split halves ('rec…#p1') → real record id
  const seq = ++impSeq;

  // instant paint from what the board already holds in memory
  icSet('icId', job.imprintId || '\u2014');
  icSet('icSub', job.client || '');
  document.getElementById('icOrd').textContent = '';
  icSet('icType', job.ink || '\u2014');            // board's "ink" is really Imprint Type
  icSet('icLoc',  job.loc || '\u2014');
  icSet('icScr',  job.screens>0 ? job.screens : '\u2014');
  const qty = job.splitFull || job.impr || job.qty || 0;
  icSet('icQty',  qty ? qty.toLocaleString() : '\u2014');
  document.getElementById('icInk').textContent = '\u2026';
  document.getElementById('icNotes').innerHTML = '';
  document.getElementById('icChips').innerHTML = job.isSplit ? icChip('\u00BD Split \u00B7 '+(job.splitFull||0).toLocaleString()+' total','split') : '';
  impPager = null; document.getElementById('icPager').style.display='none';
  icMockPh('Loading mockup\u2026');
  document.getElementById('iov').classList.add('on');

  if(impCache[realId]){ fillImprint(realId, seq); return; }
  const url='https://api.airtable.com/v0/'+BASE+'/'+TABLE+'/'+realId+'?returnFieldsByFieldId=true';
  fetch(url,{headers:{'Authorization':'Bearer '+window.AT_KEY}})
    .then(r=> r.ok ? r.json() : r.text().then(t=>{ throw new Error('Airtable '+r.status+': '+t.slice(0,120)); }))
    .then(rec=>{ impCache[realId]={fields:rec.fields||{}}; fillImprint(realId, seq); })
    .catch(e=>{ if(seq!==impSeq) return; dbg('imprint fetch failed', e);
      icMockPh('Couldn\u2019t load \u2014 '+e.message); document.getElementById('icInk').textContent='\u2014'; });
}

async function fillImprint(realId, seq){
  if(seq!==impSeq) return;                          // a newer open superseded this one
  const cache = impCache[realId] || {}, f = cache.fields || {};

  const ord = firstLookup(f[IF.orderNum]);
  document.getElementById('icOrd').textContent = ord ? ('\u00B7 Order '+ord) : '';

  const type = (typeof f[IF.type]==='string') ? f[IF.type] : firstLookup(f[IF.type]);
  if(type) icSet('icType', type);
  icSet('icInk', (f[IF.inkNames]||'').trim() || '\u2014');

  // chips: priority + order status (+ split if it was set on paint)
  const chips=[];
  const prio = firstLookup(f[IF.priority]);
  if(prio){ const cls=/hard/i.test(prio)?'hard':(/asap/i.test(prio)?'asap':''); chips.push(icChip(prio,cls)); }
  const status = firstLookup(f[IF.status]);
  if(status) chips.push(icChip(status,''));
  const existing = document.getElementById('icChips').innerHTML;   // preserve a split chip
  document.getElementById('icChips').innerHTML = chips.join('') + existing;

  // notes
  const notes=[];
  if((f[IF.schedNotes]||'').trim()) notes.push(['Scheduling notes', f[IF.schedNotes].trim()]);
  if((f[IF.printNotes]||'').trim()) notes.push(['Print notes', f[IF.printNotes].trim()]);
  document.getElementById('icNotes').innerHTML = notes.map(n=>
    '<div class="ic-note"><span class="ic-fl">'+esc(n[0])+'</span>'+esc(n[1])+'</div>').join('');

  // mockup — build the flat page sequence (each PDF's pages + any image attachments), then page through
  const proofs = extractProofs(f[IF.proof]);
  if(!proofs.length){ icMockPh('No mockup on file'); document.getElementById('icPager').style.display='none'; return; }
  await buildProofPages(realId, proofs, seq);
}

// ISO date strings compare lexicographically, so plain string compares work for ranges
function toMD(iso){ if(!iso) return ''; const p=iso.split('-'); return MONTHS[(+p[1])-1]+' '+(+p[2]); }
function toRange(s,e){ if(!e||e===s) return toMD(s); const ps=s.split('-'), pe=e.split('-');
  return ps[1]===pe[1] ? MONTHS[(+ps[1])-1]+' '+(+ps[2])+'–'+(+pe[2]) : toMD(s)+' – '+toMD(e); }
function toOut(t, day){ return t.start && t.start<=day && (t.end||t.start)>=day; }

function renderTimeOff(){
  const body=document.getElementById('toBody'); if(!body) return;
  const today=todayLocal(), viewed=localDateStr(target);
  const live=timeOff.filter(t=> t.person && (t.end||t.start)>=today)
                    .sort((a,b)=> (a.start||'').localeCompare(b.start||''));
  const outNow=live.filter(t=> toOut(t,viewed));
  const coming=live.filter(t=> !toOut(t,viewed));
  const rowHtml=t=>{
    const pend=t.status==='Requested', out=toOut(t,viewed);
    return `<div class="to-row${out?' out':''}" data-id="${t.id}">`
      + `<span class="to-nm">${esc(t.person)}`
      +   (out?`<span class="to-badge">out</span>`:'')
      +   (pend?`<span class="to-pend" data-appr="${t.id}" title="Tap to approve">pending ✓</span>`:'')
      + `</span><span class="to-rt"><span class="to-dt">${esc(toRange(t.start,t.end))}</span><button class="to-del" data-del="${t.id}" title="Delete">×</button></span></div>`;
  };
  let html='';
  if(outNow.length){ html+=`<div class="to-sec">Out · ${DOWS[target.getDay()]} ${toMD(viewed)}</div>`+outNow.map(rowHtml).join(''); }
  html+=`<div class="to-sec">Coming up</div>`+(coming.length?coming.map(rowHtml).join(''):`<div class="to-none">— nobody scheduled off —</div>`);
  body.innerHTML=html;
  body.querySelectorAll('[data-appr]').forEach(el=> el.onclick=async (e)=>{
    e.stopPropagation(); const id=el.dataset.appr; el.textContent='approving…';
    try{ await toPatch(id,{[TO_F.status]:'Approved'}); await loadTimeOff(); renderTimeOff(); }
    catch(err){ el.textContent='retry ✓'; }
  });
  body.querySelectorAll('[data-del]').forEach(el=> el.onclick=async (e)=>{
    e.stopPropagation();
    if(!el.classList.contains('armed')){                      // first tap arms it
      el.classList.add('armed'); el.textContent='Delete?';
      el._t=setTimeout(()=>{ el.classList.remove('armed'); el.textContent='×'; }, 3000);
      return;
    }
    clearTimeout(el._t); el.textContent='deleting…';           // second tap confirms
    try{ await toDelete(el.dataset.del); await loadTimeOff(); renderTimeOff(); }
    catch(err){ el.textContent='retry'; el.classList.remove('armed'); }
  });
  refreshToBtn();
}
function refreshToBtn(){
  const ind=document.getElementById('toOutInd'); if(!ind) return;
  const viewed=localDateStr(target);
  const n=timeOff.filter(t=> t.person && toOut(t,viewed)).length;
  ind.textContent = n>0 ? (n+' out') : '';
}

(function(){
  const p=document.getElementById('toPanel'), hdr=document.getElementById('toHdr');
  const wrap=()=>document.querySelector('.pbgridwrap');
  let sx,sy,sl,st,moved=false,dragging=false,active=false;
  hdr.addEventListener('pointerdown', e=>{
    if(e.target.closest('.to-add')) return;             // let + Request work
    const r=p.getBoundingClientRect(), wr=wrap().getBoundingClientRect();
    sl=r.left-wr.left; st=r.top-wr.top; sx=e.clientX; sy=e.clientY; moved=false; dragging=false; active=true;
    try{ hdr.setPointerCapture(e.pointerId); }catch(_){}
  });
  hdr.addEventListener('pointermove', e=>{
    if(!active) return;
    const dx=e.clientX-sx, dy=e.clientY-sy;
    if(!dragging && Math.hypot(dx,dy)>4){ dragging=true; p.style.right='auto'; p.style.bottom='auto'; }
    if(dragging){
      moved=true;
      const wr=wrap().getBoundingClientRect();
      const left=Math.max(0, Math.min(sl+dx, wr.width  - p.offsetWidth));
      const top =Math.max(0, Math.min(st+dy, wr.height - p.offsetHeight));
      p.style.left=left+'px'; p.style.top=top+'px';
    }
  });
  function end(e){
    if(!active) return; active=false;
    try{ hdr.releasePointerCapture(e.pointerId); }catch(_){}
    if(moved){ try{ lsSet(TO_POS_KEY, JSON.stringify({left:parseFloat(p.style.left)||0, top:parseFloat(p.style.top)||0})); }catch(_){} }
    else { toggleToCollapsed(); }                       // a clean tap still collapses
  }
  hdr.addEventListener('pointerup', end);
  hdr.addEventListener('pointercancel', end);
})();
