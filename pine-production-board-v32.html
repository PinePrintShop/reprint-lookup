const STAMP_H={4:90, 9:150, 18:240};   // height per pen-size button; tap a size, then tap to place
const stampImgs={};
let armedStamp=null;
function preloadStamps(){
  Object.keys(STAMP_SVGS).forEach(name=>{
    const img=new Image();
    img.onload=()=>{ const el=document.getElementById('stampThumb_'+name); if(el) el.src=img.src; };
    img.src=STAMP_SVGS[name];
    stampImgs[name]=img;
  });
}
const NAME_OVERRIDES={};  // e.g. {'Gar':'Garrett','Chris_Leh':'Chris L'} — edit to taste
function dispName(n){ return NAME_OVERRIDES[n] || n.replace(/_/g,' '); }
function ensureStampTip(){
  let t=document.getElementById('dtTip');
  if(!t){ t=document.createElement('div'); t.id='dtTip'; t.className='dt-tip'; document.body.appendChild(t); }
  return t;
}
function buildStampTray(){
  const wrap=document.getElementById('dtStamps'); if(!wrap) return;
  const tip=ensureStampTip();
  wrap.innerHTML=Object.keys(STAMP_SVGS).map(name=>
    `<button class="dt-stamp" data-name="${name}"><img id="stampThumb_${name}" alt="${dispName(name)}"></button>`
  ).join('');
  wrap.querySelectorAll('.dt-stamp').forEach(b=>{
    b.onclick=()=>armStamp(b.dataset.name);
    b.onmouseenter=()=>{                       // instant — no browser hover delay
      tip.textContent=dispName(b.dataset.name);
      const r=b.getBoundingClientRect();
      tip.style.left=(r.left+r.width/2)+'px';
      tip.style.top=(r.top-8)+'px';
      tip.classList.add('show');
    };
    b.onmouseleave=()=>tip.classList.remove('show');
  });
}
function setStampBtns(){
  document.querySelectorAll('.dt-stamp').forEach(b=> b.classList.toggle('sel', b.dataset.name===armedStamp));
  dcanvas.classList.toggle('stamping', !!armedStamp);
}
function armStamp(name){
  armedStamp = (armedStamp===name) ? null : name;
  if(armedStamp){ eraser=false; document.getElementById('dtErase').classList.remove('sel'); }
  setStampBtns();
}
function disarmStamp(){ armedStamp=null; setStampBtns(); }
function placeStamp(x,y){
  const img=stampImgs[armedStamp]; if(!img||!img.complete||!img.naturalWidth) return;
  const hh=STAMP_H[penSize]||penSize*13;
  const ww=hh*(img.naturalWidth/img.naturalHeight);
  dctx.globalCompositeOperation='source-over';
  dctx.drawImage(img, x-ww/2, y-hh/2, ww, hh);
}

function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function fitCanvas(){
  let data=null;
  try{ if(dcanvas.width) data=dcanvas.toDataURL(); }catch(e){}
  const dpr=window.devicePixelRatio||1;
  dcanvas.width=Math.round(window.innerWidth*dpr);
  dcanvas.height=Math.round(window.innerHeight*dpr);
  dcanvas.style.width=window.innerWidth+'px';
  dcanvas.style.height=window.innerHeight+'px';
  dctx.setTransform(dpr,0,0,dpr,0,0);
  dctx.lineCap='round'; dctx.lineJoin='round';
  if(data){ const img=new Image(); img.onload=()=>dctx.drawImage(img,0,0,window.innerWidth,window.innerHeight); img.src=data; }
}
function setDrawMode(on){
  drawMode=on;
  dcanvas.classList.toggle('on',on);
  document.getElementById('drawTools').classList.toggle('on',on);
  document.getElementById('drawBtn').classList.toggle('on',on);
}
function applyStroke(){
  if(eraser){ dctx.globalCompositeOperation='destination-out'; dctx.lineWidth=penSize*2.6; return; }
  dctx.globalCompositeOperation='source-over';
  dctx.lineWidth = penSize;
  dctx.strokeStyle = penColor;
}
function ptPos(e){ const r=dcanvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

dcanvas.addEventListener('pointerdown', e=>{
  if(!drawMode) return;
  if(armedStamp){ const p=ptPos(e); placeStamp(p[0],p[1]); return; }
  isDrawing=true; [lastX,lastY]=ptPos(e); applyStroke();
  dctx.beginPath(); dctx.moveTo(lastX,lastY); dctx.lineTo(lastX+0.01,lastY+0.01); dctx.stroke();
  try{ dcanvas.setPointerCapture(e.pointerId); }catch(_){}
});
dcanvas.addEventListener('pointermove', e=>{
  if(!drawMode||!isDrawing) return;
  const [x,y]=ptPos(e); applyStroke();
  dctx.beginPath(); dctx.moveTo(lastX,lastY); dctx.lineTo(x,y); dctx.stroke();
  lastX=x; lastY=y;
});
dcanvas.addEventListener('pointerup',   ()=>{ isDrawing=false; });
dcanvas.addEventListener('pointercancel',()=>{ isDrawing=false; });

document.getElementById('drawBtn').onclick = ()=> setDrawMode(!drawMode);
document.getElementById('dtDone').onclick  = ()=> setDrawMode(false);
document.getElementById('dtClear').onclick = ()=> dctx.clearRect(0,0,window.innerWidth,window.innerHeight);
document.getElementById('dtErase').onclick = function(){ eraser=!eraser; this.classList.toggle('sel',eraser); if(eraser) disarmStamp(); };
document.querySelectorAll('.dt-sw').forEach(sw=> sw.onclick=function(){
  penColor=this.dataset.color; eraser=false; disarmStamp(); document.getElementById('dtErase').classList.remove('sel');
  document.querySelectorAll('.dt-sw').forEach(s=>s.classList.remove('sel')); this.classList.add('sel');
});
document.querySelectorAll('.dt-size').forEach(b=> b.onclick=function(){
  penSize=+this.dataset.size;
  document.querySelectorAll('.dt-size').forEach(s=>s.classList.remove('sel')); this.classList.add('sel');
});
buildStampTray();
preloadStamps();
window.addEventListener('resize', fitCanvas);
fitCanvas();

/* ── Sticky notes (v24/v25) — localStorage-backed (per device). Rotatable, draggable, editable.
   Position is stored as a FRACTION of the viewport (fx,fy in 0..1), so a note keeps its
   relative spot on any screen — laptop or the 44" TV — and size scales via CSS tokens.
   Model shape { id, text, fx, fy, rot } is sync-ready: swap notesLoad/notesSave for an
   Airtable field to make notes shared across the team / the TV. ── */
var NOTE_KEY='pine_pb_notes';
function notesLoad(){
  var arr; try{ arr=JSON.parse(lsGet(NOTE_KEY))||[]; }catch(e){ return []; }
  var W=window.innerWidth||1440, H=window.innerHeight||900;
  arr.forEach(function(n){                    // migrate any old px positions to fractions
    if(typeof n.fx!=='number') n.fx = (typeof n.x==='number') ? n.x/W : 0.43;
    if(typeof n.fy!=='number') n.fy = (typeof n.y==='number') ? n.y/H : 0.28;
    delete n.x; delete n.y;
  });
  return arr;
}
function notesSave(){ lsSet(NOTE_KEY, JSON.stringify(notesState)); }
var notesState = notesLoad();
function noteById(id){ return notesState.find(function(n){ return n.id===id; }); }
function clampFx(f){ return Math.max(-0.02, Math.min(0.97, f)); }  // keep a sliver on-screen
function clampFy(f){ return Math.max(0.04, Math.min(0.95, f)); }

function renderNotes(){
  var layer=document.getElementById('notesLayer'); if(!layer) return;
  var W=window.innerWidth, H=window.innerHeight;
  layer.innerHTML = notesState.map(function(n){
    var sz = (n.fw?('width:'+(n.fw*W)+'px;'):'') + (n.fh?('height:'+(n.fh*H)+'px;min-height:0;'):'');
    return '<div class="note" data-id="'+n.id+'" style="left:'+(n.fx*W)+'px;top:'+(n.fy*H)+'px;'+sz+'transform:rotate('+(n.rot||0)+'deg)">'
      + '<div class="note-bar">'
      +   '<span class="note-grip">\u2022 \u2022 \u2022</span>'
      +   '<span class="note-btns">'
      +     '<span class="note-rot" title="Rotate">\u21BB</span>'
      +     '<span class="note-del" title="Delete">\u00D7</span>'
      +   '</span>'
      + '</div>'
      + '<div class="note-txt" contenteditable="true" spellcheck="false" data-ph="Type a show or event\u2026">'+esc(n.text||'')+'</div>'
      + '<span class="note-rz" title="Drag to resize"></span>'
      + '</div>';
  }).join('');
  layer.querySelectorAll('.note').forEach(wireNote);
}

// Reposition (not re-render) on resize/fullscreen so notes hold their relative spot and
// don't clobber an in-progress edit. Size scales automatically via the CSS clamp tokens.
function repositionNotes(){
  var W=window.innerWidth, H=window.innerHeight;
  document.querySelectorAll('.note').forEach(function(el){
    var n=noteById(el.dataset.id); if(!n) return;
    el.style.left=(n.fx*W)+'px'; el.style.top=(n.fy*H)+'px';
    if(n.fw){ el.style.width=(n.fw*W)+'px'; }
    if(n.fh){ el.style.height=(n.fh*H)+'px'; el.style.minHeight='0'; }
  });
}

function bringToFront(id, el){
  var i=notesState.findIndex(function(x){ return x.id===id; });
  if(i>=0){ notesState.push(notesState.splice(i,1)[0]); notesSave(); }
  if(el && el.parentNode){ el.parentNode.appendChild(el); }  // paint on top (same z-index)
}

function wireNote(el){
  var id=el.dataset.id, n=noteById(id); if(!n) return;
  var txt=el.querySelector('.note-txt');
  txt.addEventListener('input', function(){ n.text=txt.innerText; notesSave(); });
  txt.addEventListener('blur',  function(){ n.text=txt.innerText; notesSave(); });
  txt.addEventListener('pointerdown', function(e){ e.stopPropagation(); bringToFront(id, el); });

  var del=el.querySelector('.note-del');
  del.addEventListener('pointerdown', function(e){ e.stopPropagation(); e.preventDefault(); });
  del.addEventListener('click', function(e){
    e.stopPropagation();
    notesState = notesState.filter(function(x){ return x.id!==id; });
    notesSave(); renderNotes();
  });

  // Drag by the top bar (positions kept as viewport fractions)
  var bar=el.querySelector('.note-bar');
  bar.addEventListener('pointerdown', function(e){
    if(e.target.closest('.note-rot')||e.target.closest('.note-del')) return;
    e.preventDefault();
    var W=window.innerWidth, H=window.innerHeight;
    var sx=e.clientX, sy=e.clientY, ox=n.fx*W, oy=n.fy*H;
    bringToFront(id, el);
    function mv(ev){ n.fx=clampFx((ox+(ev.clientX-sx))/W); n.fy=clampFy((oy+(ev.clientY-sy))/H); el.style.left=(n.fx*W)+'px'; el.style.top=(n.fy*H)+'px'; }
    function up(){ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); notesSave(); }
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  });

  // Rotate: grab the handle and spin around the note's center
  var rot=el.querySelector('.note-rot');
  rot.addEventListener('pointerdown', function(e){
    e.preventDefault(); e.stopPropagation();
    var r=el.getBoundingClientRect(), cx=r.left+r.width/2, cy=r.top+r.height/2;
    bringToFront(id, el);
    function mv(ev){ var a=Math.atan2(ev.clientY-cy, ev.clientX-cx)*180/Math.PI; n.rot=Math.round(a+90); el.style.transform='rotate('+n.rot+'deg)'; }
    function up(){ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); notesSave(); }
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  });

  // Resize: drag the corner grip. Delta is projected into the note's own (possibly rotated)
  // frame so the corner tracks the pointer even when the note is tilted. Size persists as a
  // fraction of the viewport, so a resized note keeps its proportions on any screen.
  var rz=el.querySelector('.note-rz');
  rz.addEventListener('pointerdown', function(e){
    e.preventDefault(); e.stopPropagation();
    var W=window.innerWidth, H=window.innerHeight;
    var startW=el.offsetWidth, startH=el.offsetHeight, sx=e.clientX, sy=e.clientY;
    var th=(n.rot||0)*Math.PI/180, cos=Math.cos(th), sin=Math.sin(th);
    bringToFront(id, el);
    function mv(ev){
      var dx=ev.clientX-sx, dy=ev.clientY-sy;
      var ldx=dx*cos+dy*sin;      // delta along the note's local width axis
      var ldy=-dx*sin+dy*cos;     // along its local height axis
      var nw=Math.max(130, Math.min(W*0.6,  startW+ldx));
      var nh=Math.max(90,  Math.min(H*0.85, startH+ldy));
      n.fw=nw/W; n.fh=nh/H;
      el.style.width=nw+'px'; el.style.height=nh+'px'; el.style.minHeight='0';
    }
    function up(){ window.removeEventListener('pointermove',mv); window.removeEventListener('pointerup',up); notesSave(); }
    window.addEventListener('pointermove',mv); window.addEventListener('pointerup',up);
  });
}

function addNote(){
  var id='n'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
  var jx=(Math.random()*0.04-0.02), jy=(Math.random()*0.03-0.015);
  notesState.push({ id:id, text:'', fx:clampFx(0.43+jx), fy:clampFy(0.28+jy),
    rot:Math.round(Math.random()*10-5) });     // slight tilt for that "slapped on" feel
  notesSave(); renderNotes();
  var t=document.querySelector('.note[data-id="'+id+'"] .note-txt'); if(t) t.focus();
}
document.getElementById('noteBtn').onclick = addNote;
window.addEventListener('resize', repositionNotes);
renderNotes();

init();
</script>
</body>
</html>
