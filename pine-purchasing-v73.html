<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Central — Purchasing v73</title>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
/* Topbar - desktop only (above 900px) */
@media (max-width: 900px) {
  .topbar { display: none !important; }
}
:root {
  --bg:#F2F2EE;--surf:#fff;--bd:#E5E5E0;--bd2:#D0D0CA;
  --grn:#1e6b45;--grn-lt:#e8f5ee;--grn-dk:#144d31;
  --txt:#0D0D0B;--mut:#888880;--mut-lt:#BBBBB5;
  --yel:#E8E832;--yel-dim:rgba(232,232,50,.15);--yel-bd:rgba(232,232,50,.3);
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --blu:#1a5fa8;--blu-bg:#eef4fd;--blu-bd:#c5d9f5;
  --sb:#0A0A08;--sb2:#1A1A16;
  --mono:'Courier New',monospace;--sans:Helvetica,Arial,sans-serif;
  --r:4px;--rl:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
.layout{display:flex;height:100vh}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surf);border-bottom:1px solid var(--bd);padding:12px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.tb-sub{font-size:10px;color:var(--mut);flex:1}
.tag{display:inline-flex;align-items:center;font-size:8px;padding:2px 7px;border-radius:2px;white-space:nowrap;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid}
.t-k{background:var(--sb);color:var(--yel);border-color:var(--yel-bd)}
.t-n{background:var(--surf);color:var(--mut);border-color:var(--bd)}
.t-g{background:var(--grn-lt);color:var(--grn-dk);border-color:#b8dfcc}
.t-b{background:var(--blu-bg);color:var(--blu);border-color:var(--blu-bd)}
.t-a{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.t-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.toolbar{background:var(--bg);border-bottom:1px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.vtog{display:flex;border:1px solid var(--bd2);border-radius:var(--r);overflow:hidden}
.vbtn{padding:5px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surf);color:var(--mut);border:none;cursor:pointer;transition:all .1s}
.qbtn{padding:5px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surface);color:var(--mut);border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;white-space:nowrap;transition:all .1s}
.qbtn.on{background:var(--sb);color:var(--yel);border-color:var(--sb);}
.vbtn:hover{color:var(--txt)}
.vbtn.on{background:var(--sb);color:var(--yel)}
.tsep{width:1px;height:20px;background:var(--bd2)}
.fbtn{padding:5px 10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;background:var(--surf);color:var(--mut);border:1px solid var(--bd2);border-radius:var(--r);cursor:pointer;transition:all .1s}
.fbtn:hover{border-color:var(--txt);color:var(--txt)}
.fbtn.on{background:var(--sb);border-color:var(--sb);color:var(--yel)}
.spill{font-size:9px;color:var(--mut);padding:4px 10px;border:1px solid var(--bd);border-radius:20px;background:var(--surf)}
.spill strong{color:var(--txt)}
.content{flex:1;overflow-y:auto;padding:14px 16px}
.ocard{background:var(--surf);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:10px;transition:border-color .12s}
.ocard:hover{border-color:var(--bd2)}
.ocard.open{border-color:var(--grn);border-left:3px solid var(--grn)}
/* v104 Header Card pattern: thumb left, customer/id row, tag row below */
.och{padding:14px 16px;cursor:pointer;display:flex;gap:14px;align-items:flex-start}
.och-thumb{width:80px;height:80px;flex-shrink:0;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd);overflow:hidden;display:flex;align-items:center;justify-content:center}
.och-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.och-thumb-ph{opacity:.18;width:36px;height:36px}
.och-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.och-row{display:flex;justify-content:space-between;align-items:center;gap:10px;min-width:0}
.och-cust{font-size:22px;font-weight:700;line-height:1.1;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.och-num{font-size:36px;font-weight:700;font-family:var(--mono);line-height:1;color:var(--txt);flex-shrink:0}
.och-num.imp{font-size:28px;color:var(--mut)}
.och-garm{font-size:11px;color:var(--mut);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.och-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.odet{border-top:1px solid var(--bd);background:var(--bg);padding:12px 14px 14px}
.dcols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.panel{background:var(--surf);border:1px solid var(--bd);border-radius:var(--rl);overflow:hidden}
.ph{padding:8px 12px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;gap:6px}
.ph-t{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mut)}
.pb{padding:10px 12px}
.szrow{display:flex;gap:4px;flex-wrap:wrap}
.sz{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:4px 6px;min-width:44px;text-align:center}
.sz-l{font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.sz-q{font-size:14px;font-weight:700;font-family:var(--mono)}
.sz.need{border-color:var(--grn);background:var(--grn-lt)}
.sz.need .sz-q{color:var(--grn-dk)}
.sz.ok .sz-q{color:var(--grn)}
.sz.lo .sz-q{color:var(--red)}
.sz.zero .sz-q{color:var(--mut-lt)}
.hr{padding:6px 0;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.hr:last-child{border-bottom:none}
.hr-sup{font-size:10px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hr-meta{font-size:9px;color:var(--mut-lt)}
.hr-cost{font-size:11px;font-family:var(--mono);font-weight:700}
.hr-use{font-size:8px;padding:3px 7px;border-radius:2px;border:1px solid var(--bd2);background:var(--bg);color:var(--mut);cursor:pointer;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap;transition:all .1s}
.hr-use:hover{border-color:var(--grn);color:var(--grn);background:var(--grn-lt)}
.inv-t{width:100%;font-size:11px;border-collapse:collapse}
.inv-t th{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);padding:2px 4px;text-align:right;border-bottom:1px solid var(--bd)}
.inv-t th:first-child{text-align:left}
.inv-t td{padding:3px 4px;text-align:right;font-family:var(--mono);border-bottom:1px solid var(--bd)}
.inv-t td:first-child{text-align:left;font-family:var(--sans);font-size:10px;font-weight:600}
.inv-t tr:last-child td{border-bottom:none}
.qok{color:var(--grn);font-weight:700}.qlo{color:var(--red);font-weight:700}.qz{color:var(--mut-lt)}.myp{color:var(--grn);font-weight:700}
.exbox{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:8px 10px;min-height:34px}
.ex-row{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.ex-sz{font-size:10px;font-weight:700;color:var(--mut)}
.ex-q{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--grn)}
.ex-note{font-size:9px;color:var(--mut-lt);margin-top:5px;line-height:1.5}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.fg{display:flex;flex-direction:column;gap:3px}
.fg.full{grid-column:1/-1}
.fl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut)}
.fi{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:6px 8px;font-size:12px;font-family:var(--mono);color:var(--txt);outline:none;transition:border-color .1s;width:100%}
.fi:focus{border-color:var(--grn)}
.fi::placeholder{color:var(--mut-lt)}
select.fi{cursor:pointer;font-family:var(--sans);font-size:11px}
.btn{background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);color:var(--mut);font-size:9px;padding:5px 10px;cursor:pointer;font-family:var(--sans);font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .1s;white-space:nowrap}
.btn:hover{border-color:var(--txt);color:var(--txt)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-p{background:var(--sb);border-color:var(--sb);color:var(--yel);padding:8px 16px;font-size:10px}
.btn-p:hover{background:#1A1A16}
.btn-ss{background:var(--blu-bg);border-color:var(--blu-bd);color:var(--blu)}
.btn-ss:hover{background:#d8e9fc}
.ggroup{background:var(--surf);border:1px solid var(--bd);border-radius:var(--rl);margin-bottom:8px;overflow:hidden}
.gg-hdr{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px}
.gg-body{border-top:1px solid var(--bd);background:var(--bg)}
.gg-row{padding:8px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.gg-row:last-child{border-bottom:none}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:32px;color:var(--mut-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em}
.spin{width:12px;height:12px;border:2px solid var(--bd);border-top-color:var(--grn);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px;color:var(--mut-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em}
.mok{font-size:11px;color:var(--grn)}.merr{font-size:11px;color:var(--red)}.mamb{font-size:11px;color:var(--amb)}
.mass-form{border-top:2px solid var(--grn);background:var(--grn-lt);padding:12px 14px}
.mass-form .fl{color:var(--grn-dk)}
.mass-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.mass-row:last-child{border-bottom:none}
.mr-num{font-size:10px;font-family:var(--mono);color:var(--grn-dk);flex-shrink:0;width:48px}
.mr-cust{font-size:11px;font-weight:700;flex:1}
.mr-szs{font-size:10px;color:var(--grn-dk);margin-top:1px}
</style>
</head>

<div class="layout">
  <div class="main">
    <div class="topbar">
      <span class="tag t-k" style="font-size:10px;padding:5px 14px;letter-spacing:.1em;border-radius:20px">Ready For Ordering</span>
      <div style="flex:1"></div>
      <span class="tag t-a" id="modeTag" style="border-radius:20px">Demo</span>
      <button class="btn" style="border-radius:20px" onclick="loadQueue()">Refresh</button>
    </div>
    <div class="toolbar">
      <div class="vtog">
        <button class="vbtn on" id="vb-order" onclick="setView('order')">By Order</button>
        <button class="vbtn" id="vb-garment" onclick="setView('garment')">By Garment</button>
        <button class="vbtn" id="vb-spend" onclick="setView('spend')">Spend Summary</button>
      </div>
      <div class="tsep"></div>
      <button class="stat-cell active" id="qb-blanks" onclick="setQueue('blanks')">Blank Goods RFO</button>
      <button class="stat-cell" id="qb-outsourced" onclick="setQueue('outsourced')">Outsourced RFO</button>
      <button class="stat-cell" id="qb-outsourced-prog" onclick="setQueue('outsourced-prog')">Outsourced In Progress</button>
      <button class="stat-cell" id="qb-flatstock" onclick="setQueue('flatstock')">Flatstock RFO</button>
      <button class="stat-cell" id="qb-reprint" onclick="setQueue('reprint')">Reprint RFO</button>
      <div class="tsep"></div>
      <button class="fbtn on" id="fb-all" onclick="setFilter('all')">All</button>
      <button class="fbtn" id="fb-printed" onclick="setFilter('printed')">Printed</button>
      <button class="fbtn" id="fb-embroidered" onclick="setFilter('embroidered')">Embroidered</button>
      <div class="tsep"></div>
      <div class="spill" id="statPill">—</div>
      <button class="btn-refresh" onclick="loadQueue()">Refresh</button>
    </div>
    <div class="content" id="content"><div class="loading"><div class="spin"></div>Loading...</div></div>
  </div>
</div>

function loadImprintQueue(queue) {
  var el=document.getElementById('content');
  if(el)el.innerHTML='<div class="loading"><div class="spin"></div>Loading...</div>';

  var DONE=['Completed','Cancelled / Voided','Partially Completed'];

  // Build Airtable formula filter based on queue type
  var formula='';
  if(queue==='outsourced'){
    // Vendor not empty + status not done + not yet ordered
    formula="AND({fldJDBxnJ97eYSwjR}!='',NOT(OR(FIND('Completed',{fldNROVFSsBwLUOYW}),FIND('Cancelled',{fldNROVFSsBwLUOYW}),FIND('Partially Completed',{fldNROVFSsBwLUOYW}))))";
  } else if(queue==='outsourced-prog'){
    // Vendor not empty + status is active in-progress
    formula="AND({fldJDBxnJ97eYSwjR}!='',OR(FIND('Scheduled',{fldNROVFSsBwLUOYW}),FIND('Pre-press',{fldNROVFSsBwLUOYW}),FIND('Ready to Order',{fldNROVFSsBwLUOYW}),FIND('Received',{fldNROVFSsBwLUOYW}),FIND('Inbound',{fldNROVFSsBwLUOYW})))";
  } else if(queue==='flatstock'){
    formula="AND({fldjNCuaGOkWgzH2K}='Flatstock',NOT(OR(FIND('Completed',{fldNROVFSsBwLUOYW}),FIND('Cancelled',{fldNROVFSsBwLUOYW}))))";
  } else if(queue==='reprint'){
    formula="FIND('Delayed - Mis-Print',{fldNROVFSsBwLUOYW})";
  }

  var flds=[IF.imprintId,IF.imprintType,IF.productType,IF.orderStatus,IF.customer,IF.qty,IF.vendor,IF.reprintId,IF.proofImg].map(function(f){return 'fields%5B%5D='+f;}).join('&');
  var url='https://api.airtable.com/v0/'+BASE+'/'+IMP+'?returnFieldsByFieldId=true&'+flds+'&pageSize=100&sort%5B0%5D%5Bfield%5D=fldc7aezBfzoVPeAY&sort%5B0%5D%5Bdirection%5D=desc&filterByFormula='+encodeURIComponent(formula);

  // Demo mode
  if(AT==='YOUR_AIRTABLE_KEY_HERE'){
    allRecs=demoImpRecs(queue);
    renderImprintQueue(queue);
    return;
  }

  fetch(url,{headers:{'Authorization':'Bearer '+AT}})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.error){throw new Error(d.error.message||'Airtable error');}
      allRecs=d.records||[];
      renderImprintQueue(queue);
    })
    .catch(function(e){
      if(el)el.innerHTML='<div class="empty">Error loading queue: '+esc(e.message)+'</div>';
    });
}

function getImpStatus(rec){
  var raw=rec.fields[IF.orderStatus];
  var vals=flatLookup(raw);
  return vals.length?vals[0]:'';
}

function getImpVendor(rec){
  var v=rec.fields[IF.vendor];
  if(!v||!v.length)return '';
  return typeof v[0]==='object'?(v[0].name||''):v[0]||'';
}

function renderImprintQueue(queue){
  var el=document.getElementById('content');
  if(!el)return;
  if(!allRecs.length){
    el.innerHTML='<div class="empty">No items in this queue right now.</div>';
    return;
  }

  var qLabels={
    'outsourced':'Outsourced RFO',
    'outsourced-prog':'Outsourced In Progress',
    'flatstock':'Flatstock RFO',
    'reprint':'Reprint RFO'
  };

  var html='<div style="padding:0">';

  // Group outsourced queues by vendor
  if(queue==='outsourced'||queue==='outsourced-prog'){
    var byVendor={};

function renderImpCard(rec,queue){
  var f=rec.fields;
  var imprintId=f[IF.imprintId]||'';
  var impType=selName(f[IF.imprintType]);
  var customer=f[IF.customer]||'';
  var qty=f[IF.qty]||0;
  var vendor=getImpVendor(rec);
  var status=getImpStatus(rec);
  var open=expandedId===rec.id;

  // Status tag
  var sc='t-n';
  if(status.indexOf('Delayed')>=0||status.indexOf('Mis-Print')>=0)sc='t-r';
  else if(status.indexOf('Awaiting Proof')>=0||status.indexOf('Sent - Awaiting')>=0)sc='t-a';
  else if(status.indexOf('Scheduled')>=0||status.indexOf('Inbound')>=0)sc='t-g';
  else if(status.indexOf('Pre-press')>=0||status.indexOf('Ready')>=0)sc='t-b';

  // Imprint type tag color
  var itc='t-n';
  if(impType.indexOf('Supacolor')>=0)itc='t-b';
  else if(impType.indexOf('Flatstock')>=0)itc='t-g';

  // Vendor shown only outside vendor-grouped views
  var vendorTag=(vendor&&queue!=='outsourced'&&queue!=='outsourced-prog')?'<span class="tag t-n">'+esc(vendor)+'</span>':'';

  return '<div class="ocard'+(open?' open':'')+'" id="oc-'+rec.id+'">'+
    '<div class="och" onclick="toggleImpCard(\''+rec.id+'\',\''+queue+'\')">'+
      '<div class="och-thumb">'+thumbHTML(f[IF.proofImg])+'</div>'+
      '<div class="och-body">'+
        '<div class="och-row">'+
          '<div class="och-cust">'+esc(customer)+'</div>'+
          '<div class="och-num imp">'+esc(imprintId)+'</div>'+
        '</div>'+
        '<div class="och-meta">'+
          '<span class="tag t-g">'+qty+' pcs</span>'+
          '<span class="tag '+itc+'">'+esc(impType)+'</span>'+
          vendorTag+
          (status?'<span class="tag '+sc+'">'+esc(status)+'</span>':'')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div id="det-'+rec.id+'" style="display:'+(open?'block':'none')+'">'+
      (open?renderImpDetail(rec,queue):'')+
    '</div>'+
  '</div>';
}

function loadQueue(){
  document.getElementById('content').innerHTML='<div class="loading"><div class="spin"></div>Loading RFO queue...</div>';
  if(AT==='YOUR_AIRTABLE_KEY_HERE'){showDemo();return;}
  var flds=Object.values(F).filter(function(v,i,a){return a.indexOf(v)===i;});
  var fp=flds.map(function(f){return 'fields%5B%5D='+f;}).join('&');
  // Fetch up to 3 pages (300 records) from last 180 days, newest first
  // filterByFormula on lookup fields is unreliable — filter client-side instead
  var baseUrl='https://api.airtable.com/v0/'+BASE+'/'+LI+'?returnFieldsByFieldId=true&'+fp+
    '&pageSize=100&filterByFormula='+encodeURIComponent('CREATED_TIME()>DATEADD(TODAY(),-180,"days")')+
    '&sort%5B0%5D%5Bfield%5D='+F.ts+'&sort%5B0%5D%5Bdirection%5D=desc';
  var allFetched=[],offset=null,pages=0;
  function fetchNext(){
    var url=baseUrl+(offset?'&offset='+encodeURIComponent(offset):'');
    fetch(url,{headers:{'Authorization':'Bearer '+AT}})
      .then(function(r){return r.json();})
      .then(function(d){
        if(d.error){throw new Error(d.error.message||'Airtable error');}
        allFetched=allFetched.concat(d.records||[]);
        offset=d.offset||null;
        pages++;
        if(offset&&pages<3){fetchNext();return;}
        // Client-side filter
        var NEEDS_GOODS=['Printed Apparel','Embroidered Apparel'];
        var RFO_STATUSES=['Ready to Order'];
        var rfo=allFetched.filter(function(r){
          var f=r.fields;
          var st=f[F.status],vals=flatLookup(st);
          var tp=selName(f[F.type]);
          if(!(!f[F.ordered]&&vals.some(function(s){return RFO_STATUSES.indexOf(s)>-1;})&&NEEDS_GOODS.indexOf(tp)>-1))return false;
          var garm=(f[F.garment]||'').toLowerCase();
          var SERVICE_KEYWORDS=['ink change','expedited','rush fee','rush order','setup fee','handling','shipping','freight','screen fee','art fee','digitizing','reorder','mis-print','misprint','reprint','credit','adjustment','discount'];
          if(SERVICE_KEYWORDS.some(function(k){return garm.indexOf(k)>-1;}))return false;
          var hasStyle=parseStyle(f[F.garment]||'');
          var qty=f[F.qty]||0;
          if(!hasStyle&&qty<=1)return false;
          return true;
        });
        allRecs=rfo;
        var mt=document.getElementById('modeTag');
        mt.className='tag t-g';mt.textContent='Live';
        loadSSColors();
        render();
      }).catch(function(e){
        document.getElementById('content').innerHTML='<div class="empty">Error loading queue: '+esc(e.message||'Network error')+'</div>';
        var mt=document.getElementById('modeTag');mt.className='tag t-r';mt.textContent='Error';
      });
  }
  fetchNext();
}

  return {id:'recIMP'+id,fields:f};

function loadHist(id){
  var el=document.getElementById('hist-'+id);if(!el)return;
  if(histCache[id]){renderHist(id,histCache[id]);return;}
  var rec=allRecs.find(function(r){return r.id===id;});if(!rec)return;
  var garm=rec.fields[F.garment]||'',style=parseStyle(garm)||garm.split(' ')[0];
  if(AT==='YOUR_AIRTABLE_KEY_HERE'){histCache[id]=demoHist(garm);renderHist(id,histCache[id]);return;}
  var flds=[F.garment,F.supTx,F.c1,F.c2,F.c3,F.qty,F.ts].map(function(f){return 'fields%5B%5D='+f;}).join('&');
  var histFormula=encodeURIComponent('AND(FIND("'+style+'",{'+F.garment+'}),{'+F.c1+'}>0,{'+F.ordered+'}=TRUE())');
  fetch('https://api.airtable.com/v0/'+BASE+'/'+LI+'?returnFieldsByFieldId=true&'+flds+'&pageSize=20&filterByFormula='+histFormula,{headers:{'Authorization':'Bearer '+AT}})
    .then(function(r){return r.json();})
    .then(function(d){
      var m=(d.records||[]).filter(function(r){var g=r.fields[F.garment]||'';return g.indexOf(style)>=0&&r.fields[F.c1];});
      histCache[id]=m;renderHist(id,m);
    }).catch(function(){histCache[id]=demoHist(garm);renderHist(id,histCache[id]);});
}

// S&S INVENTORY
// Confirmed-working pattern (April 24 2026): query-string lookup via Cloudflare Worker.
// Worker: pine-workers-clean-v2.js (minimal forward+auth, streams body).
// URL: /proxy/products/?style={user-typed identifier} — e.g. "Bella + Canvas 3001", "Gildan 5000", "PC78ZH"
// S&S resolves the identifier itself; no client-side map needed (the old SS_STYLE_MAP
// returned wrong products silently and has been removed).
// Products endpoint includes warehouse data inline; qty IS total across all warehouses.
// Use customerPrice (Pine's negotiated price), not salePrice.

function mapProducts(products){
  return products.map(function(p){
    var whs={};
    (p.warehouses||[]).forEach(function(w){
      var wh=w.warehouseAbbr||'?';
      whs[wh]=(whs[wh]||0)+(parseInt(w.qty)||0);
    });
    var img=p.colorOnModelFrontImage||p.colorFrontImage||'';
    if(img&&img.indexOf('http')!==0) img='https://www.ssactivewear.com/'+img;
    if(img) img=img.replace(/_fm\./,'_fl.');
    return {
      sku:p.sku||p.gtin||'',gtin:p.gtin||'',
      skuMaster:p.skuID_Master?String(p.skuID_Master):'',
      colorName:p.colorName||'',styleName:p.styleName||'',
      sizeName:p.sizeName||'?',sizeOrder:p.sizeOrder||'ZZ',
      customerPrice:p.customerPrice||p.piecePrice||0,
      myPrice:p.customerPrice||p.piecePrice||0,
      piecePrice:p.piecePrice||0,salePrice:p.salePrice||0,
      warehouses:whs,image:img,
      swatchImage:p.colorSwatchImage?'https://www.ssactivewear.com/'+p.colorSwatchImage:'',
      color1:p.color1||''
    };
  });
}

// ─── VENDOR ROUTER ──────────────────────────────────────────────────────────
// Single entry point called by toggle() — looks up the garment string,
// dispatches to the correct vendor's loader. Keeps showSSColorPicker / renderSS
// vendor-agnostic since both vendors normalize to the same SKU shape.
function loadVendor(id, garm){
  var vendor=vendorOf(garm);
  if(vendor==='ascolour'){
    var styleCode=ascStyleCodeOf(garm);
    if(!styleCode){
      var el=document.getElementById('ss-'+id);
      if(el) el.innerHTML='<span style="font-size:10px;color:var(--mut)">Could not parse AS Colour style code from "'+esc(garm)+'"</span>';
      return;
    }
    loadAscolour(id, styleCode, colorOf(garm));
  } else {
    var st=brandStyleOf(garm);
    if(st) loadSS(id, st, colorOf(garm));
  }
}

// ─── AS COLOUR ──────────────────────────────────────────────────────────────
// Three endpoints needed per card:
//   1. /catalog/products/{style}/variants  → colors, sizes, image URLs
//   2. /inventory/items?skuFilter={style}   → stock per SKU per warehouse (CA, NC)
//   3. /catalog/pricelist?pageSize=250...   → SKU → contracted USD price (PRIMED ONCE)
// Plus /catalog/colours primed once for hex codes (swatch chip).
//
// Variants and inventory fetch in parallel per card; pricelist + colours are
// session-cached on first AS Colour card open.

// Prime the SKU→price cache by paginating /catalog/pricelist. Resolves once
// the cache is fully populated. Subsequent callers await the same promise.
function primeAscPricelist(){
  if(ascPriceCache) return Promise.resolve(ascPriceCache);
  if(ascPricePromise) return ascPricePromise;
  ascPricePriming=true;
  console.log('[AS] Priming pricelist cache...');
  var cache={};
  function fetchPage(pageNumber){
    var url=AS+'/catalog/pricelist?pageSize=250&pageNumber='+pageNumber;
    return fetch(url).then(function(r){
      if(!r.ok) throw new Error('Pricelist '+r.status);
      return r.json();
    }).then(function(j){
      var rows=(j&&j.data)||[];
      rows.forEach(function(row){
        if(row.sku) cache[row.sku]=row.price||0;
      });
      // Stop when a page returns fewer than 250 (last page reached)
      if(rows.length<250) return cache;
      return fetchPage(pageNumber+1);
    });
  }
  ascPricePromise=fetchPage(1).then(function(){
    ascPriceCache=cache;
    ascPricePriming=false;
    console.log('[AS] Pricelist primed: '+Object.keys(cache).length+' SKUs');
    return cache;
  }).catch(function(e){
    ascPricePriming=false;
    ascPricePromise=null;
    console.warn('[AS] Pricelist prime failed: '+e.message);
    return {};
  });
  return ascPricePromise;
}

// Prime the colour-name → hex cache. Used for swatch chip + color dot.
// Tiny payload, single page. Best-effort — failure leaves swatches blank.
function primeAscColours(){
  if(Object.keys(ascColourHexCache).length) return Promise.resolve(ascColourHexCache);
  return fetch(AS+'/catalog/colours').then(function(r){
    if(!r.ok) throw new Error('Colours '+r.status);
    return r.json();
  }).then(function(j){
    var rows=(j&&j.data)||[];
    rows.forEach(function(row){
      if(row.colour && row.hex){
        var h=String(row.hex).trim();
        if(h && h.indexOf('#')!==0) h='#'+h;
        ascColourHexCache[row.colour.toUpperCase()]=h;
      }
    });
    console.log('[AS] Colours primed: '+Object.keys(ascColourHexCache).length+' hex codes');
    return ascColourHexCache;
  }).catch(function(e){
    console.warn('[AS] Colours prime failed: '+e.message);
    return {};
  });
}

// Map AS Colour variants + inventory + pricelist into the same shape mapProducts
// produces for S&S, so showSSColorPicker / renderSS work unchanged.
function mapAscolour(variants, inventoryRows, priceCache){
  // Build SKU -> warehouse-quantity map from inventory rows
  var invBySku={};
  (inventoryRows||[]).forEach(function(r){
    var sku=r.sku, loc=r.location||'?';
    if(!invBySku[sku]) invBySku[sku]={};
    invBySku[sku][loc]=(invBySku[sku][loc]||0)+(parseInt(r.quantity)||0);
  });
  return (variants||[]).map(function(v){
    var sku=v.sku||'';
    var price=(priceCache&&priceCache[sku])||0;
    var whs=invBySku[sku]||{};
    var hex=ascColourHexCache[String(v.colour||'').toUpperCase()]||'';
    return {
      sku:sku, gtin:v.GTIN12||'',
      skuMaster:'',
      colorName:titleCaseColour(v.colour||''),
      styleName:String(v.styleCode||''),
      sizeName:String(v.sizeCode||'?').toUpperCase(),
      sizeOrder:'ZZ',
      customerPrice:price, myPrice:price, piecePrice:price, salePrice:0,
      warehouses:whs,
      image:v.imageUrl||'',
      swatchImage:'',  // AS Colour doesn't have per-variant swatch images
      color1:hex
    };
  });
}

// AS Colour returns colors UPPERCASE ("FADED BLACK"). Convert to "Faded Black"
// so they match nicely against the garment colorway (which is mixed-case).
function titleCaseColour(s){
  return String(s||'').toLowerCase().replace(/\b\w/g,function(c){return c.toUpperCase();});
}

function loadAscolour(id, styleCode, colorway){
  styleCode=String(styleCode||'').trim();
  var el=document.getElementById('ss-'+id);if(!el)return;
  if(!styleCode){el.innerHTML='<span style="font-size:10px;color:var(--mut)">No style code</span>';return;}
  var ck='asc:'+styleCode.toLowerCase();  // cache key namespaced so it can't collide with S&S keys
  if(ssCache[ck]){showSSColorPicker(id,ssCache[ck],colorway);return;}

  el.innerHTML='<div class="loading" style="padding:10px 0;justify-content:flex-start"><div class="spin"></div><span style="font-size:9px;color:var(--mut-lt)">AS Colour '+esc(styleCode)+'... <span id="asc-prog-'+id+'" style="color:var(--mut-lt)"></span></span></div>';
  function setProg(t){var p=document.getElementById('asc-prog-'+id);if(p) p.textContent=t;}

  // Run all in parallel — pricelist primer, colours primer, variants, inventory.
  // Pricelist + colours are session-cached so subsequent cards don't repay this cost.
  setProg('priming...');
  var pVariants=fetch(AS+'/catalog/products/'+encodeURIComponent(styleCode)+'/variants').then(function(r){
    if(!r.ok) throw new Error('Variants '+r.status);
    return r.json();
  });
  var pInventory=fetch(AS+'/inventory/items?skuFilter='+encodeURIComponent(styleCode)).then(function(r){
    if(!r.ok) throw new Error('Inventory '+r.status);
    return r.json();
  });
  var pPrices=primeAscPricelist();
  var pColours=primeAscColours();

  Promise.all([pVariants, pInventory, pPrices, pColours]).then(function(results){
    var vJson=results[0], iJson=results[1], priceCache=results[2];
    var variants=(vJson&&vJson.data)||[];
    var inventory=(iJson&&iJson.data)||[];
    if(!variants.length){
      el.innerHTML='<span style="font-size:10px;color:var(--mut)">AS Colour style '+esc(styleCode)+' not found — order direct</span>';
      return;
    }
    var merged=mapAscolour(variants, inventory, priceCache);
    ssCache[ck]=merged;
    var colorCount=[...new Set(merged.map(function(m){return m.colorName;}))].length;
    console.log('[AS] '+merged.length+' SKUs, '+colorCount+' colors for style '+styleCode);
    showSSColorPicker(id, merged, colorway);
  }).catch(function(e){
    if(el) el.innerHTML='<span style="font-size:10px;color:var(--mut)">AS Colour fetch failed: '+esc(e.message)+'</span>';
    console.log('[AS] Failed: '+e.message);
  });
}

// ─── S&S ────────────────────────────────────────────────────────────────────
function loadSS(id,style,colorway){
  style=String(style||'').trim();
  var el=document.getElementById('ss-'+id);if(!el)return;
  if(!style){el.innerHTML='<span style="font-size:10px;color:var(--mut)">No style number</span>';return;}
  var ck=style.toLowerCase();
  if(ssCache[ck]){showSSColorPicker(id,ssCache[ck],colorway);return;}

  el.innerHTML='<div class="loading" style="padding:10px 0;justify-content:flex-start"><div class="spin"></div><span style="font-size:9px;color:var(--mut-lt)">Fetching '+esc(style)+'...</span></div>';

  var ssFields='styleName,brandName,sizeName,customerPrice,piecePrice,colorName,color1,color2,colorFrontImage,colorOnModelFrontImage,qty,discontinued,sku,gtin,skuID_Master,sizeOrder,salePrice,colorSwatchImage,warehouses,warehouseAbbr';
  var url=SS+'/products/?style='+encodeURIComponent(style)+'&fields='+ssFields;
  console.log('[S&S] Fetch '+url);
  fetch(url).then(function(r){
    var ct=r.headers.get('content-type')||'';
    if(!ct.includes('json'))throw new Error('Not on S&S ('+r.status+')');
    return r.json();
  }).then(function(products){
    if(!Array.isArray(products)||!products.length)throw new Error('Not carried by S&S');
    // Sanity check: the returned styleName should appear inside what we asked for.
    // We typically send "Bella Canvas 3001CVC" and S&S returns styleName "3001CVC" — so
    // strip both to alphanumeric uppercase and check containment, not equality.
    // A real mismatch (S&S returned a totally different style) will still trip this.
    var retSN=(products[0].styleName||'').replace(/[^a-z0-9]/gi,'').toUpperCase();
    var reqSN=style.replace(/[^a-z0-9]/gi,'').toUpperCase();
    if(retSN&&reqSN&&reqSN.indexOf(retSN)<0&&retSN.indexOf(reqSN)<0){
      console.warn('[S&S] Returned "'+retSN+'" for "'+reqSN+'" — may be wrong style');
    }
    var merged=mapProducts(products);
    ssCache[ck]=merged;
    console.log('[S&S] '+merged.length+' SKUs, '+([...new Set(merged.map(function(m){return m.colorName;}))].length)+' colors for "'+style+'"');
    showSSColorPicker(id,merged,colorway);
  }).catch(function(e){
    if(el)el.innerHTML='<span style="font-size:10px;color:var(--mut)">Not on S&amp;S — order direct</span>';
    console.log('[S&S] "'+style+'" not found: '+e.message);
  });
}

function showSSColorPicker(id, data, suggestedColor) {
  var el = document.getElementById('ss-'+id);
  if (!el) return;
  if (!data || !data.length) {
    el.innerHTML = '<span style="font-size:10px;color:var(--mut)">Not found on S&S</span>';
    return;
  }
  // Extract colors — try colorName first, then scan all string fields for color-like values
  var colors = [...new Set(data.map(function(d){return d.colorName;}))].filter(Boolean).sort();
  // If S&S returned only 1 color, the worker is probably returning a different style
  if(colors.length < 2){
    // If only 1 color returned but it's the right style, just render it
    if(colors.length===1){
      renderSS(id, data, colors[0]);
      return;
    }
    var recDiag=allRecs.find(function(r){return r.id===id;});
    var diagGarm=recDiag?recDiag.fields[F.garment]||'':'';
    var stDiag=brandStyleOf(diagGarm)||parseStyle(diagGarm)||'?';
    el.innerHTML='<div style="background:#fff3cd;border:1px solid #ffc107;border-radius:4px;padding:8px;font-size:10px">'+
      '<b>&#9888; No color data for "'+esc(stDiag)+'"</b><br>'+
      '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px">'+
        '<span style="font-size:9px;font-weight:700">Try a different style:</span>'+
        '<input id="ss-ov-'+id+'" style="flex:1;min-width:160px;padding:3px 6px;border:1px solid var(--bd2);border-radius:var(--r);font-size:11px" placeholder="e.g. Bella + Canvas 3001" value="'+esc(stDiag)+'">'+
        '<button class="btn btn-p" style="font-size:9px" data-ssid="'+id+'" '+
          'onclick="var v=document.getElementById(\'ss-ov-\'+this.dataset.ssid);if(v){var k=v.value.trim();delete ssCache[k.toLowerCase()];loadSS(this.dataset.ssid,k,\'\');}">Try</button>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--mut);margin-top:4px">Tip: include the brand name (e.g. "Gildan 5000", "Bella + Canvas 3001"). S&S returns wrong products for bare style numbers.</div>'+
    '</div>';
    return;
  }

  // Step 1: Auto-match from garment name color (per-record, not shared)
  var recForColor = allRecs.find(function(r){return r.id===id;});
  var garmForColor = recForColor ? recForColor.fields[F.garment]||'' : '';
  var style = parseStyle(garmForColor);
  var gLinkRaw = recForColor ? recForColor.fields[F.garmentLink] : null;
  var gRecId = gLinkRaw && gLinkRaw[0] ? linkId(gLinkRaw[0]) : null;

  if (suggestedColor) {
    var sc = suggestedColor.toLowerCase().replace(/[^a-z0-9]/g,'');
    var autoMatch = colors.find(function(c){
      return c.toLowerCase().replace(/[^a-z0-9]/g,'') === sc;
    }) || colors.find(function(c){
      var cl = c.toLowerCase().replace(/[^a-z0-9]/g,'');
      return cl.indexOf(sc) >= 0 || sc.indexOf(cl) >= 0;
    });
    if (autoMatch) {
      console.log('[S&S] Auto-matched color "'+suggestedColor+'" -> "'+autoMatch+'"');
      renderSS(id, data, autoMatch);
      return;
    }
  }

  // Step 2: Fall back to manually saved color (only set when user picks via picker)
  var savedColor = (gRecId && ssColorCache[gRecId]) ||
                   (style ? localStorage.getItem('pine_ss_color_'+style) : null);
  if (savedColor && colors.indexOf(savedColor) >= 0) {
    renderSS(id, data, savedColor);
    return;
  }

  // Build searchable color picker
  var opts = colors.map(function(c){
    return '<option value="'+esc(c)+'">'+esc(c)+'</option>';
  }).join('');

  // Get style being shown for this record
  var recForId = allRecs.find(function(r){return r.id===id;});
  var garmForId = recForId ? recForId.fields[F.garment]||'' : '';
  var styleForId = parseStyle(garmForId) || '?';

  el.innerHTML =
    '<div style="margin-bottom:8px">'+
      '<div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);margin-bottom:4px">'+
        'S&S Color — style <span style="color:var(--grn-dk);font-family:var(--mono)">'+esc(styleForId)+'</span> &nbsp;'+
        '<span style="color:var(--mut-lt)">('+colors.length+' colors)</span>'+
      '</div>'+
      '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'+
        '<input id="ss-csearch-'+id+'" list="ss-clist-'+id+'" placeholder="Type to filter..." '+
          'style="flex:1;min-width:160px;background:var(--bg);border:1px solid var(--bd2);border-radius:var(--r);padding:5px 8px;font-size:12px;color:var(--txt);outline:none" '+
          'data-ssid="'+id+'" oninput="ssColorSearch(this.dataset.ssid)">'+
        '<datalist id="ss-clist-'+id+'">'+opts+'</datalist>'+
        '<button class="btn btn-p" style="font-size:9px;padding:5px 10px" data-ssid="'+id+'" onclick="ssColorConfirm(this.dataset.ssid)">Show Inventory</button>'+
      '</div>'+
      '<div style="font-size:9px;color:var(--mut-lt);margin-top:4px">'+colors.length+' colors available — type "black", "navy", etc.</div>'+
    '</div>';
}

  var inp = document.getElementById('ss-csearch-'+id);
  // Live feedback as user types
}

function ssColorConfirm(id) {
  var inp = document.getElementById('ss-csearch-'+id);
  if (!inp) return;
  var val = inp.value.trim();
  if (!val) { inp.style.borderColor='var(--red)'; return; }
  inp.style.borderColor='';
  var rec = allRecs.find(function(r){return r.id===id;});
  var garm = rec ? rec.fields[F.garment]||'' : '';
  var style = parseStyle(garm);                  // localStorage key (matches showSSColorPicker)
  var ssKey = brandStyleOf(garm).toLowerCase();  // ssCache key (matches loadSS write)
  var data = ssKey ? ssCache[ssKey] : null;
  if (!data) { inp.style.borderColor='var(--red)'; return; }
  // 1. localStorage fallback
  if (style) { try { localStorage.setItem('pine_ss_color_'+style, val); } catch(e) {} }
  // 2. Write to Airtable Garments so everyone benefits permanently
  var gLinkRaw = rec.fields[F.garmentLink];
  var gRecId = gLinkRaw && gLinkRaw[0] ? linkId(gLinkRaw[0]) : null;
  if (gRecId) {
    ssColorCache[gRecId] = val;
    if (WRITES) {
      var flds = {}; flds[FS_SS_COLOR] = val;
      fetch('https://api.airtable.com/v0/'+BASE+'/'+GT+'/records',{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},
        body:JSON.stringify({records:[{id:gRecId,fields:flds}]})
      }).then(function(r){return r.json();})
        .then(function(d){
          if(d.records) console.log('[S&S] Saved "'+val+'" -> Garment '+gRecId);
          else console.warn('[S&S] Write failed:',JSON.stringify(d));
        })
        .catch(function(e){console.warn('[S&S] Write error:',e.message);});
    }
  }
  renderSS(id, data, val);
}

function loadSSColors() {
  if (!AT || AT==='YOUR_AIRTABLE_KEY_HERE') return;
  var url='https://api.airtable.com/v0/'+BASE+'/'+GT+
    '?fields%5B%5D='+FS_SS_COLOR+
    '&filterByFormula=NOT%28%7B%5BS%26S%5D+Color+Name%7D%3D%22%22%29'+
    '&returnFieldsByFieldId=true&pageSize=100';
  fetch(url,{headers:{'Authorization':'Bearer '+AT}})
    .then(function(r){return r.json();})
    .then(function(d){
      (d.records||[]).forEach(function(r){
        var c=r.fields[FS_SS_COLOR];
        if(c) ssColorCache[r.id]=c;
      });
      console.log('[S&S] Loaded '+Object.keys(ssColorCache).length+' color mappings from Garments');
    })
    .catch(function(e){console.warn('[S&S] loadSSColors:',e.message);});
}

function renderSS(id,data,selectedColor){
  var el=document.getElementById('ss-'+id);if(!el)return;
  if(!data||!data.length){el.innerHTML='<span style="font-size:10px;color:var(--mut)">Not found on S&S</span>';return;}

  var colors=[...new Set(data.map(function(d){return d.colorName;}))];
  var useColor=selectedColor;
  // Exact match first, then case-insensitive
  if(colors.indexOf(useColor)<0){
    var lc=useColor.toLowerCase();
    useColor=colors.find(function(c){return c.toLowerCase()===lc;})||
             colors.find(function(c){return c.toLowerCase().indexOf(lc)>=0;})||
             colors[0];
  }

  // Filter to matched color
  var skus=data.filter(function(d){return d.colorName===useColor;});

  // Size order
  var SZ_ORDER=['XS','S','M','L','XL','2XL','3XL','4XL','5XL','OSFA'];
  skus.sort(function(a,b){
    var ai=SZ_ORDER.indexOf(a.sizeName.toUpperCase()),bi=SZ_ORDER.indexOf(b.sizeName.toUpperCase());
    if(ai<0)ai=99;if(bi<0)bi=99;
    return ai-bi||(a.sizeOrder||'').localeCompare(b.sizeOrder||'');
  });

  var sizes=skus.map(function(s){return s.sizeName.toUpperCase();});

  // needed sizes with quantities
  var rec=allRecs.find(function(r){return r.id===id;});
  var needed={};
  if(rec)SZK.forEach(function(s){var q=rec.fields[F[s.k]]||0;if(q>0)needed[s.l.toUpperCase()]=q;});

  // All warehouses that appear — sorted by distance (DIT days) closest first
  // WH abbreviation -> supplier name lookup for DIT lookup
  var WH_SUP_MAP={KS:'S&S Activewear - Olathe, KS',NV:'S&S Activewear - Reno, NV',TX:'S&S Activewear - Ft. Worth, TX',
    IL:'S&S Activewear - Lockport, IL',GA:'S&S Activewear - McDonough, GA',OH:'S&S Activewear - West Chester, OH',
    PA:'S&S Activewear - Harrisburg, PA',FL:'S&S Activewear - Orlando, FL',MA:'S&S Activewear - Middleboro, MA',
    CN:'S&S Activewear',DS:'S&S Activewear',FO:'S&S Activewear',MN:'S&S Activewear',
    NJ:'S&S Activewear - Robbinsville, NJ'};
  var whMap={};
  skus.forEach(function(s){Object.keys(s.warehouses).forEach(function(w){whMap[w]=true;});});
  var whs=Object.keys(whMap).sort(function(a,b){
    var da=SUP_DIT[WH_SUP_MAP[a]]||99,db=SUP_DIT[WH_SUP_MAP[b]]||99;
    return da-db||a.localeCompare(b);
  });

  // Totals per size
  var totals={};
  sizes.forEach(function(sz,i){
    totals[sz]=Object.values(skus[i].warehouses).reduce(function(s,q){return s+q;},0);
  });

  // Pricing — get unique price tiers
  var prices={};
  skus.forEach(function(s){prices[s.sizeName.toUpperCase()]={my:s.myPrice,customer:s.customerPrice,piece:s.piecePrice,sale:s.salePrice};});

  // Color header — product image + swatch chip + color info
  // Image: prefer on-model front (loaded by mapProducts into .image)
  var imgUrl=skus.length&&skus[0].image?skus[0].image:'';
  var colorHex=skus.length&&skus[0].color1?skus[0].color1:'';
  var swatchUrl=skus.length&&skus[0].swatchImage?skus[0].swatchImage:'';
  // Build price tiers for display and Use button
  var tierPrices={c1:0,c2:0,c3:0,c4:0};
  var TIER_SZ={'XS':'c1','S':'c1','M':'c1','L':'c1','XL':'c1','2XL':'c2','3XL':'c3','4XL':'c4','5XL':'c4','OSFA':'c1'};
  skus.forEach(function(s){
    var tier=TIER_SZ[s.sizeName.toUpperCase()]||'c1';
    if(s.customerPrice&&(!tierPrices[tier]||s.customerPrice>tierPrices[tier])) tierPrices[tier]=s.customerPrice;
  });

  var tierHtml='<strong style="color:var(--grn);font-family:var(--mono)">$'+(tierPrices.c1||0).toFixed(2)+'</strong> <span style="color:var(--mut-lt)">XS-XL</span>';
  if(tierPrices.c2) tierHtml+=' &middot; <strong style="font-family:var(--mono)">$'+tierPrices.c2.toFixed(2)+'</strong> <span style="color:var(--mut-lt)">2XL</span>';
  if(tierPrices.c3) tierHtml+=' &middot; <strong style="font-family:var(--mono)">$'+tierPrices.c3.toFixed(2)+'</strong> <span style="color:var(--mut-lt)">3XL</span>';
  if(tierPrices.c4&&tierPrices.c4!==tierPrices.c3) tierHtml+=' &middot; <strong style="font-family:var(--mono)">$'+tierPrices.c4.toFixed(2)+'</strong> <span style="color:var(--mut-lt)">4XL+</span>';
  if(skus[0]&&skus[0].salePrice&&skus[0].salePrice<skus[0].piecePrice) tierHtml+=' <span style="color:var(--red);font-size:9px;font-weight:700">SALE</span>';

  // Product image — 60x60 thumbnail (clickable to open full size)
  var productImgHtml=imgUrl
    ? '<a href="'+esc(imgUrl)+'" target="_blank" style="flex-shrink:0;width:60px;height:60px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd);overflow:hidden;display:block"><img src="'+esc(imgUrl)+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block"></a>'
    : '<div style="flex-shrink:0;width:60px;height:60px;border-radius:var(--r);background:var(--bg);border:1px solid var(--bd)"></div>';

  // Swatch chip — 36x36 with image preferred, hex fallback
  var swatchHtml='';
  if(swatchUrl){
    swatchHtml='<div style="flex-shrink:0;width:36px;height:36px;border-radius:var(--r);background:'+(colorHex?esc(colorHex):'#000')+';border:1px solid var(--bd2);overflow:hidden"><img src="'+esc(swatchUrl)+'" alt="" style="width:100%;height:100%;object-fit:cover;display:block"></div>';
  } else if(colorHex){
    swatchHtml='<div style="flex-shrink:0;width:36px;height:36px;border-radius:var(--r);background:'+esc(colorHex)+';border:1px solid var(--bd2)"></div>';
  }

  var colorNote='<div style="margin-bottom:10px">'+
    '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">'+
      productImgHtml+
      swatchHtml+
      '<div style="flex:1;min-width:140px;display:flex;flex-direction:column;gap:3px">'+
        '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">'+
          '<span class="tag t-g">'+esc(useColor)+'</span>'+
          (colors.length>1?'<span style="font-size:9px;color:var(--mut-lt)">'+colors.length+' colors on S&S</span>':'')+
        '</div>'+
        '<div style="font-size:10px;color:var(--mut)">'+tierHtml+'</div>'+
      '</div>'+
    '</div>'+
    '<div style="margin-top:8px">'+
      '<button class="btn btn-p" style="font-size:9px;padding:4px 10px" '+
        'data-ssid="'+id+'" data-c1="'+(tierPrices.c1||0)+'" data-c2="'+(tierPrices.c2||0)+'" data-c3="'+(tierPrices.c3||0)+'" data-c4="'+(tierPrices.c4||0)+'" '+
        'onclick="useSSPrices(this)">Use S&amp;S Prices</button>'+
    '</div>'+
  '</div>';

  // Build the warehouse x size matrix
  // "Need" sub-header row showing how many of each size this order requires

function selectWHRow(id, wh, supName) {
  var ssEl=document.getElementById('ss-'+id);
  if(ssEl){ssEl.querySelectorAll('tr[onclick]').forEach(function(r){r.style.outline='';});
    event.currentTarget&&(event.currentTarget.style.outline='2px solid var(--grn)');}
  // Fill supplier matching this warehouse
  var sel=document.getElementById('fs-'+id);
  if(sel){
    var found=false;
    for(var i=0;i<sel.options.length;i++){
      if(sel.options[i].value===supName){sel.value=supName;found=true;break;}
    }
    if(!found){for(var i=0;i<sel.options.length;i++){if(sel.options[i].value.indexOf('S&S')>=0){sel.value=sel.options[i].value;break;}}}
  }
  // Auto-fill arrival date from this supplier's DIT
  autoArrival(id);
  // Fill all price tiers from cached S&S data
  var rec=allRecs.find(function(r){return r.id===id;});
  var garm=rec?rec.fields[F.garment]||'':'';
  var style=brandStyleOf(garm).toLowerCase();
  var data=style?ssCache[style]:null;
  if(data){
    var TIER_MAP={'XS':'c1','S':'c1','M':'c1','L':'c1','XL':'c1','2XL':'c2','3XL':'c3','4XL':'c4','5XL':'c4','OSFA':'c1'};
    var tiers={};
    data.forEach(function(d){
      var tier=TIER_MAP[d.sizeName.toUpperCase()]||'c1';
      if(d.customerPrice&&(!tiers[tier]||d.customerPrice>tiers[tier])) tiers[tier]=d.customerPrice;
    });
    if(tiers.c1){var e=document.getElementById('fc1-'+id);if(e&&!e.value)e.value=tiers.c1.toFixed(2);}
    if(tiers.c2){var e=document.getElementById('fc2-'+id);if(e&&!e.value)e.value=tiers.c2.toFixed(2);}
    if(tiers.c3){var e=document.getElementById('fc3-'+id);if(e&&!e.value)e.value=tiers.c3.toFixed(2);}
    updateCostPreview(id);
  }
  console.log('[WH select] id='+id+' wh='+wh+' sup='+supName);
}

function useSSP(id, c1, c2, c3, c4) {

function massAutoArrival(gid) {

function autoArrival(id) {
  var sel=document.getElementById('fs-'+id);
  var inp=document.getElementById('fa-'+id);
  if(!sel||!inp) return;
  var supName=sel.value;
  if(!supName) return;
  var dit=SUP_DIT[supName];
  if(!dit) return;
  // Add DIT business days to today (skip weekends)
  var d=new Date();
  var remaining=dit;
  while(remaining>0){
    d.setDate(d.getDate()+1);
    var dow=d.getDay();
    if(dow!==0&&dow!==6) remaining--; // skip Sun/Sat
  }
  var yyyy=d.getFullYear(),mm=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
  inp.value=yyyy+'-'+mm+'-'+dd;
  inp.style.borderColor='var(--grn)';
  setTimeout(function(){if(inp)inp.style.borderColor='';},2000);
}

// PLACE ORDER — S&S DIRECT
function placeSSOrder(id){
  var po=document.getElementById('fp-'+id).value.trim(),sup=document.getElementById('fs-'+id).value;
  if(!po){setMsg(id,'err','Enter a PO number first');return;}
  var rec=allRecs.find(function(r){return r.id===id;});if(!rec)return;
  var f=rec.fields,garm=f[F.garment]||'',style=brandStyleOf(garm).toLowerCase();
  var ck=style,data=ssCache[ck];
  if(!data||!data.length){setMsg(id,'err','Load S&S inventory first');return;}
  var ct=colorOf(garm).toLowerCase().replace(/[^a-z0-9]/g,'');
  var ex=getExtras(id);
  var whMap={Olathe:'KS','Ft. Worth':'TX',Reno:'NV',Lockport:'IL',Fresno:'CA',McDonough:'GA',Bolingbrook:'IL',Robbinsville:'NJ','West Chester':'OH',Harrisburg:'PA',Orlando:'FL','Pompano Beach':'FL',Reading:'PA',Middleboro:'MA','Salt Lake':'UT',Phoenix:'AZ',Houston:'TX'};
  var wh='KS';Object.keys(whMap).forEach(function(k){if(sup.indexOf(k)>=0)wh=whMap[k];});
  var lines=[];
  SZO.forEach(function(sz){
    var need=f[F[FK[sz]||'xs']]||0,extra=ex[sz]||0,total=need+extra;
    if(total<=0)return;
    var item=data.find(function(d){
      var dc=(d.catalogColor||d.colorName||'').toLowerCase().replace(/[^a-z0-9]/g,'');
      var ds=(d.sizeName||d.size||'').toUpperCase();
      return ds===sz&&(dc.indexOf(ct)>=0||ct.indexOf(dc)>=0||!ct);
    });
    if(item)lines.push({identifier:item.sku||item.gtin||item.skuID_Master,qty:total,warehouseAbbr:wh});
  });
  if(!lines.length){setMsg(id,'err','Could not match sizes to S&S SKUs');return;}
  if(!WRITES){setMsg(id,'amb','Preview: S&S PO='+esc(po)+', '+lines.length+' lines, '+lines.reduce(function(s,l){return s+l.qty;},0)+' pcs to '+wh);return;}
  var btn=document.getElementById('fss-'+id);btn.disabled=true;btn.textContent='Placing...';
  fetch(SS+'/orders/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({poNumber:po,shippingMethod:'1',testOrder:false,autoselectWarehouse:false,shippingAddress:{customer:'Pine Central',address:'1234 Pine St',city:'Fort Collins',state:'CO',zip:'80525',residential:false},lines:lines})})
    .then(function(r){return r.json();})
    .then(function(d){
      var o=Array.isArray(d)?d[0]:d;
      if(o&&o.orderNumber){setMsg(id,'ok','S&S Order #'+o.orderNumber+' placed! Now mark ordered in Airtable.');btn.style.display='none';}
      else{setMsg(id,'err','S&S: '+(o&&o.errors?o.errors[0].message:JSON.stringify(d).substring(0,80)));btn.disabled=false;btn.textContent='Place Order on S&S Directly';}
    }).catch(function(e){setMsg(id,'err',e.message);btn.disabled=false;btn.textContent='Place Order on S&S Directly';});
}

  var c2=parseFloat((document.getElementById('fc2-'+id)||{}).value)||parseFloat(rec.fields[F.c2])||0;
  var c3=parseFloat((document.getElementById('fc3-'+id)||{}).value)||parseFloat(rec.fields[F.c3])||0;
  var ib=parseFloat((document.getElementById('fib-'+id)||{}).value)||parseFloat(rec.fields[F.inbound])||0;
  if(!c1){el.innerHTML='';return;}

    '<span style="font-size:10px;color:var(--grn);font-family:var(--mono)">'+qty+' pcs &nbsp;|&nbsp; avg $'+(qty?(total-ib)/qty:0).toFixed(2)+'/pc</span>'+
    (ib?'<span style="font-size:9px;color:var(--mut)">incl. $'+ib.toFixed(2)+' freight</span>':'')+

function parseStyle(g){
  if(!g)return null;
  var gl=g.toLowerCase();
  // Shakawear special: MHSS, SHMHSS (all-alpha style codes)
  if(gl.indexOf('shaka')>-1||gl.indexOf('shakawear')>-1){
    var sm=g.match(/\b(SH[A-Z]+)\b/i);if(sm)return sm[1].toLowerCase();
    if(gl.indexOf('mhss')>-1)return 'shmhss';
  }
  // OTTO cap hyphenated: 31-069, 18-772 → grab the full hyphenated token
  var otto=g.match(/\b(\d{2,3}-\d{3,4})\b/);if(otto)return otto[1];
  // Standard: BC3001, PC78ZH, 1717, IND4000 etc
  var m=g.match(/\b([A-Za-z]{0,4}\d{2,6}[A-Za-z0-9]{0,4})\b/);
  if(m)return m[1].toLowerCase();
  return null;
}
function colorOf(g){var p=g.split(' - ');return p.length>1?p.slice(1).join(' - '):'';}
// thumbHTML: build the 80x80 header thumbnail. Pulls first valid thumbnail URL
// from a Proof Images attachment field (either array of {thumbnails:{small/large:{url}}}
// objects on Line Items, or flat-lookup array of same on Imprints).
// Returns img element if available, placeholder SVG otherwise.
function thumbHTML(rawProofs){
  var arr=flatLookup(rawProofs);
  var url='';
  for(var i=0;i<arr.length;i++){
    var att=arr[i];
    if(!att) continue;
    if(att.thumbnails&&att.thumbnails.large&&att.thumbnails.large.url){url=att.thumbnails.large.url;break;}
    if(att.thumbnails&&att.thumbnails.small&&att.thumbnails.small.url){url=att.thumbnails.small.url;break;}
    if(att.url&&att.type&&att.type.indexOf('image')===0){url=att.url;break;}
  }
  if(url) return '<img src="'+esc(url)+'" alt="Proof">';
  return thumbPlaceholderSVG();
}
function thumbPlaceholderSVG(){
  return '<svg class="och-thumb-ph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7h18v12H3z"/><circle cx="8.5" cy="11" r="1.5"/><path d="M21 16l-5-5-9 9"/></svg>';
}
// brandStyleOf: extract everything before the last " - " color suffix.
// "Bella Canvas 3001CVC - Black Heather" -> "Bella Canvas 3001CVC"
// "Gildan 64000 - Charcoal" -> "Gildan 64000"
// No dash separator? Return the whole string trimmed.
// This is the identifier shape S&S resolves correctly via /proxy/products/?style=
// Bare style numbers (e.g. "3001") get interpreted as SKU IDs by S&S — wrong product.
function brandStyleOf(g){
  if(!g) return '';
  var p=g.split(' - ');
  return (p.length>1 ? p.slice(0,-1).join(' - ') : g).trim();
}
// vendorOf: route a garment to the correct vendor API.
// "AS Colour 5050 - Black" -> "ascolour"
// Anything else -> "ss"
// Naming convention: garments table consistently uses "AS Colour <style> - <color>".
// Case-insensitive prefix check so a stray "ASColour" or "AS COLOUR" still routes correctly.
function vendorOf(g){
  if(!g) return 'ss';
  var s=String(g).toLowerCase().replace(/\s+/g,'');
  return s.indexOf('ascolour')===0 ? 'ascolour' : 'ss';
}
// ascStyleCodeOf: extract the bare numeric style code from an AS Colour garment name.
// "AS Colour 5050 - Faded Black" -> "5050"
// AS Colour API uses bare style codes like "1001", "5050" in /catalog/products/{style}/variants.
function ascStyleCodeOf(g){
  if(!g) return '';
  var bs=brandStyleOf(g);                  // "AS Colour 5050"
  var parts=bs.split(/\s+/);
  // Find the last numeric-ish token (style codes are always 4-digit numbers)
  for(var i=parts.length-1;i>=0;i--){
    if(/^\d+[A-Z]?$/i.test(parts[i])) return parts[i];
  }
  return '';
}
function cleanSup(raw){return raw.replace(/^\[?"?|"?\]?$/g,'').replace(/",\s*"/g,' + ').replace(/"/g,'').trim();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setMsg(id,type,txt){var el=document.getElementById('fmsg-'+id);if(el){el.className='m'+type;el.innerHTML=txt;}}

function renderSpend(recs) {

    var c1=parseFloat(f[F.c1])||0,c2=parseFloat(f[F.c2])||0,c3=parseFloat(f[F.c3])||0;
    var ib=parseFloat(f[F.inbound])||0;
    if(!c1){uncosted++;return;}
    var sup=f[F.supTx]||'— No Supplier Yet —';
    if(!bySupplier[sup])bySupplier[sup]={total:0,lines:0,qty:0,records:[]};
    var t1=0,t2=0,t3=0;
    SZK.forEach(function(s){
      var q=f[F[s.k]]||0;if(!q)return;
      var sz=s.l.toUpperCase();
      if(sz==='2XL')t2+=q;else if(sz==='3XL')t3+=q;else t1+=q;
    });
    var lineCost=(t1*c1)+(t2*(c2||c1))+(t3*(c3||c1))+ib;
    bySupplier[sup].total+=lineCost;bySupplier[sup].lines++;
    bySupplier[sup].qty+=(t1+t2+t3);

  });
  var sups=Object.keys(bySupplier).sort(function(a,b){return bySupplier[b].total-bySupplier[a].total;});

function massOrder(gid, el) {
  var recIds = el && el.dataset && el.dataset.ids ? JSON.parse(el.dataset.ids) : [];
  var sup = document.getElementById('mf-sup-'+gid).value;
  var po  = document.getElementById('mf-po-'+gid).value.trim();
  var c1  = parseFloat(document.getElementById('mf-c1-'+gid).value)||0;
  var c2  = parseFloat(document.getElementById('mf-c2-'+gid).value)||0;
  var c3  = parseFloat(document.getElementById('mf-c3-'+gid).value)||0;
  var mib = parseFloat((document.getElementById('mf-ib-'+gid)||{}).value)||0;
  var mon = ((document.getElementById('mf-on-'+gid)||{}).value||'').trim();
  var msg = document.getElementById('mf-msg-'+gid);

  if (!sup) { msg.className='merr'; msg.textContent='Select a supplier'; return; }
  if (!po)  { msg.className='merr'; msg.textContent='Enter a PO number'; return; }
  if (!c1)  { msg.className='merr'; msg.textContent='Enter cost per piece'; return; }

  if (!WRITES) {
    msg.className='mamb';
    msg.className='mamb';msg.innerHTML='&#128065; Preview (writes off): <b>'+esc(sup)+'</b> &nbsp;PO: '+esc(po)+' &nbsp;$'+c1.toFixed(2)+'/pc &nbsp;&rarr; '+recIds.length+' records';
    return;
  }

  var btn = document.getElementById('mf-sub-'+gid);
  btn.disabled = true;
  btn.textContent = 'Saving...';
  msg.textContent = '';

  var fields = {};
  fields[F.ordered] = true;
  fields[F.po] = po;
  fields[F.c1] = c1;
  if (c2) fields[F.c2] = c2;
  if (c3) fields[F.c3] = c3;
  if (mib) fields[F.inbound] = mib;
  if (mon) fields[F.orderNotes] = mon;

  // Batch into groups of 10 (Airtable limit)
  var batches = [];
  for (var i = 0; i < recIds.length; i += 10) {
    batches.push(recIds.slice(i, i + 10));
  }

  var completed = 0;
  var errors = [];

  function runBatch(idx) {
    if (idx >= batches.length) {
      // All done
      if (errors.length) {
        msg.className='merr';
        msg.textContent = errors.length+' error(s): '+errors[0];
        btn.disabled=false; btn.textContent='Retry';
      } else {
        msg.className='mok';
        msg.textContent = 'Done — '+completed+' records marked ordered';
        // Remove those records from allRecs and re-render
        recIds.forEach(function(id){ allRecs = allRecs.filter(function(r){return r.id!==id;}); });
        setTimeout(function(){ render(); }, 1200);
      }
      return;
    }

    var records = batches[idx].map(function(id){ return {id:id, fields:fields}; });
    fetch('https://api.airtable.com/v0/'+BASE+'/'+LI+'/records', {
      method: 'PATCH',
      headers: {'Authorization':'Bearer '+AT, 'Content-Type':'application/json'},
      body: JSON.stringify({records: records})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      if (d.records) {
        completed += d.records.length;
        msg.className='mamb';
        msg.textContent = 'Saving... ('+completed+'/'+recIds.length+')';
        runBatch(idx + 1);
      } else {
        errors.push(d.error||'Unknown error');
        runBatch(idx + 1);
      }
    })
    .catch(function(e){
      errors.push(e.message);
      runBatch(idx + 1);
    });
  }

  runBatch(0);
}


function renderMassWHPicker(gid, style, colorway, rs) {
  var ck = style;
  var data = ssCache[ck];
  if (!data || !data.length) {
    return '<span style="font-size:10px;color:var(--amb)">Open a card and load S&S inventory first to see warehouse options</span>';
  }

  // Find the matched color
  var colors = [...new Set(data.map(function(d){return d.colorName;}))];
  var tc = colorway?colorway.toLowerCase().replace(/[^a-z0-9]/g,''):'';
  var matchColor = tc?colors.find(function(c){var cl=c.toLowerCase().replace(/[^a-z0-9]/g,'');return cl.indexOf(tc)>=0||tc.indexOf(cl)>=0;}):null;
  if (!matchColor) {
    var CORE=['S','M','L','XL'];
    var scored=colors.map(function(c){
      var colorSkus=data.filter(function(d){return d.colorName===c;});
      var sizeNames=[...new Set(colorSkus.map(function(d){return d.sizeName.toUpperCase();}))];
      var coreCount=CORE.filter(function(s){return sizeNames.indexOf(s)>=0;}).length;
      // Heavy penalty if missing most core sizes — avoids single-size specialty colorways
      var score=coreCount>=3 ? coreCount*100+sizeNames.length : coreCount*5;
      return {c:c,score:score,sizes:sizeNames};
    });
    console.log('[S&S color] top 3:', scored.sort(function(a,b){return b.score-a.score;}).slice(0,3).map(function(x){return x.c+'('+x.sizes.join(',')+')';}).join(' | '));
    scored.sort(function(a,b){return b.score-a.score;});
    scored.sort(function(a,b){return b.score-a.score;});
    matchColor = scored[0].c;
  }

  var colorSkus = data.filter(function(d){return d.colorName===matchColor;});

  // Get total needed sizes across all orders in this group
  var totalNeeded = {};
  rs.forEach(function(r){
    var f = r.fields;
    SZK.forEach(function(s){
      var q = f[F[s.k]]||0;
      if (q>0) totalNeeded[s.l.toUpperCase()] = (totalNeeded[s.l.toUpperCase()]||0)+q;
    });
  });

  // Get all warehouses and their stock for needed sizes
  var whTotals = {};
  // Build price tiers from colorSkus
  var massTiers = {c1:0,c2:0,c3:0,c4:0};
  var MASS_TIER_SZ = {'XS':'c1','S':'c1','M':'c1','L':'c1','XL':'c1','2XL':'c2','3XL':'c3','4XL':'c4','5XL':'c4','OSFA':'c1'};
  colorSkus.forEach(function(sku){
    var sz = sku.sizeName.toUpperCase();
    var tier = MASS_TIER_SZ[sz]||'c1';
    if(sku.customerPrice&&(!massTiers[tier]||sku.customerPrice>massTiers[tier])) massTiers[tier]=sku.customerPrice;
    if (!totalNeeded[sz]) return; // skip sizes we don't need for warehouse check
    Object.keys(sku.warehouses).forEach(function(wh){
      if (!whTotals[wh]) whTotals[wh] = {canFill:true, short:[]};
      var stock = sku.warehouses[wh]||0;
      var need = totalNeeded[sz]||0;
      if (stock < need) {
        whTotals[wh].canFill = false;
        whTotals[wh].short.push(sz+':need '+need+',have '+stock);
      }
    });
  });

  var whs = Object.keys(whTotals).sort();
  if (!whs.length) return '<span style="font-size:10px;color:var(--mut)">No warehouse data available</span>';

  var priceLabel = massTiers.c1 ? ' $'+massTiers.c1.toFixed(2) : '';
  var btns = whs.map(function(wh){
    var info = whTotals[wh];
    var icon = info.canFill ? '&#10003;' : '&#9888;';
    var title = info.canFill ? 'Full stock' : 'Short: '+info.short.join(', ');
        return '<button class="btn '+(info.canFill?'btn-g':'')+'" '+
      'data-gid="'+gid+'" data-wh="'+wh+'" '+
      'data-c1="'+(massTiers.c1||0)+'" data-c2="'+(massTiers.c2||0)+'" data-c3="'+(massTiers.c3||0)+'" data-c4="'+(massTiers.c4||0)+'" '+
      'id="mf-wh-btn-'+gid+'-'+wh+'" '+
      'title="'+esc(title)+'" '+
      'onclick="selectMassWH(this)" '+
      'style="font-size:9px;padding:4px 8px;'+(info.canFill?'border-color:#b8dfcc;':'border-color:var(--amb-bd);color:var(--amb);')+'">'
      +icon+' '+wh+priceLabel+'</button>';
  }).join('');

  return btns + '<span id="mf-wh-sel-'+gid+'" style="font-size:10px;color:var(--mut-lt);margin-left:8px">click to select</span>';
}

function selectMassWH(btn) {
  var gid = btn.dataset.gid;
  var wh = btn.dataset.wh;
  var c1 = parseFloat(btn.dataset.c1)||0;
  var c2 = parseFloat(btn.dataset.c2)||0;
  var c3 = parseFloat(btn.dataset.c3)||0;
  // Highlight selected button
  document.querySelectorAll('[id^="mf-wh-btn-'+gid+'-"]').forEach(function(b){
    b.style.background='';
    b.style.color='';
    b.style.borderColor='';
  });
  btn.style.background='var(--sb)'; btn.style.color='var(--yel)'; btn.style.borderColor='var(--sb)';
  var lbl = document.getElementById('mf-wh-sel-'+gid);
  if (lbl) { lbl.textContent = wh+' selected'; lbl.style.color='var(--grn)'; }
  // Store selected warehouse
  var form = document.getElementById('mf-'+gid);
  if (form) form.dataset.wh = wh;
  // Always fill S&S tiered prices
  if (c1) { var e=document.getElementById('mf-c1-'+gid); if(e) e.value=c1.toFixed(2); }
  if (c2) { var e=document.getElementById('mf-c2-'+gid); if(e) e.value=c2.toFixed(2); }
  if (c3) { var e=document.getElementById('mf-c3-'+gid); if(e) e.value=c3.toFixed(2); }
  // Auto-select matching S&S supplier
  var sel = document.getElementById('mf-sup-'+gid);
  var whSupMap = {KS:'S&S Activewear - Olathe, KS',NV:'S&S Activewear - Reno, NV',TX:'S&S Activewear - Ft. Worth, TX',IL:'S&S Activewear - Lockport, IL',GA:'S&S Activewear - McDonough, GA',OH:'S&S Activewear - West Chester, OH',PA:'S&S Activewear - Harrisburg, PA',FL:'S&S Activewear - Orlando, FL',MA:'S&S Activewear - Middleboro, MA'};
  var supName = whSupMap[wh]||'';
  if (sel && supName) {
    for (var i=0;i<sel.options.length;i++){
      if (sel.options[i].value===supName){sel.value=supName;break;}
    }
  }
  // Auto-fill arrival
  massAutoArrival(gid);
}


function clearSSColor(id) {
  var rec = allRecs.find(function(r){return r.id===id;});
  var garm = rec ? rec.fields[F.garment]||'' : '';
  var style = parseStyle(garm);                  // localStorage key (matches saveSSColor)
  var ssKey = brandStyleOf(garm).toLowerCase();  // ssCache key (matches loadSS write)
  if (style) { try { localStorage.removeItem('pine_ss_color_'+style); } catch(e) {} }
  // Clear from Airtable too
  var gLinkRaw = rec ? rec.fields[F.garmentLink] : null;
  var gRecId = gLinkRaw && gLinkRaw[0] ? linkId(gLinkRaw[0]) : null;
  if (gRecId) {
    delete ssColorCache[gRecId];
    if (WRITES) {
      var flds = {}; flds[FS_SS_COLOR] = null;
      fetch('https://api.airtable.com/v0/'+BASE+'/'+GT+'/records',{
        method:'PATCH',
        headers:{'Authorization':'Bearer '+AT,'Content-Type':'application/json'},
        body:JSON.stringify({records:[{id:gRecId,fields:flds}]})
      });
    }
  }
  var data = ssKey ? ssCache[ssKey] : null;
  if (data) showSSColorPicker(id, data, colorOf(garm));
}
