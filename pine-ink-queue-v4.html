<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Ink Queue v4</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--sb-bg:#0A0A08;--sb-border:#1A1A16;
  --sans:Helvetica,Arial,sans-serif;
  --red:#c0392b;--red-lt:#fdf0ee;
  --amber:#b8620a;--amber-lt:#fef7ee;
}
html,body{height:100%;font-family:var(--sans);background:var(--bg);color:var(--text);font-size:14px}
.shell{display:flex;height:100vh;overflow:hidden}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{padding:0 20px;height:44px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:20}
.topbar-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;flex:1}
.topbar-meta{font-size:11px;color:var(--muted);letter-spacing:.03em}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.03em;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:background .12s}
.btn-sm:hover{background:var(--bg)}

/* STATS */
.stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.stat{padding:10px 18px;border-right:1px solid var(--border);display:flex;flex-direction:column;gap:1px}
.stat:last-child{border-right:none}
.stat-n{font-size:22px;font-weight:700;line-height:1;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em}
.stat-n.g{color:var(--green)}
.stat-n.r{color:var(--red)}
.stat-n.a{color:var(--amber)}

/* DATE HEADER */
.date-header{padding:6px 20px;background:var(--bg);border-bottom:1px solid var(--border);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;position:sticky;top:44px;z-index:10}
.date-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.date-label.today{color:var(--green)}
.date-sub{font-size:10px;color:var(--muted)}
.date-ready{margin-left:auto;font-size:10px;color:var(--muted)}
.date-ready b{color:var(--green)}

/* ORDER GROUP */
.order-group{margin:0}
.order-header{padding:5px 20px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.order-label{font-size:10px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase}
.order-name{font-size:11px;font-weight:600;color:var(--text)}

/* JOB CARD — matches catching queue shell view */
.job-card{background:var(--surface);border-bottom:1px solid var(--border);cursor:pointer}
.job-card:hover .card-inner{background:#f8f8f4}
.job-card.expanded .card-inner{background:#f4f4f0}
.job-card.ready-done{border-left:3px solid var(--green)}
.job-card.no-ink{border-left:3px solid var(--red)}
.card-inner{display:flex;align-items:center;gap:14px;padding:12px 20px;transition:background .12s}
.card-thumb{width:52px;height:52px;flex-shrink:0;border-radius:5px;overflow:hidden;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--muted-lt);font-size:18px}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card-body{flex:1;min-width:0}
.card-title{font-size:13px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.card-sub{font-size:11px;color:var(--muted);margin-top:1px;font-family:monospace;letter-spacing:.01em}
.card-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.chip-qty{background:var(--sb-bg);color:var(--yellow)}
.chip-loc{background:#f0f0ea;color:#555}
.chip-discharge{background:var(--green-lt);color:var(--green)}
.chip-ow{background:#fef3e8;color:#c45c00}
.chip-ezp{background:#f2eeff;color:#5b3fa0}
.chip-dtf{background:#e8f7f9;color:#0e6b7a}
.chip-graphics{background:#f0f0ea;color:var(--muted)}
.chip-repeat{background:var(--sb-bg);color:var(--yellow)}
.chip-noink{background:var(--red-lt);color:var(--red)}
.chip-norecipe{background:var(--amber-lt);color:var(--amber)}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.card-time{font-size:10px;font-family:monospace;color:var(--muted)}
.ready-toggle{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--muted-lt);transition:all .15s;flex-shrink:0}
.ready-toggle.on{background:var(--green);border-color:var(--green);color:#fff}
.ready-toggle:hover:not(.on){border-color:var(--green);background:var(--green-lt);color:var(--green)}
.expand-arrow{font-size:11px;color:var(--muted-lt);transition:transform .2s}
.job-card.expanded .expand-arrow{transform:rotate(90deg);color:var(--muted)}

/* EXPANDED DETAIL */
.job-detail{display:none;border-top:1px solid var(--border);background:#fafaf8}
.job-card.expanded .job-detail{display:block}
.detail-inner{padding:16px 20px;display:flex;gap:16px;flex-wrap:wrap}
.detail-col{flex:1;min-width:260px}

/* INK LIST */
.ink-section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.prev-pill{font-size:9px;background:var(--sb-bg);color:var(--yellow);padding:1px 6px;border-radius:3px;letter-spacing:.04em}
.ink-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.ink-row:last-child{border-bottom:none}
.ink-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.ink-info{flex:1;min-width:0}
.ink-name{font-size:12px;font-weight:600;line-height:1.3}
.ink-meta{font-size:10px;color:var(--muted);margin-top:1px}
.ink-recipe{margin-top:5px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:7px 9px;font-size:11px;font-family:monospace;line-height:1.7;white-space:pre-wrap;color:#444}
.ink-norecipe{font-size:11px;color:var(--amber);font-style:italic;margin-top:4px}
.ink-loading{font-size:11px;color:var(--muted);font-style:italic;padding:8px 0}
.print-notes{margin-top:10px;background:var(--amber-lt);border:1px solid #e8c890;border-radius:5px;padding:8px 11px}
.print-notes-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amber);margin-bottom:3px}
.print-notes-txt{font-size:12px;color:#5a3800;line-height:1.5}
.no-inks-msg{font-size:12px;color:var(--red);padding:8px 0}

/* PROOF */
.proof-wrap{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--surface)}
.proof-hdr{padding:7px 12px;border-bottom:1px solid var(--border);background:var(--bg);display:flex;align-items:center}
.proof-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);flex:1}
.proof-btn{font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:4px 10px;border-radius:4px;border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer}
.proof-btn:hover{background:#1a1a14}
.proof-no{padding:20px;text-align:center;font-size:11px;color:var(--muted)}
.proof-thumb{cursor:pointer;background:#111}
.proof-thumb img{width:100%;display:block;opacity:.9}

/* STATES */
.loading-wrap{padding:60px 20px;text-align:center;color:var(--muted)}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-wrap{padding:60px 20px;text-align:center;color:var(--muted)}

/* PDF OVERLAY */
#pdfOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center}
#pdfOverlay.open{display:flex}
.pdf-modal{position:relative;max-width:860px;width:95%;max-height:90vh;display:flex;flex-direction:column;background:#1a1a1a;border-radius:8px;overflow:hidden}
.pdf-bar{padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid #333}
.pdf-title{font-size:12px;color:#ccc;flex:1;font-family:monospace}
.pdf-nav-btn{background:#333;border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:14px}
.pdf-nav-btn:hover{background:#444}
.pdf-page{font-size:11px;color:#aaa;font-family:monospace;min-width:48px;text-align:center}
.pdf-close{background:#555;border:none;color:#fff;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.pdf-close:hover{background:#666}
#pdfCanvasWrap{overflow-y:auto;flex:1;display:flex;align-items:center;justify-content:center;padding:16px}
</style>
</head>
<body>
<div class="shell">
<main class="content">
  <div class="topbar">
    <div class="topbar-title">Ink Queue</div>
    <div class="topbar-meta" id="dateRange"></div>
    <button class="btn-sm" onclick="loadJobs()">↻ Refresh</button>
  </div>
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><div class="stat-n" id="sTotal">0</div><div class="stat-l">Jobs</div></div>
    <div class="stat"><div class="stat-n g" id="sReady">0</div><div class="stat-l">Inks Ready</div></div>
    <div class="stat"><div class="stat-n a" id="sPending">0</div><div class="stat-l">Pending</div></div>
    <div class="stat"><div class="stat-n r" id="sNoInk">0</div><div class="stat-l">No Inks</div></div>
    <div class="stat"><div class="stat-n" id="sRepeat">0</div><div class="stat-l">Reprints</div></div>
  </div>
  <div id="jobList"></div>
</main>
</div>

<!-- PDF OVERLAY -->
<div id="pdfOverlay" onclick="handleOverlayClick(event)">
  <div class="pdf-modal" onclick="event.stopPropagation()">
    <div class="pdf-bar">
      <span class="pdf-title" id="pdfTitle"></span>
      <button class="pdf-nav-btn" onclick="pdfPrev()">‹</button>
      <span class="pdf-page" id="pdfPageInfo"></span>
      <button class="pdf-nav-btn" onclick="pdfNext()">›</button>
      <button class="pdf-close" onclick="closePdf()">✕ Close</button>
    </div>
    <div id="pdfCanvasWrap"><canvas id="pdfCanvas"></canvas></div>
  </div>
</div>

<script>
const PAT = '';
const BASE = 'appJkaLk8DykjsgHR';
const IMPRINTS = 'tbln9oAGvz2PNBZLV';
const DAYS_AHEAD = 14;

const F = {
  imprintId:   'fldDFfwFQ9B20n2kT',
  orderNum:    'fldZAIMnXPYF9LiXq',
  startTime:   'fldfqtIgcEfIlIeQk',
  location:    'fldKQIL0rSJBSeC8S',
  inks:        'fldpNCCXTgHyDhvak',
  inkNames:    'fldMM5hp8kEpo3KKT',
  inkType:     'fldYByH4NIDKdqyNB',
  inksReady:   'fld2a1CPcDMSD26PS',
  isRepeat:    'flda9L7041ahNZT0b',
  prevImprint: 'fldAEQvMAAZX9gnhl',
  printNotes:  'fldNuEzGIYI8FWqXu',
  proofImages: 'fldUOIfCd22MxevRm',
  qty:         'fld6YNamWt7FLFjrh',
  customer:    'fldeLMIAC0ABQAjYJ',
  printDesc:   'fld0jStSNsRNjjeZy',
};

const INK_DOT = {
  'Discharge':'#1e6b45','OW':'#c45c00','EZP':'#5b3fa0',
  'Direct-to-fabric':'#0e6b7a','Graphics':'#888','No Base':'#888'
};
const INK_CHIP = {
  'Discharge':'chip-discharge','OW':'chip-ow','EZP':'chip-ezp',
  'Direct-to-fabric':'chip-dtf','Graphics':'chip-graphics','No Base':'chip-graphics'
};
function inkCls(name) {
  for (const [k,v] of Object.entries(INK_CHIP)) {
    if (name && name.toLowerCase().includes(k.toLowerCase())) return {chip:v, dot:INK_DOT[k]||'#aaa'};
  }
  return {chip:'chip-graphics', dot:'#aaa'};
}

function pat() { return PAT || window.AIRTABLE_PAT || localStorage.getItem('pine_pat') || ''; }
function ensurePat() {
  if (pat()) return true;
  const p = prompt('Enter Airtable PAT:');
  if (p) { localStorage.setItem('pine_pat', p); return true; }
  return false;
}
async function api(path, opts={}) {
  const r = await fetch('https://api.airtable.com/v0/' + BASE + '/' + path, {
    ...opts,
    headers:{'Authorization':'Bearer '+pat(),'Content-Type':'application/json',...(opts.headers||{})}
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

let allJobs = [], expanded = {}, pdfDoc = null, pdfPage = 1, pdfTotal = 1;

function addDays(d, n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function toDateKey(d) { return d.toLocaleDateString('en-CA',{timeZone:'America/Denver'}); }
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Denver'})
    .replace(' AM',' am').replace(' PM',' pm');
}
function getOrderNum(rec) {
  const v = rec.fields[F.orderNum];
  if (!v) return '';
  const ids = v.linkedRecordIds||[];
  if (!ids.length) return '';
  const vals = v.valuesByLinkedRecordId[ids[0]];
  return vals&&vals[0] ? String(vals[0]) : '';
}
function getProof(rec) {
  const v = rec.fields[F.proofImages];
  if (!v) return null;
  const ids = v.linkedRecordIds||[];
  if (!ids.length) return null;
  const atts = v.valuesByLinkedRecordId[ids[0]];
  return atts&&atts[0] ? atts[0] : null;
}
function getLoc(rec) {
  const v = rec.fields[F.location];
  if (!v) return '';
  return typeof v==='object' ? v.name : v;
}
function getQty(rec) {
  const v = rec.fields[F.qty];
  if (!v) return '';
  const ids = v.linkedRecordIds||[];
  if (!ids.length) return '';
  const vals = v.valuesByLinkedRecordId[ids[0]];
  return vals&&vals[0] ? vals[0] : '';
}

async function loadJobs() {
  if (!ensurePat()) return;
  document.getElementById('jobList').innerHTML = '<div class="loading-wrap"><div class="spinner"></div>Loading ink queue...</div>';
  document.getElementById('statsBar').style.display = 'none';
  const end = addDays(new Date(), DAYS_AHEAD);
  document.getElementById('dateRange').textContent =
    new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' — ' +
    end.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  try {
    const flds = [F.imprintId,F.orderNum,F.startTime,F.location,F.inks,F.inkNames,
      F.inkType,F.inksReady,F.isRepeat,F.prevImprint,F.printNotes,F.proofImages,
      F.qty,F.customer,F.printDesc].map(f=>'fields%5B%5D='+f).join('&');
    const filter = encodeURIComponent(
      `AND(IS_AFTER({fldfqtIgcEfIlIeQk},DATEADD(TODAY(),-1,'days')),IS_BEFORE({fldfqtIgcEfIlIeQk},DATEADD(TODAY(),${DAYS_AHEAD+1},'days')))`
    );
    const sort = 'sort%5B0%5D%5Bfield%5D=fldfqtIgcEfIlIeQk&sort%5B0%5D%5Bdirection%5D=asc';
    let records=[], cursor=null;
    do {
      const data = await api(IMPRINTS+'?returnFieldsByFieldId=true&'+flds+'&filterByFormula='+filter+'&'+sort+(cursor?'&offset='+cursor:''));
      records = records.concat(data.records||[]);
      cursor = data.offset||null;
    } while(cursor);
    allJobs = records;
    render(records);
  } catch(e) {
    document.getElementById('jobList').innerHTML = '<div class="empty-wrap">Error: '+e.message+'</div>';
  }
}

function render(records) {
  if (!records.length) {
    document.getElementById('jobList').innerHTML = '<div class="empty-wrap">No jobs in the next '+DAYS_AHEAD+' days</div>';
    return;
  }

  let total=0,ready=0,noink=0,repeat=0;
  for (const r of records) {
    total++;
    if (r.fields[F.inksReady]) ready++;
    if (!(r.fields[F.inks]||[]).length) noink++;
    if (r.fields[F.isRepeat]) repeat++;
  }
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = total-ready;
  document.getElementById('sNoInk').textContent = noink;
  document.getElementById('sRepeat').textContent = repeat;
  document.getElementById('statsBar').style.display = 'flex';

  // Group by date, then by order within each date
  const byDate = {};
  for (const r of records) {
    const st = r.fields[F.startTime];
    if (!st) continue;
    const dk = toDateKey(new Date(st));
    if (!byDate[dk]) byDate[dk] = {};
    const on = getOrderNum(r) || 'no-order';
    if (!byDate[dk][on]) byDate[dk][on] = [];
    byDate[dk][on].push(r);
  }

  let html = '';
  const today = toDateKey(new Date());
  const tom = toDateKey(addDays(new Date(),1));

  for (const [dk, orders] of Object.entries(byDate).sort()) {
    const d = new Date(dk+'T12:00:00');
    let dlabel, isToday=false;
    if (dk===today)      { dlabel='Today — '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); isToday=true; }
    else if (dk===tom)   { dlabel='Tomorrow — '+d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
    else                 { dlabel=d.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}); }
    const dayRecs = Object.values(orders).flat();
    const dayReady = dayRecs.filter(r=>r.fields[F.inksReady]).length;

    html += `<div class="date-header">
      <div class="date-label${isToday?' today':''}">${dlabel}</div>
      <div class="date-sub">${dayRecs.length} job${dayRecs.length!==1?'s':''}</div>
      <div class="date-ready"><b>${dayReady}</b> / ${dayRecs.length} ready</div>
    </div>`;

    for (const [on, recs] of Object.entries(orders)) {
      const customer = recs[0].fields[F.customer] || '';
      html += `<div class="order-group">
        <div class="order-header">
          <div class="order-label">Order ${on}</div>
          ${customer ? `<div class="order-name">${customer}</div>` : ''}
        </div>
        ${recs.map(r => renderCard(r)).join('')}
      </div>`;
    }
  }
  document.getElementById('jobList').innerHTML = html;
}

function renderCard(rec) {
  const id = rec.id;
  const impId = rec.fields[F.imprintId] || '—';
  const printDesc = rec.fields[F.printDesc] || rec.fields[F.customer] || impId;
  const loc = getLoc(rec);
  const qty = getQty(rec);
  const inks = rec.fields[F.inks] || [];
  const inkTypes = rec.fields[F.inkType] || [];
  const inkNames = rec.fields[F.inkNames] || '';
  const isReady = rec.fields[F.inksReady] || false;
  const isRepeat = rec.fields[F.isRepeat] || false;
  const time = fmtTime(rec.fields[F.startTime]);
  const proof = getProof(rec);
  const thumb = proof && proof.thumbnails && proof.thumbnails.large ? proof.thumbnails.large.url : null;
  const exp = expanded[id] || false;

  let chips = '';
  if (qty) chips += `<span class="chip chip-qty">${qty} PCS</span>`;
  if (loc) chips += `<span class="chip chip-loc">${loc}</span>`;
  if (!inks.length) chips += `<span class="chip chip-noink">No Inks</span>`;
  for (const t of inkTypes) chips += `<span class="chip ${inkCls(t).chip}">${t}</span>`;
  if (isRepeat) chips += `<span class="chip chip-repeat">↩ Repeat</span>`;

  const cardCls = isReady ? 'ready-done' : (!inks.length ? 'no-ink' : '');

  return `<div class="job-card${exp?' expanded':''} ${cardCls}" id="card-${id}">
    <div class="card-inner" onclick="toggleCard('${id}')">
      <div class="card-thumb">
        ${thumb ? `<img src="${thumb}" alt="">` : '🖼'}
      </div>
      <div class="card-body">
        <div class="card-title">${printDesc}</div>
        <div class="card-sub">${impId}</div>
        <div class="card-chips">${chips}</div>
      </div>
      <div class="card-right">
        <div class="card-time">${time}</div>
        <button class="ready-toggle${isReady?' on':''}" onclick="toggleReady(event,'${id}')" title="${isReady?'Mark not ready':'Mark inks ready'}">
          ${isReady?'✓':''}
        </button>
        <div class="expand-arrow">›</div>
      </div>
    </div>
    <div class="job-detail" id="detail-${id}">
      <div class="detail-inner">
        <div class="detail-col">${renderInks(rec)}</div>
        <div class="detail-col">${renderProof(rec)}</div>
      </div>
    </div>
  </div>`;
}

function renderInks(rec) {
  const inks = rec.fields[F.inks] || [];
  const isRepeat = rec.fields[F.isRepeat] || false;
  const prevImprint = rec.fields[F.prevImprint] || [];
  const printNotes = rec.fields[F.printNotes] || '';
  let html = '';

  if (!inks.length && !isRepeat) {
    html += `<div class="ink-section-label">Inks</div>
      <div class="no-inks-msg">No inks assigned — needs attention</div>`;
  } else {
    html += `<div class="ink-section-label">Inks (${inks.length})</div>`;
    if (inks.length) {
      html += `<div id="inks-${rec.id}">`;
      for (const ink of inks) {
        const cfg = inkCls(ink.name||'');
        html += `<div class="ink-row">
          <div class="ink-dot" style="background:${cfg.dot}"></div>
          <div class="ink-info">
            <div class="ink-name">${ink.name||'—'}</div>
            <div class="ink-meta ink-loading-text">Loading recipe...</div>
          </div>
        </div>`;
      }
      html += `</div>`;
      setTimeout(() => loadRecipes(rec.id, inks), 0);
    }
    if (isRepeat && prevImprint.length) {
      const prevRecId = typeof prevImprint[0]==='string' ? prevImprint[0] : prevImprint[0].id;
      html += `<div class="ink-section-label" style="margin-top:14px">Previous Run <span class="prev-pill">↩ Repeat</span></div>
        <div id="prev-${rec.id}"><div class="ink-loading">Loading previous inks...</div></div>`;
      setTimeout(() => loadPrevInks(rec.id, prevRecId), 0);
    }
  }

  if (printNotes) {
    html += `<div class="print-notes">
      <div class="print-notes-lbl">Print Notes</div>
      <div class="print-notes-txt">${printNotes}</div>
    </div>`;
  }
  return html;
}

function renderProof(rec) {
  const proof = getProof(rec);
  const impId = rec.fields[F.imprintId] || '—';
  if (!proof) {
    return `<div class="proof-wrap">
      <div class="proof-hdr"><span class="proof-lbl">Mockup / Proof</span></div>
      <div class="proof-no">No proof on file</div>
    </div>`;
  }
  const thumb = proof.thumbnails&&proof.thumbnails.large ? proof.thumbnails.large.url : null;
  return `<div class="proof-wrap">
    <div class="proof-hdr">
      <span class="proof-lbl">Mockup / Proof</span>
      <button class="proof-btn" onclick="openPdf('${proof.url}','${impId}');event.stopPropagation()">📄 Open PDF</button>
    </div>
    ${thumb
      ? `<div class="proof-thumb" onclick="openPdf('${proof.url}','${impId}');event.stopPropagation()"><img src="${thumb}" alt=""></div>`
      : `<div class="proof-no">No preview available</div>`
    }
  </div>`;
}

async function loadRecipes(recId, inks) {
  const el = document.getElementById('inks-'+recId);
  if (!el) return;
  const inkIds = inks.map(i => typeof i==='string' ? i : i.id).filter(Boolean);
  try {
    const data = await api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true'
      +'&fields%5B%5D=fldojKv3gqT312q2R&fields%5B%5D=fldXMM4WvS3SGsliC'
      +'&fields%5B%5D=fld3M1zgk0e8stlMJ&fields%5B%5D=fldQlykyAq9juCg3J'
      +'&filterByFormula='+encodeURIComponent('OR('+inkIds.map(id=>`RECORD_ID()='${id}'`).join(',')+')'));
    const byId = {};
    for (const r of data.records||[]) byId[r.id] = r.fields;
    let html = '';
    for (const ink of inks) {
      const iid = typeof ink==='string' ? ink : ink.id;
      const iname = typeof ink==='object' ? ink.name : null;
      const d = byId[iid];
      const name = iname || (d&&d['fldojKv3gqT312q2R']) || iid;
      const type = d&&d['fldXMM4WvS3SGsliC'] ? d['fldXMM4WvS3SGsliC'].name : '';
      const recipe = d&&d['fld3M1zgk0e8stlMJ'] || '';
      const mfr = d&&d['fldQlykyAq9juCg3J'] ? d['fldQlykyAq9juCg3J'].name : '';
      const cfg = inkCls(name);
      html += `<div class="ink-row">
        <div class="ink-dot" style="background:${cfg.dot}"></div>
        <div class="ink-info">
          <div class="ink-name">${name}</div>
          <div class="ink-meta">${[type,mfr].filter(Boolean).join(' · ')}</div>
          ${recipe ? `<div class="ink-recipe">${recipe}</div>` : `<div class="ink-norecipe">No recipe on file</div>`}
        </div>
      </div>`;
    }
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="ink-loading">Could not load recipes</div>`;
  }
}

async function loadPrevInks(recId, prevId) {
  const el = document.getElementById('prev-'+recId);
  if (!el) return;
  try {
    const data = await api(IMPRINTS+'/'+prevId+'?returnFieldsByFieldId=true'
      +'&fields%5B%5D='+F.inks+'&fields%5B%5D='+F.imprintId+'&fields%5B%5D='+F.printNotes);
    const prevInks = data.fields[F.inks] || [];
    const prevId2 = data.fields[F.imprintId] || '—';
    const prevNotes = data.fields[F.printNotes] || '';
    if (!prevInks.length) { el.innerHTML=`<div class="ink-loading">No inks on ${prevId2}</div>`; return; }
    const inkIds = prevInks.map(i => typeof i==='string' ? i : i.id).filter(Boolean);
    const idata = await api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true'
      +'&fields%5B%5D=fldojKv3gqT312q2R&fields%5B%5D=fldXMM4WvS3SGsliC'
      +'&fields%5B%5D=fld3M1zgk0e8stlMJ&fields%5B%5D=fldQlykyAq9juCg3J'
      +'&filterByFormula='+encodeURIComponent('OR('+inkIds.map(id=>`RECORD_ID()='${id}'`).join(',')+')'));
    const byId = {};
    for (const r of idata.records||[]) byId[r.id] = r.fields;
    let html = '';
    for (const iid of inkIds) {
      const d = byId[iid];
      const name = (d&&d['fldojKv3gqT312q2R']) || iid;
      const type = d&&d['fldXMM4WvS3SGsliC'] ? d['fldXMM4WvS3SGsliC'].name : '';
      const recipe = d&&d['fld3M1zgk0e8stlMJ'] || '';
      const mfr = d&&d['fldQlykyAq9juCg3J'] ? d['fldQlykyAq9juCg3J'].name : '';
      const cfg = inkCls(name);
      html += `<div class="ink-row" style="opacity:.8">
        <div class="ink-dot" style="background:${cfg.dot}"></div>
        <div class="ink-info">
          <div class="ink-name">${name}</div>
          <div class="ink-meta">${[type,mfr].filter(Boolean).join(' · ')}</div>
          ${recipe ? `<div class="ink-recipe">${recipe}</div>` : `<div class="ink-norecipe">No recipe on file</div>`}
        </div>
      </div>`;
    }
    if (prevNotes) html += `<div class="print-notes" style="margin-top:8px">
      <div class="print-notes-lbl">Notes from ${prevId2}</div>
      <div class="print-notes-txt">${prevNotes}</div>
    </div>`;
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="ink-loading">Could not load previous inks</div>`;
  }
}

function toggleCard(id) {
  expanded[id] = !expanded[id];
  const card = document.getElementById('card-'+id);
  if (card) card.classList.toggle('expanded', expanded[id]);
}

async function toggleReady(e, id) {
  e.stopPropagation();
  const rec = allJobs.find(r=>r.id===id);
  if (!rec) return;
  const cur = rec.fields[F.inksReady] || false;
  const nxt = !cur;
  rec.fields[F.inksReady] = nxt;
  const btn = e.currentTarget;
  btn.classList.toggle('on', nxt);
  btn.textContent = nxt ? '✓' : '';
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.toggle('ready-done', nxt);
    card.classList.toggle('no-ink', !nxt && !(rec.fields[F.inks]||[]).length);
  }
  const ready = allJobs.filter(r=>r.fields[F.inksReady]).length;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = allJobs.length - ready;
  try {
    await api(IMPRINTS+'/'+id, {method:'PATCH', body:JSON.stringify({fields:{[F.inksReady]:nxt}})});
  } catch(err) {
    rec.fields[F.inksReady] = cur;
    btn.classList.toggle('on', cur);
    btn.textContent = cur ? '✓' : '';
    alert('Save failed: '+err.message);
  }
}

// PDF
let pdfDocObj = null;
async function openPdf(url, title) {
  document.getElementById('pdfOverlay').classList.add('open');
  document.getElementById('pdfTitle').textContent = title;
  document.getElementById('pdfPageInfo').textContent = 'Loading...';
  document.getElementById('pdfCanvas').getContext('2d').clearRect(0,0,1,1);
  try {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfDocObj = await pdfjsLib.getDocument(url).promise;
    pdfPage = 1; pdfTotal = pdfDocObj.numPages;
    await renderPdfPage();
  } catch(e) { document.getElementById('pdfPageInfo').textContent = 'Error'; }
}
async function renderPdfPage() {
  if (!pdfDocObj) return;
  const page = await pdfDocObj.getPage(pdfPage);
  const wrap = document.getElementById('pdfCanvasWrap');
  const canvas = document.getElementById('pdfCanvas');
  const scale = Math.min((wrap.clientWidth-32)/page.getViewport({scale:1}).width, 2.5);
  const vp = page.getViewport({scale});
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('pdfPageInfo').textContent = pdfPage+' / '+pdfTotal;
}
function pdfPrev() { if (pdfPage>1) { pdfPage--; renderPdfPage(); } }
function pdfNext() { if (pdfPage<pdfTotal) { pdfPage++; renderPdfPage(); } }
function closePdf() { document.getElementById('pdfOverlay').classList.remove('open'); pdfDocObj=null; }
function handleOverlayClick(e) { if (e.target===document.getElementById('pdfOverlay')) closePdf(); }
document.addEventListener('keydown', e => { if (e.key==='Escape') closePdf(); });

loadJobs();
</script>
