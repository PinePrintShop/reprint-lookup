<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catching Queue v2 · Pine Central</title>
<link rel="icon" type="image/svg+xml" href="pine-favicon-black.svg">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f7f7f5;--surface:#fff;--surface2:#f2f2ef;--border:#e8e8e4;--border2:#d0cec7;
  --text:#111110;--text2:#6b6860;--text3:#b0ada6;
  --pine:#2d6a4f;--pine-light:#edf7f2;--pine-mid:#9fd4b8;--pine-dark:#1e4d38;
  --amber:#8a5200;--amber-light:#fff8ee;--amber-mid:#ffd58a;
  --red:#a32d2d;--red-light:#fff0f0;--red-mid:#ffb3b3;
  --blue:#1a5fa8;--blue-light:#eff6ff;--blue-mid:#b5d4f4;
  --font-mono:'DM Mono',monospace;--font-ui:'Inter',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);min-height:100vh;}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.logo{width:26px;height:26px;background:var(--pine);border-radius:6px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:600;flex-shrink:0;}
.topbar-title{font-size:13px;font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.topbar-clock{font-size:11px;font-family:var(--font-mono);color:var(--text2);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--pine);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.btn-back{font-size:11px;padding:5px 10px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;}
.btn-pat{font-size:10px;padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;}

/* PRESS TOGGLE */
.press-toggle{display:flex;overflow-x:auto;background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;-ms-overflow-style:none;scrollbar-width:none;}
.press-toggle::-webkit-scrollbar{display:none;}
.pt-btn{font-size:11px;font-family:var(--font-mono);padding:10px 14px;border:none;background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;}
.pt-btn:hover{color:var(--text);}
.pt-btn.active{color:var(--pine);border-bottom-color:var(--pine);font-weight:500;}
.pt-count{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:var(--surface2);font-size:9px;padding:0 3px;margin-left:5px;color:var(--text2);}
.pt-btn.active .pt-count{background:var(--pine-light);color:var(--pine-dark);}

/* VIEWS */
.view{display:none;}.view.active{display:block;}

/* QUEUE */
.ql-wrap{padding:14px 16px;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:10px;}
.ql-heading{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
.ql-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.1em;font-family:var(--font-mono);}
.ql-date{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.no-jobs{text-align:center;padding:60px 20px;color:var(--text3);font-size:13px;font-family:var(--font-mono);}

/* JOB CARD */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color 0.15s;display:flex;align-items:center;gap:12px;padding:14px 16px;}
.job-card:hover{border-color:var(--pine);}
.job-card.complete{border-color:var(--pine-mid);}
.job-card.flagged{border-color:var(--red-mid);}
.jc-thumb{width:56px;height:56px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.jc-thumb img{width:100%;height:100%;object-fit:cover;}
.jc-ph{width:28px;height:22px;border:1.5px solid var(--border2);border-radius:3px;}
.jc-info{flex:1;min-width:0;}
.jc-order{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-bottom:2px;}
.jc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.jc-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.jc-chip{font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:var(--font-mono);}
.jc-chip.hi{background:var(--pine-light);color:var(--pine-dark);border-color:var(--pine-mid);}
.jc-chip.warn{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid);}
.jc-chip.bad{background:var(--red-light);color:var(--red);border-color:var(--red-mid);}
.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
.status-pill{font-size:10px;font-family:var(--font-mono);padding:3px 8px;border-radius:20px;}
.sp-pending{background:var(--surface2);color:var(--text3);border:1px solid var(--border);}
.sp-done{background:var(--pine-light);color:var(--pine-dark);border:1px solid var(--pine-mid);}
.sp-complete{background:var(--pine);color:#fff;}
.jc-arrow{font-size:20px;color:var(--text3);}
.btn-complete-sm{font-size:11px;padding:6px 12px;border-radius:6px;border:none;background:var(--pine);color:#fff;cursor:pointer;white-space:nowrap;}

/* QC WRAP */
.qc-wrap{padding:14px 16px;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}

/* proof */
.proof-block{background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;padding:20px;min-height:180px;cursor:default;position:relative;}
.proof-img{max-width:100%;max-height:240px;border-radius:6px;object-fit:contain;}
.proof-ph{display:flex;flex-direction:column;align-items:center;gap:6px;}
.proof-ph-box{width:60px;height:48px;border:2px solid var(--border2);border-radius:6px;}
.proof-hint{font-size:11px;color:var(--text3);font-family:var(--font-mono);}
.proof-tap{position:absolute;bottom:10px;right:10px;font-size:10px;color:var(--text2);background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:3px 7px;font-family:var(--font-mono);}

/* section cards */
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.section-head{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.section-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;font-family:var(--font-mono);}
.section-sub{font-size:10px;color:var(--text3);font-family:var(--font-mono);}

/* job info */
.job-info-body{padding:14px;}
.ji-order{font-size:10px;color:var(--text3);font-family:var(--font-mono);margin-bottom:3px;}
.ji-name{font-size:17px;font-weight:600;margin-bottom:8px;}
.ji-chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:11px;padding:3px 8px;border-radius:5px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);font-family:var(--font-mono);}
.chip.hi{background:var(--pine-light);color:var(--pine-dark);border-color:var(--pine-mid);}
.chip.warn{background:var(--amber-light);color:var(--amber);border-color:var(--amber-mid);}

/* line item section */
.li-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.li-section-head{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);}
.li-name{font-size:11px;font-weight:600;font-family:var(--font-mono);color:var(--text2);}

/* size rows */
.size-row{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.size-row:last-child{border-bottom:none;}
.sr-top{display:flex;align-items:center;gap:10px;}
.sr-label{font-size:13px;font-weight:600;font-family:var(--font-mono);min-width:40px;}
.sr-ordered{font-size:11px;color:var(--text3);font-family:var(--font-mono);flex:1;}
.sr-inputs{display:flex;gap:8px;align-items:center;}
.sr-input-group{display:flex;flex-direction:column;gap:3px;align-items:center;}
.sr-input-label{font-size:9px;color:var(--text3);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;}
.sr-input{width:68px;font-size:14px;padding:7px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--surface2);color:var(--text);font-family:var(--font-mono);text-align:center;}
.sr-input:focus{outline:none;border-color:var(--pine);}
.sr-input.has-damage{border-color:var(--red-mid);background:var(--red-light);}
.sr-diff{font-size:11px;font-family:var(--font-mono);min-width:32px;text-align:right;}
.diff-ok{color:var(--pine);}
.diff-warn{color:var(--amber);}
.diff-bad{color:var(--red);}

/* damage reasons per size */
.sr-damage{background:var(--red-light);border:1px solid var(--red-mid);border-radius:8px;padding:10px;display:flex;flex-direction:column;gap:8px;}
.sr-damage-label{font-size:9px;color:var(--red);font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;}
.sr-reason-chips{display:flex;gap:5px;flex-wrap:wrap;}
.sr-reason-chip{font-size:10px;padding:4px 10px;border-radius:20px;border:1px solid var(--red-mid);background:var(--surface);color:var(--red);cursor:pointer;transition:all 0.15s;}
.sr-reason-chip.sel{background:var(--red);color:#fff;border-color:var(--red);}
.sr-reason-chip:hover:not(.sel){background:var(--red-light);}
.sr-note-input{font-size:12px;padding:6px 10px;border-radius:6px;border:1px solid var(--red-mid);background:var(--surface);color:var(--text);font-family:var(--font-ui);width:100%;}
.sr-note-input:focus{outline:none;border-color:var(--red);}

/* spoilage */
.spoilage-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;}
.spoil-row{display:flex;align-items:center;justify-content:space-between;}
.spoil-label{font-size:11px;font-family:var(--font-mono);color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;}
.spoil-pct{font-size:30px;font-weight:600;font-family:var(--font-mono);}
.spoil-ok{color:var(--pine);}
.spoil-warn{color:var(--amber);}
.spoil-bad{color:var(--red);}
.spoil-bar-wrap{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.spoil-bar{height:100%;border-radius:3px;transition:width 0.3s,background 0.3s;}
.bar-ok{background:var(--pine);}
.bar-warn{background:var(--amber-mid);}
.bar-bad{background:var(--red);}
.res-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;font-family:var(--font-mono);padding:7px 12px;border-radius:6px;}
.res-ok{background:var(--pine-light);color:var(--pine-dark);border:1px solid var(--pine-mid);}
.res-warn{background:var(--amber-light);color:var(--amber);border:1px solid var(--amber-mid);}
.res-bad{background:var(--red-light);color:var(--red);border:1px solid var(--red-mid);}

/* general notes */
.notes-area{width:100%;font-size:13px;padding:12px 14px;border:none;background:transparent;color:var(--text);font-family:var(--font-ui);resize:none;min-height:64px;}
.notes-area:focus{outline:none;}

/* actions */
.action-row{display:flex;gap:8px;}
.btn-submit{flex:1;padding:14px;border-radius:8px;border:none;background:var(--pine);color:#fff;font-size:13px;font-weight:600;cursor:pointer;}
.btn-submit:hover{background:#245a41;}
.btn-mark{flex:1;padding:14px;border-radius:8px;border:2px solid var(--pine-mid);background:transparent;color:var(--pine);font-size:13px;font-weight:600;cursor:pointer;}
.btn-mark:hover{background:var(--pine-light);}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:500;background:#111;display:flex;flex-direction:column;}
.lb-toolbar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#1a1a1a;border-bottom:1px solid #333;flex-wrap:wrap;flex-shrink:0;}
.lb-btn{font-size:11px;padding:5px 10px;border-radius:5px;border:1px solid #444;background:#2a2a2a;color:#ddd;cursor:pointer;white-space:nowrap;}
.lb-btn:hover{background:#3a3a3a;}
.lb-filename{font-size:11px;color:#999;font-family:var(--font-mono);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lb-nav,.lb-pages,.lb-zoom{display:flex;align-items:center;gap:4px;}
.lb-count{font-size:11px;color:#888;font-family:var(--font-mono);min-width:40px;text-align:center;}
.lb-canvas-wrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;touch-action:pan-x pan-y;}
#lbCanvas{border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,0.6);}
.lb-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.lb-spin{width:32px;height:32px;border:3px solid #333;border-top-color:#888;border-radius:50%;animation:spin 0.7s linear infinite;}

/* misc */
.loading-wrap{display:flex;align-items:center;justify-content:center;padding:60px;gap:10px;color:var(--text3);font-size:12px;font-family:var(--font-mono);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--pine);border-radius:50%;animation:spin 0.7s linear infinite;}
#errorPanel{display:none;margin:16px;padding:14px;background:var(--red-light);border:1px solid var(--red-mid);border-radius:10px;font-family:var(--font-mono);font-size:12px;color:#7a1a1a;white-space:pre-wrap;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">P</div>
  <span class="topbar-title">Catching Queue</span>
  <div class="topbar-right">
    <button class="btn-back hidden" id="btnBack" onclick="goBack()">← Back</button>
    <span class="topbar-clock" id="clockDisplay"></span>
    <div class="live-dot"></div>
    <button class="btn-pat" onclick="resetPAT()">⚙</button>
  </div>
</div>

<div class="press-toggle" id="pressToggle"></div>
<div id="errorPanel"></div>

<div class="view active" id="viewLoading">
  <div class="loading-wrap"><div class="spinner"></div>loading...</div>
</div>

<div class="view" id="viewQueue">
  <div class="ql-wrap">
    <div class="ql-heading">
      <span class="ql-title" id="qlTitle">Today</span>
      <span class="ql-date" id="qlDate"></span>
    </div>
    <div id="qlItems"></div>
  </div>
</div>

<div class="view" id="viewQC">
  <div class="qc-wrap" id="qcWrap"></div>
</div>

<div class="lightbox hidden" id="lightbox">
  <div class="lb-toolbar">
    <button class="lb-btn" onclick="closeLightbox()">✕ Close</button>
    <div class="lb-filename" id="lbFilename"></div>
    <div class="lb-nav">
      <button class="lb-btn" onclick="lbNavFile(-1)">‹</button>
      <span class="lb-count" id="lbFileCount"></span>
      <button class="lb-btn" onclick="lbNavFile(1)">›</button>
    </div>
    <div class="lb-pages">
      <button class="lb-btn" onclick="lbNavPage(-1)">↑ Pg</button>
      <span class="lb-count" id="lbPageCount"></span>
      <button class="lb-btn" onclick="lbNavPage(1)">Pg ↓</button>
    </div>
    <div class="lb-zoom">
      <button class="lb-btn" onclick="lbZoom(-0.25)">-</button>
      <span class="lb-count" id="lbZoomLevel">150%</span>
      <button class="lb-btn" onclick="lbZoom(0.25)">+</button>
    </div>
  </div>
  <div class="lb-canvas-wrap" id="lbCanvasWrap">
    <canvas id="lbCanvas"></canvas>
    <div class="lb-spinner hidden" id="lbSpinner"><div class="lb-spin"></div></div>
  </div>
</div>

<script>
// -- CONFIG ------------------------------------------------------------------
const BASE='appJkaLk8DykjsgHR',TI='tbln9oAGvz2PNBZLV',TLI='tblJx5UlwO7oMSk5H';
const WRITES_ENABLED=false;

const FI={
  imprintId:  'fldDFfwFQ9B20n2kT',
  orderNum:   'fldZAIMnXPYF9LiXq',
  designNick: 'fldyGOHRKNz00MaYQ',
  press:      'fldv59OGU7EkBVofo',
  startTime:  'fldfqtIgcEfIlIeQk',
  qty:        'fldFipR4ddfqMPeAX',
  proofs:     'fldUOIfCd22MxevRm',
  qualityChk: 'fldJG38m3qWewBrnR',
  due:        'fldf57VIkt82rO1iQ',
  loc:        'fldKQIL0rSJBSeC8S',
  lineItems:  'fldsvntAy1QHEoDAg', // link to Line Items
  isToday:    'fldq1VzzuxVavP7cm',
};

// Line Item size fields: ordered
const LI_SIZES={
  XS:'fldVA9ZmYxhDxtnYZ', S:'fldCZr5lB6Jx80lfG', M:'fldzTs1qKe9IBxxSn',
  L:'fldnRLJxjUDa1mQTj', XL:'fldTRgdexcpBXXQPv', '2XL':'fldin7j6uGO0uRTec',
  '3XL':'fldpltq9fdRkrvIvt', '4XL':'fldrsci7JnToa43Zd', '5XL':'fldchnRSKFukouW6N',
  OSFA:'fld2bgIlmPbANgLVK',
};
const LI_TOTAL='fldFfuKAcduwWQp8g';

const DAMAGE_REASONS=['Print Error','Corner','Dryer Grease','Wrinkle','Out of Square','Mill Flaw','Smudge','Dry-in','Light Ink','Jawn','Ink Bleed','Other'];

const MACHINES=[
  {id:'p1',label:'P1 · ROQ NEXT',pressKey:'Press 1 - ROQ NEXT'},
  {id:'p2',label:'P2 · ROQ YOU',pressKey:'Press 2 - ROQ YOU'},
  {id:'ht',label:'Heat Press',pressKey:'Heat press'},
  {id:'fs',label:'Flatstock',pressKey:'Flatstock - M&R Saturn'},
  {id:'em',label:'Embroidery',pressKey:'Embroidery - TAJIMA 6-Head'},
];

// -- STATE -------------------------------------------------------------------
let pat=null, jobs=[], lineItemMap={}, qcState={}, activeMachine='p1', activeJobId=null;
// lineItemMap[imprintRecordId] = [ {id, name, sizes:{XS:n,...}, total:n} ]
// qcState[imprintId+liId+size] = { caught:'', damaged:'', reasons:[], note:'' }

// -- INIT --------------------------------------------------------------------
window.onload=async()=>{
  pat=sessionStorage.getItem('pine_pat');
  if(!pat){pat=prompt('Enter Airtable PAT:');if(!pat)return;sessionStorage.setItem('pine_pat',pat);}
  startClock();
  buildToggle();
  await loadData();
  // showView and renderQueue are now called inside loadData's finally block
};

function resetPAT(){sessionStorage.removeItem('pine_pat');pat=prompt('Enter Airtable PAT:');if(!pat)return;sessionStorage.setItem('pine_pat',pat);location.reload();}

// -- API ---------------------------------------------------------------------
async function api(path){
  const res=await fetch('https://api.airtable.com/v0/'+BASE+'/'+path,{headers:{'Authorization':'Bearer '+pat}});
  if(!res.ok){
    let m='Airtable '+res.status;
    if(res.status===401||res.status===403)m='Invalid PAT. Tap the gear to re-enter.';
    else try{const j=await res.json();m+=': '+(j.error?j.error.message:JSON.stringify(j).slice(0,80));}catch(e){}
    throw new Error(m);
  }
  return res.json();
}

// -- LOAD DATA ---------------------------------------------------------------
async function loadData(){
  try{
    // 1. Load today's imprints including linked line item IDs
    const flds=[FI.imprintId,FI.orderNum,FI.designNick,FI.press,FI.startTime,
                FI.qty,FI.proofs,FI.qualityChk,FI.due,FI.loc,FI.lineItems];
    const p=flds.map(f=>'fields%5B%5D='+f);
    p.push('filterByFormula='+encodeURIComponent("{Is Today (Local)}=1"));
    p.push('sort%5B0%5D%5Bfield%5D='+FI.startTime,'sort%5B0%5D%5Bdirection%5D=asc');
    p.push('pageSize=100','returnFieldsByFieldId=true');
    const jd=await api(TI+'?'+p.join('&'));

    jobs=jd.records.map(r=>{
      const f=r.fields;
      // Press
      const pv=f[FI.press];const press=typeof pv==='string'?pv:(pv&&pv.name)||'';
      // Order number from multipleLookupValues
      const ov=f[FI.orderNum];
      let orderNum='--';
      if(ov&&ov.valuesByLinkedRecordId){const vals=Object.values(ov.valuesByLinkedRecordId);if(vals.length&&vals[0].length)orderNum=String(vals[0][0]);}
      else if(ov)orderNum=String(Array.isArray(ov)?ov[0]||'--':ov);
      // Proofs from multipleLookupValues - use thumbnail only, never raw PDF url
      const rawP=f[FI.proofs]||{};
      let proofs=[];
      if(rawP.valuesByLinkedRecordId){
        Object.values(rawP.valuesByLinkedRecordId).forEach(arr=>{
          if(Array.isArray(arr))arr.forEach(a=>{
            if(a&&a.url){
              const thumb=(a.thumbnails&&a.thumbnails.large)?a.thumbnails.large.url:null;
              proofs.push({url:a.url,thumb,filename:a.filename||'',isPDF:a.type==='application/pdf'});
            }
          });
        });
      }
      const due=Array.isArray(f[FI.due])?(f[FI.due][0]||''):(f[FI.due]||'');
      const lv=f[FI.loc];const loc=typeof lv==='string'?lv:(lv&&lv.name)||'';
      // Line Items linked records - multipleRecordLinks returns [{id,name}] array
      const liLinks=f[FI.lineItems];
      const liIds=Array.isArray(liLinks)?liLinks.map(l=>l.id):[];
      return{
        id:r.id,imprintId:f[FI.imprintId]||'--',orderNum,
        designNick:f[FI.designNick]||'',press,
        startTime:f[FI.startTime]||null,qty:Math.round(f[FI.qty]||0),
        proofs,qualityChk:f[FI.qualityChk]||false,due,loc,liIds,
        lineItems:[] // will be populated below
      };
    });

    // 2. Collect unique Line Item IDs across all jobs
    const allLiIds=[...new Set(jobs.flatMap(j=>j.liIds))];

    // 3. Fetch Line Items - wrapped in own try/catch so failure never blocks app load
    try{
      if(allLiIds.length>0){
        for(let i=0;i<allLiIds.length;i+=10){
          const batch=allLiIds.slice(i,i+10);
          const liflds=Object.values(LI_SIZES).concat([LI_TOTAL]).map(f=>'fields%5B%5D='+f);
          liflds.push('returnFieldsByFieldId=true');
          const orParts=batch.map(id=>"RECORD_ID()='"+id+"'").join(',');
          liflds.push('filterByFormula='+encodeURIComponent('OR('+orParts+')'));
          liflds.push('pageSize=10');
          const liData=await api(TLI+'?'+liflds.join('&'));
          liData.records.forEach(r=>{
            const f=r.fields;
            const sizes={};
            Object.entries(LI_SIZES).forEach(([sz,fid])=>{
              const v=f[fid];if(v&&v>0)sizes[sz]=v;
            });
            lineItemMap[r.id]={id:r.id,sizes,total:Math.round(f[LI_TOTAL]||0)};
          });
        }
      }
    }catch(liErr){
      console.warn('Line Items fetch failed (non-fatal):',liErr.message);
      // App continues without size data -- jobs still show with total qty
    }

    // 4. Attach loaded line items back to each job
    jobs.forEach(job=>{
      job.lineItems=job.liIds.map(id=>lineItemMap[id]).filter(Boolean);
    });

  }catch(e){
    console.error(e);
    const ep=document.getElementById('errorPanel');
    ep.style.display='block';ep.textContent='ERROR: '+e.message;
  }finally{
    // Always exit loading state
    showView('viewQueue');
    renderQueue();
  }
}

// -- TOGGLE ------------------------------------------------------------------
function buildToggle(){
  const tog=document.getElementById('pressToggle');tog.innerHTML='';
  MACHINES.forEach(m=>{
    const btn=document.createElement('button');
    btn.className='pt-btn'+(m.id===activeMachine?' active':'');
    btn.id='ptb_'+m.id;
    btn.onclick=()=>{activeMachine=m.id;updateToggle();renderQueue();};
    btn.appendChild(document.createTextNode(m.label));
    const cnt=document.createElement('span');cnt.className='pt-count';cnt.id='ptc_'+m.id;cnt.textContent='0';
    btn.appendChild(cnt);
    tog.appendChild(btn);
  });
}

function updateToggle(){
  MACHINES.forEach(m=>{
    const btn=document.getElementById('ptb_'+m.id);
    if(btn)btn.className='pt-btn'+(m.id===activeMachine?' active':'');
    const cnt=document.getElementById('ptc_'+m.id);
    if(cnt)cnt.textContent=jobsForMachine(m).length;
  });
}

function jobsForMachine(m){
  if(m.id==='ht')return jobs.filter(j=>j.press.toLowerCase().includes('heat press'));
  return jobs.filter(j=>j.press===m.pressKey);
}

// -- VIEWS -------------------------------------------------------------------
function showView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('btnBack').classList.toggle('hidden',id!=='viewQC');
}
function goBack(){showView('viewQueue');renderQueue();}

// -- QUEUE -------------------------------------------------------------------
function renderQueue(){
  const m=MACHINES.find(x=>x.id===activeMachine);
  const mj=jobsForMachine(m);
  updateToggle();
  document.getElementById('qlTitle').textContent=(m?m.label:'Queue')+' -- '+mj.length+' job'+(mj.length!==1?'s':'')+' today';
  document.getElementById('qlDate').textContent=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'America/Denver'});
  const items=document.getElementById('qlItems');items.innerHTML='';
  if(!mj.length){el_(items,'div','no-jobs').textContent='No jobs today for this machine.';return;}
  mj.forEach(job=>{
    const st=qcState[job.id]||{status:'pending'};
    const card=el_(items,'div','job-card'+(st.status==='complete'?' complete':st.spoilage>5?' flagged':''));
    card.onclick=()=>enterQC(job.id);
    const thumb=el_(card,'div','jc-thumb');
    const firstProof=job.proofs.length>0?job.proofs[0]:null;
    if(firstProof&&firstProof.thumb){const img=document.createElement('img');img.src=firstProof.thumb;img.alt='';thumb.appendChild(img);}
    else el_(thumb,'div','jc-ph');
    const info=el_(card,'div','jc-info');
    el_(info,'div','jc-order').textContent='ORDER '+job.orderNum+' - '+job.imprintId;
    el_(info,'div','jc-name').textContent=job.designNick||job.imprintId;
    const meta=el_(info,'div','jc-meta');
    mkchip(meta,job.qty+' pcs','hi');
    if(job.loc)mkchip(meta,job.loc);
    if(job.due)mkchip(meta,'Due '+fmtDate(job.due),'warn');
    if(st.spoilage>0)mkchip(meta,st.spoilage.toFixed(1)+'% spoilage',st.spoilage>50?'bad':'warn');
    const right=el_(card,'div','jc-right');
    if(st.status==='complete'){
      el_(right,'span','status-pill sp-complete').textContent='Boxed';
    }else if(st.status==='qc-done'){
      el_(right,'span','status-pill sp-done').textContent="QC'd";
      const cb=document.createElement('button');cb.className='btn-complete-sm';cb.textContent='Mark Complete';
      cb.onclick=(e)=>{e.stopPropagation();markComplete(job.id);};
      right.appendChild(cb);
    }else{
      el_(right,'span','status-pill sp-pending').textContent='Pending';
      el_(right,'span','jc-arrow').textContent='>';
    }
  });
}

// -- QC VIEW -----------------------------------------------------------------
function enterQC(jobId){
  activeJobId=jobId;
  if(!qcState[jobId])qcState[jobId]={status:'pending',sizeData:{},notes:'',spoilage:0};
  showView('viewQC');
  renderQCView();
}

function stateKey(liId,size){return liId+'__'+size;}

function renderQCView(){
  const job=jobs.find(j=>j.id===activeJobId);if(!job)return;
  const jst=qcState[job.id];
  const wrap=document.getElementById('qcWrap');wrap.innerHTML='';

  // Proof -- thumbnail only, lightbox loads on explicit tap
  // proof-block: thumbnail display only. Lightbox only opens on explicit button tap.
  const pb=el_(wrap,'div','proof-block');
  pb.style.cursor='default';
  if(job.proofs.length>0){
    const thumbUrl=job.proofs[0].thumb;
    if(thumbUrl){
      const img=document.createElement('img');img.className='proof-img';
      img.src=thumbUrl;img.alt='Proof';
      img.style.pointerEvents='none'; // prevent img from stealing clicks
      pb.appendChild(img);
    }else{
      const ph=el_(pb,'div','proof-ph');el_(ph,'div','proof-ph-box');
      el_(ph,'span','proof-hint').textContent='PDF proof available';
    }
    // ONLY the tap-to-expand button opens the lightbox
    const tapBtn=el_(pb,'span','proof-tap');
    tapBtn.textContent='Expand PDF';
    tapBtn.style.cssText='cursor:pointer;pointer-events:all;z-index:10;';
    tapBtn.onclick=(e)=>{e.stopPropagation();openLightbox(job);};
  }else{
    const ph=el_(pb,'div','proof-ph');el_(ph,'div','proof-ph-box');
    el_(ph,'span','proof-hint').textContent='no proof on file';
  }

  // Job info
  const ic=el_(wrap,'div','section-card');
  const ib=el_(ic,'div','job-info-body');
  el_(ib,'div','ji-order').textContent='ORDER '+job.orderNum+' - '+job.imprintId;
  el_(ib,'div','ji-name').textContent=job.designNick||job.imprintId;
  const chips=el_(ib,'div','ji-chips');
  mkchip(chips,job.qty+' pcs','hi');
  if(job.loc)mkchip(chips,job.loc);
  if(job.due)mkchip(chips,'Due '+fmtDate(job.due),'warn');

  // Line items - one section per colorway
  if(job.lineItems&&job.lineItems.length>0){
    job.lineItems.forEach(li=>{
      const liSec=el_(wrap,'div','li-section');
      const lih=el_(liSec,'div','li-section-head');
      // Always show line item name (colorway / garment description)
      if(li.name&&li.name!==li.id){
        el_(lih,'div','li-name').textContent=li.name;
      }
      // Size rows — only sizes with qty > 0
      const sizeKeys=Object.keys(li.sizes).filter(sz=>li.sizes[sz]>0);
      if(sizeKeys.length===0){
        // No sizes found -- use total as OSFA
        const qty=li.total>0?li.total:job.qty;
        renderSizeRow(liSec,li,'OSFA',qty,jst);
      }else{
        sizeKeys.forEach(sz=>renderSizeRow(liSec,li,sz,li.sizes[sz],jst));
      }
    });
  }else{
    // No line items loaded — show single OSFA row using total qty
    const liSec=el_(wrap,'div','li-section');
    const fallbackLi={id:'fallback',sizes:{OSFA:job.qty}};
    renderSizeRow(liSec,fallbackLi,'OSFA',job.qty,jst);
  }

  // Spoilage summary
  const sc=el_(wrap,'div','spoilage-card',{id:'spoilageCard'});
  renderSpoilage(sc,job);

  // General notes
  const nc=el_(wrap,'div','section-card');
  el_(el_(nc,'div','section-head'),'span','section-title').textContent='General notes';
  const na=el_(nc,'textarea','notes-area');na.placeholder='Overall notes for this job...';na.value=jst.notes||'';
  na.oninput=()=>{jst.notes=na.value;};

  // Actions
  const ar=el_(wrap,'div','action-row');
  if(jst.status==='qc-done'||jst.status==='complete'){
    const mc=el_(ar,'button','btn-mark');mc.textContent='Mark Complete';mc.onclick=()=>markComplete(job.id);
  }
  const sb=el_(ar,'button','btn-submit');
  sb.textContent=jst.status==='qc-done'?'Update QC':'Submit QC';
  sb.onclick=()=>submitQC(job);
}

function renderSizeRow(parent,li,size,ordered,jst){
  const key=stateKey(li.id,size);
  if(!jst.sizeData[key])jst.sizeData[key]={caught:'',damaged:'',reasons:[],note:''};
  const sd=jst.sizeData[key];

  const row=el_(parent,'div','size-row');
  const top=el_(row,'div','sr-top');
  el_(top,'span','sr-label').textContent=size;
  el_(top,'span','sr-ordered').textContent='ordered: '+ordered;

  const inputs=el_(top,'div','sr-inputs');

  // Caught input
  const cg=el_(inputs,'div','sr-input-group');
  el_(cg,'span','sr-input-label').textContent='Caught';
  const cInp=el_(cg,'input');cInp.type='number';cInp.className='sr-input';
  cInp.value=sd.caught;cInp.min='0';cInp.placeholder=ordered;
  cInp.oninput=()=>{sd.caught=cInp.value;updateDiff(diffEl,parseInt(cInp.value)||0,ordered);renderSpoilage(document.getElementById('spoilageCard'),jobs.find(j=>j.id===activeJobId));};

  // Damaged input
  const dg=el_(inputs,'div','sr-input-group');
  el_(dg,'span','sr-input-label').textContent='Damaged';
  const dInp=el_(dg,'input');dInp.type='number';dInp.className='sr-input'+(sd.damaged>0?' has-damage':'');
  dInp.value=sd.damaged;dInp.min='0';dInp.placeholder='0';
  dInp.oninput=()=>{
    sd.damaged=dInp.value;
    const hasDmg=parseInt(dInp.value)>0;
    dInp.className='sr-input'+(hasDmg?' has-damage':'');
    // Show/hide damage reasons
    if(hasDmg){if(!row.querySelector('.sr-damage'))addDamageReasons(row,sd);}
    else{const dr=row.querySelector('.sr-damage');if(dr)dr.remove();}
    renderSpoilage(document.getElementById('spoilageCard'),jobs.find(j=>j.id===activeJobId));
  };

  // Diff
  const diffEl=el_(inputs,'span','sr-diff');
  updateDiff(diffEl,parseInt(sd.caught)||0,ordered);

  // If already has damage, show reasons
  if(parseInt(sd.damaged)>0)addDamageReasons(row,sd);
}

function updateDiff(el,caught,ordered){
  if(!caught){el.textContent='';return;}
  const diff=caught-ordered;
  el.className='sr-diff '+(diff===0?'diff-ok':diff>0?'diff-warn':'diff-bad');
  el.textContent=diff===0?'=':(diff>0?'+':'')+diff;
}

function addDamageReasons(row,sd){
  const dmg=el_(row,'div','sr-damage');
  el_(dmg,'span','sr-damage-label').textContent='Damage reasons';
  const rc=el_(dmg,'div','sr-reason-chips');
  DAMAGE_REASONS.forEach(r=>{
    const chip=el_(rc,'div','sr-reason-chip'+(sd.reasons.includes(r)?' sel':''));
    chip.textContent=r;
    chip.onclick=()=>{
      if(sd.reasons.includes(r))sd.reasons=sd.reasons.filter(x=>x!==r);
      else sd.reasons.push(r);
      chip.classList.toggle('sel');
    };
  });
  const noteInp=el_(dmg,'input','sr-note-input');
  noteInp.type='text';noteInp.placeholder='Describe damage...';noteInp.value=sd.note||'';
  noteInp.oninput=()=>{sd.note=noteInp.value;};
}

// -- SPOILAGE ----------------------------------------------------------------
function renderSpoilage(container,job){
  if(!container||!job)return;
  container.innerHTML='';
  const jst=qcState[job.id];if(!jst)return;
  const totalOrdered=job.qty;
  let totalDamaged=0;
  Object.values(jst.sizeData).forEach(sd=>{totalDamaged+=parseInt(sd.damaged)||0;});

  const spoilage=totalOrdered>0?(totalDamaged/totalOrdered)*100:0;
  jst.spoilage=spoilage;

  const isBandana=job.loc==='Bandana';
  let resolution='NO ACTION',resClass='res-ok',resIcon='check';
  if(totalDamaged>0){
    const shippedPct=(totalOrdered-totalDamaged)/totalOrdered;
    if(isBandana){
      if(shippedPct<0.05){resolution='REFUND';resClass='res-warn';resIcon='R';}
      else{resolution='RE-PRINT';resClass='res-bad';resIcon='P';}
    }else{
      if(shippedPct<0.95){resolution='RE-PRINT';resClass='res-bad';resIcon='P';}
      else if(shippedPct<1){resolution='REFUND';resClass='res-warn';resIcon='R';}
    }
  }

  const pctCls=spoilage>50?'spoil-bad':spoilage>5?'spoil-warn':'spoil-ok';
  const barCls=spoilage>50?'bar-bad':spoilage>5?'bar-warn':'bar-ok';

  const r1=el_(container,'div','spoil-row');
  el_(r1,'span','spoil-label').textContent='Spoilage';
  el_(r1,'span','spoilage-pct '+pctCls).textContent=spoilage.toFixed(1)+'%';

  const bw=el_(container,'div','spoil-bar-wrap');
  const bar=el_(bw,'div','spoil-bar '+barCls);bar.style.width=Math.min(100,spoilage)+'%';

  const r2=el_(container,'div','spoil-row',{style:'margin-top:4px'});
  el_(r2,'span','spoil-label').textContent='Resolution';
  el_(r2,'span','res-badge '+resClass).textContent=resolution;

  if(totalDamaged>0){
    const r3=el_(container,'div','spoil-row',{style:'margin-top:2px'});
    el_(r3,'span','spoil-label').textContent='Damaged';
    const dmgEl=document.createElement('span');dmgEl.style.cssText='font-size:12px;font-family:var(--font-mono);color:var(--text2)';
    dmgEl.textContent=totalDamaged+' of '+totalOrdered+' pcs';
    r3.appendChild(dmgEl);
  }
}

function submitQC(job){
  const jst=qcState[job.id];if(!jst)return;
  if(WRITES_ENABLED){console.log('Would write QC for',job.imprintId,jst);}
  jst.status='qc-done';
  showView('viewQueue');renderQueue();
}

function markComplete(jobId){
  const jst=qcState[jobId]||{};jst.status='complete';
  if(WRITES_ENABLED){console.log('Would mark Quality Checked for',jobId);}
  jobs=jobs.filter(j=>j.id!==jobId);
  if(document.getElementById('viewQC').classList.contains('active'))showView('viewQueue');
  renderQueue();
}

// -- LIGHTBOX ----------------------------------------------------------------
let lbProofs=[],lbFileIdx=0,lbPageNum=1,lbPageCount=1,lbScale=1.5,lbPdfDoc=null,lbTouchStartX=0;

async function openLightbox(job){
  if(!job.proofs.length)return;
  document.getElementById('lightbox').classList.remove('hidden');
  let proofs=job.proofs;
  try{
    const fresh=await api(TI+'/'+job.id+'?fields%5B%5D='+FI.proofs+'&returnFieldsByFieldId=true');
    const raw=fresh.fields&&fresh.fields[FI.proofs];
    if(raw){
      proofs=[];
      if(raw.valuesByLinkedRecordId){
        // multipleLookupValues nested structure
        Object.values(raw.valuesByLinkedRecordId).forEach(arr=>{
          if(Array.isArray(arr))arr.forEach(a=>{
            if(a&&a.url)proofs.push({url:a.url,filename:a.filename||'',isPDF:a.type==='application/pdf'});
          });
        });
      }else if(Array.isArray(raw)){
        // flat attachment array
        raw.forEach(a=>{if(a&&a.url)proofs.push({url:a.url,filename:a.filename||'',isPDF:a.type==='application/pdf'});});
      }
    }
  }catch(e){}
  lbProofs=proofs;lbFileIdx=0;lbPageNum=1;lbScale=1.5;
  const wrap=document.getElementById('lbCanvasWrap');
  wrap.ontouchstart=e=>{lbTouchStartX=e.touches[0].clientX;};
  wrap.ontouchend=e=>{const dx=e.changedTouches[0].clientX-lbTouchStartX;if(Math.abs(dx)>60)lbNavFile(dx<0?1:-1);};
  await lbLoadFile();
}
async function lbLoadFile(){
  if(!lbProofs.length)return;
  const p=lbProofs[lbFileIdx];
  document.getElementById('lbFilename').textContent=p.filename||'Proof '+(lbFileIdx+1);
  document.getElementById('lbFileCount').textContent=(lbFileIdx+1)+'/'+lbProofs.length;
  document.getElementById('lbSpinner').classList.remove('hidden');
  if(p.isPDF){
    pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    if(lbPdfDoc){lbPdfDoc.destroy();lbPdfDoc=null;}
    lbPdfDoc=await pdfjsLib.getDocument(p.url).promise;
    lbPageCount=lbPdfDoc.numPages;lbPageNum=1;
    document.getElementById('lbPageCount').textContent='1/'+lbPageCount;
    await lbRenderPage();
  }else{
    lbPdfDoc=null;lbPageCount=1;document.getElementById('lbPageCount').textContent='img';
    const canvas=document.getElementById('lbCanvas'),ctx=canvas.getContext('2d'),img=new Image();
    img.crossOrigin='anonymous';img.onload=()=>{canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);document.getElementById('lbSpinner').classList.add('hidden');};
    img.src=p.url;
  }
}
async function lbRenderPage(){
  if(!lbPdfDoc)return;
  const page=await lbPdfDoc.getPage(lbPageNum);
  const vp=page.getViewport({scale:lbScale});
  const canvas=document.getElementById('lbCanvas');canvas.height=vp.height;canvas.width=vp.width;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  document.getElementById('lbPageCount').textContent=lbPageNum+'/'+lbPageCount;
  document.getElementById('lbZoomLevel').textContent=Math.round(lbScale*100)+'%';
  document.getElementById('lbSpinner').classList.add('hidden');
}
async function lbNavFile(dir){lbFileIdx=Math.max(0,Math.min(lbProofs.length-1,lbFileIdx+dir));lbPageNum=1;await lbLoadFile();}
async function lbNavPage(dir){lbPageNum=Math.max(1,Math.min(lbPageCount,lbPageNum+dir));document.getElementById('lbSpinner').classList.remove('hidden');await lbRenderPage();}
async function lbZoom(delta){lbScale=Math.max(0.5,Math.min(4,lbScale+delta));if(lbPdfDoc){document.getElementById('lbSpinner').classList.remove('hidden');await lbRenderPage();}else document.getElementById('lbZoomLevel').textContent=Math.round(lbScale*100)+'%';}
function closeLightbox(){document.getElementById('lightbox').classList.add('hidden');if(lbPdfDoc){lbPdfDoc.destroy();lbPdfDoc=null;}}

// -- CLOCK -------------------------------------------------------------------
function startClock(){
  function upd(){document.getElementById('clockDisplay').textContent=new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/Denver'});}
  upd();setInterval(upd,1000);
}

// -- HELPERS -----------------------------------------------------------------
function el_(parent,tag,cls,attrs){
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style')el.style.cssText=v;else el.setAttribute(k,v);});
  if(parent)parent.appendChild(el);
  return el;
}
function mkchip(parent,text,cls){const c=el_(parent,'span','jc-chip'+(cls?' '+cls:''));c.textContent=text;return c;}
function fmtDate(d){if(!d)return'';try{return new Date((d.includes&&d.includes('T')?d:d+'T12:00:00')).toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return String(d);}}
</script>
