<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Dashboard — Pine Central</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f0;--surface:#ffffff;--border:#e2e8e2;--border-dk:#c8d4c8;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;
  --text:#1a1f1a;--muted:#6b7a6b;--muted-lt:#9aaa9a;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --radius:8px;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;padding-bottom:60px}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:38px;height:38px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-pine{font-size:22px;font-weight:800;color:var(--green);font-style:italic;letter-spacing:-.5px}
.hd{width:1px;height:28px;background:var(--border)}
.header-info{display:flex;flex-direction:column;gap:1px}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:12px;color:var(--muted)}

/* PAGE */
.page{max-width:900px;margin:0 auto;padding:28px 20px;display:flex;flex-direction:column;gap:16px}

/* PANEL */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.panel-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.panel-body{padding:20px}
.panel-hide{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans)}
.panel-hide:hover{color:var(--text)}

/* CONNECTION */
.conn-grid{display:grid;grid-template-columns:1fr 280px;gap:14px;margin-bottom:14px}
.fl{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fi{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:6px;padding:9px 12px;font-size:13px;font-family:var(--mono);color:var(--text);transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--green);background:#fff}
.fi::placeholder{color:var(--muted-lt)}
.conn-actions{display:flex;gap:10px;margin-bottom:14px}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--green-md)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:var(--surface);color:var(--text);border:1px solid var(--border-dk);border-radius:6px;padding:9px 16px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--green);color:var(--green)}
.conn-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid}
.cs-ok{background:var(--green-lt);border-color:#a7d4b8;color:var(--green)}
.cs-err{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.cs-hide{display:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}

/* SUMMARY */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.ss{padding:16px 20px;border-right:1px solid var(--border)}
.ss:last-child{border-right:none}
.sv{font-size:26px;font-weight:700;line-height:1;color:var(--green);font-family:var(--mono)}
.sv.red{color:var(--red)}.sv.amb{color:var(--amb)}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-top:4px}

/* FILTERS */
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.flt{font-size:12px;color:var(--muted);font-weight:500}
.chip{background:var(--bg);border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--sans);transition:all .12s}
.chip:hover{border-color:var(--green);color:var(--green)}
.chip.on{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.fsp{flex:1}
.btn-refresh{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .12s}
.btn-refresh:hover{border-color:var(--green);color:var(--green)}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed}
.spin{animation:spin .8s linear infinite;display:inline-block}
/* SEARCH BAR */
.search-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;font-size:14px;color:var(--muted-lt);pointer-events:none}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:6px;padding:8px 36px 8px 32px;font-size:13px;font-family:var(--sans);color:var(--text);transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--green);background:#fff}
.search-input::placeholder{color:var(--muted-lt)}
.search-clear{position:absolute;right:10px;background:none;border:none;color:var(--muted-lt);cursor:pointer;font-size:15px;line-height:1;padding:2px;display:none}
.search-clear.show{display:block}
.search-clear:hover{color:var(--text)}
.search-hint{font-size:11px;color:var(--muted-lt);margin-top:5px}

@keyframes spin{to{transform:rotate(360deg)}}

/* STATE */
.state-box{padding:60px 20px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px}
.si{font-size:32px}.st{font-size:15px;font-weight:600;color:var(--text)}.sb{font-size:13px}

/* ORDER GROUP */
.order-group{border-bottom:1px solid var(--border);animation:fadeIn .2s ease}
.order-group:last-child{border-bottom:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}

.order-hd{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;user-select:none;transition:background .1s;background:var(--bg)}
.order-hd:hover{background:#eef0ee}
.onum{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green);min-width:50px}
.ocust{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obdgs{display:flex;gap:6px;align-items:center;flex-shrink:0}
.bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid}
.bdg-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bdg-amb{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.bdg-gray{background:var(--bg);color:var(--muted);border-color:var(--border-dk)}
.chev{font-size:11px;color:var(--muted-lt);transition:transform .2s;flex-shrink:0}
.order-open .chev{transform:rotate(180deg)}
.order-open .order-hd{border-bottom:1px solid var(--border)}

/* LINE ITEMS */
.li-container{display:none}
.order-open .li-container{display:block}
.li{border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}

/* COLLAPSED ROW — no expand arrow, full row is clickable */
.li-row{
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:16px;
  padding:12px 20px;
  cursor:pointer;
  transition:background .1s;
  background:var(--surface);
}
.li-row:hover{background:#fafcfa}
.li-exp .li-row{background:#fafcfa;border-bottom:1px solid var(--border)}

.li-left{display:flex;flex-direction:column;gap:4px}
.li-ref{font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.4}
.li-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.lm{font-size:12px;color:var(--muted);white-space:nowrap}
.lm strong{color:var(--text);font-weight:500;font-family:var(--mono)}

.li-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dbdg{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid;font-family:var(--mono);white-space:nowrap}
.d-empty{background:var(--bg);color:var(--muted);border-color:var(--border-dk)}
.d-ok{background:var(--green-lt);color:var(--green);border-color:#a7d4b8}
.d-sh{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.d-ov{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}

/* close X — only when expanded */
.li-close{width:24px;height:24px;border-radius:50%;background:var(--surface);border:1px solid var(--border-dk);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .1s;line-height:1}
.li-close:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

/* DETAIL */
.li-detail{display:none;background:var(--surface);padding:16px 20px;border-top:none}
.li-exp .li-detail{display:block}

.dmeta{display:flex;gap:20px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.df{display:flex;flex-direction:column;gap:3px}
.dl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.dv{font-family:var(--mono);font-size:13px;color:var(--text)}
.dv.grn{color:var(--green);font-weight:600}
.dv.red{color:var(--red)}

/* SIZE GRID */
.sgwrap{overflow-x:auto;margin-bottom:14px}
.sgrid{width:100%;border-collapse:collapse;font-size:13px}
.sgrid th{padding:7px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--bg);border:1px solid var(--border);text-align:left}
.sgrid th.ra{text-align:right}
.sgrid th.grn{color:var(--green)}
.sgrid td{padding:7px 10px;border:1px solid var(--border);background:var(--surface);font-family:var(--mono)}
.sgrid tr.tot td{background:var(--bg);font-weight:600;border-top:2px solid var(--border-dk)}
.slbl{color:var(--muted);font-size:12px;font-weight:600}
.oval{color:var(--text)}
.xval{color:var(--muted);font-size:12px}

.ainp{width:68px;background:var(--bg);border:1px solid var(--border-dk);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:13px;color:var(--text);transition:border-color .15s,background .15s;-moz-appearance:textfield}
.ainp::-webkit-outer-spin-button,.ainp::-webkit-inner-spin-button{-webkit-appearance:none}
.ainp:focus{outline:none;border-color:var(--green);background:var(--green-lt)}
.dc{text-align:right}
.pill{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid}
.p-ok{background:var(--green-lt);color:var(--green);border-color:#a7d4b8}
.p-sh{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.p-ov{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}

/* extras note */
.extras-note{font-size:11px;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:5px;display:none}
.extras-note.show{display:block}

/* RECEIVED ROW */
.recv-row{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px}
.recv-note{font-size:12px;color:var(--muted)}
.btn-recv{display:flex;align-items:center;gap:7px;background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s}
.btn-recv:hover{background:var(--green-md)}
.btn-recv:disabled{opacity:.5;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:7px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideUp .2s ease;display:flex;align-items:center;gap:8px}
.toast.ok::before{content:'✓';color:#4ade80;font-weight:700}
.toast.err::before{content:'✕';color:#f87171;font-weight:700}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-out{opacity:0;transform:translateX(14px);transition:opacity .25s,transform .25s}

.overdue{color:var(--red);font-size:11px;font-weight:500}

@media(max-width:600px){
  .conn-grid{grid-template-columns:1fr}
  .summary-grid{grid-template-columns:repeat(2,1fr)}
  .li-meta{display:none}
  .dmeta{gap:14px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <path d="M11 2L4 9V20h4.5v-5.5h5V20H18V9L11 2Z" fill="white"/>
      </svg>
    </div>
    <span class="logo-pine">Pine</span>
  </div>
  <div class="hd"></div>
  <div class="header-info">
    <div class="header-title">Receiving Dashboard</div>
    <div class="header-sub">Pine Central</div>
  </div>
</header>

<div class="page">

  <!-- CONNECTION -->
  <div class="panel" id="connPanel">
    <div class="panel-hd">
      <div class="panel-title">⚙ &nbsp;Connection Setup</div>
      <button class="panel-hide" onclick="toggleConn()">Hide</button>
    </div>
    <div class="panel-body" id="connBody">
      <div class="conn-grid">
        <div>
          <div class="fl">Airtable API Token</div>
          <input type="password" class="fi" id="tokenInput" placeholder="pat••••••••••••••••••••••••••••••••••••••••••">
        </div>
        <div>
          <div class="fl">Base ID</div>
          <input type="text" class="fi" value="appJkaLk8DykjsgHR" readonly style="color:var(--muted);cursor:not-allowed">
        </div>
      </div>
      <div class="conn-actions">
        <button class="btn-primary" id="testBtn" onclick="testConn()">Test Connection</button>
        <button class="btn-sec" onclick="saveToken()">Save Token</button>
      </div>
      <div class="conn-status cs-hide" id="connStatus">
        <div class="dot" id="statusDot"></div>
        <span id="statusMsg"></span>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="panel">
    <div class="summary-grid">
      <div class="ss"><div class="sv" id="sO">—</div><div class="sl">Orders pending</div></div>
      <div class="ss"><div class="sv" id="sL">—</div><div class="sl">Line items</div></div>
      <div class="ss"><div class="sv red" id="sU">—</div><div class="sl">Print ≤ 4 days</div></div>
      <div class="ss"><div class="sv amb" id="sV">—</div><div class="sl">Overdue arrival</div></div>
    </div>
    <div class="filter-bar">
      <span class="flt">Show:</span>
      <button class="chip on" onclick="setFilter('all',this)">All</button>
      <button class="chip" onclick="setFilter('urgent',this)">🔴 Prints ≤ 4 days</button>
      <button class="chip" onclick="setFilter('week',this)">This week</button>
      <button class="chip" onclick="setFilter('overdue',this)">⚠️ Overdue arrival</button>
      <div class="fsp"></div>
      <button class="btn-refresh" id="refreshBtn" onclick="loadData()"><span id="refreshIcon">↻</span> Refresh</button>
    </div>
    <div class="search-bar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Search customer, PO #, or order #..." oninput="onSearch(this.value)">
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
      <div class="search-hint" id="searchHint"></div>
    </div>
    <div id="resultsArea">
      <div class="state-box">
        <div class="si">📦</div>
        <div class="st">Enter your API token to load orders</div>
        <div class="sb">Use the Connection Setup panel above</div>
      </div>
    </div>
  </div>
</div>

<script>
const BASE_ID='appJkaLk8DykjsgHR',TABLE_ID='tblJx5UlwO7oMSk5H',MIN_ORDER=9000;
const EXCLUDE_STATUS=['Completed','Received & Staged','Shipped'];

const F={
  ref:'fldU6oLyZnxhhm2kX',ordered:'fldBnjGyTLLjzz97l',received:'fldwaSkM0sJJ2oYsQ',
  po:'fldIUAnkNscvEVDjU',supplier:'fldoboa9QhrHbEe8A',supplierName:'fldj5Oq8JVUocLzS2',
  arrival:'fld9EfCdiP8cgSepO',printDate:'fldxJsB2j9FO0t3ZL',
  orderNum:'fldRNXpvna5jpa1v5',customer:'fldB4mKfMl2Lp9UK0',
  orderedTotal:'fldRnt7Y6jEFqoZMC',actualTotal:'fldseqgzoicivqc0p',delta:'fld4I3jlP9dSPEWH0',
  orderStatus:'fldpCv8bxptGJ1gty',
  // Ordered sizes
  oXS:'fldVA9ZmYxhDxtnYZ',oS:'fldCZr5lB6Jx80lfG',oM:'fldzTs1qKe9IBxxSn',
  oL:'fldnRLJxjUDa1mQTj',oXL:'fldTRgdexcpBXXQPv',o2XL:'fldin7j6uGO0uRTec',
  o3XL:'fldpltq9fdRkrvIvt',o4XL:'fldrsci7JnToa43Zd',o5XL:'fldchnRSKFukouW6N',
  oOSFA:'fld2bgIlmPbANgLVK',o6XL:'fldI8gTtsEJwg33BI',
  // Actual sizes
  aXS:'fldam6SyOjB3VebzQ',aS:'fldM6F2oo5fV9zPse',aM:'fldejqlR3EGch1svc',
  aL:'fldn3bdKPd3LkuuP3',aXL:'fldVsaOkMG6JglWv3',a2XL:'fld1YCamiJYBRjoZL',
  a3XL:'fld1itap3IIl4UbST',a4XL:'fldkPODsJyE4OZXXZ',a5XL:'fldJpbBIdckvwHj7K',
  aOSFA:'fldcseeXJjlFbIBhA',
  // Extra sizes
  eXS:'fldKcVhxgaclD1csp',eS:'fldgf19Xi1VDqro4Q',eM:'fldWxiQEIFsqwxFW1',
  eL:'fldclPpJQpcXuT4Wn',eXL:'fldWjibddJoIC1JGu',e2XL:'fldgd2JZCSS3YBYX2',
  e3XL:'fldbht14x4cRBPRVL',e4XL:'fldLyB756Va085UDj',e5XL:'fldHZ0WmjhzF34noZ',
  eOSFA:'fldKS4Jk6aZvxR4Nn',
};

const SIZES=[
  {l:'XS', ok:'oXS', ak:'aXS', ek:'eXS'},
  {l:'S',  ok:'oS',  ak:'aS',  ek:'eS'},
  {l:'M',  ok:'oM',  ak:'aM',  ek:'eM'},
  {l:'L',  ok:'oL',  ak:'aL',  ek:'eL'},
  {l:'XL', ok:'oXL', ak:'aXL', ek:'eXL'},
  {l:'2XL',ok:'o2XL',ak:'a2XL',ek:'e2XL'},
  {l:'3XL',ok:'o3XL',ak:'a3XL',ek:'e3XL'},
  {l:'4XL',ok:'o4XL',ak:'a4XL',ek:'e4XL'},
  {l:'5XL',ok:'o5XL',ak:'a5XL',ek:'e5XL'},
  {l:'OSFA',ok:'oOSFA',ak:'aOSFA',ek:'eOSFA'},
  {l:'6XL',ok:'o6XL',ak:null,ek:null},
];

let allRecords=[],currentFilter='all',searchTerm='',pending={},openOrds=new Set(),openLines=new Set(),connOpen=true;

// TOKEN
function getToken(){return localStorage.getItem('pc_token')||sessionStorage.getItem('pc_token')||'';}
function saveToken(){
  const t=document.getElementById('tokenInput').value.trim();
  if(!t){toast('Enter a token first','err');return;}
  localStorage.setItem('pc_token',t);
  toast('Token saved','ok');
}
function toggleConn(){
  connOpen=!connOpen;
  document.getElementById('connBody').style.display=connOpen?'':'none';
  document.querySelector('.panel-hide').textContent=connOpen?'Hide':'Show';
}
window.addEventListener('DOMContentLoaded',()=>{
  const s=getToken();
  if(s){document.getElementById('tokenInput').value=s;loadData();}
});

async function testConn(){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token){showStatus('Enter a token first',false);return;}
  const btn=document.getElementById('testBtn');
  btn.disabled=true;btn.textContent='Testing...';
  try{
    const r=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?maxRecords=1`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)throw new Error();
    showStatus('Connected to Pine Central ✓',true);
    sessionStorage.setItem('pc_token',token);
    loadData();
  }catch{showStatus('Connection failed — check your token',false);}
  finally{btn.disabled=false;btn.textContent='Test Connection';}
}
function showStatus(msg,ok){
  const el=document.getElementById('connStatus');
  el.className='conn-status '+(ok?'cs-ok':'cs-err');
  document.getElementById('statusDot').className='dot '+(ok?'dot-g':'dot-r');
  document.getElementById('statusMsg').textContent=msg;
}

// FETCH
async function loadData(){
  const token=document.getElementById('tokenInput').value.trim()||getToken();
  if(!token){toast('Enter your API token first','err');return;}
  const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon');
  btn.disabled=true;icon.className='spin';
  document.getElementById('resultsArea').innerHTML=`<div class="state-box"><div class="si spin" style="display:inline-block">↻</div><div class="st">Loading orders...</div></div>`;
  try{
    const raw=await fetchAll(token);
    allRecords=raw.filter(r=>{
      if(fv(r,'ordered')!==true)return false;
      if(fv(r,'received')===true)return false;
      if(orderNum(r)<MIN_ORDER)return false;
      const st=getStatus(r);
      if(EXCLUDE_STATUS.includes(st))return false;
      return true;
    });
    renderAll();updateStats();
  }catch(e){
    toast('Load failed: '+e.message,'err');
    document.getElementById('resultsArea').innerHTML=`<div class="state-box"><div class="si">⚠️</div><div class="st">Could not load</div><div class="sb">${esc(e.message)}</div></div>`;
  }finally{btn.disabled=false;icon.className='';}
}

async function fetchAll(token){
  let records=[],offset=null;
  do{
    const p=new URLSearchParams();
    Object.values(F).forEach(id=>p.append('fields[]',id));
    p.set('returnFieldsByFieldId','true');
    p.set('sort[0][field]',F.printDate);
    p.set('sort[0][direction]','asc');
    if(offset)p.set('offset',offset);
    const r=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?${p}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok){const d=await r.json();throw new Error(d.error?.message||`API ${r.status}`);}
    const data=await r.json();
    records=records.concat(data.records||[]);
    offset=data.offset;
  }while(offset);
  return records;
}

// HELPERS
function fv(r,key){const id=F[key];return r.fields?.[id]??r.cellValuesByFieldId?.[id];}
function orderNum(r){
  const v=fv(r,'orderNum');
  if(!v)return 0;
  if(typeof v==='number')return v;
  if(typeof v==='object'&&v.valuesByLinkedRecordId)return Object.values(v.valuesByLinkedRecordId).flat()[0]||0;
  return parseInt(v)||0;
}
function getStatus(r){
  const v=fv(r,'orderStatus');
  if(!v)return '';
  if(typeof v==='object'&&v.valuesByLinkedRecordId)return Object.values(v.valuesByLinkedRecordId).flat()[0]||'';
  if(Array.isArray(v))return v[0]||'';
  return String(v);
}
function supName(r){
  const f=fv(r,'supplierName');
  if(f&&typeof f==='string'&&f.trim())return f.trim();
  const v=fv(r,'supplier');
  if(!v)return '—';
  if(Array.isArray(v))return v.map(s=>s.name||s).join(', ');
  return v.name||String(v);
}
function getPD(r){const v=fv(r,'printDate');return(!v||(typeof v==='object'&&v.error))?null:String(v);}
function daysUntil(ds){
  if(!ds)return null;
  const pts=ds.split('/');
  let d=pts.length===3?new Date(parseInt(pts[2]),parseInt(pts[0])-1,parseInt(pts[1])):new Date(ds);
  if(isNaN(d))return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}

function groupByOrder(records){
  const map={};
  records.forEach(r=>{
    const num=orderNum(r);if(!num)return;
    if(!map[num])map[num]={num,customer:fv(r,'customer')||'—',printDate:getPD(r),records:[]};
    map[num].records.push(r);
    const pd=getPD(r);
    if(pd&&(!map[num].printDate||daysUntil(pd)<daysUntil(map[num].printDate)))map[num].printDate=pd;
  });
  return Object.values(map).sort((a,b)=>{
    const da=daysUntil(a.printDate),db=daysUntil(b.printDate);
    if(da===null&&db===null)return a.num-b.num;
    if(da===null)return 1;if(db===null)return-1;return da-db;
  });
}
function applyFilter(groups){
  let result=groups;
  if(currentFilter==='urgent')result=result.filter(g=>{const d=daysUntil(g.printDate);return d!==null&&d<=4&&d>=0;});
  else if(currentFilter==='week')result=result.filter(g=>{const d=daysUntil(g.printDate);return d!==null&&d<=7&&d>=0;});
  else if(currentFilter==='overdue')result=result.filter(g=>g.records.some(r=>{const d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;}));
  // Apply search — filter records within each group, remove empty groups
  if(searchTerm){
    result=result.map(g=>({
      ...g,
      records:g.records.filter(r=>matchesSearch(r,g.num))
    })).filter(g=>g.records.length>0);
  }
  return result;
}
function updateStats(){
  const g=groupByOrder(allRecords);
  document.getElementById('sO').textContent=g.length;
  document.getElementById('sL').textContent=allRecords.length;
  document.getElementById('sU').textContent=g.filter(x=>{const d=daysUntil(x.printDate);return d!==null&&d<=4&&d>=0;}).length;
  document.getElementById('sV').textContent=allRecords.filter(r=>{const d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;}).length;
}

// DELTA — compares actual vs ordered+extra per size
function rowDelta(o,e,a){
  if(a===null||a===undefined||a==='')return'—';
  const expected=o+(e||0);
  const d=expected-Number(a);
  if(d===0)return`<span class="pill p-ok">✓</span>`;
  if(d>0)return`<span class="pill p-sh">-${d}</span>`;
  return`<span class="pill p-ov">+${Math.abs(d)}</span>`;
}
function collapsedDelta(lineId,sizes,r){
  const a=pending[lineId]||{};
  if(!Object.keys(a).length)return`<span class="dbdg d-empty">—</span>`;
  let tExpected=0,tActual=0;
  sizes.forEach(s=>{
    const o=fv(r,s.ok)||0,e=fv(r,s.ek)||0;
    tExpected+=o+e;
    tActual+=Number(a[s.ak]||0);
  });
  const d=tExpected-tActual;
  if(d===0)return`<span class="dbdg d-ok">✓ Match</span>`;
  if(d>0)return`<span class="dbdg d-sh">${d} short</span>`;
  return`<span class="dbdg d-ov">+${Math.abs(d)} over</span>`;
}

// RENDER
function renderAll(){
  const groups=applyFilter(groupByOrder(allRecords));
  const area=document.getElementById('resultsArea');
  if(!groups.length){
    const msg=searchTerm?`No results for "${searchTerm}"` :'No pending orders match this filter';
    const icon=searchTerm?'🔍':'✅';
    area.innerHTML=`<div class="state-box"><div class="si">${icon}</div><div class="st">${searchTerm?'No results':'All clear'}</div><div class="sb">${msg}</div></div>`;
    return;
  }
  const hint=document.getElementById('searchHint');
  if(hint&&searchTerm){
    const total=groups.reduce((s,g)=>s+g.records.length,0);
    hint.textContent=`${total} line item${total!==1?'s':''} found across ${groups.length} order${groups.length!==1?'s':''}`;
  }
  area.innerHTML=groups.map(g=>renderGroup(g)).join('');
}

function renderGroup(g){
  const days=daysUntil(g.printDate);
  let badge='';
  if(days!==null&&days===0)badge=`<span class="bdg bdg-red">Prints TODAY</span>`;
  else if(days!==null&&days<=4)badge=`<span class="bdg bdg-red">Prints in ${days}d</span>`;
  else if(days!==null&&days<=7)badge=`<span class="bdg bdg-amb">Prints in ${days}d</span>`;
  else if(g.printDate)badge=`<span class="bdg bdg-gray">${g.printDate}</span>`;
  else badge=`<span class="bdg bdg-gray" style="color:var(--muted-lt)">No print date</span>`;
  const isOpen=openOrds.has(g.num)||(searchTerm.length>0);
  return`<div class="order-group${isOpen?' order-open':''}" id="og-${g.num}">
    <div class="order-hd" onclick="togOrd(${g.num})">
      <span class="onum">${g.num}</span>
      <span class="ocust">${esc(g.customer)}</span>
      <div class="obdgs">${badge}<span class="bdg bdg-gray">${g.records.length} line${g.records.length!==1?'s':''}</span></div>
      <span class="chev">▼</span>
    </div>
    <div class="li-container" id="lc-${g.num}">
      ${g.records.map(r=>renderLI(r,g)).join('')}
    </div>
  </div>`;
}

function renderLI(r,g){
  const id=r.id;
  const ref=fv(r,'ref')||id;
  const po=fv(r,'po')||'—';
  const sup=supName(r);
  const arr=fv(r,'arrival')||'—';
  const pd=getPD(r)||'—';
  const ordTotal=fv(r,'orderedTotal')||0;
  const isExp=openLines.has(id)||(searchTerm.length>0&&matchesSearch(r,g.num));
  const arrDays=daysUntil(arr!=='—'?arr:null);
  const arrOvr=arrDays!==null&&arrDays<0;

  // Active sizes (ordered > 0)
  const activeSizes=SIZES.filter(s=>(fv(r,s.ok)||0)>0);

  // Check if any extras exist
  const hasExtras=activeSizes.some(s=>s.ek&&(fv(r,s.ek)||0)>0);

  // Collapsed delta
  const pendActs=pending[id]||{};
  const deltaTag=Object.keys(pendActs).length?collapsedDelta(id,activeSizes,r):`<span class="dbdg d-empty">—</span>`;

  // Size rows
  const sizeRows=activeSizes.map(s=>{
    const oVal=fv(r,s.ok)||0;
    const eVal=s.ek?(fv(r,s.ek)||0):0;
    const aVal=s.ak?(pendActs[s.ak]??fv(r,s.ak)??''):'';
    const dp=rowDelta(oVal,eVal,aVal!==''?aVal:null);
    const inp=s.ak
      ?`<input type="number" min="0" class="ainp" value="${aVal!==''&&aVal!==null&&aVal!==undefined?aVal:''}" placeholder="0" oninput="onInp(this,'${id}','${s.ak}','${s.ok}','${s.ek||''}','${r.id}','${g.num}')">`
      :`<span style="color:var(--muted-lt);font-size:11px">—</span>`;
    return`<tr>
      <td class="slbl">${s.l}</td>
      <td class="oval">${oVal}</td>
      <td class="xval">${eVal>0?'+'+eVal:'—'}</td>
      <td>${inp}</td>
      <td class="dc" id="dr-${id}-${s.l}">${dp}</td>
    </tr>`;
  }).join('');

  // Totals
  const tO=activeSizes.reduce((s,z)=>s+(fv(r,z.ok)||0),0);
  const tE=activeSizes.reduce((s,z)=>s+(z.ek?(fv(r,z.ek)||0):0),0);
  const tActs=Object.values(pendActs);
  const tA=tActs.length?tActs.reduce((s,v)=>s+(Number(v)||0),0):null;
  let totDelta='—';
  if(tA!==null){
    const d=(tO+tE)-tA;
    if(d===0)totDelta=`<span class="pill p-ok">✓ Match</span>`;
    else if(d>0)totDelta=`<span class="pill p-sh">-${d} short</span>`;
    else totDelta=`<span class="pill p-ov">+${Math.abs(d)} over</span>`;
  }

  return`<div class="li${isExp?' li-exp':''}" id="li-${id}">
    <div class="li-row" onclick="togLI('${id}','${g.num}')">
      <div class="li-left">
        <span class="li-ref">${esc(ref)}</span>
        <div class="li-meta">
          <span class="lm">PO# <strong>${esc(po)}</strong></span>
          <span class="lm">📦 <strong>${esc(sup)}</strong></span>
          <span class="lm${arrOvr?' overdue':''}">Arrives <strong>${arr}${arrOvr?` ⚠️`:''}</strong></span>
          <span class="lm">Ordered <strong>${ordTotal}</strong></span>
        </div>
      </div>
      <div class="li-right">
        <span id="dt-${id}">${deltaTag}</span>
        ${isExp?`<span class="li-close" onclick="event.stopPropagation();togLI('${id}','${g.num}')">✕</span>`:''}
      </div>
    </div>
    <div class="li-detail">
      <div class="dmeta">
        <div class="df"><span class="dl">PO #</span><span class="dv grn">${esc(po)}</span></div>
        <div class="df"><span class="dl">Supplier</span><span class="dv">${esc(sup)}</span></div>
        <div class="df"><span class="dl">Arrives</span><span class="dv${arrOvr?' red':''}">${arr}${arrOvr?` ⚠️ ${Math.abs(arrDays)}d late`:''}</span></div>
        <div class="df"><span class="dl">Print date</span><span class="dv">${pd}</span></div>
        <div class="df"><span class="dl">Ordered total</span><span class="dv">${ordTotal}${tE>0?` <span style="color:var(--muted);font-size:11px">(+${tE} extras)</span>`:''}</span></div>
      </div>
      ${hasExtras?`<div class="extras-note show">📋 Extras ordered for this line item are shown in the +Extra column. Delta compares actual received vs ordered + extras.</div>`:''}
      <div class="sgwrap">
        <table class="sgrid">
          <thead><tr>
            <th style="width:58px">Size</th>
            <th>Ordered</th>
            <th>+Extra</th>
            <th class="grn">Actual ✏️</th>
            <th class="ra">+/−</th>
          </tr></thead>
          <tbody>
            ${sizeRows||'<tr><td colspan="5" style="color:var(--muted);padding:12px;font-style:italic">No sizes with ordered qty</td></tr>'}
            <tr class="tot">
              <td class="slbl">Total</td>
              <td class="oval">${tO}</td>
              <td class="xval">${tE>0?'+'+tE:'—'}</td>
              <td id="ta-${id}">${tA!==null?tA:'—'}</td>
              <td class="dc" id="td-${id}">${totDelta}</td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="recv-row">
        <span class="recv-note">Enter actuals from packing slip, then mark received when confirmed.</span>
        <button class="btn-recv" id="rb-${id}" onclick="markRecv('${id}','${g.num}')">✓ Mark as received</button>
      </div>
    </div>
  </div>`;
}

// INTERACTIONS
function togOrd(num){
  const el=document.getElementById(`og-${num}`);
  const lc=document.getElementById(`lc-${num}`);
  if(!el)return;
  if(openOrds.has(num)){
    openOrds.delete(num);
    el.classList.remove('order-open');
    if(lc)lc.style.display='none';
  }else{
    openOrds.add(num);
    el.classList.add('order-open');
    if(lc)lc.style.display='block';
  }
}
function togLI(id,ordNum){
  const el=document.getElementById(`li-${id}`);
  if(!el)return;
  if(openLines.has(id)){
    openLines.delete(id);
  }else{
    openLines.add(id);
  }
  // Re-render just this order's line items to update ✕ button
  const g=groupByOrder(allRecords).find(x=>x.num===Number(ordNum));
  if(g){
    const lc=document.getElementById(`lc-${ordNum}`);
    if(lc)lc.innerHTML=g.records.map(r=>renderLI(r,g)).join('');
  }
}
function onSearch(val){
  searchTerm=val.trim().toLowerCase();
  document.getElementById('searchClear').className='search-clear'+(searchTerm?' show':'');
  const hint=document.getElementById('searchHint');
  if(searchTerm)hint.textContent='Searching customer, PO #, and order #...';
  else hint.textContent='';
  renderAll();
}
function clearSearch(){
  document.getElementById('searchInput').value='';
  onSearch('');
}
function matchesSearch(r,orderNum){
  if(!searchTerm)return true;
  const q=searchTerm;
  // Customer name
  const cust=(fv(r,'customer')||'').toLowerCase();
  if(cust.includes(q))return true;
  // PO #
  const po=(fv(r,'po')||'').toLowerCase();
  if(po.includes(q))return true;
  // Order number
  const onum=String(orderNum||'');
  if(onum.includes(q))return true;
  return false;
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderAll();
}

function onInp(inp,recId,ak,ok,ek,rawId,ordNum){
  if(!pending[recId])pending[recId]={};
  pending[recId][ak]=inp.value===''?null:Number(inp.value);

  const r=allRecords.find(x=>x.id===recId);
  if(!r)return;

  const activeSizes=SIZES.filter(s=>(fv(r,s.ok)||0)>0);
  const oVal=fv(r,ok)||0;
  const eVal=ek?fv(r,ek)||0:0;
  const aVal=inp.value===''?null:Number(inp.value);

  // per-row delta
  const s=activeSizes.find(s=>s.ak===ak);
  if(s){
    const dc=document.getElementById(`dr-${recId}-${s.l}`);
    if(dc)dc.innerHTML=rowDelta(oVal,eVal,aVal);
  }

  // totals row
  const tO=activeSizes.reduce((sum,sz)=>sum+(fv(r,sz.ok)||0),0);
  const tE=activeSizes.reduce((sum,sz)=>sum+(sz.ek?(fv(r,sz.ek)||0):0),0);
  const acts=pending[recId]||{};
  const filled=activeSizes.filter(sz=>sz.ak&&acts[sz.ak]!==null&&acts[sz.ak]!==undefined&&acts[sz.ak]!=='');
  const tA=activeSizes.reduce((sum,sz)=>sum+(sz.ak?Number(acts[sz.ak]||0):0),0);
  const allFilled=activeSizes.filter(sz=>sz.ak).every(sz=>acts[sz.ak]!==null&&acts[sz.ak]!==undefined&&acts[sz.ak]!=='');

  const taEl=document.getElementById(`ta-${recId}`);
  const tdEl=document.getElementById(`td-${recId}`);
  if(taEl)taEl.textContent=allFilled?tA:tA+'+';
  if(tdEl&&allFilled){
    const d=(tO+tE)-tA;
    if(d===0)tdEl.innerHTML=`<span class="pill p-ok">✓ Match</span>`;
    else if(d>0)tdEl.innerHTML=`<span class="pill p-sh">-${d} short</span>`;
    else tdEl.innerHTML=`<span class="pill p-ov">+${Math.abs(d)} over</span>`;
  }

  // collapsed delta badge
  const dtEl=document.getElementById(`dt-${recId}`);
  if(dtEl)dtEl.innerHTML=collapsedDelta(recId,activeSizes,r);
}

async function markRecv(recId,ordNum){
  const token=document.getElementById('tokenInput').value.trim()||getToken();
  if(!token){toast('No token — check Connection Setup','err');return;}
  const btn=document.getElementById(`rb-${recId}`);
  btn.disabled=true;btn.textContent='⏳ Saving...';
  try{
    const updates=pending[recId]||{};
    const fields={...updates,[F.received]:true};
    const res=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${recId}`,{
      method:'PATCH',
      headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({fields})
    });
    if(!res.ok){const d=await res.json();throw new Error(d.error?.message||`API ${res.status}`);}
    delete pending[recId];
    allRecords=allRecords.filter(r=>r.id!==recId);
    openLines.delete(recId);
    const li=document.getElementById(`li-${recId}`);
    if(li){
      li.style.transition='opacity .25s,transform .25s';
      li.style.opacity='0';li.style.transform='translateX(14px)';
      setTimeout(()=>{
        const grp=li.closest('.order-group');
        const rem=grp?.querySelectorAll('.li').length||0;
        if(rem<=1){
          if(grp){
            grp.style.transition='opacity .25s';grp.style.opacity='0';
            setTimeout(()=>{
              openOrds.delete(Number(ordNum));
              grp.remove();updateStats();
            },260);
          }
        }else{li.remove();updateStats();}
      },260);
    }
    toast('Marked as received ✓','ok');
  }catch(e){
    toast('Error: '+e.message,'err');
    btn.disabled=false;btn.innerHTML='✓ Mark as received';
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastTimer;
function toast(msg,type='ok'){
  document.querySelector('.toast')?.remove();clearTimeout(toastTimer);
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3500);
}
</script>
