<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receiving Dashboard — Pine Central</title>
<!-- QRCode loaded lazily inside popup windows only -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f2f0;--surface:#ffffff;--border:#e2e8e2;--border-dk:#c8d4c8;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;
  --text:#1a1f1a;--muted:#6b7a6b;--muted-lt:#9aaa9a;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --blue:#1d4ed8;--blue-bg:#eff6ff;--blue-bd:#bfdbfe;
  --radius:8px;--mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;min-height:100vh;padding-bottom:60px}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:38px;height:38px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-pine{font-size:22px;font-weight:800;color:var(--green);font-style:italic;letter-spacing:-.5px}
.hd{width:1px;height:28px;background:var(--border)}
.header-info{display:flex;flex-direction:column;gap:1px}
.header-title{font-size:15px;font-weight:600}
.header-sub{font-size:12px;color:var(--muted)}
.page{max-width:900px;margin:0 auto;padding:28px 20px;display:flex;flex-direction:column;gap:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.panel-title{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600}
.panel-body{padding:20px}
.panel-hide{background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;font-family:var(--sans)}
.panel-hide:hover{color:var(--text)}
.conn-grid{display:grid;grid-template-columns:1fr 280px;gap:14px;margin-bottom:14px}
.fl{font-size:12px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.fi{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:6px;padding:9px 12px;font-size:13px;font-family:var(--mono);color:var(--text);transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--green);background:#fff}
.fi::placeholder{color:var(--muted-lt)}
.conn-actions{display:flex;gap:10px;margin-bottom:14px}
.btn-primary{background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px 18px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--green-md)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-sec{background:var(--surface);color:var(--text);border:1px solid var(--border-dk);border-radius:6px;padding:9px 16px;font-size:13px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .15s}
.btn-sec:hover{border-color:var(--green);color:var(--green)}
.conn-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:6px;font-size:13px;font-weight:500;border:1px solid}
.cs-ok{background:var(--green-lt);border-color:#a7d4b8;color:var(--green)}
.cs-err{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.cs-hide{display:none}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-g{background:var(--green)}.dot-r{background:var(--red)}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)}
.ss{padding:16px 20px;border-right:1px solid var(--border)}
.ss:last-child{border-right:none}
.sv{font-size:26px;font-weight:700;line-height:1;color:var(--green);font-family:var(--mono)}
.sv.red{color:var(--red)}.sv.amb{color:var(--amb)}
.sl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-weight:500;margin-top:4px}
.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.flt{font-size:12px;color:var(--muted);font-weight:500}
.chip{background:var(--bg);border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--sans);transition:all .12s}
.chip:hover{border-color:var(--green);color:var(--green)}
.chip.on{background:var(--green-lt);border-color:var(--green);color:var(--green)}
.fsp{flex:1}
.btn-refresh{display:flex;align-items:center;gap:6px;background:none;border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .12s}
.btn-refresh:hover{border-color:var(--green);color:var(--green)}
.btn-refresh:disabled{opacity:.4;cursor:not-allowed}
.spin{animation:spin .8s linear infinite;display:inline-block}
.search-bar{padding:10px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.search-wrap{position:relative;display:flex;align-items:center}
.search-icon{position:absolute;left:10px;font-size:14px;color:var(--muted-lt);pointer-events:none}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:6px;padding:8px 36px 8px 32px;font-size:13px;font-family:var(--sans);color:var(--text);transition:border-color .15s}
.search-input:focus{outline:none;border-color:var(--green);background:#fff}
.search-input::placeholder{color:var(--muted-lt)}
.search-clear{position:absolute;right:10px;background:none;border:none;color:var(--muted-lt);cursor:pointer;font-size:15px;line-height:1;padding:2px;display:none}
.search-clear.show{display:block}
.search-clear:hover{color:var(--text)}
.search-hint{font-size:11px;color:var(--muted-lt);margin-top:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box{padding:60px 20px;text-align:center;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px}
.si{font-size:32px}.st{font-size:15px;font-weight:600;color:var(--text)}.sb{font-size:13px}
.order-group{border-bottom:1px solid var(--border);animation:fadeIn .2s ease}
.order-group:last-child{border-bottom:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1}}
.order-hd{display:flex;align-items:center;gap:12px;padding:13px 20px;cursor:pointer;user-select:none;transition:background .1s;background:var(--bg)}
.order-hd:hover{background:#eef0ee}
.onum{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green);min-width:50px}
.ocust{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.obdgs{display:flex;gap:6px;align-items:center;flex-shrink:0}
.bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;white-space:nowrap;border:1px solid}
.bdg-red{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.bdg-amb{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.bdg-gray{background:var(--bg);color:var(--muted);border-color:var(--border-dk)}
.chev{font-size:11px;color:var(--muted-lt);transition:transform .2s;flex-shrink:0}
.order-open .chev{transform:rotate(180deg)}
.order-open .order-hd{border-bottom:1px solid var(--border)}
.li-container{display:none}
.order-open .li-container{display:block}
.li{border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none}
.li-row{display:grid;grid-template-columns:1fr auto;align-items:center;gap:16px;padding:12px 20px;cursor:pointer;transition:background .1s;background:var(--surface)}
.li-row:hover{background:#fafcfa}
.li-exp .li-row{background:#fafcfa;border-bottom:1px solid var(--border)}
.li-left{display:flex;flex-direction:column;gap:4px}
.li-ref{font-family:var(--mono);font-size:11px;color:var(--text);line-height:1.4}
.li-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.lm{font-size:12px;color:var(--muted);white-space:nowrap}
.lm strong{color:var(--text);font-weight:500;font-family:var(--mono)}
.li-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dbdg{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;border:1px solid;font-family:var(--mono);white-space:nowrap}
.d-empty{background:var(--bg);color:var(--muted);border-color:var(--border-dk)}
.d-ok{background:var(--green-lt);color:var(--green);border-color:#a7d4b8}
.d-sh{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.d-ov{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.li-close{width:24px;height:24px;border-radius:50%;background:var(--surface);border:1px solid var(--border-dk);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);cursor:pointer;flex-shrink:0;transition:all .1s;line-height:1}
.li-close:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.li-detail{display:none;background:var(--surface);padding:16px 20px;border-top:none}
.li-exp .li-detail{display:block}
.dmeta{display:flex;gap:20px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--border);margin-bottom:14px}
.df{display:flex;flex-direction:column;gap:3px}
.dl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.dv{font-family:var(--mono);font-size:13px;color:var(--text)}
.dv.grn{color:var(--green);font-weight:600}
.dv.red{color:var(--red)}
.dv.amb{color:var(--amb);font-weight:600}
.sgwrap{overflow-x:auto;margin-bottom:14px}
.sgrid{width:100%;border-collapse:collapse;font-size:13px}
.sgrid th{padding:7px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);background:var(--bg);border:1px solid var(--border);text-align:left}
.sgrid th.ra{text-align:right}
.sgrid th.grn{color:var(--green)}
.sgrid td{padding:7px 10px;border:1px solid var(--border);background:var(--surface);font-family:var(--mono)}
.sgrid tr.tot td{background:var(--bg);font-weight:600;border-top:2px solid var(--border-dk)}
.slbl{color:var(--muted);font-size:12px;font-weight:600}
.oval{color:var(--text)}
.xval{color:var(--muted);font-size:12px}
.ainp{width:68px;background:var(--bg);border:1px solid var(--border-dk);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:13px;color:var(--text);transition:border-color .15s,background .15s;-moz-appearance:textfield}
.ainp::-webkit-outer-spin-button,.ainp::-webkit-inner-spin-button{-webkit-appearance:none}
.ainp:focus{outline:none;border-color:var(--green);background:var(--green-lt)}
.dc{text-align:right}
.pill{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;padding:2px 7px;border-radius:4px;border:1px solid}
.p-ok{background:var(--green-lt);color:var(--green);border-color:#a7d4b8}
.p-sh{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.p-ov{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
.extras-note{font-size:11px;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:5px;display:none}
.extras-note.show{display:block}
.recv-row{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap;gap:10px}
.recv-note{font-size:12px;color:var(--muted)}
.btn-recv{display:flex;align-items:center;gap:7px;background:var(--green);color:#fff;border:none;border-radius:6px;padding:9px 20px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s}
.btn-recv:hover{background:var(--green-md)}
.btn-recv:disabled{opacity:.5;cursor:not-allowed}
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;font-size:13px;font-weight:500;padding:11px 18px;border-radius:7px;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);animation:slideUp .2s ease;display:flex;align-items:center;gap:8px}
.toast.ok::before{content:'✓';color:#4ade80;font-weight:700}
.toast.err::before{content:'✕';color:#f87171;font-weight:700}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-out{opacity:0;transform:translateX(14px);transition:opacity .25s,transform .25s}
.recv-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:0}
.recv-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--green-lt);border-bottom:1px solid #a7d4b8;cursor:pointer;user-select:none}
.recv-panel-title{font-size:13px;font-weight:600;color:var(--green);display:flex;align-items:center;gap:8px}
.recv-panel-chev{font-size:11px;color:var(--green);transition:transform .2s}
.recv-panel-open .recv-panel-chev{transform:rotate(180deg)}
.recv-panel-body{display:none;padding:0}
.recv-panel-open .recv-panel-body{display:block}
.recv-row-item{display:flex;align-items:center;gap:12px;padding:11px 20px;border-bottom:1px solid var(--border)}
.recv-row-item:last-child{border-bottom:none}
.recv-onum{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--green);min-width:50px}
.recv-cust{font-size:13px;font-weight:500;flex:1}
.recv-time{font-size:11px;color:var(--muted)}
.btn-reprint{display:flex;align-items:center;gap:5px;background:var(--surface);border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 11px;border-radius:5px;cursor:pointer;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.btn-reprint:hover{border-color:var(--green);color:var(--green)}
.reprint-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.reprint-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
.reprint-panel-title{font-size:13px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:8px}
.reprint-panel-body{display:none;padding:16px 20px}
.reprint-panel-open .reprint-panel-body{display:block}
.reprint-search-row{display:flex;gap:10px;margin-bottom:12px}
.reprint-inp{flex:1;background:var(--bg);border:1px solid var(--border-dk);border-radius:6px;padding:8px 12px;font-size:13px;font-family:var(--mono);color:var(--text);transition:border-color .15s}
.reprint-inp:focus{outline:none;border-color:var(--green);background:#fff}
.reprint-inp::placeholder{color:var(--muted-lt)}
.btn-reprint-search{background:var(--green);color:#fff;border:none;border-radius:6px;padding:8px 16px;font-size:13px;font-weight:600;font-family:var(--sans);cursor:pointer;white-space:nowrap}
.btn-reprint-search:disabled{opacity:.5;cursor:not-allowed}
.reprint-result{background:var(--green-lt);border:1px solid #a7d4b8;border-radius:6px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.reprint-result-info{display:flex;flex-direction:column;gap:3px}
.reprint-result-ord{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--green)}
.reprint-result-cust{font-size:13px;color:var(--text)}
.reprint-result-date{font-size:11px;color:var(--muted)}
.btn-label{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border-dk);color:var(--muted);font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .12s;white-space:nowrap}
.btn-label:hover{border-color:var(--green);color:var(--green)}
.proof-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer}
.proof-overlay-inner{position:relative;max-width:90vw;max-height:90vh;border-radius:8px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5);cursor:default;display:flex;align-items:center;justify-content:center;background:#fff;padding:16px}
.proof-overlay-close{position:absolute;top:-14px;right:-14px;width:32px;height:32px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:1;line-height:1;color:var(--text)}
.proof-overlay-close:hover{background:var(--red-bg);color:var(--red)}
.li-thumb{width:38px;height:38px;object-fit:contain;border:1px solid var(--border);border-radius:4px;background:var(--surface);flex-shrink:0;cursor:pointer;transition:transform .1s}
.li-thumb:hover{transform:scale(1.08)}
.imp-strip{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap}
.imp-ids{display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex:1}
.imp-id{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--green);background:var(--green-lt);border:1px solid #a7d4b8;padding:2px 8px;border-radius:4px;white-space:nowrap}
.proof-thumb{width:44px;height:44px;object-fit:contain;border:1px solid var(--border);border-radius:4px;background:var(--surface);cursor:pointer;transition:transform .1s}
.proof-thumb:hover{transform:scale(1.1)}
.btn-fill{background:none;border:none;color:var(--muted-lt);font-size:11px;cursor:pointer;padding:2px 6px;border-radius:4px;font-family:var(--mono);transition:all .1s;white-space:nowrap;line-height:1}
.btn-fill:hover{background:var(--green-lt);color:var(--green)}
.btn-fill.filled{color:var(--green);opacity:.6;text-decoration:line-through}
.ms-bdg{font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px;border:1px solid;white-space:nowrap}
.ms-flag{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.ms-prog{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.ms-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:6px;padding:12px 14px;margin-bottom:14px}
.ms-box-prog{background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:6px;padding:12px 14px;margin-bottom:14px}
.ms-box-title{font-size:12px;font-weight:600;color:var(--red);margin-bottom:4px}
.ms-box-title-prog{font-size:12px;font-weight:600;color:var(--amb);margin-bottom:4px}
.ms-box-note{font-size:12px;color:var(--text);line-height:1.5}
.ms-flag-form{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none}
.ms-flag-form.open{display:block}
.ms-flag-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px}
.ms-textarea{width:100%;background:var(--bg);border:1px solid var(--border-dk);border-radius:5px;padding:8px 10px;font-size:13px;font-family:var(--sans);color:var(--text);resize:vertical;min-height:72px;transition:border-color .15s}
.ms-textarea:focus{outline:none;border-color:var(--red);background:#fff}
.ms-textarea::placeholder{color:var(--muted-lt)}
.ms-actions{display:flex;gap:8px;margin-top:8px}
.btn-ms-save{background:var(--red);color:#fff;border:none;border-radius:5px;padding:7px 14px;font-size:12px;font-weight:600;font-family:var(--sans);cursor:pointer;transition:background .15s}
.btn-ms-save:hover{background:#a93226}
.btn-ms-save:disabled{opacity:.5;cursor:not-allowed}
.btn-ms-cancel{background:none;border:1px solid var(--border-dk);color:var(--muted);border-radius:5px;padding:7px 12px;font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer}
.btn-ms-cancel:hover{border-color:var(--text);color:var(--text)}
.btn-flag{display:flex;align-items:center;gap:5px;background:none;border:1px solid var(--red-bd);color:var(--red);border-radius:5px;padding:7px 12px;font-size:12px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:all .12s}
.btn-flag:hover{background:var(--red-bg)}
.prog-bdg{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;border:1px solid;white-space:nowrap}

<script>
const BASE_ID='appJkaLk8DykjsgHR',TABLE_ID='tblJx5UlwO7oMSk5H',MIN_ORDER=9000;
const EXCLUDE_STATUS=['Completed','Received & Staged','Shipped'];

const F={
  ref:'fldU6oLyZnxhhm2kX',ordered:'fldBnjGyTLLjzz97l',received:'fldwaSkM0sJJ2oYsQ',
  po:'fldIUAnkNscvEVDjU',supplier:'fldoboa9QhrHbEe8A',supplierName:'fldj5Oq8JVUocLzS2',
  arrival:'fld9EfCdiP8cgSepO',printDate:'fldxJsB2j9FO0t3ZL',
  orderNum:'fldRNXpvna5jpa1v5',customer:'fldB4mKfMl2Lp9UK0',
  orderedTotal:'fldRnt7Y6jEFqoZMC',
  totalQty:'fldFfuKAcduwWQp8g',
  orderStatus:'fldpCv8bxptGJ1gty',
  dueDate:'fldqoBVfIvvKZrgiM',
  productType:'fld8LIkrBXv8WoRRb',
  misship:'fldDlrzYoe2q31K0U',
  misshipDetails:'fldQP8hzBdUXl50Io',
  misshipInProgress:'fldKNP8l61EEaJHmA',
  misshipResolved:'fldt0vrDUpL3eKatw',
  oXS:'fldVA9ZmYxhDxtnYZ',oS:'fldCZr5lB6Jx80lfG',oM:'fldzTs1qKe9IBxxSn',
  oL:'fldnRLJxjUDa1mQTj',oXL:'fldTRgdexcpBXXQPv',o2XL:'fldin7j6uGO0uRTec',
  o3XL:'fldpltq9fdRkrvIvt',o4XL:'fldrsci7JnToa43Zd',o5XL:'fldchnRSKFukouW6N',
  oOSFA:'fld2bgIlmPbANgLVK',o6XL:'fldI8gTtsEJwg33BI',
  aXS:'fldam6SyOjB3VebzQ',aS:'fldM6F2oo5fV9zPse',aM:'fldejqlR3EGch1svc',
  aL:'fldn3bdKPd3LkuuP3',aXL:'fldVsaOkMG6JglWv3',a2XL:'fld1YCamiJYBRjoZL',
  a3XL:'fld1itap3IIl4UbST',a4XL:'fldkPODsJyE4OZXXZ',a5XL:'fldJpbBIdckvwHj7K',
  aOSFA:'fldcseeXJjlFbIBhA',
  eXS:'fldKcVhxgaclD1csp',eS:'fldgf19Xi1VDqro4Q',eM:'fldWxiQEIFsqwxFW1',
  eL:'fldclPpJQpcXuT4Wn',eXL:'fldWjibddJoIC1JGu',e2XL:'fldgd2JZCSS3YBYX2',
  e3XL:'fldbht14x4cRBPRVL',e4XL:'fldLyB756Va085UDj',e5XL:'fldHZ0WmjhzF34noZ',
  eOSFA:'fldKS4Jk6aZvxR4Nn',
  imprintIds:'fldmGRcdXyvheWjmv',
  proofImages:'flddhvdkKI31tFTdX',
  equipmentLookup:'fldFdmnKTw5SG45k5',
  garmentStyleLookup:'fldQg3ejR10sADyFV',
  colorwayLookup:'fldoXTRyLP4SshFZ0',
  fleeceFlag:'fldF3XqXUlPaNMWoG',
  garmentTypeLookup:'fldH6FaN4rzwzdEXj',
};

const EXCLUDE_PRODUCT_TYPES=['Promo','Stickers','Flatstock'];
const SIZES=[
  {l:'XS',ok:'oXS',ak:'aXS',ek:'eXS'},{l:'S',ok:'oS',ak:'aS',ek:'eS'},
  {l:'M',ok:'oM',ak:'aM',ek:'eM'},{l:'L',ok:'oL',ak:'aL',ek:'eL'},
  {l:'XL',ok:'oXL',ak:'aXL',ek:'eXL'},{l:'2XL',ok:'o2XL',ak:'a2XL',ek:'e2XL'},
  {l:'3XL',ok:'o3XL',ak:'a3XL',ek:'e3XL'},{l:'4XL',ok:'o4XL',ak:'a4XL',ek:'e4XL'},
  {l:'5XL',ok:'o5XL',ak:'a5XL',ek:'e5XL'},{l:'OSFA',ok:'oOSFA',ak:'aOSFA',ek:'eOSFA'},
  {l:'6XL',ok:'o6XL',ak:null,ek:null},
];

let allRecords=[],currentFilter='all',searchTerm='',pending={},fillState={},openOrds=new Set(),openLines=new Set(),connOpen=true,orderReceivedCount={},receivedOrders={};

function getToken(){return localStorage.getItem('pc_token')||sessionStorage.getItem('pc_token')||'';}
function saveToken(){
  const t=document.getElementById('tokenInput').value.trim();
  if(!t){toast('Enter a token first','err');return;}
  localStorage.setItem('pc_token',t);toast('Token saved','ok');
}
function toggleConn(){
  connOpen=!connOpen;
  document.getElementById('connBody').style.display=connOpen?'':'none';
  document.querySelector('.panel-hide').textContent=connOpen?'Hide':'Show';
}
window.addEventListener('DOMContentLoaded',()=>{
  const s=getToken();
  if(s){document.getElementById('tokenInput').value=s;loadData();}
});

async function testConn(){
  const token=document.getElementById('tokenInput').value.trim();
  if(!token){showStatus('Enter a token first',false);return;}
  const btn=document.getElementById('testBtn');
  btn.disabled=true;btn.textContent='Testing...';
  try{
    const r=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?maxRecords=1`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)throw new Error();
    showStatus('Connected to Pine Central ✓',true);
    sessionStorage.setItem('pc_token',token);loadData();
  }catch{showStatus('Connection failed — check your token',false);}
  finally{btn.disabled=false;btn.textContent='Test Connection';}
}
function showStatus(msg,ok){
  const el=document.getElementById('connStatus');
  el.className='conn-status '+(ok?'cs-ok':'cs-err');
  document.getElementById('statusDot').className='dot '+(ok?'dot-g':'dot-r');
  document.getElementById('statusMsg').textContent=msg;
}

async function loadData(){
  const token=document.getElementById('tokenInput').value.trim()||getToken();
  if(!token){toast('Enter your API token first','err');return;}
  const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon');
  btn.disabled=true;icon.className='spin';
  document.getElementById('resultsArea').innerHTML=`<div class="state-box"><div class="si spin" style="display:inline-block">↻</div><div class="st">Loading orders...</div></div>`;
  try{
    const raw=await fetchAll(token);
    orderReceivedCount={};fillState={};receivedOrders={};
    allRecords=raw.filter(r=>{
      if(fv(r,'ordered')!==true)return false;
      if(fv(r,'received')===true)return false;
      if(orderNum(r)<MIN_ORDER)return false;
      const st=getStatus(r);
      if(EXCLUDE_STATUS.includes(st))return false;
      const pt=fv(r,'productType');
      if(pt){const ptName=typeof pt==='object'?pt.name:String(pt);if(EXCLUDE_PRODUCT_TYPES.includes(ptName))return false;}
      return true;
    });
    renderAll();updateStats();
  }catch(e){
    toast('Load failed: '+e.message,'err');
    document.getElementById('resultsArea').innerHTML=`<div class="state-box"><div class="si">⚠️</div><div class="st">Could not load</div><div class="sb">${esc(e.message)}</div></div>`;
  }finally{btn.disabled=false;icon.className='';}
}

async function fetchAll(token){
  let records=[],offset=null;
  // ── PERFORMANCE: server-side filter so we only fetch pending line items ──
  // Instead of pulling every record and filtering client-side, we ask Airtable
  // to return only Ordered=TRUE and Received!=TRUE. For a table with thousands
  // of historical records this cuts API pages from 30+ down to 1-2.
  const filterFormula=`AND({Ordered}=TRUE(),{Received}!=TRUE())`;
  do{
    const p=new URLSearchParams();
    Object.values(F).forEach(id=>p.append('fields[]',id));
    p.set('returnFieldsByFieldId','true');
    p.set('filterByFormula',filterFormula);
    p.set('sort[0][field]',F.printDate);
    p.set('sort[0][direction]','asc');
    if(offset)p.set('offset',offset);
    const r=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?${p}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok){const d=await r.json();throw new Error(d.error?.message||`API ${r.status}`);}
    const data=await r.json();
    records=records.concat(data.records||[]);
    offset=data.offset;
  }while(offset);
  return records;
}

function fv(r,key){const id=F[key];return r.fields?.[id]??r.cellValuesByFieldId?.[id];}
function orderNum(r){
  const v=fv(r,'orderNum');
  if(!v)return 0;
  if(typeof v==='number')return v;
  if(typeof v==='object'&&v.valuesByLinkedRecordId)return Object.values(v.valuesByLinkedRecordId).flat()[0]||0;
  return parseInt(v)||0;
}
function getStatus(r){
  const v=fv(r,'orderStatus');
  if(!v)return '';
  if(typeof v==='object'&&v.valuesByLinkedRecordId)return Object.values(v.valuesByLinkedRecordId).flat()[0]||'';
  if(Array.isArray(v))return v[0]||'';
  return String(v);
}
function supName(r){
  const f=fv(r,'supplierName');
  if(f&&typeof f==='string'&&f.trim())return f.trim();
  const v=fv(r,'supplier');
  if(!v)return '—';
  if(Array.isArray(v))return v.map(s=>s.name||s).join(', ');
  return v.name||String(v);
}
function getPD(r){
  const v=fv(r,'printDate');
  if(v&&!(typeof v==='object'&&v.error))return{date:String(v),isDue:false};
  const dv=fv(r,'dueDate');
  if(dv){
    if(typeof dv==='object'&&dv.valuesByLinkedRecordId){const d=Object.values(dv.valuesByLinkedRecordId).flat()[0];if(d)return{date:String(d).split('T')[0],isDue:true};}
    if(typeof dv==='string')return{date:dv.split('T')[0],isDue:true};
  }
  return null;
}
function getPDStr(r){const p=getPD(r);return p?p.date:null;}
function getPDIsDue(r){const p=getPD(r);return p?p.isDue:false;}
function daysUntil(ds){
  if(!ds)return null;
  const pts=ds.split('/');
  let d=pts.length===3?new Date(parseInt(pts[2]),parseInt(pts[0])-1,parseInt(pts[1])):new Date(ds);
  if(isNaN(d))return null;
  const t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function groupByOrder(records){
  const map={};
  records.forEach(r=>{
    const num=orderNum(r);if(!num)return;
    if(!map[num])map[num]={num,customer:fv(r,'customer')||'—',printDate:getPDStr(r),isDue:getPDIsDue(r),records:[],receivedCount:orderReceivedCount[num]||0};
    map[num].records.push(r);
    const pd=getPDStr(r);
    if(pd&&(!map[num].printDate||daysUntil(pd)<daysUntil(map[num].printDate))){map[num].printDate=pd;map[num].isDue=getPDIsDue(r);}
  });
  Object.values(map).forEach(g=>{g.totalCount=g.records.length+g.receivedCount;});
  return Object.values(map).sort((a,b)=>{
    const da=daysUntil(a.printDate),db=daysUntil(b.printDate);
    if(da===null&&db===null)return a.num-b.num;
    if(da===null)return 1;if(db===null)return-1;return da-db;
  });
}
function applyFilter(groups){
  let result=groups;
  if(currentFilter==='urgent')result=result.filter(g=>{const d=daysUntil(g.printDate);return d!==null&&d<=4&&d>=0;});
  else if(currentFilter==='misship')result=result.filter(g=>g.records.some(r=>fv(r,'misship')===true&&fv(r,'misshipResolved')!==true));
  else if(currentFilter==='overdue')result=result.filter(g=>g.records.some(r=>{const d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;}));
  if(searchTerm){
    result=result.map(g=>({...g,records:g.records.filter(r=>matchesSearch(r,g.num))})).filter(g=>g.records.length>0);
  }
  return result;
}
function updateStats(){
  const g=groupByOrder(allRecords);
  document.getElementById('sO').textContent=g.length;
  document.getElementById('sL').textContent=allRecords.length;
  document.getElementById('sU').textContent=g.filter(x=>{const d=daysUntil(x.printDate);return d!==null&&d<=4&&d>=0;}).length;
  document.getElementById('sV').textContent=allRecords.filter(r=>{const d=daysUntil(fv(r,'arrival'));return d!==null&&d<0;}).length;
}
function rowDelta(o,e,a){
  if(a===null||a===undefined||a==='')return'—';
  const expected=o+(e||0),d=expected-Number(a);
  if(d===0)return`<span class="pill p-ok">✓</span>`;
  if(d>0)return`<span class="pill p-sh">-${d}</span>`;
  return`<span class="pill p-ov">+${Math.abs(d)}</span>`;
}
function collapsedDelta(lineId,sizes,r){
  const a=pending[lineId]||{};
  if(!Object.keys(a).length)return`<span class="dbdg d-empty">—</span>`;
  let tExpected=0,tActual=0;
  sizes.forEach(s=>{const o=fv(r,s.ok)||0,e=fv(r,s.ek)||0;tExpected+=o+e;tActual+=Number(a[s.ak]||0);});
  const d=tExpected-tActual;
  if(d===0)return`<span class="dbdg d-ok">✓ Match</span>`;
  if(d>0)return`<span class="dbdg d-sh">${d} short</span>`;
  return`<span class="dbdg d-ov">+${Math.abs(d)} over</span>`;
}
function renderAll(){
  const groups=applyFilter(groupByOrder(allRecords));
  const area=document.getElementById('resultsArea');
  if(!groups.length){
    const msg=searchTerm?`No results for "${searchTerm}"` :'No pending orders match this filter';
    const icon=searchTerm?'🔍':'✅';
    area.innerHTML=`<div class="state-box"><div class="si">${icon}</div><div class="st">${searchTerm?'No results':'All clear'}</div><div class="sb">${msg}</div></div>`;
    return;
  }
  const hint=document.getElementById('searchHint');
  if(hint&&searchTerm){const total=groups.reduce((s,g)=>s+g.records.length,0);hint.textContent=`${total} line item${total!==1?'s':''} found across ${groups.length} order${groups.length!==1?'s':''}`;}
  area.innerHTML=groups.map(g=>renderGroup(g)).join('');
}
function renderGroup(g){
  const days=daysUntil(g.printDate);
  let badge='';
  const pfx=g.isDue?'Due':'Prints';
  if(days!==null&&days===0)badge=`<span class="bdg bdg-red">${pfx} TODAY</span>`;
  else if(days!==null&&days<=4)badge=`<span class="bdg bdg-red">${pfx} in ${days}d</span>`;
  else if(days!==null&&days<=7)badge=`<span class="bdg bdg-amb">${pfx} in ${days}d</span>`;
  else if(g.printDate)badge=`<span class="bdg bdg-gray">${pfx} ${g.printDate}</span>`;
  else badge=`<span class="bdg bdg-gray" style="color:var(--muted-lt)">No date</span>`;
  const isOpen=openOrds.has(g.num)||(searchTerm.length>0);
  const progBdg=progressBadge(g.receivedCount||0,g.totalCount||g.records.length);
  return`<div class="order-group${isOpen?' order-open':''}" id="og-${g.num}">
    <div class="order-hd" onclick="togOrd(${g.num})">
      <span class="onum">${g.num}</span>
      <span class="ocust">${esc(g.customer)}</span>
      <div class="obdgs">${badge}${progBdg}<span class="bdg bdg-gray">${g.records.length} line${g.records.length!==1?'s':''} pending</span></div>
      <button class="btn-label" onclick="event.stopPropagation();printLabel(${g.num})" title="Print receiving label">🖨 Label</button>
      <button class="btn-label" style="border-color:#1d4ed8;color:#1d4ed8" onclick="event.stopPropagation();printBoxLabels(${g.num})" title="Print box labels">📦 Box Labels</button>
      <span class="chev">▼</span>
    </div>
    <div class="li-container" id="lc-${g.num}">
      ${g.records.map(r=>renderLI(r,g)).join('')}
    </div>
  </div>`;
}
function renderLI(r,g){
  const id=r.id,ref=fv(r,'ref')||id,po=fv(r,'po')||'—',sup=supName(r),arr=fv(r,'arrival')||'—';
  const pdObj=getPD(r),pd=pdObj?pdObj.date:'—',pdIsDue=pdObj?pdObj.isDue:false;
  const ordTotal=fv(r,'totalQty')||fv(r,'orderedTotal')||SIZES.reduce((s,z)=>s+(fv(r,z.ok)||0),0);
  const isExp=openLines.has(id)||(searchTerm.length>0&&matchesSearch(r,g.num));
  const arrDays=daysUntil(arr!=='—'?arr:null),arrOvr=arrDays!==null&&arrDays<0;
  const activeSizes=SIZES.filter(s=>(fv(r,s.ok)||0)>0);
  const hasExtras=activeSizes.some(s=>s.ek&&(fv(r,s.ek)||0)>0);
  const pendActs=pending[id]||{};
  const deltaTag=Object.keys(pendActs).length?collapsedDelta(id,activeSizes,r):`<span class="dbdg d-empty">—</span>`;
  const sizeRows=activeSizes.map(s=>{
    const oVal=fv(r,s.ok)||0,eVal=s.ek?(fv(r,s.ek)||0):0,aVal=s.ak?(pendActs[s.ak]??fv(r,s.ak)??''):'';
    const dp=rowDelta(oVal,eVal,aVal!==''?aVal:null);

    SIZE_ORDER.forEach(sz=>{const qty=getSizeQty(r,sz);if(qty>0){itemSizes[sz]=qty;total+=qty;}});
    if(total>0)groups[cat].push({garment:getGarmentName(r),color:getColorName(r),design:getImprintIds(r).join(' · ')||'—',style,cat,sizes:itemSizes,total,r});
  });
  const allBoxes=[];
  CATEGORY_ORDER.forEach(cat=>{
    const items=groups[cat];if(!items.length)return;
    items.forEach(item=>{
      let itemRemaining={...item.sizes},itemTotal=item.total;
      while(itemTotal>0){
        const{boxSize,capacity}=getBoxSizeAndCapacity(item.style,itemTotal);
        const lastBox=allBoxes.length?allBoxes[allBoxes.length-1]:null;
        let currentBox=null;
        if(lastBox&&lastBox.cat===cat&&lastBox.count<lastBox.capacity){currentBox=lastBox;}
        else{currentBox={rows:[],count:0,boxSize,capacity,cat};allBoxes.push(currentBox);}
        const space=currentBox.capacity-currentBox.count,take=Math.min(itemTotal,space);
        const rowSizes={};let taken=0;
        SIZE_ORDER.forEach(sz=>{
          if(taken>=take)return;const available=itemRemaining[sz]||0;if(!available)return;
          const grab=Math.min(available,take-taken);
          if(grab>0){rowSizes[sz]=grab;itemRemaining[sz]-=grab;if(!itemRemaining[sz])delete itemRemaining[sz];taken+=grab;}
        });
        if(taken>0){
          const existingRow=currentBox.rows.find(row=>row.garment===item.garment&&row.color===item.color&&row.design===item.design);
          if(existingRow){SIZE_ORDER.forEach(sz=>{if(rowSizes[sz])existingRow.sizes[sz]=(existingRow.sizes[sz]||0)+rowSizes[sz];});existingRow.total+=taken;}
          else{currentBox.rows.push({garment:item.garment,color:item.color,design:item.design,style:item.style,sizes:{...rowSizes},total:taken});}
          currentBox.count+=taken;itemTotal-=taken;
        }
      }
    });
  });
  const MIN_BOX_QTY={tee:25,hoodie:25,bandana:50,hat:25};
  for(let i=allBoxes.length-1;i>0;i--){
    const box=allBoxes[i],prev=allBoxes[i-1];
    if(!box.cat||box.cat!==prev.cat)continue;
    if(box.count<(MIN_BOX_QTY[box.cat]||25)){
      box.rows.forEach(row=>{const existing=prev.rows.find(r=>r.garment===row.garment&&r.color===row.color&&r.design===row.design);if(existing){SIZE_ORDER.forEach(sz=>{if(row.sizes[sz])existing.sizes[sz]=(existing.sizes[sz]||0)+row.sizes[sz];});existing.total+=row.total;}else{prev.rows.push({...row,sizes:{...row.sizes}});}});
      prev.count+=box.count;allBoxes.splice(i,1);
    }
  }
  return allBoxes;
}

function addRow(boxIdx){const tbody=document.getElementById('lbl-tbody-'+boxIdx);if(!tbody)return;const tr=document.createElement('tr');tr.className='lbl-data-row';tr.dataset.manual='1';tr.style.background='#fffbea';const cols=['Garment','Color','Design','Sizes','Total'];cols.forEach(function(ph){const td=document.createElement('td');const span=document.createElement('span');span.contentEditable='true';span.style.cssText='min-width:20px;display:inline-block;color:#aaa;font-style:italic';span.textContent=ph;span.addEventListener('focus',function(){if(this.textContent===ph){this.textContent='';this.style.color='';this.style.fontStyle='';}});span.addEventListener('blur',function(){if(this.textContent.trim()===''){this.textContent=ph;this.style.color='#aaa';this.style.fontStyle='italic';}});td.appendChild(span);tr.appendChild(td);});const tdDel=document.createElement('td');tdDel.style.cssText='padding:0;text-align:center;vertical-align:middle';const btn=document.createElement('button');btn.textContent='🗑';btn.title='Remove row';btn.style.cssText='background:none;border:none;cursor:pointer;font-size:13px;padding:2px 4px;color:#999;line-height:1';btn.onmouseover=function(){this.style.color='#c00';this.style.background='#fee';};btn.onmouseout=function(){this.style.color='#999';this.style.background='none';};btn.onclick=function(e){e.stopPropagation();tr.remove();};tdDel.appendChild(btn);tr.appendChild(tdDel);tbody.appendChild(tr);const firstSpan=tr.querySelector('span[contenteditable]');if(firstSpan){firstSpan.focus();firstSpan.textContent='';firstSpan.style.color='';firstSpan.style.fontStyle='';}}
function logFeedback(e,barEl){const bar=barEl;if(!bar)return;const ordNum=parseInt(bar.dataset.ord)||0,style=bar.dataset.style||'Unknown',autoCount=parseInt(bar.dataset.count)||0;if(bar.dataset.logged==='1'){bar.style.display='none';return;}bar.dataset.logged='1';bar.querySelector('.fb-prompt').style.display='none';bar.querySelector('.fb-done').style.display='';let actualCount=autoCount;try{const lbl=bar.closest('.lbl');if(lbl){const totalCells=lbl.querySelectorAll('.lbl-data-row td:nth-child(5) [contenteditable]');if(totalCells.length){let sum=0;totalCells.forEach(cell=>{const v=parseInt(cell.textContent);if(!isNaN(v))sum+=v;});if(sum>0)actualCount=sum;}}}catch(err){}const wasAdjusted=actualCount!==autoCount;try{window.opener.postMessage({type:'boxFeedback',ordNum,style,autoCount,actualCount,wasEdited:wasAdjusted,ts:new Date().toISOString()},'*');}catch(err){}}

window.addEventListener('message',async(e)=>{
  if(e.data?.type!=='boxFeedback')return;
  const{ordNum,style,autoCount,actualCount,wasEdited,ts}=e.data;
  await saveBoxFeedback({ordNum,style,autoCount,actualCount,wasEdited,ts});
});
async function saveBoxFeedback({ordNum,style,autoCount,actualCount,wasEdited,ts}){
  const token=document.getElementById('tokenInput').value.trim()||getToken();if(!token)return;
  try{
    const feedbackId=`${ordNum}-${style.replace(/\s+/g,'-')}-${Date.now()}`;
    const record={fields:{'fld8xGZkGrwSJJ4Kz':feedbackId,'fld7HrySYt92obfo1':Number(ordNum)||0,'fldYz1tKg7AL4WX6N':style||'Unknown','fldod6CLIbE5TMcM1':Number(autoCount)||0,'fld3kj1g7aziUVltp':Number(actualCount)||Number(autoCount)||0,'fldwZVqo1lSvfWOt4':wasEdited===true,'fld6kpergqBmEjb71':wasEdited?'Adjusted by packer':'Confirmed correct','fldDjIbk6bmEnwSWW':ts||new Date().toISOString()}};
    const r=await fetch(`https://api.airtable.com/v0/appJkaLk8DykjsgHR/tblX7y8RsEbMttDuF`,{method:'POST',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({records:[record]})});
    if(r.ok){toast(wasEdited?'Adjustment logged — thanks! 📊':'Confirmed correct — logged! 📊','ok');}
  }catch(e){console.warn('Feedback save failed',e);}
}
function togRecentPanel(){document.getElementById('recentPanel').classList.toggle('recv-panel-open');}
function renderRecentPanel(){
  const panel=document.getElementById('recentPanel'),body=document.getElementById('recentBody'),count=document.getElementById('recentCount');
  const orders=Object.values(receivedOrders).sort((a,b)=>b.num-a.num);
  if(!orders.length){panel.style.display='none';return;}
  panel.style.display='block';panel.classList.add('recv-panel-open');count.textContent=orders.length;
  body.innerHTML=orders.map(o=>`<div class="recv-row-item"><span class="recv-onum">${o.num}</span><span class="recv-cust">${esc(o.customer||'—')}</span><span class="recv-time">${o.time}</span><button class="btn-reprint" onclick="printLabel(${o.num})">🖨 Reprint</button></div>`).join('');
}
function togReprintPanel(){
  const p=document.getElementById('reprintPanel');p.classList.toggle('reprint-panel-open');
  const chev=document.getElementById('reprintChev');if(chev)chev.style.transform=p.classList.contains('reprint-panel-open')?'rotate(180deg)':'';
}
async function searchReprint(){
  const token=document.getElementById('tokenInput').value.trim()||getToken();
  if(!token){toast('Connect to Airtable first','err');return;}
  const inp=document.getElementById('reprintInp'),ordNum=inp.value.trim();
  if(!ordNum){toast('Enter an order number','err');return;}
  const btn=document.getElementById('reprintBtn'),result=document.getElementById('reprintResult');
  btn.disabled=true;btn.textContent='Searching...';result.innerHTML='';
  try{
    const p=new URLSearchParams();
    p.set('filterByFormula',`AND({Invoice / Order Number Lookup}=${ordNum},{Received}=TRUE())`);
    p.append('fields[]',F.customer);p.append('fields[]',F.orderNum);p.append('fields[]','fldmMViJMYizJfOev');
    p.set('maxRecords','1');
    const r=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}?${p}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)throw new Error(`API ${r.status}`);
    const data=await r.json();
    if(!data.records?.length){result.innerHTML=`<div style="color:var(--muted);font-size:13px">No received orders found for order #${esc(ordNum)}</div>`;return;}
    const rec=data.records[0],customer=rec.fields?.[F.customer]||'—',ts=rec.fields?.['fldmMViJMYizJfOev']||'';
    const recvDate=ts?new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    result.innerHTML=`<div class="reprint-result"><div class="reprint-result-info"><div class="reprint-result-ord">#${esc(ordNum)}</div><div class="reprint-result-cust">${esc(customer)}</div>${recvDate?`<div class="reprint-result-date">Received ${recvDate}</div>`:''}</div><button class="btn-reprint" style="background:var(--green);color:#fff;border-color:var(--green)" onclick="printLabel(${ordNum})">🖨 Print Label</button></div>`;
    if(!receivedOrders[ordNum])receivedOrders[ordNum]={num:Number(ordNum),customer,time:recvDate};
  }catch(e){result.innerHTML=`<div style="color:var(--red);font-size:13px">Error: ${esc(e.message)}</div>`;}
  finally{btn.disabled=false;btn.textContent='Find Order';}
}
function getEquipmentList(records){
  const seen=new Set(),names=[];
  records.forEach(r=>{
    const v=fv(r,'equipmentLookup');if(!v)return;
    if(typeof v==='object'&&v.valuesByLinkedRecordId){Object.values(v.valuesByLinkedRecordId).flat().forEach(e=>{const n=typeof e==='object'?e.name:String(e);if(n&&!seen.has(n)){seen.add(n);names.push(n);}});}
    else if(Array.isArray(v)){v.forEach(e=>{const n=typeof e==='object'?e.name:String(e);if(n&&!seen.has(n)){seen.add(n);names.push(n);}});}
  });
  return names;
}
function getFirstProofThumb(r){const v=fv(r,'proofImages');if(!v||!Array.isArray(v)||!v.length)return null;const p=v[0];return p.thumbnails?.small?.url||p.thumbnails?.large?.url||p.url||null;}
function getFirstProofFull(r){const v=fv(r,'proofImages');if(!v||!Array.isArray(v)||!v.length)return null;return v[0].thumbnails?.large?.url||v[0].thumbnails?.small?.url||v[0].url||null;}
function getImprintIds(r){const v=fv(r,'imprintIds');if(!v)return[];if(Array.isArray(v))return v.filter(Boolean);if(typeof v==='string')return v.split(',').map(s=>s.trim()).filter(Boolean);return[];}
function expandProof(url){
  document.querySelector('.proof-overlay')?.remove();
  const overlay=document.createElement('div');overlay.className='proof-overlay';overlay.onclick=(e)=>{if(e.target===overlay)overlay.remove();};
  const inner=document.createElement('div');inner.className='proof-overlay-inner';
  const closeBtn=document.createElement('div');closeBtn.className='proof-overlay-close';closeBtn.textContent='✕';closeBtn.onclick=()=>overlay.remove();
  const img=document.createElement('img');img.src=url;img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;display:block;margin:auto';
  inner.appendChild(img);inner.appendChild(closeBtn);overlay.appendChild(inner);document.body.appendChild(overlay);
}
function renderImprintStrip(r){
  const ids=getImprintIds(r);if(!ids.length)return'';
  const idHtml=ids.map(id=>`<span class="imp-id">${esc(id)}</span>`).join('');
  return`<div class="imp-strip"><div class="imp-ids">${idHtml}</div></div>`;
}
function quickFill(lineId,sizeLabel,ak,ok,ek,recId,ordNum,oVal){
  const key=lineId+'-'+sizeLabel,inp=document.getElementById('ainp-'+lineId+'-'+sizeLabel);if(!inp)return;
  if(fillState[key]){fillState[key]=false;inp.value='';}else{fillState[key]=true;inp.value=Number(oVal);}
  const btn=document.getElementById('fb-'+lineId+'-'+sizeLabel);if(btn){if(fillState[key])btn.classList.add('filled');else btn.classList.remove('filled');}
  onInp(inp,lineId,ak,ok,ek,recId,ordNum);
}
function toggleMisshipForm(id){const form=document.getElementById('ms-form-'+id);if(form)form.classList.toggle('open');}
function cancelMisship(id){const form=document.getElementById('ms-form-'+id);if(form)form.classList.remove('open');const ta=document.getElementById('ms-text-'+id);if(ta)ta.value='';}
async function saveMisship(recId,ordNum){
  const token=document.getElementById('tokenInput').value.trim()||getToken();if(!token){toast('No token — check Connection Setup','err');return;}
  const ta=document.getElementById('ms-text-'+recId),details=ta?ta.value.trim():'';
  if(!details){toast('Please describe the mis-ship issue','err');return;}
  const btn=document.querySelector(`#ms-form-${recId} .btn-ms-save`);if(btn){btn.disabled=true;btn.textContent='Saving...';}
  try{
    const fields={[F.misship]:true,[F.misshipDetails]:details,[F.misshipInProgress]:true};
    const res=await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${recId}`,{method:'PATCH',headers:{Authorization:`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({fields})});
    if(!res.ok){const d=await res.json();throw new Error(d.error?.message||`API ${res.status}`);}
    const rec=allRecords.find(r=>r.id===recId);
    if(rec){if(!rec.fields)rec.fields={};rec.fields[F.misship]=true;rec.fields[F.misshipDetails]=details;rec.fields[F.misshipInProgress]=true;}
    toast('Mis-ship flagged — order stays in queue until replacements arrive','ok');
    const g=groupByOrder(allRecords).find(x=>x.num===Number(ordNum));
    if(g){const lc=document.getElementById('lc-'+ordNum);if(lc)lc.innerHTML=g.records.map(r=>renderLI(r,g)).join('');}
  }catch(e){toast('Error: '+e.message,'err');if(btn){btn.disabled=false;btn.textContent='Save mis-ship';}}
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastTimer;
function toast(msg,type='ok'){
  document.querySelector('.toast')?.remove();clearTimeout(toastTimer);
  const t=document.createElement('div');t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);toastTimer=setTimeout(()=>t.remove(),3500);
}
