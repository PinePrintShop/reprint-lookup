<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screens v4 — Pine Central</title>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--yellow-dim:#E8E83230;--yellow-border:#E8E83250;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --sb-bg:#0A0A08;--sb-border:#1A1A16;--sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'Courier New',monospace;
  --radius:4px;--radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

/* MODE BANNER */
.mode-banner{padding:12px 20px;text-align:center;font-size:11px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border)}
.mode-banner.art{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.mode-banner.screen{background:var(--green-lt);color:var(--green-dk);border-color:#b8dfcc}

/* ROLE SELECTOR */
.role-bar{display:flex;justify-content:center;gap:2px;padding:16px;background:var(--surface);border-bottom:1px solid var(--border)}
.rbtn{padding:8px 16px;border:1px solid var(--border-dk);background:var(--surface);color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;font-family:var(--cond)}
.rbtn:first-child{border-radius:var(--radius) 0 0 var(--radius)}
.rbtn:last-child{border-radius:0 var(--radius) var(--radius) 0}
.rbtn.active{background:var(--sb-bg);color:var(--yellow);border-color:var(--sb-bg)}

/* STATS BAR */
.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;gap:6px;scrollbar-width:none;flex-shrink:0;align-items:center}
.stats-bar::-webkit-scrollbar{display:none}

/* CONTENT */
.content{padding:20px;max-width:1600px;margin:0 auto;min-height:calc(100vh - 160px)}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.search-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);white-space:nowrap}
.toolbar input{flex:1;padding:8px 12px;border:1px solid var(--border-dk);border-radius:var(--radius);font-size:13px;font-family:var(--sans);background:var(--surface);color:var(--text)}
.toolbar input::placeholder{color:var(--muted-lt)}
.toolbar input:focus{outline:none;border-color:var(--text)}
.tbright{display:flex;align-items:center;gap:8px}

/* GRID */
.queue-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}

/* JOB CARDS */
.job-card{
  background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius-lg);overflow:hidden;
  position:relative;cursor:pointer;transition:border-color .15s,box-shadow .15s;
}
.job-card:hover{border-color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.06)}

.jc-thumb{
  height:100px;background:var(--bg);display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;border-bottom:1px solid var(--border);
}
.jc-thumb img{max-width:100%;max-height:100%;object-fit:contain}

.jc-info{padding:12px 14px}
.jc-name{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.3;font-family:var(--cond)}
.jc-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}

/* STATUS INDICATORS */
.status-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.status-badges{display:flex;gap:4px;flex-wrap:wrap}
.status-badge{padding:2px 6px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-family:var(--cond)}
.status-badge.seped{background:var(--green-lt);color:var(--green-dk);border:1px solid #b8dfcc}
.status-badge.burned{background:var(--green-lt);color:var(--green-dk);border:1px solid #b8dfcc}
.status-badge.ready{background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-bd)}
.status-badge.repeat{background:var(--yellow-dim);color:var(--text);border:1px solid var(--yellow-border)}

/* ACTIONS */
.action-row{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}

/* SCREEN INFO */
.screen-info{font-size:11px;color:var(--muted);margin-top:6px;font-family:var(--cond)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;font-size:11px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top:2px solid var(--muted);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;top:20px;right:20px;background:var(--sb-bg);color:var(--yellow);padding:12px 16px;border-radius:var(--radius);font-size:12px;font-weight:700;z-index:2000;transform:translateY(-100px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}

/* MOBILE */
@media(max-width:600px){
  .content{padding:16px}
  .queue-grid{grid-template-columns:1fr;gap:12px}
  .stats-bar{padding:10px 12px;gap:4px}
  .toolbar{padding:10px 12px;gap:8px}
  .role-bar{padding:12px}
}
</style>
</head>
<body>

<!-- ROLE SELECTOR -->
<div class="role-bar">
  <button class="rbtn art active" onclick="setRole('art')">Art Department</button>
  <button class="rbtn screen" onclick="setRole('screen')">Screen Room</button>
</div>

<!-- MODE BANNER -->
<div class="mode-banner art" id="modeBanner">
  <div id="modeText">Art Department — assign separator, mark sep'd, link sep files.</div>
</div>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-cell active" id="fc-all" onclick="setFilter('all')">All Jobs<span class="stat-ct" id="sAll">0</span></div>
  <div class="stat-cell" id="fc-needssep" onclick="setFilter('needssep')">Needs Sep<span class="stat-ct" id="sNeedsSep">0</span></div>
  <div class="stat-cell" id="fc-seped" onclick="setFilter('seped')">Sep'd<span class="stat-ct" id="sSeped">0</span></div>
  <div class="stat-cell" id="fc-burned" onclick="setFilter('burned')">Burned<span class="stat-ct" id="sBurned">0</span></div>
  <div class="stat-cell" id="fc-repeat" onclick="setFilter('repeat')">Repeats<span class="stat-ct" id="sRepeat">0</span></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar" style="display:none">
  <span class="search-lbl">Search</span>
  <input type="text" id="search" placeholder="Order #, customer, imprint ID..." oninput="render()">
  <div class="tbright">
    <button class="btn-refresh" onclick="loadData()">Refresh</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="root">
    <div class="loading"><div class="spin"></div>Loading queue…</div>
  </div>
</div>

<div id="toast"></div>

<script>
var BASE = 'appJkaLk8DykjsgHR';
var TBL  = 'tbln9oAGvz2PNBZLV';

var F = {
  imprintId:  'fldDFfwFQ9B20n2kT',
  impType:    'fldjNCuaGOkWgzH2K',
  proof:      'fldUOIfCd22MxevRm',
  sepUrl:     'fldiBqdFTRMahiMeI',
  seped:      'fldlMcHtldbifKzDN',
  burned:     'fldEL51Nwrxuyn9Zo',
  printDesc:  'fld0jStSNsRNjjeZy',
  separator:  'fldTPKgZroX532qER',
  customer:   'fldeLMIAC0ABQAjYJ',
  schedStart: 'fldfqtIgcEfIlIeQk',
  impressions:'fldFipR4ddfqMPeAX',
  repeat:     'flda9L7041ahNZT0b',
  screens:    'fld8rgkIj1RPO97QU',
  printNotes: 'fldNuEzGIYI8FWqXu',
  inkNames:   'fldMM5hp8kEpo3KKT'
};

var ALL = [], state = {}, activeFilter = 'all', role = 'art';
var SEPARATORS = ['Whitney','Hannah','Juan','Outsourced'];
var SKIP_TYPES = new Set(['Gift Cards','Patches','Stickers','Heat Press Vinyl','Sublimation','Embroidery','Pin']);
var ACTIVE_STATUSES = new Set(['RFO','In Progress','Needs Stock','Backlog','Pre Order In Stock','Pre Order Stock On Order','RFS']);

function getToken() {
  return localStorage.getItem('pine_at_key') || '';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function apiGet(url) {
  var token = getToken();
  if (!token) throw new Error('No API token');
  var res = await fetch('https://api.airtable.com/v0/' + BASE + '/' + url, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

async function apiPatch(recordId, fields) {
  var token = getToken();
  if (!token) throw new Error('No API token');
  var res = await fetch('https://api.airtable.com/v0/' + BASE + '/' + TBL + '/' + recordId, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ fields: fields })
  });
  if (!res.ok) throw new Error('Update failed: ' + res.status);
  return res.json();
}

function flatLookup(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (val.valuesByLinkedRecordId) {
    return Object.values(val.valuesByLinkedRecordId).reduce((a,b) => a.concat(b), []);
  }
  return [val];
}

function isSupaType(typeName) {
  return ['Supacolor Transfers', 'Decopress Transfers'].includes(typeName);
}

function parseRecords(records) {
  var out = [];
  records.forEach(r => {
    var f = r.fields || {};
    var iid = f[F.imprintId] || '';
    if (!iid || iid.indexOf('-') < 0) return;
    
    var orderNum = parseInt(iid.split('-')[0], 10);
    if (!isNaN(orderNum) && orderNum < 9400) return;
    
    var typeName = f[F.impType] || '';
    if (SKIP_TYPES.has(typeName)) return;

    // Check if order status is active
    var statusOk = false;
    Object.values(f).forEach(v => {
      flatLookup(v).forEach(s => { if (ACTIVE_STATUSES.has(s)) statusOk = true; });
    });
    if (!statusOk) return;

    var proofs = flatLookup(f[F.proof]);
    if (!proofs.length) return;
    
    var fp = proofs[0];
    var thumbUrl = '', largeUrl = '';
    if (fp && typeof fp === 'object' && fp.thumbnails) {
      thumbUrl = (fp.thumbnails.large && fp.thumbnails.large.url) || 
                 (fp.thumbnails.small && fp.thumbnails.small.url) || '';
      largeUrl = thumbUrl;
    } else if (typeof fp === 'string' && fp.indexOf('http') === 0) {
      thumbUrl = fp; largeUrl = fp;
    }
    if (!thumbUrl) return;

    var cust = f[F.customer];
    if (Array.isArray(cust)) cust = cust[0] || '';
    cust = cust || '';

    out.push({
      id: r.id,
      i: iid,
      o: iid.split('-')[0],
      n: f[F.printDesc] || '',
      t: typeName,
      s: f[F.screens] || null,
      sp: f[F.seped] === true,
      b: f[F.burned] === true,
      rp: f[F.repeat] === true,
      c: cust,
      pn: f[F.printNotes] || '',
      sepsUrl: f[F.sepUrl] || '',
      sep: f[F.separator] || '',
      due: (f[F.schedStart] || '').slice(0,10),
      qty: f[F.impressions] || null,
      thumbUrl: thumbUrl,
      largeUrl: largeUrl,
      supa: isSupaType(typeName),
      inks: f[F.inkNames] || ''
    });
  });

  // Sort: dated first (by due date), then undated (by order number desc)
  var dated   = out.filter(x => x.due).sort((a,b) => a.due.localeCompare(b.due) || a.i.localeCompare(b.i));
  var undated = out.filter(x => !x.due).sort((a,b) => b.o.localeCompare(a.o) || a.i.localeCompare(b.i));
  return dated.concat(undated);
}

function setRole(r) {
  role = r;
  document.querySelectorAll('.rbtn').forEach(b => b.classList.remove('active'));
  document.querySelector('.rbtn.' + r).classList.add('active');
  
  var banner = document.getElementById('modeBanner');
  banner.className = 'mode-banner ' + r;
  document.getElementById('modeText').textContent = r === 'art'
    ? "Art Department — assign separator, mark sep'd, link sep files."
    : "Screen Room — sep'd imprints ready to burn. Mark burned when screen is exposed.";
  
  if (ALL.length) render();
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.stat-cell').forEach(c => c.classList.remove('active'));
  var el = document.getElementById('fc-' + f);
  if (el) el.classList.add('active');
  render();
}

function updateStats() {
  var seped  = ALL.filter(r => (state[r.id] || r).sp).length;
  var nosep  = ALL.filter(r => !(state[r.id] || r).sp).length;
  var burned = ALL.filter(r => (state[r.id] || r).b).length;
  var rep    = ALL.filter(r => r.rp).length;
  
  document.getElementById('sAll').textContent = ALL.length;
  document.getElementById('sNeedsSep').textContent = nosep;
  document.getElementById('sSeped').textContent = seped;
  document.getElementById('sBurned').textContent = burned;
  document.getElementById('sRepeat').textContent = rep;
}

function getFiltered() {
  var search = document.getElementById('search').value.toLowerCase();
  var filtered = ALL;

  // Role-based filtering
  if (role === 'art') {
    // Art Dept sees all jobs
  } else if (role === 'screen') {
    // Screen Room only sees sep'd jobs
    filtered = ALL.filter(r => (state[r.id] || r).sp);
  }

  // Status filtering
  if (activeFilter === 'needssep') {
    filtered = filtered.filter(r => !(state[r.id] || r).sp);
  } else if (activeFilter === 'seped') {
    filtered = filtered.filter(r => (state[r.id] || r).sp);
  } else if (activeFilter === 'burned') {
    filtered = filtered.filter(r => (state[r.id] || r).b);
  } else if (activeFilter === 'repeat') {
    filtered = filtered.filter(r => r.rp);
  }

  if (search) {
    filtered = filtered.filter(r => 
      r.i.toLowerCase().includes(search) ||
      r.o.toLowerCase().includes(search) ||
      r.c.toLowerCase().includes(search) ||
      r.n.toLowerCase().includes(search)
    );
  }

  return filtered;
}

function render() {
  var filtered = getFiltered();
  var root = document.getElementById('root');
  
  if (filtered.length === 0) {
    root.innerHTML = '<div class="loading">No jobs found</div>';
    return;
  }

  var grid = document.createElement('div');
  grid.className = 'queue-grid';

  filtered.forEach(job => {
    var current = state[job.id] || job;
    
    var card = document.createElement('div');
    card.className = 'job-card';
    
    // Thumbnail
    var thumb = document.createElement('div');
    thumb.className = 'jc-thumb';
    if (current.thumbUrl) {
      var img = document.createElement('img');
      img.src = current.thumbUrl;
      img.alt = 'Proof';
      thumb.appendChild(img);
    }
    card.appendChild(thumb);

    // Info section
    var info = document.createElement('div');
    info.className = 'jc-info';

    // Name and meta
    var name = document.createElement('div');
    name.className = 'jc-name';
    name.textContent = current.n || current.i;
    info.appendChild(name);

    var meta = document.createElement('div');
    meta.className = 'jc-meta';
    meta.innerHTML = `
      <span class="tag t-n">${current.i}</span>
      <span class="tag t-n">${current.c}</span>
      ${current.due ? `<span class="tag t-b">${current.due}</span>` : ''}
      ${current.qty ? `<span class="tag t-n">${current.qty} imp.</span>` : ''}
    `;
    info.appendChild(meta);

    // Status row
    var statusRow = document.createElement('div');
    statusRow.className = 'status-row';
    
    var badges = document.createElement('div');
    badges.className = 'status-badges';
    
    if (current.sp) {
      badges.innerHTML += '<span class="status-badge seped">Sep\'d</span>';
    } else {
      badges.innerHTML += '<span class="status-badge ready">Needs Sep</span>';
    }
    
    if (current.b) {
      badges.innerHTML += '<span class="status-badge burned">Burned</span>';
    }
    
    if (current.rp) {
      badges.innerHTML += '<span class="status-badge repeat">Repeat</span>';
    }
    
    statusRow.appendChild(badges);
    info.appendChild(statusRow);

    // Actions based on role
    var actionRow = document.createElement('div');
    actionRow.className = 'action-row';
    
    if (role === 'art') {
      // Art Department actions
      var sepBtn = document.createElement('button');
      sepBtn.className = current.sp ? 'btn-green btn-sm' : 'btn-secondary btn-sm';
      sepBtn.textContent = current.sp ? '✓ Sep\'d' : 'Mark Sep\'d';
      sepBtn.onclick = (e) => {
        e.stopPropagation();
        toggleSeped(job);
      };
      actionRow.appendChild(sepBtn);
      
      if (current.sepsUrl) {
        var linkBtn = document.createElement('a');
        linkBtn.href = current.sepsUrl;
        linkBtn.target = '_blank';
        linkBtn.className = 'btn-secondary btn-sm';
        linkBtn.textContent = '↗ Sep File';
        linkBtn.onclick = (e) => e.stopPropagation();
        actionRow.appendChild(linkBtn);
      }
    } else {
      // Screen Room actions
      var burnBtn = document.createElement('button');
      burnBtn.className = current.b ? 'btn-green btn-sm' : 'btn-secondary btn-sm';
      burnBtn.textContent = current.b ? '✓ Burned' : 'Mark Burned';
      burnBtn.onclick = (e) => {
        e.stopPropagation();
        toggleBurned(job);
      };
      actionRow.appendChild(burnBtn);
    }
    
    info.appendChild(actionRow);

    // Screen info
    if (current.s || current.inks) {
      var screenInfo = document.createElement('div');
      screenInfo.className = 'screen-info';
      var parts = [];
      if (current.s) parts.push(`${current.s} screens`);
      if (current.inks) parts.push(`Inks: ${current.inks}`);
      screenInfo.textContent = parts.join(' • ');
      info.appendChild(screenInfo);
    }
    
    card.appendChild(info);
    grid.appendChild(card);
  });

  root.innerHTML = '';
  root.appendChild(grid);
}

async function toggleSeped(job) {
  var current = state[job.id] || job;
  var newState = !current.sp;
  
  try {
    await apiPatch(job.id, { [F.seped]: newState });
    state[job.id] = { ...current, sp: newState };
    showToast(`${job.i} marked as ${newState ? 'sep\'d' : 'not sep\'d'}`);
    updateStats();
    render();
  } catch (err) {
    console.error('Failed to update sep status:', err);
    showToast('Failed to update status');
  }
}

async function toggleBurned(job) {
  var current = state[job.id] || job;
  var newState = !current.b;
  
  try {
    await apiPatch(job.id, { [F.burned]: newState });
    state[job.id] = { ...current, b: newState };
    showToast(`${job.i} marked as ${newState ? 'burned' : 'not burned'}`);
    updateStats();
    render();
  } catch (err) {
    console.error('Failed to update burned status:', err);
    showToast('Failed to update status');
  }
}

async function loadData() {
  try {
    document.getElementById('root').innerHTML = '<div class="loading"><div class="spin"></div>Loading queue…</div>';
    
    var params = new URLSearchParams({
      'returnFieldsByFieldId': 'true',
      'pageSize': '1000'
    });
    
    var data = await apiGet(TBL + '?' + params.toString());
    ALL = parseRecords(data.records || []);
    
    updateStats();
    render();
    
    document.getElementById('toolbar').style.display = 'flex';
    
    // Load all pages if needed
    while (data.offset) {
      params.set('offset', data.offset);
      data = await apiGet(TBL + '?' + params.toString());
      var moreRecords = parseRecords(data.records || []);
      ALL = ALL.concat(moreRecords);
      updateStats();
      render();
    }
    
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('root').innerHTML = 
      '<div class="loading">Error loading data. Check token and try again.</div>';
  }
}

// Initialize
if (getToken()) {
  loadData();
} else {
  document.getElementById('root').innerHTML = 
    '<div class="loading">No API token found. Set token in Pine Central shell.</div>';
}
</script>
</body>
</html>
