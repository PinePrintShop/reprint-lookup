<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Ink Queue v79</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
/* App-specific styles only - buttons/forms now handled by design system */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

/* Content area */
.content{padding:14px 16px;max-width:none}

/* Add bottom border to stats bar like purchasing toolbar */
.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;gap:6px;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch}
.stats-bar::-webkit-scrollbar{display:none}

/* DATE + ORDER HEADERS — canonical Seps v16 pattern */
.date-hdr{font-size:22px;font-weight:700;color:var(--text);font-family:var(--cond);padding:18px 0 8px;display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--text);margin-bottom:10px;letter-spacing:-.01em;cursor:pointer;user-select:none;gap:10px}
.date-hdr:first-child{padding-top:4px}
.date-hdr.today{color:var(--text)}
.date-hdr-right{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.date-hdr-chv{font-size:14px;color:var(--muted-lt);transition:transform .2s;flex-shrink:0;font-family:var(--cond)}
.day-group.collapsed .date-hdr-chv{transform:rotate(-90deg)}
.day-group.collapsed .day-body{display:none}
.day-group.collapsed .date-hdr{border-bottom:1px solid var(--border-dk);margin-bottom:4px;padding-bottom:6px}
/* Order header — customer hero, order# subtle green mono, count + chevron right */
.order-hdr{padding:4px 2px 10px;font-family:var(--cond);display:flex;align-items:baseline;gap:10px;cursor:pointer;user-select:none;min-width:0}
.order-hdr:hover .order-cust{color:var(--green-dk)}
.order-cust{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:.01em;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto}
.order-num{font-size:12px;font-weight:700;color:var(--green);font-family:var(--mono);flex-shrink:0}
.order-ct{font-size:10px;font-weight:700;color:var(--muted-lt);letter-spacing:.08em;text-transform:uppercase;margin-left:auto;flex-shrink:0}
.order-chv{font-size:10px;color:var(--muted-lt);transition:transform .2s;flex-shrink:0}
.order-group.collapsed .order-chv{transform:rotate(-90deg)}
.order-group.collapsed .order-body{display:none}

/* Status */
.status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.status.pending{color:var(--muted-lt)}
.status.done{color:#fff;background:var(--green);padding:2px 6px;border-radius:2px}

/* Ready toggle button */
.ready-btn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .12s;white-space:nowrap}
.ready-btn:hover{border-color:var(--green);color:var(--green)}
.ready-btn.on{background:var(--green);border-color:var(--green);color:#fff}

/* Save pip — per-card save status indicator (v70) */
.save-pip{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);min-height:11px;line-height:11px;text-align:right;transition:opacity .25s;white-space:nowrap}
.save-pip.idle{opacity:0}
.save-pip.dirty{color:var(--muted-lt);opacity:1}
.save-pip.saving{color:var(--amb);opacity:1}
.save-pip.saved{color:var(--green);opacity:1}
.save-pip.err{color:var(--red);opacity:1;cursor:pointer;text-decoration:underline}
.save-pip-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:3px;vertical-align:1px}
.save-pip.dirty .save-pip-dot{background:var(--muted-lt)}
.save-pip.saving .save-pip-dot{background:var(--amb);animation:save-pulse .9s ease-in-out infinite}
.save-pip.saved .save-pip-dot{background:var(--green)}
.save-pip.err .save-pip-dot{background:var(--red)}
@keyframes save-pulse{50%{opacity:.35}}

/* v72: Ink reorder arrows */
.ink-reorder{display:flex;gap:2px;align-items:center}
.ink-reorder-btn{font-size:10px;font-weight:700;padding:2px 5px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .1s;line-height:1}
.ink-reorder-btn:hover:not(:disabled){border-color:var(--text);color:var(--text)}
.ink-reorder-btn:disabled{opacity:.3;cursor:default}

/* v73: Drag-and-drop handle for ink rows. Lives on the left edge of the row, between chip and body. */
.ink-drag-handle{flex-shrink:0;width:16px;align-self:stretch;display:flex;align-items:center;justify-content:center;color:var(--muted-lt);font-size:14px;cursor:grab;user-select:none;letter-spacing:-1px;font-family:var(--cond);transition:color .1s}
.ink-drag-handle:hover{color:var(--text)}
.ink-drag-handle:active{cursor:grabbing}
.ink-row.dragging{opacity:.4}
.ink-row.drag-over-top{box-shadow:inset 0 3px 0 0 var(--green)}
.ink-row.drag-over-bottom{box-shadow:inset 0 -3px 0 0 var(--green)}

/* Inline field invalid hint (name parse fail) */
.ink-name-edit.invalid{background:#fdf2f2;box-shadow:inset 0 0 0 1px var(--red-bd)}
.ink-name-hint{font-size:8px;color:var(--red);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;margin-top:2px;display:none}
.ink-name-hint.on{display:block}

/* Expanded detail — matches catching queue colorway card layout */
.job-detail{display:none;margin-bottom:0}
.job-detail.open{display:flex;flex-direction:row;min-height:340px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:4px;background:var(--surface)}

/* Left: PDF proof */
.detail-proof{width:45%;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.proof-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface);flex-shrink:0}
.proof-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.proof-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.proof-btn:hover{background:var(--sb-active)}
.proof-btn.nav{background:var(--bg);color:var(--muted);border:1px solid var(--border-dk)}
.proof-btn.nav:hover{color:var(--text);border-color:var(--text)}
.proof-page-info{font-size:9px;color:var(--muted-lt);font-family:var(--mono);min-width:32px;text-align:center}
.proof-canvas-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);cursor:pointer}
.proof-canvas-area canvas{width:100%;height:auto;display:block}
.proof-loading{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;font-family:var(--mono)}
.proof-none{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}

/* Right: ink list */
.detail-inks{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.inks-hdr{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;gap:8px}
.inks-hdr-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.inks-scroll{flex:1;overflow-y:auto}
.ink-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg)}
.ink-row:last-child{border-bottom:none}
.chip-popover{position:absolute;z-index:100;background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius);padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;gap:6px;align-items:center}
.chip-hex-input{font-size:11px;padding:4px 7px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--mono);width:80px;outline:none}
.chip-hex-input:focus{border-color:var(--green)}
.chip-set-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.ink-body{flex:1;min-width:0}
.ink-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em}
.ink-name-edit{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em;border:none;background:transparent;width:100%;outline:none;padding:0}
.ink-name-edit:focus{background:#fffbea;border-radius:2px;padding:1px 3px;box-shadow:inset 0 0 0 1px #f59e0b}
.ink-type-tag{display:inline-block;font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--cond);padding:1px 5px;border-radius:2px;margin-top:2px;border:1px solid}
.ink-recipe-wrap{margin-top:5px}
.ink-recipe{font-size:10px;font-family:var(--mono);color:#555;line-height:1.7;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;width:100%;resize:vertical;min-height:60px;outline:none}
.ink-recipe:focus{border-color:var(--green);background:#fff}
.ink-no-recipe{font-size:10px;color:var(--muted-lt);font-style:italic;font-family:var(--cond);margin-top:4px}
.ink-remove-btn{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;align-self:flex-start;margin-top:2px;transition:all .1s}
.ink-remove-btn:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.inks-loading{padding:20px 14px;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}
/* JOB CARD — canonical Seps v16 pattern (design name hero left, imprint ID 32px right) */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:flex-start;gap:16px;padding:14px 16px;cursor:pointer;transition:border-color .12s,box-shadow .12s;margin-bottom:6px}
.job-card:hover{border-color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.job-card.ready{border-left:3px solid var(--green)}
.job-card.no-ink{border-left:3px solid var(--red)}
.jc-thumb{width:140px;height:140px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.jc-thumb img{width:100%;height:100%;object-fit:cover}
.jc-thumb-ph{width:36px;height:36px;opacity:.2}
.jc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.jc-name{font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--cond);color:var(--text)}
.jc-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.jc-meta .tag{font-size:10px;padding:3px 9px}
.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;min-width:220px;max-width:260px}
.jc-imprint{font-size:32px;font-weight:700;letter-spacing:-0.02em;color:var(--text);font-family:var(--cond);line-height:1}

/* v76: ink chip strip on collapsed card — shows assigned inks at a glance */
.jc-inks{display:flex;gap:6px 10px;flex-wrap:wrap;align-items:center;padding-top:6px;border-top:1px solid var(--bg)}
.jc-ink-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text);white-space:nowrap;line-height:1}
.jc-ink-pill .jc-ink-dot{display:inline-block;width:11px;height:11px;min-width:11px;min-height:11px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,.15);box-sizing:border-box;vertical-align:middle}
.jc-ink-pill .jc-ink-dot.empty{background:var(--bg);border-color:var(--border)}
.jc-ink-pending{font-size:11px;font-family:var(--mono);color:var(--muted-lt);font-style:italic;white-space:nowrap}
.jc-inks-loading{font-size:10px;font-family:var(--cond);color:var(--muted-lt);letter-spacing:.04em;text-transform:uppercase;padding-top:6px}

/* v76: editable Ink Notes block on the card right column */
.jc-notes{background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:5px 8px;align-self:stretch;width:100%}
.jc-notes-lbl{font-size:8px;font-weight:700;color:var(--amb);letter-spacing:.06em;text-transform:uppercase;margin-bottom:2px;font-family:var(--cond)}
.jc-notes-edit{width:100%;min-height:24px;font-size:11px;font-family:var(--sans);background:transparent;border:none;outline:none;color:var(--text);resize:vertical;line-height:1.3;padding:0}
.jc-notes-edit::placeholder{color:var(--muted-lt);font-style:italic}
/* Badges inline in name — Repeat (red) + Seep/Burned style */
.rep-badge{font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);padding:2px 5px;border-radius:2px;background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);margin-left:6px;vertical-align:middle}

/* Seed notice — shown when isRepeat but no location-matched prev */
.seed-notice{margin:8px 14px 0;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:7px 10px;font-size:10px;color:var(--amb);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;font-weight:700}

/* "Populate from" dropdown — lives in inks header next to Print All */
.populate-from{display:flex;align-items:center;gap:6px;font-size:9px;font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;color:var(--muted-lt);font-weight:700}
.populate-from select{font-size:10px;padding:3px 6px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--text);font-family:var(--mono);outline:none;cursor:pointer}
.populate-from select:focus{border-color:var(--green)}
.view-prev-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.view-prev-btn:hover{background:var(--sb-active)}
.print-notes{margin:8px 14px 0;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:7px 10px;flex-shrink:0}
/* v72: editable print-notes textarea — same amber background, inline within the panel */
.pn-edit{width:100%;min-height:48px;font-size:11px;font-family:var(--sans);background:transparent;border:none;outline:none;color:var(--text);resize:vertical;line-height:1.4;padding:2px 0}
.pn-edit::placeholder{color:var(--muted);font-style:italic}
.pn-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amb);font-family:var(--cond);margin-bottom:3px}
.pn-txt{font-size:11px;color:#7a4f00;line-height:1.5}

/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.err{margin:12px;padding:12px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a;font-family:var(--mono)}

/* Proof fullscreen modal — exact catching queue .pm pattern */
.pm{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
.pm.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0}

/* v72: Proof picker bar — second nav axis (which attachment) when multiple proofs */
.pm-proofs{display:flex;align-items:center;gap:6px;padding:8px 14px;background:#1a1a1a;border-bottom:1px solid #222;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.pm-proofs::-webkit-scrollbar{display:none}
.pm-proofs-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#888;font-family:var(--cond);flex-shrink:0}
.pm-proof-pill{font-size:9px;font-weight:700;letter-spacing:.04em;padding:5px 10px;border-radius:3px;border:1px solid #333;background:transparent;color:#bbb;cursor:pointer;font-family:var(--cond);white-space:nowrap;text-transform:uppercase}
.pm-proof-pill:hover{border-color:var(--yellow);color:var(--yellow)}
.pm-proof-pill.on{background:var(--yellow);border-color:var(--yellow);color:#111}

/* v72: Multi-proof badge on small card thumbnail */
.proof-count-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.78);color:#fff;font-size:9px;font-weight:700;letter-spacing:.04em;padding:3px 7px;border-radius:10px;font-family:var(--cond);text-transform:uppercase;pointer-events:none}

/* v78: inline arrows on detail-panel proof thumbnail — flip through proofs without opening modal */
.proof-nav-arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;font-family:var(--cond);line-height:1;z-index:5;transition:background .12s}
.proof-nav-arrow:hover{background:rgba(0,0,0,.85)}
.proof-nav-arrow.prev{left:6px}
.proof-nav-arrow.next{right:6px}
.proof-nav-counter{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:10px;font-family:var(--mono);pointer-events:none;z-index:5}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.pm-nav{display:flex;gap:6px;align-items:center}
.pm-nav button{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-ct{font-size:11px;color:#555;min-width:30px;text-align:center;font-family:var(--mono)}
.pm-body{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;position:relative}
.pm-nav-btn{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
#pmCanvas{border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.lb-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.lb-spin{width:32px;height:32px;border:3px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pm-body canvas{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}

/* Add ink form */
.add-ink-card{margin:8px 14px 4px;border:1px dashed var(--border-dk);border-radius:var(--radius);background:var(--bg);overflow:hidden}
.add-ink-header{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.add-ink-header:hover{color:var(--text)}
.add-ink-body{display:none;padding:10px 12px;flex-direction:column;gap:8px}
.add-ink-body.open{display:flex}
.add-ink-row{display:flex;gap:6px;align-items:center}
.add-ink-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);width:60px;flex-shrink:0}
.add-ink-input{flex:1;font-size:11px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--mono);outline:none}
.add-ink-input:focus{border-color:var(--green)}
.add-ink-select{flex:1;font-size:11px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--cond);outline:none;cursor:pointer}
.add-ink-recipe{flex:1;font-size:10px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--mono);min-height:50px;resize:vertical;outline:none}
.add-ink-recipe:focus{border-color:var(--green)}
.add-ink-save{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.add-ink-save:hover{background:var(--sb-active)}

/* Autocomplete search dropdown */
.ink-search-wrap{position:relative;flex:1}
.ink-ac-results{position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--border-dk);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ink-ac-row{padding:7px 10px;font-size:11px;cursor:pointer;font-family:var(--cond);border-bottom:1px solid var(--bg);color:var(--text)}
.ink-ac-row:last-child{border-bottom:none}
.ink-ac-row:hover{background:var(--green-lt)}
.ink-ac-row-name{font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.ink-ac-row-meta{font-size:9px;color:var(--muted);margin-top:1px}
.ink-ac-row-found{background:var(--green-lt)}
.ink-ac-none{padding:8px 10px;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em}

/* Ink row timestamps */
.ink-timestamps{display:flex;gap:10px;margin-top:4px;flex-wrap:wrap}
.ink-ts{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.02em}
.ink-ts span{color:var(--text);font-weight:600}

/* Label print button */
.ink-label-btn{flex-shrink:0;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .1s;white-space:nowrap;align-self:flex-start;margin-top:2px}
.ink-label-btn:hover{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
/* Timestamp toggle button */
.ink-ts-btn{flex-shrink:0;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .1s;white-space:nowrap;align-self:flex-start;margin-top:2px}
.ink-ts-btn:hover{border-color:var(--amb);color:var(--amb)}
.ink-ts-btn.armed{background:var(--amb-bg);border-color:var(--amb-bd);color:var(--amb)}

/* Label print overlay */
.label-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);align-items:center;justify-content:center;flex-direction:column;gap:16px}
.label-overlay.open{display:flex}
.label-iframe-wrap{width:576px;height:288px;background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);position:relative}
.label-iframe-wrap iframe{width:100%;height:100%;border:none;display:block}
.label-iframe-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;background:#fff}
.label-actions{display:flex;gap:10px;align-items:center}
.label-print-btn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 20px;border-radius:var(--radius);border:none;background:var(--yellow);color:#111;cursor:pointer;font-family:var(--cond)}
.label-print-btn:hover{background:#d4d200}
.label-close-btn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.label-size-hint{font-size:10px;color:#777;font-family:var(--mono)}

/* Master print modal */
.master-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);align-items:center;justify-content:center}
.master-modal.open{display:flex}
.master-panel{background:var(--surface);border-radius:var(--radius-lg);width:520px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.master-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--sb-bg)}
.master-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--yellow);font-family:var(--cond);flex:1}
.master-close{font-size:13px;color:#666;cursor:pointer;line-height:1;padding:2px 4px}
.master-close:hover{color:#ccc}
.master-search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.master-search{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--sans);outline:none}
.master-search:focus{border-color:var(--green)}
.master-results{flex:1;overflow-y:auto}
.master-ink-row{padding:10px 16px;border-bottom:1px solid var(--bg);cursor:pointer;transition:background .1s}
.master-ink-row:hover{background:var(--green-lt)}
.master-ink-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-family:var(--cond)}
.master-ink-meta{font-size:9px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.master-ink-recipe-preview{font-size:9px;color:var(--muted-lt);font-family:var(--mono);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}

/* Mobile responsiveness for stats bar */
@media (max-width: 600px) {
  .stats-bar {
    padding: 8px 12px !important;
    gap: 4px !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    white-space: nowrap !important;
  }
  
  .stats-bar > * {
    flex-shrink: 0 !important;
    white-space: nowrap !important;
  }
  
  .stat-cell {
    padding: 4px 10px !important;
    font-size: 9px !important;
    min-width: auto !important;
  }
  
  .btn-refresh {
    padding: 5px 10px !important;
    font-size: 9px !important;
    flex-shrink: 0 !important;
    min-width: auto !important;
  }
}

@media (max-width: 480px) {
  .stats-bar {
    padding: 6px 10px !important;
    gap: 3px !important;
  }
  
  .stat-cell {
    padding: 3px 8px !important;
    font-size: 8px !important;
  }
  
  .btn-refresh {
    padding: 4px 8px !important;
    font-size: 8px !important;
  }
}
.master-empty{padding:32px;text-align:center;font-size:10px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.master-loading{padding:24px;text-align:center;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase}
</style>
</head>
<body>
<div id="statsBar" class="stats-bar">
  <div class="stat-cell" id="fc-all" onclick="setFilter('all')">All<span class="stat-ct" id="sTotal">0</span></div>
  <div class="stat-cell" id="fc-ready" onclick="setFilter('ready')">Inks Ready<span class="stat-ct" id="sReady">0</span></div>
  <div class="stat-cell" id="fc-pending" onclick="setFilter('pending')">Pending<span class="stat-ct" id="sPending">0</span></div>
  <div class="stat-cell" id="fc-noink" onclick="setFilter('noink')">No Inks<span class="stat-ct" id="sNoInk">0</span></div>
  <div class="stat-cell" id="fc-repeat" onclick="setFilter('repeat')">Reprints<span class="stat-ct" id="sRepeat">0</span></div>
  <div class="stat-cell" style="margin-left:auto;border-color:transparent;background:transparent;color:var(--muted-lt)" id="sRange"></div>
  <div class="stat-cell" onclick="openMasterModal()" style="border-color:var(--yellow-border);background:var(--yellow-dim);color:var(--text)">🏷 Print Label</div>
  <button class="btn-refresh" onclick="loadJobs()">↻ Refresh</button>
</div>
<div id="root"></div>

<!-- Proof fullscreen modal -->
<div class="pm" id="pmModal" onclick="pmBackdropClose(event)">
  <div class="pm-bar" onclick="event.stopPropagation()">
    <button class="pm-close" onclick="event.stopPropagation();pmClose()">✕ Close</button>
    <span class="pm-fn" id="pmFn"></span>
    <div class="pm-nav">
      <button class="pm-nav-btn" onclick="event.stopPropagation();pmPrev()">‹</button>
      <span class="pm-ct" id="pmCt"></span>
      <button class="pm-nav-btn" onclick="event.stopPropagation();pmNext()">›</button>
    </div>
    <a id="pmOpenLink" href="#" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:3px;background:#fff;color:#111;text-decoration:none;font-family:var(--cond);display:none">⬆ Open</a>
  </div>
  <div class="pm-proofs" id="pmProofsBar" onclick="event.stopPropagation()" style="display:none">
    <span class="pm-proofs-lbl">Proofs:</span>
    <div id="pmProofsList" style="display:flex;gap:6px;flex-wrap:nowrap"></div>
  </div>
  <div class="pm-body" id="pmBody">
    <div class="lb-spinner hidden" id="pmSpinner"><div class="lb-spin"></div></div>
    <canvas id="pmCanvas"></canvas>
  </div>
</div>

// v77: optional inkFields argument — when provided, an explicit Display Hex override
// on the Inks record wins over name-based lookup. Falls through to the static map otherwise.
function isValidHex(s) {
  if (!s) return false;
  return /^#?[0-9A-Fa-f]{6}$/.test(String(s).trim());
}
function normalizeHex(s) {
  var t = String(s).trim();
  return t.charAt(0) === '#' ? t : '#' + t;
}
function getPantoneHex(inkName, inkFields) {
  // v77: explicit override wins
  if (inkFields && inkFields[FI.displayHex]) {
    var override = inkFields[FI.displayHex];
    if (isValidHex(override)) return normalizeHex(override);
  }
  if (!inkName) return null;
  var hexMatch = inkName.match(/#([0-9A-Fa-f]{6})/);
  if (hexMatch) return '#' + hexMatch[1];
  var m = inkName.match(/Pantone\s+([^\-]+?)(?:\s*-|$)/i);
  if (!m) return null;
  var code = m[1].trim();
  if (PANTONE_HEX[code]) return PANTONE_HEX[code];
  var upper = code.toUpperCase();
  if (PANTONE_HEX[upper]) return PANTONE_HEX[upper];
  var numOnly = code.replace(/[\s\(].*$/, '').trim();
  if (PANTONE_HEX[numOnly]) return PANTONE_HEX[numOnly];
  return null;
}

function inkTypeBadge(typeName) {
  if (!typeName) return '';
  var styles = {
    'Discharge':        'background:#e8f5ee;color:#1e6b45;border-color:#b8dfcc',
    'OW':               'background:#fef3e8;color:#c45c00;border-color:#f8c8a0',
    'EZP':              'background:#f2eeff;color:#5b3fa0;border-color:#c8b8e8',
    'Direct-to-fabric': 'background:#e8f7f9;color:#0e6b7a;border-color:#a8d8e0',
    'Graphics':         'background:#f0f0ea;color:#555;border-color:#d8d8d0',
  };
  for (var k in styles) {
    if (typeName.toLowerCase().indexOf(k.toLowerCase()) >= 0) {
      return '<span class="ink-type-tag" style="'+styles[k]+'">'+typeName+'</span>';
    }
  }
  return '<span class="ink-type-tag" style="background:var(--bg);color:var(--muted);border-color:var(--border)">'+typeName+'</span>';
}

function saveToken() {
  var inp = document.getElementById('tokenInput');
  var val = inp ? inp.value.trim() : '';
  if (!val) { inp.style.borderColor = '#c0392b'; return; }
  localStorage.setItem('pine_at_key', val);
  pat = val;
  document.getElementById('tokenBar').style.display = 'none';
  inp.value = '';
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  loadJobs();
}

function toggleTokenBar() {
  var bar = document.getElementById('tokenBar');
  var isOpen = bar.style.display !== 'none';
  bar.style.display = isOpen ? 'none' : 'flex';
  if (!isOpen) {
    var inp = document.getElementById('tokenInput');
    if (inp) {
      var cur = localStorage.getItem('pine_at_key') || '';
      inp.value = '';
      inp.placeholder = cur ? 'Enter new token to replace…' : 'patXXXXXXXXXXXXXX...';
      inp.focus();
    }
  }
}

function api(path, opts) {
  opts = opts || {};
  return fetch('https://api.airtable.com/v0/' + BASE + '/' + path, {
    method: opts.method || 'GET',
    headers: { 'Authorization': 'Bearer ' + pat, 'Content-Type': 'application/json' },
    body: opts.body || undefined
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(j) { throw new Error(j.error ? j.error.message : 'HTTP ' + r.status); });
    return r.json();
  });
}

// ============================================================
// WRITE ENGINE v70 — debounced auto-save with per-card save pip
// ============================================================
// Valid singleSelect choices on Inks.Ink Type field (fldXMM4WvS3SGsliC)
var INK_TYPE_CHOICES = ['Discharge','Direct-to-fabric','OW','SOW','EZP','Graphics','Clr - 224.9'];

// Per-imprint save state machine. Each imprint card has its own pip.
// outstanding[recId] = count of in-flight saves; pending[recId] = true if dirty
var saveOutstanding = {};
var saveDirty = {};
var saveErr = {};
var savedFadeTimer = {};

function setSavePip(impRecId, state, msg) {
  var el = document.getElementById('save-pip-' + impRecId);
  if (!el) return;
  el.classList.remove('idle','dirty','saving','saved','err');
  el.classList.add(state);
  var label = msg || '';
  if (!label) {
    if (state === 'dirty') label = 'Editing\u2026';
    else if (state === 'saving') label = 'Saving\u2026';
    else if (state === 'saved') label = 'Saved \u2713';
    else if (state === 'err') label = 'Save failed \u2014 click to retry';
  }
  el.innerHTML = (state === 'idle') ? '' : ('<span class="save-pip-dot"></span>' + escHtml(label));
  // Auto-fade saved after 2s
  if (savedFadeTimer[impRecId]) { clearTimeout(savedFadeTimer[impRecId]); savedFadeTimer[impRecId] = null; }
  if (state === 'saved') {
    savedFadeTimer[impRecId] = setTimeout(function() {
      // Only fade if still in saved state (not bumped to dirty/saving since)
      var cur = el.classList;
      if (cur.contains('saved')) setSavePip(impRecId, 'idle');
    }, 2200);
  }
}

function markDirty(impRecId) {
  saveDirty[impRecId] = true;
  // Show "Editing…" unless we're already mid-save (don't clobber the saving indicator)
  var el = document.getElementById('save-pip-' + impRecId);
  if (el && !el.classList.contains('saving')) setSavePip(impRecId, 'dirty');
}

function beginSave(impRecId) {
  saveOutstanding[impRecId] = (saveOutstanding[impRecId] || 0) + 1;
  setSavePip(impRecId, 'saving');
}

function endSave(impRecId, ok, errMsg) {
  saveOutstanding[impRecId] = Math.max(0, (saveOutstanding[impRecId] || 0) - 1);
  if (!ok) { saveErr[impRecId] = errMsg || 'Save failed'; }
  // Only resolve to a final state when no more saves are in flight for this card
  if (saveOutstanding[impRecId] === 0) {
    if (saveErr[impRecId]) {
      setSavePip(impRecId, 'err', 'Save failed: ' + saveErr[impRecId].slice(0, 60));
    } else {
      saveDirty[impRecId] = false;
      setSavePip(impRecId, 'saved');
    }
  }
}

function clearSaveErr(impRecId) {
  saveErr[impRecId] = null;
  setSavePip(impRecId, 'idle');
}

// ---------- Debounce wrapper ----------
// Keyed debouncing — pass any unique key (ink record ID + field name works fine)
var debounceTimers = {};
function debounceSave(key, fn) {
  if (debounceTimers[key]) clearTimeout(debounceTimers[key]);
  debounceTimers[key] = setTimeout(function() {
    delete debounceTimers[key];
    fn();
  }, SAVE_DEBOUNCE_MS);
}

// ---------- Ink-record write helpers (Inks table) ----------
// PATCH a single Inks row. Optionally bumps Last Updated to today (Denver) if bumpDate=true.
// impRecId is the imprint card the user is editing FROM, used only for pip routing.
function patchInkRecord(inkRecId, fields, impRecId, bumpDate) {
  if (!WRITES_ENABLED) {
    console.log('[v79 PREVIEW] would PATCH ink', inkRecId, JSON.stringify(fields));
    if (impRecId) endSave(impRecId, true);
    return Promise.resolve(null);
  }
  if (bumpDate) {
    // Denver local date in YYYY-MM-DD
    var denverYMD = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Denver' });
    fields[FI.lastUpdated] = denverYMD;
  }
  if (impRecId) beginSave(impRecId);
  return api(TIN + '/' + inkRecId + '?returnFieldsByFieldId=true', {
    method: 'PATCH',
    body: JSON.stringify({ fields: fields })
  }).then(function(res) {
    // Refresh cached fields for that ink so any reopened cards see new values
    if (res && res.fields) {
      if (!inkCache[inkRecId]) inkCache[inkRecId] = {};
      Object.keys(res.fields).forEach(function(k) { inkCache[inkRecId][k] = res.fields[k]; });
    }
    if (impRecId) endSave(impRecId, true);
    // v76: refresh the chip strip on every card that links this ink, so name/color
    // changes show up immediately without a page reload.
    refreshCardsLinkingInk(inkRecId);
    return res;
  }).catch(function(err) {
    if (impRecId) endSave(impRecId, false, err.message);
    throw err;
  });
}

// POST a new Inks row. Returns the created record.
function createInkRecord(fields, impRecId) {
  if (!WRITES_ENABLED) {
    console.log('[v79 PREVIEW] would POST ink', JSON.stringify(fields));
    var fakeId = 'recPREVIEW' + Math.random().toString(36).slice(2, 10);
    if (impRecId) endSave(impRecId, true);
    return Promise.resolve({ id: fakeId, fields: fields });
  }
  if (impRecId) beginSave(impRecId);
  return api(TIN + '?returnFieldsByFieldId=true', {
    method: 'POST',
    body: JSON.stringify({ fields: fields })
  }).then(function(res) {
    if (res && res.id && res.fields) {
      inkCache[res.id] = res.fields;
    }
    if (impRecId) endSave(impRecId, true);
    return res;
  }).catch(function(err) {
    if (impRecId) endSave(impRecId, false, err.message);
    throw err;
  });
}

// ---------- Imprint-link mutation (Imprints.Inks field) ----------
// Compute the current set of linked ink record IDs from the DOM of an open card.
// We use DOM as source of truth because user-driven row add/remove happens visually before save.
function getCurrentInkIdsFromDom(impRecId) {
  var el = document.getElementById('inks-' + impRecId);
  if (!el) return null;
  var rows = el.querySelectorAll('.ink-row');
  var ids = [];
  for (var i = 0; i < rows.length; i++) {
    var inkId = rows[i].getAttribute('data-ink-id');
    if (inkId && /^rec[A-Za-z0-9]{14}$/.test(inkId)) ids.push(inkId);
  }
  return ids;
}

// PATCH the imprint's Inks link field to match the supplied array of ink record IDs.
function patchImprintInks(impRecId, inkIds) {
  if (!WRITES_ENABLED) {
    console.log('[v79 PREVIEW] would PATCH imprint inks', impRecId, JSON.stringify(inkIds));
    endSave(impRecId, true);
    refreshCardInkStrip(impRecId); // preview-mode UI still refreshes
    return Promise.resolve(null);
  }
  beginSave(impRecId);
  return api(TI + '/' + impRecId + '?returnFieldsByFieldId=true', {
    method: 'PATCH',
    body: JSON.stringify({ fields: { [F.inks]: inkIds } })
  }).then(function(res) {
    // Mirror back into in-memory record so subsequent reads match
    var rec = allJobs.find(function(r) { return r.id === impRecId; });
    if (rec) rec.fields[F.inks] = inkIds.slice();
    endSave(impRecId, true);
    // v76: refresh the chip strip on the collapsed card so add/remove/reorder shows live
    refreshCardInkStrip(impRecId);
    return res;
  }).catch(function(err) {
    endSave(impRecId, false, err.message);
    throw err;
  });
}

// v76: rebuild only the chip strip portion of a card in-place (without re-rendering the
// whole card, which would tear down any open detail panel state below).
function refreshCardInkStrip(impRecId) {
  var rec = allJobs.find(function(r) { return r.id === impRecId; });
  if (!rec) return;
  var card = document.getElementById('card-' + impRecId);
  if (!card) return;
  var info = card.querySelector('.jc-info');
  if (!info) return;
  var existing = info.querySelector('.jc-inks');
  var newStrip = buildCardInkStrip(rec);
  if (existing) {
    if (newStrip) {
      // Replace existing strip
      var temp = document.createElement('div');
      temp.innerHTML = newStrip;
      info.replaceChild(temp.firstChild, existing);
    } else {
      existing.remove();
    }
  } else if (newStrip) {
    info.insertAdjacentHTML('beforeend', newStrip);
  }
}

// v76: refresh chip strips on every card whose imprint links the given ink. Used
// after an ink-name or hex edit so visual changes propagate without a reload.
function refreshCardsLinkingInk(inkRecId) {
  if (!Array.isArray(allJobs)) return;
  for (var i = 0; i < allJobs.length; i++) {
    var arr = allJobs[i].fields[F.inks] || [];
    for (var j = 0; j < arr.length; j++) {
      var id = (typeof arr[j] === 'string') ? arr[j] : (arr[j] && arr[j].id) || '';
      if (id === inkRecId) {
        refreshCardInkStrip(allJobs[i].id);
        break;
      }
    }
  }
}

// PATCH a single imprint field (Print Notes, Inks Ready, Ink Type, etc.)
function patchImprintField(impRecId, fieldId, value) {
  if (!WRITES_ENABLED) {
    console.log('[v79 PREVIEW] would PATCH imprint', impRecId, fieldId, '=', JSON.stringify(value));
    endSave(impRecId, true);
    return Promise.resolve(null);
  }
  beginSave(impRecId);
  var payload = {}; payload[fieldId] = value;
  return api(TI + '/' + impRecId + '?returnFieldsByFieldId=true', {
    method: 'PATCH',
    body: JSON.stringify({ fields: payload })
  }).then(function(res) {
    var rec = allJobs.find(function(r) { return r.id === impRecId; });
    if (rec) rec.fields[fieldId] = value;
    endSave(impRecId, true);
    return res;
  }).catch(function(err) {
    endSave(impRecId, false, err.message);
    throw err;
  });
}

// ---------- Name parse helper ----------
// "Pantone 186 - OW" => { pantone:'186', type:'OW' }
// "EZP WHT" => { pantone:'EZP WHT', type:null }  (no Pantone prefix, no dash)
// Returns null if shape resembles "Pantone X - Y" but type isn't a valid choice.
function parseInkName(name) {
  if (!name) return { pantone:'', type:null };
  var s = String(name).trim();
  // Canonical "Pantone X - Y"
  var m = s.match(/^Pantone\s+(.+?)\s+-\s+(.+)$/i);
  if (m) {
    var pn = m[1].trim();
    var t = m[2].trim();
    // Case-insensitive match to a valid choice; return the canonical-cased value
    var canon = null;
    for (var i = 0; i < INK_TYPE_CHOICES.length; i++) {
      if (INK_TYPE_CHOICES[i].toLowerCase() === t.toLowerCase()) { canon = INK_TYPE_CHOICES[i]; break; }
    }
    if (canon === null) return null; // invalid type — reject
    return { pantone: pn, type: canon };
  }
  // Free-form (no "Pantone " prefix or no " - " divider) — treat entire string as Pantone Number
  // and leave Ink Type alone. Covers bases like "EZP WHT", "1/2 BB", "FULL BB" etc.
  return { pantone: s, type: null };
}

function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }
function toDateKey(d) { return d.toLocaleDateString('en-CA', { timeZone: 'America/Denver' }); }
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' })
    .replace(/\s*AM$/i, ' am').replace(/\s*PM$/i, ' pm');
}
function getOrderNum(fields) {
  var v = fields[F.orderNum];
  if (v) {
    if (v.valuesByLinkedRecordId) {
      var vals = Object.values(v.valuesByLinkedRecordId);
      if (vals.length && vals[0] && vals[0].length) return String(vals[0][0]);
    }
    if (Array.isArray(v) && v.length) return String(v[0]);
    if (typeof v === 'number' || typeof v === 'string') return String(v);
  }
  // Fall back: parse order number from imprint ID (e.g. "9733-A" -> "9733")
  var imp = fields[F.imprintId] || '';
  var m = imp.match(/^(\d+)/);
  return m ? m[1] : '';
}
function getProofs(fields) {
  // v72: returns ALL proof attachments rather than just the first.
  // Many imprints link multiple Line Items, each with its own proof image — Ink Dept
  // needs to see all colorway proofs, not just the first one.
  var raw = fields[F.proofs];
  if (!raw) return [];
  var out = [];
  if (raw.valuesByLinkedRecordId) {
    Object.values(raw.valuesByLinkedRecordId).forEach(function(arr) {
      if (Array.isArray(arr)) arr.forEach(function(a) {
        if (a && a.url) out.push(a);
      });
    });
  } else if (Array.isArray(raw)) {
    raw.forEach(function(a) { if (a && a.url) out.push(a); });
  }
  // Dedupe by URL (lookup field can duplicate the same proof across multiple LIs)
  var seen = {}; var deduped = [];
  out.forEach(function(a) { if (!seen[a.url]) { seen[a.url] = true; deduped.push(a); } });
  return deduped.map(function(att) {
    return {
      url: att.url,
      thumb: (att.thumbnails && att.thumbnails.large && att.thumbnails.large.url) || null,
      filename: att.filename || '',
      isPDF: att.type === 'application/pdf'
    };
  });
}

// Back-compat wrapper — returns the first proof, or null. Used by card thumbnails.
function getProof(fields) {
  var all = getProofs(fields);
  return all.length ? all[0] : null;
}

// v78: per-card state for the inline proof switcher (left/right arrows on detail-panel thumb)
var detailProofs = {};   // detailProofs[impRecId] = array of proofs as returned by getProofs
var detailProofIdx = {}; // detailProofIdx[impRecId] = current index in the proofs array

// Cycle the inline thumbnail by +1 or -1 with wrap-around. Updates both the <img src>
// and the counter overlay.
function cycleDetailProof(impRecId, delta) {
  var proofs = detailProofs[impRecId];
  if (!proofs || proofs.length < 2) return;
  var cur = detailProofIdx[impRecId] || 0;
  var nxt = (cur + delta + proofs.length) % proofs.length;
  detailProofIdx[impRecId] = nxt;
  var p = proofs[nxt];
  var img = document.getElementById('proof-img-' + impRecId);
  if (img && p && p.thumb) img.src = p.thumb;
  var counter = document.getElementById('proof-counter-' + impRecId);
  if (counter) counter.textContent = (nxt + 1) + ' / ' + proofs.length;
}
function getLoc(fields) {
  var v = fields[F.loc];
  if (!v) return '';
  return typeof v === 'object' ? (v.name || '') : v;
}
function getQty(fields) {
  var v = fields[F.qty];
  if (v === null || v === undefined) return 0;
  if (typeof v === 'number') return v;
  if (v.valuesByLinkedRecordId) {
    var vals = Object.values(v.valuesByLinkedRecordId);
    return vals.length && vals[0] && vals[0].length ? (vals[0][0] || 0) : 0;
  }
  if (Array.isArray(v)) return v[0] || 0;
  return 0;
}

// LOAD
function loadJobs() {
  document.getElementById('root').innerHTML = '<div class="loading"><div class="spin"></div>Loading ink queue...</div>';
  document.getElementById('statsBar').style.display = 'none';

  var end = addDays(new Date(), DAYS_AHEAD);
  document.getElementById('sRange').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
    end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  var flds = [F.imprintId, F.orderNum, F.startTime, F.loc, F.inks, F.inkNames,
    F.inkType, F.inksReady, F.isRepeat, F.prevImprint, F.printNotes,
    F.proofs, F.qty, F.customer, F.printDesc, F.press, F.screens
  ];
  if (F.inkNotes) flds.push(F.inkNotes); // v76: only if field ID has been configured
  flds = flds.map(function(f) { return 'fields%5B%5D=' + f; }).join('&');

  var filter = encodeURIComponent(
    "AND(IS_AFTER({fldfqtIgcEfIlIeQk},DATEADD(TODAY(),-1,'days')),IS_BEFORE({fldfqtIgcEfIlIeQk},DATEADD(TODAY()," + (DAYS_AHEAD + 1) + ",'days')))"
  );
  var sort = 'sort%5B0%5D%5Bfield%5D=fldfqtIgcEfIlIeQk&sort%5B0%5D%5Bdirection%5D=asc';

  var records = [];
  function fetchPage(cursor) {
    var url = TI + '?returnFieldsByFieldId=true&' + flds + '&filterByFormula=' + filter + '&' + sort + (cursor ? '&offset=' + cursor : '');
    api(url).then(function(data) {
      records = records.concat(data.records || []);
      if (data.offset) { fetchPage(data.offset); return; }
      allJobs = records;
      // v76: pre-load all referenced ink records so the card chip strip can render
      // with real Pantone names + colors instead of opaque IDs.
      preloadInksForJobs(records).then(function() { renderAll(); });
    }).catch(function(e) {
      document.getElementById('root').innerHTML = '<div class="err">Load failed: ' + e.message + '</div>';
    });
  }
  fetchPage(null);
}

// v76: fetch every ink record linked from any visible imprint and populate inkCache.
// Resolves even on failure so the queue still renders (chips degrade to ID-only fallback).
function preloadInksForJobs(jobs) {
  var allInkIds = {};
  for (var i = 0; i < jobs.length; i++) {
    var arr = jobs[i].fields[F.inks] || [];
    for (var j = 0; j < arr.length; j++) {
      var id = (typeof arr[j] === 'string') ? arr[j] : (arr[j] && arr[j].id) || '';
      if (id && /^rec[A-Za-z0-9]{14}$/.test(id) && !inkCache[id]) allInkIds[id] = true;
    }
  }
  var ids = Object.keys(allInkIds);
  if (!ids.length) return Promise.resolve();

  // Airtable filterByFormula has a length limit; batch in chunks of 50 ink IDs.
  var batches = [];
  for (var k = 0; k < ids.length; k += 50) batches.push(ids.slice(k, k + 50));

  return Promise.all(batches.map(function(batch) {
    var filter = 'OR(' + batch.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';
    var url = 'tblyPBucKoDwxDisT?returnFieldsByFieldId=true&filterByFormula=' + encodeURIComponent(filter) + '&pageSize=100';
    return api(url).then(function(data) {
      (data.records || []).forEach(function(r) {
        inkCache[r.id] = r.fields;
        inkCache[r.id]._createdTime = r.createdTime;
      });
    }).catch(function(err) {
      console.warn('Ink preload batch failed', err);
    });
  }));
}

function setFilter(f) {
  activeFilter = f;
  // Update active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === f);
  });
  renderAll();
}

function renderAll() {
  var total = 0, ready = 0, noink = 0, repeat = 0;
  for (var i = 0; i < allJobs.length; i++) {
    var f = allJobs[i].fields;
    total++;
    if (f[F.inksReady]) ready++;
    if (!(f[F.inks] || []).length) noink++;
    if (f[F.isRepeat]) repeat++;
  }
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = total - ready;
  document.getElementById('sNoInk').textContent = noink;
  document.getElementById('sRepeat').textContent = repeat;
  document.getElementById('statsBar').style.display = 'flex';
  // Set active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === activeFilter);
  });

  // Group by date then by order
  var byDate = {};
  var today = toDateKey(new Date());
  var tom = toDateKey(addDays(new Date(), 1));

  for (var i = 0; i < allJobs.length; i++) {
    var r = allJobs[i];
    var st = r.fields[F.startTime];
    if (!st) continue;
    // Skip past dates (yesterday and before)
    var dk = toDateKey(new Date(st));
    if (dk < today) continue;
    // Skip presses that don't use ink
    var pressVal = r.fields[F.press];
    var pressStr = typeof pressVal === 'object' ? (pressVal && pressVal.name ? pressVal.name : '') : (pressVal || '');
    var pressLow = pressStr.toLowerCase();
    if (SKIP_PRESS.some(function(s) { return pressLow.indexOf(s) >= 0; })) continue;
    // Also skip records with location = Size Tag (no ink)
    var locVal = getLoc(r.fields).toLowerCase();
    if (locVal === 'size tag') continue;
    // Apply active filter
    var fInks = r.fields[F.inks] || [];
    if (activeFilter === 'ready' && !r.fields[F.inksReady]) continue;
    if (activeFilter === 'pending' && r.fields[F.inksReady]) continue;
    if (activeFilter === 'noink' && fInks.length > 0) continue;
    if (activeFilter === 'repeat' && !r.fields[F.isRepeat]) continue;
    if (!byDate[dk]) byDate[dk] = { _keys: [], _map: {} };
    var on = getOrderNum(r.fields) || 'no-order';
    if (!byDate[dk]._map[on]) { byDate[dk]._map[on] = []; byDate[dk]._keys.push(on); }
    byDate[dk]._map[on].push(r);
  }

  if (!Object.keys(byDate).length) {
    document.getElementById('root').innerHTML = '<div class="empty">No jobs in the next ' + DAYS_AHEAD + ' days</div>';
    return;
  }

  var h = '<div class="content">';
  var dateKeys = Object.keys(byDate).sort();
  for (var d = 0; d < dateKeys.length; d++) {
    var dk = dateKeys[d];
    var orders = byDate[dk];
    var dayRecs = [];
    var orderKeys = orders._keys;
    for (var o = 0; o < orderKeys.length; o++) dayRecs = dayRecs.concat(orders._map[orderKeys[o]]);
    var dayReady = dayRecs.filter(function(r) { return r.fields[F.inksReady]; }).length;

    var dObj = new Date(dk + 'T12:00:00');
    var dlabel, isToday = false;
    if (dk === today) { dlabel = 'Today'; isToday = true; }
    else if (dk === tom) { dlabel = 'Tomorrow'; }
    else { dlabel = dObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }); }

    var dayCountLbl = dayRecs.length + ' imprint' + (dayRecs.length === 1 ? '' : 's');
    var dgId = 'dg-' + dk;
    var dayCollapsed = isDayCollapsed(dk);
    h += '<div class="day-group' + (dayCollapsed ? ' collapsed' : '') + '" id="' + dgId + '">';
    h += '<div class="date-hdr' + (isToday ? ' today' : '') + '" onclick="toggleDayGroup(\'' + dk + '\')">' +
         '<span style="display:flex;align-items:baseline;gap:10px"><span class="date-hdr-chv">&#9660;</span>' + dlabel + '</span>' +
         '<span class="date-hdr-right">' + dayCountLbl + '</span></div>';
    h += '<div class="day-body">';

    for (var o = 0; o < orderKeys.length; o++) {
      var on = orderKeys[o];
      var recs = orders._map[on];
      var customer = recs[0].fields[F.customer] || '';
      var grpId = 'og-' + dk + '-' + on;
      var orderCountLbl = recs.length + ' imprint' + (recs.length === 1 ? '' : 's');

      h += '<div class="order-group" id="' + grpId + '">';
      h += '<div class="order-hdr" onclick="toggleOrderGroup(\'' + grpId + '\')">';
      h += '<span class="order-cust">' + escHtml(customer || '—') + '</span>';
      h += '<span class="order-num">#' + escHtml(on) + '</span>';
      h += '<span class="order-ct">' + orderCountLbl + '</span>';
      h += '<span class="order-chv">&#9660;</span>';
      h += '</div>';
      h += '<div class="order-body">';
      for (var j = 0; j < recs.length; j++) {
        h += renderCard(recs[j], on, customer);
        h += '<div class="job-detail" id="detail-' + recs[j].id + '"></div>';
      }
      h += '</div></div>';
    }
    h += '</div></div>'; // close day-body, day-group
  }
  h += '</div>';
  document.getElementById('root').innerHTML = h;
}

// v76: abbreviate "Pantone 186 - OW" → "186 OW". Bases like "EZP WHT" stay as-is.
function abbreviateInkName(fullName) {
  if (!fullName) return '';
  var s = String(fullName).trim();
  // Strip leading "Pantone "
  s = s.replace(/^Pantone\s+/i, '');
  // Drop the " - " separator (so "186 - OW" → "186 OW")
  s = s.replace(/\s+-\s+/g, ' ');
  return s;
}

// v76: build the ink chip strip for a card from the imprint's linked-ink array.
// Uses pre-loaded inkCache for names + colors. Falls back to muted "(loading)" for any
// ink not yet cached. Adds "+ N unassigned" if Screen Count > number of inks assigned.
function buildCardInkStrip(rec) {
  var f = rec.fields;
  var linked = f[F.inks] || [];
  var screenCount = f[F.screens] || null; // Screen Count rollup — number of inks expected
  var inkIds = linked.map(function(x) { return typeof x === 'string' ? x : (x && x.id) || ''; }).filter(Boolean);
  if (!inkIds.length) return ''; // no chips when nothing assigned — the "No Inks" tag covers this case

  var pills = '';
  for (var i = 0; i < inkIds.length; i++) {
    var iid = inkIds[i];
    var cached = inkCache[iid];
    if (!cached) {
      // Show a pending dot for inks not yet pre-loaded (shouldn't happen normally)
      pills += '<span class="jc-ink-pill"><span class="jc-ink-dot empty"></span><span style="color:var(--muted-lt)">…</span></span>';
      continue;
    }
    var fullName = cached[FI.name] || '';
    var abbr = abbreviateInkName(fullName);
    var hex = getPantoneHex(fullName, cached);
    var dot = '<span class="jc-ink-dot' + (hex ? '' : ' empty') + '"' + (hex ? ' style="background:' + hex + '"' : '') + '></span>';
    pills += '<span class="jc-ink-pill">' + dot + escHtml(abbr) + '</span>';
  }

  // "+ N unassigned" indicator when expected count exceeds assigned count
  if (screenCount && screenCount > inkIds.length) {
    var gap = screenCount - inkIds.length;
    pills += '<span class="jc-ink-pending">+ ' + gap + ' unassigned</span>';
  }
  return '<div class="jc-inks">' + pills + '</div>';
}

function renderCard(rec, orderNum, customer) {

  try { return JSON.parse(localStorage.getItem(DAY_COLLAPSE_KEY) || '{}'); } catch(e) { return {}; }
}

  try { localStorage.setItem(DAY_COLLAPSE_KEY, JSON.stringify(map)); } catch(e) {}

  else delete map[dayKey];
  saveCollapsedDays(map);

// v72: prune stale day-collapse state — drop entries from past dates so the map doesn't grow forever
function prunePastCollapsedDays() {
  var map = getCollapsedDays();
  var today = toDateKey(new Date());
  var changed = false;
  Object.keys(map).forEach(function(k) {
    if (k < today) { delete map[k]; changed = true; }
  });
  if (changed) saveCollapsedDays(map);
}

var detailPdfs = {};

  pdfjsLib.getDocument(url).promise.then(function(doc) {

    renderDetailPdfPage(recId);
  }).catch(function(e) {

function renderDetailPdfPage(recId) {
  var state = detailPdfs[recId];
  if (!state) return;
  var infoEl = document.getElementById('pinfo-' + recId);
  var canvasWrap = document.getElementById('pcanvas-' + recId);
  if (!canvasWrap) return;
  if (infoEl) infoEl.textContent = state.page + ' / ' + state.total;

  state.doc.getPage(state.page).then(function(page) {
    var width = canvasWrap.clientWidth || 300;
    var scale = width / page.getViewport({ scale: 1 }).width;
    var vp = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.cssText = 'width:100%;display:block';
    canvasWrap.innerHTML = '';
    canvasWrap.appendChild(canvas);
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
  });
}

function pdfPrevPage(recId) {

  state.page--;
  renderDetailPdfPage(recId);
}

function pdfNextPage(recId) {

// Full-screen PDF modal - fetches fresh URL before loading (operator v4 pattern)
// v72: multi-proof state
var pmAllProofs = [];   // [{url, thumb, filename, isPDF}]
var pmActiveIdx = 0;

// v78: hard safety timer — hides the spinner after 15s no matter where in the chain we are
var pmSpinnerSafetyTimer = null;
function pmShowSpinner() {
  document.getElementById('pmSpinner').classList.remove('hidden');
  if (pmSpinnerSafetyTimer) clearTimeout(pmSpinnerSafetyTimer);
  pmSpinnerSafetyTimer = setTimeout(function() {
    document.getElementById('pmSpinner').classList.add('hidden');
    console.warn('[v78] pmSpinner force-hidden after 15s safety timeout');
  }, 15000);
}
function pmHideSpinner() {
  document.getElementById('pmSpinner').classList.add('hidden');
  if (pmSpinnerSafetyTimer) { clearTimeout(pmSpinnerSafetyTimer); pmSpinnerSafetyTimer = null; }
}

function openPmPdf(recId, title) {

  // Fetch fresh signed URLs from Airtable
