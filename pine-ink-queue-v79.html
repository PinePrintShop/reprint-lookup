// v75: proof-load token, separate from pmRenderToken. Increments on each loadPmProof
// or modal-open call so racing requests can be detected and ignored.
var pmProofLoadToken = 0;

// Load a specific proof by index — drives both initial render and proof-switching
function loadPmProof(idx) {
  if (idx < 0 || idx >= pmAllProofs.length) return;
  var myToken = ++pmProofLoadToken;
  pmActiveIdx = idx;
  pmPdfDoc = null; pmPage = 1; pmTotal = 1;
  renderPmProofsBar(); // refresh pill highlight
  pmShowSpinner();
  document.getElementById('pmCt').textContent = '';

  var p = pmAllProofs[idx];
  var freshUrl = p.url, isPDF = p.isPDF;
  console.log('[v78] loadPmProof idx=' + idx + ' isPDF=' + isPDF + ' url=' + (freshUrl || '').slice(0, 60) + '...');

  var link = document.getElementById('pmOpenLink');
  link.href = freshUrl; link.style.display = 'inline-flex';

  if (isPDF) {
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    pdfjsLib.getDocument(freshUrl).promise.then(function(doc) {
      if (myToken !== pmProofLoadToken) return; // superseded by another switch
      console.log('[v78] PDF loaded, pages=' + doc.numPages);
      pmPdfDoc = doc; pmPage = 1; pmTotal = doc.numPages;
      document.getElementById('pmCt').textContent = '1/' + pmTotal;
      pmRenderPage();
    }).catch(function(err) {
      if (myToken !== pmProofLoadToken) return;
      console.warn('[v78] PDF load failed:', err && err.message);
      pmHideSpinner();
      var canvas = document.getElementById('pmCanvas');
      canvas.width = 500; canvas.height = 140;
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,500,140);
      ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
      ctx.fillText('PDF load error: ' + (err && err.message || 'unknown'), 250, 55);
      ctx.fillStyle = '#555'; ctx.font = '11px monospace';
      ctx.fillText('Use the Open button above to view in browser', 250, 85);
    });
  } else {
    // Image proof — draw to canvas
    var img = new Image();
    img.onload = function() {
      if (myToken !== pmProofLoadToken) return;
      console.log('[v78] image loaded');
      pmHideSpinner();
      var canvas = document.getElementById('pmCanvas');
      canvas.width = img.width; canvas.height = img.height;
      canvas.getContext('2d').drawImage(img, 0, 0);
      document.getElementById('pmCt').textContent = 'img';
    };
    img.onerror = function(e) {
      if (myToken !== pmProofLoadToken) return;
      console.warn('[v78] image load failed', e);
      pmHideSpinner();
    };
    img.crossOrigin = 'anonymous';
    img.src = freshUrl;
  }
}


// v73: pmRenderPage now handles render-promise rejection (e.g. when page is superseded by
// rapid prev/next clicks, or when modal is closed mid-render). Also belt-and-suspenders
// safety: hide spinner after 12s no matter what.
var pmRenderToken = 0; // increments on each render so superseded renders are ignored
function pmRenderPage() {
  if (!pmPdfDoc) { pmHideSpinner(); return; }
  var canvas = document.getElementById('pmCanvas');
  if (!canvas) return;
  var myToken = ++pmRenderToken;
  document.getElementById('pmCt').textContent = pmPage + ' / ' + pmTotal;
  pmShowSpinner();
  pmPdfDoc.getPage(pmPage).then(function(page) {
    if (myToken !== pmRenderToken) return; // superseded
    var body = document.getElementById('pmBody');
    var availWidth = Math.max((body ? body.clientWidth : 0) || 0, window.innerWidth || 800) - 32;
    var vp0 = page.getViewport({ scale: 1 });
    var scale = Math.min(availWidth / vp0.width, 2.5);
    if (scale <= 0 || !isFinite(scale)) scale = 1.5;
    var vp = page.getViewport({ scale: scale });
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.cssText = 'max-width:100%;height:auto;border-radius:4px;display:block';
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise.then(function() {
      if (myToken !== pmRenderToken) return;
      pmHideSpinner();
      document.getElementById('pmCt').textContent = pmPage + ' / ' + pmTotal;
    }).catch(function(e) {
      if (myToken !== pmRenderToken) return;
      pmHideSpinner();
      console.warn('[v78] Page render rejected:', e && e.message);
    });
  }).catch(function(e) {
    if (myToken !== pmRenderToken) return;
    pmHideSpinner();
    console.error('[v78] Page fetch failed:', e && e.message);
  });
}

function pmPrev() { if (pmPage > 1) { pmPage--; pmRenderPage(); } }
function pmNext() { if (pmPage < pmTotal) { pmPage++; pmRenderPage(); } }
function pmClose() {
  document.getElementById('pmModal').classList.remove('open');
  pmPdfDoc = null;
  pmRenderToken++; // void any pending render so it can't hide/show spinner after close
  pmProofLoadToken++; // also void any in-flight proof-switch
  pmHideSpinner();
}
// v78: click anywhere except the toolbar (.pm-bar) or proof picker (.pm-proofs) closes.
// Canvas clicks close (Hannah's intuition: clicking the proof = "I'm done looking, dismiss").
function pmBackdropClose(e) {
  var node = e.target;
  while (node && node.id !== 'pmModal') {
    if (node.classList && (node.classList.contains('pm-bar') || node.classList.contains('pm-proofs'))) return;
    if (!node.parentNode) return; // detached node (e.g. button was re-rendered mid-click) — don't close
    node = node.parentNode;
  }
  pmClose();
}

// LOAD INK RECIPES
function loadInkRecipes(recId, inks) {
  var inkIds = inks.map(function(i) { return typeof i === 'string' ? i : i.id; }).filter(Boolean);
  var filter = 'OR(' + inkIds.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';

  api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
    '&fields%5B%5D=' + FI.name +
    '&fields%5B%5D=' + FI.pantone +
    '&fields%5B%5D=' + FI.type +
    '&fields%5B%5D=' + FI.recipe +
    '&fields%5B%5D=' + FI.inkNotes +
    '&fields%5B%5D=' + FI.lastUpdated +
    '&fields%5B%5D=' + FI.mfr +
    '&fields%5B%5D=' + FI.displayHex +
    '&filterByFormula=' + encodeURIComponent(filter)
  ).then(function(data) {
    var byId = {};
    (data.records || []).forEach(function(r) {
      byId[r.id] = r.fields;
      byId[r.id]._createdTime = r.createdTime;
      // Also populate inkCache so post-save lookups are fresh across all open cards
      inkCache[r.id] = r.fields;
      inkCache[r.id]._createdTime = r.createdTime;
    });
    renderInkRows(recId, inks, byId, false);
  }).catch(function() {
    var el = document.getElementById('inks-' + recId);
    if (el) el.innerHTML = '<div class="inks-loading">Could not load recipes</div>';
  });
}

function renderInkRows(recId, inks, byId, isPrev) {
  var el = document.getElementById((isPrev ? 'prev-inks-' : 'inks-') + recId);
  if (!el) return;

  var h = '';
  for (var i = 0; i < inks.length; i++) {
    var ink = inks[i];
    var iid = typeof ink === 'string' ? ink : ink.id;
    var iname = typeof ink === 'object' ? ink.name : null;
    var d = byId[iid] || {};
    var name = iname || d[FI.name] || iid;
    var pantone = d[FI.pantone] || '';
    var typeName = d[FI.type] ? d[FI.type].name : '';
    var recipe = d[FI.recipe] || '';
    var mfr = d[FI.mfr] ? d[FI.mfr].name : '';
    var hexColor = getPantoneHex(name, d);
    var chipStyle = hexColor
      ? 'background:' + hexColor + ';border-color:rgba(0,0,0,.15)'
      : 'background:var(--bg);border-color:var(--border)';

    var tsHtml = '';
    if (!isPrev) {
      var createdTs = d._createdTime || '';
      var lastUpdated = d[FI.lastUpdated] || '';
      if (createdTs || lastUpdated) {
        tsHtml = '<div class="ink-timestamps">';
        if (createdTs) {
          var cd = new Date(createdTs);
          tsHtml += '<span class="ink-ts">Created <span>' + cd.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
        }
        if (lastUpdated) {
          var ld = new Date(lastUpdated + 'T12:00:00');
          tsHtml += '<span class="ink-ts">Updated <span>' + ld.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
        }
        tsHtml += '</div>';
      }
    }

    h += '<div class="ink-row" id="inkrow-' + recId + '-' + i + '" data-ink-id="' + escHtml(iid) + '"' +
         (isPrev ? '' : ' ondragover="onInkRowDragOver(event)" ondragleave="onInkRowDragLeave(event)" ondrop="onInkRowDrop(event,\'' + recId + '\',\'' + iid + '\')"') + '>';
    if (!isPrev) {
      h += '<div class="ink-drag-handle" draggable="true" title="Drag to reorder" ondragstart="onInkRowDragStart(event,\'' + recId + '\',\'' + iid + '\')" ondragend="onInkRowDragEnd(event)">⋮⋮</div>';
    }
    if (hexColor) {
      h += '<div class="ink-chip" id="chip-' + iid + '" style="' + chipStyle + '" title="Click to change color" onclick="editChipColor(\'' + iid + '\',this);event.stopPropagation()"></div>';
    } else {
      h += '<div class="ink-chip ink-chip-empty" id="chip-' + iid + '" title="No color — click to set" onclick="editChipColor(\'' + iid + '\',this);event.stopPropagation()">?</div>';
    }
    h += '<div class="ink-body">';
    if (isPrev) {
      // Previous-run inks are read-only display
      h += '<div class="ink-name">' + escHtml(name) + '</div>';
    } else {
      h += '<input class="ink-name-edit" id="name-' + recId + '-' + iid + '" value="' + escHtml(name) + '" data-orig="' + escHtml(name) + '" onclick="event.stopPropagation()" oninput="onInkNameInput(\'' + recId + '\',\'' + iid + '\',this.value)" onblur="onInkNameBlur(\'' + recId + '\',\'' + iid + '\',this)" />';
      h += '<div class="ink-name-hint" id="namehint-' + recId + '-' + iid + '">Type must be one of: Discharge, Direct-to-fabric, OW, SOW, EZP, Graphics</div>';
    }
    if (typeName || mfr) {
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">';
      if (typeName) h += inkTypeBadge(typeName);
      if (mfr) h += '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + mfr + '</span>';
      h += '</div>';
    }
    h += tsHtml;
    h += '<div class="ink-recipe-wrap">';
    if (isPrev) {
      h += '<div class="ink-recipe" style="white-space:pre-wrap">' + escHtml(recipe) + '</div>';
    } else {
      h += '<textarea class="ink-recipe" rows="4" onclick="event.stopPropagation()" oninput="onInkRecipeInput(\'' + recId + '\',\'' + iid + '\',this.value)">' + escHtml(recipe) + '</textarea>';
    }
    h += '</div>';
    h += '</div>';
    if (!isPrev) {
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">';
      h += '<button class="ink-remove-btn" onclick="removeInkRow(\'' + recId + '\',\'inkrow-' + recId + '-' + i + '\');event.stopPropagation()" title="Remove ink">✕</button>';
      var labelData = { name: name, pantone: pantone, type: typeName, mfr: mfr, recipe: recipe };
      var lk = storeLabelData(labelData);
      h += '<button class="ink-label-btn" onclick="openLabelByKey(\'' + lk + '\');event.stopPropagation()">🏷</button>';
      h += '<button class="ink-ts-btn" id="tsbtn-' + iid + '" onclick="bumpInkUpdated(\'' + recId + '\',\'' + iid + '\');event.stopPropagation()" title="Mark this ink as remixed today">📅</button>';
      h += '</div>';
    }
    h += '</div>';
  }
  el.innerHTML = h;
}

// Previous Imprint Inheritance — per-imprint state cache
// Keyed by current imprint recId. Holds matched prev records and last-seeded values
// so dropdown changes can detect user edits before re-seeding.
var prevSeedState = {};

// Label data store — avoids passing complex data through onclick attributes
// Key is a simple integer index; openLabelByKey() retrieves by key
var labelStore = {};
var labelStoreIdx = 0;
function storeLabelData(d) {
  var k = 'lbl' + (labelStoreIdx++);
  labelStore[k] = d;
  return k;
}

// ============================================================
// PREVIOUS IMPRINT INHERITANCE PATTERN
// Mirrors seps-v16 — adapted for ink-queue fields (Inks, Print Notes, Ink Type)
// ============================================================

// Fetch one previous imprint record in full. Single-record GET, NO fields[]= filter.
// Airtable 422s on fields[]= when any listed field can't resolve on that record.
function fetchOnePrevImprint(prevRecId) {
  return api(TI + '/' + prevRecId + '?returnFieldsByFieldId=true');
}

// Helper — extract sorted signature of linked record IDs (order-independent match)
function inkIdsSig(arr) {
  if (!Array.isArray(arr)) return '';
  return arr.map(function(x) { return typeof x === 'string' ? x : (x && x.id) || ''; })
    .filter(Boolean).sort().join(',');
}

// Helper — multipleSelects sig (sorted string join)
function inkTypeSig(arr) {
  if (!Array.isArray(arr)) return '';
  return arr.slice().sort().join(',');
}

// Orchestrator: fetch all linked prevs in parallel, filter by location match,
// then seed + render dropdown if 2+ matches.
function loadPrevImprintsAndSeed(recId) {
  var rec = allJobs.find(function(r) { return r.id === recId; });
  if (!rec) return;
  var f = rec.fields;
  var prevLinks = f[F.prevImprint] || [];
  if (!prevLinks.length) return;

  var curLoc = getLoc(f).trim().toLowerCase();

  // Handle BOTH v0 (bare string array) and MCP ([{id,name}]) formats — per canonical grouping rule
  var prevIds = prevLinks.map(function(x) {
    return (typeof x === 'string') ? x : (x && x.id) || '';
  }).filter(Boolean);

  if (!prevIds.length) return;

  // Fetch all in parallel
  Promise.all(prevIds.map(function(pid) {
    return fetchOnePrevImprint(pid).catch(function(err) {
      console.warn('Prev imprint fetch failed for', pid, err && err.message);
      return null;
    });
  })).then(function(results) {
    var prevs = results.filter(Boolean);
    if (!prevs.length) return;

    // Filter by Location match — only keep prevs whose Location matches current
    var matched = prevs.filter(function(p) {
      var pf = p.fields || {};
      var pLoc = getLoc(pf).trim().toLowerCase();
      return pLoc && curLoc && pLoc === curLoc;
    });

    // Preserve linked-record array order as tiebreaker
    var orderMap = {};
    prevIds.forEach(function(pid, idx) { orderMap[pid] = idx; });
    matched.sort(function(a, b) { return (orderMap[a.id] || 0) - (orderMap[b.id] || 0); });

    if (!matched.length) {
      // Render amber "no location match" notice; DO NOT seed
      var notice = document.getElementById('seed-notice-' + recId);
      if (notice) {
        notice.innerHTML = '<div class="seed-notice">⚠ No location match on linked previous run(s)</div>';
      }
      prevSeedState[recId] = { matched: [], chosen: null, seeded: null };
      return;
    }

    // Auto-seed from first matched prev (array order tiebreaker)
    var chosen = matched[0];
    prevSeedState[recId] = { matched: matched, chosen: chosen, seeded: null };
    applyCherryPickedSeed(recId, chosen);

    // Persist seeded values to Airtable so this card has real data, not just visual hints.
    // Without this, "Mark Ready" on a seeded card would leave Inks/Notes empty in Airtable.
    persistSeededFields(recId);

    // If 2+ matches, render dropdown + View Previous button in inks header
    renderPopulateFromDropdown(recId);
    renderViewPrevButton(recId);
  });
}

// One-shot PATCH of seeded fields onto the imprint. Called after applyCherryPickedSeed
// and after onPopulateFromChange.
function persistSeededFields(recId) {
  var rec = allJobs.find(function(r) { return r.id === recId; });
  var state = prevSeedState[recId];
  if (!rec || !state || !state.seeded) return;
  var payload = {};
  var s = state.seeded;
  // Re-read what was just seeded into rec.fields and decide what to write
  // Only write a field if it has a non-empty seeded value (avoid writing empty arrays / blank strings)
  var curInks = rec.fields[F.inks] || [];
  if (s.inkIdsSig && curInks.length) {
    // Normalize to bare ID array for PATCH
    var inkIds = curInks.map(function(x) { return typeof x === 'string' ? x : (x && x.id) || ''; }).filter(Boolean);
    if (inkIds.length) payload[F.inks] = inkIds;
  }
  var curNotes = rec.fields[F.printNotes] || '';
  if (s.printNotes && curNotes && curNotes.trim()) {
    payload[F.printNotes] = curNotes;
  }
  var curInkType = rec.fields[F.inkType] || [];
  if (s.inkTypeSig && curInkType.length) {
    // multipleSelects — values may be string array or [{name}] array; normalize to string array
    var typeNames = curInkType.map(function(x) { return typeof x === 'string' ? x : (x && x.name) || ''; }).filter(Boolean);
    if (typeNames.length) payload[F.inkType] = typeNames;
  }
  if (!Object.keys(payload).length) return;
  if (!WRITES_ENABLED) {
    console.log('[v79 PREVIEW] would persist seeded fields for', recId, JSON.stringify(payload));
    return;
  }
  beginSave(recId);
  api(TI + '/' + recId + '?returnFieldsByFieldId=true', {
    method: 'PATCH',
    body: JSON.stringify({ fields: payload })
  }).then(function() {
    endSave(recId, true);
  }).catch(function(err) {
    console.warn('Persist-seeded failed', err);
    endSave(recId, false, err.message);
  });
}

// Cherry-pick per-field: for each target field, take the value from `chosen` first,
// then walk the rest of `matched` in order. Seed only if current field is empty.
// Stash seeded values in prevSeedState so edit-detection works on dropdown changes.
function applyCherryPickedSeed(recId, chosen) {
  var rec = allJobs.find(function(r) { return r.id === recId; });
  if (!rec) return;
  var state = prevSeedState[recId];
  if (!state) return;
  var matched = state.matched;

  var f = rec.fields;
  var curInks = f[F.inks] || [];
  var curNotes = f[F.printNotes] || '';
  var curInkType = f[F.inkType] || [];

  // Per-field walk: chosen first, then others in order, take first non-empty
  function pickField(fieldKey, isArray) {
    // Start with chosen, then the rest of matched in order
    var ordered = [chosen].concat(matched.filter(function(p) { return p.id !== chosen.id; }));
    for (var i = 0; i < ordered.length; i++) {
      var v = ordered[i].fields[fieldKey];
      if (isArray) {
        if (Array.isArray(v) && v.length) return v;
      } else {
        if (typeof v === 'string' && v.trim()) return v;
      }
    }
    return isArray ? [] : '';
  }

  var seeded = { inkIdsSig: '', printNotes: '', inkTypeSig: '' };

  // --- INKS (linked record array) — seed only if current is empty
  if (!curInks.length) {
    var pickedInks = pickField(F.inks, true);
    if (pickedInks.length) {
      // Update in-memory record — this makes loadInkRecipes pick them up
      rec.fields[F.inks] = pickedInks;
      seeded.inkIdsSig = inkIdsSig(pickedInks);

      // Re-render the inks scroll area with loading, then fetch recipes
      var inksEl = document.getElementById('inks-' + recId);
      if (inksEl) {
        inksEl.innerHTML = '<div class="inks-loading"><div class="spin" style="display:inline-block;margin-right:6px"></div>Loading recipes...</div>';
      }
      var hdrEl = document.getElementById('inks-hdr-lbl-' + recId);
      if (hdrEl) hdrEl.textContent = 'Inks (' + pickedInks.length + ')';

      loadInkRecipes(recId, pickedInks);

      // Remove any "No Inks" tag + no-ink card class
      var card = document.getElementById('card-' + recId);
      if (card) {
        card.classList.remove('no-ink');
        var noInkTag = card.querySelector('.tag.r');
        if (noInkTag && noInkTag.textContent === 'No Inks') noInkTag.remove();
      }

      // Add the Print All button if it wasn't there before
      var detailEl = document.getElementById('detail-' + recId);
      if (detailEl && !document.getElementById('print-all-btn-' + recId)) {
        var hdrBar = detailEl.querySelector('.inks-hdr');
        if (hdrBar) {
          var pbtn = document.createElement('button');
          pbtn.className = 'btn';
          pbtn.id = 'print-all-btn-' + recId;
          pbtn.setAttribute('onclick', "printAllLabels('" + recId + "');event.stopPropagation()");
          pbtn.style.cssText = 'font-size:8px;padding:3px 8px';
          pbtn.innerHTML = '🏷 Print All';
          hdrBar.appendChild(pbtn);
        }
      }
    }
  } else {
    seeded.inkIdsSig = inkIdsSig(curInks);
  }

  // --- PRINT NOTES (string) — seed only if current is empty
  if (!curNotes || !curNotes.trim()) {
    var pickedNotes = pickField(F.printNotes, false);
    if (pickedNotes) {
      rec.fields[F.printNotes] = pickedNotes;
      seeded.printNotes = pickedNotes;
      // v72: update the editable textarea's value (the slot now always renders a textarea)
      var notesEdit = document.getElementById('pn-edit-' + recId);
      if (notesEdit) notesEdit.value = pickedNotes;
    }
  } else {
    seeded.printNotes = curNotes;
  }

  // --- INK TYPE (multipleSelects on Imprint) — seed only if current is empty
  if (!curInkType.length) {
    var pickedType = pickField(F.inkType, true);
    if (pickedType.length) {
      rec.fields[F.inkType] = pickedType;
      seeded.inkTypeSig = inkTypeSig(pickedType);
      // Refresh card tag row to show the new ink types
      refreshCardInkTypeTags(recId);
    }
  } else {
    seeded.inkTypeSig = inkTypeSig(curInkType);
  }

  prevSeedState[recId].seeded = seeded;
  prevSeedState[recId].chosen = chosen;
}

// Rebuild the Ink Type tags on the card (called after seeding inkType from prev)
// Mirrors the tag row in renderCard — no impId (now .jc-imprint right), no Repeat tag (now inline badge in .jc-name)
function refreshCardInkTypeTags(recId) {
  var rec = allJobs.find(function(r) { return r.id === recId; });
  if (!rec) return;
  var card = document.getElementById('card-' + recId);
  if (!card) return;
  var meta = card.querySelector('.jc-meta');
  if (!meta) return;
  var f = rec.fields;
  var loc = getLoc(f);
  var qty = getQty(f);
  var inks = f[F.inks] || [];
  var inkTypes = f[F.inkType] || [];
  var pressVal = f[F.press];
  var pressStr = typeof pressVal === 'object' ? (pressVal && pressVal.name ? pressVal.name : '') : (pressVal || '');

  var mh = '';
  if (qty) mh += '<span class="tag g">' + qty + ' pcs</span>';
  if (pressStr) mh += '<span class="tag n">' + escHtml(pressStr) + '</span>';
  if (loc) mh += '<span class="tag n">' + escHtml(loc) + '</span>';
  if (!inks.length) mh += '<span class="tag r">No Inks</span>';
  else {
    for (var t = 0; t < inkTypes.length; t++) mh += '<span class="tag n">' + escHtml(inkTypes[t]) + '</span>';
  }
  meta.innerHTML = mh;
}

// Render "Populate from" dropdown in inks header — only when 2+ location-matched prevs
function renderPopulateFromDropdown(recId) {
  var state = prevSeedState[recId];
  if (!state || state.matched.length < 2) return;
  var slot = document.getElementById('populate-from-' + recId);
  if (!slot) return;

  var options = state.matched.map(function(p) {
    var pid = p.fields[F.imprintId] || p.id;
    var selected = (p.id === state.chosen.id) ? ' selected' : '';
    return '<option value="' + p.id + '"' + selected + '>' + escHtml(pid) + '</option>';
  }).join('');

  slot.innerHTML =
    '<span class="populate-from">Populate from ' +
      '<select onclick="event.stopPropagation()" onchange="onPopulateFromChange(\'' + recId + '\',this.value)">' +
        options +
      '</select>' +
    '</span>';
}

// Render "View Previous" button for currently-chosen prev (only for repeat imprints
// with at least one location-matched prev). Opens the chosen prev's proof in the PM modal.
function renderViewPrevButton(recId) {
  var state = prevSeedState[recId];
  if (!state || !state.chosen) return;
  var slot = document.getElementById('view-prev-' + recId);
  if (!slot) return;
  var chosenPid = state.chosen.fields[F.imprintId] || state.chosen.id;
  slot.innerHTML =
    '<button class="view-prev-btn" onclick="openChosenPrevProof(\'' + recId + '\');event.stopPropagation()">⛶ View ' + escHtml(chosenPid) + '</button>';
}

// Dropdown change — re-seed only fields whose current value exactly matches the last seeded
// value (unedited). Any divergence counts as a user edit; leave it alone.
function onPopulateFromChange(recId, newPrevRecId) {
  var state = prevSeedState[recId];
  if (!state) return;
  var newChosen = state.matched.find(function(p) { return p.id === newPrevRecId; });
  if (!newChosen) return;

  var rec = allJobs.find(function(r) { return r.id === recId; });
  if (!rec) return;
  var seeded = state.seeded || { inkIdsSig: '', printNotes: '', inkTypeSig: '' };

  // Helper: pick from ordered list with newChosen first
  function pickField(fieldKey, isArray) {
    var ordered = [newChosen].concat(state.matched.filter(function(p) { return p.id !== newChosen.id; }));
    for (var i = 0; i < ordered.length; i++) {
      var v = ordered[i].fields[fieldKey];
      if (isArray) { if (Array.isArray(v) && v.length) return v; }
      else { if (typeof v === 'string' && v.trim()) return v; }
    }
    return isArray ? [] : '';
  }

  // INKS
  var curInks = rec.fields[F.inks] || [];
  var curInksSig = inkIdsSig(curInks);
  if (curInksSig === seeded.inkIdsSig) {
    var newInks = pickField(F.inks, true);
    if (newInks.length) {
      rec.fields[F.inks] = newInks;
      seeded.inkIdsSig = inkIdsSig(newInks);
      var inksEl = document.getElementById('inks-' + recId);
      if (inksEl) {
        inksEl.innerHTML = '<div class="inks-loading"><div class="spin" style="display:inline-block;margin-right:6px"></div>Loading recipes...</div>';
      }
      var hdrEl = document.getElementById('inks-hdr-lbl-' + recId);
      if (hdrEl) hdrEl.textContent = 'Inks (' + newInks.length + ')';
      loadInkRecipes(recId, newInks);
    }
  }
  // else: user edited ink list; leave alone

  // PRINT NOTES
  var curNotes = rec.fields[F.printNotes] || '';
  if (curNotes === seeded.printNotes) {
    var newNotes = pickField(F.printNotes, false);
    rec.fields[F.printNotes] = newNotes;
    seeded.printNotes = newNotes;
    // v72: textarea is always present; update its value
    var notesEdit = document.getElementById('pn-edit-' + recId);
    if (notesEdit) notesEdit.value = newNotes || '';
  }
  // else: user edited notes; leave alone

  // INK TYPE
  var curType = rec.fields[F.inkType] || [];
  if (inkTypeSig(curType) === seeded.inkTypeSig) {
    var newType = pickField(F.inkType, true);
    rec.fields[F.inkType] = newType;
    seeded.inkTypeSig = inkTypeSig(newType);
    refreshCardInkTypeTags(recId);
  }

  // Commit new chosen + seeded stash
  state.chosen = newChosen;
  state.seeded = seeded;
  renderViewPrevButton(recId);

  // Persist the new seeded values to Airtable
  persistSeededFields(recId);
}

// Open chosen prev's proof in the PM modal
function openChosenPrevProof(recId) {
  var state = prevSeedState[recId];
  if (!state || !state.chosen) return;
  var chosen = state.chosen;
  var pf = chosen.fields || {};
  var prevImpId = pf[F.imprintId] || chosen.id;
  // Reuse existing openPmPdf flow by stashing the proof URL temporarily on a synthetic record.
  // openPmPdf looks up by recId in allJobs — so we need a different code path.
  // Simplest: extract proof URL directly and open it in a new tab (matches seps v16 behavior).
  var proof = getProof(pf);
  if (proof && proof.url) {
    window.open(proof.url, '_blank', 'noopener');
  } else {
    alert('No proof found on previous imprint ' + prevImpId);
  }
}

// ADD INK functions
function toggleAddInk(id) {
  var body = document.getElementById('add-ink-body-' + id);
  var arrow = document.getElementById('add-ink-arrow-' + id);
  if (!body) return;
  body.classList.toggle('open');
  if (arrow) arrow.textContent = body.classList.contains('open') ? '▾' : '›';
}

function saveNewInk(id) {
  var pantone = (document.getElementById('ai-pantone-' + id) || {}).value || '';
  var type = (document.getElementById('ai-type-' + id) || {}).value || '';
  var mfr = (document.getElementById('ai-mfr-' + id) || {}).value || '';
  var recipe = (document.getElementById('ai-recipe-' + id) || {}).value || '';
  if (!pantone) { alert('Pantone number is required'); return; }

  // Determine whether the user picked an existing ink from the dropdown
  var fnEl = document.getElementById('ai-fullname-' + id);
  var storedKey = (fnEl && fnEl._storeKey) || '';
  var storedData = storedKey ? (labelStore[storedKey] || {}) : {};
  var existingRecId = storedData.recId || null;

  // If existing, but user edited Pantone/Type/Mfr/Recipe after picking, we still treat as APPEND
  // (we don't want to silently rewrite the library ink's manufacturer because they tweaked the form).
  // To edit ink master fields, users edit inline on the ink row after adding.

  markDirty(id);

  var inkRowPromise;
  if (existingRecId) {
    // Path A — append existing ink to imprint
    inkRowPromise = Promise.resolve({ id: existingRecId, fields: {
      [FI.pantone]: pantone,
      [FI.type]: type ? { name: type } : null,
      [FI.mfr]: mfr ? { name: mfr } : null,
      [FI.recipe]: recipe,
    }, _existing: true });
  } else {
    // Path B — create new ink record, then append
    var newFields = { [FI.pantone]: pantone };
    if (type) newFields[FI.type] = type;
    if (mfr) newFields[FI.mfr] = mfr;
    if (recipe) newFields[FI.recipe] = recipe;
    // Set Last Updated to today so library timestamps are seeded properly
    newFields[FI.lastUpdated] = new Date().toLocaleDateString('en-CA', { timeZone: 'America/Denver' });
    inkRowPromise = createInkRecord(newFields, id);
  }

  inkRowPromise.then(function(rec) {
    if (!rec || !rec.id) throw new Error('No record returned');
    var inkRecId = rec.id;

    // Get the current ink IDs from DOM (in case user has been working) + the new one
    var existingIds = getCurrentInkIdsFromDom(id) || [];
    if (existingIds.indexOf(inkRecId) !== -1) {
      // Already linked — don't re-add. Just clear form and notify.
      console.log('Ink already linked, skipping append');
      clearAddInkForm(id);
      // Still mark "Saved" since this was a no-op user action
      setSavePip(id, 'saved');
      return;
    }
    var newIds = existingIds.concat([inkRecId]);

    // Build DOM row immediately (optimistic)
    var displayCreated = (storedData && storedData.createdTime) || (rec.fields && rec.fields._createdTime) || '';
    var displayUpdated = (storedData && storedData.lastUpdated) || (rec.fields && rec.fields[FI.lastUpdated]) || (new Date().toLocaleDateString('en-CA', { timeZone: 'America/Denver' }));
    appendInkRowToDom(id, inkRecId, {
      name: (type ? 'Pantone ' + pantone + ' - ' + type : 'Pantone ' + pantone),
      pantone: pantone, type: type, mfr: mfr, recipe: recipe,
      createdTime: displayCreated,
      lastUpdated: displayUpdated
    });

    // PATCH the imprint's Inks link field
    return patchImprintInks(id, newIds).then(function() {
      // Update header count + clear "no inks" state
      var hdrEl = document.getElementById('inks-hdr-lbl-' + id);
      if (hdrEl) hdrEl.textContent = 'Inks (' + newIds.length + ')';
      var noMsg = document.getElementById('no-inks-msg-' + id);
      if (noMsg) noMsg.remove();
      var card = document.getElementById('card-' + id);
      if (card) {
        card.classList.remove('no-ink');
        var noInkTag = card.querySelector('.tag.r');
        if (noInkTag && noInkTag.textContent === 'No Inks') noInkTag.remove();
      }
      // Ensure Print All button exists
      var detailEl = document.getElementById('detail-' + id);
      if (detailEl && !document.getElementById('print-all-btn-' + id)) {
        var hdrBar = detailEl.querySelector('.inks-hdr');
        if (hdrBar) {
          var pbtn = document.createElement('button');
          pbtn.className = 'btn';
          pbtn.id = 'print-all-btn-' + id;
          pbtn.setAttribute('onclick', "printAllLabels('" + id + "');event.stopPropagation()");
          pbtn.style.cssText = 'font-size:8px;padding:3px 8px';
          pbtn.innerHTML = '🏷 Print All';
          hdrBar.appendChild(pbtn);
        }
      }
      clearAddInkForm(id);
    });
  }).catch(function(err) {
    console.warn('Add ink failed', err);
    alert('Could not add ink: ' + err.message);
  });
}

// Append an ink row to the imprint's inks list in DOM (optimistic UI for saveNewInk)

  row.setAttribute('ondragleave', 'onInkRowDragLeave(event)');
  row.setAttribute('ondrop', "onInkRowDrop(event,'" + impRecId + "','" + inkRecId + "')");
  row.innerHTML =
    '<div class="ink-drag-handle" draggable="true" title="Drag to reorder" ondragstart="onInkRowDragStart(event,\'' + impRecId + '\',\'' + inkRecId + '\')" ondragend="onInkRowDragEnd(event)">⋮⋮</div>' +
    '<div class="ink-chip' + (!hexColor ? ' ink-chip-empty' : '') + '" id="chip-' + inkRecId + '" style="' + chipStyle + '" onclick="editChipColor(\'' + inkRecId + '\',this);event.stopPropagation()">' + (!hexColor ? '?' : '') + '</div>' +
    '<div class="ink-body">' +
      '<input class="ink-name-edit" id="name-' + impRecId + '-' + inkRecId + '" value="' + escHtml(d.name) + '" data-orig="' + escHtml(d.name) + '" onclick="event.stopPropagation()" oninput="onInkNameInput(\'' + impRecId + '\',\'' + inkRecId + '\',this.value)" onblur="onInkNameBlur(\'' + impRecId + '\',\'' + inkRecId + '\',this)" />' +
      '<div class="ink-name-hint" id="namehint-' + impRecId + '-' + inkRecId + '">Type must be one of: Discharge, Direct-to-fabric, OW, SOW, EZP, Graphics</div>' +
      (d.type || d.mfr ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">' + (d.type ? inkTypeBadge(d.type) : '') + (d.mfr ? '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + d.mfr + '</span>' : '') + '</div>' : '') +
      tsHtml +
      '<div class="ink-recipe-wrap"><textarea class="ink-recipe" rows="4" onclick="event.stopPropagation()" oninput="onInkRecipeInput(\'' + impRecId + '\',\'' + inkRecId + '\',this.value)">' + escHtml(d.recipe || '') + '</textarea></div>' +
    '</div>' +
    '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">' +
      '<button class="ink-remove-btn" onclick="removeInkRow(\'' + impRecId + '\',\'' + rowId + '\');event.stopPropagation()" title="Remove">✕</button>' +
      '<button class="ink-label-btn" onclick="openLabelByKey(\'' + lk + '\');event.stopPropagation()">🏷</button>' +
      '<button class="ink-ts-btn" id="tsbtn-' + inkRecId + '" onclick="bumpInkUpdated(\'' + impRecId + '\',\'' + inkRecId + '\');event.stopPropagation()" title="Mark this ink as remixed today">📅</button>' +
    '</div>';
  el.appendChild(row);
}

// v72: enable/disable up-down arrows based on row position (first row no ↑, last row no ↓)
function refreshReorderArrows(impRecId) {
  var el = document.getElementById('inks-' + impRecId);
  if (!el) return;
  var rows = el.querySelectorAll('.ink-row');
  rows.forEach(function(r, i) {
    var btns = r.querySelectorAll('.ink-reorder-btn');
    if (btns.length >= 2) {
      btns[0].disabled = (i === 0);
      btns[1].disabled = (i === rows.length - 1);
    }
  });
}

// v72: move an ink row up (delta=-1) or down (delta=+1) within the imprint's Inks order
function moveInk(impRecId, inkRecId, delta) {
  var ids = getCurrentInkIdsFromDom(impRecId);
  if (!ids) return;
  var idx = ids.indexOf(inkRecId);
  if (idx === -1) return;
  var newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= ids.length) return;
  // Reorder array
  var moving = ids.splice(idx, 1)[0];
  ids.splice(newIdx, 0, moving);
  // Reorder DOM
  var el = document.getElementById('inks-' + impRecId);
  if (el) {
    var rows = Array.prototype.slice.call(el.querySelectorAll('.ink-row'));
    var movingRow = rows[idx];
    if (movingRow) {
      if (delta === -1) {
        el.insertBefore(movingRow, rows[idx - 1]);
      } else {
        // moving down: insert after the next row
        var anchor = rows[idx + 1];
        if (anchor && anchor.nextSibling) el.insertBefore(movingRow, anchor.nextSibling);
        else el.appendChild(movingRow);
      }
    }
    refreshReorderArrows(impRecId);
  }
  // PATCH to persist new order
  saveReorderedInks(impRecId, ids);
}

// v73: shared save path for both arrow-driven and drag-and-drop reorder
function saveReorderedInks(impRecId, ids) {
  markDirty(impRecId);
  patchImprintInks(impRecId, ids).catch(function(err) {
    console.warn('Reorder save failed', err);
    alert('Could not save reorder: ' + err.message);
    // Reload panel to recover real state
    var detailEl = document.getElementById('detail-' + impRecId);
    if (detailEl && detailEl.classList.contains('open')) renderDetail(impRecId, detailEl);
  });
}

// v73: Drag-and-drop reorder. Drag handle on each row is the draggable element;
// drop target is the row itself. Drop position (top half vs bottom half of target row)
// determines whether the dragged ink lands above or below.
var dragState = { impRecId: null, inkRecId: null, sourceRow: null };

function onInkRowDragStart(e, impRecId, inkRecId) {
  // v74: defensive — clear any leftover .dragging class from a previous drag that didn't end cleanly
  var stale = document.querySelectorAll('.ink-row.dragging, .ink-row.drag-over-top, .ink-row.drag-over-bottom');
  for (var i = 0; i < stale.length; i++) {
    stale[i].classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  }
  dragState.impRecId = impRecId;
  dragState.inkRecId = inkRecId;
  var row = document.getElementById('inks-' + impRecId).querySelector('.ink-row[data-ink-id="' + inkRecId + '"]');
  dragState.sourceRow = row;
  if (row) {
    row.classList.add('dragging');
    // Use the entire row as the drag image (rather than just the handle)
    try { e.dataTransfer.setDragImage(row, 20, 20); } catch(_) {}
  }
  // Set drag data — required for Firefox to fire drag events
  try { e.dataTransfer.setData('text/plain', inkRecId); } catch(_) {}
  e.dataTransfer.effectAllowed = 'move';
}

function onInkRowDragOver(e) {
  if (!dragState.inkRecId) return;
  e.preventDefault(); // allow drop
  e.dataTransfer.dropEffect = 'move';
  // Highlight insertion point — top half = drop above, bottom half = drop below
  var row = e.currentTarget;
  if (!row || row === dragState.sourceRow) return;
  // Must be a row in the same imprint's list
  var listEl = row.parentNode;
  if (!listEl || listEl.id !== 'inks-' + dragState.impRecId) return;
  var rect = row.getBoundingClientRect();
  var isTopHalf = (e.clientY - rect.top) < rect.height / 2;
  // Clear any previous markers on this row, then set the correct one
  row.classList.remove('drag-over-top', 'drag-over-bottom');
  row.classList.add(isTopHalf ? 'drag-over-top' : 'drag-over-bottom');
}

function onInkRowDragLeave(e) {
  var row = e.currentTarget;
  if (row) row.classList.remove('drag-over-top', 'drag-over-bottom');
}

function onInkRowDrop(e, impRecId, targetInkId) {
  e.preventDefault();
  if (!dragState.inkRecId || dragState.impRecId !== impRecId) { resetDragState(); return; }
  var sourceInkId = dragState.inkRecId;
  if (sourceInkId === targetInkId) { resetDragState(); return; }

  // Determine drop position from where the pointer landed on the target row
  var targetRow = e.currentTarget;
  var rect = targetRow.getBoundingClientRect();
  var isTopHalf = (e.clientY - rect.top) < rect.height / 2;
  targetRow.classList.remove('drag-over-top', 'drag-over-bottom');

  // Rebuild the ID array with source removed and inserted at target position
  var ids = getCurrentInkIdsFromDom(impRecId);
  if (!ids) { resetDragState(); return; }
  var srcIdx = ids.indexOf(sourceInkId);
  if (srcIdx === -1) { resetDragState(); return; }
  ids.splice(srcIdx, 1);
  var tgtIdx = ids.indexOf(targetInkId);
  if (tgtIdx === -1) { resetDragState(); return; }
  var insertAt = isTopHalf ? tgtIdx : tgtIdx + 1;
  ids.splice(insertAt, 0, sourceInkId);

  // Reorder DOM to match
  var listEl = document.getElementById('inks-' + impRecId);
  if (listEl && dragState.sourceRow) {
    if (isTopHalf) {
      listEl.insertBefore(dragState.sourceRow, targetRow);
    } else if (targetRow.nextSibling) {
      listEl.insertBefore(dragState.sourceRow, targetRow.nextSibling);
    } else {
      listEl.appendChild(dragState.sourceRow);
    }
  }

  saveReorderedInks(impRecId, ids);
  resetDragState();
}

// v74: clear .dragging class from ALL rows on drag end — fixes v73 bug where source row
// stayed greyed out because resetDragState() in onInkRowDrop cleared the reference before
// dragend fired.
function onInkRowDragEnd(e) {
  var allRows = document.querySelectorAll('.ink-row');
  for (var i = 0; i < allRows.length; i++) {
    allRows[i].classList.remove('dragging', 'drag-over-top', 'drag-over-bottom');
  }
  resetDragState();
}

function resetDragState() {
  dragState.impRecId = null;
  dragState.inkRecId = null;
  dragState.sourceRow = null;
}


function clearAddInkForm(id) {
  var fields = ['ai-search-', 'ai-fullname-', 'ai-pantone-', 'ai-type-', 'ai-mfr-', 'ai-recipe-'];
  fields.forEach(function(f) {
    var el = document.getElementById(f + id);
    if (el) { el.value = ''; if (el._storeKey) el._storeKey = ''; }
  });
  toggleAddInk(id);
}

// Per-ink ephemeral edit state — tracks dirty status (name/recipe edit buffer)
var localEdits = {}; // localEdits[inkRecId] = { name?, recipe?, nameValid? }

// ─── Recipe textarea — debounced PATCH to Inks.Recipe ─────────────────────────
function onInkRecipeInput(impRecId, inkRecId, val) {
  if (!localEdits[inkRecId]) localEdits[inkRecId] = {};
  localEdits[inkRecId].recipe = val;
  markDirty(impRecId);
  debounceSave('recipe:' + inkRecId, function() {
    var fields = {};
    fields[FI.recipe] = val;
    patchInkRecord(inkRecId, fields, impRecId, false).then(function() {
      delete localEdits[inkRecId].recipe;
    }).catch(function(err) {
      console.warn('Recipe save failed', err);
    });
  });
}

// v72: print notes auto-save (debounced PATCH to Imprints.Print Notes)
function onPrintNotesInput(impRecId, val) {
  markDirty(impRecId);
  debounceSave('printnotes:' + impRecId, function() {
    patchImprintField(impRecId, F.printNotes, val).catch(function(err) {
      console.warn('Print notes save failed', err);
    });
  });
}

// v76: Ink Notes on the collapsed card — debounced PATCH to Imprints.Ink Notes.
// No-op if F.inkNotes field ID isn't configured (shouldn't be wired in markup, but defensive).
function onCardInkNotesInput(impRecId, val) {
  if (!F.inkNotes) return;
  markDirty(impRecId);
  debounceSave('inknotes:' + impRecId, function() {
    patchImprintField(impRecId, F.inkNotes, val).catch(function(err) {
      console.warn('Ink notes save failed', err);
    });
  });
}

// ─── Ink name input — parse to Pantone + Type, debounced PATCH ────────────────
function onInkNameInput(impRecId, inkRecId, val) {
  var inp = document.getElementById('name-' + impRecId + '-' + inkRecId);
  var hint = document.getElementById('namehint-' + impRecId + '-' + inkRecId);
  var parsed = parseInkName(val);
  // Visual feedback during typing — only flag invalid if user typed "Pantone X - Y" with bad Y
  if (parsed === null) {
    if (inp) inp.classList.add('invalid');
    if (hint) hint.classList.add('on');
    if (!localEdits[inkRecId]) localEdits[inkRecId] = {};
    localEdits[inkRecId].nameValid = false;
    return; // don't queue save
  }
  if (inp) inp.classList.remove('invalid');
  if (hint) hint.classList.remove('on');
  // Guard: if Pantone parsed to empty, don't queue a save (user is likely mid-edit)
  if (!parsed.pantone || !parsed.pantone.trim()) return;
  if (!localEdits[inkRecId]) localEdits[inkRecId] = {};
  localEdits[inkRecId].name = val;
  localEdits[inkRecId].nameValid = true;
  markDirty(impRecId);
  debounceSave('name:' + inkRecId, function() {
    var fields = {};
    fields[FI.pantone] = parsed.pantone;
    if (parsed.type !== null) fields[FI.type] = parsed.type;
    patchInkRecord(inkRecId, fields, impRecId, false).then(function(res) {
      // Refresh data-orig on the input so blur-revert (if any) compares against new canonical
      if (inp && res && res.fields) {
        // Rebuild canonical name from response
        var pn = res.fields[FI.pantone] || '';
        var t = res.fields[FI.type];
        var tn = t && t.name ? t.name : (typeof t === 'string' ? t : '');
        var canonical = tn ? ('Pantone ' + pn + ' - ' + tn) : ('Pantone ' + pn);
        inp.setAttribute('data-orig', canonical);
      }
      delete localEdits[inkRecId].name;
    }).catch(function(err) {
      console.warn('Name save failed', err);
    });
  });
}

// On blur, if the field is in invalid-name state, revert to last-known-good
function onInkNameBlur(impRecId, inkRecId, inp) {
  var ed = localEdits[inkRecId];
  if (ed && ed.nameValid === false) {
    var orig = inp.getAttribute('data-orig') || '';
    inp.value = orig;
    inp.classList.remove('invalid');
    var hint = document.getElementById('namehint-' + impRecId + '-' + inkRecId);
    if (hint) hint.classList.remove('on');
    delete ed.nameValid;
  }
}

// 📅 button — standalone save that bumps Last Updated to today on the master Ink record.
// Updates the on-screen "Updated" timestamp on this row immediately on success.
function bumpInkUpdated(impRecId, inkRecId) {
  var btn = document.getElementById('tsbtn-' + inkRecId);
  if (!btn) return;
  // Don't allow double-fire while a previous bump is in flight
  if (btn.disabled) return;
  btn.disabled = true;
  btn.classList.add('armed'); // visual feedback during save
  markDirty(impRecId);
  // Empty `fields` object; patchInkRecord with bumpDate=true will set FI.lastUpdated
  patchInkRecord(inkRecId, {}, impRecId, true).then(function(res) {
    btn.disabled = false;
    btn.classList.remove('armed');
    // Update the on-screen "Updated" date on this ink row
    var todayLabel = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', timeZone:'America/Denver' });
    var tsWrap = btn.closest('.ink-row');
    if (tsWrap) {
      var updatedSpan = tsWrap.querySelector('.ink-ts:nth-child(2) span');
      if (updatedSpan) {
        updatedSpan.textContent = todayLabel;
      } else {
        // No "Updated" timestamp existed yet (first-time bump on an old ink) — add one
        var tsContainer = tsWrap.querySelector('.ink-timestamps');
        if (tsContainer) {
          var newTs = document.createElement('span');
          newTs.className = 'ink-ts';
          newTs.innerHTML = 'Updated <span>' + todayLabel + '</span>';
          tsContainer.appendChild(newTs);
        }
      }
    }
  }).catch(function(err) {
    btn.disabled = false;
    btn.classList.remove('armed');
    console.warn('Bump Last Updated failed', err);
  });
}

// TOGGLE READY — immediate write, routed through save engine
function toggleReady(e, id) {
  e.stopPropagation();
  var rec = allJobs.find(function(r) { return r.id === id; });
  if (!rec) return;
  var cur = rec.fields[F.inksReady] || false;
  var nxt = !cur;

  // Optimistic UI
  rec.fields[F.inksReady] = nxt;
  var btn = e.currentTarget;
  btn.classList.toggle('on', nxt);
  btn.textContent = nxt ? '✓ Ready' : 'Mark Ready';

  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.toggle('ready', nxt);
    if (nxt) {
      card.classList.remove('no-ink');
      var inkEl2 = document.getElementById('inks-' + id);
      if (inkEl2 && inkEl2.querySelectorAll('.ink-row').length > 0) {
        var noInkTag2 = card.querySelector('.tag.r');
        if (noInkTag2 && noInkTag2.textContent === 'No Inks') noInkTag2.remove();
      }
    } else {
      var inkEl = document.getElementById('inks-' + id);
      var hasInks = (rec.fields[F.inks] || []).length > 0 || (inkEl && inkEl.querySelectorAll('.ink-row').length > 0);
      if (!hasInks) card.classList.add('no-ink');
    }
  }

  var statusEl = card && card.querySelector('.status');
  if (statusEl) { statusEl.className = 'status ' + (nxt ? 'done' : 'pending'); statusEl.textContent = nxt ? 'Ready' : 'Pending'; }

  // Update stats
  var ready = allJobs.filter(function(r) { return r.fields[F.inksReady]; }).length;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = allJobs.length - ready;

  // Fire write (immediate, no debounce). Revert on failure.
  patchImprintField(id, F.inksReady, nxt).catch(function(err) {
    rec.fields[F.inksReady] = cur;
    btn.classList.toggle('on', cur);
    btn.textContent = cur ? '✓ Ready' : 'Mark Ready';
    if (card) card.classList.toggle('ready', cur);
    if (statusEl) { statusEl.className = 'status ' + (cur ? 'done' : 'pending'); statusEl.textContent = cur ? 'Ready' : 'Pending'; }
    var ready2 = allJobs.filter(function(r) { return r.fields[F.inksReady]; }).length;
    document.getElementById('sReady').textContent = ready2;
    document.getElementById('sPending').textContent = allJobs.length - ready2;
    alert('Save failed: ' + err.message);
  });
}

// Chip color editor
var activeChipPopover = null;
function editChipColor(iid, chipEl) {
  // Close any existing popover
  if (activeChipPopover) { activeChipPopover.remove(); activeChipPopover = null; }

  var popover = document.createElement('div');
  popover.className = 'chip-popover';
  var currentColor = chipEl.style.backgroundColor || '';
  var currentHex = currentColor ? rgbToHex(currentColor) : '';

  popover.innerHTML =
    '<input class="chip-hex-input" id="chex-' + iid + '" placeholder="#a3b4c5" maxlength="7" value="' + currentHex + '">' +
    '<button class="chip-set-btn" onclick="applyChipColor(\'' + iid + '\');event.stopPropagation()">Set</button>' +
    '<div style="position:absolute;left:0;right:0;top:100%;margin-top:4px;font-size:9px;color:var(--muted);font-family:var(--cond);letter-spacing:.04em;text-transform:uppercase;text-align:center;white-space:nowrap">Blank = clear override</div>';

  // Position below chip
  var rect = chipEl.getBoundingClientRect();
  popover._chipEl = chipEl;
  document.body.appendChild(popover);
  // Position below chip, clamped to viewport
  var pw = popover.offsetWidth || 160;
  var leftPos = Math.min(rect.left, window.innerWidth - pw - 8);
  popover.style.cssText = 'position:fixed;top:' + (rect.bottom + 4) + 'px;left:' + Math.max(8, leftPos) + 'px;z-index:9999';
  activeChipPopover = popover;

  var inp = document.getElementById('chex-' + iid);
  if (inp) {
    inp.focus();
    inp.select();
    inp.onkeydown = function(e) {
      if (e.key === 'Enter') applyChipColor(iid);
      if (e.key === 'Escape') { popover.remove(); activeChipPopover = null; }
      e.stopPropagation();
    };
  }

  // Close on outside click — use mousedown instead of click to avoid
  // catching the same event that opened the popover
  setTimeout(function() {
    document.addEventListener('mousedown', function handler(e) {
      if (!popover.contains(e.target) && e.target !== chipEl) {
        popover.remove();
        activeChipPopover = null;
        document.removeEventListener('mousedown', handler);
      }
    });
  }, 100);
}

function applyChipColor(iid) {
  var inp = document.getElementById('chex-' + iid);
  if (!inp) {
    // Fallback: find input in active popover
    if (activeChipPopover) inp = activeChipPopover.querySelector('.chip-hex-input');
  }
  if (!inp) return;
  var hex = inp.value.trim();
  // Empty input = clear the override (chip falls back to Pantone map)
  var clearOverride = (hex === '' || hex === '#');
  if (!clearOverride) {
    if (!hex.startsWith('#')) hex = '#' + hex;
    if (!/^#[0-9a-fA-F]{6}$/.test(hex)) {
      inp.style.borderColor = '#c0392b';
      inp.style.boxShadow = '0 0 0 2px rgba(192,57,43,.2)';
      inp.focus();
      return;
    }
  }
  // Find chip — try by iid first, then by data stored on popover
  var chip = document.getElementById('chip-' + iid);
  if (!chip && activeChipPopover && activeChipPopover._chipEl) chip = activeChipPopover._chipEl;

  // v77: optimistic DOM update — apply or revert color immediately
  if (chip) {
    if (clearOverride) {
      // Revert chip — re-derive color from the ink's name + static map (no override)
      var cached = inkCache[iid] || {};
      var nm = cached[FI.name] || '';
      // Clear the override on a temporary copy so getPantoneHex falls back
      var staticHex = getPantoneHex(nm, {});
      if (staticHex) {
        chip.style.background = staticHex;
        chip.style.borderColor = 'rgba(0,0,0,.15)';
        chip.classList.remove('ink-chip-empty');
        chip.textContent = '';
      } else {
        chip.style.background = 'var(--bg)';
        chip.style.borderColor = 'var(--border)';
        chip.classList.add('ink-chip-empty');
        chip.textContent = '?';
      }
    } else {
      chip.style.background = hex;
      chip.style.borderColor = 'rgba(0,0,0,.15)';
      chip.classList.remove('ink-chip-empty');
      chip.textContent = '';
    }
  }
  if (activeChipPopover) { activeChipPopover.remove(); activeChipPopover = null; }

  // v77: persist to Inks.Display Hex. Routes the pip through the currently-open detail card.
  var impRecId = openDetailId || null;
  if (impRecId) markDirty(impRecId);
  var fields = {};
  fields[FI.displayHex] = clearOverride ? '' : hex;
  patchInkRecord(iid, fields, impRecId, false).catch(function(err) {
    console.warn('Display Hex save failed', err);
  });
}

function rgbToHex(rgb) {
  var m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return '';
  return '#' + [m[1],m[2],m[3]].map(function(n) { return ('0'+parseInt(n).toString(16)).slice(-2); }).join('');
}

function removeInkRow(recId, rowId) {
  var el = document.getElementById(rowId);
  if (!el) return;
  el.remove();

  // Recompute current ink IDs from DOM and PATCH the imprint
  var ids = getCurrentInkIdsFromDom(recId);
  if (ids === null) return;
  markDirty(recId);
  patchImprintInks(recId, ids).then(function() {
    // Update Inks (N) header count + show "No inks assigned" if empty + flag no-ink card
    var hdrEl = document.getElementById('inks-hdr-lbl-' + recId);
    if (hdrEl) hdrEl.textContent = 'Inks (' + ids.length + ')';
    var card = document.getElementById('card-' + recId);
    if (!ids.length && card) {
      card.classList.add('no-ink');
      // Re-show the "No inks assigned" hint inside the scroll area
      var inkEl = document.getElementById('inks-' + recId);
      if (inkEl && !document.getElementById('no-inks-msg-' + recId)) {
        inkEl.innerHTML = '<div class="inks-loading" id="no-inks-msg-' + recId + '">No inks assigned — add inks below</div>';
      }
      // Hide Print All button when nothing to print
      var pb = document.getElementById('print-all-btn-' + recId);
      if (pb) pb.style.display = 'none';
    }
  }).catch(function(err) {
    console.warn('Imprint Inks PATCH failed', err);
    alert('Could not save ink removal: ' + err.message);
    // Reload the panel to recover real state
    var detailEl = document.getElementById('detail-' + recId);
    if (detailEl && detailEl.classList.contains('open')) renderDetail(recId, detailEl);
  });
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  if (!s) return "''";
  return "'" + String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'') + "'";
}

var acTimers = {};
function inkAcSearch(impId, query) {
  var acEl = document.getElementById('ai-ac-' + impId);
  // Clear the stored full name whenever user types a new search
  var fnEl = document.getElementById('ai-fullname-' + impId);
  if (fnEl) { fnEl.value = ''; fnEl._storeKey = ''; }
  if (!query || query.trim().length < 2) { if (acEl) acEl.style.display = 'none'; return; }
  clearTimeout(acTimers[impId]);
  acTimers[impId] = setTimeout(function() {
    var q = query.trim();
    var filter = encodeURIComponent(
      'OR(FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.pantone + '})),' +
      'FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.name + '})))'
    );
    api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
      '&fields%5B%5D=' + FI.name +
      '&fields%5B%5D=' + FI.pantone +
      '&fields%5B%5D=' + FI.type +
      '&fields%5B%5D=' + FI.recipe +
      '&fields%5B%5D=' + FI.inkNotes +
      '&fields%5B%5D=' + FI.lastUpdated +
      '&fields%5B%5D=' + FI.mfr +
      '&fields%5B%5D=' + FI.displayHex +
      '&filterByFormula=' + filter +
      '&pageSize=8'
    ).then(function(data) {
      var el = document.getElementById('ai-ac-' + impId);
      if (!el) return;
      var recs = data.records || [];
      if (!recs.length) {
        el.innerHTML = '<div class="ink-ac-none">No match — fill in manually</div>';
        el.style.display = 'block';
        return;
      }
      var h = '';
      recs.forEach(function(r) {
        var f = r.fields;
        var name = f[FI.name] || '';
        var typeName = f[FI.type] ? f[FI.type].name : '';
        var mfr = f[FI.mfr] ? f[FI.mfr].name : '';
        var recipe = f[FI.recipe] || '';
        var pantone = f[FI.pantone] || '';
        var meta = [typeName, mfr].filter(Boolean).join(' · ');
        var recipeSnippet = recipe ? recipe.split('\n')[0].substring(0, 50) : '';
        var dataJson = { recId: r.id, name: name, pantone: pantone, type: typeName, mfr: mfr, recipe: recipe, createdTime: r.createdTime || '', lastUpdated: f[FI.lastUpdated] || '' };
        var lk = storeLabelData(dataJson);
        // Cache fields so subsequent renders find them
        inkCache[r.id] = f;
        h += '<div class="ink-ac-row" onclick="inkAcSelect(\'' + impId + '\',\'' + lk + '\');event.stopPropagation()">';
        h += '<div class="ink-ac-row-name">' + escHtml(name) + '</div>';
        if (meta) h += '<div class="ink-ac-row-meta">' + escHtml(meta) + '</div>';
        if (recipeSnippet) h += '<div class="ink-ac-row-meta" style="color:var(--muted-lt)">' + escHtml(recipeSnippet) + (recipe.length > 50 ? '…' : '') + '</div>';
        h += '</div>';
      });
      el.innerHTML = h;
      el.style.display = 'block';
    }).catch(function() {});
  }, 280);
}

function inkAcSelect(impId, key) {
  try {
    var d = labelStore[key] || {};

    var tEl = document.getElementById('ai-type-'   + impId);

// ─── LABEL RENDERING ─────────────────────────────────────────────────────────
var currentLabelData = null;

function buildLabelHTML(d) {
  var name = d.name || '';
  var recipe = d.recipe || '';
  var pantone = d.pantone || '';

  var lines = recipe ? recipe.split('\n') : [];
  var lineCount = lines.filter(function(l){ return l.trim(); }).length;

  // Pantone number — per-char sizing for the left column (~42% of 384px = ~161px wide)
  var pantoneLen = pantone.length;
  var BASE_SIZES = { 1:96, 2:90, 3:80, 4:68, 5:56, 6:46, 7:38, 8:32 };
  var basePantoneSize = BASE_SIZES[pantoneLen] || (pantoneLen > 8 ? 26 : 96);

  var nameFontSize, recipeFontSize, lineHeight, pantoneScale;
  if (lineCount <= 5) {
    nameFontSize   = name.length > 28 ? '14px' : '17px';
    recipeFontSize = '14px';
    lineHeight     = '1.65';
    pantoneScale   = 1.0;
  } else if (lineCount <= 8) {
    nameFontSize   = name.length > 28 ? '13px' : '15px';
    recipeFontSize = '12px';
    lineHeight     = '1.55';
    pantoneScale   = 0.88;
  } else {
    nameFontSize   = name.length > 28 ? '11px' : '13px';
    recipeFontSize = '10px';
    lineHeight     = '1.45';
    pantoneScale   = 0.75;
  }

  var pantoneFontSize = Math.round(basePantoneSize * pantoneScale) + 'px';

  var linesHtml = lines.map(function(l) {
    if (!l.trim()) return '<div style="height:4px"></div>';
    return '<div>' + escHtml(l) + '</div>';
  }).join('');

  // Landscape 384x192 — preview matches screen, print window rotates for Rollo
  return (
    '<div style="width:384px;height:192px;background:#fff;color:#000;' +
        'font-family:Helvetica,Arial,sans-serif;display:flex;flex-direction:column;' +
        'overflow:hidden;box-sizing:border-box;' +
        '-webkit-print-color-adjust:exact;print-color-adjust:exact">' +

      // TOP BAND
      '<div style="background:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;' +
          'padding:9px 14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-height:48px">' +
        '<div style="font-size:' + nameFontSize + ';font-weight:700;color:#fff;' +
            'text-align:center;line-height:1.2;font-family:Helvetica,Arial,sans-serif">' +
          escHtml(name) +
        '</div>' +
      '</div>' +

      // BOTTOM — two columns
      '<div style="flex:1;display:flex;overflow:hidden">' +
        '<div style="width:42%;display:flex;align-items:center;justify-content:center;padding:4px 4px 4px 8px;flex-shrink:0">' +
          '<div style="font-size:' + pantoneFontSize + ';font-weight:700;color:#000;' +
              'line-height:1;letter-spacing:-.02em;text-align:center;font-family:Helvetica,Arial,sans-serif">' +
            escHtml(pantone) +
          '</div>' +
        '</div>' +
        '<div style="flex:1;padding:8px 10px 8px 4px;display:flex;align-items:center;overflow:hidden">' +
          '<div style="font-size:' + recipeFontSize + ';font-weight:700;line-height:' + lineHeight + ';' +
              'font-family:Helvetica,Arial,sans-serif;color:#000;text-align:right;width:100%">' +
            linesHtml +
          '</div>' +
        '</div>' +
      '</div>' +

    '</div>'
  );
}

function isLight(hex) {
  if (!hex || hex.length < 7) return true;
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 145;
}

function openLabelOverlay(d) {

// ─── PDF LABEL GENERATOR — AUTO-FIT ─────────────────────────────────────────
// jsPDF draws at 72pt/inch. 4"x2" landscape = 288pt x 144pt.
// Uses doc.getTextWidth() to measure and shrink until content fits — no clipping.
function generateLabelPdf(labels, callback) {
  var jsPDF = window.jspdf && window.jspdf.jsPDF;
  if (!jsPDF) { alert('PDF library not loaded yet — please wait a moment and try again.'); return; }

  var W = 288; // 4 inches
  var H = 144; // 2 inches

  var doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: [H, W] });

  labels.forEach(function(d, idx) {
    if (idx > 0) doc.addPage([H, W], 'landscape');

    var name    = d.name    || '';
    var pantone = d.pantone || '';
    var recipe  = d.recipe  || '';

    var lines = recipe ? recipe.split('\n') : [];
    var filledLines = lines.filter(function(l){ return l.trim(); }).length;

    // ── Column layout ─────────────────────────────────────────────────────
    var bandH   = 30;
    var bodyTop = bandH + 3;
    var bodyH   = H - bandH - 3;
    var leftW   = W * 0.42;       // ~120pt left column for number
    var leftPad = 6;              // inner padding left
    var rightPad = 7;             // inner padding right
    var rightColLeft = leftW + 4; // right column starts here
    var rightColW    = W - rightColLeft - rightPad; // available width for recipe
    var rightX       = W - rightPad; // right-align anchor

    // ── Black top band ────────────────────────────────────────────────────
    doc.setFillColor(0, 0, 0);
    doc.rect(0, 0, W, bandH, 'F');

    // ── Name — auto-shrink to fit band width ──────────────────────────────
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(255, 255, 255);
    var namePt = 13;
    var maxNameW = W - 16;
    while (namePt > 6) {
      doc.setFontSize(namePt);
      if (doc.getTextWidth(name) <= maxNameW) break;
      namePt -= 0.5;
    }
    doc.text(name, W / 2, bandH / 2 + namePt * 0.38, { align: 'center' });

    // ── Pantone number — fill left column, auto-shrink to fit ────────────
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 0, 0);
    var maxNumW  = leftW - leftPad * 2;
    var maxNumH  = bodyH - 8;
    var numPt    = 72; // start large
    var minNumPt = 10;
    while (numPt > minNumPt) {
      doc.setFontSize(numPt);
      var tw = doc.getTextWidth(pantone);
      var th = numPt * 1.15; // approximate cap height
      if (tw <= maxNumW && th <= maxNumH) break;
      numPt -= 1;
    }
    var numX = leftPad + maxNumW / 2;
    var numY = bodyTop + bodyH / 2 + numPt * 0.35;
    doc.text(pantone, numX, numY, { align: 'center' });

    // ── Recipe — auto-shrink font until all lines fit vertically ─────────
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(0, 0, 0);

    // Find largest font size where all filled lines fit in bodyH
    var rPt    = 10;
    var minRPt = 5;
    var recipeLineH, totalH;
    while (rPt > minRPt) {
      recipeLineH = rPt * 1.55;
      // count vertical space needed (filled lines + gap lines)
      totalH = 0;
      lines.forEach(function(l) {
        totalH += l.trim() ? recipeLineH : recipeLineH * 0.4;
      });
      if (totalH <= bodyH - 8) break;
      rPt -= 0.5;
    }

    // Also shrink if any line is too wide for the right column
    while (rPt > minRPt) {
      doc.setFontSize(rPt);
      var fits = true;
      lines.forEach(function(l) {
        if (l.trim() && doc.getTextWidth(l.trim()) > rightColW) fits = false;
      });
      if (fits) break;
      rPt -= 0.5;
    }

    doc.setFontSize(rPt);
    recipeLineH = rPt * 1.55;
    var recipeY = bodyTop + 5;

    lines.forEach(function(l) {
      if (!l.trim()) { recipeY += recipeLineH * 0.4; return; }
      doc.text(l.trim(), rightX, recipeY + rPt * 0.72, { align: 'right' });
      recipeY += recipeLineH;
    });
  });

  var pdfBlob = doc.output('blob');
  var url = URL.createObjectURL(pdfBlob);
  if (callback) callback(url);
  setTimeout(function() { URL.revokeObjectURL(url); }, 120000);
}

var masterSearchTimer = null;
var masterSearchCache = {};

function openMasterModal() {
  var modal = document.getElementById('masterModal');
  if (modal) modal.classList.add('open');

  if (inp) { inp.value = ''; inp.focus(); }

}

function closeMasterModal() {
  var modal = document.getElementById('masterModal');
  if (modal) modal.classList.remove('open');
}

function masterSearch(query) {
  clearTimeout(masterSearchTimer);
  var q = (query || '').trim();
  var resultsEl = document.getElementById('masterResults');
  if (!q || q.length < 2) {
    resultsEl.innerHTML = '<div class="master-loading">Type to search the ink library</div>';
    return;
  }
  if (masterSearchCache[q]) { renderMasterResults(masterSearchCache[q]); return; }
  resultsEl.innerHTML = '<div class="master-loading"><div class="spin" style="display:inline-block;margin-right:6px;width:10px;height:10px;border-width:2px"></div>Searching...</div>';
  masterSearchTimer = setTimeout(function() {
    var filter = encodeURIComponent(
      'OR(FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.pantone + '})),' +
      'FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.name + '})))'
    );
    api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
      '&fields%5B%5D=' + FI.name +
      '&fields%5B%5D=' + FI.pantone +
      '&fields%5B%5D=' + FI.type +
      '&fields%5B%5D=' + FI.recipe +
      '&fields%5B%5D=' + FI.inkNotes +
      '&fields%5B%5D=' + FI.lastUpdated +
      '&fields%5B%5D=' + FI.mfr +
      '&filterByFormula=' + filter +
      '&pageSize=30'
    ).then(function(data) {
      var recs = data.records || [];
      masterSearchCache[q] = recs;
      renderMasterResults(recs);
    }).catch(function(e) {
      document.getElementById('masterResults').innerHTML = '<div class="master-empty">Search failed: ' + escHtml(e.message) + '</div>';
    });
  }, 300);
}

function renderMasterResults(recs) {
  var el = document.getElementById('masterResults');
  if (!recs.length) { el.innerHTML = '<div class="master-empty">No inks found</div>'; return; }
  var h = '';
  recs.forEach(function(r) {
    var f = r.fields;
    var name = f[FI.name] || '';
    var typeName = f[FI.type] ? f[FI.type].name : '';
    var mfr = f[FI.mfr] ? f[FI.mfr].name : '';
    var recipe = f[FI.recipe] || '';
    var pantone = f[FI.pantone] || '';
    var lastUpdated = f[FI.lastUpdated] || '';
    var meta = [typeName, mfr, lastUpdated ? 'Updated ' + lastUpdated : ''].filter(Boolean).join(' · ');
    var recipeSnippet = recipe ? recipe.split('\n').slice(0,2).join(' / ') : '';
    var dataJson = { name: name, pantone: pantone, type: typeName, mfr: mfr, recipe: recipe };
    var lk = storeLabelData(dataJson);
    h += '<div class="master-ink-row" onclick="masterSelectInk(\'' + lk + '\')">';
    h += '<div class="master-ink-name">' + escHtml(name) + '</div>';
    if (meta) h += '<div class="master-ink-meta">' + escHtml(meta) + '</div>';
    if (recipeSnippet) h += '<div class="master-ink-recipe-preview">' + escHtml(recipeSnippet) + '</div>';
    h += '</div>';
  });
  el.innerHTML = h;
}

  closeMasterModal();

// Close overlays on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    pmClose();
    closeLabelOverlay();
    closeMasterModal();
  }
});
</script>
<!-- Label print overlay -->
<div class="label-overlay" id="labelOverlay">
  <div class="label-iframe-wrap" id="labelIframeWrap">
    <div class="label-iframe-loading" id="labelIframeLoading">Generating PDF...</div>
    <iframe id="labelIframe" style="display:none"></iframe>
  </div>
  <div class="label-actions">
    <span class="label-size-hint">4" × 2" · Rollo 2×4 label</span>
    <button class="label-close-btn" onclick="closeLabelOverlay()">✕ Close</button>
    <button class="label-print-btn" onclick="printLabelFromIframe()">⎙ Print</button>
  </div>
</div>

<!-- Master print modal -->
<div class="master-modal" id="masterModal">
  <div class="master-panel">
    <div class="master-hdr">
      <span class="master-title">🏷 Print Ink Label</span>
      <span class="master-close" onclick="closeMasterModal()">✕</span>
    </div>
    <div class="master-search-wrap">
      <input class="master-search" id="masterSearch" placeholder="Search by Pantone number, type, or name..." autocomplete="off" oninput="masterSearch(this.value)">
    </div>
    <div class="master-results" id="masterResults">
      <div class="master-loading">Type to search the ink library</div>
    </div>
  </div>
</div>

</body>
</html>
