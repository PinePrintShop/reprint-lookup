<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catching Queue v61 · Pine Central</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;background:#F2F2EE;color:#0D0D0B;font-size:14px;-webkit-font-smoothing:antialiased}

:root{
  --bg:#F2F2EE;--surface:#fff;--surface2:#F7F7F4;
  --border:#E5E5E0;--border-dk:#D0D0CA;
  --text:#0D0D0B;--muted:#6B6B64;--muted-lt:#C8C8C0;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-dk:#144d31;
  --yellow:#E8E832;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --dark:#0A0A08;--dark-bd:#1A1A16;
  --radius:4px;--radius-lg:6px;
}

/* ── PRESS TABS — matches v9 press-toggle exactly ── */
.tabs{
  display:flex;overflow-x:auto;background:var(--surface);
  border-bottom:1px solid var(--border);padding:0 16px;
  scrollbar-width:none;position:sticky;top:0;z-index:50;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  font-size:10px;font-weight:700;padding:11px 14px;border:none;
  background:transparent;color:var(--muted-lt);cursor:pointer;
  white-space:nowrap;border-bottom:2px solid transparent;
  letter-spacing:.1em;text-transform:uppercase;
  transition:color .1s,border-color .1s;
}
.tab:hover{color:var(--muted)}
.tab.on{color:var(--green);border-bottom-color:var(--green)}
.tab-ct{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:16px;height:16px;border-radius:8px;
  background:var(--bg);font-size:9px;padding:0 4px;margin-left:5px;color:var(--muted);
}
.tab.on .tab-ct{background:var(--green-lt);color:var(--green-dk)}

/* ── VIEWS ── */
.view{display:none}.view.on{display:block}

/* ── QUEUE ── */
.queue{padding:14px 16px;max-width:680px;margin:0 auto}
.q-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.q-title{font-size:10px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em}
.q-date{font-size:10px;color:var(--muted-lt)}
.q-group-hdr{
  font-size:9px;font-weight:700;color:var(--muted-lt);
  text-transform:uppercase;letter-spacing:.1em;padding:10px 2px 4px;
}
.q-empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:11px;text-transform:uppercase;letter-spacing:.1em}

/* ── JOB CARD — matches v9 cq-job-card exactly ── */
.job-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);display:flex;align-items:center;
  gap:10px;padding:12px 14px;cursor:pointer;
  transition:border-color .12s;margin-bottom:6px;
}
.job-card:hover{border-color:var(--green)}
.job-card.flagged{border-color:var(--red-bd)}
.jc-thumb{
  width:48px;height:48px;border-radius:var(--radius);
  background:var(--bg);border:1px solid var(--border);
  flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;
}
.jc-thumb img{width:100%;height:100%;object-fit:cover}
.jc-info{flex:1;min-width:0}
.jc-sup{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.jc-name{
  font-size:13px;font-weight:700;text-transform:uppercase;
  letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.jc-tags{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}

/* ── TAGS — matches v9 .tag exactly ── */
.tag{
  display:inline-block;font-size:8px;font-weight:700;
  padding:2px 7px;border-radius:2px;border:1px solid;
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;
}
.tag-g{background:var(--green-lt);color:var(--green-dk);border-color:#b8dfcc}
.tag-y{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.tag-r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.tag-n{background:var(--bg);color:var(--muted-lt);border-color:var(--border)}

.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.status{
  font-size:9px;font-weight:700;padding:3px 8px;border-radius:2px;
  text-transform:uppercase;letter-spacing:.08em;
}
.status-pending{background:var(--bg);color:var(--muted-lt);border:1px solid var(--border)}
.status-done{background:var(--green-lt);color:var(--green-dk)}
.status-complete{background:var(--green);color:#fff}

/* ── BUTTONS — matches v9 .btn exactly ── */
.btn-complete{
  font-size:9px;font-weight:700;padding:5px 10px;border-radius:var(--radius);
  border:1px solid var(--border-dk);background:transparent;color:var(--muted);
  cursor:pointer;text-transform:uppercase;letter-spacing:.08em;
}
.btn-complete:hover{color:var(--text);border-color:var(--text)}
.btn-submit{
  flex:1;padding:13px;border-radius:var(--radius);border:none;
  background:var(--dark);color:var(--yellow);
  font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;
}
.btn-submit:hover{background:#141410}
.btn-mark{
  flex:1;padding:13px;border-radius:var(--radius);
  border:2px solid var(--green);background:transparent;color:var(--green);
  font-size:11px;font-weight:700;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;
}

/* ── QC VIEW ── */
.qc{padding:14px 16px;max-width:900px;margin:0 auto}
.qc-back{
  font-size:9px;font-weight:700;padding:6px 12px;border-radius:var(--radius);
  border:1px solid var(--border-dk);background:transparent;color:var(--muted);
  cursor:pointer;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;
}
.qc-back:hover{color:var(--text);border-color:var(--text)}
.qc-hdr{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;
}
.qc-order{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.qc-name{font-size:18px;font-weight:700;margin-bottom:10px}
.qc-tags{display:flex;gap:6px;flex-wrap:wrap}

/* ── PROGRESS ── */
.prog-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:12px 14px;margin-bottom:10px;
}
.prog-txt{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.prog-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;width:0%}

/* ── COLORWAY CARDS — matches v9 cw-card ── */
.cw-card{
  background:var(--surface);border:2px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  margin-bottom:10px;display:grid;grid-template-columns:42% 1fr;
}
.cw-card.counted{border-color:var(--green)}
.cw-img{
  background:var(--bg);border-right:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  min-height:100px;cursor:pointer;overflow:hidden;
}
.cw-img img{width:100%;height:100%;object-fit:contain;display:block}
.cw-inputs{display:flex;flex-direction:column}
.cw-col-hdr{
  display:grid;grid-template-columns:28px 1fr 54px 48px;gap:4px;
  padding:4px 10px;background:var(--bg);border-bottom:1px solid var(--border);
  font-size:8px;font-weight:700;color:var(--muted-lt);
  text-transform:uppercase;letter-spacing:.08em;text-align:center;
}
.cw-col-hdr div:first-child,.cw-col-hdr div:nth-child(2){text-align:left}
.cw-sz-row{
  display:grid;grid-template-columns:28px 1fr 54px 48px;gap:4px;
  padding:7px 10px;align-items:center;border-bottom:1px solid var(--bg);
}
.sz-lbl{font-size:12px;font-weight:700}
.sz-ord{font-size:10px;color:var(--muted-lt)}
.sz-in{
  font-size:13px;padding:5px 4px;border-radius:var(--radius);
  border:1px solid var(--border-dk);background:var(--bg);color:var(--text);
  text-align:center;width:100%;outline:none;
}
.sz-in:focus{border-color:var(--green);background:#fff}
.sz-in.dmg{border-color:var(--red-bd);background:var(--red-bg)}

/* ── REASON PANEL ── */
.reason-panel{
  background:var(--red-bg);border-top:1px solid var(--red-bd);
  padding:10px;display:flex;flex-direction:column;gap:8px;
}
.reason-lbl{font-size:8px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.1em}
.reason-chips{display:flex;gap:5px;flex-wrap:wrap}
.rchip{
  font-size:9px;font-weight:700;padding:3px 9px;border-radius:10px;
  border:1px solid var(--red-bd);background:var(--surface);color:var(--red);
  cursor:pointer;text-transform:uppercase;letter-spacing:.04em;user-select:none;
}
.rchip.on{background:var(--red);color:#fff;border-color:var(--red)}

/* ── SPOILAGE ── */
.spoil{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:14px 16px;margin-bottom:10px;
}
.spoil-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.spoil-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}
.spoil-pct{font-size:28px;font-weight:700;line-height:1}
.spoil-pct.ok{color:var(--green)}.spoil-pct.warn{color:var(--amb)}.spoil-pct.bad{color:var(--red)}
.spoil-bar-wrap{height:5px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px}
.spoil-bar{height:100%;border-radius:3px;transition:width .3s}
.spoil-bar.ok{background:var(--green)}.spoil-bar.warn{background:var(--amb)}.spoil-bar.bad{background:var(--red)}
.res-badge{
  display:inline-block;font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:var(--radius);
  text-transform:uppercase;letter-spacing:.08em;
}
.res-ok{background:var(--green-lt);color:var(--green-dk);border:1px solid #b8dfcc}
.res-warn{background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-bd)}
.res-bad{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}

/* ── ACTION ROW ── */
.act-row{display:flex;gap:8px;margin-bottom:20px}

/* ── LOADING ── */
.loading{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding:48px;color:var(--muted-lt);font-size:10px;
  text-transform:uppercase;letter-spacing:.1em;
}
.spin{
  width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--green);border-radius:50%;
  animation:sp .7s linear infinite;flex-shrink:0;
}
@keyframes sp{to{transform:rotate(360deg)}}
.err{margin:16px;padding:14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a}

/* ── PROOF MODAL ── */
.proof-modal{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
.proof-modal.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm-nav{display:flex;gap:6px;align-items:center}
.pm-nav button{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-ct{font-size:11px;color:#555;min-width:32px;text-align:center}
.pm-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px}
.pm-body img{max-width:100%;max-height:100%;border-radius:var(--radius);object-fit:contain}
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>
<div id="errPanel"></div>

<!-- Views injected here by JS -->
<div id="viewLoading" class="view on">
  <div class="loading"><div class="spin"></div>Loading today's jobs…</div>
</div>
<div id="viewQueue" class="view"></div>
<div id="viewQC" class="view"></div>

<!-- Proof modal -->
<div class="proof-modal" id="proofModal">
  <div class="pm-bar">
    <button class="pm-close" onclick="closeProof()">✕ Close</button>
    <span class="pm-fn" id="pmFn"></span>
    <div class="pm-nav">
      <button onclick="pmNav(-1)">‹</button>
      <span class="pm-ct" id="pmCt"></span>
      <button onclick="pmNav(1)">›</button>
    </div>
  </div>
  <div class="pm-body" id="pmBody"></div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────
var BASE = 'appJkaLk8DykjsgHR';
var TI   = 'tbln9oAGvz2PNBZLV';   // Imprints
var TLI  = 'tblJx5UlwO7oMSk5H';   // Line Items
var TOR  = 'tbl8Tf0AeS9gnHOOS';   // Orders

var F = {
  imprintId:    'fldDFfwFQ9B20n2kT',
  orderNum:     'fldZAIMnXPYF9LiXq',
  designNick:   'fldyGOHRKNz00MaYQ',
  press:        'fldv59OGU7EkBVofo',
  startTime:    'fldfqtIgcEfIlIeQk',
  qty:          'fldFipR4ddfqMPeAX',
  proofs:       'fldUOIfCd22MxevRm',
  due:          'fldf57VIkt82rO1iQ',
  loc:          'fldKQIL0rSJBSeC8S',
  isToday:      'fldq1VzzuxVavP7cm',
  sizeList:     'fldVwclPQMUUNqMRF',
  totalSch:     'fldjMMMABFqzbWDlE',
  totalAllTime: 'fld6gdEkaxIsjc0hG',
};

var LI_SZ = {
  XS:'fldVA9ZmYxhDxtnYZ', S:'fldCZr5lB6Jx80lfG', M:'fldzTs1qKe9IBxxSn',
  L:'fldnRLJxjUDa1mQTj', XL:'fldTRgdexcpBXXQPv', '2XL':'fldin7j6uGO0uRTec',
  '3XL':'fldpltq9fdRkrvIvt', OSFA:'fld2bgIlmPbANgLVK'
};

var SZ_ORDER = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL','OSFA'];

var DMG_REASONS = ['Print Error','Corner','Dryer Grease','Wrinkle','Out of Square',
                   'Mill Flaw','Smudge','Dry-in','Light Ink','Jawn','Other'];

var MACHINES = [
  {id:'all', label:'All',        pressKey:null},
  {id:'p1',  label:'P1 · ROQ NEXT', pressKey:'Press 1 - ROQ NEXT'},
  {id:'p2',  label:'P2 · ROQ YOU',  pressKey:'Press 2 - ROQ YOU'},
  {id:'fs',  label:'Flatstock',     pressKey:'Flatstock - M&R Saturn'},
  {id:'em',  label:'Embroidery',    pressKey:'Embroidery - TAJIMA 6-Head'},
];

// Damage write fields (guarded by WRITES_ENABLED)
var WRITES_ENABLED = false;
var F_LI_DAMAGES   = 'fldluAKxFLXEDVwqP';
var F_ORD_DMG_FLAG = 'fld67ftnqyhxlUjzA';
var F_ORD_DMG_SUMM = 'fldfG3wcky1zggfWU';

var pat = null;
var jobs = [];
var qcState = {};
var activePress = 'p1';
var activeJobId = null;

// ── INIT ─────────────────────────────────────────────────────
window.onload = function() {
  pat = localStorage.getItem('pine_at_key');
  if (!pat) {
    pat = prompt('Airtable token:');
    if (!pat) return;
    localStorage.setItem('pine_at_key', pat);
  }
  buildTabs();
  loadData();
};

// ── API ───────────────────────────────────────────────────────
function api(path) {
  return fetch('https://api.airtable.com/v0/' + BASE + '/' + path, {
    headers: { Authorization: 'Bearer ' + pat }
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(j) {
      throw new Error(j.error ? j.error.message : 'HTTP ' + r.status);
    });
    return r.json();
  });
}

// ── PARSE HELPERS ─────────────────────────────────────────────
function parseSizeList(str) {
  if (!str || typeof str !== 'string') return [];
  return str.split(',').map(function(p) {
    var m = p.trim().match(/^(\d+)\s+(.+)$/);
    return m ? {size: m[2].trim(), qty: parseInt(m[1])} : null;
  }).filter(Boolean);
}

function getOrderNum(f) {
  var ov = f[F.orderNum];
  if (ov && ov.valuesByLinkedRecordId) {
    var vals = Object.values(ov.valuesByLinkedRecordId);
    if (vals.length && vals[0] && vals[0].length) return String(vals[0][0]);
  }
  var imp = f[F.imprintId] || '';
  var m = imp.match(/^(\d+)/);
  return m ? m[1] : '--';
}

function getProofs(f) {
  var rawP = f[F.proofs];
  var proofs = [];
  function ex(a) {
    if (!a || !a.url) return;
    proofs.push({url: a.url, thumb: (a.thumbnails && a.thumbnails.large && a.thumbnails.large.url) || null, filename: a.filename || ''});
  }
  if (!rawP) return proofs;
  if (rawP.valuesByLinkedRecordId) {
    Object.values(rawP.valuesByLinkedRecordId).forEach(function(arr) {
      if (Array.isArray(arr)) arr.forEach(ex);
    });
  } else if (Array.isArray(rawP)) {
    rawP.forEach(ex);
  } else if (typeof rawP === 'object') {
    Object.values(rawP).forEach(ex);
  }
  return proofs;
}

function getDue(f) {
  var dv = f[F.due];
  if (dv && dv.valuesByLinkedRecordId) {
    var dvals = Object.values(dv.valuesByLinkedRecordId);
    if (dvals.length && dvals[0] && dvals[0].length) return String(dvals[0][0]);
  }
  return '';
}

function fmtDate(d) {
  if (!d) return '';
  try {
    return new Date(String(d).includes('T') ? d : d + 'T12:00:00')
      .toLocaleDateString('en-US', {month:'short', day:'numeric'});
  } catch(e) { return String(d); }
}

// ── LOAD DATA ─────────────────────────────────────────────────
function loadData() {
  showView('viewLoading');
  var flds = Object.values(F).map(function(f){ return 'fields%5B%5D=' + f; }).join('&');
  var filter = 'filterByFormula=' + encodeURIComponent('{' + F.isToday + '}=1');
  var sort = 'sort%5B0%5D%5Bfield%5D=' + F.startTime + '&sort%5B0%5D%5Bdirection%5D=asc';

  api(TI + '?' + filter + '&' + flds + '&' + sort + '&pageSize=100&returnFieldsByFieldId=true')
    .then(function(data) {
      var raw = (data.records || []).map(function(r) {
        var f = r.fields;
        var pv = f[F.press];
        var press = typeof pv === 'string' ? pv : (pv && pv.name) || '';
        var lv = f[F.loc];
        var loc = typeof lv === 'string' ? lv : (lv && lv.name) || '';
        var sizeList = parseSizeList(f[F.sizeList] || '');
        var qty = sizeList.reduce(function(s,x){ return s+x.qty; }, 0);
        if (!qty) qty = Math.round(f[F.qty] || f[F.totalSch] || f[F.totalAllTime] || 0);
        return {
          id: r.id,
          imprintId: f[F.imprintId] || '--',
          orderNum: getOrderNum(f),
          designNick: (f[F.designNick] || '').trim(),
          press: press, qty: qty, proofs: getProofs(f),
          due: getDue(f), loc: loc, sizeList: sizeList,
          startTime: f[F.startTime] || ''
        };
      });

      // Group by order number (v56 logic)
      var orderMap = {};
      raw.forEach(function(job) {
        var key = job.orderNum;
        if (!orderMap[key]) {
          orderMap[key] = {
            id: job.id, orderNum: job.orderNum, press: job.press,
            qty: job.qty, sizeList: job.sizeList, proofs: job.proofs.slice(),
            due: job.due, loc: job.loc, locations: [], imprintIds: [],
            machines: [], startTime: job.startTime, isBandana: job.loc === 'Bandana',
            designNick: job.designNick, customer: '', orderRecordId: ''
          };
        }
        var g = orderMap[key];
        if (job.loc && g.locations.indexOf(job.loc) < 0) g.locations.push(job.loc);
        g.imprintIds.push(job.imprintId);
        if (job.press && g.machines.indexOf(job.press) < 0) g.machines.push(job.press);
        if (!g.qty && job.qty) g.qty = job.qty;
        job.proofs.forEach(function(p) {
          if (!g.proofs.find(function(x){ return x.url === p.url; })) g.proofs.push(p);
        });
        if (job.startTime > g.startTime) {
          g.startTime = job.startTime; g.press = job.press;
          g.sizeList = job.sizeList; g.qty = job.qty || g.qty;
          g.loc = job.loc || g.loc; g.isBandana = job.loc === 'Bandana';
        }
        if (!g.due && job.due) g.due = job.due;
        if (job.loc === 'Bandana') g.isBandana = true;
        if (!g.designNick) g.designNick = job.designNick;
      });

      jobs = Object.values(orderMap).map(function(g) {
        g.locLabel = g.locations.join(' · ');
        // Dedupe proofs
        var seen = {};
        g.proofs = g.proofs.filter(function(p) {
          if (seen[p.url]) return false; seen[p.url] = true; return true;
        });
        return g;
      }).sort(function(a,b) { return a.startTime < b.startTime ? -1 : a.startTime > b.startTime ? 1 : 0; });

      jobs.forEach(function(j) {
        if (!qcState[j.id]) qcState[j.id] = {status:'pending', sizeData:{}, notes:'', spoilage:0};
      });

      // Fetch customer names
      var nums = jobs.map(function(j){ return j.orderNum; }).filter(function(n){ return n && n !== '--'; });
      nums = nums.filter(function(v,i,a){ return a.indexOf(v) === i; });
      if (nums.length) {
        var orF = 'OR(' + nums.map(function(n){ return '{Invoice / Order Number}=' + n; }).join(',') + ')';
        api(TOR + '?filterByFormula=' + encodeURIComponent(orF) +
            '&fields%5B%5D=fld4S3B5yJANKlE7l&fields%5B%5D=fldoRraeYHsgfeWhj&returnFieldsByFieldId=true&maxRecords=50')
          .then(function(od) {
            od.records.forEach(function(r) {
              var onum = r.fields['fld4S3B5yJANKlE7l'];
              var cust = r.fields['fldoRraeYHsgfeWhj'] || '';
              if (onum) jobs.forEach(function(j) {
                if (j.orderNum === String(onum)) { j.customer = cust; j.orderRecordId = r.id; }
              });
            });
            updateTabs();
            renderQueue();
          }).catch(function(){ updateTabs(); renderQueue(); });
      } else {
        updateTabs();
        renderQueue();
      }
    })
    .catch(function(err) {
      var ep = document.getElementById('errPanel');
      ep.innerHTML = '<div class="err">Load failed: ' + err.message + '</div>';
      showView('viewQueue');
    });
}

// ── TABS ──────────────────────────────────────────────────────
function buildTabs() {
  var wrap = document.getElementById('tabs');
  MACHINES.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'tab' + (m.id === activePress ? ' on' : '');
    btn.id = 'tab_' + m.id;
    btn.textContent = m.label;
    var ct = document.createElement('span');
    ct.className = 'tab-ct'; ct.id = 'tabct_' + m.id;
    btn.appendChild(ct);
    btn.onclick = function() { activePress = m.id; updateTabs(); renderQueue(); };
    wrap.appendChild(btn);
  });
}

function updateTabs() {
  MACHINES.forEach(function(m) {
    var btn = document.getElementById('tab_' + m.id);
    var ct = document.getElementById('tabct_' + m.id);
    if (btn) btn.className = 'tab' + (m.id === activePress ? ' on' : '');
    if (ct) ct.textContent = jobsFor(m).length;
  });
}

function jobsFor(m) {
  if (m.id === 'all') return jobs;
  return jobs.filter(function(j) { return j.press === m.pressKey; });
}

// ── VIEWS ─────────────────────────────────────────────────────
function showView(id) {
  ['viewLoading','viewQueue','viewQC'].forEach(function(v) {
    document.getElementById(v).classList.remove('on');
  });
  document.getElementById(id).classList.add('on');
}

// ── QUEUE RENDER ──────────────────────────────────────────────
function renderQueue() {
  showView('viewQueue');
  var m = MACHINES.find(function(x){ return x.id === activePress; });
  var mj = jobsFor(m);
  updateTabs();
  var wrap = document.getElementById('viewQueue');
  wrap.innerHTML = '';
  var q = document.createElement('div'); q.className = 'queue';

  var hdr = document.createElement('div'); hdr.className = 'q-hdr';
  var t = document.createElement('span'); t.className = 'q-title';
  t.textContent = (m ? m.label : '') + ' — ' + mj.length + ' job' + (mj.length !== 1 ? 's' : '') + ' today';
  var d = document.createElement('span'); d.className = 'q-date';
  d.textContent = new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',timeZone:'America/Denver'});
  hdr.appendChild(t); hdr.appendChild(d); q.appendChild(hdr);

  if (!mj.length) {
    var empty = document.createElement('div'); empty.className = 'q-empty';
    empty.textContent = 'No jobs today'; q.appendChild(empty);
    wrap.appendChild(q); return;
  }

  var lastOrder = null;
  mj.forEach(function(job) {
    var st = qcState[job.id] || {status:'pending'};

    if (job.orderNum !== lastOrder) {
      lastOrder = job.orderNum;
      var gh = document.createElement('div'); gh.className = 'q-group-hdr';
      gh.textContent = 'Order ' + job.orderNum + (job.customer ? ' · ' + job.customer : '');
      q.appendChild(gh);
    }

    var card = document.createElement('div');
    card.className = 'job-card' + (st.spoilage > 5 ? ' flagged' : '');
    card.onclick = function() { enterQC(job.id); };

    // Thumb
    var thumb = document.createElement('div'); thumb.className = 'jc-thumb';
    var fp = job.proofs[0];
    if (fp && fp.thumb) {
      var img = document.createElement('img'); img.src = fp.thumb;
      img.onerror = function() { thumb.innerHTML = ''; };
      thumb.appendChild(img);
    }
    card.appendChild(thumb);

    // Info
    var info = document.createElement('div'); info.className = 'jc-info';
    var sup = document.createElement('div'); sup.className = 'jc-sup';
    sup.textContent = 'Order ' + job.orderNum + ' · ' + (job.imprintIds ? job.imprintIds.join(', ') : '');
    info.appendChild(sup);
    var name = document.createElement('div'); name.className = 'jc-name';
    name.textContent = job.customer || job.designNick || ('Order ' + job.orderNum);
    info.appendChild(name);
    var tags = document.createElement('div'); tags.className = 'jc-tags';
    addTag(tags, job.qty + ' pcs', 'tag-g');
    if (job.locLabel) addTag(tags, job.locLabel, 'tag-n');
    if (job.due) addTag(tags, 'Due ' + fmtDate(job.due), 'tag-y');
    if (st.spoilage > 0) addTag(tags, st.spoilage.toFixed(1) + '% spoilage', st.spoilage > 5 ? 'tag-r' : 'tag-y');
    info.appendChild(tags);
    card.appendChild(info);

    // Right
    var right = document.createElement('div'); right.className = 'jc-right';
    if (st.status === 'complete') {
      var s = document.createElement('span'); s.className = 'status status-complete'; s.textContent = 'Done'; right.appendChild(s);
    } else if (st.status === 'qc-done') {
      var s2 = document.createElement('span'); s2.className = 'status status-done'; s2.textContent = "QC'd"; right.appendChild(s2);
      var cb = document.createElement('button'); cb.className = 'btn-complete'; cb.textContent = '✓ Complete';
      (function(jid){ cb.onclick = function(e){ e.stopPropagation(); markComplete(jid); }; })(job.id);
      right.appendChild(cb);
    } else {
      var s3 = document.createElement('span'); s3.className = 'status status-pending'; s3.textContent = 'Pending'; right.appendChild(s3);
    }
    card.appendChild(right);
    q.appendChild(card);
  });
  wrap.appendChild(q);
}

function addTag(parent, text, cls) {
  var s = document.createElement('span'); s.className = 'tag ' + (cls || ''); s.textContent = text;
  parent.appendChild(s);
}

// ── QC ENTER ─────────────────────────────────────────────────
function enterQC(jobId) {
  activeJobId = jobId;
  if (!qcState[jobId]) qcState[jobId] = {status:'pending', sizeData:{}, notes:'', spoilage:0};
  var job = jobs.find(function(j){ return j.id === jobId; });
  if (!job) return;
  showView('viewQC');

  if (job.colorways && job.colorways.length && job.colorways[0].liId !== job.id) {
    renderQC(); return;
  }

  var qc = document.getElementById('viewQC');
  qc.innerHTML = '<div class="qc"><div class="loading"><div class="spin"></div>Loading colorways…</div></div>';

  var liFilter = encodeURIComponent('{Invoice / Order Number Lookup}=' + job.orderNum);
  var liFields = Object.keys(LI_SZ).map(function(k){ return 'fields%5B%5D=' + LI_SZ[k]; }).join('&');
  liFields += '&fields%5B%5D=flddhvdkKI31tFTdX&fields%5B%5D=fldTFz4ZzfOthqkg6&fields%5B%5D=fldFfuKAcduwWQp8g';

  api(TLI + '?filterByFormula=' + liFilter + '&' + liFields + '&returnFieldsByFieldId=true&pageSize=100')
    .then(function(ld) {
      var colorways = ld.records.filter(function(r) {
        var imps = r.fields['fldTFz4ZzfOthqkg6'];
        if (!imps || !imps.length) return true;
        return imps.map(function(x){ return x.id || x; }).indexOf(job.id) >= 0;
      }).map(function(r) {
        var f = r.fields;
        var szs = {};
        Object.entries(LI_SZ).forEach(function(e) {
          var q = f[e[1]]; if (q > 0) szs[e[0]] = q;
        });
        var tot = Object.values(szs).reduce(function(a,b){ return a+b; }, 0);
        var pa = f['flddhvdkKI31tFTdX'];
        var thumb = pa && pa[0] ? (pa[0].thumbnails && pa[0].thumbnails.large ? pa[0].thumbnails.large.url : pa[0].url) : null;
        return {liId: r.id, orderedSizes: szs, orderedTotal: tot, proofThumb: thumb, createdTime: r.createdTime || ''};
      }).filter(function(cw){ return cw.orderedTotal > 0; })
        .sort(function(a,b){ return a.createdTime.localeCompare(b.createdTime); });

      job.colorways = colorways.length ? colorways : fallbackColorways(job);
      renderQC();
    })
    .catch(function() { job.colorways = fallbackColorways(job); renderQC(); });
}

function fallbackColorways(job) {
  var szs = {};
  job.sizeList.forEach(function(s){ szs[s.size] = s.qty; });
  if (!Object.keys(szs).length) szs['OSFA'] = job.qty;
  return [{liId: job.id, orderedSizes: szs, orderedTotal: job.qty, proofThumb: job.proofs[0] ? job.proofs[0].thumb : null}];
}

// ── QC RENDER ────────────────────────────────────────────────
function renderQC() {
  var jobId = activeJobId;
  var job = jobs.find(function(j){ return j.id === jobId; });
  if (!job) return;
  var jst = qcState[jobId];
  var colorways = job.colorways || [];

  // Init sizeData
  colorways.forEach(function(cw) {
    Object.keys(cw.orderedSizes).forEach(function(sz) {
      var k = cw.liId + '__' + sz;
      if (!jst.sizeData[k]) jst.sizeData[k] = {caught:'', damaged:'', reasons:[]};
    });
  });

  var qc = document.getElementById('viewQC');
  qc.innerHTML = '';
  var wrap = document.createElement('div'); wrap.className = 'qc'; qc.appendChild(wrap);

  // Back
  var back = document.createElement('button'); back.className = 'qc-back';
  back.textContent = '← Back to Queue'; back.onclick = function(){ renderQueue(); };
  wrap.appendChild(back);

  // Header
  var hdr = document.createElement('div'); hdr.className = 'qc-hdr';
  var ord = document.createElement('div'); ord.className = 'qc-order';
  ord.textContent = 'Order ' + job.orderNum + ' · ' + (job.imprintIds || []).join(', ');
  hdr.appendChild(ord);
  var nm = document.createElement('div'); nm.className = 'qc-name';
  nm.textContent = job.customer || job.designNick || '';
  hdr.appendChild(nm);
  var tgs = document.createElement('div'); tgs.className = 'qc-tags';
  addTag(tgs, job.qty + ' pcs', 'tag-g');
  if (job.locLabel) addTag(tgs, job.locLabel, 'tag-n');
  if (job.due) addTag(tgs, 'Due ' + fmtDate(job.due), 'tag-y');
  if (colorways.length > 1) addTag(tgs, colorways.length + ' colorways', 'tag-n');
  hdr.appendChild(tgs);
  wrap.appendChild(hdr);

  // Progress
  var progCard = document.createElement('div'); progCard.className = 'prog-card';
  var progTxt = document.createElement('div'); progTxt.className = 'prog-txt'; progCard.appendChild(progTxt);
  var progBarW = document.createElement('div'); progBarW.className = 'prog-bar'; progCard.appendChild(progBarW);
  var progFill = document.createElement('div'); progFill.className = 'prog-fill'; progBarW.appendChild(progFill);
  wrap.appendChild(progCard);

  function countDone() {
    return colorways.filter(function(cw) {
      return Object.keys(cw.orderedSizes).some(function(sz) {
        return parseInt((jst.sizeData[cw.liId + '__' + sz] || {}).caught) > 0;
      });
    }).length;
  }
  function updProg() {
    var n = countDone();
    progTxt.textContent = n + ' of ' + colorways.length + ' colorway' + (colorways.length !== 1 ? 's' : '') + ' counted';
    progFill.style.width = colorways.length ? Math.round(n / colorways.length * 100) + '%' : '0%';
    if (jst.status !== 'qc-done' && sbBtn) { sbBtn.disabled = n < colorways.length; sbBtn.style.opacity = sbBtn.disabled ? '0.5' : '1'; }
  }

  // Colorway cards
  colorways.forEach(function(cw) {
    (function(cw) {
      var isDone = Object.keys(cw.orderedSizes).some(function(sz) {
        return parseInt((jst.sizeData[cw.liId + '__' + sz] || {}).caught) > 0;
      });
      var cwCard = document.createElement('div');
      cwCard.className = 'cw-card' + (isDone ? ' counted' : '');
      wrap.appendChild(cwCard);

      // Image col
      var imgCol = document.createElement('div'); imgCol.className = 'cw-img'; cwCard.appendChild(imgCol);
      if (cw.proofThumb) {
        var ci = document.createElement('img'); ci.src = cw.proofThumb; ci.alt = '';
        ci.onclick = function() { openProof(job); };
        imgCol.appendChild(ci);
      }

      // Input col
      var inCol = document.createElement('div'); inCol.className = 'cw-inputs'; cwCard.appendChild(inCol);

      // Column headers
      var colHdr = document.createElement('div'); colHdr.className = 'cw-col-hdr';
      colHdr.innerHTML = '<div>Sz</div><div>Ord</div><div>Caught</div><div>Dmg</div>';
      inCol.appendChild(colHdr);

      // Size rows
      var sizeKeys = Object.keys(cw.orderedSizes).sort(function(a,b){ return SZ_ORDER.indexOf(a) - SZ_ORDER.indexOf(b); });
      sizeKeys.forEach(function(sz) {
        var k = cw.liId + '__' + sz;
        var sd = jst.sizeData[k];
        var ordered = cw.orderedSizes[sz] || 0;
        var rowWrap = document.createElement('div'); inCol.appendChild(rowWrap);
        var row = document.createElement('div'); row.className = 'cw-sz-row'; rowWrap.appendChild(row);
        var szLbl = document.createElement('div'); szLbl.className = 'sz-lbl'; szLbl.textContent = sz; row.appendChild(szLbl);
        var szOrd = document.createElement('div'); szOrd.className = 'sz-ord'; szOrd.textContent = ordered; row.appendChild(szOrd);
        var cInp = document.createElement('input'); cInp.className = 'sz-in'; cInp.type = 'number'; cInp.min = '0';
        cInp.placeholder = '--'; cInp.value = sd.caught || ''; row.appendChild(cInp);
        var dInp = document.createElement('input'); dInp.className = 'sz-in' + (parseInt(sd.damaged) > 0 ? ' dmg' : '');
        dInp.type = 'number'; dInp.min = '0'; dInp.placeholder = '0'; dInp.value = sd.damaged || ''; row.appendChild(dInp);

        if (parseInt(sd.damaged) > 0) rowWrap.appendChild(buildReasonPanel(sd, function(){ recalc(job, jst); updProg(); }));

        cInp.oninput = function() {
          sd.caught = cInp.value;
          var done = Object.keys(cw.orderedSizes).some(function(s2) { return parseInt((jst.sizeData[cw.liId + '__' + s2] || {}).caught) > 0; });
          cwCard.className = 'cw-card' + (done ? ' counted' : '');
          recalc(job, jst); updProg();
        };
        dInp.oninput = function() {
          sd.damaged = dInp.value;
          dInp.className = 'sz-in' + (parseInt(dInp.value) > 0 ? ' dmg' : '');
          var ex = rowWrap.querySelector('.reason-panel');
          if (parseInt(dInp.value) > 0) { if (!ex) rowWrap.appendChild(buildReasonPanel(sd, function(){ recalc(job, jst); })); }
          else { if (ex) ex.remove(); sd.reasons = []; }
          recalc(job, jst);
        };
      });
    })(cw);
  });

  // Spoilage card
  var spoilCard = document.createElement('div'); spoilCard.className = 'spoil'; spoilCard.id = 'spoilCard';
  renderSpoilage(spoilCard, job, jst);
  wrap.appendChild(spoilCard);

  // Action row
  var actRow = document.createElement('div'); actRow.className = 'act-row';
  if (jst.status === 'qc-done') {
    var mc = document.createElement('button'); mc.className = 'btn-mark'; mc.textContent = '✓ Mark Complete';
    mc.onclick = function() { markComplete(jobId); };
    actRow.appendChild(mc);
  }
  var sbBtn = document.createElement('button'); sbBtn.className = 'btn-submit';
  sbBtn.textContent = jst.status === 'qc-done' ? 'Update QC' : 'Submit QC';
  sbBtn.onclick = function() { jst.status = 'qc-done'; renderQC(); };
  actRow.appendChild(sbBtn);
  wrap.appendChild(actRow);

  updProg();
}

// ── REASON PANEL ─────────────────────────────────────────────
function buildReasonPanel(sd, onChange) {
  var panel = document.createElement('div'); panel.className = 'reason-panel';
  var lbl = document.createElement('div'); lbl.className = 'reason-lbl'; lbl.textContent = 'Damage reason'; panel.appendChild(lbl);
  var chips = document.createElement('div'); chips.className = 'reason-chips'; panel.appendChild(chips);
  DMG_REASONS.forEach(function(r) {
    var c = document.createElement('span');
    c.className = 'rchip' + ((sd.reasons && sd.reasons.indexOf(r) >= 0) ? ' on' : '');
    c.textContent = r;
    c.onclick = function() {
      if (!sd.reasons) sd.reasons = [];
      var idx = sd.reasons.indexOf(r);
      if (idx >= 0) sd.reasons.splice(idx, 1); else sd.reasons.push(r);
      c.className = 'rchip' + (sd.reasons.indexOf(r) >= 0 ? ' on' : '');
      if (onChange) onChange();
    };
    chips.appendChild(c);
  });
  return panel;
}

// ── SPOILAGE ─────────────────────────────────────────────────
function recalc(job, jst) {
  var damaged = 0;
  Object.values(jst.sizeData).forEach(function(sd){ damaged += parseInt(sd.damaged) || 0; });
  jst.spoilage = job.qty > 0 ? (damaged / job.qty) * 100 : 0;
  var sc = document.getElementById('spoilCard');
  if (sc) renderSpoilage(sc, job, jst);
}

function renderSpoilage(container, job, jst) {
  container.innerHTML = '';
  var damaged = 0;
  Object.values(jst.sizeData).forEach(function(sd){ damaged += parseInt(sd.damaged) || 0; });
  var pct = job.qty > 0 ? (damaged / job.qty) * 100 : 0;
  jst.spoilage = pct;
  var isBandana = job.isBandana;
  var resolution = 'NO ACTION', resClass = 'res-ok';
  if (damaged > 0) {
    if (isBandana) { resolution = 'LOGGED'; resClass = 'res-ok'; }
    else if (pct < 1) { resolution = 'NO ACTION'; resClass = 'res-ok'; }
    else if (pct < 5) { resolution = 'REVIEW'; resClass = 'res-warn'; }
    else { resolution = 'RE-PRINT'; resClass = 'res-bad'; }
  }
  var pctCls = pct > 50 ? 'bad' : pct > 5 ? 'warn' : 'ok';
  var r1 = document.createElement('div'); r1.className = 'spoil-row';
  var sl = document.createElement('span'); sl.className = 'spoil-lbl'; sl.textContent = 'Spoilage';
  var sp = document.createElement('span'); sp.className = 'spoil-pct ' + pctCls; sp.textContent = pct.toFixed(1) + '%';
  r1.appendChild(sl); r1.appendChild(sp); container.appendChild(r1);
  var bw = document.createElement('div'); bw.className = 'spoil-bar-wrap';
  var bf = document.createElement('div'); bf.className = 'spoil-bar ' + pctCls; bf.style.width = Math.min(100, pct) + '%';
  bw.appendChild(bf); container.appendChild(bw);
  var r2 = document.createElement('div'); r2.className = 'spoil-row';
  var rl = document.createElement('span'); rl.className = 'spoil-lbl'; rl.textContent = 'Resolution';
  var rb = document.createElement('span'); rb.className = 'res-badge ' + resClass; rb.textContent = resolution;
  r2.appendChild(rl); r2.appendChild(rb); container.appendChild(r2);
  if (damaged > 0) {
    var r3 = document.createElement('div'); r3.className = 'spoil-row'; r3.style.marginTop = '6px';
    var dl = document.createElement('span'); dl.className = 'spoil-lbl'; dl.textContent = 'Damaged';
    var dv = document.createElement('span'); dv.style.cssText = 'font-size:11px;color:var(--muted)'; dv.textContent = damaged + ' of ' + job.qty + ' pcs';
    r3.appendChild(dl); r3.appendChild(dv); container.appendChild(r3);
  }
}

// ── MARK COMPLETE ─────────────────────────────────────────────
function markComplete(jobId) {
  var jst = qcState[jobId] || {};
  var job = jobs.find(function(j){ return j.id === jobId; });
  if (jst) jst.status = 'complete';
  jobs = jobs.filter(function(j){ return j.id !== jobId; });
  if (WRITES_ENABLED && job) writeDamageLog(job, jst);
  renderQueue();
}

// ── DAMAGE LOG WRITE (guarded) ────────────────────────────────
function writeDamageLog(job, jst) {
  var lines = []; var totalDamaged = 0;
  Object.entries(jst.sizeData || {}).forEach(function(e) {
    var sz = e[0].split('__').pop(), sd = e[1];
    var dmg = parseInt(sd.damaged) || 0;
    if (dmg > 0) {
      var reasons = (sd.reasons && sd.reasons.length) ? (' [' + sd.reasons.join(', ') + ']') : '';
      lines.push(dmg + ' x ' + sz + reasons);
      totalDamaged += dmg;
    }
  });
  if (!totalDamaged) return;
  var ts = new Date().toLocaleString('en-US', {timeZone:'America/Denver', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
  var summary = '[' + ts + '] ' + job.imprintIds.join(', ') + ': ' + lines.join(', ') + (jst.notes ? ' | ' + jst.notes : '');
  if (job.orderRecordId) {
    var ordFields = {}; ordFields[F_ORD_DMG_FLAG] = true; ordFields[F_ORD_DMG_SUMM] = summary;
    fetch('https://api.airtable.com/v0/' + BASE + '/' + TOR + '/' + job.orderRecordId, {
      method: 'PATCH', headers: {Authorization:'Bearer '+pat,'Content-Type':'application/json'},
      body: JSON.stringify({fields: ordFields})
    }).catch(function(){});
  }
}

// ── PROOF MODAL ───────────────────────────────────────────────
var pmProofs = [], pmIdx = 0;
function openProof(job) {
  pmProofs = job.proofs; pmIdx = 0;
  document.getElementById('proofModal').classList.add('open');
  pmShow();
}
function closeProof() { document.getElementById('proofModal').classList.remove('open'); }
function pmNav(dir) { pmIdx = Math.max(0, Math.min(pmProofs.length - 1, pmIdx + dir)); pmShow(); }
function pmShow() {
  if (!pmProofs.length) return;
  var p = pmProofs[pmIdx];
  document.getElementById('pmFn').textContent = p.filename || 'Proof ' + (pmIdx + 1);
  document.getElementById('pmCt').textContent = (pmIdx + 1) + '/' + pmProofs.length;
  var body = document.getElementById('pmBody');
  body.innerHTML = '<div style="color:#666;font-size:12px">Loading…</div>';
  var img = new Image();
  img.onload = function() { body.innerHTML = ''; img.style.cssText='max-width:100%;max-height:100%;border-radius:4px;object-fit:contain'; body.appendChild(img); };
  img.onerror = function() { body.innerHTML = '<div style="color:#666;font-size:12px">Could not load proof</div>'; };
  img.src = p.thumb || p.url;
}
