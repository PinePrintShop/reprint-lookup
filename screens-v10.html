<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screens v10 — Pine Central</title>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--yellow-dim:#E8E83230;--yellow-border:#E8E83250;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --sb-bg:#0A0A08;--sb-border:#1A1A16;--sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'Courier New',monospace;
  --radius:4px;--radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

/* STATS BAR */
.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:14px 16px;gap:6px;scrollbar-width:none;flex-shrink:0;align-items:center}
.stats-bar::-webkit-scrollbar{display:none}

/* CONTENT */
.content{padding:12px 16px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:10px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.search-lbl{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);white-space:nowrap}
.toolbar input{flex:1;max-width:260px;padding:5px 9px;border:1px solid var(--border-dk);border-radius:var(--radius);font-size:12px;font-family:var(--sans);background:var(--bg);color:var(--text);outline:none}
.toolbar input:focus{border-color:var(--green)}
.toolbar input::placeholder{color:var(--muted-lt)}
.tbright{margin-left:auto;display:flex;align-items:center;gap:8px}

/* DATE & ORDER HEADERS — matches seps */
.date-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond);padding:14px 0 4px;display:flex;align-items:center;justify-content:space-between}
.date-hdr:first-child{padding-top:0}
.date-hdr.today{color:var(--text)}
.date-hdr-right{font-weight:400;color:var(--muted-lt)}
.order-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em;padding:8px 0 3px;font-family:var(--cond);display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.order-hdr:hover{color:var(--text)}
.order-num{font-family:var(--mono);color:var(--green);font-size:10px}
.order-cust{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.order-ct{color:var(--muted-lt);font-size:8px}
.order-chv{font-size:8px;color:var(--muted-lt);transition:transform .15s}
.order-group.collapsed .order-chv{transform:rotate(-90deg)}
.order-group.collapsed .order-body{display:none}

/* JOB CARDS — stacked list matching seps */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer;transition:border-color .12s;margin-bottom:4px}
.job-card:hover{border-color:var(--border-dk)}
.job-card.seped{border-left:3px solid var(--green)}
.job-card.burned{border-left:3px solid var(--green);opacity:.55}
.jc-thumb{width:48px;height:48px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.jc-thumb img{width:100%;height:100%;object-fit:cover}
.jc-thumb-ph{width:18px;height:18px;opacity:.2}
.jc-info{flex:1;min-width:0}
.jc-sup{font-size:9px;color:var(--muted-lt);letter-spacing:.04em;margin-bottom:1px;font-family:var(--mono)}
.jc-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--cond)}
.jc-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}

/* Burn checkbox */
.ck{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;color:var(--muted);cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.06em;font-family:var(--cond)}
.ck:hover{color:var(--green)}
.ck-box{width:13px;height:13px;border-radius:2px;border:1.5px solid var(--border-dk);display:flex;align-items:center;justify-content:center;flex-shrink:0;background:#fff;transition:all .1s}
.ck.on .ck-box{background:var(--green);border-color:var(--green)}
.ck.on{color:var(--green)}
.rep-badge{font-size:7px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-bd);padding:1px 5px;border-radius:2px;margin-left:4px;font-family:var(--cond);vertical-align:middle}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;font-size:11px}
.spin{width:16px;height:16px;border:2px solid var(--border);border-top:2px solid var(--muted);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

/* TOAST */
#toast{position:fixed;top:20px;right:20px;background:var(--sb-bg);color:var(--yellow);padding:12px 16px;border-radius:var(--radius);font-size:12px;font-weight:700;z-index:2000;transform:translateY(-100px);opacity:0;transition:all .3s}
#toast.show{transform:translateY(0);opacity:1}

/* MOBILE */
@media(max-width:600px){
  .content{padding:16px}
  .queue-grid{grid-template-columns:1fr;gap:12px}
  .stats-bar{padding:10px 12px;gap:4px}
  .toolbar{padding:10px 12px;gap:8px}
}
</style>
</head>
<body>

<!-- STATS BAR -->
<div class="stats-bar" id="statsBar">
  <div class="stat-cell active" id="fc-all" onclick="setFilter('all')">All Jobs<span class="stat-ct" id="sAll">0</span></div>
  <div class="stat-cell" id="fc-ready" onclick="setFilter('ready')">Ready to Burn<span class="stat-ct" id="sReady">0</span></div>
  <div class="stat-cell" id="fc-burned" onclick="setFilter('burned')">Burned<span class="stat-ct" id="sBurned">0</span></div>
  <div class="stat-cell" id="fc-repeat" onclick="setFilter('repeat')">Repeats<span class="stat-ct" id="sRepeat">0</span></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar" id="toolbar">
  <span class="search-lbl">Search</span>
  <input type="text" id="search" placeholder="Order #, customer, imprint ID..." oninput="render()">
  <div class="tbright">
    <button class="btn-refresh" onclick="loadData()">Refresh</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div id="root">
    <div class="loading"><div class="spin"></div>Loading queue…</div>
  </div>
</div>

<div id="toast"></div>

<script>
var BASE = 'appJkaLk8DykjsgHR';
var TBL  = 'tbln9oAGvz2PNBZLV';

var F = {
  imprintId:  'fldDFfwFQ9B20n2kT',
  impType:    'fldjNCuaGOkWgzH2K',
  proof:      'fldUOIfCd22MxevRm',
  seped:      'fldlMcHtldbifKzDN',
  burned:     'fldEL51Nwrxuyn9Zo',
  printDesc:  'fld0jStSNsRNjjeZy',
  customer:   'fldeLMIAC0ABQAjYJ',
  schedStart: 'fldfqtIgcEfIlIeQk',
  impressions:'fldFipR4ddfqMPeAX',
  repeat:     'flda9L7041ahNZT0b',
  screens:    'fld8rgkIj1RPO97QU',
  printNotes: 'fldNuEzGIYI8FWqXu',
  inkNames:   'fldMM5hp8kEpo3KKT'
};

var ALL = [], state = {}, activeFilter = 'all';
var SKIP_TYPES = new Set(['Embroidery','Patch Application','Hem Label Application','Woven Label Application','Patch/Label ONLY','Finishing - Fold & Bag','Finishing - UPC sticker','Finishing - Bandana Hanger','Hem Label','Woven Label']);
var ACTIVE_STATUSES = new Set(['Pre-press','Ordered - In Production','Received & Staged','Scheduled, Screened, & Inbound','On-Press','Delayed - Mis-Print','Delayed - Mis-Shipment - Needs Order','Delayed - Mis-Print - Needs Order']);

function getToken() {
  return localStorage.getItem('pine_at_key') || '';
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function apiGet(url) {
  var token = getToken();
  if (!token) throw new Error('No API token');
  var res = await fetch('https://api.airtable.com/v0/' + BASE + '/' + url, {
    headers: { 'Authorization': 'Bearer ' + token }
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

async function apiPatch(recordId, fields) {
  var token = getToken();
  if (!token) throw new Error('No API token');
  var res = await fetch('https://api.airtable.com/v0/' + BASE + '/' + TBL + '/' + recordId, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + token,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ fields: fields })
  });
  if (!res.ok) throw new Error('Update failed: ' + res.status);
  return res.json();
}

function flatLookup(val) {
  if (!val) return [];
  if (Array.isArray(val)) return val;
  if (val.valuesByLinkedRecordId) {
    return Object.values(val.valuesByLinkedRecordId).reduce((a,b) => a.concat(b), []);
  }
  return [val];
}

function parseRecords(records) {
  var out = [];
  records.forEach(r => {
    var f = r.fields || {};
    var iid = f[F.imprintId] || '';
    if (!iid || iid.indexOf('-') < 0) return;
    
    var orderNum = parseInt(iid.split('-')[0], 10);
    if (!isNaN(orderNum) && orderNum < 9400) return;
    
    var typeName = f[F.impType] || '';
    if (SKIP_TYPES.has(typeName)) return;

    // Check if order status is active
    var statusOk = false;
    Object.values(f).forEach(v => {
      flatLookup(v).forEach(s => { if (ACTIVE_STATUSES.has(s)) statusOk = true; });
    });
    if (!statusOk) return;

    // SCREEN ROOM FILTER: Only show jobs that are already sep'd (ready for screen burning)
    var isSepd = f[F.seped] === true;
    if (!isSepd) return; // Skip jobs that aren't sep'd yet

    var proofs = flatLookup(f[F.proof]);
    if (!proofs.length) return;
    
    var fp = proofs[0];
    var thumbUrl = '', largeUrl = '';
    if (fp && typeof fp === 'object' && fp.thumbnails) {
      thumbUrl = (fp.thumbnails.large && fp.thumbnails.large.url) || 
                 (fp.thumbnails.small && fp.thumbnails.small.url) || '';
      largeUrl = thumbUrl;
    } else if (typeof fp === 'string' && fp.indexOf('http') === 0) {
      thumbUrl = fp; largeUrl = fp;
    }
    if (!thumbUrl) return;

    var cust = f[F.customer];
    if (Array.isArray(cust)) cust = cust[0] || '';
    cust = cust || '';

    out.push({
      id: r.id,
      i: iid,
      o: iid.split('-')[0],
      n: f[F.printDesc] || '',
      t: typeName,
      s: f[F.screens] || null,
      sp: f[F.seped] === true,
      b: f[F.burned] === true,
      rp: f[F.repeat] === true,
      c: cust,
      pn: f[F.printNotes] || '',
      due: (f[F.schedStart] || '').slice(0,10),
      qty: f[F.impressions] || null,
      thumbUrl: thumbUrl,
      largeUrl: largeUrl,
      inks: f[F.inkNames] || ''
    });
  });

  // Sort: dated first (by due date), then undated (by order number desc)
  var dated   = out.filter(x => x.due).sort((a,b) => a.due.localeCompare(b.due) || a.i.localeCompare(b.i));
  var undated = out.filter(x => !x.due).sort((a,b) => b.o.localeCompare(a.o) || a.i.localeCompare(b.i));
  return dated.concat(undated);
}

function setFilter(f) {
  activeFilter = f;
  document.querySelectorAll('.stat-cell').forEach(c => c.classList.remove('active'));
  var el = document.getElementById('fc-' + f);
  if (el) el.classList.add('active');
  render();
}

function updateStats() {
  var ready  = ALL.filter(r => !(state[r.id] || r).b).length; // sep'd but not burned
  var burned = ALL.filter(r => (state[r.id] || r).b).length;
  var rep    = ALL.filter(r => r.rp).length;
  
  document.getElementById('sAll').textContent = ALL.length;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sBurned').textContent = burned;
  document.getElementById('sRepeat').textContent = rep;
}

function getFiltered() {
  var search = document.getElementById('search').value.toLowerCase();
  var filtered = ALL;

  // Status filtering
  if (activeFilter === 'ready') {
    // Show sep'd jobs that haven't been burned yet
    filtered = ALL.filter(r => !(state[r.id] || r).b);
  } else if (activeFilter === 'burned') {
    filtered = ALL.filter(r => (state[r.id] || r).b);
  } else if (activeFilter === 'repeat') {
    filtered = ALL.filter(r => r.rp);
  }

  if (search) {
    filtered = filtered.filter(r => 
      r.i.toLowerCase().includes(search) ||
      r.o.toLowerCase().includes(search) ||
      r.c.toLowerCase().includes(search) ||
      r.n.toLowerCase().includes(search)
    );
  }

  return filtered;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  try { return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); } catch(e){ return d; }
}
function daysDiff(d) {
  if (!d) return null;
  var t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(d+'T12:00:00') - t) / 864e5);
}

function groupByDate(records) {
  var map = {}, order = [];
  records.forEach(function(r) {
    var key = r.due || 'undated';
    if (!map[key]) { map[key] = []; order.push(key); }
    map[key].push(r);
  });
  return order.map(function(d) { return { date: d, records: map[d] }; });
}

function groupByOrder(records) {
  var map = {}, order = [];
  records.forEach(function(r) {
    if (!map[r.o]) { map[r.o] = []; order.push(r.o); }
    map[r.o].push(r);
  });
  return order.map(function(o) { return { orderNum: o, imprints: map[o] }; });
}

function render() {
  var filtered = getFiltered();
  var dateGroups = groupByDate(filtered);
  var html = '';
  if (!dateGroups.length) {
    html = '<div class="empty">No sep\'d imprints waiting to burn.</div>';
  } else {
    dateGroups.forEach(function(dg) { html += buildDateGroup(dg); });
  }
  document.getElementById('root').innerHTML = html;
}

function buildDateGroup(dg) {
  var days = daysDiff(dg.date);
  var isToday = days === 0;
  var lbl = dg.date === 'undated' ? 'No Print Date'
    : isToday ? 'Today'
    : days === 1 ? 'Tomorrow'
    : days < 0 ? fmtDate(dg.date) + ' (Past)'
    : fmtDate(dg.date);
  var daySuffix = (dg.date !== 'undated' && days !== null && days < 0)
    ? ' <span class="tag r">' + Math.abs(days) + 'd ago</span>'
    : (dg.date !== 'undated' && days !== null && days === 0)
    ? ' <span class="tag k">Today</span>'
    : '';

  var orderGroups = groupByOrder(dg.records);
  var html = '<div class="date-hdr' + (isToday ? ' today' : '') + '">' + esc(lbl) + daySuffix +
    '<span class="date-hdr-right">' + dg.records.length + ' imprint' + (dg.records.length !== 1 ? 's' : '') + '</span></div>';
  orderGroups.forEach(function(og) { html += buildOrderGroup(og); });
  return html;
}

function buildOrderGroup(og) {
  var gid = 'og-' + og.orderNum;
  return '<div class="order-group" id="' + gid + '">' +
    '<div class="order-hdr" onclick="toggleOrder(\'' + gid + '\')">' +
      '<span class="order-num">#' + esc(og.orderNum) + '</span>' +
      '<span class="order-cust">' + esc(og.imprints[0].c) + '</span>' +
      '<span class="order-ct">' + og.imprints.length + ' imprint' + (og.imprints.length !== 1 ? 's' : '') + '</span>' +
      '<span class="order-chv">&#9660;</span>' +
    '</div>' +
    '<div class="order-body">' + og.imprints.map(buildCard).join('') + '</div>' +
  '</div>';
}

function toggleOrder(gid) {
  document.getElementById(gid).classList.toggle('collapsed');
}

function buildCard(r) {
  var current = state[r.id] || r;
  var cardCls = 'job-card' + (current.b ? ' burned' : ' seped');

  var thumbHtml = r.thumbUrl
    ? '<img src="' + esc(r.thumbUrl) + '" onerror="this.style.display=\'none\'">'
    : '<svg class="jc-thumb-ph" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';

  var badges = r.rp ? '<span class="rep-badge">Repeat</span>' : '';

  var compactTags = '';
  if (r.t) compactTags += '<span class="tag n">' + esc(r.t) + '</span>';
  if (r.s) compactTags += '<span class="tag n">' + r.s + ' screen' + (r.s !== 1 ? 's' : '') + '</span>';
  if (r.qty) compactTags += '<span class="tag n">qty ' + r.qty + '</span>';
  if (r.inks) compactTags += '<div style="font-size:10px;color:var(--muted-lt);margin-top:3px;font-family:var(--cond)">' + esc(r.inks) + '</div>';

  var burnCheck = '<div class="ck' + (current.b ? ' on' : '') + '" onclick="event.stopPropagation();toggleBurned(ALL.find(function(j){return j.id===\'' + r.id + '\'}))">' +
    '<span class="ck-box">' + (current.b ? '&#10003;' : '') + '</span>' +
    (current.b ? 'Burned' : 'Mark Burned') +
  '</div>';

  return '<div class="' + cardCls + '">' +
    '<div class="jc-thumb">' + thumbHtml + '</div>' +
    '<div class="jc-info">' +
      '<div class="jc-sup">' + esc(r.i) + '</div>' +
      '<div class="jc-name">' + esc(r.n || r.i) + badges + '</div>' +
      '<div class="jc-meta">' + compactTags + '</div>' +
    '</div>' +
    '<div class="jc-right">' + burnCheck + '</div>' +
  '</div>';
}

async function toggleBurned(job) {
  var current = state[job.id] || job;
  var newState = !current.b;
  
  try {
    await apiPatch(job.id, { [F.burned]: newState });
    state[job.id] = { ...current, b: newState };
    showToast(`${job.i} marked as ${newState ? 'burned' : 'not burned'}`);
    updateStats();
    render();
  } catch (err) {
    console.error('Failed to update burned status:', err);
    showToast('Failed to update status');
  }
}

async function loadData() {
  try {
    document.getElementById('root').innerHTML = '<div class="loading"><div class="spin"></div>Loading sep\'d jobs…</div>';
    
    // Date window: created in last 60 days
    var cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - 60);
    var formula = 'IS_AFTER(CREATED_TIME(), "' + cutoff.toISOString().slice(0,10) + '")';
    
    var params = new URLSearchParams({
      'returnFieldsByFieldId': 'true',
      'pageSize': '100',
      'filterByFormula': formula
    });
    // Request only the fields we use — reduces payload size significantly
    Object.values(F).forEach(function(fid) { params.append('fields[]', fid); });
    // Also need Order Status Lookup for status filtering (scanned by parseRecords)
    params.append('fields[]', 'fldNROVFSsBwLUOYW');
    
    var data = await apiGet(TBL + '?' + params.toString());
    ALL = parseRecords(data.records || []);
    
    updateStats();
    render();
    
    // Load all pages if needed
    while (data.offset) {
      params.set('offset', data.offset);
      data = await apiGet(TBL + '?' + params.toString());
      var moreRecords = parseRecords(data.records || []);
      ALL = ALL.concat(moreRecords);
      updateStats();
      render();
    }
    
  } catch (err) {
    console.error('Load error:', err);
    document.getElementById('root').innerHTML = 
      '<div class="loading">Error loading data. Check token and try again.</div>';
  }
}

// Initialize
function init() {
  if (getToken()) {
    loadData();
  } else {
    document.getElementById('root').innerHTML = 
      '<div class="loading">No API token found. Set token in Pine Central shell and click Refresh.</div>';
  }
}

init();
</script>
</body>
</html>
