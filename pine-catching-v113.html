<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catching Queue v113 · Pine Central</title>
<style>
:root{
  --bg:#F2F2EE;--surface:#fff;--border:#E5E5E0;--border-dk:#D0D0CA;
  --green:#1e6b45;--green-lt:#e8f5ee;--green-md:#2d8a5a;--green-dk:#144d31;
  --text:#0D0D0B;--muted:#888880;--muted-lt:#BBBBB5;
  --yellow:#E8E832;--yellow-dim:#E8E83230;--yellow-border:#E8E83250;
  --red:#c0392b;--red-bg:#fdf2f2;--red-bd:#f5c6c6;
  --amb:#b7791f;--amb-bg:#fffbeb;--amb-bd:#fde68a;
  --sb-bg:#0A0A08;--sb-border:#1A1A16;--sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:Helvetica,Arial,sans-serif;
  --mono:Helvetica,Arial,sans-serif;
  --radius:4px;--radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body{padding-bottom:28px} /* reserve space for preview-badge statusbar */

/* Press tabs */
.press-bar{display:flex;align-items:center;gap:8px;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:0;z-index:50;flex-shrink:0}
.press-tabs{display:flex;overflow-x:auto;gap:6px;scrollbar-width:none;flex:1;min-width:0}
.press-tabs::-webkit-scrollbar{display:none}
.pt{font-size:10px;font-weight:700;padding:5px 12px;border:1px solid var(--border-dk);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;transition:all .1s;font-family:var(--cond);display:flex;align-items:center}
.pt:hover{border-color:var(--text);color:var(--text)}
.pt.on{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.pt-ct{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:8px;background:rgba(255,255,255,.08);font-size:9px;padding:0 4px;margin-left:5px;color:var(--muted-lt);font-family:var(--mono)}
.pt.on .pt-ct{background:rgba(232,232,50,.15);color:var(--yellow)}
.btn-refresh{font-size:10px;font-weight:700;padding:5px 12px;border:1px solid var(--border-dk);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .1s}
.btn-refresh:hover{border-color:var(--text);color:var(--text)}
.btn-refresh:disabled{opacity:.5;cursor:wait}
.btn-refresh .rf-icon{display:inline-block;transition:transform .6s}
.btn-refresh.spinning .rf-icon{animation:sp .7s linear infinite}

/* Content */
.content{padding:20px;max-width:none}

/* Cards — exact v9 */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:10px}
.card-h{padding:9px 14px;border-bottom:1px solid var(--bg);display:flex;align-items:center;justify-content:space-between}
.card-t{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.14em;font-weight:700;font-family:var(--cond)}
.card-a{font-size:9px;color:var(--muted-lt);cursor:pointer;font-family:var(--cond);font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.card-a:hover{color:var(--green)}
.card-b{padding:12px 14px}

/* Rows — exact v9 */
.row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bg)}
.row:last-child{border-bottom:none}
.row-n{font-size:10px;color:var(--muted-lt);width:40px;flex-shrink:0;font-weight:600;font-family:var(--mono)}
.row-m{flex:1;min-width:0}
.row-name{font-size:12px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em}
.row-sub{font-size:10px;color:var(--muted-lt);margin-top:1px;font-family:var(--mono)}

/* Tags — exact v9 */
.tag{font-size:8px;padding:2px 7px;border-radius:2px;white-space:nowrap;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border:1px solid;font-family:var(--cond)}
.tag.g{background:var(--sb-bg);color:var(--yellow);border-color:var(--yellow-border)}
.tag.y{background:var(--sb-bg);color:var(--yellow);border-color:var(--yellow-border)}
.tag.r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.tag.n{background:var(--surface);color:var(--muted);border-color:var(--border)}
.tag.amb{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}

/* Buttons — exact v9 */
.btn{background:var(--bg);border:1px solid var(--border-dk);border-radius:var(--radius);color:var(--muted);font-size:9px;padding:5px 10px;cursor:pointer;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;transition:all .1s}
.btn:hover{border-color:var(--text);color:var(--text)}
.btn.p{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.btn.p:hover{background:#1A1A16}
.btn.grn{background:var(--green-lt);border-color:#b8dfcc;color:var(--green-dk)}
.btn.grn:hover{background:#d4eddf}

/* Queue header */
.q-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.q-title{font-size:10px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.q-date{font-size:10px;color:var(--muted-lt);font-family:var(--mono)}

/* Order group — bundles all cards from same order under a collapsible header */
.og{margin-bottom:18px}
.og-hdr{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;margin-bottom:6px}
.og-hdr:hover{background:var(--surface);border-color:var(--border-dk)}
.og-caret{font-size:10px;color:var(--muted);font-family:var(--mono);width:12px;flex-shrink:0;transition:transform .12s}
.og-hdr.collapsed .og-caret{transform:rotate(-90deg)}
.og-num{font-size:14px;font-weight:700;color:var(--text);font-family:var(--cond);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;flex-shrink:0}
.og-cust{font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.04em;font-family:var(--cond);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.og-meta{display:flex;gap:5px;align-items:center;flex-shrink:0}
.og-meta .tag{font-size:9px;padding:2px 7px}
.og-cards{display:flex;flex-direction:column;gap:0}
.og-cards.collapsed{display:none}

/* Job card — bigger, order# on the right is the visual anchor */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);display:flex;align-items:center;gap:16px;padding:16px 18px;cursor:pointer;transition:border-color .12s,box-shadow .12s;margin-bottom:8px}
.job-card:hover{border-color:var(--green);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.job-card.flagged{border-color:var(--red-bd);background:var(--red-bg)}
.jc-thumb{width:80px;height:80px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.jc-thumb img{width:100%;height:100%;object-fit:cover}
.jc-thumb-ph{width:24px;height:24px;opacity:.2}
.jc-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.jc-name{font-size:20px;font-weight:700;text-transform:uppercase;letter-spacing:.01em;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:var(--cond);color:var(--text)}
.jc-name.muted{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.06em}
.jc-meta{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.jc-meta .tag{font-size:10px;padding:3px 9px}
.jc-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;min-width:90px}
.jc-order{font-size:36px;font-weight:700;letter-spacing:-0.02em;color:var(--text);font-family:var(--cond);line-height:1}
.jc-status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);color:var(--muted-lt)}
.jc-status.qcd{color:var(--green)}
.jc-status.complete{color:var(--green-dk)}

/* Status (kept for in-queue inline complete button) */
.status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.status.pending{color:var(--muted-lt)}
.status.qcd{color:var(--green);background:var(--green-lt);padding:2px 6px;border-radius:2px}
.status.complete{color:#fff;background:var(--green);padding:2px 6px;border-radius:2px}

/* Progress */
.prog-wrap{margin-bottom:10px}
.prog-txt{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;font-family:var(--cond)}
.prog-bar{height:4px;background:var(--bg);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* QC detail */
.qc-wrap{padding:20px;max-width:none}
.qc-back{margin-bottom:14px}

/* Colorway card — v110: horizontal split (mockup left, tally right) */
.cw-card{background:var(--surface);border:2px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:14px;display:flex;flex-direction:row;min-height:520px}
.cw-card.counted{border-color:var(--green)}
.cw-card.active{border-color:var(--text);box-shadow:0 0 0 3px var(--yellow-dim)}

/* Left side: large mockup + meta */
.cw-left{width:42%;flex-shrink:0;background:var(--bg-soft,#F8F8F5);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:14px;gap:10px}
.cw-left-meta{flex-shrink:0}
.cw-meta-name{font-size:18px;font-weight:700;color:var(--text);font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cw-meta-sub{font-size:12px;color:var(--muted);font-family:var(--mono);margin-top:4px}
.cw-img{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;min-height:240px;padding:12px}
.cw-img img{max-width:100%;max-height:100%;width:auto;height:auto;display:block;object-fit:contain}
.cw-img-ph{opacity:.15;width:48px;height:48px}
.cw-img-hint{font-size:9px;color:var(--muted-lt);text-align:center;font-family:var(--cond);text-transform:uppercase;letter-spacing:.1em;flex-shrink:0}

/* Right side: tally controls */
.cw-right{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.tally-bar{padding:14px;display:flex;flex-direction:column;gap:12px;flex:1;overflow-y:auto}
.tb-banner{padding:18px;background:var(--yellow-dim);border:2px dashed var(--yellow-border);border-radius:var(--radius);text-align:center;font-size:12px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}

/* Size picker row */
.tb-sz-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tb-sz-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond);flex-shrink:0}
.tb-sz-chips{display:flex;gap:6px;flex-wrap:wrap;flex:1}
.tb-sz-chip{position:relative;min-width:54px;padding:8px 10px;border-radius:var(--radius);border:2px solid var(--border-dk);background:var(--surface);font-size:14px;font-weight:700;color:var(--text);font-family:var(--cond);cursor:pointer;text-align:center;line-height:1;transition:all .1s;user-select:none}
.tb-sz-chip:hover{border-color:var(--text)}
.tb-sz-chip.active{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.tb-sz-ord{display:block;font-size:9px;font-weight:600;color:var(--muted-lt);font-family:var(--mono);margin-top:2px}
.tb-sz-chip.active .tb-sz-ord{color:var(--yellow);opacity:.7}
.tb-spoil{font-size:14px;font-weight:700;font-family:var(--mono);padding:4px 10px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);flex-shrink:0}
.tb-spoil.ok{color:var(--green)}.tb-spoil.warn{color:var(--amb)}.tb-spoil.bad{color:var(--red)}

/* Caught row */
.tb-caught-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.tb-caught-lbl{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);min-width:60px;flex-shrink:0}
.tb-caught-btn{flex:0 0 auto;padding:10px 16px;border-radius:var(--radius);border:2px solid var(--green-dk);background:var(--green);color:#fff;font-size:13px;font-weight:700;font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;cursor:pointer;transition:transform .08s;user-select:none}
.tb-caught-btn:hover{background:var(--green-dk)}
.tb-caught-btn:active{transform:scale(.95)}
.tb-caught-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.tb-caught-input{flex:0 0 80px;padding:8px;font-size:18px;font-weight:700;text-align:center;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--mono);outline:none}
.tb-caught-input:focus{border-color:var(--green);background:#fff}
.tb-caught-input:disabled{opacity:.5;background:var(--bg)}
.tb-caught-mode{font-size:9px;color:var(--muted);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0}
.tb-caught-mode.manual{color:var(--amb)}

/* Bucket reason rows — buttons grow to fill row width via auto-fit grid */
.tb-bucket{display:flex;flex-direction:column;gap:6px}
.tb-bucket-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.tb-bucket.print .tb-bucket-lbl{color:var(--red)}
.tb-bucket.other .tb-bucket-lbl{color:var(--amb)}
.tb-bucket.tbd .tb-bucket-lbl{color:var(--muted)}
.tb-rchips{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:6px}
.tb-rbtn{position:relative;padding:12px;border-radius:var(--radius);border:2px solid;background:var(--surface);cursor:pointer;text-align:left;font-family:var(--cond);user-select:none;transition:transform .08s;display:flex;flex-direction:column;gap:4px;line-height:1.1;min-height:62px;outline:none;-webkit-tap-highlight-color:transparent}
.tb-rbtn:active{transform:scale(.96)}
.tb-rbtn:focus{outline:none}
.tb-rbtn:focus-visible{outline:2px solid var(--text);outline-offset:2px}
.tb-rbtn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.tb-rbtn-name{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tb-rbtn-ct{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1}
.tb-rbtn-ct.zero{opacity:.25}
.tb-bucket.print .tb-rbtn{border-color:var(--red-bd);color:var(--red);background:var(--surface)}
.tb-bucket.print .tb-rbtn:hover:not(:disabled){border-color:var(--red);background:var(--red-bg)}
.tb-bucket.print .tb-rbtn.has-count{background:var(--red);color:#fff;border-color:var(--red)}
.tb-bucket.print .tb-rbtn.has-count:hover{background:var(--red);color:#fff}
.tb-bucket.print .tb-rbtn.has-count:active{background:var(--red);color:#fff}
.tb-bucket.other .tb-rbtn{border-color:var(--amb-bd);color:var(--amb);background:var(--surface)}
.tb-bucket.other .tb-rbtn:hover:not(:disabled){border-color:var(--amb);background:var(--amb-bg)}
.tb-bucket.other .tb-rbtn.has-count{background:var(--amb);color:#fff;border-color:var(--amb)}
.tb-bucket.other .tb-rbtn.has-count:hover{background:var(--amb);color:#fff}
.tb-bucket.other .tb-rbtn.has-count:active{background:var(--amb);color:#fff}
.tb-bucket.tbd .tb-rbtn{border-color:var(--border-dk);color:var(--muted);flex-direction:row;align-items:center;justify-content:space-between;background:var(--surface)}
.tb-bucket.tbd .tb-rbtn:hover:not(:disabled){border-color:var(--text);background:var(--bg)}
.tb-bucket.tbd .tb-rbtn.has-count{background:var(--sb-bg);color:var(--yellow);border-color:var(--sb-bg)}
.tb-bucket.tbd .tb-rbtn.has-count:hover{background:var(--sb-bg);color:var(--yellow)}
.tb-bucket.tbd .tb-rbtn.has-count:active{background:var(--sb-bg);color:var(--yellow)}
.tb-bucket.tbd .tb-rbtn-ct{margin-left:auto;font-size:18px}

/* Toolbar (undo + tbd warning) */
.tb-toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:6px;border-top:1px solid var(--border);flex-shrink:0}
.tb-undo{padding:8px 14px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);cursor:pointer}
.tb-undo:hover:not(:disabled){border-color:var(--text);background:var(--bg)}
.tb-undo:disabled{opacity:.35;cursor:not-allowed}
.tb-tbd-warn{font-size:10px;font-weight:700;color:var(--amb);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}

/* Summary table — read-only derived view */
.cw-summary{padding:10px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.cw-sum-tbl{width:100%;border-collapse:collapse;font-family:var(--cond)}
.cw-sum-tbl thead th{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:right;padding:4px 6px;border-bottom:1px solid var(--border)}
.cw-sum-tbl thead th:first-child{text-align:left}
.cw-sum-tbl thead th.print{color:var(--red)}
.cw-sum-tbl thead th.other{color:var(--amb)}
.cw-sum-tbl thead th.tbd{color:var(--muted)}
.cw-sum-tbl tbody td{font-size:13px;font-weight:700;color:var(--text);text-align:right;padding:4px 6px;border-bottom:1px solid var(--bg);font-family:var(--mono)}
.cw-sum-tbl tbody td:first-child{text-align:left;font-family:var(--cond);font-size:14px}
.cw-sum-tbl tbody td.muted{color:var(--muted-lt)}
.cw-sum-tbl tbody td.print{color:var(--red)}
.cw-sum-tbl tbody td.other{color:var(--amb)}
.cw-sum-tbl tbody td.tbd{color:var(--muted)}
.cw-sum-tbl tbody tr.active-row td{background:var(--yellow-dim)}
.cw-sum-tbl tbody tr:last-child td{border-bottom:none}
.cw-sum-tbl tfoot td{font-size:13px;font-weight:700;font-family:var(--mono);text-align:right;padding:6px;border-top:2px solid var(--border)}
.cw-sum-tbl tfoot td:first-child{text-align:left;font-family:var(--cond);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}

/* Notes — moved into cw-right */
.cw-right .notes-wrap{padding:10px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}

/* Responsive: iPad portrait + narrow viewports — stack vertically */
@media (max-width: 760px){
  .cw-card{flex-direction:column;min-height:auto}
  .cw-left{width:100%;border-right:none;border-bottom:1px solid var(--border);flex-direction:row;align-items:center;gap:14px;padding:12px}
  .cw-left-meta{flex:1;min-width:0}
  .cw-img{flex:0 0 140px;min-height:140px;max-height:140px;width:140px}
  .cw-img-hint{display:none}
}

/* TBD note modal — pops at TBD tap time */
.tn{display:none;position:fixed;inset:0;z-index:230;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px}
.tn.open{display:flex}
.tn-card{background:var(--surface);border-radius:var(--radius-lg);max-width:460px;width:100%;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.tn-hdr{padding:14px 18px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.tn-body{padding:14px 18px;display:flex;flex-direction:column;gap:8px}
.tn-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.tn-input{width:100%;padding:10px;font-size:14px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--sans);outline:none}
.tn-input:focus{border-color:var(--green)}
.tn-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.tn-ftr button{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--cond);padding:8px 16px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border-dk);background:var(--surface);color:var(--text)}
.tn-ftr button.primary{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.tn-ftr button.primary:hover{background:#1A1A16}

/* TBD resolution modal — pops at submit time, before sm preview */
.tr-section{background:var(--bg-soft,#F8F8F5);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.tr-section-hdr{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);margin-bottom:6px}
.tr-events{font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:8px;line-height:1.5}
.tr-event{padding:2px 0}
.tr-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.tr-row label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.tr-sel{padding:6px 8px;font-size:12px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--surface);color:var(--text);font-family:var(--cond);font-weight:700;cursor:pointer}

/* Spoilage */
.spoil-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.spoil-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spoil-pct{font-size:26px;font-weight:700;line-height:1;font-family:var(--mono)}
.spoil-pct.ok{color:var(--green)}.spoil-pct.warn{color:var(--amb)}.spoil-pct.bad{color:var(--red)}
.spoil-bar-wrap{height:4px;background:var(--bg);border-radius:2px;overflow:hidden;margin-bottom:8px}
.spoil-bar{height:100%;border-radius:2px;transition:width .3s}
.spoil-bar.ok{background:var(--green)}.spoil-bar.warn{background:var(--amb)}.spoil-bar.bad{background:var(--red)}
.res-badge{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.res-ok{color:var(--green)}
.res-warn{color:var(--amb)}
.res-bad{color:var(--red)}

/* Actions row */
.act-row{margin-top:12px;margin-bottom:0}
.boxing-wrap{padding:14px 16px;max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}
.box-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.box-order{font-size:10px;color:var(--muted);font-family:var(--cond);margin-bottom:3px;letter-spacing:.08em;text-transform:uppercase;}
.box-name{font-size:18px;font-weight:700;margin-bottom:6px;color:var(--text);font-family:var(--cond);text-transform:uppercase;letter-spacing:.04em;}
.box-chips{display:flex;gap:6px;flex-wrap:wrap;}
.box-edit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.box-edit-head{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.box-edit-title{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);}
.box-size-sel{font-size:11px;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--cond);}
.box-del-btn{font-size:10px;padding:3px 8px;border-radius:3px;border:1px solid var(--red-bd);background:transparent;color:var(--red);cursor:pointer;font-family:var(--cond);font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.box-add-btn{font-size:11px;padding:10px;border-radius:0;border:none;border-top:1px dashed var(--border);background:transparent;color:var(--muted);cursor:pointer;width:100%;text-align:center;font-family:var(--cond);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.box-add-btn:hover{color:var(--text);}
.box-tot{padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);font-size:10px;font-family:var(--cond);color:var(--muted);font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
.bsi{width:44px;font-size:12px;padding:3px 4px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:var(--mono);text-align:center;}
.bsi:focus{outline:none;border-color:var(--green);background:var(--surface);}
.mv{font-size:10px;padding:1px 5px;border-radius:3px;border:1px solid var(--border);background:var(--bg);cursor:pointer;color:var(--muted);font-weight:700;}
.mv:hover{color:var(--text);}
.btn-print{padding:14px;border-radius:0;border:none;background:var(--sb-bg);color:var(--yellow);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;font-family:var(--cond);}
.btn-print:hover{background:var(--sb-active);}
.btn-skip{padding:12px;border-radius:0;border:none;border-top:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;width:100%;font-family:var(--cond);}
.btn-skip:hover{color:var(--text);}
.imp-header{display:flex;align-items:center;gap:8px;padding:10px 16px 6px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2);border-top:2px solid var(--border);margin-top:4px;}
.imp-header:first-of-type{border-top:none;margin-top:0;}
.imp-id{font-family:var(--mono);color:var(--text);font-size:12px;font-weight:700;}
.imp-loc{background:var(--surface2);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:600;}
.submit-bar{width:100%;background:var(--sb-bg);color:var(--yellow);border:none;border-radius:0;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px;cursor:pointer;font-family:var(--cond);display:block;text-align:center}
.submit-bar:hover{background:#1A1A16}
.submit-bar:disabled{opacity:.4;pointer-events:none}
.complete-bar{width:100%;background:var(--sb-bg);color:var(--yellow);border:none;border-bottom:1px solid var(--sb-border);border-radius:0;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:14px;cursor:pointer;font-family:var(--cond);display:block;text-align:center;opacity:.7}
.complete-bar:hover{opacity:1}
.box-bar{width:100%;background:var(--sb-bg);color:var(--yellow);border:none;border-top:1px solid #1A1A16;border-radius:0;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:12px;cursor:pointer;font-family:var(--cond);display:block;text-align:center}
.box-bar:hover{background:#1A1A16}

/* Boxing view */
.box-wrap{padding:20px}
.box-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:12px}
.box-hdr{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.box-hdr-t{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond)}
.box-body{padding:14px}
.box-count-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.box-count-lbl{font-size:11px;font-weight:700;color:var(--text);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.box-count-in{width:72px;padding:6px 8px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--bg);font-size:14px;font-weight:700;color:var(--text);text-align:center;font-family:var(--mono);outline:none}
.box-count-in:focus{border-color:var(--green);background:#fff}
.box-preview{display:grid;gap:8px}
.box-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px}
.box-card-hdr{font-size:10px;font-weight:700;color:var(--text);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.box-sz-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px}
.box-sz-cell{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:5px 6px;text-align:center}
.box-sz-lbl{font-size:9px;font-weight:700;color:var(--muted);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em}
.box-sz-val{font-size:14px;font-weight:700;color:var(--text);font-family:var(--mono);line-height:1.2}



/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.err{margin:12px;padding:12px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a;font-family:var(--mono)}

/* Proof modal */
.pm{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
.pm.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.pm-nav{display:flex;gap:6px;align-items:center}
.pm-nav button{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-ct{font-size:11px;color:#555;min-width:30px;text-align:center;font-family:var(--mono)}
.pm-body{flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:16px}
.pm-body img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}

/* Additional Notes textarea (per colorway, bottom of size rows) */
.notes-wrap{padding:10px 16px 12px;background:var(--bg);border-top:1px solid var(--border)}
.notes-lbl{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond);margin-bottom:5px}
.notes-in{width:100%;padding:6px 8px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;font-family:var(--sans);resize:vertical;min-height:42px;outline:none}
.notes-in:focus{border-color:var(--green)}
.notes-in::placeholder{color:var(--muted-lt);font-style:italic}

/* Preview-mode badge — persistent statusbar */
.preview-badge{position:fixed;bottom:0;left:0;right:0;background:var(--amb-bg);border-top:1px solid var(--amb-bd);color:var(--amb);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond);padding:5px 14px;text-align:center;z-index:90;pointer-events:none}

/* Submit preview modal */
.sm{display:none;position:fixed;inset:0;z-index:220;background:rgba(0,0,0,.55);align-items:center;justify-content:center;padding:20px}
.sm.open{display:flex}
.sm-card{background:var(--surface);border-radius:var(--radius-lg);max-width:560px;width:100%;max-height:86vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.sm-hdr{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sm-title{font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.sm-close{font-size:18px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 4px;line-height:1}
.sm-close:hover{color:var(--text)}
.sm-body{padding:14px 18px;overflow-y:auto;flex:1}
.sm-banner{background:var(--amb-bg);border:1px solid var(--amb-bd);color:var(--amb);border-radius:var(--radius);padding:8px 12px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond);margin-bottom:12px;text-align:center}
.sm-item{background:var(--bg-soft,#F8F8F5);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px}
.sm-item:last-child{margin-bottom:0}
.sm-item-hdr{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond);margin-bottom:4px}
.sm-item-desc{font-size:12px;color:var(--text);font-family:var(--mono);white-space:pre-wrap;line-height:1.4}
.sm-item-meta{font-size:10px;color:var(--muted);font-family:var(--cond);margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.sm-item-meta .chip{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:2px 6px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:8px}
.sm-empty{font-size:11px;color:var(--muted);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;text-align:center;padding:24px 0}
.sm-ftr{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.sm-ftr button{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--cond);padding:8px 16px;border-radius:var(--radius);cursor:pointer;border:1px solid var(--border-dk);background:var(--surface);color:var(--text)}
.sm-ftr button.primary{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.sm-ftr button.primary:hover{background:#1A1A16}

</style>

// Global long-press handler for tally reason buttons (touch + mouse).
// Fires the button's oncontextmenu attribute as a function-string, which is
// where we wired longPressReason()/longPressTBD(). 700ms hold = long press.
// Standard right-click oncontextmenu still works for desktop fallback.
function installLongPressHandler(){
  var pressTimer=null;
  var pressTarget=null;
  function start(e){
    var btn=e.target.closest('.tb-rbtn');
    if(!btn)return;
    var ctxAttr=btn.getAttribute('oncontextmenu');
    if(!ctxAttr)return;
    pressTarget=btn;
    pressTimer=setTimeout(function(){
      // Trigger the long-press handler. The attribute is a JS expression
      // including event.preventDefault() — we eval it in a safe-ish way.
      // Use Function constructor to evaluate in global scope.
      try{
        // Strip the leading "event.preventDefault();" if present, since we don't
        // have a real event here. Then run the rest.
        var src=ctxAttr.replace(/^event\.preventDefault\(\);?/,'');
        new Function(src)();
        // Visual feedback
        if(navigator.vibrate)navigator.vibrate(40);
      }catch(err){console.error('long-press error',err);}
      pressTimer=null;
      pressTarget=null;
    },700);
  }
  function cancel(){
    if(pressTimer){clearTimeout(pressTimer);pressTimer=null;pressTarget=null;}
  }
  document.addEventListener('touchstart',start,{passive:true});
  document.addEventListener('touchend',cancel);
  document.addEventListener('touchcancel',cancel);
  document.addEventListener('touchmove',cancel);
  document.addEventListener('mousedown',start);
  document.addEventListener('mouseup',cancel);
  document.addEventListener('mouseleave',cancel);
}

// ─── REFRESH ─────────────────────────────────────────────────────────
// Reload today's jobs from Airtable WITHOUT wiping in-progress qcState.
// qcState keys by job.id (v112: composite "orderNum:lineItemId"), so counts
// stay intact when the same line items come back. If a job disappeared
// (e.g. rescheduled), its state is orphaned but harmless.
function refreshQueue(){
  var btn=document.getElementById('btnRefresh');
  if(btn){btn.disabled=true;btn.classList.add('spinning');}
  // Clear per-job colorway caches so LI data re-fetches fresh (damage/qty may have changed)
  jobs.forEach(function(j){j.colorways=null;});
  load();
  // Spinner auto-clears when load() calls render() — but if load errors out,
  // we still want to clear it. Re-enable after a short delay.
  setTimeout(function(){if(btn){btn.disabled=false;btn.classList.remove('spinning');}},800);
}

// ─── API ──────────────────────────────────────────────────────────────
function api(path){
  return fetch('https://api.airtable.com/v0/'+BASE+'/'+path,{
    headers:{Authorization:'Bearer '+pat}
  }).then(function(r){
    if(!r.ok)return r.json().then(function(j){throw new Error(j.error?j.error.message:'HTTP '+r.status);});
    return r.json();
  });
}

  var v=f[F.orderNum];

  var m=(f[F.imprintId]||'').match(/^(\d+)/);return m?m[1]:'--';
}

  return '';
}
function getProofs(f){
  var raw=f[F.proofs],out=[];
  function ex(a){if(a&&a.url)out.push({url:a.url,thumb:(a.thumbnails&&a.thumbnails.large&&a.thumbnails.large.url)||null,filename:a.filename||''});}
  if(!raw)return out;
  if(raw.valuesByLinkedRecordId)Object.values(raw.valuesByLinkedRecordId).forEach(function(arr){if(Array.isArray(arr))arr.forEach(ex);});
  else if(Array.isArray(raw))raw.forEach(ex);
  return out;
}
function parseSizes(str){
  if(!str)return[];
  return str.split(',').map(function(p){var m=p.trim().match(/^(\d+)\s+(.+)$/);return m?{size:m[2].trim(),qty:parseInt(m[1])}:null;}).filter(Boolean);
}
function fmtDate(d){
  if(!d)return'';
  try{return new Date(String(d).includes('T')?d:d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return String(d);}
}
function jobsFor(m){
  if(m.id==='all')return jobs.filter(function(j){return j.status!=='complete';});
  return jobs.filter(function(j){return j.press===m.key&&j.status!=='complete';});
}

// ─── LOAD ─────────────────────────────────────────────────────────────
function load(){
  render('<div class="loading"><div class="spin"></div>Loading today\'s jobs…</div>');
  var flds=Object.values(F).map(function(id){return'fields%5B%5D='+id;}).join('&');
  var q='filterByFormula='+encodeURIComponent('{'+F.isToday+'}=1')+'&'+flds
    +'&sort%5B0%5D%5Bfield%5D='+F.startTime+'&sort%5B0%5D%5Bdirection%5D=asc&pageSize=100&returnFieldsByFieldId=true';
  api(TI+'?'+q).then(function(data){
    // Group imprints by order number
    var om={};
    (data.records||[]).forEach(function(r){
      var f=r.fields;
      var pv=f[F.press],press=typeof pv==='string'?pv:(pv&&pv.name)||'';
      // Skip presses not in catching queue
      var pl=press.toLowerCase();if(SKIP_PRESS.some(function(s){return pl.includes(s);}))return;
      var lv=f[F.loc],loc=typeof lv==='string'?lv:(lv&&lv.name)||'';
      var on=getOrderNum(f);
      var sizes=parseSizes(f[F.sizeList]||'');
      var qty=sizes.reduce(function(s,x){return s+x.qty;},0);
      if(!qty)qty=Math.round(f[F.qty]||f[F.totalSch]||f[F.totalAllTime]||0);
      // Get the order record ID from the linked field
      var orderLink=f[F.orderNum];
      var orderRecId=orderLink&&orderLink.linkedRecordIds?orderLink.linkedRecordIds[0]:null;
      // Collect Line Item record IDs from this imprint.
      // v0 REST API returns multipleRecordLinks as bare string arrays: ["recXXX", "recYYY"].
      // MCP returns objects: [{id:"recXXX", name:"..."}]. Handle both shapes.
      var liLinks=f[F.lineItems]||[];
      var liIdsForImprint=Array.isArray(liLinks)?liLinks.map(function(x){
        return (typeof x==='string')?x:(x&&x.id)||'';
      }).filter(Boolean):[];
      // Catching unit = one Line Item = one physical pile of garments.
      // An imprint can link to multiple line items (e.g. 9817-B prints Back
      // on TWO different garments → contributes to TWO cards). An imprint
      // can also be linked from multiple imprints (e.g. line item printed
      // Front + Back → one card, two imprints listed).
      //
      // Grouping: one card per (order + line item). Each imprint contributes
      // to one card per LI it links to. Multi-LI imprints split, multi-imprint
      // LIs merge. Location is metadata only — a damage is a damage regardless
      // of which print location was being checked when it was found.
      //
      // Orphan imprints (empty Line Items array) skip the catching queue —
      // there's no physical pile to catch.
      if(!liIdsForImprint.length)return;
      liIdsForImprint.forEach(function(liId){
        var gk=on+':'+liId;
        if(!om[gk])om[gk]={
          id:gk,orderNum:on,orderRecId:orderRecId,press:press,qty:qty,sizes:sizes,
          proofs:getProofs(f),due:getDue(f),loc:loc,
          imprintIds:[f[F.imprintId]||r.id],lineItemIds:[liId],machines:[press],
          imprints:[{imprintId:f[F.imprintId]||r.id,recordId:r.id,loc:loc}],
          locations:loc?[loc]:[],designNick:(f[F.designNick]||'').trim(),
          startTime:f[F.startTime]||'',customer:'',orderRecordId:'',
          colorways:null,status:'pending'
        };
        else{
          var g=om[gk];
          if(f[F.imprintId]&&g.imprintIds.indexOf(f[F.imprintId])<0)g.imprintIds.push(f[F.imprintId]);
          if(!g.imprints.find(function(x){return x.recordId===r.id;}))g.imprints.push({imprintId:f[F.imprintId]||r.id,recordId:r.id,loc:loc});
          if(press&&g.machines.indexOf(press)<0)g.machines.push(press);
          if(loc&&g.locations.indexOf(loc)<0)g.locations.push(loc);
          if(loc==='Bandana')g.isBandana=true;
          getProofs(f).forEach(function(p){if(!g.proofs.find(function(x){return x.url===p.url;}))g.proofs.push(p);});
          // qty is the imprint-level scheduled count. For Front+Back on the
          // same shirts, the underlying LI count is the truth — keep header
          // qty as the max contributing imprint qty (gets replaced with real
          // LI total once enterQC fetches the line item).
          if(qty>g.qty)g.qty=qty;
          if(f[F.startTime]>g.startTime){g.startTime=f[F.startTime];}
          if(!g.due&&getDue(f))g.due=getDue(f);
          if(!g.designNick&&f[F.designNick])g.designNick=(f[F.designNick]||'').trim();
        }
      });
   });
    jobs=Object.values(om).sort(function(a,b){return a.startTime<b.startTime?-1:a.startTime>b.startTime?1:0;});
    // Restore saved state
    jobs.forEach(function(j){
      if(!qcState[j.id])qcState[j.id]={status:'pending',cwData:{},spoilage:0,activeSize:null,tapHistory:[]};
      else j.status=qcState[j.id].status||'pending';
    });
    // ─── Phase 2 (v113): batch-fetch line items to enrich cards ──────────
    // The card displays LI-level facts (garment+color, true qty, per-LI
    // proof PDF). Imprint-level qty is wrong when an imprint prints across
    // multiple LIs (Active Impressions sums them). LI Total Quantity is
    // the catcher's truth.
    //
    // Each job already has lineItemIds[0] from grouping (one LI per card).
    // Batch fetch with filterByFormula=OR(RECORD_ID()=...) — recordIds[]
    // doesn't work on v0 list endpoint.
    var liIds=jobs.map(function(j){return j.lineItemIds&&j.lineItemIds[0];}).filter(Boolean);
    liIds=liIds.filter(function(id,i,a){return a.indexOf(id)===i;});
    var liFetch=Promise.resolve({records:[]});
    if(liIds.length){
      // Fields we need: garment text, colorway, total qty, per-LI proof.
      var liFlds=[LI.liGarmentText,LI.liColorway,LI.liTotal,LI.liProofs]
        .map(function(id){return'fields%5B%5D='+id;}).join('&');
      var liFormula='OR('+liIds.map(function(id){return"RECORD_ID()='"+id+"'";}).join(',')+')';
      liFetch=api(TLI+'?filterByFormula='+encodeURIComponent(liFormula)+'&'+liFlds+'&returnFieldsByFieldId=true&pageSize=100');
    }
    liFetch.then(function(liData){
      var liMap={};
      (liData.records||[]).forEach(function(r){liMap[r.id]=r.fields||{};});
      jobs.forEach(function(j){
        var liId=j.lineItemIds&&j.lineItemIds[0];
        var lf=liId?liMap[liId]:null;
        if(lf){
          // Garment text — formula returns string (not array).
          j.liGarment=(lf[LI.liGarmentText]||'').trim();
          // Colorway lookup — array; first entry.
          var cw=lf[LI.liColorway];
          j.liColorway=Array.isArray(cw)?(cw[0]||''):(cw||'');
          // Total Qty — number.
          var total=lf[LI.liTotal];
          if(typeof total==='number'&&total>0)j.qty=total;
          // Per-LI proof PDF (replaces imprint-lookup proofs[]).
          // liProofs is an attachment array; build same shape as getProofs.
          var atts=lf[LI.liProofs];
          if(Array.isArray(atts)&&atts.length){
            var liProofs=atts.map(function(a){
              var th=a.thumbnails||{};
              return{
                url:a.url||'',
                thumb:(th.large&&th.large.url)||(th.small&&th.small.url)||a.url||'',
                filename:a.filename||'',
                type:a.type||''
              };
            }).filter(function(p){return p.url;});
            if(liProofs.length)j.proofs=liProofs;
          }
        }
      });
      // ─── Phase 3: fetch customer names (existing behavior) ─────────────
      var nums=jobs.map(function(j){return j.orderNum;}).filter(function(n,i,a){return n&&n!=='--'&&a.indexOf(n)===i;});
      if(!nums.length){updateTabs();renderQueue();return;}
      var altF='OR('+nums.map(function(n){return'{Invoice / Order Number}='+n;}).join(',')+')';
      api(TOR+'?filterByFormula='+encodeURIComponent(altF)+'&fields%5B%5D=fld4S3B5yJANKlE7l&fields%5B%5D=fldoRraeYHsgfeWhj&returnFieldsByFieldId=true&maxRecords=50')
        .then(function(od){
          (od.records||[]).forEach(function(r){
            var on=r.fields['fld4S3B5yJANKlE7l'],cu=r.fields['fldoRraeYHsgfeWhj']||'';
            if(on)jobs.forEach(function(j){if(j.orderNum===String(on)){j.customer=cu;j.orderRecordId=r.id;}});
          });
          updateTabs();renderQueue();
        }).catch(function(){updateTabs();renderQueue();});
    }).catch(function(){
      // LI fetch failed — soft-fail to existing behavior (imprint qty + first proof).
      var nums=jobs.map(function(j){return j.orderNum;}).filter(function(n,i,a){return n&&n!=='--'&&a.indexOf(n)===i;});
      if(!nums.length){updateTabs();renderQueue();return;}
      var altF='OR('+nums.map(function(n){return'{Invoice / Order Number}='+n;}).join(',')+')';
      api(TOR+'?filterByFormula='+encodeURIComponent(altF)+'&fields%5B%5D=fld4S3B5yJANKlE7l&fields%5B%5D=fldoRraeYHsgfeWhj&returnFieldsByFieldId=true&maxRecords=50')
        .then(function(od){
          (od.records||[]).forEach(function(r){
            var on=r.fields['fld4S3B5yJANKlE7l'],cu=r.fields['fldoRraeYHsgfeWhj']||'';
            if(on)jobs.forEach(function(j){if(j.orderNum===String(on)){j.customer=cu;j.orderRecordId=r.id;}});
          });
          updateTabs();renderQueue();
        }).catch(function(){updateTabs();renderQueue();});
    });
  }).catch(function(e){
    render('<div class="err">Load failed: '+e.message+'</div>');
  });
}

// ─── TABS ─────────────────────────────────────────────────────────────
function buildTabs(){
  var wrap=document.getElementById('pressTabs');
  wrap.innerHTML='';
  MACHINES.forEach(function(m){
    var btn=document.createElement('button');
    btn.className='pt'+(m.id===activePress?' on':'');
    btn.id='pt_'+m.id;
    var lbl=document.createTextNode(m.label);
    btn.appendChild(lbl);
    var ct=document.createElement('span');ct.className='pt-ct';ct.id='ptct_'+m.id;ct.textContent='0';
    btn.appendChild(ct);
    btn.onclick=(function(mid){return function(){activePress=mid;updateTabs();renderQueue();};})(m.id);
    wrap.appendChild(btn);
  });
}
function updateTabs(){
  MACHINES.forEach(function(m){
    var btn=document.getElementById('pt_'+m.id);
    var ct=document.getElementById('ptct_'+m.id);
    if(btn)btn.className='pt'+(m.id===activePress?' on':'');
    if(ct)ct.textContent=jobsFor(m).length;
  });
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────
function render(html){document.getElementById('root').innerHTML=html;}

function renderQueue(){
  activeJobId=null;
  var m=MACHINES.find(function(x){return x.id===activePress;})||MACHINES[0];
  var mj=jobsFor(m);
  updateTabs();
  var h='<div class="content">';
  h+='<div class="q-hdr">';
  h+='<span class="q-title">'+m.label+' — '+mj.length+' job'+(mj.length!==1?'s':'')+' today</span>';
  h+='<span class="q-date">'+new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'America/Denver'})+'</span>';
  h+='</div>';
  if(!mj.length){
    h+='<div class="empty">No jobs today for this press</div>';
    h+='</div>';
    render(h);return;
  }
  // ─── Group cards by orderNum, preserving sort order (earliest startTime first) ───
  // Object.values sort above already ordered jobs by startTime; group by first-seen
  // order, so the first order shown is the one whose earliest job runs first.
  var orderKeys=[],byOrder={};
  mj.forEach(function(j){
    var k=j.orderNum||'--';
    if(!byOrder[k]){byOrder[k]=[];orderKeys.push(k);}
    byOrder[k].push(j);
  });
  orderKeys.forEach(function(on){
    var group=byOrder[on];
    var first=group[0];
    var customer=first.customer||first.designNick||'';
    var totalPcs=group.reduce(function(s,j){return s+(j.qty||0);},0);
    var collapsed=!!collapsedOrders[on];
    var qcdCt=group.reduce(function(s,j){var st=qcState[j.id]||{};return s+(st.status==='qc-done'||st.status==='complete'?1:0);},0);
    h+='<div class="og">';
    // Header — tap to toggle collapse. Escape orderNum just in case.
    var onEsc=String(on).replace(/'/g,"\\'");
    h+='<div class="og-hdr'+(collapsed?' collapsed':'')+'" onclick="toggleOrderGroup(\''+onEsc+'\')">';
    h+='<span class="og-caret">▼</span>';
    h+='<span class="og-num">'+on+'</span>';
    h+='<span class="og-cust">'+(customer||'—')+'</span>';
    h+='<span class="og-meta">';
    h+='<span class="tag n">'+group.length+' job'+(group.length!==1?'s':'')+'</span>';
    h+='<span class="tag g">'+totalPcs+' pcs</span>';
    if(qcdCt>0)h+='<span class="tag '+(qcdCt===group.length?'g':'n')+'">'+qcdCt+'/'+group.length+' done</span>';
    h+='</span>';
    h+='</div>';
    h+='<div class="og-cards'+(collapsed?' collapsed':'')+'">';
    group.forEach(function(job){
      var st=qcState[job.id]||{status:'pending'};
      var flagged=st.spoilage>5;
      h+='<div class="job-card'+(flagged?' flagged':'')+'" onclick="enterQC(\''+job.id+'\')">';
      // Thumb (per-LI proof when available, falls back to first imprint proof)
      h+='<div class="jc-thumb">';
      var fp=job.proofs&&job.proofs[0];
      if(fp&&fp.thumb)h+='<img src="'+fp.thumb+'" onerror="this.style.display=\'none\'">';
      else h+='<svg class="jc-thumb-ph" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
      h+='</div>';
      // Info — garment+color leads (customer is in the order header above), then meta tags
      h+='<div class="jc-info">';
      var primary=job.liGarment||job.designNick||('Order '+job.orderNum);
      h+='<div class="jc-name">'+primary+'</div>';
      h+='<div class="jc-meta">';
      var impLabel=job.imprintIds.slice(0,3).join(', ')+(job.imprintIds.length>3?' +'+(job.imprintIds.length-3):'');
      if(impLabel)h+='<span class="tag n">'+impLabel+'</span>';
      h+='<span class="tag g">'+job.qty+' pcs</span>';
      if(job.locations.length)h+='<span class="tag n">'+job.locations.join(' · ')+'</span>';
      if(job.due)h+='<span class="tag amb">Due '+fmtDate(job.due)+'</span>';
      if(st.spoilage>0)h+='<span class="tag '+(st.spoilage>5?'r':'amb')+'">'+st.spoilage.toFixed(1)+'% spoil</span>';
      h+='</div>';
      h+='</div>';
      // Right — big order number + status (kept on each card so cards still
      // make sense in isolation when QC view returns to queue mid-task)
      h+='<div class="jc-right">';
      h+='<div class="jc-order">'+job.orderNum+'</div>';
      if(st.status==='complete')h+='<div class="jc-status complete">Done</div>';
      else if(st.status==='qc-done'){
        h+='<div class="jc-status qcd">QC\'d</div>';
        h+='<button class="btn" onclick="event.stopPropagation();markComplete(\''+job.id+'\')">✓ Complete</button>';
      }else h+='<div class="jc-status">Pending</div>';
      h+='</div>';
      h+='</div>';
    });
    h+='</div>'; // .og-cards
    h+='</div>'; // .og
  });
  h+='</div>';
  render(h);
}

// v113: toggle collapsed state for an order group
function toggleOrderGroup(orderNum){
  if(collapsedOrders[orderNum])delete collapsedOrders[orderNum];
  else collapsedOrders[orderNum]=true;
  renderQueue();
}

// ─── QC ENTER ────────────────────────────────────────────────────────
function enterQC(jobId){
  activeJobId=jobId;
  if(!qcState[jobId])qcState[jobId]={status:'pending',cwData:{},spoilage:0,activeSize:null,tapHistory:[]};
  // Defensive: ensure tapHistory array exists for old states pre-v109
  if(!qcState[jobId].tapHistory)qcState[jobId].tapHistory=[];
  if(qcState[jobId].activeSize===undefined)qcState[jobId].activeSize=null;
  var job=jobs.find(function(j){return j.id===jobId;});
  if(!job)return;
  if(job.colorways){renderQC();return;}
  render('<div class="loading"><div class="spin"></div>Loading colorways…</div>');
  // Fetch line items for this order
  // v54 proven approach: filterByFormula on Invoice/Order Number Lookup works in REST API
  // Then filter client-side by imprint ID to get only this order's colorways
  // Size fields only in the loop — extra fields added explicitly after
  var liF=Object.keys(LI).filter(function(k){return['liProofs','liImprints','liDamages','liOrders','liColorway','liGarmentType','liGarmentStyle','liGarmentDirect','liGarmentText'].indexOf(k)<0;})
    .map(function(k){return'fields%5B%5D='+LI[k];}).join('&');
  liF+='&fields%5B%5D='+LI.liProofs+'&fields%5B%5D='+LI.liImprints;
  liF+='&fields%5B%5D='+LI.liColorway+'&fields%5B%5D='+LI.liGarmentType+'&fields%5B%5D='+LI.liGarmentStyle+'&fields%5B%5D='+LI.liGarmentDirect+'&fields%5B%5D='+LI.liGarmentText;
  liF+='&returnFieldsByFieldId=true&pageSize=100';
  var liFormula='{Invoice / Order Number Lookup}='+job.orderNum;
  var liUrl=TLI+'?filterByFormula='+encodeURIComponent(liFormula)+'&'+liF;
  api(liUrl).then(function(ld){
    // v112: each card is one specific line item (or one specific set, if multi-LI).
    // Filter to ONLY the line items registered to this card via job.lineItemIds.
    // Falls back to "any LI in the order" if lineItemIds is somehow empty.
    var thisCardLis=Array.isArray(job.lineItemIds)?job.lineItemIds:[];
    var cws=(ld.records||[]).filter(function(r){
      if(thisCardLis.length===0)return true;
      return thisCardLis.indexOf(r.id)>=0;
    }).map(function(r){
      var f=r.fields,szs={};
      ['XS','S','M','L','XL','2XL','3XL','OSFA'].forEach(function(sz){var q=f[LI[sz]];if(q>0)szs[sz]=q;});
      var tot=Object.values(szs).reduce(function(a,b){return a+b;},0);
      var pa=f[LI.liProofs];
      var thumb=pa&&pa[0]?(pa[0].thumbnails&&pa[0].thumbnails.large?pa[0].thumbnails.large.url:pa[0].url):null;
      var fullUrl=pa&&pa[0]?pa[0].url:null;
      // Store which imprint record IDs this LI is linked to (for grouping)
      var linkedImps=(f[LI.liImprints]||[]).map(function(x){return x.id||x;});
      // Extract colorway name — REST API with returnFieldsByFieldId returns flat array
      var cwRaw=f[LI.liColorway];
      var colorwayName='—';
      if(Array.isArray(cwRaw)&&cwRaw.length){
        colorwayName=cwRaw.map(function(x){return(x&&x.name)?x.name:typeof x==='string'?x:String(x);}).filter(Boolean)[0]||'—';
      }else if(cwRaw&&cwRaw.valuesByLinkedRecordId){
        var cwVals=Object.values(cwRaw.valuesByLinkedRecordId).flat();
        colorwayName=cwVals.map(function(x){return(x&&x.name)?x.name:typeof x==='string'?x:String(x);}).filter(Boolean)[0]||'—';
      }else if(typeof cwRaw==='string'&&cwRaw){
        colorwayName=cwRaw;
      }
      // Extract garment name — use direct link field first (most reliable)
      // Garment name: use formula field fldKhz9uZgXwfeIto which returns plain string via REST
      // e.g. "Carolina Creative 4800 - Maroon" -> strip color -> "Carolina Creative 4800"
      var gtText=f[LI.liGarmentText]; // formula field — always returns plain string
      var garmentName='—';
      if(typeof gtText==='string'&&gtText){
        var gdi=gtText.lastIndexOf(' - ');
        garmentName=gdi>0?gtText.substring(0,gdi).trim():gtText.trim()||'—';
      }
      return{liId:r.id,sizes:szs,total:tot,thumb:thumb,fullUrl:fullUrl,created:r.createdTime||'',linkedImps:linkedImps,colorwayName:colorwayName,garmentName:garmentName};
    }).filter(function(cw){return cw.total>0;})
      .sort(function(a,b){
        // Sort by earliest imprint position in the scheduled order, then by createdTime
        var impOrder=job.imprints?job.imprints.map(function(i){return i.recordId;}):[];
        function firstImpIdx(cw){
          var min=impOrder.length;
          (cw.linkedImps||[]).forEach(function(id){
            var idx=impOrder.indexOf(id);
            if(idx>=0&&idx<min)min=idx;
          });
          return min;
        }
        var ai=firstImpIdx(a),bi=firstImpIdx(b);
        if(ai!==bi)return ai-bi;
        return a.created.localeCompare(b.created);
      });
    // Fallback: use imprint-level size data
    if(!cws.length){
      var szs={};
      job.sizes.forEach(function(s){szs[s.size]=s.qty;});
      if(!Object.keys(szs).length)szs['OSFA']=job.qty;
      cws=[{liId:job.id,sizes:szs,total:job.qty,thumb:job.proofs[0]?job.proofs[0].thumb:null,fullUrl:job.proofs[0]?job.proofs[0].url:null}];
    }
    job.colorways=cws;
    // Init QC state per colorway/size
    var st=qcState[jobId];
    cws.forEach(function(cw){
      if(!st.cwData[cw.liId])st.cwData[cw.liId]={};
      Object.keys(cw.sizes).forEach(function(sz){
        if(!st.cwData[cw.liId][sz])st.cwData[cw.liId][sz]={caughtOffset:0,printReasonCounts:{},otherReasonCounts:{},tbdEvents:[]};
      });
    });
    renderQC();
  }).catch(function(e){
    // Fallback on error
    var szs={};
    job.sizes.forEach(function(s){szs[s.size]=s.qty;});
    if(!Object.keys(szs).length)szs['OSFA']=job.qty;
    job.colorways=[{liId:job.id,sizes:szs,total:job.qty,thumb:job.proofs[0]?job.proofs[0].thumb:null,fullUrl:job.proofs[0]?job.proofs[0].url:null}];
    var st=qcState[jobId];
    if(!st.cwData[job.id])st.cwData[job.id]={};
    Object.keys(szs).forEach(function(sz){if(!st.cwData[job.id][sz])st.cwData[job.id][sz]={caughtOffset:0,printReasonCounts:{},otherReasonCounts:{},tbdEvents:[]};});
    renderQC();
  });
}

// ─── RENDER QC ────────────────────────────────────────────────────────
function renderQC(){
  var jobId=activeJobId;
  var job=jobs.find(function(j){return j.id===jobId;});
  if(!job||!job.colorways)return;
  var st=qcState[jobId];
  var cws=job.colorways;
  var h='<div class="qc-wrap">';
  // Back
  h+='<div class="qc-back"><button class="btn" onclick="renderQueue()">← Back to Queue</button></div>';
  // Header card
  h+='<div class="card">';
  h+='<div class="card-h"><span class="card-t">Order '+job.orderNum+' · QC</span>';
  if(job.due)h+='<span class="card-a">Due '+fmtDate(job.due)+'</span>';
  h+='</div>';
  h+='<div class="card-b">';
  h+='<div style="font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:var(--cond);margin-bottom:8px">'+(job.customer||job.designNick||'Order '+job.orderNum)+'</div>';
  h+='<div style="display:flex;gap:5px;flex-wrap:wrap">';
  h+='<span class="tag g">'+job.qty+' pcs</span>';
  h+='<span class="tag n">'+job.machines.join(' · ')+'</span>';
  if(job.locations.length)h+='<span class="tag n">'+job.locations.join(' · ')+'</span>';
  if(cws.length>1)h+='<span class="tag n">'+cws.length+' colorways</span>';
  h+='</div>';
  h+='</div></div>';
  // v110: progress bar dropped — with autopopulate Caught, every colorway is
  // valid to submit on load, so a "X of Y tallied" bar fills on first tap and
  // doesn't reflect catcher confidence. Submit button always enabled; Submit
  // preview modal is the confirmation.
  // Colorway cards — flat list sorted by creation time, each colorway shown once
  cws.forEach(function(cw,ci){
    h+=renderColorwayCard(cw,ci,job,st);
  });
  // Spoilage card
  h+='<div class="card" id="spoilCard">'+buildSpoilage(job,st)+'</div>';
