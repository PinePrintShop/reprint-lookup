    h+='<button class="box-bar" onclick="openBoxing(\''+jobId+'\')">📦 Box This Order</button>';
  }
  // v110: submit always enabled — catcher can submit a clean run with zero damage
  h+='<button class="submit-bar" id="sbBtn" onclick="submitQC(\''+jobId+'\')">'
    +(st.status==='qc-done'?'Update QC':'Submit QC')+'</button>';
  h+='</div>';
  h+='</div>';
  render(h);
}

// ─── V110 RENDER HELPERS ─────────────────────────────────────────────
// Per-size damage totals from reason counts. TBD events count too (until resolved at submit).
// "caught" in the returned object is the DERIVED caught value (Ord - dmg + offset),
// not the raw `sd.caught` field. Pass ord to compute it; if ord is omitted, caught=0.
function sizeTotals(sd,ord){
  if(!sd)return {caught:0,print:0,other:0,tbd:0,total:0,offset:0};
  var pSum=0,oSum=0;
  var pc=sd.printReasonCounts||{};
  var oc=sd.otherReasonCounts||{};
  Object.keys(pc).forEach(function(k){pSum+=pc[k]||0;});
  Object.keys(oc).forEach(function(k){oSum+=oc[k]||0;});
  var tbdCt=(sd.tbdEvents||[]).length;
  var dmg=pSum+oSum+tbdCt;
  var offset=parseInt(sd.caughtOffset)||0;
  var caught=Math.max(0,(parseInt(ord)||0)-dmg+offset);
  return {
    caught:caught,
    print:pSum,
    other:oSum,
    tbd:tbdCt,
    total:dmg,
    offset:offset
  };
}

// Caught for a size — convenience wrapper for renderTallyBar/onCaughtType.
function caughtForSize(sd,ord){
  return sizeTotals(sd,ord).caught;
}

// Sum all damage counts across a colorway state.
function colorwayDamageTotal(cwSt){
  var s={print:0,other:0,tbd:0};
  if(!cwSt)return s;
  Object.keys(cwSt).forEach(function(sz){
    if(sz.charAt(0)==='_')return;
    var t=sizeTotals(cwSt[sz]);
    s.print+=t.print;s.other+=t.other;s.tbd+=t.tbd;
  });
  return s;
}

// Top-level render for one colorway card. Builds:
//   - thumbnail + meta header
//   - tally bar (size picker + caught + reason buttons + toolbar)
//   - read-only summary table
//   - notes textarea
function renderColorwayCard(cw,ci,job,st){
  var cwSt=st.cwData[cw.liId]||{};
  var totals=colorwayDamageTotal(cwSt);
  // v110: "counted" = catcher has interacted with this colorway (taps or offset edits)
  var counted=false;
  (st.tapHistory||[]).forEach(function(e){if(e.liId===cw.liId)counted=true;});
  if(!counted){
    Object.keys(cwSt).forEach(function(k){
      if(k.charAt(0)==='_')return;
      if((parseInt(cwSt[k].caughtOffset)||0)!==0)counted=true;
    });
  }
  var isActive=st.activeCwId===cw.liId;
  var cls='cw-card'+(counted?' counted':'')+(isActive?' active':'');
  var h='<div class="'+cls+'" id="cwcard_'+cw.liId+'" onclick="setActiveCw(\''+cw.liId+'\')">';
  // ── LEFT SIDE: large mockup + meta ──
  h+='<div class="cw-left">';
  h+='<div class="cw-left-meta">';
  h+='<div class="cw-meta-name">'+(cw.garmentName||cw.colorwayName||'Colorway')+'</div>';
  var subParts=[];
  if(cw.colorwayName&&cw.garmentName&&cw.colorwayName!==cw.garmentName)subParts.push(cw.colorwayName);
  subParts.push(cw.total+' pcs ordered');
  if(totals.print>0)subParts.push(totals.print+' print dmg');
  if(totals.other>0)subParts.push(totals.other+' other dmg');
  if(totals.tbd>0)subParts.push(totals.tbd+' TBD');
  h+='<div class="cw-meta-sub">'+subParts.join(' · ')+'</div>';
  h+='</div>';
  h+='<div class="cw-img" onclick="event.stopPropagation();openProofs(\''+cw.liId+'\')">';
  if(cw.thumb)h+='<img src="'+cw.thumb+'" alt="Proof">';
  else if(job.proofs[ci]&&job.proofs[ci].thumb)h+='<img src="'+job.proofs[ci].thumb+'" alt="Proof">';
  else h+='<svg class="cw-img-ph" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
  h+='</div>';
  h+='<div class="cw-img-hint">Tap proof to enlarge</div>';
  h+='</div>'; // cw-left
  // ── RIGHT SIDE: tally + summary + notes ──
  h+='<div class="cw-right">';
  h+=renderTallyBar(cw,job,st);
  h+=renderSummaryTable(cw,st);
  // Notes
  var notesVal=(cwSt._notes||'').replace(/"/g,'&quot;');
  h+='<div class="notes-wrap">';
  h+='<div class="notes-lbl">Additional notes (optional)</div>';
  h+='<textarea class="notes-in" placeholder="e.g. including extras, will absorb 2 of 3" '
    +'oninput="event.stopPropagation();onNotes(\''+cw.liId+'\',this.value)" onclick="event.stopPropagation()">'+notesVal+'</textarea>';
  h+='</div>';
  h+='</div>'; // cw-right
  h+='</div>'; // cw-card
  return h;
}

// The work surface — size picker, caught, reason buttons, toolbar.
function renderTallyBar(cw,job,st){
  var cwSt=st.cwData[cw.liId]||{};
  var sizes=Object.keys(cw.sizes).sort(function(a,b){return SZ_ORDER.indexOf(a)-SZ_ORDER.indexOf(b);});
  var activeSize=st.activeSize;
  // If only one size and nothing picked, auto-select it
  if(sizes.length===1&&!activeSize){
    activeSize=sizes[0];
    st.activeSize=activeSize;
  }
  // Validate active size against this colorway's sizes (might be set from a different cw)
  var activeForThisCw=activeSize&&sizes.indexOf(activeSize)>=0?activeSize:null;
  var h='<div class="tally-bar" onclick="event.stopPropagation()">';
  // No size active → banner
  if(!activeForThisCw){
    h+='<div class="tb-banner">▼ Pick a size below to start tallying ▼</div>';
  }
  // Size picker
  h+='<div class="tb-sz-row">';
  h+='<div class="tb-sz-lbl">Size</div>';
  h+='<div class="tb-sz-chips">';
  sizes.forEach(function(sz){
    var on=(activeForThisCw===sz);
    h+='<button class="tb-sz-chip'+(on?' active':'')+'" onclick="pickSize(\''+cw.liId+'\',\''+sz+'\')">'
      +sz+'<span class="tb-sz-ord">'+cw.sizes[sz]+'</span></button>';
  });
  h+='</div>';
  // Spoilage indicator (live)
  var totals=colorwayDamageTotal(cwSt);
  var totalDmg=totals.print+totals.other+totals.tbd;
  var pct=cw.total>0?(totalDmg/cw.total)*100:0;
  var pctCls=pct>5?'bad':pct>1?'warn':'ok';
  h+='<div class="tb-spoil '+pctCls+'" id="spoil_'+cw.liId+'">'+pct.toFixed(1)+'%</div>';
  h+='</div>'; // tb-sz-row
  // Caught row — derived from Ord - dmg + manual offset (v110 autopopulate model)
  var sd=activeForThisCw?(cwSt[activeForThisCw]||{}):{};
  var ord=activeForThisCw?(cw.sizes[activeForThisCw]||0):0;
  var caughtVal=activeForThisCw?caughtForSize(sd,ord):0;
  var dis=!activeForThisCw;
  var hasOffset=activeForThisCw&&typeof sd.caughtOffset==='number'&&sd.caughtOffset!==0;
  h+='<div class="tb-caught-row">';
  h+='<div class="tb-caught-lbl">Caught</div>';
  h+='<button class="tb-caught-btn" '+(dis?'disabled':'')+' onclick="tapCaught(\''+cw.liId+'\')" title="Bumps caught +1 for absorbed pieces from another order">+ Caught</button>';
  h+='<input class="tb-caught-input" type="number" min="0" value="'+(activeForThisCw?caughtVal:'')+'" placeholder="0" '
    +(dis?'disabled':'')
    +' oninput="onCaughtType(\''+cw.liId+'\',this.value)" onclick="event.stopPropagation()">';
  h+='<div class="tb-caught-mode'+(hasOffset?' manual':'')+'">'
    +(activeForThisCw?(hasOffset?('on '+activeForThisCw+' · adj '+(sd.caughtOffset>0?'+':'')+sd.caughtOffset):('on '+activeForThisCw+' · auto')):'')
    +'</div>';
  h+='</div>';
  // Print bucket
  h+=renderBucketRow(cw,'print',activeForThisCw,sd,'Print Team',DMG_REASONS_PRINT);
  // Other bucket
  h+=renderBucketRow(cw,'other',activeForThisCw,sd,'Other',DMG_REASONS_OTHER);
  // TBD bucket — single button
  h+='<div class="tb-bucket tbd"><div class="tb-bucket-lbl">Unsure / TBD</div><div class="tb-rchips">';
  var tbdCt=(sd.tbdEvents||[]).length;
  var tbdCls='tb-rbtn'+(tbdCt>0?' has-count':'');
  h+='<button class="'+tbdCls+'" '+(dis?'disabled':'')+' onclick="tapTBD(\''+cw.liId+'\')" '
    +'oncontextmenu="event.preventDefault();longPressTBD(\''+cw.liId+'\')">'
    +'<span class="tb-rbtn-name">'+TBD_LABEL+'</span>'
    +'<span class="tb-rbtn-ct'+(tbdCt===0?' zero':'')+'">'+tbdCt+'</span>'
    +'</button>';
  h+='</div></div>';
  // Toolbar
  var canUndo=(st.tapHistory||[]).length>0;
  h+='<div class="tb-toolbar">';
  h+='<button class="tb-undo" '+(canUndo?'':'disabled')+' onclick="undoLast()">↩ Undo last</button>';
  if(totals.tbd>0){
    h+='<div class="tb-tbd-warn">⚠ '+totals.tbd+' TBD damage'+(totals.tbd!==1?'s':'')+' — assign at submit</div>';
  }else{
    h+='<div></div>';
  }
  h+='</div>';
  h+='</div>'; // tally-bar
  return h;
}

// One bucket row of reason buttons (Print or Other).
function renderBucketRow(cw,bucket,activeSize,sd,label,reasonList){
  var dis=!activeSize;
  var counts=(bucket==='print')?(sd.printReasonCounts||{}):(sd.otherReasonCounts||{});
  var h='<div class="tb-bucket '+bucket+'"><div class="tb-bucket-lbl">'+label+'</div><div class="tb-rchips">';
  reasonList.forEach(function(r){
    var ct=counts[r]||0;
    var cls='tb-rbtn'+(ct>0?' has-count':'');
    var rEsc=r.replace(/'/g,"\\'");
    h+='<button class="'+cls+'" '+(dis?'disabled':'')
      +' onclick="tapReason(\''+cw.liId+'\',\''+bucket+'\',\''+rEsc+'\')"'
      +' oncontextmenu="event.preventDefault();longPressReason(\''+cw.liId+'\',\''+bucket+'\',\''+rEsc+'\')">'
      +'<span class="tb-rbtn-name">'+r+'</span>'
      +'<span class="tb-rbtn-ct'+(ct===0?' zero':'')+'">'+ct+'</span>'
      +'</button>';
  });
  h+='</div></div>';
  return h;
}

// Read-only per-size summary (Sz | Ord | Caught | Print | Other | TBD).
function renderSummaryTable(cw,st){
  var cwSt=st.cwData[cw.liId]||{};
  var sizes=Object.keys(cw.sizes).sort(function(a,b){return SZ_ORDER.indexOf(a)-SZ_ORDER.indexOf(b);});
  var totalCaught=0,totalPrint=0,totalOther=0,totalTBD=0,totalOrd=0;
  var h='<div class="cw-summary"><table class="cw-sum-tbl">';
  h+='<thead><tr><th>Size</th><th>Ord</th><th>Caught</th><th class="print">Print</th><th class="other">Other</th><th class="tbd">TBD</th></tr></thead>';
  h+='<tbody>';
  sizes.forEach(function(sz){
    var ord=cw.sizes[sz]||0;
    var t=sizeTotals(cwSt[sz],ord);
    totalCaught+=t.caught;totalPrint+=t.print;totalOther+=t.other;totalTBD+=t.tbd;totalOrd+=ord;
    var rowCls=(st.activeSize===sz)?' class="active-row"':'';
    h+='<tr'+rowCls+'>';
    h+='<td>'+sz+'</td>';
    h+='<td class="muted">'+cw.sizes[sz]+'</td>';
    h+='<td>'+(t.caught||'—')+'</td>';
    h+='<td class="print">'+(t.print||'—')+'</td>';
    h+='<td class="other">'+(t.other||'—')+'</td>';
    h+='<td class="tbd">'+(t.tbd||'—')+'</td>';
    h+='</tr>';
  });
  h+='</tbody>';
  h+='<tfoot><tr><td>Total</td><td>'+totalOrd+'</td><td>'+totalCaught+'</td>'
    +'<td class="print">'+totalPrint+'</td>'
    +'<td class="other">'+totalOther+'</td>'
    +'<td class="tbd">'+totalTBD+'</td></tr></tfoot>';
  h+='</table></div>';
  return h;
}

function buildSpoilage(job,st){
  var dmg=0;
  Object.values(st.cwData).forEach(function(cw){Object.keys(cw).forEach(function(k){
    if(k.charAt(0)==='_')return; // skip _notes
    var t=sizeTotals(cw[k]);
    dmg+=t.print+t.other+t.tbd;
  });});
  var pct=job.qty>0?(dmg/job.qty)*100:0;
  st.spoilage=pct;
  var isBandana=job.isBandana||(job.locations||[]).indexOf('Bandana')>=0;
  var res='NO ACTION',resClass='res-ok';
  if(dmg>0){
    if(isBandana){res='LOGGED';resClass='res-ok';}
    else if(pct<1){res='NO ACTION';resClass='res-ok';}
    else if(pct<5){res='REVIEW';resClass='res-warn';}
    else{res='RE-PRINT';resClass='res-bad';}
  }
  var pctCls=pct>5?'bad':pct>1?'warn':'ok';
  var h='<div class="card-h"><span class="card-t">Spoilage</span></div><div class="card-b">';
  h+='<div class="spoil-row"><span class="spoil-lbl">Spoilage rate</span><span class="spoil-pct '+pctCls+'">'+pct.toFixed(1)+'%</span></div>';
  h+='<div class="spoil-bar-wrap"><div class="spoil-bar '+pctCls+'" style="width:'+Math.min(100,pct)+'%"></div></div>';
  h+='<div class="spoil-row"><span class="spoil-lbl">Resolution</span><span class="res-badge '+resClass+'">'+res+'</span></div>';
  if(dmg>0)h+='<div class="spoil-row" style="margin-top:4px"><span class="spoil-lbl">Damaged</span><span style="font-size:11px;color:var(--muted);font-family:var(--mono)">'+dmg+' of '+job.qty+' pcs</span></div>';
  h+='</div>';
  return h;
}

// ─── INPUT HANDLERS (v110 tally + autopopulate caught) ────────────────
// State shape per (cw, sz):
//   {
//     caughtOffset: 0,           // manual adjustment from auto value (Ord - dmg)
//     printReasonCounts: {},
//     otherReasonCounts: {},
//     tbdEvents: []
//   }
// Displayed Caught = max(0, Ord - totalDmg + caughtOffset)
function ensureSdShape(jobId,liId,sz){
  var st=qcState[jobId];
  if(!st.cwData[liId])st.cwData[liId]={};
  var sd=st.cwData[liId][sz];
  if(!sd){
    sd={caughtOffset:0,printReasonCounts:{},otherReasonCounts:{},tbdEvents:[]};
    st.cwData[liId][sz]=sd;
  }
  // Defensive — older state migrating in
  if(!sd.printReasonCounts)sd.printReasonCounts={};
  if(!sd.otherReasonCounts)sd.otherReasonCounts={};
  if(!sd.tbdEvents)sd.tbdEvents=[];
  if(typeof sd.caughtOffset!=='number')sd.caughtOffset=0;
  return sd;
}

// Pick active size for a colorway. Active size is shared across all colorways
// in the job (lives at qcState[jobId].activeSize per design).
function pickSize(liId,sz){
  var st=qcState[activeJobId];
  if(!st)return;
  st.activeSize=sz;
  st.activeCwId=liId;
  ensureSdShape(activeJobId,liId,sz);
  renderQC();
}

// Mark this colorway as the active card (used when catcher clicks anywhere
// on the card not consumed by another handler).
function setActiveCw(liId){
  var st=qcState[activeJobId];
  if(!st)return;
  if(st.activeCwId===liId)return;
  st.activeCwId=liId;
  // Don't re-render unless we want the visual highlight; cheaper to just toggle classes
  document.querySelectorAll('.cw-card').forEach(function(el){el.classList.remove('active');});
  var c=document.getElementById('cwcard_'+liId);
  if(c)c.classList.add('active');
}

// Tap a Print or Other reason — increments count for active size.
function tapReason(liId,bucket,reason){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return; // size required
  var sd=ensureSdShape(activeJobId,liId,sz);
  var counts=(bucket==='print')?sd.printReasonCounts:sd.otherReasonCounts;
  counts[reason]=(counts[reason]||0)+1;
  st.tapHistory=st.tapHistory||[];
  st.tapHistory.push({kind:bucket,liId:liId,sz:sz,reason:reason,delta:1});
  renderQC();
}

// Long-press a Print or Other reason — decrements count for active size, floors at 0.
function longPressReason(liId,bucket,reason){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return;
  var sd=ensureSdShape(activeJobId,liId,sz);
  var counts=(bucket==='print')?sd.printReasonCounts:sd.otherReasonCounts;
  if(!counts[reason]||counts[reason]<=0)return;
  counts[reason]--;
  if(counts[reason]===0)delete counts[reason];
  st.tapHistory=st.tapHistory||[];
  st.tapHistory.push({kind:bucket,liId:liId,sz:sz,reason:reason,delta:-1});
  renderQC();
}

// Tap [+ Caught] — bumps the offset +1 (catcher absorbed an extra piece).
// Subsequent damage taps still decrement the displayed value, preserving the
// adjustment as a sticky offset.
function tapCaught(liId){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return;
  var sd=ensureSdShape(activeJobId,liId,sz);
  sd.caughtOffset=(parseInt(sd.caughtOffset)||0)+1;
  st.tapHistory=st.tapHistory||[];
  st.tapHistory.push({kind:'caught',liId:liId,sz:sz,delta:1});
  renderQC();
}

// Type into the Caught input — recompute caughtOffset so displayed value matches.
// e.g. Ord=20, dmg=3, current offset=0, displayed Caught=17. Catcher types 18.
//      → new offset = 18 - (20 - 3) = +1.
function onCaughtType(liId,val){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return;
  var job=jobs.find(function(j){return j.id===activeJobId;});
  if(!job)return;
  var cw=(job.colorways||[]).find(function(c){return c.liId===liId;});
  if(!cw)return;
  var ord=parseInt(cw.sizes[sz])||0;
  var sd=ensureSdShape(activeJobId,liId,sz);
  // Compute current dmg
  var t=sizeTotals(sd,ord);
  var dmg=t.print+t.other+t.tbd;
  var typed=parseInt(val);
  if(isNaN(typed))typed=0;
  // offset = typed - (ord - dmg)
  sd.caughtOffset=typed-(ord-dmg);
  // Don't push to tapHistory — typing is direct, not undoable as a single event
  // Update card border + spoilage etc.
  var card=document.getElementById('cwcard_'+liId);
  if(card){
    if(typed>0)card.classList.add('counted');
    else card.classList.remove('counted');
  }
  refreshLiveStats();
  // Update the mode label inline (without full re-render — preserves input focus)
  // The label is the next sibling of the input's parent .tb-caught-row's mode div
  var modeDiv=card?card.querySelector('.tb-caught-mode'):null;
  if(modeDiv){
    var newOffset=sd.caughtOffset;
    var hasOffset=newOffset!==0;
    modeDiv.className='tb-caught-mode'+(hasOffset?' manual':'');
    modeDiv.textContent='on '+sz+(hasOffset?(' · adj '+(newOffset>0?'+':'')+newOffset):' · auto');
  }
}

// TBD tap — opens modal asking for a quick free-text note.
var pendingTBD=null; // {liId, sz}
function tapTBD(liId){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return;
  pendingTBD={liId:liId,sz:sz};
  var inp=document.getElementById('tnInput');
  if(inp){inp.value='';setTimeout(function(){inp.focus();},50);}
  document.getElementById('tnModal').classList.add('open');
}
function tnClose(){
  pendingTBD=null;
  document.getElementById('tnModal').classList.remove('open');
}
function tnConfirm(){
  if(!pendingTBD){tnClose();return;}
  var note=(document.getElementById('tnInput').value||'').trim();
  // Allow empty note — they can fix later
  var liId=pendingTBD.liId,sz=pendingTBD.sz;
  var st=qcState[activeJobId];
  var sd=ensureSdShape(activeJobId,liId,sz);
  var eventId='tbd-'+Date.now()+'-'+Math.random().toString(36).slice(2,7);
  sd.tbdEvents.push({id:eventId,note:note});
  st.tapHistory=st.tapHistory||[];
  st.tapHistory.push({kind:'tbd',liId:liId,sz:sz,eventId:eventId});
  tnClose();
  renderQC();
}

// Long-press TBD — removes the LAST TBD event from active size.
function longPressTBD(liId){
  var st=qcState[activeJobId];
  if(!st)return;
  var sz=st.activeSize;
  if(!sz)return;
  var sd=ensureSdShape(activeJobId,liId,sz);
  if(!sd.tbdEvents||sd.tbdEvents.length===0)return;
  var removed=sd.tbdEvents.pop();
  st.tapHistory=st.tapHistory||[];
  // Remove the matching entry from history if present
  for(var i=st.tapHistory.length-1;i>=0;i--){
    var e=st.tapHistory[i];
    if(e.kind==='tbd'&&e.liId===liId&&e.sz===sz&&e.eventId===removed.id){
      st.tapHistory.splice(i,1);
      break;
    }
  }
  renderQC();
}

// Undo last action across all colorways and sizes.
function undoLast(){
  var st=qcState[activeJobId];
  if(!st||!st.tapHistory||!st.tapHistory.length)return;
  var last=st.tapHistory.pop();
  var sd=ensureSdShape(activeJobId,last.liId,last.sz);
  if(last.kind==='caught'){
    // v110: caught taps adjust caughtOffset, so undo reverses the offset
    sd.caughtOffset=(parseInt(sd.caughtOffset)||0)-(last.delta||1);
  }else if(last.kind==='print'||last.kind==='other'){
    var counts=(last.kind==='print')?sd.printReasonCounts:sd.otherReasonCounts;
    var newVal=(counts[last.reason]||0)-(last.delta||1);
    if(newVal<=0)delete counts[last.reason];
    else counts[last.reason]=newVal;
  }else if(last.kind==='tbd'){
    // Remove the TBD event with matching id
    sd.tbdEvents=(sd.tbdEvents||[]).filter(function(e){return e.id!==last.eventId;});
  }
  renderQC();
}

// Update spoilage % readouts and summary tables in place — for use by
// onCaughtType which doesn't re-render the whole card (preserves input focus).
function refreshLiveStats(){
  var st=qcState[activeJobId];
  var job=jobs.find(function(j){return j.id===activeJobId;});
  if(!job||!st)return;
  // Per-card spoilage chips
  (job.colorways||[]).forEach(function(cw){
    var cwSt=st.cwData[cw.liId]||{};
    var totals=colorwayDamageTotal(cwSt);
    var totalDmg=totals.print+totals.other+totals.tbd;
    var pct=cw.total>0?(totalDmg/cw.total)*100:0;
    var pctCls=pct>5?'bad':pct>1?'warn':'ok';
    var sp=document.getElementById('spoil_'+cw.liId);
    if(sp){sp.textContent=pct.toFixed(1)+'%';sp.className='tb-spoil '+pctCls;}
  });
  // Job-level spoilage card
  var sc=document.getElementById('spoilCard');
  if(sc)sc.innerHTML=buildSpoilage(job,st);
  // v110: submit always enabled — catcher can submit a clean run with zero damage
  var sb=document.getElementById('sbBtn');
  if(sb&&st.status!=='qc-done'){sb.disabled=false;}
}

// POST to Airtable. When WRITES_ENABLED=false, logs to console and returns a
// preview object that mimics the real response shape ({id, fields}) so dependent
// code (DD link) can use a fake rec ID.
function atCreate(tableId,fields){
  if(!WRITES_ENABLED){
    var fakeId='recPREVIEW'+Math.random().toString(36).slice(2,9);
    console.log('[PREVIEW atCreate] '+tableId,fields);
    return Promise.resolve({preview:true,id:fakeId,fields:fields});
  }
  return fetch('https://api.airtable.com/v0/'+BASE+'/'+tableId,{
    method:'POST',
    headers:{'Authorization':'Bearer '+pat,'Content-Type':'application/json'},
    body:JSON.stringify({fields:fields})
  }).then(function(r){
    if(!r.ok)return r.json().then(function(j){throw new Error(j.error?j.error.message:'HTTP '+r.status);});
    return r.json();
  });
}

// Format a human-readable damage description for one bucket.
// bucket: 'print' | 'other'
// Returns "" if no damage in this bucket.
// Format: "3 damaged Print Team (2L, 1XL): Print Error, Smudge"
function formatBucketDescription(cw,cwSt,bucket){
  var rcField=bucket==='print'?'printReasonCounts':'otherReasonCounts';
  var label=bucket==='print'?'Print Team':'Other';
  var sizeBreakdown=[],totalDmg=0,allReasons={};
  Object.keys(cwSt||{}).forEach(function(sz){
    if(sz.charAt(0)==='_')return; // skip _notes
    var sd=cwSt[sz]||{};
    var counts=sd[rcField]||{};
    var d=0;
    Object.keys(counts).forEach(function(r){d+=counts[r]||0;allReasons[r]=true;});
    if(d<=0)return;
    totalDmg+=d;
    sizeBreakdown.push(d+sz);
  });
  if(totalDmg===0)return '';
  sizeBreakdown.sort(function(a,b){
    var szA=a.replace(/^\d+/,''),szB=b.replace(/^\d+/,'');
    return SZ_ORDER.indexOf(szA)-SZ_ORDER.indexOf(szB);
  });
  var reasonList=Object.keys(allReasons);
  var desc=totalDmg+' damaged ('+label+')';
  if(sizeBreakdown.length>0)desc+=' ['+sizeBreakdown.join(', ')+']';
  if(reasonList.length>0)desc+=': '+reasonList.join(', ');
  var notes=(cwSt._notes||'').trim();
  if(notes)desc+='\n\nNotes: '+notes;
  return desc;
}

// Compute the union of all reasons across both buckets for legacy field.
function collectAllReasons(cwSt){
  var set={};
  Object.keys(cwSt||{}).forEach(function(sz){
    if(sz.charAt(0)==='_')return;
    var sd=cwSt[sz]||{};
    Object.keys(sd.printReasonCounts||{}).forEach(function(r){set[r]=true;});
    Object.keys(sd.otherReasonCounts||{}).forEach(function(r){set[r]=true;});
  });
  return Object.keys(set);
}

// Build pairs of {oi, dd} payloads for a job.
// Each pair represents one accountability bucket on one colorway.
// Pure function — no network, no side effects.
//
// IMPORTANT v109: TBD events must be resolved into real bucket counts BEFORE
// calling this function (via the TBD resolution modal at submit time). This
// function ignores tbdEvents entirely — they don't appear in OI or DD writes.
function buildIssuePayloads(jobId){
  var job=jobs.find(function(j){return j.id===jobId;});
  var st=qcState[jobId];
  if(!job||!st||!job.colorways)return [];
  var pairs=[];
  job.colorways.forEach(function(cw){
    var cwSt=st.cwData[cw.liId]||{};
    // Build one pair per non-zero bucket
    ['print','other'].forEach(function(bucket){
      var rcField=bucket==='print'?'printReasonCounts':'otherReasonCounts';
      var totalDmg=0,rpFields={},ddFields={};
      var bucketReasonSet={};
      Object.keys(cw.sizes||{}).forEach(function(sz){
        var sd=cwSt[sz]||{};
        var counts=sd[rcField]||{};
        var d=0;
        Object.keys(counts).forEach(function(r){
          var c=counts[r]||0;
          if(c>0){d+=c;bucketReasonSet[r]=true;}
        });
        if(d>0){
          totalDmg+=d;
          var rpKey=SZ_TO_RP[sz];
          if(rpKey)rpFields[rpKey]=d;
          var ddKey=SZ_TO_DD[sz];
          if(ddKey)ddFields[ddKey]=d;
        }
      });
      if(totalDmg<=0)return; // no damage in this bucket → skip
      var bucketReasons=Object.keys(bucketReasonSet);
      var allReasons=collectAllReasons(cwSt); // union across both buckets — for legacy field
      var desc=formatBucketDescription(cw,cwSt,bucket);
      var accountValue=bucket==='print'?'Print Team':'Other';
      // ── Order Issue payload ──────────────────────────────────────────
      var oiFields={};
      oiFields[OI_FIELDS.affectedLineItem]=[cw.liId];
      if(job.orderRecordId)oiFields[OI_FIELDS.affectedOrder]=[job.orderRecordId];
      oiFields[OI_FIELDS.originator]='Quality Control';
      oiFields[OI_FIELDS.status]='Awaiting Review';
      oiFields[OI_FIELDS.accountability]=accountValue;
      // Legacy field — write union of all reasons (matches v107 behavior)
      oiFields[OI_FIELDS.qcReasonsLegacy]=allReasons;
      // New bucketed field — only this bucket's reasons
      var bucketFieldId=bucket==='print'?OI_FIELDS.qcReasonsPrint:OI_FIELDS.qcReasonsOther;
      oiFields[bucketFieldId]=bucketReasons;
      // Per-size [RP] counts (bucket-scoped)
      Object.keys(rpFields).forEach(function(fldId){oiFields[fldId]=rpFields[fldId];});
      oiFields[OI_FIELDS.description]=desc;
      // ── Damage Detail payload (link to OI added at write-time) ───────
      var ddPayload={};
      ddPayload[DD_FIELDS.lineItem]=[cw.liId];
      ddPayload[DD_FIELDS.accountability]=accountValue;
      ddPayload[DD_FIELDS.reasons]=bucketReasons;
      Object.keys(ddFields).forEach(function(fldId){ddPayload[fldId]=ddFields[fldId];});
      var notes=(cwSt._notes||'').trim();
      if(notes)ddPayload[DD_FIELDS.notes]=notes;
      pairs.push({
        liId:cw.liId,
        garmentName:cw.garmentName||'',
        colorwayName:cw.colorwayName||'',
        bucket:bucket,
        accountability:accountValue,
        totalDmg:totalDmg,
        description:desc,
        reasons:bucketReasons,
        oiFields:oiFields,
        ddFields:ddPayload
      });
    });
  });
  return pairs;
}

// ─── SUBMIT QC — PREVIEW MODAL ────────────────────────────────────────
var pendingSubmitJobId=null;

// Returns all unresolved TBD groups across the job, indexed by (liId, sz).
// Each entry: {liId, sz, garmentName, colorwayName, events:[{id,note}]}
function collectUnresolvedTBDs(jobId){
  var job=jobs.find(function(j){return j.id===jobId;});
  var st=qcState[jobId];
  if(!job||!st)return [];
  var groups=[];
  (job.colorways||[]).forEach(function(cw){
    var cwSt=st.cwData[cw.liId]||{};
    Object.keys(cwSt).forEach(function(sz){
      if(sz.charAt(0)==='_')return;
      var sd=cwSt[sz]||{};
      if(sd.tbdEvents&&sd.tbdEvents.length>0){
        groups.push({
          liId:cw.liId,
          sz:sz,
          garmentName:cw.garmentName||'',
          colorwayName:cw.colorwayName||'',
          events:sd.tbdEvents.slice() // copy
        });
      }
    });
  });
  return groups;
}

// Apply the catcher's bucket+reason resolution for a TBD group.
// Mutates state: clears tbdEvents for this (liId, sz), adds count to chosen
// bucket+reason, appends each TBD note to the colorway's _notes field.
function resolveTBDGroup(jobId,liId,sz,bucket,reason){
  var st=qcState[jobId];
  if(!st)return;
  var sd=ensureSdShape(jobId,liId,sz);
  if(!sd.tbdEvents||sd.tbdEvents.length===0)return;
  var n=sd.tbdEvents.length;
  var counts=(bucket==='print')?sd.printReasonCounts:sd.otherReasonCounts;
  counts[reason]=(counts[reason]||0)+n;
  // Append TBD notes to colorway _notes
  var notesArr=sd.tbdEvents.map(function(e){
    var noteText=e.note?(' — '+e.note):'';
    return 'TBD on '+sz+noteText;
  });
  if(notesArr.length>0){
    var existing=(st.cwData[liId]._notes||'').trim();
    var newLines=notesArr.join('\n');
    st.cwData[liId]._notes=existing?(existing+'\n'+newLines):newLines;
  }
  // Clear TBD events
  sd.tbdEvents=[];
  // Strip from tap history so undo doesn't try to revive them
  if(st.tapHistory){
    st.tapHistory=st.tapHistory.filter(function(e){return !(e.kind==='tbd'&&e.liId===liId&&e.sz===sz);});
  }
}

function submitQC(jobId){
  pendingSubmitJobId=jobId;
  var unresolved=collectUnresolvedTBDs(jobId);
  if(unresolved.length>0){
    openTBDResolveModal(jobId,unresolved);
    return;
  }
  proceedToSubmitPreview(jobId);
}

function proceedToSubmitPreview(jobId){
  var pairs=buildIssuePayloads(jobId);
  var job=jobs.find(function(j){return j.id===jobId;});
  smRender(job,pairs);
  document.getElementById('smModal').classList.add('open');
}

function onTBDBucketChange(idx){
  var bucketSel=document.getElementById('tr_bucket_'+idx);
  var reasonSel=document.getElementById('tr_reason_'+idx);
  var bucket=bucketSel.value;
  reasonSel.innerHTML='';
  if(!bucket){
    reasonSel.disabled=true;
    reasonSel.innerHTML='<option value="">— pick bucket first —</option>';
    return;
  }
  reasonSel.disabled=false;
  var list=bucket==='print'?DMG_REASONS_PRINT:DMG_REASONS_OTHER;
  reasonSel.innerHTML='<option value="">— pick —</option>'+
    list.map(function(r){return '<option value="'+r+'">'+r+'</option>';}).join('');

function onTBDResolveConfirm(){
  if(!pendingTBDGroups){return;}
  // Validate: every group has bucket + reason
  var resolutions=[];
  for(var i=0;i<pendingTBDGroups.length;i++){
    var b=document.getElementById('tr_bucket_'+i).value;
    var r=document.getElementById('tr_reason_'+i).value;
    if(!b||!r){
      alert('Please pick a bucket and reason for every TBD group.');
      return;
    }
    resolutions.push({bucket:b,reason:r});
  }
  // Apply resolutions
  var jobId=pendingSubmitJobId;
  pendingTBDGroups.forEach(function(g,i){
    var res=resolutions[i];
    resolveTBDGroup(jobId,g.liId,g.sz,res.bucket,res.reason);
  });
  pendingTBDGroups=null;
  // Close TBD modal and re-open submit preview
  smClose();
  // Restore the submit confirm button handler
  var btn=document.getElementById('smConfirm');
  btn.onclick=smConfirm;
  // Re-render the QC view since state changed (notes appended, counts moved)
  renderQC();
  // Now proceed to the submit preview
  proceedToSubmitPreview(jobId);
}

    });

  }
}

function smClose(){

// v108 write flow: for each pair, sequentially create OI → then DD with link.
// Pairs are processed in parallel (different OIs don't depend on each other),
// but within a pair the DD must wait for the OI's rec ID to populate the link.
// In preview mode, atCreate returns a fake rec ID so the DD payload still
// shows a link in the console log.
function writePair(pair){
  return atCreate(OI_TBL,pair.oiFields).then(function(oiResult){
    if(!oiResult||(!oiResult.id&&!oiResult.preview))throw new Error('OI create returned no id');
    var oiRecId=oiResult.id;
    // Add the OI link to the DD payload now that we have the parent rec ID
    var ddWithLink=Object.assign({},pair.ddFields);
    ddWithLink[DD_FIELDS.orderIssue]=[oiRecId];
    return atCreate(DD_TBL,ddWithLink).then(function(ddResult){
      return {oi:oiResult,dd:ddResult};
    });
  });
}

function smConfirm(){
  var jobId=pendingSubmitJobId;
  if(!jobId){smClose();return;}
  var pairs=buildIssuePayloads(jobId);
  var btn=document.getElementById('smConfirm');
  if(btn){btn.disabled=true;btn.textContent='Working…';}
  // Process pairs in parallel — each pair internally chains OI then DD.
  var promises=pairs.map(function(p){
    return writePair(p).catch(function(e){return{error:e.message};});
  });
  Promise.all(promises).then(function(results){
    var errors=results.filter(function(r){return r&&r.error;});
    if(errors.length>0){
      alert('Some writes failed:\n'+errors.map(function(e){return e.error;}).join('\n'));
      if(btn){btn.disabled=false;btn.textContent='Retry';}
      return;
    }
    // Mark QC done in local state regardless of preview/live
    qcState[jobId].status='qc-done';
    var job=jobs.find(function(j){return j.id===jobId;});if(job)job.status='qc-done';
    smClose();
    renderQC();
  });
}

function markComplete(jobId){
  var st=qcState[jobId];
  if(st)st.status='complete';
  jobs=jobs.filter(function(j){return j.id!==jobId;});
  renderQueue();
}

// Boxing helpers
function mk(parent,tag,cls){var el=document.createElement(tag);if(cls)el.className=cls;if(parent)parent.appendChild(el);return el;}
function addCh(p,t,c){var e=mk(p,'span','tag'+(c?' '+c:''));e.textContent=t;return e;}
var SIZE_ORDER_BOX=['6XL','5XL','4XL','3XL','2XL','XL','L','M','S','XS','OSFA'];
var BOX_SIZES_DEF={L:{name:'L',dims:'24x16x14in'},M:{name:'M',dims:'24x16x6in'},S:{name:'S',dims:'12x12x6in'}};
function getGarmentCategory(loc){if(!loc)return'tee';var s=loc.toLowerCase();if(s.includes('bandana'))return'bandana';if(s.includes('hoodie')||s.includes('sweatshirt'))return'hoodie';if(s.includes('cap')||s.includes('hat')||s.includes('beanie'))return'hat';return'tee';}
function getBoxSizeAndCap(loc,qty){var cat=getGarmentCategory(loc);switch(cat){
  case'bandana':
    if(qty<=100)return{boxSize:BOX_SIZES_DEF.S,capacity:100};
    if(qty<=300)return{boxSize:BOX_SIZES_DEF.M,capacity:300};
    return{boxSize:BOX_SIZES_DEF.L,capacity:500};
  case'hoodie':return{boxSize:BOX_SIZES_DEF.L,capacity:10}; // 2 stacks of 5
  case'hat':return{boxSize:BOX_SIZES_DEF.S,capacity:50};
  case'tee':default:return{boxSize:BOX_SIZES_DEF.L,capacity:100}; // always Large
}}
function formatBoxSizes(sizeObj){var active=SIZE_ORDER_BOX.filter(function(s){return sizeObj[s]>0;});if(active.length===1&&active[0]==='OSFA')return'OSFA';return active.map(function(s){return sizeObj[s]+' - '+s;}).join(', ')||'—';}

function buildBoxesFromQC(job,st){
  var cwData=st.cwData||{};
  var rows=[];
  (job.colorways||[]).forEach(function(cw){
    var cwSt=cwData[cw.liId]||{};
    var sizes={};var tot=0;
    Object.keys(cw.sizes||{}).forEach(function(sz){
      // v110: caught is derived (Ord - dmg + offset). Use sizeTotals for derived value.
      var ord=parseInt(cw.sizes[sz])||0;
      var caught=sizeTotals(cwSt[sz],ord).caught;
      if(caught>0){sizes[sz]=caught;tot+=caught;}
    });
    if(!tot){Object.keys(cw.sizes||{}).forEach(function(sz){sizes[sz]=cw.sizes[sz];tot+=cw.sizes[sz];});}
    if(tot>0)rows.push({garment:cw.garmentName||((job.locations&&job.locations[0])||'Garment'),color:cw.colorwayName||'—',design:(job.imprintIds&&job.imprintIds.length?job.imprintIds.join(' | '):job.orderNum),sizes:sizes,total:tot});
  });
  if(!rows.length){
    // Fallback: build rows from ordered sizes, but use real garment/color from colorways if available
    var design2=job.imprintIds&&job.imprintIds.length?job.imprintIds.join(' | '):job.orderNum;
    if(job.colorways&&job.colorways.length){
      // Build one row per colorway using ordered sizes
      job.colorways.forEach(function(cw){
        var sm2={};var t3=0;
        Object.keys(cw.sizes||{}).forEach(function(sz){if(cw.sizes[sz]>0){sm2[sz]=cw.sizes[sz];t3+=cw.sizes[sz];}});
        if(!t3){(job.sizes||[]).forEach(function(s){sm2[s.size]=s.qty;t3+=s.qty;});}
        rows.push({garment:cw.garmentName||((job.locations&&job.locations[0])||'Garment'),color:cw.colorwayName||'—',design:design2,sizes:sm2,total:t3||job.qty});
      });
    }else{
      var sm={};var t2=0;(job.sizes||[]).forEach(function(s){sm[s.size]=s.qty;t2+=s.qty;});
      rows=[{garment:(job.locations&&job.locations[0])||'Garment',color:'—',design:design2,sizes:sm,total:t2||job.qty}];
    }
  }
  var grandTotal=rows.reduce(function(a,r){return a+r.total;},0);
  var loc=(job.locations&&job.locations[0])||'';
  var cat=getGarmentCategory(loc);
  // ── Box assignment logic per spec ──────────────────────────────────
  // Tees: always Large box, split at 75 (76-100 = 2 boxes), max 100/box
  // Hoodies: always Large, max 10 (2 stacks of 5)
  // Bandanas: S≤100, M≤300, L≤500, split at 500 for 500+
  // Hats: S box, max 50
  var CAPACITY=cat==='hoodie'?10:cat==='bandana'?500:cat==='hat'?50:72;
  var SPLIT_AT=cat==='tee'?75:CAPACITY; // tees split at 75
  var numBoxes;
  if(cat==='bandana'){
    numBoxes=grandTotal<=100?1:grandTotal<=300?1:grandTotal<=500?1:Math.ceil(grandTotal/500);
  } else if(cat==='tee'){
    numBoxes=grandTotal<=72?1:Math.ceil(grandTotal/CAPACITY);
  } else {
    numBoxes=grandTotal<=CAPACITY?1:Math.ceil(grandTotal/CAPACITY);
  }
  var perBox=Math.ceil(grandTotal/numBoxes);
  var bc=getBoxSizeAndCap(loc,grandTotal);
  var allBoxes=[],rem=rows.map(function(r){return{garment:r.garment,color:r.color,design:r.design,sizes:Object.assign({},r.sizes),total:r.total};});
  var left=grandTotal;
  for(var bi=0;bi<numBoxes;bi++){
    var isLast=(bi===numBoxes-1),boxTarget=isLast?left:Math.min(perBox,left);
    var bci=getBoxSizeAndCap(loc,boxTarget);
    var box={rows:[],count:0,boxSize:bci.boxSize,capacity:bci.capacity};
    var space=boxTarget;
    rem=rem.filter(function(row){
      if(row.total<=0||space<=0)return row.total>0;
      if(row.total<=space){box.rows.push({garment:row.garment,color:row.color,design:row.design,sizes:Object.assign({},row.sizes),total:row.total});box.count+=row.total;space-=row.total;left-=row.total;return false;}
      var take=space,ss={},tk=0;
      SIZE_ORDER_BOX.forEach(function(sz){if(tk>=take||!row.sizes[sz])return;var g=Math.min(row.sizes[sz],take-tk);if(g>0){ss[sz]=g;row.sizes[sz]-=g;if(!row.sizes[sz])delete row.sizes[sz];tk+=g;}});
      if(tk>0){box.rows.push({garment:row.garment,color:row.color,design:row.design,sizes:ss,total:tk});box.count+=tk;row.total-=tk;left-=tk;}
      space=0;return row.total>0;
    });
    allBoxes.push(box);
  }
  var MIN={tee:25,hoodie:5,bandana:50,hat:25}; // min qty before merging into prev box
  for(var ci=allBoxes.length-1;ci>0;ci--){
    var cbox=allBoxes[ci],pbox=allBoxes[ci-1];
    if(cbox.count<(MIN[cat]||25)){
      cbox.rows.forEach(function(row){var ex=pbox.rows.find(function(r){return r.color===row.color&&r.design===row.design;});if(ex){SIZE_ORDER_BOX.forEach(function(sz){if(row.sizes[sz])ex.sizes[sz]=(ex.sizes[sz]||0)+row.sizes[sz];});ex.total+=row.total;}else{pbox.rows.push({garment:row.garment,color:row.color,design:row.design,sizes:Object.assign({},row.sizes),total:row.total});}});
      pbox.count+=cbox.count;allBoxes.splice(ci,1);
    }
  }
  return allBoxes;
}

  window.addRow=function(bi){var tbls=overlay.querySelectorAll('.lbl-table tbody');var tb=tbls[bi];if(!tb)return;var rows=tb.querySelectorAll('tr');var prevCells=rows.length?rows[rows.length-1].querySelectorAll('td span'):[];var prevVals=Array.from(prevCells).map(function(s){return s.textContent||'—';});var tr=document.createElement('tr');tr.className='lbl-data-row';for(var ci=0;ci<6;ci++){var td=document.createElement('td');if(ci<5){var sp=document.createElement('span');sp.contentEditable='true';sp.textContent=ci===0&&prevVals[0]&&prevVals[0]!=='—'?prevVals[0]:'—';td.appendChild(sp);}else{var btn=document.createElement('button');btn.textContent='✕';btn.style.cssText='background:none;border:none;color:#999;font-size:14px;cursor:pointer;padding:4px 8px;';btn.onclick=function(){tr.parentNode&&tr.parentNode.removeChild(tr);};td.style.cssText='text-align:center;padding:0';td.appendChild(btn);}tr.appendChild(td);}tb.appendChild(tr);};

// ─── PROOF MODAL ──────────────────────────────────────────────────────
function openProofs(liId){
  var jobId=activeJobId;
  var job=jobs.find(function(j){return j.id===jobId;});
  if(!job)return;
  var cw=job.colorways&&job.colorways.find(function(c){return c.liId===liId;});
  var proofs=[];
  if(cw&&cw.fullUrl)proofs.push({url:cw.fullUrl,thumb:cw.thumb,filename:'Proof'});
  if(!proofs.length&&job.proofs.length)proofs=job.proofs;
  if(!proofs.length)return;
  pmProofs=proofs;pmIdx=0;
  document.getElementById('pmModal').classList.add('open');
  pmShow();
}
function pmClose(){document.getElementById('pmModal').classList.remove('open');}
function pmNav(dir){pmIdx=Math.max(0,Math.min(pmProofs.length-1,pmIdx+dir));pmShow();}
function pmShow(){
  if(!pmProofs.length)return;
  var p=pmProofs[pmIdx];
  document.getElementById('pmFn').textContent=p.filename||('Proof '+(pmIdx+1));
  document.getElementById('pmCt').textContent=(pmIdx+1)+'/'+pmProofs.length;
  var body=document.getElementById('pmBody');
  body.innerHTML='<div style="color:#666;font-size:12px;font-family:var(--mono)">Loading…</div>';
  var img=new Image();
  img.onload=function(){body.innerHTML='';img.style.cssText='max-width:100%;max-height:100%;object-fit:contain;border-radius:4px';body.appendChild(img);};
  img.onerror=function(){body.innerHTML='<div style="color:#666;font-family:var(--mono);font-size:12px">Could not load proof</div>';};
  img.src=p.thumb||p.url;
}
</script>
