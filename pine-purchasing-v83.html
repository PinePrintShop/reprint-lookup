<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pine Purchasing v83</title>
<style>
/* ============================================================
   PINE PURCHASING v74 — logbook redesign, LIVE READ (writes gated off)
   Ground-up rewrite. Vendor API integration removed (that was v73).
   Model: catalog what purchasing orders on the vendor sites.
     queue of orders needing goods -> cart -> quicklink out to vendor ->
     log per line (warehouse-specific supplier, PO #, per-bracket blank cost,
     per-size extras, inbound freight, Ordered) -> all lines ordered ->
     flip Order Status -> "Ordered - In Production".

   Data layer LOCKED from live schema pull 2026-07-07.
   Base appJkaLk8DykjsgHR
   Line Items tblJx5UlwO7oMSk5H · Suppliers tbldewW9XDeW7Yruf
   Orders tbl8Tf0AeS9gnHOOS · Garments tblukWGm0CIelookM

   PREFILL RULE (confirmed): XS-XL prefill = Garment Cost;
     2XL+ prefill = Garment Cost + that size's Upcharge (lookups on the LI).
   6X extras: no Extra 6X field — fold into Order Notes.
   Supplier WRITE = warehouse-specific; quicklinks = brand-deduped.

   Token: localStorage 'pine_at_key' (shared across Pine Central apps).
   v0 REST only (v1 has no browser CORS). Lookups may be flat array OR
   valuesByLinkedRecordId object — flat() handles both.
   ============================================================ */
:root{
  --bg:#F2F2EE; --surface:#fff; --bg-soft:#F8F8F5;
  --border:#E5E5E0; --border-dk:#D0D0CA;
  --green:#1e6b45; --green-lt:#e8f5ee; --green-md:#2d8a5a; --green-dk:#144d31;
  --text:#0D0D0B; --muted:#888880; --muted-lt:#BBBBB5;
  --yellow:#E8E832; --yellow-dim:#E8E83230; --yellow-border:#E8E83250;
  --red:#c0392b; --red-bg:#fdf2f2; --red-bd:#f5c6c6;
  --amb:#b7791f; --amb-bg:#fffbeb; --amb-bd:#fde68a;
  --sb-bg:#0A0A08; --sb-border:#1A1A16; --sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif; --cond:Helvetica,Arial,sans-serif; --mono:Helvetica,Arial,sans-serif;
  --radius:4px; --radius-lg:6px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
.wrap{width:100%;padding:14px 28px 96px}   /* FULL WIDTH — desktop */

.topbar{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.brand{font-size:15px;font-weight:700;letter-spacing:.02em;text-transform:uppercase;font-family:var(--cond)}
.brand .v{font-size:9px;color:var(--muted-lt);margin-left:6px;vertical-align:top}
.spacer{flex:1}
.pill{font-size:10px;font-weight:700;padding:5px 12px;border:1px solid var(--border-dk);border-radius:20px;background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);transition:all .1s}
.pill:hover{border-color:var(--text);color:var(--text)}
.preview-badge{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--amb);background:var(--amb-bg);border:1px solid var(--amb-bd);padding:4px 9px;border-radius:20px}
.preview-badge.live{color:#fff;background:var(--red);border-color:var(--red)}
.tokchip{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);padding:4px 9px;border-radius:20px;border:1px solid var(--border-dk);color:var(--muted);cursor:pointer}
.tokchip.ok{color:var(--green);border-color:#bfe3cf;background:var(--green-lt)}
.kicker{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted-lt);font-family:var(--cond);margin-bottom:10px}
.msg{padding:24px;text-align:center;color:var(--muted);font-size:13px}
.msg.err{color:var(--red)}

/* QUEUE */
.og{margin-bottom:12px}
.og-hdr{background:var(--bg-soft);border:1px solid var(--border);border-radius:var(--radius);padding:20px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;user-select:none}
.og-hdr:hover{background:var(--surface);border-color:var(--border-dk)}
.og-hdr.started{background:#FCFCE6;border-color:#E8E832;box-shadow:inset 3px 0 0 #E8E832}
.og-hdr.started:hover{background:#FAFAD8;border-color:#E8E832}
.og-hdr.saved{background:var(--green-lt);border-color:#bfe3cf;box-shadow:inset 3px 0 0 var(--green)}
.og-hdr.saved:hover{background:#dff0e6;border-color:#bfe3cf}
.og-num{font-size:17px;font-weight:700;font-family:var(--cond);font-variant-numeric:tabular-nums;letter-spacing:-0.01em;flex-shrink:0;min-width:56px}
.og-cust{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-family:var(--cond);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.og-meta{display:flex;gap:5px;align-items:center;flex-shrink:0}
.tag{font-size:9px;padding:3px 8px;border-radius:2px;white-space:nowrap;font-weight:700;letter-spacing:.06em;text-transform:uppercase;border:1px solid;font-family:var(--cond)}
.tag.g{background:var(--sb-bg);color:var(--yellow);border-color:var(--yellow-border)}
.tag.n{background:var(--surface);color:var(--muted);border-color:var(--border)}
.tag.r{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
.tag.amb{background:var(--amb-bg);color:var(--amb);border-color:var(--amb-bd)}
.tag.done{background:var(--green-lt);color:var(--green);border-color:#bfe3cf}
.tag.cart{background:#E8E832;color:#0D0D0B;border-color:#d4d41f}
.og-go{font-size:16px;color:var(--muted-lt)}

/* CART */
.hidden{display:none}
.cart-head{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.ch-kick{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-family:var(--cond)}
.ch-cust{font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-family:var(--cond);line-height:1.1}
.ch-info{flex:1;min-width:0}
.ch-chips{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ch-order{font-size:40px;font-weight:700;letter-spacing:-0.02em;font-family:var(--cond);line-height:1}

.qlbar{background:var(--sb-bg);border-radius:var(--radius-lg);padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.qlbar .lbl{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-family:var(--cond)}
.ql{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:var(--cond);color:var(--yellow);background:transparent;border:1px solid var(--yellow-border);border-radius:20px;padding:5px 14px;text-decoration:none;transition:all .1s}
.ql:hover{background:var(--yellow);color:var(--sb-bg);border-color:var(--yellow)}
.ql-more{font-size:11px;font-weight:700;font-family:var(--cond);color:var(--yellow);background:var(--sb-active);border:1px solid var(--yellow-border);border-radius:20px;padding:5px 10px;text-transform:uppercase;letter-spacing:.04em;cursor:pointer}

.line{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden;transition:border-color .12s}
.line.ordered{border-color:#bfe3cf}
.line-top{display:flex;align-items:flex-start;gap:14px;padding:18px 18px 14px}
.line-thumb{width:60px;height:60px;border-radius:var(--radius);background:var(--bg);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--muted-lt);text-align:center;font-family:var(--cond);letter-spacing:.06em}
.line-thumb img{width:100%;height:100%;object-fit:cover}
.line-thumb.clickable{cursor:zoom-in}
.line-thumb.clickable:hover{border-color:var(--green)}
.pm-overlay{position:fixed;inset:0;background:rgba(10,10,8,.82);display:flex;align-items:center;justify-content:center;z-index:50;cursor:zoom-out;padding:32px}
.pm-overlay.hidden{display:none}
.pm-img{max-width:92vw;max-height:92vh;border-radius:6px;background:#fff;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.line-id{flex:1;min-width:0}
.line-garment{font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:.01em;font-family:var(--cond);line-height:1.15}
.line-sub{font-size:11px;color:var(--muted);margin-top:3px}
.vjump{display:inline-flex;align-items:center;gap:3px;margin-top:5px;margin-right:5px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;font-family:var(--cond);color:var(--green);background:var(--green-lt);border:1px solid #bfe3cf;border-radius:20px;padding:3px 10px;text-decoration:none;transition:all .1s}
.vjump:hover{background:var(--green);color:#fff;border-color:var(--green)}
.vjump.alt{color:var(--muted);background:var(--surface);border-color:var(--border-dk)}
.vjump.alt:hover{background:var(--sb-bg);color:var(--yellow);border-color:var(--sb-bg)}
.ord-toggle{display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;flex-shrink:0}
.ord-box{width:22px;height:22px;border:1.5px solid var(--border-dk);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .12s;background:var(--surface)}
.line.ordered .ord-box{background:var(--green);border-color:var(--green);color:#fff}
.ord-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-family:var(--cond)}
.line.ordered .ord-label{color:var(--green)}

/* the desktop line body: size grid + costs on one row, meta below */
.line-body{padding:0 18px 4px 92px}
.body-cols{display:flex;gap:28px;flex-wrap:wrap;align-items:flex-start}

.size-grid{display:grid;gap:0;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;width:fit-content;max-width:100%}
.size-grid .row{display:grid;grid-template-columns:repeat(var(--cols),minmax(54px,1fr))}
.size-grid .cell{padding:8px 12px;text-align:center;border-right:1px solid var(--border);font-variant-numeric:tabular-nums;font-size:13px}
.size-grid .cell:last-child{border-right:none}
.size-grid .row.hd .cell{background:var(--bg-soft);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:var(--cond)}
.size-grid .row.qty{border-top:1px solid var(--border)}
.size-grid .row.extra{border-top:1px solid var(--border)}
.size-grid .cell.upch{background:#fcfcfa;color:var(--amb)}
.size-grid .cell.rowlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-family:var(--cond);text-align:left;display:flex;align-items:center;background:var(--bg-soft)}
.size-grid .cell.exc{padding:2px}
.size-grid .cell.nox{background:#fafaf8;color:var(--muted-lt);font-size:9px;display:flex;align-items:center;justify-content:center}
.ex-in{width:100%;border:none;background:transparent;text-align:center;font-size:13px;font-variant-numeric:tabular-nums;padding:3px 2px;font-family:var(--sans);color:var(--green);font-weight:700}
.ex-in:focus{outline:none;background:var(--green-lt)}
.ex-in::placeholder{color:var(--muted-lt);font-weight:400}

.costs-lbl{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-weight:700;font-family:var(--cond);margin-bottom:7px}
.cost-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.cost-field{display:flex;flex-direction:column;gap:3px}
.cost-field .cf-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:var(--cond)}
.cost-input-wrap{display:flex;flex-direction:column;gap:3px}
.cost-input{width:92px;padding:6px 8px;border:1px solid var(--border-dk);border-radius:var(--radius);font-size:14px;font-variant-numeric:tabular-nums;text-align:right;font-family:var(--sans);background:var(--surface)}
.cost-input:focus{outline:none;border-color:var(--green)}
.cost-input.upch-in{border-color:var(--amb-bd)}
.onfile{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:2px 6px;border-radius:2px;font-family:var(--cond);white-space:nowrap;align-self:flex-start}
.onfile.ok{background:var(--green-lt);color:var(--green);border:1px solid #bfe3cf}
.onfile.edited{background:var(--amb-bg);color:var(--amb);border:1px solid var(--amb-bd)}
.onfile.none{background:var(--surface);color:var(--muted-lt);border:1px solid var(--border)}

.extras-summary{font-size:10px;color:var(--muted);font-family:var(--cond);letter-spacing:.04em;padding:6px 18px 2px 92px;text-transform:uppercase}
.extras-summary b{color:var(--green);font-weight:700}
.notecallout{background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:6px 10px;margin:6px 18px 4px 92px;font-size:11px;color:var(--amb);display:flex;gap:7px;align-items:flex-start}
.notecallout b{font-weight:700}

.meta-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;padding:14px 18px 18px 92px;border-top:1px solid var(--bg-soft);margin-top:10px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf .cf-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-family:var(--cond)}
.mf select,.mf input{padding:6px 8px;border:1px solid var(--border-dk);border-radius:var(--radius);font-size:13px;font-family:var(--sans);background:var(--surface)}
.mf select:focus,.mf input:focus{outline:none;border-color:var(--green)}
.mf .sel{min-width:260px}
.mf .po{width:130px;font-variant-numeric:tabular-nums}
.mf .frt{width:90px;text-align:right;font-variant-numeric:tabular-nums}
.line-total{margin-left:auto;text-align:right}
.save-btn{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;font-family:var(--cond);padding:9px 16px;border-radius:var(--radius);border:none;cursor:pointer;background:var(--green);color:#fff;transition:all .12s;align-self:center}
.save-btn:hover{background:var(--green-dk)}
.save-btn:disabled{opacity:.6;cursor:default}
.save-btn.saved{background:var(--green-lt);color:var(--green);border:1px solid #bfe3cf}
.lt-lbl{font-size:9px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em;font-weight:700;font-family:var(--cond)}
.lt-val{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.01em}

.cartbar{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 28px;z-index:20}
.cartbar-inner{width:100%;display:flex;align-items:center;gap:20px}
.cart-total-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;font-family:var(--cond)}
.cart-total-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
.cart-prog{font-size:11px;color:var(--muted);font-weight:600}
.btn-flip{margin-left:auto;font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--cond);padding:11px 22px;border-radius:var(--radius);border:none;cursor:pointer;background:var(--border);color:var(--muted-lt);transition:all .12s}
.btn-flip.ready{background:var(--green);color:#fff}
.btn-flip.ready:hover{background:var(--green-dk)}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="brand">Pine Purchasing<span class="v">v83</span></span>
    <span class="spacer"></span>
    <span class="preview-badge" id="modeBadge">—</span>
    <span class="tokchip" id="tokChip" onclick="setToken()">Token</span>
    <span class="pill" onclick="loadAll()">↻ Refresh</span>
  </div>

  <div id="queue">
    <div class="kicker">Orders needing goods · <span id="q-count">—</span></div>
    <div id="queue-list"><div class="msg" id="queue-msg">Loading…</div></div>
  </div>

  <div id="cart" class="hidden">
    <span class="pill" onclick="showQueue()" style="margin-bottom:12px;display:inline-block">← All orders</span>
    <div class="cart-head">
      <div class="ch-info">
        <div class="ch-kick">Order</div>
        <div class="ch-cust" id="ch-cust">—</div>
        <div class="ch-chips" id="ch-chips"></div>
      </div>
      <div class="ch-order" id="ch-order">—</div>
    </div>
    <div class="qlbar">
      <span class="lbl">Order on →</span>
      <span id="ql-links"></span>
    </div>
    <div id="lines"></div>
  </div>
</div>

<div class="cartbar hidden" id="cartbar">
  <div class="cartbar-inner">
    <div>
      <div class="cart-total-lbl">Order blank cost</div>
      <div class="cart-total-val" id="cart-total">$0.00</div>
    </div>
    <div class="cart-prog" id="cart-prog">0 of 0 lines ordered</div>
    <button class="btn-flip ready" id="btn-flip" onclick="saveAll()">Save all lines</button>
  </div>
</div>

<div id="proofModal" class="pm-overlay hidden" onclick="closeProof()"><img id="pm-img" class="pm-img" alt="Mockup"></div>

<script>
/* ================= CONFIG ================= */
var WRITES_ENABLED = true;                  // LIVE — Line Items only (no Order Status flip yet)
var BASE = 'appJkaLk8DykjsgHR';
var T_LI = 'tblJx5UlwO7oMSk5H';
var T_SUP = 'tbldewW9XDeW7Yruf';
var T_ORD = 'tbl8Tf0AeS9gnHOOS';
var T_GAR = 'tblukWGm0CIelookM';

/* which product types purchasing orders blanks for (server-side, reliable singleSelect) */
var PRODUCT_TYPES = ['Printed Apparel','Embroidered Apparel','Flatstock Printing'];
/* keep only orders in these statuses (client-side, status is a lookup on the LI) */
var ACTIVE_STATUSES = ['Ready to Order','Pre-press',
  'Delayed - Mis-Shipment - Needs Order','Delayed - Mis-Print - Needs Order'];
/* vendors to hide from quicklinks + supplier picker (e.g. acquired/defunct) */
var EXCLUDE_BRANDS = ['Alphabroder', 'TSC Apparel', 'TSF Sportswear'];   // Alphabroder acquired by S&S; TSC defunct; TSF site down

/* ---- Line Items field IDs ---- */
var F = {
  name:'fldU6oLyZnxhhm2kX', garmentLink:'fldZbOdGIoCk3Gan2', cust:'fldB4mKfMl2Lp9UK0',
  orderNum:'fldRNXpvna5jpa1v5', due:'fldgWlu3jLaabJZ6i', priority:'fldteo6bY0vMBnlFK',
  status:'fldpCv8bxptGJ1gty', ptype:'fld8LIkrBXv8WoRRb', proof:'flddhvdkKI31tFTdX',
  garmentCost:'fldVtBTv42HG6WYs1',
  supplier:'fldoboa9QhrHbEe8A', supplierName:'fldj5Oq8JVUocLzS2',
  po:'fldIUAnkNscvEVDjU', ordered:'fldBnjGyTLLjzz97l',
  freight:'fldi2RmXxYgckvHfd', orderNotes:'fldF378cgWuOcWNL6',
  created:'fldl02e7TiLPg4v47'
};
/* size defs: k=label, q=qty field, x=extra field (null if none), b=cost bracket */
var SIZE_DEFS = [
  {k:'OS', q:'fld2bgIlmPbANgLVK', x:'fldKS4Jk6aZvxR4Nn', b:'XS-XL'},
  {k:'XS', q:'fldVA9ZmYxhDxtnYZ', x:'fldKcVhxgaclD1csp', b:'XS-XL'},
  {k:'S',  q:'fldCZr5lB6Jx80lfG', x:'fldgf19Xi1VDqro4Q', b:'XS-XL'},
  {k:'M',  q:'fldzTs1qKe9IBxxSn', x:'fldWxiQEIFsqwxFW1', b:'XS-XL'},
  {k:'L',  q:'fldnRLJxjUDa1mQTj', x:'fldclPpJQpcXuT4Wn', b:'XS-XL'},
  {k:'XL', q:'fldTRgdexcpBXXQPv', x:'fldWjibddJoIC1JGu', b:'XS-XL'},
  {k:'2XL',q:'fldin7j6uGO0uRTec', x:'fldgd2JZCSS3YBYX2', b:'2XL'},
  {k:'3XL',q:'fldpltq9fdRkrvIvt', x:'fldbht14x4cRBPRVL', b:'3XL'},
  {k:'4XL',q:'fldrsci7JnToa43Zd', x:'fldLyB756Va085UDj', b:'4XL'},
  {k:'5XL',q:'fldchnRSKFukouW6N', x:'fldHZ0WmjhzF34noZ', b:'5XL'},
  {k:'6XL',q:'fldI8gTtsEJwg33BI', x:null,                b:'6XL'}
];
var BASE_BRACKET = 'XS-XL';
var BRACKET_COST = {'XS-XL':'fld6aEQmg93tBX18h','2XL':'fldv2GCifJ5wCiCyP','3XL':'fldlx8WRqPlslePyS','4XL':'fldxcAIPOhFZnkKO0','5XL':'fldabJR7hUUsrPm6A','6XL':'fldIfIKnwQqwcZW9Y'};
var BRACKET_UP  = {'2XL':'fldvseddfE2dsigZ1','3XL':'fld6fTNCf7E6oS17E','4XL':'fldxNe2sNT78KOE67','5XL':'fldllYzKwMdvYorO0','6XL':'fldblQlWFLr8E302P'};
var ORDER_STATUS_FLD = 'fldhS4z28CdGmS1j5';

/* ---- S&S product deep-link ----
   S&S product page: https://www.ssactivewear.com/p/{brandSlug}/{style}
   Map from S&S's own brand list (slugs aren't always obvious). Also acts as
   the "S&S carries this brand" gate — no link shown for AS Colour / SLC-only
   garments. Keys are normalized (lowercase, punctuation stripped). */
var SS_BRAND_SLUG = {
  '47 brand':'47_brand','adams headwear':'adams_headwear','adidas':'adidas',

function normBrand(s){ return String(s||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim(); }
/* parse "{Brand} {Style} - {Color}" -> {brand, style} */
function parseGarment(name){
  var s = String(name||'').split(' - ')[0].trim();   // drop color
  var toks = s.split(/\s+/);
  if(toks.length<2) return {brand:'', style:toks[0]||''};
  var style = toks[toks.length-1];
  var brand = toks.slice(0,-1).join(' ');
  return {brand:brand, style:style};
}

/* ---- other vendors carry many of the same brands; gate jump pills by brand ----
   S&S = exact product page (best). AS Colour / SLC / Sanmar = style search
   ("land on results"). Search URLs flagged for a quick browser check — a wrong
   search path is a harmless miss, not a 404, and a one-line fix here. */
function setOf(list){ var m={}; list.forEach(function(k){ m[k]=true; }); return m; }

/* returns [{label, url, primary}] for every top-4 vendor that carries this brand */
function vendorJumps(garment){
  var p = parseGarment(garment);
  if(!p.style) return [];
  var bn = normBrand(p.brand), style = p.style, out = [];
  if(SS_BRAND_SLUG[bn]) out.push({ label:'S&S', primary:true,
    url:'https://www.ssactivewear.com/p/'+SS_BRAND_SLUG[bn]+'/'+encodeURIComponent(style.toLowerCase()) });
  if(bn==='as colour' || bn==='ascolour') out.push({ label:'AS Colour', primary:false,
    url:'https://ascolour.com/search.php?search_query='+encodeURIComponent(style) });
  if(SLC_BRANDS[bn]) out.push({ label:'SLC', primary:false,
    url:'https://slcactivewear.com/search.html?query='+encodeURIComponent(p.brand+' '+style) });
  if(SANMAR_BRANDS[bn]) out.push({ label:'Sanmar', primary:false,
    url:'https://www.sanmar.com/search/?text='+encodeURIComponent(p.brand+' '+style) });
  return out;
}

/* ================= HELPERS ================= */
function flat(v){
  if(v==null) return null;
  if(Array.isArray(v)) return v.length? v[0] : null;
  if(typeof v==='object'){
    if(v.valuesByLinkedRecordId){
      var keys=Object.keys(v.valuesByLinkedRecordId);
      if(keys.length){ var x=v.valuesByLinkedRecordId[keys[0]]; return Array.isArray(x)?x[0]:x; }
      return null;
    }
    if('name' in v) return v.name;
    if('id' in v) return v.id;
  }
  return v;
}
function num(v){ var n=parseFloat(flat(v)); return isNaN(n)?0:n; }
function linkId(v){ if(Array.isArray(v)&&v.length){ var a=v[0]; return (typeof a==='string')?a:((a&&a.id)||''); } return ''; }function fmt(n){ return '$'+(n||0).toFixed(2); }
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
function brandOf(name){ return String(name||'').split(' - ')[0].trim(); }

function atUrl(tbl, qs){
  return 'https://api.airtable.com/v0/'+BASE+'/'+tbl+'?returnFieldsByFieldId=true'+(qs?('&'+qs):'');
}
async function atFetchAll(tbl, qs){
  var out=[], offset=null, guard=0;
  do{
    var u = atUrl(tbl, qs + (offset?('&offset='+encodeURIComponent(offset)):''));
    var r = await fetch(u, {headers:{Authorization:'Bearer '+TOKEN}});
    if(!r.ok){ throw new Error('Airtable '+r.status+' on '+tbl); }
    var d = await r.json();
    out = out.concat(d.records||[]);
    offset = d.offset || null;
    guard++;
  } while(offset && guard<40);
  return out;
}
function fieldsParam(ids){ return ids.map(function(f){return 'fields%5B%5D='+f;}).join('&'); }

/* WRITE gate (kept for the eventual go-live; unused while WRITES_ENABLED=false) */
async function atPatch(tbl, recId, fields){
  if(!WRITES_ENABLED){ console.log('PREVIEW would PATCH', tbl, recId, JSON.stringify(fields).slice(0,200)); return {ok:true,preview:true}; }
  var r = await fetch('https://api.airtable.com/v0/'+BASE+'/'+tbl+'/'+recId,
    {method:'PATCH', headers:{Authorization:'Bearer '+TOKEN,'Content-Type':'application/json'},
     body:JSON.stringify({fields:fields})});
  if(!r.ok){ var t=''; try{t=await r.text();}catch(e){} throw new Error('PATCH '+r.status+' '+t.slice(0,240)); }
  return {ok:true};
}

async function loadSuppliers(){
  var recs = await atFetchAll(T_SUP, fieldsParam(['fldsLqqLgIySfvNNg','fldr6ibPRDTazRA1Q','fldkxReU8bOwXpQXT'])+'&pageSize=100');
  WAREHOUSES = recs.map(function(r){
    var f=r.cellValuesByFieldId||r.fields||{};
    var name = f['fldsLqqLgIySfvNNg']||'';
    var url  = f['fldr6ibPRDTazRA1Q']||'';
    return { id:r.id, name:name, url:url, brand:brandOf(name) };
  }).filter(function(w){return w.name && EXCLUDE_BRANDS.indexOf(w.brand)<0;})
    .sort(function(a,b){return a.name.localeCompare(b.name);});

  // dedupe brands for quicklinks; first non-empty url per brand; count warehouses
  var map={};
  WAREHOUSES.forEach(function(w){
    if(!map[w.brand]) map[w.brand]={brand:w.brand,url:'',count:0};
    map[w.brand].count++;
    if(!map[w.brand].url && w.url) map[w.brand].url = normUrl(w.url);
  });
  BRANDS = Object.keys(map).map(function(k){return map[k];})
    .filter(function(b){return b.url;})
    .sort(function(a,b){return b.count-a.count || a.brand.localeCompare(b.brand);});
}
function normUrl(u){ u=String(u).trim(); if(!/^https?:\/\//i.test(u)) u='https://'+u; return u; }

async function loadLineItems(){
  var formula = 'AND(NOT({Ordered}),OR('
    + PRODUCT_TYPES.map(function(p){return "{Product Type}='"+p+"'";}).join(',')
    + '),IS_AFTER({Created Timestamp},DATEADD(TODAY(),-180,\'days\'))'
    + ')';
  var qs = 'filterByFormula='+encodeURIComponent(formula)+'&pageSize=100&'+fieldsParam(LI_FIELDS);
  var recs = await atFetchAll(T_LI, qs);

  // build lines, keep only active statuses, group by order number
  var groups={};
  recs.forEach(function(r){
    var f=r.cellValuesByFieldId||r.fields||{};
    var status = flat(f[F.status]);
    if(ACTIVE_STATUSES.indexOf(status)<0) return;

    var orderNum = flat(f[F.orderNum]);
    var qty={}; SIZE_DEFS.forEach(function(s){ var q=num(f[s.q]); if(q>0) qty[s.k]=q; });
    if(!Object.keys(qty).length) return;   // nothing to order on this line

    var line = {
      id:r.id,
      garmentId: linkId(f[F.garmentLink]),
      ref: cleanName(flat(f[F.name])),
      garment:'',                               // filled by resolveGarmentNames()
      loc:'',                                   // (print location not needed for purchasing)
      qty:qty,
      proof: proofUrls(f[F.proof]),
      supplierId: (Array.isArray(f[F.supplier]) && f[F.supplier].length) ? (f[F.supplier][0].id||f[F.supplier][0]) : '',
      po: flat(f[F.po]) || '',
      ordered: !!flat(f[F.ordered]),
      orderNotes: flat(f[F.orderNotes]) || '',
      freight: num(f[F.freight]),
      onfileBase: (f[F.garmentCost]!=null) ? num(f[F.garmentCost]) : null,
      up:{}, savedCost:{}
    };
    // upcharges + already-saved purchased costs
    Object.keys(BRACKET_UP).forEach(function(bk){ line.up[bk]=num(f[BRACKET_UP[bk]]); });
    Object.keys(BRACKET_COST).forEach(function(bk){ var c=f[BRACKET_COST[bk]]; if(c!=null&&c!=='') line.savedCost[bk]=num(c); });

    var g = groups[orderNum] || (groups[orderNum]={
      orderNum:orderNum, cust:flat(f[F.cust])||'', due:flat(f[F.due])||'',
      priority:flat(f[F.priority])||'', lines:[]
    });
    g.lines.push(line);
  });

  ORDERS = Object.keys(groups).map(function(k){return groups[k];})
    .sort(function(a,b){
      var pa=prRank(a.priority), pb=prRank(b.priority);
      if(pa!==pb) return pa-pb;
      return String(a.due).localeCompare(String(b.due));
    });

  // resolve garment display names — v0 link fields give bare IDs, so 2nd fetch
  var gids=[];
  ORDERS.forEach(function(o){ o.lines.forEach(function(l){ if(l.garmentId) gids.push(l.garmentId); }); });
  var gmap = await resolveGarmentNames(gids);
  ORDERS.forEach(function(o){ o.lines.forEach(function(l){ l.garment = gmap[l.garmentId] || l.ref || 'Garment'; }); });

  // seed working state
  STATE={};
  ORDERS.forEach(function(o){ o.lines.forEach(function(l){ seedLine(l); }); });

  // restore in-progress cart edits from localStorage; prune entries no longer in queue
  var present={};
  ORDERS.forEach(function(o){ o.lines.forEach(function(l){
    present[l.id]=true;
    var c=CART[l.id]; if(!c) return;
    var st=STATE[l.id];
    if(c.cost)    st.cost=Object.assign({}, st.cost, c.cost);
    if(c.extras)  st.extras=Object.assign({}, c.extras);
    if(c.wh)      st.wh=c.wh;
    if(c.po)      st.po=c.po;
    if(c.freight) st.freight=c.freight;
    st.touched=!!c.touched;
    if(c.ordered) st.ordered=true;
  }); });
  Object.keys(CART).forEach(function(id){ if(!present[id]) delete CART[id]; });
  saveCart();
}

async function resolveGarmentNames(ids){
  var uniq = ids.filter(function(v,i,a){ return v && a.indexOf(v)===i; });
  var map={};
  for(var i=0;i<uniq.length;i+=40){
    var chunk = uniq.slice(i,i+40);
    var formula = 'OR('+chunk.map(function(id){return "RECORD_ID()='"+id+"'";}).join(',')+')';
    var qs = 'filterByFormula='+encodeURIComponent(formula)+'&pageSize=100&'+fieldsParam(['fldT4jfh2XV9lERef']);
    var recs = await atFetchAll(T_GAR, qs);
    recs.forEach(function(r){ var f=r.cellValuesByFieldId||r.fields||{}; map[r.id] = f['fldT4jfh2XV9lERef']||''; });
  }
  return map;
}
function prRank(p){ p=String(p||''); if(/hard/i.test(p))return 0; if(/asap/i.test(p))return 1; return 2; }
function cleanName(s){ return String(s||'').replace(/^"+|"+$/g,''); }
function proofUrls(v){
  if(Array.isArray(v)&&v.length){
    var a=v[0], t=a.thumbnails||{};
    var thumb = (t.large&&t.large.url) || (t.small&&t.small.url) || a.url || '';
    var big   = (t.full&&t.full.url) || (t.large&&t.large.url) || a.url || '';
    var isImg = !!(t.large||t.small||t.full) || /^image\//.test(a.type||'');
    return { thumb:thumb, big:big, raw:a.url||'', isImg:isImg };
  }
  return null;
}
function seedLine(l){
  var seed={};
  seed[BASE_BRACKET] = l.onfileBase;
  Object.keys(BRACKET_UP).forEach(function(bk){
    if(l.onfileBase!=null) seed[bk] = l.onfileBase + (l.up[bk]||0);
  });
  var cost={};
  Object.keys(seed).forEach(function(bk){
    cost[bk] = (l.savedCost[bk]!=null) ? l.savedCost[bk] : seed[bk];
  });
  STATE[l.id] = { cost:cost, seed:seed, extras:{}, wh:l.supplierId||'', po:l.po||'', freight:l.freight||0, ordered:l.ordered };
}

/* ================= QUEUE RENDER ================= */
function renderQueue(){
  document.getElementById('q-count').textContent = ORDERS.length;
  if(!ORDERS.length){ document.getElementById('queue-list').innerHTML='<div class="msg">No orders need goods right now.</div>'; return; }
  document.getElementById('queue-list').innerHTML = ORDERS.map(function(o){
    var pcs=0; o.lines.forEach(function(l){ pcs+=lineTotalPcs(l); });
    var done=o.lines.filter(function(l){return STATE[l.id].ordered;}).length;
    var prTag = /hard/i.test(o.priority)?'<span class="tag r">Hard Deadline</span>'
              : /asap/i.test(o.priority)?'<span class="tag amb">ASAP</span>':'';
    var nofile=o.lines.some(function(l){return STATE[l.id].seed[BASE_BRACKET]==null;});
    var fileTag=nofile?'<span class="tag amb">Price needed</span>':'<span class="tag done">Prices on file</span>';
    var allSaved = orderAllSaved(o), started = orderTouched(o);
    var stateCls = allSaved?' saved':(started?' started':'');
    var stateChip = allSaved?'<span class="tag done">✓ Saved</span>'
                  : (started?'<span class="tag cart">● In cart</span>':'');
    return '<div class="og"><div class="og-hdr'+stateCls+'" onclick="openOrder(\''+esc(o.orderNum)+'\')">'
      + '<span class="og-num">'+esc(o.orderNum)+'</span>'
      + '<span class="og-cust">'+esc(o.cust)+'</span>'
      + '<span class="og-meta">'+stateChip+prTag
        + '<span class="tag n">'+o.lines.length+' '+(o.lines.length>1?'lines':'line')+'</span>'
        + '<span class="tag g">'+pcs+' pcs</span>'+fileTag+'</span>'
      + '<span class="og-go">›</span></div></div>';
  }).join('');
}
function orderTouched(o){ return o.lines.some(function(l){ return STATE[l.id] && STATE[l.id].touched; }); }
function orderAllSaved(o){ return o.lines.length>0 && o.lines.every(function(l){ return STATE[l.id] && STATE[l.id].ordered; }); }
function lineTotalPcs(l){ var t=0; for(var k in l.qty) t+=l.qty[k]; return t; }
function sizesPresent(l){ return SIZE_DEFS.map(function(s){return s.k;}).filter(function(k){return l.qty[k]>0;}); }
function defOf(k){ for(var i=0;i<SIZE_DEFS.length;i++) if(SIZE_DEFS[i].k===k) return SIZE_DEFS[i]; return null; }

function openOrder(orderNum){
  currentOrder = ORDERS.filter(function(o){return String(o.orderNum)===String(orderNum);})[0];
  if(!currentOrder) return;
  document.getElementById('queue').classList.add('hidden');
  document.getElementById('cart').classList.remove('hidden');
  document.getElementById('cartbar').classList.remove('hidden');

  document.getElementById('ch-cust').textContent = currentOrder.cust||'—';
  document.getElementById('ch-order').textContent = currentOrder.orderNum||'—';
  var chips='';
  if(/hard/i.test(currentOrder.priority)) chips+='<span class="tag r">Hard Deadline</span>';
  else if(/asap/i.test(currentOrder.priority)) chips+='<span class="tag amb">ASAP</span>';
  if(currentOrder.due) chips+='<span class="tag n">Due '+esc(String(currentOrder.due))+'</span>';
  var pcs=0; currentOrder.lines.forEach(function(l){pcs+=lineTotalPcs(l);});
  chips+='<span class="tag g">'+pcs+' pcs</span>';
  document.getElementById('ch-chips').innerHTML=chips;

  renderQuicklinks();
  renderLines();
  recompute();
}

function renderLines(){
  document.getElementById('lines').innerHTML = currentOrder.lines.map(function(l){
    var st=STATE[l.id];
    var present=sizesPresent(l);
    var cols=present.length+1;

    var hd='<div class="row hd" style="--cols:'+cols+'"><div class="cell">Size</div>'
      + present.map(function(k){return '<div class="cell">'+k+'</div>';}).join('')+'</div>';
    var qtyRow='<div class="row qty" style="--cols:'+cols+'"><div class="cell rowlbl">Ord</div>'
      + present.map(function(k){var d=defOf(k);return '<div class="cell'+(d.b!==BASE_BRACKET?' upch':'')+'">'+l.qty[k]+'</div>';}).join('')+'</div>';
    var exRow='<div class="row extra" style="--cols:'+cols+'"><div class="cell rowlbl">Extra</div>'
      + present.map(function(k){
          return '<div class="cell exc"><input class="ex-in" type="number" min="0" placeholder="0" value="'+(st.extras[k]||'')+'" oninput="onExtra(\''+l.id+'\',\''+k+'\',this.value)"></div>';
        }).join('')+'</div>';
    var grid='<div class="size-grid">'+hd+qtyRow+exRow+'</div>';

    // brackets present
    var brackets=[];
    if(present.some(function(k){return defOf(k).b===BASE_BRACKET;})) brackets.push(BASE_BRACKET);
    ['2XL','3XL','4XL','5XL','6XL'].forEach(function(bk){ if(present.indexOf(bk)>=0) brackets.push(bk); });

    var costFields=brackets.map(function(bk){
      var seed=st.seed[bk];
      var lbl= bk===BASE_BRACKET? 'Blank / unit (XS–XL)' : bk+' cost / unit';
      var chip = seed==null
        ? '<span class="onfile none">'+(bk===BASE_BRACKET?'no price on file':'enter')+'</span>'
        : '<span class="onfile ok" id="chip-'+l.id+'-'+bk+'">✓ on file '+fmt(seed)+'</span>';
      var isUp=bk!==BASE_BRACKET;
      return '<div class="cost-field"><span class="cf-lbl">'+lbl+'</span>'
        + '<div class="cost-input-wrap"><input class="cost-input'+(isUp?' upch-in':'')+'" type="number" step="0.01" '
        + 'value="'+(st.cost[bk]!=null?Number(st.cost[bk]).toFixed(2):'')+'" placeholder="0.00" '
        + 'oninput="onCost(\''+l.id+'\',\''+bk+'\',this.value)"> '+chip+'</div></div>';
    }).join('');
    var costBlock='<div><div class="costs-lbl">Blank cost — verify or update</div><div class="cost-row">'+costFields+'</div></div>';

    var body='<div class="line-body"><div class="body-cols">'
      + '<div><div class="costs-lbl">Sizes &amp; extras</div>'+grid+'</div>'
      + costBlock + '</div></div>';

    var extras='<div class="extras-summary" id="exsum-'+l.id+'">Extras: <b>'+extraSummary(l)+'</b></div>';
    var noteBits=[];
    if(present.indexOf('6XL')>=0) noteBits.push('<b>6XL extras →</b> written to Order Notes (no Extra 6X field in Airtable)');
    var note=noteBits.length?'<div class="notecallout">✎ <span>'+noteBits.join('<br>')+'</span></div>':'';

    var meta='<div class="meta-row">'
      + '<div class="mf"><span class="cf-lbl">Supplier (warehouse)</span><select class="sel" onchange="onWh(\''+l.id+'\',this.value)">'+whOptions(st.wh)+'</select></div>'
      + '<div class="mf"><span class="cf-lbl">PO #</span><input class="po" value="'+esc(st.po)+'" placeholder="—" oninput="onPO(\''+l.id+'\',this.value)"></div>'
      + '<div class="mf"><span class="cf-lbl">Inbound freight</span><input class="frt" type="number" step="0.01" value="'+(st.freight?Number(st.freight).toFixed(2):'')+'" placeholder="0.00" oninput="onFrt(\''+l.id+'\',this.value)"></div>'
      + '<div class="line-total"><div class="lt-lbl">Line total</div><div class="lt-val" id="lt-'+l.id+'">'+fmt(lineCost(l))+'</div></div>'
      + '<button class="save-btn'+(st.ordered?' saved':'')+'" id="save-'+l.id+'" onclick="saveLine(\''+l.id+'\')">'+(st.ordered?'✓ Saved':'Save line')+'</button>'
      + '</div>';

    var thumb = (l.proof && l.proof.thumb)
      ? '<div class="line-thumb clickable" title="View mockup" onclick="openProof(\''+l.id+'\')"><img src="'+esc(l.proof.thumb)+'" onerror="this.parentNode.classList.remove(\'clickable\');this.parentNode.textContent=\'PROOF\'"></div>'
      : '<div class="line-thumb">PROOF</div>';
    var jumps = vendorJumps(l.garment);
    var jumpPills = jumps.map(function(j){
      return '<a class="vjump'+(j.primary?'':' alt')+'" href="'+esc(j.url)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">'+esc(j.label)+' ↗</a>';
    }).join('');
    var jumpRow = jumpPills ? '<div style="margin-top:2px">'+jumpPills+'</div>' : '';
    var top='<div class="line-top">'+thumb
      + '<div class="line-id"><div class="line-garment">'+esc(l.garment)+'</div>'
        + '<div class="line-sub">'+lineTotalPcs(l)+' pcs</div>'+jumpRow+'</div>'
      + '<div class="ord-toggle" onclick="toggleOrdered(\''+l.id+'\')"><span class="ord-box">✓</span><span class="ord-label">Ordered</span></div>'
      + '</div>';

    return '<div class="line'+(st.ordered?' ordered':'')+'" id="line-'+l.id+'">'+top+body+extras+note+meta+'</div>';
  }).join('');
}

/* ================= COST MATH ================= */
function lineCost(l){
  var st=STATE[l.id], total=0;
  sizesPresent(l).forEach(function(k){
    var d=defOf(k), unit=st.cost[d.b]||0;
    total += unit * (l.qty[k] + (st.extras[k]||0));
  });
  return total;
}
function orderCost(o){ var t=0; o.lines.forEach(function(l){t+=lineCost(l);}); return t; }
function extraSummary(l){
  var st=STATE[l.id];
  var parts=sizesPresent(l).filter(function(k){return st.extras[k]>0;}).map(function(k){return '+'+st.extras[k]+' '+k;});
  return parts.length?parts.join(' · '):'—';
}
function whName(id){ var w=WAREHOUSES.filter(function(x){return x.id===id;})[0]; return w?w.name:'(none)'; }

/* ================= PROOF POPUP ================= */
function openProof(id){
  var l=currentOrder.lines.filter(function(x){return x.id===id;})[0];
  if(!l||!l.proof) return;
  if(l.proof.isImg && (l.proof.big||l.proof.thumb)){
    document.getElementById('pm-img').src = l.proof.big||l.proof.thumb;
    document.getElementById('proofModal').classList.remove('hidden');
  } else if(l.proof.raw){
    window.open(l.proof.raw,'_blank');   // raw PDF w/ no thumbnail — open in tab
  }
}
function closeProof(){
  document.getElementById('proofModal').classList.add('hidden');
  document.getElementById('pm-img').src='';
}

/* ================= HANDLERS ================= */
function onCost(id,bk,v){ STATE[id].cost[bk]=v===''?null:parseFloat(v); refreshChip(id,bk); markTouched(id); recompute(); updateLineTotal(id); }
function refreshChip(id,bk){
  var st=STATE[id], chip=document.getElementById('chip-'+id+'-'+bk); if(!chip) return;
  var seed=st.seed[bk], cur=st.cost[bk]; if(seed==null) return;
  if(cur!=null && Math.abs(cur-seed)>0.001){ chip.className='onfile edited'; chip.textContent='edited (was '+fmt(seed)+')'; }
  else { chip.className='onfile ok'; chip.textContent='✓ on file '+fmt(seed); }
}
function onExtra(id,k,v){
  STATE[id].extras[k]=v===''?0:(parseInt(v,10)||0);
  var l=currentOrder.lines.filter(function(x){return x.id===id;})[0];
  var sum=document.getElementById('exsum-'+id); if(sum) sum.innerHTML='Extras: <b>'+extraSummary(l)+'</b>';
  markTouched(id); recompute(); updateLineTotal(id);
}
function onWh(id,v){ STATE[id].wh=v; markTouched(id); }
function onPO(id,v){ STATE[id].po=v; markTouched(id); }
function onFrt(id,v){ STATE[id].freight=v===''?0:parseFloat(v); markTouched(id); }
function toggleOrdered(id){
  STATE[id].ordered=!STATE[id].ordered;
  document.getElementById('line-'+id).classList.toggle('ordered',STATE[id].ordered);
  markTouched(id); recompute();
}
function updateLineTotal(id){
  var l=currentOrder.lines.filter(function(x){return x.id===id;})[0];
  document.getElementById('lt-'+id).textContent=fmt(lineCost(l));
}
function recompute(){
  document.getElementById('cart-total').textContent=fmt(orderCost(currentOrder));
  var total=currentOrder.lines.length;
  var done=currentOrder.lines.filter(function(l){return STATE[l.id].ordered;}).length;
  document.getElementById('cart-prog').textContent=done+' of '+total+' lines saved';
  var btn=document.getElementById('btn-flip');
  btn.classList.add('ready'); btn.disabled=false;   // Save-all always available
}

/* ================= WRITE (Line Items only) ================= */
function updateSixNote(existing, n){
  var lines = String(existing||'').split('\n').filter(function(x){ return !/^\s*6X extras:/i.test(x); });
  if(n>0) lines.push('6X extras: '+n+' (purchasing)');
  return lines.join('\n').trim();
}
function buildLineFields(l){
  var st=STATE[l.id], fields={};
  fields[F.ordered]=true;
  if(st.wh) fields[F.supplier]=[st.wh];              // multipleRecordLinks: ["recXXX"]
  if(st.po) fields[F.po]=st.po;
  if(st.freight) fields[F.freight]=st.freight;
  Object.keys(st.cost).forEach(function(bk){ if(st.cost[bk]!=null) fields[BRACKET_COST[bk]]=st.cost[bk]; });
  SIZE_DEFS.forEach(function(s){ if(s.x && st.extras[s.k]) fields[s.x]=st.extras[s.k]; });   // real extra fields
  var six = st.extras['6XL']||0;                     // 6X extras -> Order Notes (no field)
  var notes = updateSixNote(l.orderNotes||'', six);
  if(notes !== (l.orderNotes||'')) fields[F.orderNotes]=notes;
  return fields;
}
async function saveLine(id){
  var l=currentOrder.lines.filter(function(x){return x.id===id;})[0]; if(!l) return;
  var st=STATE[id];
  if(!confirm('Write this line to Airtable?\n\n'+l.garment+'   (order '+currentOrder.orderNum+')\n'
    +'Supplier: '+whName(st.wh)+'\nPO: '+(st.po||'—')+'   Line total: '+fmt(lineCost(l)))) return;
  var btn=document.getElementById('save-'+id); if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
  try{
    var fields=buildLineFields(l);
    await atPatch(T_LI, id, fields);
    if(fields[F.orderNotes]!=null) l.orderNotes=fields[F.orderNotes];
    st.ordered=true; persistLine(id);
    document.getElementById('line-'+id).classList.add('ordered');
    if(btn){ btn.disabled=false; btn.textContent='✓ Saved'; btn.classList.add('saved'); }
    recompute();
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Save line'; }
    alert('Write failed for this line:\n'+(e.message||e));
  }
}
async function saveAll(){
  var n=currentOrder.lines.length;
  if(!confirm('Write all '+n+' line'+(n>1?'s':'')+' of order '+currentOrder.orderNum+' to Airtable?\n'
    +'(Line Items only — Order Status is not changed.)')) return;
  var btn=document.getElementById('btn-flip'); btn.disabled=true; var oldTxt=btn.textContent; btn.textContent='Saving…';
  var okc=0, err=null;
  for(var i=0;i<currentOrder.lines.length;i++){
    var l=currentOrder.lines[i];
    try{
      var fields=buildLineFields(l);
      await atPatch(T_LI, l.id, fields);
      if(fields[F.orderNotes]!=null) l.orderNotes=fields[F.orderNotes];
      STATE[l.id].ordered=true; persistLine(l.id); okc++;
    }catch(e){ err=e; break; }
  }
  btn.disabled=false; btn.textContent=oldTxt;
  renderLines(); recompute();
  if(err) alert('Wrote '+okc+' line(s), then hit an error:\n'+(err.message||err));
  else alert('Wrote '+okc+' line'+(okc!==1?'s':'')+' to order '+currentOrder.orderNum+'.');
}

/* boot */
function paintMode(){
  var b=document.getElementById('modeBadge');
  if(WRITES_ENABLED){ b.textContent='⚠ Writes live — Line Items'; b.classList.add('live'); }
  else { b.textContent='👁 Preview — writes disabled'; b.classList.remove('live'); }
}
paintMode();
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeProof(); });
paintTok();
loadAll();
</script>
