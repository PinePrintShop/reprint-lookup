}

// ── Resolve the right detailMode from current data shape ──
// Called after load and after any state change that might shift mode.
// Does NOT override an explicit user-set mode (review/submit-confirm).
function resolveDetailMode(){
  // If user is in a review-ish mode, respect that
  if (state.detailMode === 'review' || state.detailMode === 'submit-confirm') return;
  var nImps = state.orderImprints.length;
  var nLis  = state.orderLineItems.length;
  if (nImps === 0) {
    state.detailMode = 'imprint-empty';
  } else if (nLis === 0) {
    state.detailMode = 'li-empty';
  } else {
    state.detailMode = 'li-focus';
    // Clamp focus index to valid range
    if (state.focusLiIndex >= nLis) state.focusLiIndex = nLis - 1;
    if (state.focusLiIndex < 0) state.focusLiIndex = 0;
  }
}

// ── Load all imprints + line items + garments for an order ──
function loadOrderDetail(recId){
  // Find the cached order record from the queue load
  var rec = null;
  for (var i = 0; i < state.orders.length; i++) {
    if (state.orders[i].id === recId) { rec = state.orders[i]; break; }
  }
  if (!rec) {
    state.detailLoading = false;
    state.detailErr = 'Order record not found in queue cache';
    render();
    return;
  }
  var f = rec.cellValuesByFieldId || rec.fields || {};
  var orderImprintIds = getLinkIds(f[O.imprints]);
  var liIds = getLinkIds(f[O.lineItems]);

  dlog('loadOrderDetail:', recId, 'order imprints:', orderImprintIds.length, 'LIs:', liIds.length);

  // Phase 1: fetch LIs first so we can also see which imprints they reference.
  // (An LI can be linked to imprints that the Order is not linked to. Loading only
  //  the Order's imprints leaves those orphans showing as truncated record IDs.)
  atGetLineItemsByIds(liIds).then(function(liRecs){
    state.orderLineItems = liRecs.slice();

    // Collect the FULL imprint ID set: union of order's imprints + each LI's imprints
    var allImpIds = orderImprintIds.slice();
    liRecs.forEach(function(li){
      var lf = li.cellValuesByFieldId || li.fields || {};
      getLinkIds(lf[L.imprints]).forEach(function(id){
        if (id && allImpIds.indexOf(id) === -1) allImpIds.push(id);
      });
    });
    var orphans = allImpIds.length - orderImprintIds.length;
    if (orphans > 0) {
      dlog('found', orphans, 'imprint(s) referenced by LIs but not by Order — loading anyway');
    }

    // Phase 2: fetch all imprints (order + LI-orphans) in one call
    return atGetImprintsByIds(allImpIds).then(function(impRecs){
      state.orderImprints = impRecs.slice();
      resolveDetailMode();
      maybeAutoOpenImprintForm();

      // Phase 3: garments
      var garmentIds = [];
      liRecs.forEach(function(li){
        var lf = li.cellValuesByFieldId || li.fields || {};
        getLinkIds(lf[L.garment]).forEach(function(g){
          if (g && garmentIds.indexOf(g) === -1) garmentIds.push(g);
        });
      });
      if (!garmentIds.length) {
        state.detailLoading = false;
        render();
        return;
      }
      return atGetGarmentsByIds(garmentIds).then(function(garmRecs){
        garmRecs.forEach(function(gr){
          var gf = gr.cellValuesByFieldId || gr.fields || {};
          state.garmentNames[gr.id] = getStr(gf[G.name]) || '(garment)';
        });
        state.detailLoading = false;
        render();
      }).catch(function(err){
        // Garment resolution is non-critical — render anyway
        dlog('garment fetch failed:', err.message);
        state.detailLoading = false;
        render();
      });
    });
  }).catch(function(err){
    state.detailLoading = false;
    state.detailErr = err.message;
    dlog('loadOrderDetail err:', err.message);
    render();
  });
}

// Auto-open the imprint form when an order has no imprints and no LIs yet.
function maybeAutoOpenImprintForm(){
  var isFresh = state.orderImprints.length === 0 && state.orderLineItems.length === 0;
  if (isFresh && !state.imprintForm) {
    state.imprintForm = {
      mode: 'new', editingId: null,
      location: '', typeCategory: '', type: '',
      nickname: '', notes: '', screens: '', inkChanges: '', applyToLis: [], showMoreLocs: false,
      originReturn: 'imprint-empty'
    };
  }
}

// ── Due date editor ──
// Preview-mode only: writes land in state.dueEdits and are surfaced visually,
// but nothing is sent to Airtable until WRITES_ENABLED flips.
function openDueEditor(recId){
  var el = document.getElementById('dueDate_' + recId);
  if (!el) return;
  // showPicker() is the modern way; falls back to click() for older browsers
  try {
    if (typeof el.showPicker === 'function') el.showPicker();
    else el.click();
  } catch (e) {
    el.click();
  }
}
function onDueChange(recId, val){
  if (!val) {
    delete state.dueEdits[recId];
  } else {
    state.dueEdits[recId] = val; // 'YYYY-MM-DD'
  }
  dlog('due edit (preview, no write):', recId, val || '(cleared)');
  render();
}

// ── Render: detail ──
function renderDetail(){
  var canvas = document.getElementById('canvas');
  var rec = null;
  for (var i = 0; i < state.orders.length; i++) {
    if (state.orders[i].id === state.selectedOrderId) { rec = state.orders[i]; break; }
  }
  if (!rec) { canvas.innerHTML = '<div class="empty">Order not found</div>'; return; }
  var f = rec.cellValuesByFieldId || rec.fields || {};
  var num = getNum(f[O.num]);
  var cust = getStr(f[O.custName]) || '(no customer)';
  var rep = getSelName(f[O.salesperson]) || '—';
  var due = f[O.due] || null;
  var ship = getStr(f[O.shipMethod]) || '';
  var imprintCt = getNum(f[O.imprintCt]) || getLinkCount(f[O.imprints]);
  var liCt = getLinkCount(f[O.lineItems]);
  var inProgress = imprintCt > 0 || liCt > 0;
  var days = daysUntil(due);
  var dueCls = (days != null && days < 0) ? 'r' : ((days != null && days <= 7) ? 'amb' : 'n');

  // Cockpit strip — canonical .cp-order-strip from catching v122
  // Kicker (order N) and customer name on SAME baseline-aligned line.
  var deadType = getSelName(f[O.deadType]); // 'Hard Deadline' | 'ASAP' | ''
  var effectiveDue = state.dueEdits[rec.id] || due;
  var ddays = daysUntil(effectiveDue);

  var html = '<div class="cp-order-strip">';
  html += '<button class="cp-back" onclick="backToQueue()">← Queue</button>';
  html += '<div class="cp-order-info">';
  html += '<span class="cp-order-num">Order ' + (num || '—') + '</span>';
  html += '<span class="cp-order-name">' + escHtml(cust) + '</span>';
  html += '</div>';
  html += '<div class="cp-order-chips">';

  // Deadline-type pill — Hard (red) / ASAP (green) / data-gap (amber)
  if (deadType === 'Hard Deadline') {
    html += '<span class="tag r">Hard Deadline</span>';
  } else if (deadType === 'ASAP') {
    html += '<span class="tag g">ASAP</span>';
  } else {
    html += '<span class="tag amb">No deadline type</span>';
  }

  // Editable date — clicking the chip opens a small inline date input.
  // ASAP orders don't NEED a date (per real data pattern) — but we still allow setting one.
  // Hard Deadline orders missing a date is a real data gap — show as amber problem.
  var dateInputId = 'dueDate_' + rec.id;
  var dateCls = 'tag ';
  var showDateChip = true;
  var dueDisplay;
  if (!effectiveDue) {
    if (deadType === 'ASAP') {
      // ASAP-no-date is normal; subtle "+ Add date" affordance
      dateCls += 'n';
      dueDisplay = '+ Add date';
    } else {
      // Hard Deadline or no-type with no date — actionable
      dateCls += 'amb';
      dueDisplay = 'Set due date';
    }
  } else {
    if (ddays != null && ddays < 0) dateCls += 'r';
    else if (ddays != null && ddays <= 7) dateCls += 'amb';
    else dateCls += 'n';
    dueDisplay = dueLabel(effectiveDue);
  }
  html += '<span class="' + dateCls + '" style="cursor:pointer;display:inline-flex;align-items:center;gap:4px" onclick="openDueEditor(\'' + rec.id + '\')">';
  html += escHtml(dueDisplay);
  html += '<span style="opacity:.5;font-size:9px">✎</span>';
  html += '</span>';
  // Hidden native date input — triggered by openDueEditor()
  html += '<input type="date" id="' + dateInputId + '" value="' + escAttr(effectiveDue || '') + '" onchange="onDueChange(\'' + rec.id + '\', this.value)" style="position:absolute;opacity:0;pointer-events:none;width:1px;height:1px" />';

  if (ship) html += '<span class="tag n">' + escHtml(ship) + '</span>';
  html += '<span class="tag n">' + escHtml(rep) + '</span>';
  html += '</div>';

  // Cockpit right actions: Review / Submit
  // Hidden when already in review / submit-confirm (those modes have their own banner actions).
  if (state.detailMode !== 'review' && state.detailMode !== 'submit-confirm') {
    var canReview = state.orderImprints.length > 0 || state.orderLineItems.length > 0;
    if (canReview) {
      html += '<button class="cp-review" onclick="goReview()"><i class="ti ti-eye" aria-hidden="true"></i> Review</button>';
      html += '<button class="cp-submit" onclick="goSubmitConfirm()"><i class="ti ti-send" aria-hidden="true"></i> Submit</button>';
    }
  }
  html += '</div>';

  // Body
  if (state.detailLoading) {
    html += '<div class="empty">Loading order…</div>';
  } else if (state.detailErr) {
    html += '<div class="empty" style="color:var(--red)">Couldn\'t load detail · ' + escHtml(state.detailErr) + '</div>';
  } else {
    html += renderDetailBody(rec, cust);
  }

  canvas.innerHTML = html;
}

// ── Order detail body: IMPRINTS section + LINE ITEMS section ──
function renderDetailBody(rec, cust){
  // Route by detailMode — each mode produces a distinct body shape.
  switch (state.detailMode) {
    case 'imprint-empty':   return renderModeImprintEmpty(rec, cust);
    case 'li-empty':        return renderModeLiEmpty(rec, cust);
    case 'li-focus':        return renderModeLiFocus(rec, cust);
    case 'review':          return renderModeReview(rec, cust, false);
    case 'submit-confirm':  return renderModeReview(rec, cust, true);
    default:                return renderModeImprintEmpty(rec, cust);
  }
}

// ── Imprint strip — shown above LI focus/empty/review when imprints exist ──
function renderImprintStrip(opts){
  opts = opts || {};
  var imps = state.orderImprints;
  var html = '<div class="imp-strip">';
  html += '<span class="imp-strip-lbl">Imprints</span>';
  if (imps.length === 0) {
    html += '<div class="imp-chips" style="flex:1;font-size:11px;color:#BBBBB5;font-style:italic;">No imprints yet</div>';
  } else {
    html += '<div class="imp-chips">';
    imps.forEach(function(imp){
      var f = imp.cellValuesByFieldId || imp.fields || {};
      var label = getStr(f[I.idGen]) || getStr(f[I.id]) || 'imprint';
      var loc = getSelName(f[I.loc]) || '';
      var isGhost = !!imp._local;
      var cls = 'imp-chip' + (isGhost ? ' ghost' : '');
      var onclick = isGhost
        ? 'openImprintForm(\'edit\',\'' + imp.id + '\')'
        : 'showReadOnlyImprint(\'' + imp.id + '\')';
      html += '<div class="' + cls + '" onclick="' + onclick + '">';
      html += '<span class="imp-chip-ph"><i class="ti ti-photo"></i></span>';
      html += '<span class="imp-chip-lbl">' + escHtml(label) + (loc ? ' · ' + escHtml(loc.toLowerCase()) : '') + '</span>';
      html += '</div>';
    });
    html += '</div>';
  }
  if (opts.showAdd !== false) {
    html += '<button class="imp-strip-add" onclick="openImprintForm(\'new\')">+ Add' + (imps.length > 0 ? ' another' : ' imprint') + '</button>';
  }
  html += '</div>';
  return html;
}

// ── MODE: imprint-empty — fresh order, no imprints yet, form is the whole body ──
function renderModeImprintEmpty(rec, cust){
  var html = '';
  // Two-step intro header
  html += '<div class="intro-banner">';
  html += '<div class="step">';
  html += '<div class="stepnum">1</div><div class="stept">Add all the imprints</div>';
  html += '<i class="ti ti-chevron-right arr" aria-hidden="true"></i>';
  html += '<div class="stepnum next">2</div><div class="stept muted">Then build line items</div>';
  html += '</div>';
  html += '</div>';
  // Form is the focus
  if (state.imprintForm) {
    html += renderImprintForm();
  } else {
    // Should not normally hit this — maybeAutoOpenImprintForm should have run.
    // But if a user closes the form on an empty order, show a CTA to reopen.
    html += '<div class="empty-card">';
    html += '<div class="empty-card-ico"><i class="ti ti-photo" aria-hidden="true"></i></div>';
    html += '<div class="empty-card-big">Start with an imprint</div>';
    html += '<div class="empty-card-sub">Add the design (location + type) before building line items.</div>';
    html += '<button class="empty-card-cta" onclick="openImprintForm(\'new\')"><i class="ti ti-plus" aria-hidden="true"></i> Add first imprint</button>';
    html += '</div>';
  }
  return html;
}

// ── MODE: li-empty — at least 1 imprint, no LIs yet ──
function renderModeLiEmpty(rec, cust){
  var html = '';
  html += renderImprintStrip();
  // If imprint form is open (mid-flow from strip +Add), show it; LI stub goes behind dimmed
  if (state.imprintForm) {
    html += renderImprintFormSheet();
    html += renderLiEmptyStub(true); // dimmed peek
  } else {
    html += renderLiEmptyStub(false);
  }
  return html;
}

function renderLiEmptyStub(dimmed){
  var imps = state.orderImprints;
  var firmer = imps.length >= 2; // C-mode in sketch: stronger nudge after 2+ imprints
  var html = '<div class="li-stub' + (firmer ? ' firmer' : '') + (dimmed ? ' dimmed' : '') + '">';
  html += '<div class="li-stub-ico"><i class="ti ti-shirt" aria-hidden="true"></i></div>';
  if (firmer) {
    html += '<div class="li-stub-big">' + imps.length + ' imprints ready · time for line items</div>';
    html += '<div class="li-stub-sub">Add line items below. Each one gets attached to whichever imprints belong on it.</div>';
  } else {
    html += '<div class="li-stub-big">Ready for line items</div>';
    html += '<div class="li-stub-sub">You have 1 imprint. You can add more, or start attaching this one to line items.</div>';
  }
  html += '<button class="li-stub-cta" onclick="addNewLineItem()"><i class="ti ti-plus" aria-hidden="true"></i> Add first line item</button>';
  html += '<div class="li-stub-pivot">— or <a onclick="openImprintForm(\'new\')">add another imprint</a> —</div>';
  html += '</div>';
  return html;
}

// ── MODE: li-focus — focused on one LI, with pager + imprint strip ──
function renderModeLiFocus(rec, cust){
  var html = '';
  html += renderImprintStrip();
  // If imprint form is open (mid-flow from strip), show it sliding over the LI
  if (state.imprintForm) {
    html += renderImprintFormSheet();
    html += renderFocusedLi(true); // dimmed peek
  } else {
    html += renderFocusedLi(false);
  }
  return html;
}

function renderFocusedLi(dimmed){
  var lis = state.orderLineItems;
  var total = lis.length;
  if (total === 0) return ''; // shouldn't happen — mode would be li-empty
  var idx = state.focusLiIndex;
  if (idx >= total) idx = total - 1;
  if (idx < 0) idx = 0;
  var li = lis[idx];

  var html = '';
  // Line-item tabs — direct access, each tab shows its garment (v2-v14, replaces pager+dots)
  html += '<div class="li-tabs">';
  html += '<span class="li-tabs-lbl">' + total + ' line item' + (total === 1 ? '' : 's') + '</span>';
  for (var i = 0; i < total; i++) {
    var lf = lis[i].cellValuesByFieldId || lis[i].fields || {};
    var gids = getLinkIds(lf[L.garment]);
    var gnm = (gids.length && state.garmentNames[gids[0]]) || '';
    html += '<button class="li-tab' + (i === idx ? ' on' : '') + '" onclick="gotoLi(' + i + ')">';
    html += 'Line ' + (i + 1);
    html += gnm
      ? ' <span class="li-tab-g">' + escHtml(gnm) + '</span>'
      : ' <span class="li-tab-g empty">no garment</span>';
    html += '</button>';
  }
  html += '<button class="li-tab-add" onclick="addNewLineItem()">+ Add</button>';
  html += '</div>';

  // The focused LI card
  html += '<div class="li-focus' + (dimmed ? ' dimmed' : '') + '">';
  html += renderLiFocusInner(li, idx, total);
  html += '</div>';

  return html;
}

function renderLiFocusInner(li, idx, total){
  var f = li.cellValuesByFieldId || li.fields || {};
  var liId = li.id;
  var attachedImpIds = getLinkIds(f[L.imprints]);
  var garmentIds = getLinkIds(f[L.garment]);
  var garmentName = garmentIds.length && state.garmentNames[garmentIds[0]] || '';
  var price = getNum(f[L.price]);

  // Compute live qty from sizes (since formula doesn't refresh locally without write)
  var liveQty = 0;
  ['szXS','szS','szM','szL','szXL','sz2XL','sz3XL','sz4XL','sz5XL','sz6XL','szOSFA'].forEach(function(k){
    liveQty += getNum(f[L[k]]);
  });

  var html = '';

  // Imprints row — assigned-only chips + inline "+ Assign" picker (v2-v15).
  // The top strip already lists every imprint, so the line shows just what's on it.
  html += '<div class="li-row">';
  html += '<div class="li-lbl">Imprints on this line item</div>';
  html += '<div class="li-imps">';
  if (state.orderImprints.length === 0) {
    html += '<span style="font-size:11px;color:#BBBBB5;font-style:italic;">No imprints exist yet</span>';
  } else {
    var anyAssigned = false;
    state.orderImprints.forEach(function(imp){
      if (attachedImpIds.indexOf(imp.id) === -1) return;
      anyAssigned = true;
      var ifld = imp.cellValuesByFieldId || imp.fields || {};
      var label = getStr(ifld[I.idGen]) || getStr(ifld[I.id]) || 'imprint';
      var loc = getSelName(ifld[I.loc]) || '';
      html += '<span class="li-imp-chip">';
      html += escHtml(label) + (loc ? ' · ' + escHtml(loc.toLowerCase()) : '');
      html += ' <span class="li-imp-x" title="Remove from this line" onclick="toggleImpOnLi(\'' + liId + '\',\'' + imp.id + '\')">×</span>';
      html += '</span>';
    });
    if (!anyAssigned) {
      html += '<span style="font-size:11px;color:#BBBBB5;font-style:italic;margin-right:2px;">None yet</span>';
    }
    var pickerOpen = state.liAssignOpen === liId;
    html += '<button class="li-assign-btn' + (pickerOpen ? ' on' : '') + '" onclick="toggleLiAssign(\'' + liId + '\')">+ Assign</button>';
  }
  html += '</div>';
  // Inline picker — the imprints not yet on this line
  if (state.orderImprints.length > 0 && state.liAssignOpen === liId) {
    var avail = state.orderImprints.filter(function(imp){ return attachedImpIds.indexOf(imp.id) === -1; });
    html += '<div class="li-assign-picker">';
    html += '<div class="li-assign-picker-h">Add an imprint to this line</div>';
    if (avail.length === 0) {
      html += '<div class="li-pick-empty">All imprints are already on this line.</div>';
    } else {
      avail.forEach(function(imp){
        var ifld = imp.cellValuesByFieldId || imp.fields || {};
        var label = getStr(ifld[I.idGen]) || getStr(ifld[I.id]) || 'imprint';
        var loc = getSelName(ifld[I.loc]) || '';
        html += '<div class="li-pick-row" onclick="toggleImpOnLi(\'' + liId + '\',\'' + imp.id + '\')">';
        html += '<span><span class="li-pick-id">' + escHtml(label) + '</span>' + (loc ? ' <span class="li-pick-loc">· ' + escHtml(loc.toLowerCase()) + '</span>' : '') + '</span>';
        html += '<span class="li-pick-plus">+ Add</span>';
        html += '</div>';
      });
    }
    html += '</div>';
  }
  html += '</div>';

  // Garment row — real picker
  html += '<div class="li-row">';
  html += '<div class="li-lbl">Garment</div>';
  var pickerOpenForThisLi = state.garmentPicker && state.garmentPicker.liId === liId;
  var garmCls = 'garm-pick' + (garmentName ? '' : ' empty') + (pickerOpenForThisLi ? ' open' : '');
  html += '<div class="' + garmCls + '" onclick="' + (pickerOpenForThisLi ? 'closeGarmentPicker()' : 'openGarmentPicker(\'' + liId + '\')') + '">';
  if (garmentName) {
    html += '<div class="swatch" style="background:#888880;"></div>';
    html += '<div class="garm-pick-name">' + escHtml(garmentName) + '</div>';
  } else {
    html += '<div class="swatch empty"><i class="ti ti-shirt" aria-hidden="true"></i></div>';
    html += '<div class="garm-pick-name empty">Pick a garment</div>';
  }
  html += '<i class="ti ti-chevron-' + (pickerOpenForThisLi ? 'up' : 'down') + ' chev" aria-hidden="true"></i>';
  html += '</div>';
  // Picker panel slides under the garment row
  if (pickerOpenForThisLi) {
    html += renderGarmentPickerPanel(liId);
  }
  html += '</div>';

  // Sizes — inline editable inputs.
  // Auto-expand "more sizes" if any of XS/3XL/4XL/5XL/6XL has a value.
  var moreFilled = getNum(f[L.szXS]) + getNum(f[L.sz3XL]) + getNum(f[L.sz4XL]) + getNum(f[L.sz5XL]) + getNum(f[L.sz6XL]);
  var moreExpanded = state.moreSizesExpanded[liId] || moreFilled > 0;

  html += '<div class="li-row">';
  html += '<div class="li-lbl">Sizes <span class="meta"><span id="szTotal-' + liId + '">' + (liveQty || 0) + '</span> pcs</span></div>';
  html += '<div class="sz-grid">';
  // Tab order is document order — inputs in S→M→L→XL→2XL→OSFA order, then XS→3XL→4XL→5XL→6XL when expanded, then price.
  var sizes = [
    { key: 'szS',    label: 'S' },
    { key: 'szM',    label: 'M' },
    { key: 'szL',    label: 'L' },
    { key: 'szXL',   label: 'XL' },
    { key: 'sz2XL',  label: '2XL' },
    { key: 'szOSFA', label: 'OS' }
  ];
  sizes.forEach(function(sz){
    html += renderSizeCell(liId, sz.key, sz.label, getNum(f[L[sz.key]]));
  });
  html += '</div>';

  if (moreExpanded) {
    html += '<div class="sz-grid sz-grid-more">';
    var moreSizes = [
      { key: 'szXS',  label: 'XS' },
      { key: 'sz3XL', label: '3XL' },
      { key: 'sz4XL', label: '4XL' },
      { key: 'sz5XL', label: '5XL' },
      { key: 'sz6XL', label: '6XL' }
    ];
    moreSizes.forEach(function(sz){
      html += renderSizeCell(liId, sz.key, sz.label, getNum(f[L[sz.key]]));
    });
    html += '<button class="sz-more-collapse" onclick="toggleMoreSizes(\'' + liId + '\')" tabindex="-1">− Less</button>';
    html += '</div>';
  } else {
    html += '<button class="sz-more" onclick="toggleMoreSizes(\'' + liId + '\')" tabindex="-1">';
    html += '<i class="ti ti-plus" aria-hidden="true"></i> XS, 3XL, 4XL, 5XL, 6XL';
    html += '</button>';
  }
  html += '</div>';

  // Price row — inline input
  html += '<div class="li-row">';
  html += '<div class="li-lbl">Price</div>';
  html += '<div class="price-row">';
  // Per-piece input
  html += '<div class="price-pick-input">';
  html += '<div class="price-pick-lbl">Per piece</div>';
  html += '<div class="price-input-wrap">';
  html += '<span class="price-prefix">$</span>';
  html += '<input type="number" inputmode="decimal" step="0.01" min="0" '
       + 'id="price-' + liId + '" class="price-input" '
       + 'value="' + (price > 0 ? price.toFixed(2) : '') + '" placeholder="0.00" '
       + 'onchange="onPriceChange(\'' + liId + '\', this.value)" '
       + 'onkeydown="onPriceKey(event, \'' + liId + '\')" />';
  html += '</div>';
  html += '</div>';
  // Line total (read-only display, updated in-place)
  html += '<div class="price-pick">';
  html += '<div class="price-pick-lbl">Line total</div>';
  var lineTotal = price * liveQty;
  var hasTotal = price > 0 && liveQty > 0;
  html += '<div class="price-pick-val" id="lineTotal-' + liId + '">';
  html += hasTotal ? '$' + lineTotal.toFixed(2) : '—';
  html += '</div>';
  html += '<div class="price-pick-sub" id="lineTotalSub-' + liId + '">';
  html += hasTotal ? liveQty + ' × $' + price.toFixed(2) : '';
  html += '</div>';
  html += '</div>';
  html += '</div>';
  html += '</div>';

  // Actions
  html += '<div class="li-focus-actions">';
  if (li._local) {
    html += '<button class="li-act danger" onclick="deleteGhostLi(\'' + liId + '\')"><i class="ti ti-trash" aria-hidden="true"></i> Delete</button>';
  }
  html += '<div style="flex:1"></div>';
  if (idx < total - 1) {
    html += '<button class="li-act primary" id="saveBtn-' + liId + '" onclick="saveAndNextLi()">Save · next <i class="ti ti-arrow-right" aria-hidden="true"></i></button>';
  } else {
    html += '<button class="li-act ghost" onclick="addNewLineItem()"><i class="ti ti-plus" aria-hidden="true"></i> Add another</button>';
    html += '<button class="li-act primary" id="saveBtn-' + liId + '" onclick="goReview()">Save · review</button>';
  }
  html += '</div>';

  return html;
}

// Render a single inline-editable size cell.
// On change: updates state, refreshes total spans in-place (no full re-render — keeps focus).
function renderSizeCell(liId, sizeKey, label, val){
  var filled = val > 0;
  var cls = 'sz-cell sz-input-cell' + (filled ? ' f' : '');
  var inputId = 'sz-' + liId + '-' + sizeKey;
  var html = '<label class="' + cls + '" for="' + inputId + '">';
  html += '<span class="sz-lbl">' + label + '</span>';
  html += '<input type="number" inputmode="numeric" min="0" '
       + 'id="' + inputId + '" class="sz-input" '
       + 'value="' + (val > 0 ? val : '') + '" placeholder="—" '
       + 'onchange="onSizeChange(\'' + liId + '\',\'' + sizeKey + '\', this.value)" '
       + 'onfocus="this.select()" '
       + 'onkeydown="onSizeKey(event, \'' + liId + '\', \'' + sizeKey + '\')" />';
  html += '</label>';
  return html;
}

// Render the garment picker panel beneath the garment row
function renderGarmentPickerPanel(liId){
  var p = state.garmentPicker;
  if (!p || p.liId !== liId) return '';
  var html = '<div class="garm-panel">';
  // Search input
  html += '<div class="garm-search">';
  html += '<i class="ti ti-search" aria-hidden="true"></i>';
  html += '<input type="text" id="garmSearch" class="garm-search-input" '
       + 'placeholder="Search by brand, style, color — e.g. bella 3001 black" '
       + 'value="' + escAttr(p.query) + '" '
       + 'oninput="onGarmentSearch(this.value)" />';
  html += '<button class="garm-search-x" onclick="closeGarmentPicker()" title="Close"><i class="ti ti-x" aria-hidden="true"></i></button>';
  html += '</div>';
  // Results
  html += '<div class="garm-results">';
  if (p.loading) {
    html += '<div class="garm-status">Searching…</div>';
  } else if (p.err) {
    html += '<div class="garm-status err">' + escHtml(p.err) + '</div>';
  } else if (!p.query) {
    html += '<div class="garm-status hint">Type a brand, style number, or color to search ' + GARMENT_TOTAL + ' garments.</div>';
  } else if (p.results.length === 0) {
    html += '<div class="garm-status">No matches for "' + escHtml(p.query) + '".</div>';
  } else {
    p.results.forEach(function(g){
      var gf = g.cellValuesByFieldId || g.fields || {};
      var name = getStr(gf[G.name]) || '(no name)';
      html += '<div class="garm-result" onclick="pickGarment(\'' + liId + '\',\'' + g.id + '\')">';
      html += '<div class="garm-result-name">' + escHtml(name) + '</div>';
      html += '</div>';
    });
    if (p.results.length === MAX_GARMENT_RESULTS) {
      html += '<div class="garm-status hint">Showing ' + MAX_GARMENT_RESULTS + ' matches — refine your search to narrow.</div>';
    }
  }
  html += '</div>';
  html += '</div>';
  return html;
}

// ── MODE: review / submit-confirm — dense overview ──
function renderModeReview(rec, cust, isSubmitConfirm){
  var html = '';
  // Top banner — review vs submit-confirm have different urgency
  var bannerCls = isSubmitConfirm ? 'rev-banner submit' : 'rev-banner';
  html += '<div class="' + bannerCls + '">';
  html += '<i class="ti ti-' + (isSubmitConfirm ? 'send' : 'eye') + '" aria-hidden="true"></i>';
  html += '<span>' + (isSubmitConfirm
    ? 'Confirm submit — order goes to the shop'
    : 'Review · everything below is read-only') + '</span>';
  html += '<div class="rev-banner-actions">';
  html += '<button class="rev-banner-btn" onclick="keepEditing()">Keep editing</button>';
  html += '<button class="rev-banner-btn primary" onclick="' + (isSubmitConfirm ? 'confirmSubmit()' : 'goSubmitConfirm()') + '">';
  html += (isSubmitConfirm ? 'Confirm submit' : 'Submit order');
  html += '</button>';
  html += '</div>';
  html += '</div>';

  // Imprints
  var imps = state.orderImprints;
  html += '<div class="rev-sec-h">Imprints<span class="rev-sec-meta">' + imps.length + (imps.length === 1 ? ' design' : ' designs') + '</span></div>';
  if (imps.length === 0) {
    html += '<div class="rev-empty">No imprints — at least one is required before submitting.</div>';
  } else {
    html += '<div class="rev-imp-row">';
    imps.forEach(function(imp){
      var f = imp.cellValuesByFieldId || imp.fields || {};
      var idLabel = getStr(f[I.idGen]) || getStr(f[I.id]) || 'imprint';
      var loc = getSelName(f[I.loc]) || '—';
      var type = getSelName(f[I.type]) || '—';
      html += '<div class="rev-imp">';
      html += '<div class="rev-imp-ph"><i class="ti ti-photo" aria-hidden="true"></i></div>';
      html += '<div class="rev-imp-id">' + escHtml(idLabel) + '</div>';
      html += '<div class="rev-imp-sub">' + escHtml(loc.toLowerCase()) + ' · ' + escHtml(type) + '</div>';
      html += '</div>';
    });
    html += '</div>';
  }

  // Line items
  var lis = state.orderLineItems;
  var grandQty = 0, grandTotal = 0, incomplete = 0;
  lis.forEach(function(li){
    var f = li.cellValuesByFieldId || li.fields || {};
    var liQty = 0;
    ['szXS','szS','szM','szL','szXL','sz2XL','sz3XL','sz4XL','sz5XL','sz6XL','szOSFA'].forEach(function(k){
      liQty += getNum(f[L[k]]);
    });
    var liPrice = getNum(f[L.price]);
    grandQty += liQty;
    grandTotal += liPrice * liQty;
    if (!liPrice || !liQty || !getLinkIds(f[L.imprints]).length || !getLinkIds(f[L.garment]).length) incomplete++;
  });
  html += '<div class="rev-sec-h">Line items<span class="rev-sec-meta">'
    + lis.length + (lis.length === 1 ? ' line' : ' lines')
    + ' · ' + grandQty + ' pcs · $' + grandTotal.toFixed(2);
  if (incomplete > 0) html += ' · <span style="color:#b7791f;">' + incomplete + ' incomplete</span>';
  html += '</span></div>';

  if (lis.length === 0) {
    html += '<div class="rev-empty">No line items — add at least one before submitting.</div>';
  } else {
    lis.forEach(function(li, idx){
      html += renderReviewLi(li, idx);
    });
  }

  return html;
}

function renderReviewLi(li, idx){
  var f = li.cellValuesByFieldId || li.fields || {};
  var impIds = getLinkIds(f[L.imprints]);
  var garmentIds = getLinkIds(f[L.garment]);
  var garmentName = garmentIds.length && state.garmentNames[garmentIds[0]] || '(no garment)';
  var price = getNum(f[L.price]);
  var liQty = 0;
  ['szXS','szS','szM','szL','szXL','sz2XL','sz3XL','sz4XL','sz5XL','sz6XL','szOSFA'].forEach(function(k){
    liQty += getNum(f[L[k]]);
  });
  var lineTotal = price * liQty;

  var html = '<div class="rev-li" onclick="jumpToLi(' + idx + ')">';
  html += '<div class="rev-li-top">';
  html += '<div class="rev-li-pills">';
  if (impIds.length === 0) {
    html += '<span class="rev-li-pill warn">no imprint</span>';
  } else {
    impIds.forEach(function(impId){
      html += '<span class="rev-li-pill">' + escHtml(lookupImprintLabel(impId)) + '</span>';
    });
  }
  html += '</div>';
  html += '<span class="rev-li-garm">' + escHtml(garmentName) + '</span>';
  if (price > 0 && liQty > 0) {
    html += '<span class="rev-li-price">$' + lineTotal.toFixed(2) + '<span class="meta"> · ' + liQty + 'pc</span></span>';
  } else {
    html += '<span class="rev-li-price warn">incomplete</span>';
  }
  html += '</div>';
  html += '<div class="rev-li-sz">';
  var anySize = false;
  [
    { key: 'szXS',  label: 'XS' },
    { key: 'szS',   label: 'S' },
    { key: 'szM',   label: 'M' },
    { key: 'szL',   label: 'L' },
    { key: 'szXL',  label: 'XL' },
    { key: 'sz2XL', label: '2XL' },
    { key: 'sz3XL', label: '3XL' },
    { key: 'sz4XL', label: '4XL' },
    { key: 'sz5XL', label: '5XL' },
    { key: 'sz6XL', label: '6XL' },
    { key: 'szOSFA',label: 'OS' }
  ].forEach(function(sz){
    var v = getNum(f[L[sz.key]]);
    if (v > 0) {
      html += '<span><span class="lbl">' + sz.label + '</span><span class="v">' + v + '</span></span>';
      anySize = true;
    }
  });
  if (!anySize) html += '<span style="color:#b7791f;">no sizes</span>';
  html += '</div>';
  html += '</div>';
  return html;
}

// ── Render one imprint tile (real or ghost) ──
function renderImprintTile(imp){
  var isGhost = !!imp._local;
  var f = imp.cellValuesByFieldId || imp.fields || {};
  var impId = getStr(f[I.idGen]) || getStr(f[I.id]) || (isGhost ? 'New imprint' : '(no id)');
  var nick = getStr(f[I.nick]);
  var loc = getSelName(f[I.loc]) || '—';
  var type = getSelName(f[I.type]) || '—';
  var liIds = getLinkIds(f[I.lis]);
  var attachedCount = liIds.length;
  var proofUrl = getProofThumbUrl(f[I.proofs]);

  var titleLine = nick || impId;

  var cls = 'imp-tile';
  if (isGhost) cls += ' ghost';

  var onclick = isGhost
    ? 'openImprintForm(\'edit\',\'' + imp.id + '\')'
    : 'showReadOnlyImprint(\'' + imp.id + '\')';

  var html = '<div class="' + cls + '" onclick="' + onclick + '">';
  // Thumb area — proof when available, muted placeholder otherwise
  html += '<div class="imp-thumb">';
  if (proofUrl) {
    html += '<img src="' + escAttr(proofUrl) + '" alt="" onerror="this.style.display=\'none\'">';
  } else {
    html += '<svg class="imp-thumb-ph" viewBox="0 0 24 24" fill="none">';
    html += '<rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/>';
    html += '<circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>';
    html += '<path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
    html += '</svg>';
  }
  if (isGhost) html += '<span class="imp-thumb-badge">ghost</span>';
  html += '</div>';
  // Tile body — id/nickname + loc · type + attach count
  html += '<div class="imp-tile-body">';
  html += '<div class="imp-tile-name">' + escHtml(titleLine) + '</div>';
  html += '<div class="imp-tile-sub">' + escHtml(loc.toLowerCase()) + ' · ' + escHtml(type) + '</div>';
  if (attachedCount > 0) {
    html += '<div class="imp-tile-attach">on ' + attachedCount + (attachedCount === 1 ? ' line item' : ' line items') + '</div>';
  } else {
    html += '<div class="imp-tile-attach warn">⚠ not on any line item yet</div>';
  }
  html += '</div>';
  html += '</div>'; // /imp-tile
  return html;
}

// ── Render one line item row (read-only for now) ──
function renderLineItemRow(li){
  var f = li.cellValuesByFieldId || li.fields || {};
  var qty = getNum(f[L.totalQty]);
  var price = getNum(f[L.price]);
  var garmentIds = getLinkIds(f[L.garment]);
  var garmentName = garmentIds.length && state.garmentNames[garmentIds[0]] || '(garment)';
  var impIds = getLinkIds(f[L.imprints]);

  // Size cells: S, M, L, XL, 2XL, OSFA shown, + button reveals more
  var sizes = [
    { key: 's', label: 's', val: getNum(f[L.szS]) },
    { key: 'm', label: 'm', val: getNum(f[L.szM]) },
    { key: 'l', label: 'l', val: getNum(f[L.szL]) },
    { key: 'xl', label: 'xl', val: getNum(f[L.szXL]) },
    { key: '2xl', label: '2xl', val: getNum(f[L.sz2XL]) },
    { key: 'osfa', label: 'os', val: getNum(f[L.szOSFA]) }
  ];
  // Check if there are any "more" sizes filled
  var moreFilled = getNum(f[L.szXS]) + getNum(f[L.sz3XL]) + getNum(f[L.sz4XL]) + getNum(f[L.sz5XL]) + getNum(f[L.sz6XL]);

  var html = '<div class="li-row">';
  // Top line: imprint pills + garment name + price
  html += '<div class="li-line">';
  html += '<div class="li-line-l">';
  impIds.forEach(function(impId){
    var label = lookupImprintLabel(impId);
    html += '<span class="li-imp-pill">' + escHtml(label) + '</span>';
  });
  if (!impIds.length) {
    html += '<span class="li-imp-pill warn">⚠ no imprint</span>';
  }
  html += '<span class="li-garment">' + escHtml(garmentName) + '</span>';
  html += '</div>';
  html += '<span class="li-price">$' + (price ? price.toFixed(2) : '—') + (qty > 0 ? ' · ' + qty + 'pc' : '') + '</span>';
  html += '</div>';
  // Size mini grid
  html += '<div class="li-sz-mini">';
  sizes.forEach(function(s){
    var cls = 'li-sz-cell' + (s.val > 0 ? ' filled' : '');
    html += '<div class="' + cls + '">' + s.label + (s.val > 0 ? ' ' + s.val : '') + '</div>';
  });
  // "+more" cell
  var moreCls = 'li-sz-cell' + (moreFilled > 0 ? ' filled' : '');
  html += '<div class="' + moreCls + '">' + (moreFilled > 0 ? '+' + moreFilled : '+') + '</div>';
  html += '</div>';
  html += '</div>'; // /li-row
  return html;
}

// Look up display label for an imprint by record ID — checks orderImprints (real + ghost)
function lookupImprintLabel(impId){
  for (var i = 0; i < state.orderImprints.length; i++) {
    if (state.orderImprints[i].id === impId) {
      var f = state.orderImprints[i].cellValuesByFieldId || state.orderImprints[i].fields || {};
      var idLabel = getStr(f[I.idGen]) || getStr(f[I.id]) || 'imprint';
      return idLabel;
    }
  }
  // Fall back to truncated record ID
  return impId.slice(0, 8) + '…';
}

// Stub for tapping a real imprint tile — read-only view (no editing yet, writes off)
function showReadOnlyImprint(impId){
  var rec = null;
  for (var i = 0; i < state.orderImprints.length; i++) {
    if (state.orderImprints[i].id === impId) { rec = state.orderImprints[i]; break; }
  }
  if (!rec) return;
  var f = rec.cellValuesByFieldId || rec.fields || {};
  var msg = 'Imprint ' + (getStr(f[I.idGen]) || getStr(f[I.id])) + '\n\n'
    + 'Location: ' + (getSelName(f[I.loc]) || '—') + '\n'
    + 'Type: ' + (getSelName(f[I.type]) || '—') + '\n'
    + 'Nickname: ' + (getStr(f[I.nick]) || '—') + '\n'
    + 'Notes: ' + (getStr(f[I.notes]) || '—') + '\n\n'
    + '(Editing this real imprint will become available when writes are enabled.)';
  alert(msg);
}

// ──────────────────────────────────────────────────────────────────────────
// Imprint form (inline, expandable at top of IMPRINTS section)
// ──────────────────────────────────────────────────────────────────────────

function openImprintForm(mode, editingId){
  // Remember where to return after the form closes.
  // imprint-empty → after save, mode resolves naturally to li-empty
  // li-empty / li-focus → after save, return to that mode
  var origin = state.detailMode;
  if (mode === 'edit' && editingId) {
    // Find the ghost record and pre-fill
    var ghost = null;
    for (var i = 0; i < state.orderImprints.length; i++) {
      if (state.orderImprints[i].id === editingId) { ghost = state.orderImprints[i]; break; }
    }
    if (!ghost || !ghost._local) {
      // Real imprint editing not yet supported
      showReadOnlyImprint(editingId);
      return;
    }
    var gf = ghost.fields || {};
    // Figure out which type category this is in
    var typeName = getSelName(gf[I.type]);
    var category = '';
    IMPRINT_TYPE_GROUPS.forEach(function(grp){
      if (grp.options.indexOf(typeName) !== -1) category = grp.label;
    });
    var liIds = getLinkIds(gf[I.lis]);
    state.imprintForm = {
      mode: 'edit',
      editingId: editingId,
      location: getSelName(gf[I.loc]) || '',
      typeCategory: category,
      type: typeName,
      nickname: getStr(gf[I.nick]) || '',
      notes: getStr(gf[I.notes]) || '',
      screens: (gf[I.screens] != null ? String(gf[I.screens]) : ''),
      inkChanges: (gf[I.inkChanges] != null ? String(gf[I.inkChanges]) : ''),
      applyToLis: liIds.slice(),
      showMoreLocs: false,
      originReturn: origin
    };
  } else {
    state.imprintForm = {
      mode: 'new',
      editingId: null,
      location: '',
      typeCategory: '',
      type: '',
      nickname: '',
      notes: '',
      screens: '',
      inkChanges: '',
      applyToLis: [],
      showMoreLocs: false,
      originReturn: origin
    };
  }
  render();
}

function closeImprintForm(){
  state.imprintForm = null;
  resolveDetailMode();
  render();
}

function setFormLocation(loc){
  if (!state.imprintForm) return;
  state.imprintForm.location = loc;
  render();
}
function toggleMoreLocs(){
  if (!state.imprintForm) return;
  state.imprintForm.showMoreLocs = !state.imprintForm.showMoreLocs;
  render();
}
function setFormTypeCategory(cat){
  if (!state.imprintForm) return;
  // Don't reset existing type if category matches
  state.imprintForm.typeCategory = state.imprintForm.typeCategory === cat ? '' : cat;
  // If clearing category, clear type too
  if (!state.imprintForm.typeCategory) state.imprintForm.type = '';
  render();
}
function setFormType(t){
  if (!state.imprintForm) return;
  state.imprintForm.type = t;
  render();
}
function setFormNick(v){ if (state.imprintForm) state.imprintForm.nickname = v; }
function setFormNotes(v){ if (state.imprintForm) state.imprintForm.notes = v; }
function pickImpNum(field, n){ if (!state.imprintForm) return; state.imprintForm[field] = String(n); state.imprintForm[field + 'More'] = false; render(); }
function toggleImpNumMore(field){
  if (!state.imprintForm) return;
  var on = !state.imprintForm[field + 'More'];
  state.imprintForm[field + 'More'] = on;
  render();
  if (on) setTimeout(function(){ var el = document.getElementById('impNum_' + field); if (el) el.focus(); }, 0);
}
function setImpNumCustom(field, v){ if (state.imprintForm) state.imprintForm[field] = v; }

// Numeric button picker for screen count / color changes (v2-v13).
// Buttons 1–8 (the practical ceiling) + a "+" that reveals a custom entry for higher.
function impNumRowHTML(label, field){
  var f = state.imprintForm;
  var val = (f[field] == null) ? '' : String(f[field]);
  var moreOn = !!f[field + 'More'];
  var numVal = (val === '') ? null : Number(val);
  var h = '<div class="imp-form-lbl">' + label + '</div>';
  h += '<div class="imp-form-btns">';
  for (var n = 1; n <= 8; n++){
    var on = (numVal === n);
    h += '<button class="imp-btn num' + (on ? ' on' : '') + '" onclick="pickImpNum(\'' + field + '\',' + n + ')">' + n + '</button>';
  }
  // A chosen value above 8 shows as its own active key.
  if (numVal != null && !isNaN(numVal) && numVal > 8){
    h += '<button class="imp-btn num on" onclick="toggleImpNumMore(\'' + field + '\')">' + numVal + '</button>';
  }
  h += '<button class="imp-btn ghost' + (moreOn ? ' on' : '') + '" onclick="toggleImpNumMore(\'' + field + '\')">+</button>';
  h += '</div>';
  if (moreOn){
    h += '<div style="margin-top:6px"><input id="impNum_' + field + '" type="number" min="9" step="1" inputmode="numeric" class="imp-form-input" style="max-width:160px" value="' + escAttr(val) + '" placeholder="Enter a higher number" oninput="setImpNumCustom(\'' + field + '\',this.value)" /></div>';
  }
  return h;
}
function toggleApplyLi(liId){
  if (!state.imprintForm) return;
  var idx = state.imprintForm.applyToLis.indexOf(liId);
  if (idx === -1) state.imprintForm.applyToLis.push(liId);
  else state.imprintForm.applyToLis.splice(idx, 1);
  render();
}
function selectAllLis(){
  if (!state.imprintForm) return;
  state.imprintForm.applyToLis = state.orderLineItems.map(function(li){ return li.id; });
  render();
}
function clearAllLis(){
  if (!state.imprintForm) return;
  state.imprintForm.applyToLis = [];
  render();
}

function saveImprintForm(addAnother){
  var f = state.imprintForm;
  if (!f) return;
  if (!f.location) { alert('Location is required.'); return; }
  if (!f.type) { alert('Type is required.'); return; }

  var isSP = f.typeCategory === 'Screen-print';
  if (isSP) {
    if (f.screens === '' || f.screens == null) { alert('Screen count is required for screen-print imprints.'); return; }
    if (f.inkChanges === '' || f.inkChanges == null) { alert('Color changes is required for screen-print imprints.'); return; }
  }

  if (f.mode === 'edit' && f.editingId) {
    // Update existing ghost
    for (var i = 0; i < state.orderImprints.length; i++) {
      var imp = state.orderImprints[i];
      if (imp.id === f.editingId && imp._local) {
        imp.fields[I.loc] = f.location;
        imp.fields[I.type] = f.type;
        imp.fields[I.nick] = f.nickname;
        imp.fields[I.notes] = f.notes;
        imp.fields[I.screens] = (isSP && f.screens !== '' && f.screens != null) ? Number(f.screens) : null;
        imp.fields[I.inkChanges] = (isSP && f.inkChanges !== '' && f.inkChanges != null) ? Number(f.inkChanges) : null;
        imp.fields[I.lis] = f.applyToLis.slice();
        break;
      }
    }
    dlog('ghost imprint updated (preview, no write):', f.editingId);
  } else {
    // Create new ghost imprint
    state.ghostImprintCounter++;
    var localId = 'local-' + Date.now() + '-' + state.ghostImprintCounter;
    var ghost = {
      id: localId,
      _local: true,
      fields: {}
    };
    ghost.fields[I.id] = '(new) ' + localId.slice(-5);
    ghost.fields[I.idGen] = 'NEW-' + state.ghostImprintCounter;
    ghost.fields[I.nick] = f.nickname;
    ghost.fields[I.loc] = f.location;
    ghost.fields[I.type] = f.type;
    ghost.fields[I.notes] = f.notes;
    ghost.fields[I.screens] = (isSP && f.screens !== '' && f.screens != null) ? Number(f.screens) : null;
    ghost.fields[I.inkChanges] = (isSP && f.inkChanges !== '' && f.inkChanges != null) ? Number(f.inkChanges) : null;
    ghost.fields[I.lis] = f.applyToLis.slice();
    state.orderImprints.push(ghost);

    // Reflect the link on each affected LI's local record as well
    f.applyToLis.forEach(function(liId){
      for (var j = 0; j < state.orderLineItems.length; j++) {
        var li = state.orderLineItems[j];
        if (li.id === liId) {
          var lif = li.cellValuesByFieldId || li.fields || (li.fields = {});
          if (!li.cellValuesByFieldId) li.fields = lif;
          var current = getLinkIds(lif[L.imprints]);
          if (current.indexOf(localId) === -1) current.push(localId);
          lif[L.imprints] = current;
          break;
        }
      }
    });

    dlog('ghost imprint created (preview, no write):', localId, f.location, f.type);
  }

  if (addAnother) {
    // Re-open a fresh form, keep the user in flow
    state.imprintForm = {
      mode: 'new',
      editingId: null,
      location: '',
      typeCategory: '',
      type: '',
      nickname: '',
      notes: '',
      screens: '',
      inkChanges: '',
      applyToLis: [],
      showMoreLocs: false,
      originReturn: 'imprint-empty' // we're still in imprint-creation mode
    };
  } else {
    state.imprintForm = null;
    // Resolve mode from the new data shape
    resolveDetailMode();
  }
  render();
}

function deleteGhostImprint(){
  var f = state.imprintForm;
  if (!f || f.mode !== 'edit' || !f.editingId) return;
  if (!confirm('Delete this imprint? (preview only — no Airtable write)')) return;
  // Remove from orderImprints
  state.orderImprints = state.orderImprints.filter(function(imp){
    return !(imp.id === f.editingId && imp._local);
  });
  // Unlink from any LI's local imprint links
  state.orderLineItems.forEach(function(li){
    var lif = li.cellValuesByFieldId || li.fields || {};
    var links = getLinkIds(lif[L.imprints]);
    var filtered = links.filter(function(id){ return id !== f.editingId; });
    if (filtered.length !== links.length) lif[L.imprints] = filtered;
  });
  state.imprintForm = null;
  dlog('ghost imprint deleted (preview):', f.editingId);
  render();
}

// ════════════════════════════════════════════════════════════════════
// LI focus mode — navigation and editing handlers
// ════════════════════════════════════════════════════════════════════

function prevLi(){
  if (state.focusLiIndex > 0) {
    state.focusLiIndex--;
    render();
  }
}
function nextLi(){
  if (state.focusLiIndex < state.orderLineItems.length - 1) {
    state.focusLiIndex++;
    render();
  }
}
function gotoLi(idx){
  if (idx < 0 || idx >= state.orderLineItems.length) return;
  state.focusLiIndex = idx;
  render();
}
function toggleLiAssign(liId){
  state.liAssignOpen = (state.liAssignOpen === liId) ? null : liId;
  render();
}
function saveAndNextLi(){
  // Save = nothing right now (preview, edits live in local state already).
  // Just advance.
  if (state.focusLiIndex < state.orderLineItems.length - 1) {
    state.focusLiIndex++;
  }
  render();
}
function jumpToLi(idx){
  state.focusLiIndex = idx;
  state.detailMode = 'li-focus';
  render();
}

// Add a new ghost line item, jump to focus on it
function addNewLineItem(){
  state.ghostLiCounter++;
  var localId = 'local-li-' + Date.now() + '-' + state.ghostLiCounter;
  var ghost = {
    id: localId,
    _local: true,
    fields: {}
  };
  // Initialize with empty fields
  ghost.fields[L.imprints] = [];
  ghost.fields[L.garment] = [];
  ghost.fields[L.price] = 0;
  ghost.fields[L.szXS] = 0; ghost.fields[L.szS] = 0; ghost.fields[L.szM] = 0;
  ghost.fields[L.szL] = 0;  ghost.fields[L.szXL] = 0; ghost.fields[L.sz2XL] = 0;
  ghost.fields[L.sz3XL] = 0; ghost.fields[L.sz4XL] = 0; ghost.fields[L.sz5XL] = 0;
  ghost.fields[L.sz6XL] = 0; ghost.fields[L.szOSFA] = 0;
  state.orderLineItems.push(ghost);
  state.focusLiIndex = state.orderLineItems.length - 1;
  state.detailMode = 'li-focus';
  dlog('ghost LI added (preview):', localId);
  render();
}
function deleteGhostLi(liId){
  if (!confirm('Delete this line item? (preview only — no Airtable write)')) return;
  state.orderLineItems = state.orderLineItems.filter(function(li){
    return !(li.id === liId && li._local);
  });
  // Clean up references from imprints' `lis` field too
  state.orderImprints.forEach(function(imp){
    var ifld = imp.cellValuesByFieldId || imp.fields || {};
    var lisLink = getLinkIds(ifld[I.lis]);
    var filtered = lisLink.filter(function(id){ return id !== liId; });
    if (filtered.length !== lisLink.length) ifld[I.lis] = filtered;
  });
  // Adjust focus
  if (state.focusLiIndex >= state.orderLineItems.length) {
    state.focusLiIndex = Math.max(0, state.orderLineItems.length - 1);
  }
  resolveDetailMode();
  dlog('ghost LI deleted (preview):', liId);
  render();
}

// Toggle an imprint's attachment to a specific LI
function toggleImpOnLi(liId, impId){
  var li = state.orderLineItems.find(function(x){ return x.id === liId; });
  if (!li) return;
  var lif = li.cellValuesByFieldId || li.fields || (li.fields = {});
  // Always work with the .fields object for our local mutations
  if (!li.fields) li.fields = lif;
  var current = getLinkIds(li.fields[L.imprints]);
  var idx = current.indexOf(impId);
  if (idx === -1) current.push(impId);
  else current.splice(idx, 1);
  li.fields[L.imprints] = current;

  // Reflect on the imprint's `lis` field too — keeps two views consistent
  var imp = state.orderImprints.find(function(x){ return x.id === impId; });
  if (imp) {
    var ifld = imp.cellValuesByFieldId || imp.fields || (imp.fields = {});
    if (!imp.fields) imp.fields = ifld;
    var iLis = getLinkIds(imp.fields[I.lis]);
    var iIdx = iLis.indexOf(liId);
    if (idx === -1 && iIdx === -1) iLis.push(liId);
    else if (idx !== -1 && iIdx !== -1) iLis.splice(iIdx, 1);
    imp.fields[I.lis] = iLis;
  }
  dlog('toggle imprint on LI (preview):', liId, impId, idx === -1 ? 'attached' : 'detached');
  render();
}

// ── Inline size/price editing (no full re-render — preserves focus across Tab) ──
// onSizeChange and onPriceChange fire on `change` (blur or Enter), not on every keystroke.
// They mutate local state and update two derived spans in-place:
//   #szTotal-{liId}  — running total above the size grid
//   #lineTotal-{liId} + #lineTotalSub-{liId} — line total in the price row

function onSizeChange(liId, sizeKey, rawVal){
  var li = state.orderLineItems.find(function(x){ return x.id === liId; });
  if (!li) return;
  if (!li.fields) li.fields = li.cellValuesByFieldId || {};
  var n = parseInt(rawVal, 10);
  if (isNaN(n) || n < 0) n = 0;
  li.fields[L[sizeKey]] = n;
  dlog('size edit (preview):', liId, sizeKey, '=', n);
  refreshLiTotals(liId);
  // Also reflect filled/empty state on the cell itself (parent label of the input)
  var input = document.getElementById('sz-' + liId + '-' + sizeKey);
  if (input) {
    // Normalize the display value (e.g. "07" → "7")
    input.value = n > 0 ? String(n) : '';
    var cell = input.closest('.sz-cell');
    if (cell) cell.classList.toggle('f', n > 0);
  }
}

function onPriceChange(liId, rawVal){
  var li = state.orderLineItems.find(function(x){ return x.id === liId; });
  if (!li) return;
  if (!li.fields) li.fields = li.cellValuesByFieldId || {};
  var n = parseFloat(rawVal);
  if (isNaN(n) || n < 0) n = 0;
  li.fields[L.price] = n;
  dlog('price edit (preview):', liId, '$' + n.toFixed(2));
  refreshLiTotals(liId);
  // Normalize the displayed value (e.g. "5" → "5.00")
  var input = document.getElementById('price-' + liId);
  if (input && n > 0) input.value = n.toFixed(2);
  else if (input) input.value = '';
}

// In-place refresh of the two derived spans on the LI focus card.
// Called from onSizeChange / onPriceChange — does NOT call render().
function refreshLiTotals(liId){
  var li = state.orderLineItems.find(function(x){ return x.id === liId; });
  if (!li) return;
  var f = li.cellValuesByFieldId || li.fields || {};
  var totalQty = 0;
  ['szXS','szS','szM','szL','szXL','sz2XL','sz3XL','sz4XL','sz5XL','sz6XL','szOSFA'].forEach(function(k){
    totalQty += getNum(f[L[k]]);
  });
  var price = getNum(f[L.price]);
  var hasTotal = price > 0 && totalQty > 0;
  // Update the running total above the size grid
  var totalEl = document.getElementById('szTotal-' + liId);
  if (totalEl) totalEl.textContent = totalQty;
  // Update line total
  var ltEl = document.getElementById('lineTotal-' + liId);
  var ltSubEl = document.getElementById('lineTotalSub-' + liId);
  if (ltEl) ltEl.textContent = hasTotal ? '$' + (price * totalQty).toFixed(2) : '—';
  if (ltSubEl) ltSubEl.textContent = hasTotal ? totalQty + ' × $' + price.toFixed(2) : '';
}

// Keyboard nav within size inputs:
//   Enter on any size → moves focus to next size; on last size (last input on screen) → focuses price
//   Enter on price → click Save·next button (whichever it is)
// Tab works natively (document order). We intercept Enter to make it feel like Tab without surprise.
function onSizeKey(e, liId, sizeKey){
  if (e.key === 'Enter') {
    e.preventDefault();
    // Focus the next form element in document order
    focusNextField(e.target);
  }
}
function onPriceKey(e, liId){
  if (e.key === 'Enter') {
    e.preventDefault();
    // First commit the current change (the change event may not have fired yet
    // because the input still has focus). Then click Save.
    onPriceChange(liId, e.target.value);
    // Tab past any remaining elements to the save button
    var btn = document.getElementById('saveBtn-' + liId);
    if (btn) btn.click();
  }
}

// Helper: find the next focusable element in document order (input, button) inside the LI focus card.
function focusNextField(from){
  // Walk the document forward looking for focusable elements
  var focusable = Array.prototype.slice.call(document.querySelectorAll(
    '.li-focus input, .li-focus button:not([tabindex="-1"])'
  ));
  var idx = focusable.indexOf(from);
  if (idx === -1) return;
  for (var i = idx + 1; i < focusable.length; i++) {
    var el = focusable[i];
    if (el.offsetParent !== null) { // visible
      el.focus();
      return;
    }
  }
}

// Toggle the "more sizes" row (XS, 3XL, 4XL, 5XL, 6XL). This DOES trigger a re-render
// since it changes the DOM structure (adds/removes inputs).
function toggleMoreSizes(liId){
  state.moreSizesExpanded[liId] = !state.moreSizesExpanded[liId];

}

// ════════════════════════════════════════════════════════════════════

var GARMENT_TOTAL = '4,956'; // displayed in empty state — verified from MCP audit
var MAX_GARMENT_RESULTS = 20;
var GARMENT_POOL = 60; // over-fetch, then rank client-side and trim to MAX_GARMENT_RESULTS
var garmentSearchTimer = null;
var garmentSearchSeq = 0; // race-guard: only the latest fetch's response wins

function openGarmentPicker(liId){
  state.garmentPicker = { liId: liId, query: '', results: [], loading: false, err: null };
  render();
  // Auto-focus the search input after render
  setTimeout(function(){
    var el = document.getElementById('garmSearch');
    if (el) el.focus();
  }, 0);
}

function closeGarmentPicker(){
  state.garmentPicker = null;
  if (garmentSearchTimer) clearTimeout(garmentSearchTimer);
  render();
}

function onGarmentSearch(q){
  if (!state.garmentPicker) return;
  state.garmentPicker.query = q;
  // Debounce search
  if (garmentSearchTimer) clearTimeout(garmentSearchTimer);
  if (!q || q.trim().length < 2) {
    // Too short — clear results
    state.garmentPicker.results = [];
    state.garmentPicker.loading = false;
    state.garmentPicker.err = null;
    renderGarmentResultsOnly();
    return;
  }
  state.garmentPicker.loading = true;
  state.garmentPicker.err = null;
  renderGarmentResultsOnly();
  garmentSearchTimer = setTimeout(function(){ runGarmentSearch(q); }, 250);
}

// Run a search against the Garments table. The query is tokenized on whitespace and
// EACH token must appear somewhere in the Garment Name formula (which concatenates
// brand + style + colorway), in any order — so "3001 black" matches
// "Bella Canvas 3001CVC - Black Heather". Results are over-fetched (GARMENT_POOL),
// ranked client-side so the cleanest hit floats to the top, then trimmed to
// MAX_GARMENT_RESULTS. Case-insensitive via LOWER().
function runGarmentSearch(q){
  var mySeq = ++garmentSearchSeq;
  // Tokenize: lowercase, split on whitespace, drop empties, cap to keep the formula sane.
  var tokens = q.trim().toLowerCase().split(/\s+/).filter(Boolean).slice(0, 6);
  if (!tokens.length) {
    if (state.garmentPicker) { state.garmentPicker.results = []; state.garmentPicker.loading = false; }
    renderGarmentResultsOnly();
    return;
  }
  // One FIND() per token, AND-ed together. Escape single quotes inside each token.
  var terms = tokens.map(function(t){
    return "FIND('" + t.replace(/'/g, "\\'") + "',LOWER({" + G.name + "}))>0";
  });
  var formula = terms.length === 1 ? terms[0] : 'AND(' + terms.join(',') + ')';
  var url = 'https://api.airtable.com/v0/' + BASE + '/' + TBL_GARMENTS
    + '?fields%5B%5D=' + G.name
    + '&filterByFormula=' + encodeURIComponent(formula)
    + '&returnFieldsByFieldId=true&pageSize=' + GARMENT_POOL;
  fetch(url, { headers: hdr() })
    .then(function(r){ if (!r.ok) throw new Error('Search failed: HTTP ' + r.status); return r.json(); })
    .then(function(d){
      if (mySeq !== garmentSearchSeq) return; // a newer search has fired
      if (!state.garmentPicker) return;
      state.garmentPicker.results = rankGarmentResults(d.records || [], tokens).slice(0, MAX_GARMENT_RESULTS);
      state.garmentPicker.loading = false;
      state.garmentPicker.err = null;
      renderGarmentResultsOnly();
    })
    .catch(function(err){
      if (mySeq !== garmentSearchSeq) return;
      if (!state.garmentPicker) return;
      state.garmentPicker.loading = false;
      state.garmentPicker.err = err.message;
      renderGarmentResultsOnly();
      dlog('garment search err:', err.message);
    });
}

// Rank garments by how cleanly the typed tokens match the name. Lower score = better.
// Signals: tokens appearing early in the name; a token landing at a word/segment
// boundary (e.g. "3001" at the start of "3001CVC"); and the first token anchoring the
// very start of the name (a brand hit). A gentle length penalty breaks ties toward the
// more specific / base colorway. All tokens are guaranteed present by the formula.
function rankGarmentResults(records, tokens){
  function score(nm){
    var s = 0;
    for (var i = 0; i < tokens.length; i++){
      var t = tokens[i];
      var idx = nm.indexOf(t);
      if (idx < 0){ s += 10000; continue; } // shouldn't happen — formula guarantees presence
      s += idx;                              // earlier in the name = better
      var before = idx === 0 ? ' ' : nm.charAt(idx - 1);
      if (/[^a-z0-9]/.test(before)) s -= 25; // token starts a word/segment
    }
    if (nm.indexOf(tokens[0]) === 0) s -= 50; // first token anchors the name (brand hit)
    s += nm.length * 0.05;                    // tiebreak: prefer cleaner/shorter names
    return s;
  }
  return records
    .map(function(g){
      var gf = g.cellValuesByFieldId || g.fields || {};
      var nm = (getStr(gf[G.name]) || '').toLowerCase();
      return { rec: g, sc: score(nm) };
    })
    .sort(function(a, b){ return a.sc - b.sc; })
    .map(function(x){ return x.rec; });
}

// Re-render JUST the .garm-results node, so the search input keeps focus across keystrokes
function renderGarmentResultsOnly(){
  var p = state.garmentPicker;
  if (!p) return;
  var resultsEl = document.querySelector('.garm-results');
  if (!resultsEl) return;
  // Same logic as in renderGarmentPickerPanel
  var html = '';
  if (p.loading) {
    html = '<div class="garm-status">Searching…</div>';
  } else if (p.err) {
    html = '<div class="garm-status err">' + escHtml(p.err) + '</div>';
  } else if (!p.query) {
    html = '<div class="garm-status hint">Type a brand, style number, or color to search ' + GARMENT_TOTAL + ' garments.</div>';
  } else if (p.results.length === 0) {
    html = '<div class="garm-status">No matches for "' + escHtml(p.query) + '".</div>';
  } else {
    p.results.forEach(function(g){
      var gf = g.cellValuesByFieldId || g.fields || {};
      var name = getStr(gf[G.name]) || '(no name)';
      html += '<div class="garm-result" onclick="pickGarment(\'' + p.liId + '\',\'' + g.id + '\')">';
      html += '<div class="garm-result-name">' + escHtml(name) + '</div>';
      html += '</div>';
    });
    if (p.results.length === MAX_GARMENT_RESULTS) {
      html += '<div class="garm-status hint">Showing ' + MAX_GARMENT_RESULTS + ' matches — refine to narrow.</div>';
    }
  }
  resultsEl.innerHTML = html;
}

function pickGarment(liId, garmentRecId){
  var li = state.orderLineItems.find(function(x){ return x.id === liId; });
  if (!li) return;
  if (!li.fields) li.fields = li.cellValuesByFieldId || {};
  li.fields[L.garment] = [garmentRecId];
  // Cache the name from the picker results so renderLiFocusInner can display it
  if (state.garmentPicker && state.garmentPicker.results) {
    var match = state.garmentPicker.results.find(function(g){ return g.id === garmentRecId; });
    if (match) {
      var gf = match.cellValuesByFieldId || match.fields || {};
      state.garmentNames[garmentRecId] = getStr(gf[G.name]) || '(garment)';
    }
  }
  state.garmentPicker = null;
  dlog('garment picked (preview):', liId, garmentRecId, state.garmentNames[garmentRecId]);
  render();
}

// ── Render the inline imprint form ──
// Variant via wrapper class: 'imp-form' (default, used in imprint-empty) or 'imp-form sheet' (overlay over LI)
function renderImprintForm(){
  var f = state.imprintForm;
  if (!f) return '';

  var isImprintEmptyMode = f.originReturn === 'imprint-empty' && f.mode === 'new';
  var isOverlay = (state.detailMode === 'li-empty' || state.detailMode === 'li-focus') && f.mode === 'new';
  var isEditMode = f.mode === 'edit';

  var wrapperCls = 'imp-form' + (isOverlay ? ' sheet' : '');
  var html = '<div class="' + wrapperCls + '">';
  // Header — varies by context
  html += '<div class="imp-form-hdr">';
  if (isEditMode) {
    html += '<span class="imp-form-title">Edit imprint</span>';
  } else if (isImprintEmptyMode) {
    var count = state.orderImprints.length;
    if (count === 0) {
      html += '<span class="imp-form-title">First imprint</span>';
      html += '<span class="imp-form-counter">imprints come before line items</span>';
    } else {
      html += '<span class="imp-form-title">Imprint ' + (count + 1) + '</span>';
      html += '<span class="imp-form-counter">' + count + ' added so far · keep going or move on</span>';
    }
  } else {
    html += '<span class="imp-form-title">New imprint</span>';
  }
  html += '<button class="imp-form-x" onclick="closeImprintForm()" title="Close"><i class="ti ti-x" aria-hidden="true"></i></button>';
  html += '</div>';

  // Location
  html += '<div class="imp-form-row">';
  html += '<div class="imp-form-lbl">Location</div>';
  html += '<div class="imp-form-btns">';
  LOCATIONS_PRIMARY.forEach(function(loc){
    var on = f.location === loc;
    html += '<button class="imp-btn' + (on ? ' on' : '') + '" onclick="setFormLocation(\'' + loc + '\')">' + escHtml(loc) + '</button>';
  });
  if (f.showMoreLocs) {
    LOCATIONS_MORE.forEach(function(loc){
      var on = f.location === loc;
      html += '<button class="imp-btn' + (on ? ' on' : '') + '" onclick="setFormLocation(\'' + loc + '\')">' + escHtml(loc) + '</button>';
    });
    html += '<button class="imp-btn ghost" onclick="toggleMoreLocs()">− Less</button>';
  } else {
    if (f.location && LOCATIONS_PRIMARY.indexOf(f.location) === -1) {
      html += '<button class="imp-btn on" onclick="setFormLocation(\'' + f.location + '\')">' + escHtml(f.location) + '</button>';
    }
    html += '<button class="imp-btn ghost" onclick="toggleMoreLocs()">+ More</button>';
  }
  html += '</div>';
  html += '</div>';

  // Type — two-stage (category → sub-option)
  html += '<div class="imp-form-row">';
  html += '<div class="imp-form-lbl">Type</div>';
  html += '<div class="imp-form-btns">';
  IMPRINT_TYPE_GROUPS.forEach(function(grp){
    var on = f.typeCategory === grp.label;
    html += '<button class="imp-btn cat' + (on ? ' on' : '') + '" onclick="setFormTypeCategory(\'' + grp.label + '\')">' + escHtml(grp.label) + '</button>';
  });
  html += '</div>';
  // Sub-options shown when a category is selected
  if (f.typeCategory) {
    var group = IMPRINT_TYPE_GROUPS.find(function(g){ return g.label === f.typeCategory; });
    if (group) {
      html += '<div class="imp-form-btns sub">';
      group.options.forEach(function(opt){
        var on = f.type === opt;
        var label = opt.replace(/^Supacolor - /, '').replace(/^Decopress - /, '').replace(/^Finishing - /, '');
        html += '<button class="imp-btn sub' + (on ? ' on' : '') + '" onclick="setFormType(\'' + opt.replace(/'/g, "\\'") + '\')">' + escHtml(label) + '</button>';
      });
      html += '</div>';
    }
  }
  html += '</div>';

  // Screen count + Color changes (button pickers) — v2-v13. Required, and shown only for
  // screen-print imprints (counts don't apply to Supacolor / embroidery / decopress / finishing).
  if (f.typeCategory === 'Screen-print') {
    html += '<div class="imp-form-row">' + impNumRowHTML('Screen count', 'screens') + '</div>';
    html += '<div class="imp-form-row">' + impNumRowHTML('Color changes', 'inkChanges') + '</div>';
  }

  // Nickname
  html += '<div class="imp-form-row">';
  html += '<div class="imp-form-lbl">Nickname <span class="opt">optional</span></div>';
  html += '<input type="text" class="imp-form-input" value="' + escAttr(f.nickname) + '" placeholder="e.g. PERC logo - front" oninput="setFormNick(this.value)" />';
  html += '</div>';

  // Print notes — collapsed by default to keep form compact, optional row at bottom
  // (kept inline for now; future: expand-on-click)
  html += '<div class="imp-form-row">';
  html += '<div class="imp-form-lbl">Print notes <span class="opt">optional</span></div>';
  html += '<textarea class="imp-form-textarea" placeholder="Anything Seps or the operator needs to know" oninput="setFormNotes(this.value)">' + escHtml(f.notes) + '</textarea>';
  html += '</div>';

  // Apply-to-line-items — only relevant when LIs exist AND we're not in imprint-empty mode.
  // In imprint-empty mode by definition there are no LIs yet, so this row would always be empty.
  if (!isImprintEmptyMode && state.orderLineItems.length > 0) {
    html += '<div class="imp-form-row">';
    html += '<div class="imp-form-lbl">Apply to line items <span class="opt">optional</span></div>';
    html += '<div class="imp-form-li-list">';
    state.orderLineItems.forEach(function(li){
      var lif = li.cellValuesByFieldId || li.fields || {};
      var gIds = getLinkIds(lif[L.garment]);
      var garmentName = gIds.length && state.garmentNames[gIds[0]] || (li._local ? '(new line item)' : '(garment)');
      var checked = f.applyToLis.indexOf(li.id) !== -1;
      html += '<label class="imp-form-li' + (checked ? ' on' : '') + '">';
      html += '<input type="checkbox"' + (checked ? ' checked' : '') + ' onchange="toggleApplyLi(\'' + li.id + '\')" />';
      html += '<span>' + escHtml(garmentName) + '</span>';
      html += '</label>';
    });
    html += '</div>';
    html += '<div class="imp-form-li-actions">';
    html += '<button class="imp-btn ghost" onclick="selectAllLis()">Select all</button>';
    html += '<button class="imp-btn ghost" onclick="clearAllLis()">Clear</button>';
    html += '</div>';
    html += '</div>';
  }

  // Actions — adapt to context
  html += '<div class="imp-form-actions">';
  if (isEditMode) {
    html += '<button class="imp-btn danger" onclick="deleteGhostImprint()"><i class="ti ti-trash" aria-hidden="true"></i> Delete</button>';
    html += '<div style="flex:1"></div>';
    html += '<button class="imp-btn ghost" onclick="closeImprintForm()">Cancel</button>';
    html += '<button class="imp-btn primary" onclick="saveImprintForm(false)">Save changes</button>';
  } else if (isImprintEmptyMode) {
    // The imprint-first flow: two saves, primary = add another (typical case)
    html += '<button class="imp-btn ghost" onclick="closeImprintForm()">Cancel</button>';
    html += '<div style="flex:1"></div>';
    html += '<button class="imp-btn" onclick="saveImprintForm(false)">Save · move to line items</button>';
    html += '<button class="imp-btn primary" onclick="saveImprintForm(true)">Save &amp; add another</button>';
  } else {
    // Adding from the strip mid-flow
    html += '<button class="imp-btn ghost" onclick="closeImprintForm()">Cancel</button>';
    html += '<div style="flex:1"></div>';
    html += '<button class="imp-btn primary" onclick="saveImprintForm(false)">Add imprint</button>';
  }
  html += '</div>';

  html += '</div>'; // /imp-form
  return html;
}
