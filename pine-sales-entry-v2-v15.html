// NEW REORDER — customer library (v2-v11)
// Browse a customer's past imprints and select designs to reorder. This slice
// is read-only browse + multi-select. Seeding the selected specs into a reorder
// (ghost imprints) lands in the next version. No writes anywhere.
//   Customers (TBL_CUSTOMERS) → customer picker
//   Imprints filtered by Customer Name Search (I.custName) → library grid
// ═══════════════════════════════════════════════════════════════════════════
var reorderCustTimer = null, reorderCustSeq = 0, reorderLibSeq = 0;

function openReorder(){
  state.view = 'reorder';
  state.reorder = { step:'customer', custQuery:'', custResults:[], custLoading:false, custErr:null,
                    customer:null, libLoading:false, libErr:null, imprints:[], selected:{} };
  render();
  setTimeout(function(){ var el = document.getElementById('rlCustInput'); if (el) el.focus(); }, 0);
}
function exitReorder(){ state.view = 'queue'; state.reorder = null; render(); }
function reorderBackToCustomer(){
  if (!state.reorder) return;
  state.reorder.step = 'customer'; state.reorder.imprints = []; state.reorder.selected = {};
  render();
  setTimeout(function(){ var el = document.getElementById('rlCustInput'); if (el) el.focus(); }, 0);
}

// ── Customer picker ──
function onReorderCustSearch(q){
  if (!state.reorder) return;
  state.reorder.custQuery = q;
  if (reorderCustTimer) clearTimeout(reorderCustTimer);
  if (!q || q.trim().length < 2){ state.reorder.custResults = []; state.reorder.custLoading = false; renderReorderCustResults(); return; }
  state.reorder.custLoading = true; renderReorderCustResults();
  reorderCustTimer = setTimeout(function(){ runReorderCustSearch(q); }, 250);
}
function runReorderCustSearch(q){
  var seq = ++reorderCustSeq;
  // Double-quoted formula literal so apostrophes in names don't need escaping; strip " and \.
  var safe = q.trim().replace(/"/g,'').replace(/\\/g,'').toLowerCase();
  var formula = 'FIND("' + safe + '",LOWER({' + CUST_NAME_FIELD + '}))>0';
  var url = 'https://api.airtable.com/v0/' + BASE + '/' + TBL_CUSTOMERS
    + '?fields%5B%5D=' + CUST_NAME_FIELD
    + '&filterByFormula=' + encodeURIComponent(formula)
    + '&returnFieldsByFieldId=true&pageSize=20';
  fetch(url, { headers: hdr() })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(d){
      if (seq !== reorderCustSeq || !state.reorder) return;
      state.reorder.custResults = (d.records || []).slice();
      state.reorder.custLoading = false; state.reorder.custErr = null;
      renderReorderCustResults();
    })
    .catch(function(e){
      if (seq !== reorderCustSeq || !state.reorder) return;
      state.reorder.custLoading = false; state.reorder.custErr = e.message; renderReorderCustResults();
    });
}
function pickReorderCustomer(id){
  if (!state.reorder) return;
  var match = (state.reorder.custResults || []).find(function(c){ return c.id === id; });
  var nm = '';
  if (match){ var f = match.cellValuesByFieldId || match.fields || {}; nm = getStr(f[CUST_NAME_FIELD]) || ''; }
  state.reorder.customer = { id:id, name:nm };
  state.reorder.step = 'library';
  state.reorder.libLoading = true; state.reorder.libErr = null; state.reorder.imprints = []; state.reorder.selected = {};
  render();
  loadReorderLibrary();
}

// ── Library load ──
function loadReorderLibrary(){
  var seq = ++reorderLibSeq;
  var name = (state.reorder.customer && state.reorder.customer.name) || '';
  var safe = name.replace(/"/g,'').replace(/\\/g,'').toLowerCase();
  var formula = 'FIND("' + safe + '",LOWER({' + I.custName + '}))>0';
  var flds = [I.id, I.nick, I.type, I.loc, I.screens, I.inkChanges, I.created, I.proofs, I.custName]
    .map(function(f){ return 'fields%5B%5D=' + f; }).join('&');
  var url = 'https://api.airtable.com/v0/' + BASE + '/' + TBL_IMPRINTS + '?' + flds
    + '&filterByFormula=' + encodeURIComponent(formula)
    + '&sort%5B0%5D%5Bfield%5D=' + I.created + '&sort%5B0%5D%5Bdirection%5D=desc'
    + '&returnFieldsByFieldId=true&pageSize=100';
  fetch(url, { headers: hdr() })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(d){
      if (seq !== reorderLibSeq || !state.reorder) return;
      state.reorder.imprints = (d.records || []);
      state.reorder.libLoading = false; state.reorder.libErr = null;
      render();
    })
    .catch(function(e){
      if (seq !== reorderLibSeq || !state.reorder) return;
      state.reorder.libLoading = false; state.reorder.libErr = e.message; render();
    });
}

// ── Render: dispatch ──
function renderReorder(){
  var canvas = document.getElementById('canvas');
  document.getElementById('topbarFilters').innerHTML = ''; // reorder owns the screen
  var r = state.reorder;
  if (!r){ exitReorder(); return; }
  canvas.innerHTML = (r.step === 'customer') ? renderReorderCustomerPick() : renderReorderLibrary();
}

function renderReorderCustomerPick(){
  var r = state.reorder;
  var h = '<div class="rl-strip">'
    + '<div class="rl-strip-info"><span class="rl-kicker">New reorder</span>'
    + '<span class="rl-cust">Pick a customer</span></div>'
    + '<button class="rl-chip-btn" onclick="exitReorder()">Cancel</button>'
    + '</div>';
  h += '<div class="rl-pick">';
  h += '<div class="rl-pick-title">Whose past work?</div>';
  h += '<div class="rl-pick-sub">Search a customer to see every imprint they\u2019ve printed, then pick the designs to reorder.</div>';
  h += '<input id="rlCustInput" class="rl-pick-input" type="text" placeholder="Search customer name\u2026" value="' + escAttr(r.custQuery) + '" oninput="onReorderCustSearch(this.value)" />';
  h += '<div class="rl-pick-results" id="rlCustResults">' + reorderCustResultsHTML() + '</div>';
  h += '</div>';
  return h;
}
function reorderCustResultsHTML(){
  var r = state.reorder; if (!r) return '';
  if (r.custLoading) return '<div class="rl-pick-status">Searching\u2026</div>';
  if (r.custErr) return '<div class="rl-pick-status" style="color:var(--red)">' + escHtml(r.custErr) + '</div>';
  if (!r.custQuery || r.custQuery.trim().length < 2) return '<div class="rl-pick-status">Type at least 2 letters</div>';
  if (!r.custResults.length) return '<div class="rl-pick-status">No customers match \u201c' + escHtml(r.custQuery) + '\u201d</div>';
  return r.custResults.map(function(c){
    var f = c.cellValuesByFieldId || c.fields || {};
    var nm = getStr(f[CUST_NAME_FIELD]) || '(no name)';
    return '<div class="rl-pick-row" onclick="pickReorderCustomer(\'' + c.id + '\')">' + escHtml(nm) + '</div>';
  }).join('');
}
function renderReorderCustResults(){
  var el = document.getElementById('rlCustResults'); if (el) el.innerHTML = reorderCustResultsHTML();
}

// ── Render: library grid ──
function renderReorderLibrary(){
  var r = state.reorder, cust = (r.customer && r.customer.name) || 'Customer';
  var h = '<div class="rl-strip">'
    + '<button class="rl-chip-btn" onclick="reorderBackToCustomer()">\u2190 Customer</button>'
    + '<div class="rl-strip-info"><span class="rl-kicker">Reorder \u00b7 select past designs to pull in</span>'
    + '<span class="rl-cust" title="' + escAttr(cust) + '">' + escHtml(cust) + '</span></div>'
    + '<button class="rl-chip-btn" onclick="exitReorder()">Cancel</button>'
    + '</div>';
  if (r.libLoading) return h + '<div class="rl-empty" style="padding:60px">Loading ' + escHtml(cust) + '\u2019s imprints\u2026</div>';
  if (r.libErr) return h + '<div class="rl-empty" style="color:var(--red);padding:60px">Couldn\u2019t load imprints \u00b7 ' + escHtml(r.libErr) + '</div>';
  if (!r.imprints.length) return h + '<div class="rl-empty" style="padding:60px">No past imprints found for ' + escHtml(cust) + '.</div>';

  h += '<div class="rl-filters">'
    + '<div class="rl-search"><span style="font-size:12px;color:var(--muted-lt)">\u2315</span>'
    + '<input id="rlSearch" type="text" placeholder="Search nickname or ID\u2026" oninput="filterReorderTiles()" /></div>'
    + '<span class="rl-flbl">Location</span><select class="rl-sel" id="rlLoc" onchange="filterReorderTiles()">' + reorderLocOpts() + '</select>'
    + '<span class="rl-flbl">Type</span><select class="rl-sel" id="rlType" onchange="filterReorderTiles()">'
    +   '<option>All</option><option>Screen Print</option><option>Supacolor</option><option>Embroidery / Patch</option><option>Decopress</option><option>Finishing</option></select>'
    + '<span class="rl-flbl">Last run</span><select class="rl-sel" id="rlDate" onchange="filterReorderTiles()">'
    +   '<option>All time</option><option>Last 90 days</option><option>Last 6 months</option><option>Last year</option></select>'
    + '<span class="rl-fcount" id="rlFcount">' + r.imprints.length + ' imprint' + (r.imprints.length !== 1 ? 's' : '') + ' \u00b7 most recent first</span>'
    + '</div>';
  h += '<div class="rl-grid" id="rlGrid">' + r.imprints.map(reorderTileHTML).join('') + '</div>';
  h += reorderTrayHTML();
  return h;
}
function reorderLocOpts(){
  var locs = {};
  (state.reorder.imprints || []).forEach(function(rec){ var f = rec.cellValuesByFieldId || rec.fields || {}; var l = getSelName(f[I.loc]) || ''; if (l) locs[l] = 1; });
  return ['All'].concat(Object.keys(locs).sort()).map(function(o){ return '<option>' + escHtml(o) + '</option>'; }).join('');
}
function reorderTileHTML(rec){
  var f = rec.cellValuesByFieldId || rec.fields || {};
  var id = getStr(f[I.id]) || '';
  var nick = getStr(f[I.nick]) || '';
  var loc = getSelName(f[I.loc]) || '';
  var type = getSelName(f[I.type]) || '';
  var screens = getNum(f[I.screens]);
  var inkc = getNum(f[I.inkChanges]);
  var created = f[I.created] || '';
  var thumb = rlThumb(f[I.proofs]);
  var name = nick || id || 'Untitled';
  var sel = !!(state.reorder.selected && state.reorder.selected[rec.id]);
  var tags = '<span class="tag n">' + escHtml(loc || '\u2014') + '</span>'
    + (type ? '<span class="tag n">' + escHtml(type.replace(/ - .*/, '')) + '</span>' : '')
    + (screens ? '<span class="tag g">' + screens + ' scr</span>' : '');
  var metaBits = [];
  if (inkc) metaBits.push(inkc + ' ink change' + (inkc !== 1 ? 's' : ''));
  if (created) metaBits.push(rlTimeAgo(created));
  var meta = metaBits.join(' \u00b7 ');
  var thumbHtml = thumb
    ? '<img src="' + escAttr(thumb) + '" alt="proof" onerror="this.replaceWith(Object.assign(document.createElement(\'div\'),{className:\'ph\',textContent:\'\u2317\'}))" />'
    : '<div class="ph">\u2317</div>';
  return '<div class="rl-tile' + (sel ? ' sel' : '') + '" data-id="' + rec.id + '"'
    + ' data-name="' + escAttr((nick + ' ' + id).toLowerCase()) + '"'
    + ' data-loc="' + escAttr(loc) + '" data-type="' + escAttr(type) + '" data-created="' + escAttr(String(created)) + '"'
    + ' onclick="toggleReorderSelect(\'' + rec.id + '\')">'
    + '<div class="rl-thumb">' + thumbHtml + '<div class="rl-badge">\u2713</div></div>'
    + '<div class="rl-tbody"><div class="rl-name" title="' + escAttr(name) + '">' + escHtml(name) + '</div>'
    + (id ? '<div class="rl-id">' + escHtml(id) + '</div>' : '')
    + '<div class="rl-ttags">' + tags + '</div>'
    + (meta ? '<div class="rl-tmeta">' + escHtml(meta) + '</div>' : '')
    + '</div></div>';
}
function rlThumb(p){
  if (!p) return '';
  if (Array.isArray(p)){ var a = p[0]; if (!a) return '';
    return (a.thumbnails && a.thumbnails.large) ? a.thumbnails.large.url : (a.thumbnails && a.thumbnails.small) ? a.thumbnails.small.url : (a.url || ''); }
  if (p.valuesByLinkedRecordId){ var ks = Object.keys(p.valuesByLinkedRecordId); if (!ks.length) return '';
    var at = p.valuesByLinkedRecordId[ks[0]]; if (!at || !at.length) return ''; var x = at[0];
    return (x.thumbnails && x.thumbnails.large) ? x.thumbnails.large.url : (x.thumbnails && x.thumbnails.small) ? x.thumbnails.small.url : (x.url || ''); }
  return '';
}
function rlTimeAgo(iso){
  var t = new Date(iso).getTime(); if (isNaN(t)) return '';
  var d = Math.floor((Date.now() - t) / 86400000);
  if (d < 1) return 'today'; if (d < 7) return d + 'd ago';
  if (d < 60) return Math.floor(d / 7) + 'w ago'; if (d < 365) return Math.floor(d / 30) + 'mo ago';
  return Math.floor(d / 365) + 'y ago';
}

// ── Selection + tray ──
function toggleReorderSelect(id){
  if (!state.reorder) return;
  if (state.reorder.selected[id]) delete state.reorder.selected[id]; else state.reorder.selected[id] = true;
  var tile = document.querySelector('.rl-tile[data-id="' + id + '"]');
  if (tile) tile.classList.toggle('sel', !!state.reorder.selected[id]);
  updateReorderTray();
}
function clearReorderSelect(){
  if (!state.reorder) return;
  state.reorder.selected = {};
  document.querySelectorAll('.rl-tile.sel').forEach(function(t){ t.classList.remove('sel'); });
  updateReorderTray();
}
function reorderSelCount(){ return state.reorder ? Object.keys(state.reorder.selected).length : 0; }
function reorderTrayHTML(){
  var n = reorderSelCount();
  return '<div class="rl-tray"><div style="display:flex;align-items:center;min-width:0">'
    + '<span class="rl-tray-count" id="rlTrayCount">' + (n ? n + ' imprint' + (n !== 1 ? 's' : '') + ' selected' : '0 selected') + '</span>'
    + '<button class="rl-tray-clear" id="rlTrayClear" onclick="clearReorderSelect()" style="' + (n ? '' : 'display:none') + '">Clear</button>'
    + '</div>'
    + '<button class="rl-tray-btn" id="rlTrayBtn" onclick="startReorder()"' + (n ? '' : ' disabled') + '>' + (n ? 'Start reorder with ' + n + ' \u2192' : 'Start reorder \u2192') + '</button>'
    + '</div>';
}
function updateReorderTray(){
  var n = reorderSelCount();
  var c = document.getElementById('rlTrayCount'); if (c) c.textContent = n ? (n + ' imprint' + (n !== 1 ? 's' : '') + ' selected') : '0 selected';
  var cl = document.getElementById('rlTrayClear'); if (cl) cl.style.display = n ? '' : 'none';
  var b = document.getElementById('rlTrayBtn'); if (b){ b.disabled = n === 0; b.textContent = n ? ('Start reorder with ' + n + ' \u2192') : 'Start reorder \u2192'; }
}

// ── Filters (client-side, focus-safe show/hide) ──
function filterReorderTiles(){
  var q = ((document.getElementById('rlSearch') || {}).value || '').trim().toLowerCase();
  var loc = (document.getElementById('rlLoc') || {}).value || 'All';
  var typeCat = (document.getElementById('rlType') || {}).value || 'All';
  var dateWin = (document.getElementById('rlDate') || {}).value || 'All time';
  var cutoff = reorderDateCutoff(dateWin);
  var shown = 0, total = 0;
  document.querySelectorAll('.rl-tile').forEach(function(t){
    total++;
    var hit = true;
    if (q && t.getAttribute('data-name').indexOf(q) === -1) hit = false;
    if (hit && loc !== 'All' && t.getAttribute('data-loc') !== loc) hit = false;
    if (hit && typeCat !== 'All' && !reorderTypeMatch(t.getAttribute('data-type'), typeCat)) hit = false;
    if (hit && cutoff){ var c = Date.parse(t.getAttribute('data-created')); if (isNaN(c) || c < cutoff) hit = false; }
    t.classList.toggle('hide', !hit);
    if (hit) shown++;
  });
  var fc = document.getElementById('rlFcount');
  if (fc){
    var anyFilter = q || loc !== 'All' || typeCat !== 'All' || dateWin !== 'All time';
    fc.textContent = anyFilter ? ('Showing ' + shown + ' of ' + total) : (total + ' imprint' + (total !== 1 ? 's' : '') + ' \u00b7 most recent first');
  }
}
function reorderDateCutoff(win){
  var now = Date.now(), day = 86400000;
  if (win === 'Last 90 days') return now - 90 * day;
  if (win === 'Last 6 months') return now - 182 * day;
  if (win === 'Last year') return now - 365 * day;
  return 0;
}
function reorderTypeMatch(t, cat){
  if (!t) return false; t = String(t);
  switch (cat){
    case 'Screen Print': return ['Discharge','No Base W/B','Bleed Blocker + W/B','EZP Base + W/B','Flatstock'].indexOf(t) !== -1;
    case 'Supacolor': return t.indexOf('Supacolor') === 0;
    case 'Embroidery / Patch': return t === 'Embroidery' || t.indexOf('Patch') !== -1 || t.indexOf('Label') !== -1;
    case 'Decopress': return t.indexOf('Decopress') === 0;
    case 'Finishing': return t.indexOf('Finishing') === 0;
    default: return true;
  }
}

// ── Start reorder — STUB (preview only; seeding ghost imprints is the next slice) ──
function startReorder(){
  if (!state.reorder) return;
  var ids = Object.keys(state.reorder.selected);
  if (!ids.length) return;
  var specs = ids.map(function(id){
    var rec = (state.reorder.imprints || []).find(function(x){ return x.id === id; });
    var f = rec ? (rec.cellValuesByFieldId || rec.fields || {}) : {};
    return { srcId:id, imprintId:getStr(f[I.id]), nick:getStr(f[I.nick]), type:getSelName(f[I.type]),
             loc:getSelName(f[I.loc]), screens:getNum(f[I.screens]), inkChanges:getNum(f[I.inkChanges]) };
  });
  dlog('REORDER (preview): would seed ' + specs.length + ' imprint(s):', JSON.stringify(specs));
  alert('Preview: ' + specs.length + ' design' + (specs.length !== 1 ? 's' : '') + ' selected from '
    + (state.reorder.customer.name || 'this customer') + '.\n\nSeeding these into a reorder is the next step \u2014 nothing has been written.');
}

function escHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function escAttr(s){ return escHtml(s); }

// ── Go ──
boot();
</script>
</body>
