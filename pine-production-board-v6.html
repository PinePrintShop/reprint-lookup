<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pine Central — Production Board v6</title>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
:root{
  --bg:#F2F2EE; --surface:#fff; --bg-soft:#F8F8F5;
  --border:#E5E5E0; --border-dk:#D0D0CA;
  --text:#0D0D0B; --muted:#4A4A44; --muted-lt:#888880;
  --yellow:#E8E832; --green:#1e6b45; --red:#c0392b; --amb:#b7791f;
  --sb-bg:#0A0A08;
  --sans:Helvetica,Arial,sans-serif; --mono:'Courier New',monospace;
  --divider:#D0D0CA;
  --platen:#9A7B2E; --platen-ln:#E0B062;
}
/* Dark theme overrides for the TV */
.pb.dark{
  --bg:#0A0A08; --surface:#141410; --bg-soft:#101010;
  --border:#26261F; --border-dk:#33332A;
  --text:#F2F2EE; --muted:#BBBBB5; --muted-lt:#888880;
  --divider:#2A2A22;
  --platen:#E0B062; --platen-ln:#7A6020;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
.pb{height:100vh;display:flex;flex-direction:column;background:var(--bg)}

/* ── Top bar ── */
.pbtop{flex-shrink:0;display:flex;align-items:center;gap:14px;padding:10px 18px;border-bottom:2px solid var(--text);background:var(--surface)}
.pbtitle{font-weight:700;font-size:26px;letter-spacing:.06em}
.pbdate{font-weight:700;font-size:22px;color:var(--text)}
.pbdate .dow{color:var(--muted-lt);font-size:13px;letter-spacing:.08em;text-transform:uppercase;margin-right:8px;font-weight:700}
.pbnav{display:flex;align-items:center;gap:6px}
.nav-btn{font-size:16px;font-weight:700;width:34px;height:34px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.nav-btn:hover{border-color:var(--text)}
.pb-spacer{flex:1}
.pbctl{font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:7px 13px;border-radius:20px;border:1px solid var(--border-dk);background:var(--surface);color:var(--muted);cursor:pointer;white-space:nowrap}
.pbctl:hover{border-color:var(--text);color:var(--text)}
.pbctl.on{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.pb-asn-tag{font-size:11px;font-weight:700;color:var(--amb);letter-spacing:.04em;text-transform:uppercase}

/* ── Grid ── */
.pbgrid{flex:1;display:grid;min-height:0;overflow:hidden}
.pbcol{border-right:1px solid var(--divider);min-width:0;display:flex;flex-direction:column;overflow:hidden}
.pbcol:last-child{border-right:none}
.pbch{flex-shrink:0;padding:14px 14px;border-bottom:3px solid}
.pbcm{font-weight:700;font-size:22px;letter-spacing:.04em}
.pbops{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;min-height:26px}
.op{font-size:16px;font-weight:700;background:var(--sb-bg);color:var(--yellow);border-radius:4px;padding:6px 12px;letter-spacing:.02em;cursor:pointer}
.op .x{opacity:.5;margin-left:5px}
.op:hover .x{opacity:1}
.op-add{font-size:15px;font-weight:700;color:var(--muted-lt);border:1px dashed var(--border-dk);border-radius:4px;padding:6px 12px;cursor:pointer}
.op-add:hover{border-color:var(--text);color:var(--text)}

.pbrows{flex:1;overflow-y:auto;padding:6px 6px 12px}
.jr{display:grid;grid-template-columns:28px 1fr 42px 26px auto;gap:10px;align-items:center;padding:11px 8px;position:relative;cursor:pointer}
.jr:hover{background:var(--bg-soft)}
.jr.done .st,.jr.done .iid,.jr.done .lc,.jr.done .nc,.jr.done .qt{color:var(--muted-lt)}
.jr.done::after{content:"";position:absolute;left:6px;right:8px;top:50%;height:3px;background:var(--text);border-radius:2px;pointer-events:none}
.jr+.jr{border-top:1px solid var(--bg-soft)}
.jr .st{font-size:24px;text-align:center;line-height:1}
.jr .iid{font-family:var(--mono);font-weight:700;font-size:28px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.jr .lc{font-size:18px;font-weight:700;color:var(--muted);text-align:center}
.jr .nc{font-family:var(--mono);font-size:18px;color:var(--muted);text-align:center}
.jr .qt{font-family:var(--mono);font-weight:700;font-size:24px;text-align:right;min-width:56px}
.pdiv{display:flex;align-items:center;gap:9px;padding:8px 6px}
.pdiv .ln{flex:1;height:2px;background:var(--platen-ln)}
.pdiv .tx{font-size:14px;font-weight:700;color:var(--platen);letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}
.col-empty{padding:22px 12px;color:var(--muted-lt);font-size:16px;font-style:italic}

/* ── Legend ── */
.pbleg{flex-shrink:0;display:flex;gap:26px;align-items:center;padding:12px 20px;border-top:1px solid var(--divider);background:var(--bg-soft)}
.lg{font-size:16px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:7px}
.lgln{display:inline-block;width:18px;height:2px;background:var(--platen-ln)}
.pb-upd{margin-left:16px;font-size:12px;color:var(--muted-lt);font-weight:700}
.pb-shop{margin-left:auto;font-size:15px;font-weight:700;color:var(--text)}
.pbstats{flex-shrink:0;display:grid;border-top:2px solid var(--text);background:var(--surface)}
.ps-cell{border-right:1px solid var(--divider);padding:10px 14px;min-width:0}
.ps-cell:last-child{border-right:none}
.ps-top{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.ps-lbl{font-weight:700;font-size:14px;letter-spacing:.04em}
.ps-pct{font-family:var(--mono);font-weight:700;font-size:17px}
.ps-bar{height:11px;border-radius:6px;background:var(--bg-soft);border:1px solid var(--border);overflow:hidden;margin:7px 0 5px}
.ps-fill{height:100%;border-radius:6px 0 0 6px;transition:width .5s ease}
.ps-sub{font-family:var(--mono);font-size:13px;color:var(--muted)}
.ps-stretch{font-size:12px;font-weight:700;color:var(--muted-lt);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ps-stretch.hot{color:var(--green)}
.ps-empty{color:var(--muted-lt);font-size:13px;font-style:italic;padding-top:6px}

/* ── Modal (assign / roster / token) ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50}
.ov.on{display:flex}
.modal{background:var(--surface);color:var(--text);border-radius:10px;border:1px solid var(--border-dk);width:min(440px,92vw);max-height:86vh;overflow:auto;padding:18px 20px}
.modal h3{font-size:15px;font-weight:700;letter-spacing:.02em;margin-bottom:3px}
.modal .sub{font-size:12px;color:var(--muted-lt);margin-bottom:14px}
.chipwrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.pick{font-size:14px;font-weight:700;padding:7px 12px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer}
.pick.sel{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.pick.sel::after{content:' ✓'}
.pick .rm{color:var(--red);margin-left:7px;font-weight:700;opacity:.6}
.pick .rm:hover{opacity:1}
.addrow{display:flex;gap:8px;margin:10px 0 4px}
.addrow input{flex:1;font-size:14px;padding:8px 10px;border:1px solid var(--border-dk);border-radius:6px;background:var(--surface);color:var(--text);font-family:var(--sans)}
.btn{font-size:13px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;padding:8px 14px;border-radius:6px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer}
.btn:hover{border-color:var(--text)}
.btn.primary{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
.modal-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:10px}
.hint{font-size:11px;color:var(--muted-lt)}
.loader{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--sb-bg);color:var(--yellow);font-size:12px;font-weight:700;padding:6px 14px;border-radius:20px;z-index:60;display:none}
.loader.on{display:block}
.verbadge{font-size:10px;color:var(--muted-lt);font-weight:700;font-family:var(--mono)}
.draw-canvas{position:fixed;inset:0;z-index:40;pointer-events:none;touch-action:none}
.draw-canvas.on{pointer-events:auto;cursor:crosshair}
.draw-tools{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:45;display:none;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border-dk);border-radius:30px;padding:9px 16px;box-shadow:0 6px 24px rgba(0,0,0,.25)}
.draw-tools.on{display:flex}
.dt-sw{width:26px;height:26px;border-radius:50%;border:2px solid var(--border-dk);cursor:pointer;padding:0}
.dt-sw.sel{border-color:var(--text);transform:scale(1.14)}
.dt-sep{width:1px;height:26px;background:var(--border)}
.dt-size{width:34px;height:34px;border-radius:50%;border:1px solid var(--border-dk);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.dt-size.sel{border-color:var(--text)}
.dt-size i{background:var(--text);border-radius:50%;display:block}
.dt-btn{font-size:14px;font-weight:700;padding:8px 13px;border-radius:20px;border:1px solid var(--border-dk);background:var(--surface);color:var(--text);cursor:pointer;white-space:nowrap}
.dt-btn:hover{border-color:var(--text)}
.dt-btn.sel{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
</style>
</head>
<body>
<div class="pb" id="pb">
  <div class="pbtop">
    <span class="pbtitle">PRODUCTION</span>
    <span class="pbdate"><span class="dow" id="dow">WED</span><span id="dnum">June 17</span></span>
    <div class="pbnav">
      <button class="nav-btn" id="prevDay" title="Previous day">‹</button>
      <button class="pbctl" id="todayBtn">Today</button>
      <button class="nav-btn" id="nextDay" title="Next day">›</button>
    </div>
    <span class="pb-asn-tag" id="asnTag"></span>
    <span class="pb-spacer"></span>
    <span class="verbadge" id="verBadge">Board v6</span>
    <button class="pbctl" id="rosterBtn">Roster</button>
    <button class="pbctl" id="drawBtn">✏️ Draw</button>
    <button class="pbctl" id="themeBtn">Dark</button>
    <button class="pbctl" id="fsBtn">Full screen</button>
    <button class="pbctl" id="refreshBtn">↻</button>
  </div>

  <div class="pbgrid" id="grid"></div>

  <div class="pbstats" id="stats"></div>

  <div class="pbleg">
    <span class="lg">👍 ready</span>
    <span class="lg">🎀 bandana</span>
    <span class="lg"><span class="lgln"></span> platen change</span>
    <span class="pb-shop" id="shopTot"></span>
    <span class="pb-upd" id="updStamp"></span>
  </div>
</div>

<canvas id="drawCanvas" class="draw-canvas"></canvas>
<div class="draw-tools" id="drawTools">
  <span class="dt-sw sel" data-color="#c0392b" style="background:#c0392b" title="Red"></span>
  <span class="dt-sw" data-color="#1565A0" style="background:#1565A0" title="Blue"></span>
  <span class="dt-sw" data-color="#1e6b45" style="background:#1e6b45" title="Green"></span>
  <span class="dt-sw" data-color="#6B2FB5" style="background:#6B2FB5" title="Purple"></span>
  <span class="dt-sw" data-color="#E8E832" style="background:#E8E832" title="Yellow"></span>
  <span class="dt-sw" data-color="#0D0D0B" style="background:#0D0D0B" title="Black"></span>
  <span class="dt-sw" data-color="#F2F2EE" style="background:#F2F2EE;border-color:#999" title="White"></span>
  <span class="dt-sep"></span>
  <button class="dt-size" data-size="4" title="Thin"><i style="width:5px;height:5px"></i></button>
  <button class="dt-size sel" data-size="9" title="Medium"><i style="width:10px;height:10px"></i></button>
  <button class="dt-size" data-size="18" title="Thick"><i style="width:16px;height:16px"></i></button>
  <span class="dt-sep"></span>
  <button class="dt-btn" id="dtErase">⌫ Eraser</button>
  <button class="dt-btn" id="dtClear">🗑 Clear</button>
  <span class="dt-sep"></span>
  <button class="dt-btn" id="dtDone">Done</button>
</div>

<div class="loader" id="loader">Loading…</div>
<div class="ov" id="ov"><div class="modal" id="modal"></div></div>

<script>
// ══════════════════════════════════════════════════
// CONFIG / DATA LAYER  (lifted from pine-scheduler — identical plumbing)
// ══════════════════════════════════════════════════
const BASE  = 'appJkaLk8DykjsgHR';
const TABLE = 'tbln9oAGvz2PNBZLV';
const F = {
  screens:  'fld8rgkIj1RPO97QU',
  press:    'fldv59OGU7EkBVofo',
  qty:      'fldFipR4ddfqMPeAX',   // Active Impressions
  start:    'fldfqtIgcEfIlIeQk',   // Scheduled Start Time
  ink:      'fldjNCuaGOkWgzH2K',
  client:   'fldeLMIAC0ABQAjYJ',
  loc:      'fldKQIL0rSJBSeC8S',
  garment:  'fldyyFoiKCgGOpsGX',
  imprintId:'fldHjjQ5lzm66ox5j',
  ready:    'fldzVhAgy4FnzQX2a',
};
const FIELDS = [F.screens,F.press,F.qty,F.start,F.ink,F.client,F.loc,F.garment,F.imprintId,F.ready];
const FP = FIELDS.map(f=>'fields[]='+f).join('&');
const BASE_URL = `https://api.airtable.com/v0/${BASE}/${TABLE}?${FP}&returnFieldsByFieldId=true&pageSize=100`;

// Board columns — each maps to one or more Equipment values.
const COLS = [
  {key:'p1',  label:'PRESS 1',    tint:'#C9C5F0', bar:'#4038B0', match:['Press 1 - ROQ NEXT']},
  {key:'p2',  label:'PRESS 2',    tint:'#B3D5EE', bar:'#1565A0', match:['Press 2 - ROQ YOU']},
  {key:'emb', label:'EMBROIDERY', tint:'#DCC6F4', bar:'#6B2FB5', match:['Embroidery - TAJIMA 6-Head'], contains:['embroider','tajima']},
  {key:'heat',label:'HEAT PRESS', tint:'#B6DEE5', bar:'#0E7C8C', match:['Heat press - D3','Heat press - Tag Press','Heat press - Hat Press'], contains:['heat press']},
  {key:'flat',label:'FLATSTOCK',  tint:'#EFE2C2', bar:'#8A6D1E', match:['Flatstock - M&R Saturn'], contains:['flatstock','saturn']},
];
function colOf(pressName){
  if(!pressName) return null;
  for(const c of COLS){ if(c.match.includes(pressName)) return c; }
  const p = pressName.toLowerCase();
  for(const c of COLS){ if((c.contains||[]).some(s=>p.includes(s))) return c; }
  return null;
}

const LOC_ABBR = {
  'back':'Bk','front':'F','left chest':'LC','right chest':'RC','left sleeve':'LS','right sleeve':'RS',
  'back hem':'BH','front hem':'FH','size tag':'Tag','pocket':'Pkt','hood':'Hd','bandana':'Bn',
  'tea towel':'TT','flatstock':'Pos','multiple locations':'Mult'
};
function abbrLoc(loc){
  if(!loc) return '';
  const k = loc.toLowerCase().trim();
  if(LOC_ABBR[k]) return LOC_ABBR[k];
  return loc.length<=4 ? loc : loc.slice(0,3);
}

// ── default roster (editable in-app) ──
const DEFAULT_ROSTER = ['TJ','Gabe','Erik','Dawson','Dylan','Kyle','Whitney','Hannah','Juan','Garrett','Chris','Austin'];

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let target = new Date();           // the day being viewed
let dayJobs = {};                  // { colKey: [job,...] }
let stretchJobs = {};              // { colKey: [job,...] } — tomorrow's READY jobs, candidate stretch work
let pickerCol = null;              // col key being assigned in the modal

const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOWS=['SUN','MON','TUE','WED','THU','FRI','SAT'];

// Local-day string (floor time, not UTC) — board groups by the local print date.
function localDateStr(d){ const x=new Date(d); const off=x.getTimezoneOffset(); return new Date(x.getTime()-off*60000).toISOString().slice(0,10); }
function todayLocal(){ return localDateStr(new Date()); }

function dbg(){ try{ console.log.apply(console, arguments);}catch(e){} }
function setLoader(t){ const l=document.getElementById('loader'); if(t){l.textContent=t;l.classList.add('on');} else l.classList.remove('on'); }

// ── token ──
// storage that never throws — board stays usable even where localStorage is blocked (sandboxes, locked-down browsers)
function lsGet(k){ try{ return window.localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){} }

function bootToken(){
  window.AT_KEY = lsGet('pine_at_key') || '';
  return !!window.AT_KEY;
}

// ── localStorage: roster + assignments ──
function getRoster(){
  try{ const r=JSON.parse(lsGet('pine_pb_roster')); if(Array.isArray(r)&&r.length) return r; }catch(e){}
  return DEFAULT_ROSTER.slice();
}
function saveRoster(arr){ lsSet('pine_pb_roster', JSON.stringify(arr)); }
function getAssignAll(){ try{ return JSON.parse(lsGet('pine_pb_assign'))||{}; }catch(e){ return {}; } }
function getAssign(ds, colKey){ const all=getAssignAll(); return (all[ds]&&all[ds][colKey])||[]; }
// ── done / crossed-off marks (per day, by imprint record id) ──
function getDoneAll(){ try{ return JSON.parse(lsGet('pine_pb_done'))||{}; }catch(e){ return {}; } }
function getDone(ds){ return getDoneAll()[ds]||[]; }
function toggleDone(ds, id){ const all=getDoneAll(); const arr=all[ds]||[]; const i=arr.indexOf(id); if(i>=0) arr.splice(i,1); else arr.push(id); all[ds]=arr; lsSet('pine_pb_done', JSON.stringify(all)); }
// ── impression snapshot: remember the highest impression count seen per imprint per day,
//    so the day's total stays stable even if Active Impressions counts down as jobs finish ──
function getImpSnapAll(){ try{ return JSON.parse(lsGet('pine_pb_imp'))||{}; }catch(e){ return {}; } }
function applyImpSnapshot(ds, jobs){
  const all=getImpSnapAll(); const day=all[ds]||{};
  jobs.forEach(j=>{ const v=Math.max(j.qty||0, day[j.id]||0); day[j.id]=v; j.impr=v; });
  all[ds]=day; lsSet('pine_pb_imp', JSON.stringify(all));
}
function setAssign(ds, colKey, names){
  const all=getAssignAll(); all[ds]=all[ds]||{}; all[ds][colKey]=names;
  lsSet('pine_pb_assign', JSON.stringify(all));
}

// ══════════════════════════════════════════════════
// FETCH
// ══════════════════════════════════════════════════
async function atFetch(url){
  let records=[], offset='';
  while(true){
    const res = await fetch(url+(offset?'&offset='+encodeURIComponent(offset):''), {headers:{'Authorization':'Bearer '+window.AT_KEY}});
    if(!res.ok){ const t=await res.text(); throw new Error('Airtable '+res.status+': '+t.slice(0,150)); }
    const data = await res.json();
    records = records.concat(data.records||[]);
    if(data.offset){ offset=data.offset; setLoader('Loading… ('+records.length+')'); } else break;
  }
  return records;
}
function getLookupStr(val){
  if(!val) return '';
  if(typeof val==='string') return val;
  if(val.valuesByLinkedRecordId){ const v=Object.values(val.valuesByLinkedRecordId).flat()[0]; return v?(typeof v==='object'?v.name||'':String(v)):''; }
  if(Array.isArray(val)){ const v=val[0]; return v?(typeof v==='object'?v.name||'':String(v)):''; }
  if(typeof val==='object') return val.name||'';
  return '';
}
function palletOf(loc, ink){
  if(!loc) return 'tee';
  const l=loc.toLowerCase(), i=(ink||'').toLowerCase();
  if(l.includes('bandana')||l.includes('tea towel')) return 'bandana';
  if(l.includes('tote')||l.includes('bag')||l.includes('flatstock')||l.includes('poster')) return 'tote';
  if(l.includes('hood')) return 'hoodie';
  if(l.includes('sleeve')) return 'sleeve';
  if(i.includes('headwear')||i.includes('supacolor - hat')||i.includes('1c headwear')) return 'hat';
  return 'tee';
}
function parseRecord(r){
  const f=r.fields||r.cellValuesByFieldId||{};
  const pressVal=f[F.press], locVal=f[F.loc], inkVal=f[F.ink];
  return {
    id:r.id,
    imprintId: f[F.imprintId]||'',
    screens: typeof f[F.screens]==='number'?f[F.screens]:0,
    qty: typeof f[F.qty]==='number'?f[F.qty]:0,
    client: f[F.client]||'',
    garment: f[F.garment]||'',
    loc: locVal?.name||(typeof locVal==='string'?locVal:''),
    ink: inkVal?.name||(typeof inkVal==='string'?inkVal:''),
    pressName: pressVal?.name||(typeof pressVal==='string'?pressVal:null),
    startISO: f[F.start]||null,
    ready: typeof f[F.ready]==='string'?f[F.ready]:'',
  };
}

async function loadDay(){
  if(!window.AT_KEY){ promptToken(); return; }
  const ds = localDateStr(target);
  setLoader('Loading…');
  // window: target-1 .. target+2 (UTC bounds), then filter to local print date client-side
  const lo=new Date(target); lo.setDate(lo.getDate()-1);
  const hi=new Date(target); hi.setDate(hi.getDate()+2);
  const loISO=lo.toISOString().slice(0,10), hiISO=hi.toISOString().slice(0,10);
  const formula = encodeURIComponent(`AND({${F.press}}!="",IS_AFTER({${F.start}},"${loISO}"),IS_BEFORE({${F.start}},"${hiISO}"))`);
  let recs=[];
  try{ recs = await atFetch(BASE_URL+'&filterByFormula='+formula); }
  catch(e){ setLoader(''); alert('Could not load schedule:\n'+e.message); return; }
  setLoader('');

  const tomo=new Date(target); tomo.setDate(tomo.getDate()+1);
  const tomoStr=localDateStr(tomo);
  const parsed = recs.map(parseRecord);

  const groups={}; COLS.forEach(c=>groups[c.key]=[]);
  parsed
    .filter(j=> j.startISO && localDateStr(new Date(j.startISO))===ds)
    .forEach(j=>{ const c=colOf(j.pressName); if(c) groups[c.key].push(j); });
  // order each column by scheduled start time
  Object.keys(groups).forEach(k=> groups[k].sort((a,b)=> new Date(a.startISO)-new Date(b.startISO)));
  const flat=[]; Object.keys(groups).forEach(k=>groups[k].forEach(j=>flat.push(j)));
  applyImpSnapshot(ds, flat);

  // Stretch candidates = tomorrow's READY (👍) jobs per press, biggest first.
  // If a team blows through today, these are the ready-to-pull jobs they can grab for bonus.
  const stretch={}; COLS.forEach(c=>stretch[c.key]=[]);
  parsed
    .filter(j=> j.startISO && localDateStr(new Date(j.startISO))===tomoStr && (j.ready||'').includes('👍'))
    .forEach(j=>{ const c=colOf(j.pressName); if(c) stretch[c.key].push(j); });
  Object.keys(stretch).forEach(k=> stretch[k].sort((a,b)=> (b.qty||0)-(a.qty||0)));
  stretchJobs = stretch;

  dayJobs = groups;
  render();
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render(){
  const ds = localDateStr(target);
  document.getElementById('dow').textContent = DOWS[target.getDay()];
  document.getElementById('dnum').textContent = MONTHS[target.getMonth()]+' '+target.getDate();
  const isToday = ds===todayLocal();
  document.getElementById('asnTag').textContent = isToday ? '' : '◀ assigning '+(ds>todayLocal()?'ahead':'past');

  const grid = document.getElementById('grid');
  grid.style.gridTemplateColumns = 'repeat('+COLS.length+',1fr)';
  const dark = document.getElementById('pb').classList.contains('dark');
  const doneSet = getDone(ds);

  grid.innerHTML = COLS.map(c=>{
    const jobs = dayJobs[c.key]||[];
    const hdrBg = dark ? c.bar : c.tint;
    const hdrTx = dark ? '#fff' : '#0D0D0B';
    const ops = getAssign(ds, c.key);
    const opHtml = ops.map(n=>`<span class="op" data-col="${c.key}" data-name="${esc(n)}" title="Remove ${esc(n)}">${esc(n)}<span class="x">×</span></span>`).join('')
      + (ops.length<3 ? `<span class="op-add" data-col="${c.key}">+ add</span>` : '');

    let rows='';
    if(!jobs.length){ rows = `<div class="col-empty">— nothing scheduled —</div>`; }
    else {
      let prevPal=null;
      jobs.forEach(j=>{
        const pal = palletOf(j.loc, j.ink);
        if(prevPal && prevPal!==pal){ rows += `<div class="pdiv"><span class="tx">platen</span><span class="ln"></span></div>`; }
        prevPal = pal;
        const ready = (j.ready||'').includes('👍');
        const band  = pal==='bandana';
        const st = band ? '🎀' : (ready ? '👍' : '');
        const nc = j.screens>0 ? j.screens : '—';
        const qt = j.qty>0 ? j.qty : '—';
        const dn = doneSet.includes(j.id) ? ' done' : '';
        rows += `<div class="jr${dn}" data-id="${j.id}">`
          + `<span class="st">${st}</span>`
          + `<span class="iid" style="color:${hdrTx==='#fff'&&dark?'var(--text)':'var(--text)'}">${esc(j.imprintId||'—')}</span>`
          + `<span class="lc">${esc(abbrLoc(j.loc))}</span>`
          + `<span class="nc">${nc}</span>`
          + `<span class="qt">${qt}</span>`
          + `</div>`;
      });
    }
    return `<div class="pbcol">`
      + `<div class="pbch" style="background:${hdrBg};border-color:${c.bar}">`
      +   `<div class="pbcm" style="color:${hdrTx}">${c.label}</div>`
      +   `<div class="pbops">${opHtml}</div>`
      + `</div>`
      + `<div class="pbrows">${rows}</div>`
      + `</div>`;
  }).join('');

  // wire operator clicks
  grid.querySelectorAll('.op-add').forEach(b=> b.onclick=()=> openAssign(b.dataset.col));
  grid.querySelectorAll('.op').forEach(b=> b.onclick=()=>{
    const names = getAssign(ds, b.dataset.col).filter(n=>n!==b.dataset.name);
    setAssign(ds, b.dataset.col, names); render();
  });
  // tap a job to cross it off (and tap again to undo) — line persists for the day
  grid.querySelectorAll('.jr').forEach(r=> r.onclick=()=>{
    r.classList.toggle('done');               // visual first — always works
    try{ toggleDone(ds, r.dataset.id); }catch(e){}   // persist if storage is available
  });

  // ── per-press impressions stats (on every machine running today) ──
  const stats = document.getElementById('stats');
  stats.style.gridTemplateColumns = 'repeat('+COLS.length+',1fr)';
  let shopTot=0, shopDone=0;
  stats.innerHTML = COLS.map(c=>{
    const jobs = dayJobs[c.key]||[];
    if(!jobs.length) return `<div class="ps-cell"><div class="ps-top"><span class="ps-lbl">${c.label}</span></div><div class="ps-empty">— idle —</div></div>`;
    let tot=0, done=0;
    jobs.forEach(j=>{ const v=j.impr||0; tot+=v; if(doneSet.includes(j.id)) done+=v; });
    shopTot+=tot; shopDone+=done;
    const pct = tot ? Math.round(done/tot*100) : 0;
    const str = stretchJobs[c.key]||[];
    const strTot = str.reduce((s,j)=>s+(j.qty||0),0);
    const strList = str.slice(0,3).map(j=>'#'+esc(j.imprintId||'—')).join(' · ');
    const ahead = tot>0 && done>=tot;   // finished today's baseline → stretch unlocked
    const stretchLine = str.length
      ? `<div class="ps-stretch${ahead?' hot':''}">${ahead?'🎯 Stretch — pull ':'↗ Stretch ready: +'+strTot.toLocaleString()+' impr · '}${strList}</div>`
      : '';
    return `<div class="ps-cell">`
      + `<div class="ps-top"><span class="ps-lbl">${c.label}</span><span class="ps-pct">${pct}%</span></div>`
      + `<div class="ps-bar"><div class="ps-fill" style="width:${pct}%;background:${c.bar}"></div></div>`
      + `<div class="ps-sub">${done.toLocaleString()} / ${tot.toLocaleString()} impr</div>`
      + stretchLine
      + `</div>`;
  }).join('');
  const shopPct = shopTot ? Math.round(shopDone/shopTot*100) : 0;
  const shopEl = document.getElementById('shopTot');
  if(shopEl) shopEl.textContent = shopTot ? `Shop today: ${shopDone.toLocaleString()} / ${shopTot.toLocaleString()} impr · ${shopPct}%` : '';

  const now=new Date();
  document.getElementById('updStamp').textContent = 'updated '+now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'});
}
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

// ══════════════════════════════════════════════════
// MODALS — assign + roster + token
// ══════════════════════════════════════════════════
function showModal(html){ document.getElementById('modal').innerHTML=html; document.getElementById('ov').classList.add('on'); }
function hideModal(){ document.getElementById('ov').classList.remove('on'); }
document.getElementById('ov').addEventListener('click', e=>{ if(e.target.id==='ov') hideModal(); });

function openAssign(colKey){
  pickerCol = colKey;
  const ds = localDateStr(target);
  const col = COLS.find(c=>c.key===colKey);
  const sel = getAssign(ds, colKey);
  const roster = getRoster();
  const chips = roster.map(n=>`<span class="pick ${sel.includes(n)?'sel':''}" data-name="${esc(n)}">${esc(n)}</span>`).join('');
  showModal(
    `<h3>Assign crew — ${col.label}</h3>`
    + `<div class="sub">${DOWS[target.getDay()]} ${MONTHS[target.getMonth()]} ${target.getDate()} · up to 3 people</div>`
    + `<div class="chipwrap" id="pickWrap">${chips}</div>`
    + `<div class="modal-foot"><span class="hint">Tap names to toggle. Edit the roster from the Roster button.</span>`
    + `<button class="btn primary" id="doneBtn">Done</button></div>`
  );
  document.getElementById('modal').querySelectorAll('.pick').forEach(p=> p.onclick=()=>{
    let cur = getAssign(ds, colKey).slice();
    const name = p.dataset.name;
    if(cur.includes(name)) cur = cur.filter(n=>n!==name);
    else { if(cur.length>=3){ p.animate([{transform:'translateX(0)'},{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:180}); return; } cur.push(name); }
    setAssign(ds, colKey, cur);
    p.classList.toggle('sel');
  });
  document.getElementById('doneBtn').onclick=()=>{ hideModal(); render(); };
}

function openRoster(){
  const roster = getRoster();
  const chips = roster.map(n=>`<span class="pick" data-name="${esc(n)}">${esc(n)}<span class="rm" data-rm="${esc(n)}">×</span></span>`).join('');
  showModal(
    `<h3>Operator roster</h3>`
    + `<div class="sub">Everyone available to assign. Add or remove as the crew changes.</div>`
    + `<div class="chipwrap" id="rosterWrap">${chips}</div>`
    + `<div class="addrow"><input id="newOp" placeholder="Add a name…" maxlength="24"><button class="btn" id="addOp">Add</button></div>`
    + `<div class="modal-foot"><span class="hint">Removing a name here doesn't clear days already assigned.</span>`
    + `<button class="btn primary" id="rosterDone">Done</button></div>`
  );
  const wrap=document.getElementById('rosterWrap');
  wrap.querySelectorAll('.rm').forEach(x=> x.onclick=(e)=>{
    e.stopPropagation();
    saveRoster(getRoster().filter(n=>n!==x.dataset.rm));
    openRoster();
  });
  const addFn=()=>{
    const v=document.getElementById('newOp').value.trim();
    if(!v) return;
    const r=getRoster(); if(!r.includes(v)){ r.push(v); saveRoster(r); }
    openRoster();
  };
  document.getElementById('addOp').onclick=addFn;
  document.getElementById('newOp').addEventListener('keydown', e=>{ if(e.key==='Enter') addFn(); });
  document.getElementById('rosterDone').onclick=()=>{ hideModal(); render(); };
}

function promptToken(){
  showModal(
    `<h3>Connect to Airtable</h3>`
    + `<div class="sub">Paste your Pine Airtable token. Stored on this device only.</div>`
    + `<div class="addrow"><input id="tokIn" placeholder="pat… token" type="password"></div>`
    + `<div class="modal-foot"><span class="hint">Same token used across Pine Central apps.</span>`
    + `<button class="btn primary" id="tokSave">Save</button></div>`
  );
  document.getElementById('tokSave').onclick=()=>{
    const v=document.getElementById('tokIn').value.trim();
    if(!v) return;
    lsSet('pine_at_key', v); window.AT_KEY=v; hideModal(); loadDay();
  };
}

// ══════════════════════════════════════════════════
// CONTROLS
// ══════════════════════════════════════════════════
function shiftDay(n){ target.setDate(target.getDate()+n); loadDay(); }
document.getElementById('prevDay').onclick=()=>shiftDay(-1);
document.getElementById('nextDay').onclick=()=>shiftDay(1);
document.getElementById('todayBtn').onclick=()=>{ target=new Date(); loadDay(); };
document.getElementById('refreshBtn').onclick=()=>loadDay();
document.getElementById('rosterBtn').onclick=openRoster;
document.getElementById('themeBtn').onclick=()=>{
  const pb=document.getElementById('pb'); const dark=pb.classList.toggle('dark');
  document.getElementById('themeBtn').textContent = dark?'Light':'Dark';
  lsSet('pine_pb_theme', dark?'dark':'light');
  render();
};
document.getElementById('fsBtn').onclick=()=>{
  const el=document.documentElement;
  if(!document.fullscreenElement){ (el.requestFullscreen||el.webkitRequestFullscreen||function(){}).call(el); }
  else { (document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document); }
};

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
function init(){
  if(lsGet('pine_pb_theme')==='dark'){ document.getElementById('pb').classList.add('dark'); document.getElementById('themeBtn').textContent='Light'; }
  if(!bootToken()){ promptToken(); }
  else { loadDay(); }
  // auto-refresh data every 60s (assignments are local, preserved)
  setInterval(()=>{ if(window.AT_KEY && !document.getElementById('ov').classList.contains('on')) loadDay(); }, 60000);
}
// ══════════════════════════════════════════════════
// DRAWING OVERLAY  (client-side scribble layer — no data involved)
// ══════════════════════════════════════════════════
const dcanvas = document.getElementById('drawCanvas');
const dctx = dcanvas.getContext('2d');
let drawMode=false, isDrawing=false, penColor='#c0392b', penSize=9, eraser=false, lastX=0, lastY=0;

function hexA(hex,a){ const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; }
function fitCanvas(){
  let data=null;
  try{ if(dcanvas.width) data=dcanvas.toDataURL(); }catch(e){}
  const dpr=window.devicePixelRatio||1;
  dcanvas.width=Math.round(window.innerWidth*dpr);
  dcanvas.height=Math.round(window.innerHeight*dpr);
  dcanvas.style.width=window.innerWidth+'px';
  dcanvas.style.height=window.innerHeight+'px';
  dctx.setTransform(dpr,0,0,dpr,0,0);
  dctx.lineCap='round'; dctx.lineJoin='round';
  if(data){ const img=new Image(); img.onload=()=>dctx.drawImage(img,0,0,window.innerWidth,window.innerHeight); img.src=data; }
}
function setDrawMode(on){
  drawMode=on;
  dcanvas.classList.toggle('on',on);
  document.getElementById('drawTools').classList.toggle('on',on);
  document.getElementById('drawBtn').classList.toggle('on',on);
}
function applyStroke(){
  if(eraser){ dctx.globalCompositeOperation='destination-out'; dctx.lineWidth=penSize*2.6; return; }
  dctx.globalCompositeOperation='source-over';
  dctx.lineWidth = penSize;
  dctx.strokeStyle = penColor;
}
function ptPos(e){ const r=dcanvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

dcanvas.addEventListener('pointerdown', e=>{
  if(!drawMode) return;
  isDrawing=true; [lastX,lastY]=ptPos(e); applyStroke();
  dctx.beginPath(); dctx.moveTo(lastX,lastY); dctx.lineTo(lastX+0.01,lastY+0.01); dctx.stroke();
  try{ dcanvas.setPointerCapture(e.pointerId); }catch(_){}
});
dcanvas.addEventListener('pointermove', e=>{
  if(!drawMode||!isDrawing) return;
  const [x,y]=ptPos(e); applyStroke();
  dctx.beginPath(); dctx.moveTo(lastX,lastY); dctx.lineTo(x,y); dctx.stroke();
  lastX=x; lastY=y;
});
dcanvas.addEventListener('pointerup',   ()=>{ isDrawing=false; });
dcanvas.addEventListener('pointercancel',()=>{ isDrawing=false; });

document.getElementById('drawBtn').onclick = ()=> setDrawMode(!drawMode);
document.getElementById('dtDone').onclick  = ()=> setDrawMode(false);
document.getElementById('dtClear').onclick = ()=> dctx.clearRect(0,0,window.innerWidth,window.innerHeight);
document.getElementById('dtErase').onclick = function(){ eraser=!eraser; this.classList.toggle('sel',eraser); };
document.querySelectorAll('.dt-sw').forEach(sw=> sw.onclick=function(){
  penColor=this.dataset.color; eraser=false; document.getElementById('dtErase').classList.remove('sel');
  document.querySelectorAll('.dt-sw').forEach(s=>s.classList.remove('sel')); this.classList.add('sel');
});
document.querySelectorAll('.dt-size').forEach(b=> b.onclick=function(){
  penSize=+this.dataset.size;
  document.querySelectorAll('.dt-size').forEach(s=>s.classList.remove('sel')); this.classList.add('sel');
});
window.addEventListener('resize', fitCanvas);
fitCanvas();

init();
</script>
