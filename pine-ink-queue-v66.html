<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pine Ink Queue v66</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="pine-design-v1.css">
<style>
/* App-specific styles only - buttons/forms now handled by design system */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}

/* Content area */
.content{padding:14px 16px;max-width:none}

/* Add bottom border to stats bar like purchasing toolbar */
.stats-bar{display:flex;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);padding:10px 16px;gap:6px;scrollbar-width:none;flex-shrink:0;-webkit-overflow-scrolling:touch}
.stats-bar::-webkit-scrollbar{display:none}

/* Date header */
.date-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.12em;font-family:var(--cond);padding:14px 0 4px;display:flex;align-items:center;justify-content:space-between}
.date-hdr:first-child{padding-top:0}
.date-hdr.today{color:var(--text)}
.date-hdr-right{font-weight:400;color:var(--muted-lt)}

/* Order header */
.order-hdr{font-size:9px;font-weight:700;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.1em;padding:10px 0 3px;font-family:var(--cond)}

/* Status */
.status{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.status.pending{color:var(--muted-lt)}
.status.done{color:#fff;background:var(--green);padding:2px 6px;border-radius:2px}

/* Ready toggle button */
.ready-btn{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:4px 10px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .12s;white-space:nowrap}
.ready-btn:hover{border-color:var(--green);color:var(--green)}
.ready-btn.on{background:var(--green);border-color:var(--green);color:#fff}

/* Expanded detail — matches catching queue colorway card layout */
.job-detail{display:none;margin-bottom:0}
.job-detail.open{display:flex;flex-direction:row;min-height:340px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:4px;background:var(--surface)}

/* Left: PDF proof */
.detail-proof{width:45%;flex-shrink:0;background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.proof-toolbar{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface);flex-shrink:0}
.proof-lbl{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.proof-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.proof-btn:hover{background:var(--sb-active)}
.proof-btn.nav{background:var(--bg);color:var(--muted);border:1px solid var(--border-dk)}
.proof-btn.nav:hover{color:var(--text);border-color:var(--text)}
.proof-page-info{font-size:9px;color:var(--muted-lt);font-family:var(--mono);min-width:32px;text-align:center}
.proof-canvas-area{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;align-items:flex-start;justify-content:center;background:var(--bg);cursor:pointer}
.proof-canvas-area canvas{width:100%;height:auto;display:block}
.proof-loading{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666;font-family:var(--mono)}
.proof-none{flex:1;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}

/* Right: ink list */
.detail-inks{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.inks-hdr{padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;display:flex;align-items:center;gap:8px}
.inks-hdr-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);flex:1;font-family:var(--cond)}
.inks-scroll{flex:1;overflow-y:auto}
.ink-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bg)}
.ink-row:last-child{border-bottom:none}
.chip-popover{position:absolute;z-index:100;background:var(--surface);border:1px solid var(--border-dk);border-radius:var(--radius);padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);display:flex;gap:6px;align-items:center}
.chip-hex-input{font-size:11px;padding:4px 7px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--mono);width:80px;outline:none}
.chip-hex-input:focus{border-color:var(--green)}
.chip-set-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.ink-body{flex:1;min-width:0}
.ink-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em}
.ink-name-edit{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;font-family:var(--cond);text-transform:uppercase;letter-spacing:.02em;border:none;background:transparent;width:100%;outline:none;padding:0}
.ink-name-edit:focus{background:#fffbea;border-radius:2px;padding:1px 3px;box-shadow:inset 0 0 0 1px #f59e0b}
.ink-type-tag{display:inline-block;font-size:7px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:var(--cond);padding:1px 5px;border-radius:2px;margin-top:2px;border:1px solid}
.ink-recipe-wrap{margin-top:5px}
.ink-recipe{font-size:10px;font-family:var(--mono);color:#555;line-height:1.7;white-space:pre-wrap;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:6px 8px;width:100%;resize:vertical;min-height:60px;outline:none}
.ink-recipe:focus{border-color:var(--green);background:#fff}
.ink-no-recipe{font-size:10px;color:var(--muted-lt);font-style:italic;font-family:var(--cond);margin-top:4px}
.ink-remove-btn{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;align-self:flex-start;margin-top:2px;transition:all .1s}
.ink-remove-btn:hover{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}
.inks-loading{padding:20px 14px;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em}
.prev-section{padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.prev-lbl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.prev-badge{font-size:8px;background:var(--sb-bg);color:var(--yellow);padding:1px 6px;border-radius:2px;border:1px solid var(--yellow-border)}
.copy-prev-btn{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:4px 10px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond);margin-left:auto;white-space:nowrap;transition:all .15s}
.copy-prev-btn:hover{background:#1A1A16}
.copy-prev-btn.copied{background:var(--green);color:#fff;cursor:default}
.copy-prev-btn.no-inks{background:var(--bg);color:var(--muted-lt);border:1px solid var(--border);cursor:default}
.print-notes{margin:8px 14px 0;background:var(--amb-bg);border:1px solid var(--amb-bd);border-radius:var(--radius);padding:7px 10px;flex-shrink:0}
.pn-lbl{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--amb);font-family:var(--cond);margin-bottom:3px}
.pn-txt{font-size:11px;color:#7a4f00;line-height:1.5}

/* Loading / empty */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:48px;color:var(--muted-lt);font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.spin{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 20px;color:var(--muted-lt);font-size:11px;text-transform:uppercase;letter-spacing:.1em;font-family:var(--cond)}
.err{margin:12px;padding:12px 14px;background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--radius-lg);font-size:11px;color:#7a1a1a;font-family:var(--mono)}

/* Proof fullscreen modal — exact catching queue .pm pattern */
.pm{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.92);flex-direction:column}
.pm.open{display:flex}
.pm-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#111;flex-shrink:0}
.pm-close{font-size:11px;padding:5px 12px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.pm-fn{font-size:11px;color:#555;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.pm-nav{display:flex;gap:6px;align-items:center}
.pm-nav button{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
.pm-ct{font-size:11px;color:#555;min-width:30px;text-align:center;font-family:var(--mono)}
.pm-body{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:16px;position:relative}
.pm-nav-btn{font-size:12px;padding:5px 10px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer}
#pmCanvas{border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
.lb-spinner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.lb-spin{width:32px;height:32px;border:3px solid #333;border-top-color:#888;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pm-body canvas{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius)}

/* Add ink form */
.add-ink-card{margin:8px 14px 4px;border:1px dashed var(--border-dk);border-radius:var(--radius);background:var(--bg);overflow:hidden}
.add-ink-header{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.add-ink-header:hover{color:var(--text)}
.add-ink-body{display:none;padding:10px 12px;flex-direction:column;gap:8px}
.add-ink-body.open{display:flex}
.add-ink-row{display:flex;gap:6px;align-items:center}
.add-ink-label{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-lt);font-family:var(--cond);width:60px;flex-shrink:0}
.add-ink-input{flex:1;font-size:11px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--mono);outline:none}
.add-ink-input:focus{border-color:var(--green)}
.add-ink-select{flex:1;font-size:11px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--cond);outline:none;cursor:pointer}
.add-ink-recipe{flex:1;font-size:10px;padding:5px 8px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--surface);color:var(--text);font-family:var(--mono);min-height:50px;resize:vertical;outline:none}
.add-ink-recipe:focus{border-color:var(--green)}
.add-ink-save{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 12px;border-radius:var(--radius);border:none;background:var(--sb-bg);color:var(--yellow);cursor:pointer;font-family:var(--cond)}
.add-ink-save:hover{background:var(--sb-active)}

/* Autocomplete search dropdown */
.ink-search-wrap{position:relative;flex:1}
.ink-ac-results{position:absolute;top:100%;left:0;right:0;z-index:200;background:var(--surface);border:1px solid var(--border-dk);border-top:none;border-radius:0 0 var(--radius) var(--radius);max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12)}
.ink-ac-row{padding:7px 10px;font-size:11px;cursor:pointer;font-family:var(--cond);border-bottom:1px solid var(--bg);color:var(--text)}
.ink-ac-row:last-child{border-bottom:none}
.ink-ac-row:hover{background:var(--green-lt)}
.ink-ac-row-name{font-weight:700;letter-spacing:.02em;text-transform:uppercase}
.ink-ac-row-meta{font-size:9px;color:var(--muted);margin-top:1px}
.ink-ac-row-found{background:var(--green-lt)}
.ink-ac-none{padding:8px 10px;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em}

/* Ink row timestamps */
.ink-timestamps{display:flex;gap:8px;margin-top:3px;flex-wrap:wrap}
.ink-ts{font-size:8px;color:var(--muted-lt);font-family:var(--mono);letter-spacing:.02em}
.ink-ts span{color:var(--muted)}

/* Label print button */
.ink-label-btn{flex-shrink:0;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .1s;white-space:nowrap;align-self:flex-start;margin-top:2px}
.ink-label-btn:hover{background:var(--sb-bg);border-color:var(--sb-bg);color:var(--yellow)}
/* Timestamp toggle button */
.ink-ts-btn{flex-shrink:0;font-size:8px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 7px;border-radius:var(--radius);border:1px solid var(--border-dk);background:var(--bg);color:var(--muted);cursor:pointer;font-family:var(--cond);transition:all .1s;white-space:nowrap;align-self:flex-start;margin-top:2px}
.ink-ts-btn:hover{border-color:var(--amb);color:var(--amb)}
.ink-ts-btn.armed{background:var(--amb-bg);border-color:var(--amb-bd);color:var(--amb)}

/* Label print overlay */
.label-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);align-items:center;justify-content:center;flex-direction:column;gap:16px}
.label-overlay.open{display:flex}
.label-iframe-wrap{width:576px;height:288px;background:#fff;border-radius:4px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);position:relative}
.label-iframe-wrap iframe{width:100%;height:100%;border:none;display:block}
.label-iframe-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-family:var(--cond);text-transform:uppercase;letter-spacing:.08em;background:#fff}
.label-actions{display:flex;gap:10px;align-items:center}
.label-print-btn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 20px;border-radius:var(--radius);border:none;background:var(--yellow);color:#111;cursor:pointer;font-family:var(--cond)}
.label-print-btn:hover{background:#d4d200}
.label-close-btn{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;border-radius:var(--radius);border:1px solid #444;background:#222;color:#ccc;cursor:pointer;font-family:var(--cond)}
.label-size-hint{font-size:10px;color:#777;font-family:var(--mono)}

/* Master print modal */
.master-modal{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.88);align-items:center;justify-content:center}
.master-modal.open{display:flex}
.master-panel{background:var(--surface);border-radius:var(--radius-lg);width:520px;max-width:96vw;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.5)}
.master-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--sb-bg)}
.master-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--yellow);font-family:var(--cond);flex:1}
.master-close{font-size:13px;color:#666;cursor:pointer;line-height:1;padding:2px 4px}
.master-close:hover{color:#ccc}
.master-search-wrap{padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.master-search{width:100%;font-size:12px;padding:7px 10px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:var(--sans);outline:none}
.master-search:focus{border-color:var(--green)}
.master-results{flex:1;overflow-y:auto}
.master-ink-row{padding:10px 16px;border-bottom:1px solid var(--bg);cursor:pointer;transition:background .1s}
.master-ink-row:hover{background:var(--green-lt)}
.master-ink-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;font-family:var(--cond)}
.master-ink-meta{font-size:9px;color:var(--muted);margin-top:2px;font-family:var(--mono)}
.master-ink-recipe-preview{font-size:9px;color:var(--muted-lt);font-family:var(--mono);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:420px}

/* Mobile responsiveness for stats bar */
@media (max-width: 600px) {
  .stats-bar {
    padding: 8px 12px !important;
    gap: 4px !important;
    overflow-x: auto !important;
    overflow-y: hidden !important;
    white-space: nowrap !important;
  }
  
  .stats-bar > * {
    flex-shrink: 0 !important;
    white-space: nowrap !important;
  }
  
  .stat-cell {
    padding: 4px 10px !important;
    font-size: 9px !important;
    min-width: auto !important;
  }
  
  .btn-refresh {
    padding: 5px 10px !important;
    font-size: 9px !important;
    flex-shrink: 0 !important;
    min-width: auto !important;
  }
}

@media (max-width: 480px) {
  .stats-bar {
    padding: 6px 10px !important;
    gap: 3px !important;
  }
  
  .stat-cell {
    padding: 3px 8px !important;
    font-size: 8px !important;
  }
  
  .btn-refresh {
    padding: 4px 8px !important;
    font-size: 8px !important;
  }
}
.master-empty{padding:32px;text-align:center;font-size:10px;color:var(--muted-lt);text-transform:uppercase;letter-spacing:.08em;font-family:var(--cond)}
.master-loading{padding:24px;text-align:center;font-size:10px;color:var(--muted-lt);font-family:var(--cond);text-transform:uppercase}
</style>
</head>
<body>
<div id="statsBar" class="stats-bar">
  <div class="stat-cell" id="fc-all" onclick="setFilter('all')">All<span class="stat-ct" id="sTotal">0</span></div>
  <div class="stat-cell" id="fc-ready" onclick="setFilter('ready')">Inks Ready<span class="stat-ct" id="sReady">0</span></div>
  <div class="stat-cell" id="fc-pending" onclick="setFilter('pending')">Pending<span class="stat-ct" id="sPending">0</span></div>
  <div class="stat-cell" id="fc-noink" onclick="setFilter('noink')">No Inks<span class="stat-ct" id="sNoInk">0</span></div>
  <div class="stat-cell" id="fc-repeat" onclick="setFilter('repeat')">Reprints<span class="stat-ct" id="sRepeat">0</span></div>
  <div class="stat-cell" style="margin-left:auto;border-color:transparent;background:transparent;color:var(--muted-lt)" id="sRange"></div>
  <div class="stat-cell" onclick="openMasterModal()" style="border-color:var(--yellow-border);background:var(--yellow-dim);color:var(--text)">🏷 Print Label</div>
  <button class="btn-refresh" onclick="loadData()">Refresh</button>
</div>
</div>
<div id="root"></div>

<!-- Proof fullscreen modal -->
<div class="pm" id="pmModal">
  <div class="pm-bar">
    <button class="pm-close" onclick="pmClose()">✕ Close</button>
    <span class="pm-fn" id="pmFn"></span>
    <div class="pm-nav">
      <button class="pm-nav-btn" onclick="pmPrev()">‹</button>
      <span class="pm-ct" id="pmCt"></span>
      <button class="pm-nav-btn" onclick="pmNext()">›</button>
    </div>
    <a id="pmOpenLink" href="#" target="_blank" rel="noopener" style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:3px;background:#fff;color:#111;text-decoration:none;font-family:var(--cond);display:none">⬆ Open</a>
  </div>
  <div class="pm-body" id="pmBody">
    <div class="lb-spinner hidden" id="pmSpinner"><div class="lb-spin"></div></div>
    <canvas id="pmCanvas"></canvas>
  </div>
</div>

<script>
// CONFIG — read-only mode
var WRITES_ENABLED = false;
// SHELL TICKER NOTE: "Inks Mixed Today" stat = count of Ink records (tblyPBucKoDwxDisT)
// where Last Updated (fldL5FCWezh8wXRhf) = TODAY() in Denver timezone.
// Shell fetches this via: filterByFormula=IS_SAME({fldL5FCWezh8wXRhf},TODAY(),'day')
var BASE = 'appJkaLk8DykjsgHR';

function getPantoneHex(inkName) {
  if (!inkName) return null;
  var hexMatch = inkName.match(/#([0-9A-Fa-f]{6})/);
  if (hexMatch) return '#' + hexMatch[1];
  var m = inkName.match(/Pantone\s+([^\-]+?)(?:\s*-|$)/i);
  if (!m) return null;
  var code = m[1].trim();
  if (PANTONE_HEX[code]) return PANTONE_HEX[code];
  var upper = code.toUpperCase();
  if (PANTONE_HEX[upper]) return PANTONE_HEX[upper];
  var numOnly = code.replace(/[\s\(].*$/, '').trim();
  if (PANTONE_HEX[numOnly]) return PANTONE_HEX[numOnly];
  return null;
}

function inkTypeBadge(typeName) {
  if (!typeName) return '';
  var styles = {
    'Discharge':        'background:#e8f5ee;color:#1e6b45;border-color:#b8dfcc',
    'OW':               'background:#fef3e8;color:#c45c00;border-color:#f8c8a0',
    'EZP':              'background:#f2eeff;color:#5b3fa0;border-color:#c8b8e8',
    'Direct-to-fabric': 'background:#e8f7f9;color:#0e6b7a;border-color:#a8d8e0',
    'Graphics':         'background:#f0f0ea;color:#555;border-color:#d8d8d0',
  };
  for (var k in styles) {
    if (typeName.toLowerCase().indexOf(k.toLowerCase()) >= 0) {
      return '<span class="ink-type-tag" style="'+styles[k]+'">'+typeName+'</span>';
    }
  }
  return '<span class="ink-type-tag" style="background:var(--bg);color:var(--muted);border-color:var(--border)">'+typeName+'</span>';
}

function api(path, opts) {
  opts = opts || {};
  return fetch('https://api.airtable.com/v0/' + BASE + '/' + path, {
    method: opts.method || 'GET',
    headers: { 'Authorization': 'Bearer ' + pat, 'Content-Type': 'application/json' },
    body: opts.body || undefined
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(j) { throw new Error(j.error ? j.error.message : 'HTTP ' + r.status); });
    return r.json();
  });
}

function addDays(d, n) { var r = new Date(d); r.setDate(r.getDate() + n); return r; }
function toDateKey(d) { return d.toLocaleDateString('en-CA', { timeZone: 'America/Denver' }); }
function fmtTime(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/Denver' })
    .replace(/\s*AM$/i, ' am').replace(/\s*PM$/i, ' pm');
}
function getOrderNum(fields) {
  var v = fields[F.orderNum];
  if (v) {
    if (v.valuesByLinkedRecordId) {
      var vals = Object.values(v.valuesByLinkedRecordId);
      if (vals.length && vals[0] && vals[0].length) return String(vals[0][0]);
    }
    if (Array.isArray(v) && v.length) return String(v[0]);
    if (typeof v === 'number' || typeof v === 'string') return String(v);
  }
  // Fall back: parse order number from imprint ID (e.g. "9733-A" -> "9733")
  var imp = fields[F.imprintId] || '';
  var m = imp.match(/^(\d+)/);
  return m ? m[1] : '';
}
function getProof(fields) {
  var raw = fields[F.proofs];
  if (!raw) return null;
  var att = null;
  // Handle both REST formats: valuesByLinkedRecordId (multipleLookupValues) and flat array
  if (raw.valuesByLinkedRecordId) {
    Object.values(raw.valuesByLinkedRecordId).forEach(function(arr) {
      if (Array.isArray(arr)) arr.forEach(function(a) { if (a && a.url && !att) att = a; });
    });
  } else if (Array.isArray(raw)) {
    att = raw[0] || null;
  }
  if (!att) return null;
  return {
    url: att.url,
    thumb: (att.thumbnails && att.thumbnails.large && att.thumbnails.large.url) || null,
    filename: att.filename || '',
    isPDF: att.type === 'application/pdf'
  };
}
function getLoc(fields) {
  var v = fields[F.loc];
  if (!v) return '';
  return typeof v === 'object' ? (v.name || '') : v;
}
function getQty(fields) {
  var v = fields[F.qty];
  if (v === null || v === undefined) return 0;
  if (typeof v === 'number') return v;
  if (v.valuesByLinkedRecordId) {
    var vals = Object.values(v.valuesByLinkedRecordId);
    return vals.length && vals[0] && vals[0].length ? (vals[0][0] || 0) : 0;
  }
  if (Array.isArray(v)) return v[0] || 0;
  return 0;
}

// LOAD
function loadJobs() {
  document.getElementById('root').innerHTML = '<div class="loading"><div class="spin"></div>Loading ink queue...</div>';
  document.getElementById('statsBar').style.display = 'none';

  var end = addDays(new Date(), DAYS_AHEAD);
  document.getElementById('sRange').textContent =
    new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' – ' +
    end.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  var flds = [F.imprintId, F.orderNum, F.startTime, F.loc, F.inks, F.inkNames,
    F.inkType, F.inksReady, F.isRepeat, F.prevImprint, F.printNotes,
    F.proofs, F.qty, F.customer, F.printDesc, F.press
  ].map(function(f) { return 'fields%5B%5D=' + f; }).join('&');

  var filter = encodeURIComponent(
    "AND(IS_AFTER({fldfqtIgcEfIlIeQk},DATEADD(TODAY(),-1,'days')),IS_BEFORE({fldfqtIgcEfIlIeQk},DATEADD(TODAY()," + (DAYS_AHEAD + 1) + ",'days')))"
  );
  var sort = 'sort%5B0%5D%5Bfield%5D=fldfqtIgcEfIlIeQk&sort%5B0%5D%5Bdirection%5D=asc';

  var records = [];
  function fetchPage(cursor) {
    var url = TI + '?returnFieldsByFieldId=true&' + flds + '&filterByFormula=' + filter + '&' + sort + (cursor ? '&offset=' + cursor : '');
    api(url).then(function(data) {
      records = records.concat(data.records || []);
      if (data.offset) { fetchPage(data.offset); return; }
      allJobs = records;
      renderAll();
    }).catch(function(e) {
      document.getElementById('root').innerHTML = '<div class="err">Load failed: ' + e.message + '</div>';
    });
  }
  fetchPage(null);
}

function setFilter(f) {
  activeFilter = f;
  // Update active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === f);
  });
  renderAll();
}

function renderAll() {
  var total = 0, ready = 0, noink = 0, repeat = 0;
  for (var i = 0; i < allJobs.length; i++) {
    var f = allJobs[i].fields;
    total++;
    if (f[F.inksReady]) ready++;
    if (!(f[F.inks] || []).length) noink++;
    if (f[F.isRepeat]) repeat++;
  }
  document.getElementById('sTotal').textContent = total;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = total - ready;
  document.getElementById('sNoInk').textContent = noink;
  document.getElementById('sRepeat').textContent = repeat;
  document.getElementById('statsBar').style.display = 'flex';
  // Set active pill
  ['all','ready','pending','noink','repeat'].forEach(function(k) {
    var el = document.getElementById('fc-' + k);
    if (el) el.classList.toggle('active', k === activeFilter);
  });

  // Group by date then by order
  var byDate = {};
  var today = toDateKey(new Date());
  var tom = toDateKey(addDays(new Date(), 1));

  for (var i = 0; i < allJobs.length; i++) {
    var r = allJobs[i];
    var st = r.fields[F.startTime];
    if (!st) continue;
    // Skip past dates (yesterday and before)
    var dk = toDateKey(new Date(st));
    if (dk < today) continue;
    // Skip presses that don't use ink
    var pressVal = r.fields[F.press];
    var pressStr = typeof pressVal === 'object' ? (pressVal && pressVal.name ? pressVal.name : '') : (pressVal || '');
    var pressLow = pressStr.toLowerCase();
    if (SKIP_PRESS.some(function(s) { return pressLow.indexOf(s) >= 0; })) continue;
    // Also skip records with location = Size Tag (no ink)
    var locVal = getLoc(r.fields).toLowerCase();
    if (locVal === 'size tag') continue;
    // Apply active filter
    var fInks = r.fields[F.inks] || [];
    if (activeFilter === 'ready' && !r.fields[F.inksReady]) continue;
    if (activeFilter === 'pending' && r.fields[F.inksReady]) continue;
    if (activeFilter === 'noink' && fInks.length > 0) continue;
    if (activeFilter === 'repeat' && !r.fields[F.isRepeat]) continue;
    if (!byDate[dk]) byDate[dk] = { _keys: [], _map: {} };
    var on = getOrderNum(r.fields) || 'no-order';
    if (!byDate[dk]._map[on]) { byDate[dk]._map[on] = []; byDate[dk]._keys.push(on); }
    byDate[dk]._map[on].push(r);
  }

  if (!Object.keys(byDate).length) {
    document.getElementById('root').innerHTML = '<div class="empty">No jobs in the next ' + DAYS_AHEAD + ' days</div>';
    return;
  }

  var h = '<div class="content">';
  var dateKeys = Object.keys(byDate).sort();
  for (var d = 0; d < dateKeys.length; d++) {
    var dk = dateKeys[d];
    var orders = byDate[dk];
    var dayRecs = [];
    var orderKeys = orders._keys;
    for (var o = 0; o < orderKeys.length; o++) dayRecs = dayRecs.concat(orders._map[orderKeys[o]]);
    var dayReady = dayRecs.filter(function(r) { return r.fields[F.inksReady]; }).length;

    var dObj = new Date(dk + 'T12:00:00');
    var dlabel, isToday = false;
    if (dk === today) { dlabel = 'Today — ' + dObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); isToday = true; }
    else if (dk === tom) { dlabel = 'Tomorrow — ' + dObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    else { dlabel = dObj.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }); }

    h += '<div class="date-hdr' + (isToday ? ' today' : '') + '">' + dlabel + '<span class="date-hdr-right">' + dayReady + ' / ' + dayRecs.length + ' ready</span></div>';

    for (var o = 0; o < orderKeys.length; o++) {
      var on = orderKeys[o];
      var recs = orders._map[on];
      var customer = recs[0].fields[F.customer] || '';
      h += '<div class="order-hdr">Order ' + on + (customer ? ' · ' + customer : '') + '</div>';
      for (var j = 0; j < recs.length; j++) {
        // Pass customer and order num so each card can show them in jc-sup
        h += renderCard(recs[j], on, customer);
        h += '<div class="job-detail" id="detail-' + recs[j].id + '"></div>';
      }
    }
  }
  h += '</div>';
  document.getElementById('root').innerHTML = h;
}

function renderCard(rec, orderNum, customer) {
  var f = rec.fields;
  var id = rec.id;
  var impId = f[F.imprintId] || '—';
  if (!customer) customer = f[F.customer] || '';
  if (!orderNum) orderNum = getOrderNum(f);
  var printDesc = f[F.printDesc] || customer || impId;
  var loc = getLoc(f);
  var qty = getQty(f);
  var inks = f[F.inks] || [];
  var inkTypes = f[F.inkType] || [];
  var inkNames = f[F.inkNames] || '';
  var isReady = f[F.inksReady] || false;
  var isRepeat = f[F.isRepeat] || false;
  var proof = getProof(f);
  var thumb = proof ? proof.thumb : null;
  var printTime = fmtTime(f[F.startTime]);

  var cardCls = 'job-card' + (isReady ? ' ready' : '') + (!inks.length ? ' no-ink' : '');

  var h = '<div class="' + cardCls + '" id="card-' + id + '" onclick="toggleDetail(\'' + id + '\')">';

  // Thumb
  h += '<div class="jc-thumb">';
  if (thumb) h += '<img src="' + thumb + '" onerror="this.style.display=\'none\'">';
  else h += '<svg class="jc-thumb-ph" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
  h += '</div>';

  // Info
  h += '<div class="jc-info">';
  h += '<div class="jc-sup">' + impId + (printTime ? ' · ' + printTime : '') + '</div>';
  h += '<div class="jc-name">' + printDesc + '</div>';
  h += '<div class="jc-meta">';
  if (qty) h += '<span class="tag k">' + qty + ' pcs</span>';
  if (loc) h += '<span class="tag n">' + loc + '</span>';
  if (!inks.length) h += '<span class="tag r">No Inks</span>';
  else {
    for (var t = 0; t < inkTypes.length; t++) h += '<span class="tag n">' + inkTypes[t] + '</span>';
  }
  if (isRepeat) h += '<span class="tag k">↩ Repeat</span>';
  h += '</div></div>';

  // Right
  h += '<div class="jc-right">';
  h += '<span class="status ' + (isReady ? 'done' : 'pending') + '">' + (isReady ? 'Ready' : 'Pending') + '</span>';
  h += '<button class="ready-btn' + (isReady ? ' on' : '') + '" onclick="toggleReady(event,\'' + id + '\')">' + (isReady ? '✓ Ready' : 'Mark Ready') + '</button>';
  h += '</div>';

  h += '</div>';
  return h;
}

// TOGGLE DETAIL
function toggleDetail(id) {
  var detailEl = document.getElementById('detail-' + id);
  if (!detailEl) return;

  if (detailEl.classList.contains('open')) {
    detailEl.classList.remove('open');
    detailEl.innerHTML = '';
    openDetailId = null;
    return;
  }

  // Close any other open detail
  if (openDetailId && openDetailId !== id) {
    var prev = document.getElementById('detail-' + openDetailId);
    if (prev) { prev.classList.remove('open'); prev.innerHTML = ''; }
  }

  openDetailId = id;
  detailEl.classList.add('open');
  renderDetail(id, detailEl);
}

function renderDetail(id, el) {
  var rec = allJobs.find(function(r) { return r.id === id; });
  if (!rec) return;
  var f = rec.fields;
  var inks = f[F.inks] || [];
  var proof = getProof(f);
  var printNotes = f[F.printNotes] || '';
  var isRepeat = f[F.isRepeat] || false;
  var prevImprint = f[F.prevImprint] || [];
  var impId = f[F.imprintId] || '—';

  var h = '';

  // Left: proof
  h += '<div class="detail-proof">';
  h += '<div class="proof-toolbar">';
  h += '<span class="proof-lbl">Mockup / Proof</span>';
  if (proof) {
    h += '<button class="proof-btn" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\');event.stopPropagation()">⛶ Full PDF</button>';
  }
  h += '</div>';
  // Use thumbnail img for inline display (PDF.js can't load Airtable URLs which require auth)
  // Full PDF opens in the modal via PDF.js using the direct URL
  if (proof) {
    var displayUrl = proof.thumb || null;
    var fullUrl = proof.url;
    if (displayUrl) {
      h += '<div class="proof-canvas-area" style="cursor:pointer;background:var(--bg)" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\')">';
      h += '<img src="' + displayUrl + '" style="width:100%;height:auto;display:block" onerror="this.style.display=\'none\';this.parentNode.innerHTML+=\'<div style=padding:20px;color:#888;font-size:11px;font-family:var(--mono)>Could not load preview</div>\'">';
      h += '</div>';
    } else {
      h += '<div class="proof-canvas-area" style="cursor:pointer;background:var(--bg);padding:20px;display:flex;align-items:center;justify-content:center" onclick="openPmPdf(\'' + id + '\',\'' + impId + '\')">';
      h += '<div style="font-size:10px;color:var(--muted);font-family:var(--cond);text-transform:uppercase;letter-spacing:.06em">Tap to open PDF</div>';
      h += '</div>';
    }
  } else {
    h += '<div class="proof-none">No proof on file</div>';
  }
  h += '</div>';

  // Right: inks
  h += '<div class="detail-inks">';
  h += '<div class="inks-hdr"><span class="inks-hdr-lbl">Inks (' + inks.length + ')</span>';
  if (inks.length) {

  h += '<div class="add-ink-row"><span class="add-ink-label">Pantone</span><input class="add-ink-input" id="ai-pantone-' + id + '" placeholder="e.g. 289" onclick="event.stopPropagation()"></div>';
  h += '<div class="add-ink-row"><span class="add-ink-label">Type</span><select class="add-ink-select" id="ai-type-' + id + '" onclick="event.stopPropagation()"><option value="">— Optional —</option><option value="Discharge">Discharge</option><option value="Direct-to-fabric">Direct-to-fabric</option><option value="OW">OW</option><option value="SOW">SOW</option><option value="EZP">EZP</option><option value="Graphics">Graphics</option></select></div>';

  h += '<div class="add-ink-row"><span class="add-ink-label">Recipe</span><textarea class="add-ink-recipe" id="ai-recipe-' + id + '" placeholder="Paste recipe here..." onclick="event.stopPropagation()"></textarea></div>';
  h += '<div class="add-ink-row" style="justify-content:flex-end"><button class="add-ink-save" onclick="saveNewInk(\'' + id + '\');event.stopPropagation()">Add to Job</button></div>';
  h += '</div></div>';

  if (printNotes) {
    h += '<div class="print-notes"><div class="pn-lbl">Print Notes</div><div class="pn-txt">' + printNotes + '</div></div>';
  }

  if (isRepeat && prevImprint.length && !inks.length) {
    var prevRecId = typeof prevImprint[0] === 'string' ? prevImprint[0] : prevImprint[0].id;
    h += '<div class="prev-section" id="prev-' + id + '">';
    h += '<div class="prev-lbl">Previous Run <span class="prev-badge">↩ Repeat</span></div>';
    h += '<div id="prev-body-' + id + '" style="font-size:10px;color:var(--muted-lt);font-family:var(--cond)">Loading...</div>';
    h += '</div>';
  }

  h += '</div>';

  el.innerHTML = h;

  // Load ink recipes
  if (inks.length) {
    loadInkRecipes(id, inks);
  }

  // Load previous inks — only when current inks field is empty
  if (isRepeat && prevImprint.length && !inks.length) {
    var prevRecId = typeof prevImprint[0] === 'string' ? prevImprint[0] : prevImprint[0].id;
    loadPrevInks(id, prevRecId);
  }
}

// PDF in detail panel
var detailPdfs = {};
function loadPdfInDetail(recId, url) {
  pdfjsLib.getDocument(url).promise.then(function(doc) {
    detailPdfs[recId] = { doc: doc, page: 1, total: doc.numPages };
    renderDetailPdfPage(recId);
  }).catch(function(e) {
    var el = document.getElementById('pcanvas-' + recId);
    if (el) el.innerHTML = '<div style="padding:16px;color:#888;font-size:11px">Could not load PDF</div>';
  });
}

function renderDetailPdfPage(recId) {
  var state = detailPdfs[recId];
  if (!state) return;
  var infoEl = document.getElementById('pinfo-' + recId);
  var canvasWrap = document.getElementById('pcanvas-' + recId);
  if (!canvasWrap) return;
  if (infoEl) infoEl.textContent = state.page + ' / ' + state.total;

  state.doc.getPage(state.page).then(function(page) {
    var width = canvasWrap.clientWidth || 300;
    var scale = width / page.getViewport({ scale: 1 }).width;
    var vp = page.getViewport({ scale: scale });
    var canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.cssText = 'width:100%;display:block';
    canvasWrap.innerHTML = '';
    canvasWrap.appendChild(canvas);
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp });
  });
}

function pdfPrevPage(recId) {
  event.stopPropagation();
  var state = detailPdfs[recId];
  if (!state || state.page <= 1) return;
  state.page--;
  renderDetailPdfPage(recId);
}

function pdfNextPage(recId) {
  event.stopPropagation();
  var state = detailPdfs[recId];
  if (!state || state.page >= state.total) return;
  state.page++;
  renderDetailPdfPage(recId);
}

// Full-screen PDF modal - fetches fresh URL before loading (operator v4 pattern)
function openPmPdf(recId, title) {
  var modal = document.getElementById('pmModal');
  document.getElementById('pmFn').textContent = title || '';
  document.getElementById('pmCt').textContent = '';
  document.getElementById('pmSpinner').classList.remove('hidden');
  document.getElementById('pmOpenLink').style.display = 'none';
  modal.classList.add('open');
  pmPdfDoc = null; pmPage = 1; pmTotal = 1;

  // Fetch fresh signed URL from Airtable first
  var formula = "RECORD_ID()='" + recId + "'";
  api(TI + '?fields%5B%5D=' + F.proofs + '&filterByFormula=' + encodeURIComponent(formula) + '&returnFieldsByFieldId=true&pageSize=1')
    .then(function(data) {
      var rec = data.records && data.records[0];
      var raw = rec && rec.fields && rec.fields[F.proofs];
      var freshUrl = null, isPDF = false;
      if (raw && raw.valuesByLinkedRecordId) {
        Object.values(raw.valuesByLinkedRecordId).forEach(function(arr) {
          if (Array.isArray(arr)) arr.forEach(function(a) {
            if (a && a.url && !freshUrl) { freshUrl = a.url; isPDF = a.type === 'application/pdf'; }
          });
        });
      } else if (Array.isArray(raw)) {
        raw.forEach(function(a) { if (a && a.url && !freshUrl) { freshUrl = a.url; isPDF = a.type === 'application/pdf'; } });
      }
      if (!freshUrl) {
        document.getElementById('pmSpinner').classList.add('hidden');
        var canvas = document.getElementById('pmCanvas');
        var ctx = canvas.getContext('2d'); canvas.width = 400; canvas.height = 100;
        ctx.fillStyle = '#333'; ctx.fillRect(0,0,400,100);
        ctx.fillStyle = '#888'; ctx.font = '13px monospace'; ctx.textAlign = 'center';
        ctx.fillText('No proof on file', 200, 55);
        return;
      }
      // Store open link
      var link = document.getElementById('pmOpenLink');
      link.href = freshUrl; link.style.display = 'inline-flex';

      if (isPDF) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        // Use exact operator view pattern — direct URL to PDF.js
        pdfjsLib.getDocument(freshUrl).promise.then(function(doc) {
          pmPdfDoc = doc; pmPage = 1; pmTotal = doc.numPages;
          document.getElementById('pmCt').textContent = '1/' + pmTotal;
          pmRenderPage();
        }).catch(function(err) {
          console.warn('PDF load failed:', err.message);
          document.getElementById('pmSpinner').classList.add('hidden');
          // Show error on canvas
          var canvas = document.getElementById('pmCanvas');
          canvas.width = 500; canvas.height = 140;
          var ctx = canvas.getContext('2d');
          ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,500,140);
          ctx.fillStyle = '#888'; ctx.font = '12px monospace'; ctx.textAlign = 'center';
          ctx.fillText('PDF load error: ' + err.message, 250, 55);
          ctx.fillStyle = '#555'; ctx.font = '11px monospace';
          ctx.fillText('Use the Open button above to view in browser', 250, 85);
        });
      } else {
        // Image proof — draw to canvas
        var img = new Image();
        img.onload = function() {
          document.getElementById('pmSpinner').classList.add('hidden');
          var canvas = document.getElementById('pmCanvas');
          canvas.width = img.width; canvas.height = img.height;
          canvas.getContext('2d').drawImage(img, 0, 0);
          document.getElementById('pmCt').textContent = 'img';
        };
        img.onerror = function() {
          document.getElementById('pmSpinner').classList.add('hidden');
        };
        img.crossOrigin = 'anonymous';
        img.src = freshUrl;
      }
    }).catch(function(e) {
      document.getElementById('pmSpinner').classList.add('hidden');
      console.error('Proof fetch failed:', e.message);
    });
}


function pmRenderPage() {
  if (!pmPdfDoc) return;
  var canvas = document.getElementById('pmCanvas');
  if (!canvas) return;
  document.getElementById('pmCt').textContent = pmPage + ' / ' + pmTotal;
  document.getElementById('pmSpinner').classList.remove('hidden');
  pmPdfDoc.getPage(pmPage).then(function(page) {
    var body = document.getElementById('pmBody');
    var availWidth = Math.max((body ? body.clientWidth : 0) || 0, window.innerWidth || 800) - 32;
    var vp0 = page.getViewport({ scale: 1 });
    var scale = Math.min(availWidth / vp0.width, 2.5);
    if (scale <= 0 || !isFinite(scale)) scale = 1.5;
    var vp = page.getViewport({ scale: scale });
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.style.cssText = 'max-width:100%;height:auto;border-radius:4px;display:block';
    page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise.then(function() {
      document.getElementById('pmSpinner').classList.add('hidden');
      document.getElementById('pmCt').textContent = pmPage + ' / ' + pmTotal;
    });
  }).catch(function(e) {
    document.getElementById('pmSpinner').classList.add('hidden');
    console.error('Page render failed:', e.message);
  });
}

function pmPrev() { if (pmPage > 1) { pmPage--; pmRenderPage(); } }
function pmNext() { if (pmPage < pmTotal) { pmPage++; pmRenderPage(); } }
function pmClose() { document.getElementById('pmModal').classList.remove('open'); pmPdfDoc = null; }

// LOAD INK RECIPES
function loadInkRecipes(recId, inks) {
  var inkIds = inks.map(function(i) { return typeof i === 'string' ? i : i.id; }).filter(Boolean);
  var filter = 'OR(' + inkIds.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';

  api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
    '&fields%5B%5D=' + FI.name +
    '&fields%5B%5D=' + FI.pantone +
    '&fields%5B%5D=' + FI.type +
    '&fields%5B%5D=' + FI.recipe +
    '&fields%5B%5D=' + FI.inkNotes +
    '&fields%5B%5D=' + FI.lastUpdated +
    '&fields%5B%5D=' + FI.mfr +
    '&filterByFormula=' + encodeURIComponent(filter)
  ).then(function(data) {
    var byId = {};
    (data.records || []).forEach(function(r) { byId[r.id] = r.fields; byId[r.id]._createdTime = r.createdTime; });
    renderInkRows(recId, inks, byId, false);
  }).catch(function() {
    var el = document.getElementById('inks-' + recId);
    if (el) el.innerHTML = '<div class="inks-loading">Could not load recipes</div>';
  });
}

function renderInkRows(recId, inks, byId, isPrev) {
  var el = document.getElementById((isPrev ? 'prev-inks-' : 'inks-') + recId);
  if (!el) return;

  var h = '';
  for (var i = 0; i < inks.length; i++) {
    var ink = inks[i];
    var iid = typeof ink === 'string' ? ink : ink.id;
    var iname = typeof ink === 'object' ? ink.name : null;
    var d = byId[iid] || {};
    var name = iname || d[FI.name] || iid;
    var pantone = d[FI.pantone] || '';
    var typeName = d[FI.type] ? d[FI.type].name : '';
    var recipe = d[FI.recipe] || '';
    var mfr = d[FI.mfr] ? d[FI.mfr].name : '';
    var hexColor = getPantoneHex(name);
    var chipStyle = hexColor
      ? 'background:' + hexColor + ';border-color:rgba(0,0,0,.15)'
      : 'background:var(--bg);border-color:var(--border)';

    var tsHtml = '';
    if (!isPrev) {
      var createdTs = d._createdTime || '';
      var lastUpdated = d[FI.lastUpdated] || '';
      if (createdTs || lastUpdated) {
        tsHtml = '<div class="ink-timestamps">';
        if (createdTs) {
          var cd = new Date(createdTs);
          tsHtml += '<span class="ink-ts">Created <span>' + cd.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
        }
        if (lastUpdated) {
          var ld = new Date(lastUpdated + 'T12:00:00');
          tsHtml += '<span class="ink-ts">Updated <span>' + ld.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
        }
        tsHtml += '</div>';
      }
    }

    h += '<div class="ink-row" id="inkrow-' + recId + '-' + i + '">';
    if (hexColor) {
      h += '<div class="ink-chip" id="chip-' + iid + '" style="' + chipStyle + '" title="Click to change color" onclick="editChipColor(\'' + iid + '\',this);event.stopPropagation()"></div>';
    } else {
      h += '<div class="ink-chip ink-chip-empty" id="chip-' + iid + '" title="No color — click to set" onclick="editChipColor(\'' + iid + '\',this);event.stopPropagation()">?</div>';
    }
    h += '<div class="ink-body">';
    h += '<input class="ink-name-edit" value="' + escHtml(name) + '" onclick="event.stopPropagation()" onchange="localEditName(\'' + iid + '\',this.value)" />';
    if (typeName || mfr) {
      h += '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">';
      if (typeName) h += inkTypeBadge(typeName);
      if (mfr) h += '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + mfr + '</span>';
      h += '</div>';
    }
    h += tsHtml;
    h += '<div class="ink-recipe-wrap">';
    h += '<textarea class="ink-recipe" rows="4" onclick="event.stopPropagation()" onchange="localEditRecipe(\'' + iid + '\',this.value)">' + escHtml(recipe) + '</textarea>';
    h += '</div>';
    h += '</div>';
    if (!isPrev) {
      h += '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">';
      h += '<button class="ink-remove-btn" onclick="removeInkRow(\'' + recId + '\',\'inkrow-' + recId + '-' + i + '\');event.stopPropagation()" title="Remove ink">✕</button>';
      var labelData = { name: name, pantone: pantone, type: typeName, mfr: mfr, recipe: recipe };
      var lk = storeLabelData(labelData);
      h += '<button class="ink-label-btn" onclick="openLabelByKey(\'' + lk + '\');event.stopPropagation()">🏷</button>';
      h += '<button class="ink-ts-btn" id="tsbtn-' + iid + '" onclick="toggleTsArm(\'' + iid + '\');event.stopPropagation()" title="Arm to update timestamp on save">📅</button>';
      h += '</div>';
    }
    h += '</div>';
  }
  el.innerHTML = h;
}

// Cache for prev ink data — keyed by imprint recId
// Stores { inks: [...], byId: {...} } once loaded so copyPrevInks can use it
var prevInkCache = {};

// Label data store — avoids passing complex data through onclick attributes
// Key is a simple integer index; openLabelByKey() retrieves by key
var labelStore = {};
var labelStoreIdx = 0;
function storeLabelData(d) {
  var k = 'lbl' + (labelStoreIdx++);
  labelStore[k] = d;
  return k;
}

// LOAD PREVIOUS INKS
function loadPrevInks(recId, prevImprintRecId) {
  api(TI + '/' + prevImprintRecId + '?returnFieldsByFieldId=true'
  ).then(function(data) {
    var prevInks = data.fields[F.inks] || [];
    var prevId = data.fields[F.imprintId] || prevImprintRecId;
    var prevNotes = data.fields[F.printNotes] || '';

    var prevEl = document.getElementById('prev-' + recId);
    var bodyEl = document.getElementById('prev-body-' + recId);
    if (!prevEl || !bodyEl) return;

    // Update label to show prev imprint ID and copy button
    var lbl = prevEl.querySelector('.prev-lbl');
    if (lbl) {
      lbl.innerHTML = 'Previous Run &nbsp;<span class="prev-badge">↩ ' + escHtml(prevId) + '</span>' +
        (prevInks.length
          ? '<button class="copy-prev-btn" id="copybtn-' + recId + '" onclick="copyPrevInks(\'' + recId + '\');event.stopPropagation()">⬆ Copy Pantones</button>'
          : '<span class="copy-prev-btn no-inks">No Inks on Prev</span>');
    }

    if (!prevInks.length) {
      bodyEl.innerHTML = '<span style="font-size:10px;color:var(--muted-lt)">No inks on record ' + escHtml(prevId) + '</span>';
      return;
    }

    bodyEl.innerHTML = '<div id="prev-inks-' + recId + '"><div class="inks-loading"><div class="spin" style="display:inline-block;margin-right:6px"></div>Loading inks...</div></div>';

    var inkIds = prevInks.map(function(i) { return typeof i === 'string' ? i : i.id; }).filter(Boolean);
    var filter = 'OR(' + inkIds.map(function(id) { return "RECORD_ID()='" + id + "'"; }).join(',') + ')';

    api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
      '&fields%5B%5D=' + FI.name +
      '&fields%5B%5D=' + FI.pantone +
      '&fields%5B%5D=' + FI.type +
      '&fields%5B%5D=' + FI.recipe +
      '&fields%5B%5D=' + FI.inkNotes +
      '&fields%5B%5D=' + FI.lastUpdated +
      '&fields%5B%5D=' + FI.mfr +
      '&filterByFormula=' + encodeURIComponent(filter)
    ).then(function(idata) {
      var byId = {};
      (idata.records || []).forEach(function(r) { byId[r.id] = r.fields; byId[r.id]._createdTime = r.createdTime; });

      // Cache so copyPrevInks can use it without re-fetching
      prevInkCache[recId] = { inks: prevInks, byId: byId };

      renderInkRows(recId, prevInks, byId, true);

      if (prevNotes) {
        var prevEl2 = document.getElementById('prev-' + recId);
        if (prevEl2) {
          var pn = document.createElement('div');
          pn.className = 'print-notes';
          pn.style.marginTop = '8px';
          pn.innerHTML = '<div class="pn-lbl">Notes from ' + escHtml(prevId) + '</div><div class="pn-txt">' + escHtml(prevNotes) + '</div>';
          prevEl2.appendChild(pn);
        }
      }
    }).catch(function(err) {
      var el2 = document.getElementById('prev-inks-' + recId);
      if (el2) el2.innerHTML = '<div class="inks-loading">Could not load inks: ' + escHtml(err && err.message || 'unknown error') + '</div>';
    });
  }).catch(function(err) {
    var bodyEl = document.getElementById('prev-body-' + recId);
    if (bodyEl) bodyEl.innerHTML = '<span style="font-size:10px;color:var(--red)">Could not load previous imprint: ' + escHtml(err && err.message || 'unknown error') + '</span>';
  });
}

// COPY PREV INKS — imports previous run inks into this imprint's ink list
function copyPrevInks(recId) {
  var cached = prevInkCache[recId];
  if (!cached || !cached.inks.length) return;

  var btn = document.getElementById('copybtn-' + recId);
  if (btn && btn.classList.contains('copied')) return; // already copied

  var inkEl = document.getElementById('inks-' + recId);
  if (!inkEl) return;

  // Remove "no inks" placeholder if present
  var noMsg = document.getElementById('no-inks-msg-' + recId);
  if (noMsg) noMsg.remove();

  // Build ink rows into this imprint's ink list
  var inks = cached.inks;
  var byId = cached.byId;

  for (var i = 0; i < inks.length; i++) {
    var ink = inks[i];
    var iid = typeof ink === 'string' ? ink : ink.id;
    var d = byId[iid] || {};
    var name = d[FI.name] || iid;
    var typeName = d[FI.type] ? d[FI.type].name : '';
    var recipe = d[FI.recipe] || '';
    var mfr = d[FI.mfr] ? d[FI.mfr].name : '';
    var hexColor = getPantoneHex(name);
    var chipStyle = hexColor ? 'background:' + hexColor + ';border-color:rgba(0,0,0,.15)' : 'background:var(--bg);border-color:var(--border)';
    var rowId = 'cp-' + recId + '-' + i;

    var row = document.createElement('div');
    row.className = 'ink-row';
    row.id = rowId;
    row.innerHTML =
      '<div class="ink-chip' + (!hexColor ? ' ink-chip-empty' : '') + '" id="chip-' + iid + '-cp" style="' + chipStyle + '" title="Click to change color" onclick="editChipColor(\'' + iid + '-cp\',this);event.stopPropagation()">' + (!hexColor ? '?' : '') + '</div>' +
      '<div class="ink-body">' +
        '<input class="ink-name-edit" value="' + escHtml(name) + '" onclick="event.stopPropagation()" onchange="localEditName(\'' + iid + '\',this.value)" />' +
        (typeName || mfr ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">' + (typeName ? inkTypeBadge(typeName) : '') + (mfr ? '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + mfr + '</span>' : '') + '</div>' : '') +
        '<div class="ink-recipe-wrap"><textarea class="ink-recipe" rows="4" onclick="event.stopPropagation()" onchange="localEditRecipe(\'' + iid + '\',this.value)">' + escHtml(recipe) + '</textarea></div>' +
      '</div>' +
      '<button class="ink-remove-btn" onclick="document.getElementById(\'' + rowId + '\').remove();event.stopPropagation()" title="Remove ink">✕</button>';
    inkEl.appendChild(row);
  }

  // Update card state: remove no-ink border, remove No Inks tag
  var card = document.getElementById('card-' + recId);
  if (card) {
    card.classList.remove('no-ink');
    var noInkTag = card.querySelector('.tag.r');
    if (noInkTag && noInkTag.textContent === 'No Inks') noInkTag.remove();
  }

  // Update inks header count
  var hdr = document.querySelector('#detail-' + recId + ' .inks-hdr-lbl');
  if (hdr) {
    var total = inkEl.querySelectorAll('.ink-row').length;
    hdr.textContent = 'Inks (' + total + ') — copied from prev run';
  }

  // Mark button as done and collapse the prev section
  if (btn) {
    btn.classList.add('copied');
    btn.textContent = '✓ Copied';
    btn.onclick = null;
  }

  // Collapse the entire Previous Run section — no longer needed
  setTimeout(function() {
    var prevEl = document.getElementById('prev-' + recId);
    if (prevEl) {
      prevEl.style.transition = 'opacity .3s';
      prevEl.style.opacity = '0';
      setTimeout(function() { prevEl.remove(); }, 320);
    }
  }, 600);

  // If writes enabled, link these ink records to the imprint in Airtable
  if (WRITES_ENABLED) {
    var inkIds = inks.map(function(i) { return { id: typeof i === 'string' ? i : i.id }; });
    var rec = allJobs.find(function(r) { return r.id === recId; });
    // Merge with any existing inks already on the record
    var existing = (rec && rec.fields[F.inks]) ? rec.fields[F.inks].map(function(i) { return { id: typeof i === 'string' ? i : i.id }; }) : [];
    var existingIds = existing.map(function(x) { return x.id; });
    var toAdd = inkIds.filter(function(x) { return existingIds.indexOf(x.id) === -1; });
    var merged = existing.concat(toAdd);
    api(TI + '/' + recId, { method: 'PATCH', body: JSON.stringify({ fields: { [F.inks]: merged } }) })
      .then(function(data) {
        if (rec) rec.fields[F.inks] = merged;
      })
      .catch(function(err) {
        console.warn('Could not save copied inks to Airtable:', err.message);
      });
  }
}


// ADD INK functions
function toggleAddInk(id) {

function saveNewInk(id) {
  var pantone = (document.getElementById('ai-pantone-' + id) || {}).value || '';

  var mfr = (document.getElementById('ai-mfr-' + id) || {}).value || '';
  var recipe = (document.getElementById('ai-recipe-' + id) || {}).value || '';

  var fullName = (document.getElementById('ai-fullname-' + id) || {}).value || '';
  var name = fullName || (type ? 'Pantone ' + pantone + ' - ' + type : 'Pantone ' + pantone);
  // Store locally — append to the inks display
  var el = document.getElementById('inks-' + id);
  if (el) {

    var storedData = storedFullKey ? (labelStore[storedFullKey] || {}) : {};
    var createdTs  = storedData.createdTime  || '';
    var lastUpd    = storedData.lastUpdated  || '';

    // Build timestamp HTML (matches renderInkRows pattern)
    var tsHtml = '';
    if (createdTs || lastUpd) {
      tsHtml = '<div class="ink-timestamps">';
      if (createdTs) {
        var cd = new Date(createdTs);
        tsHtml += '<span class="ink-ts">Created <span>' + cd.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
      }
      if (lastUpd) {
        var ld = new Date(lastUpd + 'T12:00:00');
        tsHtml += '<span class="ink-ts">Updated <span>' + ld.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) + '</span></span>';
      }
      tsHtml += '</div>';
    }

    var lk = storeLabelData({ name: name, pantone: pantone, type: type, mfr: mfr, recipe: recipe });
    row.id = rowId;
    row.innerHTML =
      '<div class="ink-chip' + (!hexColor ? ' ink-chip-empty' : '') + '" id="chip-' + rowId + '" style="' + chipStyle + '" onclick="editChipColor(\'chip-' + rowId + '\',this);event.stopPropagation()">' + (!hexColor ? '?' : '') + '</div>' +
      '<div class="ink-body">' +
        '<input class="ink-name-edit" value="' + escHtml(name) + '" onclick="event.stopPropagation()" onchange="localEditName(\'' + rowId + '\',this.value)" />' +
        (type || mfr ? '<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">' + (type ? inkTypeBadge(type) : '') + (mfr ? '<span style="font-size:9px;color:var(--muted-lt);font-family:var(--cond);letter-spacing:.04em;padding-top:2px">' + mfr + '</span>' : '') + '</div>' : '') +
        tsHtml +
        '<div class="ink-recipe-wrap"><textarea class="ink-recipe" rows="4" onclick="event.stopPropagation()" onchange="localEditRecipe(\'' + rowId + '\',this.value)">' + escHtml(recipe) + '</textarea></div>' +
      '</div>' +
      '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">' +
        '<button class="ink-remove-btn" onclick="document.getElementById(\'' + rowId + '\').remove();event.stopPropagation()" title="Remove">✕</button>' +
        '<button class="ink-label-btn" onclick="openLabelByKey(\'' + lk + '\');event.stopPropagation()">🏷</button>' +
        '<button class="ink-ts-btn" id="tsbtn-' + rowId + '" onclick="toggleTsArm(\'' + rowId + '\');event.stopPropagation()" title="Arm to update timestamp on save">📅</button>' +
      '</div>';
    el.appendChild(row);
  }
  // Hide the "no inks" message in the detail panel
  var noMsg = document.getElementById('no-inks-msg-' + id);
  if (noMsg) noMsg.style.display = 'none';
  // Clear no-ink flag and remove No Inks tag from card
  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.remove('no-ink');
    // Remove the "No Inks" red tag if present
    var noInkTag = card.querySelector('.tag.r');
    if (noInkTag && noInkTag.textContent === 'No Inks') noInkTag.remove();
  }
  // Clear the form
  var fields = ['ai-search-', 'ai-fullname-', 'ai-pantone-', 'ai-type-', 'ai-mfr-', 'ai-recipe-'];
  fields.forEach(function(f) { var el2 = document.getElementById(f + id); if (el2) el2.value = ''; });
  toggleAddInk(id);
}

// TOGGLE READY (writes disabled in this version)
function toggleReady(e, id) {
  e.stopPropagation();
  var rec = allJobs.find(function(r) { return r.id === id; });
  if (!rec) return;
  var cur = rec.fields[F.inksReady] || false;
  var nxt = !cur;
  rec.fields[F.inksReady] = nxt;

  var btn = e.currentTarget;
  btn.classList.toggle('on', nxt);
  btn.textContent = nxt ? '✓ Ready' : 'Mark Ready';

  var card = document.getElementById('card-' + id);
  if (card) {
    card.classList.toggle('ready', nxt);
    if (nxt) {
      card.classList.remove('no-ink');
      // Also remove No Inks tag if inks were locally added
      var inkEl2 = document.getElementById('inks-' + id);
      if (inkEl2 && inkEl2.querySelectorAll('.ink-row').length > 0) {
        var noInkTag2 = card.querySelector('.tag.r');
        if (noInkTag2 && noInkTag2.textContent === 'No Inks') noInkTag2.remove();
      }
    } else {
      // Check both Airtable inks and locally added inks
      var inkEl = document.getElementById('inks-' + id);
      var hasInks = (rec.fields[F.inks] || []).length > 0 || (inkEl && inkEl.querySelectorAll('.ink-row').length > 0);
      if (!hasInks) card.classList.add('no-ink');
    }
  }

  var statusEl = card && card.querySelector('.status');
  if (statusEl) { statusEl.className = 'status ' + (nxt ? 'done' : 'pending'); statusEl.textContent = nxt ? 'Ready' : 'Pending'; }

  // Update stats
  var ready = allJobs.filter(function(r) { return r.fields[F.inksReady]; }).length;
  document.getElementById('sReady').textContent = ready;
  document.getElementById('sPending').textContent = allJobs.length - ready;

  if (WRITES_ENABLED) {
    api(TI + '/' + id, { method: 'PATCH', body: JSON.stringify({ fields: { [F.inksReady]: nxt } }) })
      .catch(function(err) {
        rec.fields[F.inksReady] = cur;
        btn.classList.toggle('on', cur);
        btn.textContent = cur ? '✓ Ready' : 'Mark Ready';
        alert('Save failed: ' + err.message);
      });
  }
}

// Chip color editor
var activeChipPopover = null;
function editChipColor(iid, chipEl) {
  // Close any existing popover
  if (activeChipPopover) { activeChipPopover.remove(); activeChipPopover = null; }

  var popover = document.createElement('div');
  popover.className = 'chip-popover';
  var currentColor = chipEl.style.backgroundColor || '';
  var currentHex = currentColor ? rgbToHex(currentColor) : '';

  popover.innerHTML =
    '<input class="chip-hex-input" id="chex-' + iid + '" placeholder="#a3b4c5" maxlength="7" value="' + currentHex + '">' +
    '<button class="chip-set-btn" onclick="applyChipColor(\'' + iid + '\');event.stopPropagation()">Set</button>';

  // Position below chip
  var rect = chipEl.getBoundingClientRect();
  popover._chipEl = chipEl;
  document.body.appendChild(popover);
  // Position below chip, clamped to viewport
  var pw = popover.offsetWidth || 160;
  var leftPos = Math.min(rect.left, window.innerWidth - pw - 8);
  popover.style.cssText = 'position:fixed;top:' + (rect.bottom + 4) + 'px;left:' + Math.max(8, leftPos) + 'px;z-index:9999';
  activeChipPopover = popover;

  var inp = document.getElementById('chex-' + iid);
  if (inp) {
    inp.focus();
    inp.select();
    inp.onkeydown = function(e) {
      if (e.key === 'Enter') applyChipColor(iid);
      if (e.key === 'Escape') { popover.remove(); activeChipPopover = null; }
      e.stopPropagation();
    };
  }

  // Close on outside click — use mousedown instead of click to avoid
  // catching the same event that opened the popover
  setTimeout(function() {
    document.addEventListener('mousedown', function handler(e) {
      if (!popover.contains(e.target) && e.target !== chipEl) {
        popover.remove();
        activeChipPopover = null;
        document.removeEventListener('mousedown', handler);
      }
    });
  }, 100);
}

function applyChipColor(iid) {
  var inp = document.getElementById('chex-' + iid);
  if (!inp) {
    // Fallback: find input in active popover
    if (activeChipPopover) inp = activeChipPopover.querySelector('.chip-hex-input');
  }
  if (!inp) return;
  var hex = inp.value.trim();
  if (!hex.startsWith('#')) hex = '#' + hex;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) {
    inp.style.borderColor = '#c0392b';
    inp.style.boxShadow = '0 0 0 2px rgba(192,57,43,.2)';
    inp.focus();
    return;
  }
  // Find chip — try by iid first, then by data stored on popover
  var chip = document.getElementById('chip-' + iid);
  if (!chip && activeChipPopover && activeChipPopover._chipEl) chip = activeChipPopover._chipEl;
  if (chip) {
    chip.style.background = hex;
    chip.style.borderColor = 'rgba(0,0,0,.15)';
    chip.classList.remove('ink-chip-empty');
    chip.textContent = '';
  }
  if (activeChipPopover) { activeChipPopover.remove(); activeChipPopover = null; }
}

function rgbToHex(rgb) {
  var m = rgb.match(/rgb\((\d+),\s*(\d+),\s*(\d+)\)/);
  if (!m) return '';
  return '#' + [m[1],m[2],m[3]].map(function(n) { return ('0'+parseInt(n).toString(16)).slice(-2); }).join('');
}

function removeInkRow(recId, rowId) {
  var el = document.getElementById(rowId);
  if (el) el.remove();
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function escAttr(s) {
  if (!s) return "''";
  return "'" + String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,'\\n').replace(/\r/g,'') + "'";
}

// ─── AUTOCOMPLETE SEARCH (Add Ink form) ──────────────────────────────────────
var acTimers = {};
function inkAcSearch(impId, query) {
  var acEl = document.getElementById('ai-ac-' + impId);
  // Clear the stored full name whenever user types a new search
  var fnEl = document.getElementById('ai-fullname-' + impId);
  if (fnEl) { fnEl.value = ''; fnEl._storeKey = ''; }
  if (!query || query.trim().length < 2) { if (acEl) acEl.style.display = 'none'; return; }
  clearTimeout(acTimers[impId]);
  acTimers[impId] = setTimeout(function() {
    var q = query.trim();
    var filter = encodeURIComponent(
      'OR(FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.pantone + '})),' +
      'FIND(LOWER("' + q.replace(/"/g,'') + '"),LOWER({' + FI.name + '})))'
    );
    api('tblyPBucKoDwxDisT?returnFieldsByFieldId=true' +
      '&fields%5B%5D=' + FI.name +
      '&fields%5B%5D=' + FI.pantone +
      '&fields%5B%5D=' + FI.type +
      '&fields%5B%5D=' + FI.recipe +
      '&fields%5B%5D=' + FI.inkNotes +
      '&fields%5B%5D=' + FI.lastUpdated +
      '&fields%5B%5D=' + FI.mfr +
      '&filterByFormula=' + filter +
      '&pageSize=8'
    ).then(function(data) {
      var el = document.getElementById('ai-ac-' + impId);
      if (!el) return;
      var recs = data.records || [];
      if (!recs.length) {
        el.innerHTML = '<div class="ink-ac-none">No match — fill in manually</div>';
        el.style.display = 'block';
        return;
      }
      var h = '';
      recs.forEach(function(r) {
        var f = r.fields;
        var name = f[FI.name] || '';
        var typeName = f[FI.type] ? f[FI.type].name : '';
        var mfr = f[FI.mfr] ? f[FI.mfr].name : '';
        var recipe = f[FI.recipe] || '';
        var pantone = f[FI.pantone] || '';
        var meta = [typeName, mfr].filter(Boolean).join(' · ');
        var recipeSnippet = recipe ? recipe.split('\n')[0].substring(0, 50) : '';
        var dataJson = { name: name, pantone: pantone, type: typeName, mfr: mfr, recipe: recipe, createdTime: r.createdTime || '', lastUpdated: f[FI.lastUpdated] || '' };
        var lk = storeLabelData(dataJson);
        h += '<div class="ink-ac-row" onclick="inkAcSelect(\'' + impId + '\',\'' + lk + '\');event.stopPropagation()">';
        h += '<div class="ink-ac-row-name">' + escHtml(name) + '</div>';
        if (meta) h += '<div class="ink-ac-row-meta">' + escHtml(meta) + '</div>';
        if (recipeSnippet) h += '<div class="ink-ac-row-meta" style="color:var(--muted-lt)">' + escHtml(recipeSnippet) + (recipe.length > 50 ? '…' : '') + '</div>';
        h += '</div>';
      });
      el.innerHTML = h;
      el.style.display = 'block';
    }).catch(function() {});
  }, 280);
}

function inkAcSelect(impId, key) {
  try {
    var d = labelStore[key] || {};
    var pEl = document.getElementById('ai-pantone-' + impId);
    var tEl = document.getElementById('ai-type-'   + impId);
    var mEl = document.getElementById('ai-mfr-'    + impId);
    var rEl = document.getElementById('ai-recipe-' + impId);
    var sEl = document.getElementById('ai-search-' + impId);
    var fnEl = document.getElementById('ai-fullname-' + impId);
    if (pEl) pEl.value  = d.pantone || '';
    if (tEl) tEl.value  = d.type    || '';
    if (mEl) mEl.value  = d.mfr     || '';
    if (rEl) rEl.value  = d.recipe  || '';
    if (sEl) sEl.value  = d.name    || '';
    if (fnEl) { fnEl.value = d.name || ''; fnEl._storeKey = key; } // store key for timestamp retrieval
    var acEl = document.getElementById('ai-ac-' + impId);
    if (acEl) acEl.style.display = 'none';
  } catch(e) {}

// ─── LABEL RENDERING ─────────────────────────────────────────────────────────
var currentLabelData = null;

function buildLabelHTML(d) {
  var name = d.name || '';
  var recipe = d.recipe || '';
  var pantone = d.pantone || '';

  var lines = recipe ? recipe.split('\n') : [];
  var lineCount = lines.filter(function(l){ return l.trim(); }).length;

  // Pantone number — per-char sizing for the left column (~42% of 384px = ~161px wide)
  var pantoneLen = pantone.length;
  var BASE_SIZES = { 1:96, 2:90, 3:80, 4:68, 5:56, 6:46, 7:38, 8:32 };
  var basePantoneSize = BASE_SIZES[pantoneLen] || (pantoneLen > 8 ? 26 : 96);

  var nameFontSize, recipeFontSize, lineHeight, pantoneScale;
  if (lineCount <= 5) {
    nameFontSize   = name.length > 28 ? '14px' : '17px';
    recipeFontSize = '14px';
    lineHeight     = '1.65';
    pantoneScale   = 1.0;
  } else if (lineCount <= 8) {
    nameFontSize   = name.length > 28 ? '13px' : '15px';
    recipeFontSize = '12px';
    lineHeight     = '1.55';
    pantoneScale   = 0.88;
  } else {
    nameFontSize   = name.length > 28 ? '11px' : '13px';
    recipeFontSize = '10px';
    lineHeight     = '1.45';
    pantoneScale   = 0.75;
  }

  var pantoneFontSize = Math.round(basePantoneSize * pantoneScale) + 'px';

  var linesHtml = lines.map(function(l) {
    if (!l.trim()) return '<div style="height:4px"></div>';
    return '<div>' + escHtml(l) + '</div>';
  }).join('');

  // Landscape 384x192 — preview matches screen, print window rotates for Rollo
  return (
    '<div style="width:384px;height:192px;background:#fff;color:#000;' +
        'font-family:Helvetica,Arial,sans-serif;display:flex;flex-direction:column;' +
        'overflow:hidden;box-sizing:border-box;' +
        '-webkit-print-color-adjust:exact;print-color-adjust:exact">' +

      // TOP BAND
      '<div style="background:#000;-webkit-print-color-adjust:exact;print-color-adjust:exact;' +
          'padding:9px 14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-height:48px">' +
        '<div style="font-size:' + nameFontSize + ';font-weight:700;color:#fff;' +
            'text-align:center;line-height:1.2;font-family:Helvetica,Arial,sans-serif">' +
          escHtml(name) +
        '</div>' +
      '</div>' +

      // BOTTOM — two columns
      '<div style="flex:1;display:flex;overflow:hidden">' +
        '<div style="width:42%;display:flex;align-items:center;justify-content:center;padding:4px 4px 4px 8px;flex-shrink:0">' +
          '<div style="font-size:' + pantoneFontSize + ';font-weight:700;color:#000;' +
              'line-height:1;letter-spacing:-.02em;text-align:center;font-family:Helvetica,Arial,sans-serif">' +
            escHtml(pantone) +
          '</div>' +
        '</div>' +
        '<div style="flex:1;padding:8px 10px 8px 4px;display:flex;align-items:center;overflow:hidden">' +
          '<div style="font-size:' + recipeFontSize + ';font-weight:700;line-height:' + lineHeight + ';' +
              'font-family:Helvetica,Arial,sans-serif;color:#000;text-align:right;width:100%">' +
            linesHtml +
          '</div>' +
        '</div>' +
      '</div>' +

    '</div>'
  );
}

function isLight(hex) {
  if (!hex || hex.length < 7) return true;
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*0.299 + g*0.587 + b*0.114) > 145;
}

function openLabelOverlay(d) {
  if (!d) return;
