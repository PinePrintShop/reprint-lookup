<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SLC Inventory Test v10</title>
<style>
:root{
  --bg:#F2F2EE; --bg-soft:#F8F8F5; --surface:#fff;
  --border:#E5E5E0; --border-dk:#D0D0CA;
  --green:#1e6b45; --green-lt:#e8f5ee; --green-dk:#144d31;
  --text:#0D0D0B; --muted:#888880; --muted-lt:#BBBBB5;
  --yellow:#E8E832; --yellow-dim:#E8E83230; --yellow-border:#E8E83250;
  --red:#c0392b; --red-bg:#fdf2f2; --red-bd:#f5c6c6;
  --amb:#b7791f; --amb-bg:#fffbeb; --amb-bd:#fde68a;
  --sb-bg:#0A0A08; --sb-border:#1A1A16; --sb-active:#141410;
  --sans:Helvetica,Arial,sans-serif;
  --cond:'Helvetica Neue',Helvetica,Arial,sans-serif;
  --mono:'Courier New',monospace;
  --radius:4px; --radius-lg:6px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:14px/1.4 var(--sans)}
.wrap{max-width:1200px;margin:0 auto;padding:20px}
header{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px}
h1{font:bold 20px/1 var(--cond);margin:0 0 4px;letter-spacing:.02em;text-transform:uppercase}
.sub{color:var(--muted);font-size:12px;letter-spacing:.05em;text-transform:uppercase}

.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-top:12px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font:bold 10px/1 var(--cond);letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.field input,.field select{padding:8px 10px;border:1px solid var(--border-dk);border-radius:var(--radius);background:var(--surface);font:14px/1 var(--mono);min-width:160px}
.field input:focus,.field select:focus{outline:none;border-color:var(--text);box-shadow:0 0 0 2px var(--yellow-dim)}

button{padding:8px 14px;border:1px solid var(--text);background:var(--text);color:var(--yellow);
  font:bold 12px/1 var(--cond);letter-spacing:.06em;text-transform:uppercase;border-radius:var(--radius);cursor:pointer}
button:hover{background:#000}
button:disabled{opacity:.4;cursor:not-allowed}
button.sec{background:var(--surface);color:var(--text)}
button.sec:hover{background:var(--bg-soft)}
button.sm{padding:5px 10px;font-size:11px}

.token{margin-left:auto;display:flex;gap:6px;align-items:center}
.token input{font:12px/1 var(--mono);min-width:200px}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:12px}
.panel h2{font:bold 13px/1 var(--cond);letter-spacing:.06em;text-transform:uppercase;margin:0 0 10px;color:var(--muted)}
.panel.empty{color:var(--muted);text-align:center;padding:40px;font-style:italic}

.banner{padding:10px 14px;border-radius:var(--radius);margin-bottom:10px;font-size:13px}
.banner.amb{background:var(--amb-bg);border:1px solid var(--amb-bd);color:#7a4f0e}
.banner.red{background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red)}
.banner.grn{background:var(--green-lt);border:1px solid #c6e3d3;color:var(--green-dk)}
.banner b{font-weight:bold}

.candidates{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.cand{padding:8px 12px;background:var(--bg-soft);border:1px solid var(--border-dk);border-radius:var(--radius);
  font:13px/1 var(--mono);cursor:pointer;display:inline-flex;gap:10px;align-items:center;user-select:none}
.cand:hover{border-color:var(--text);background:var(--surface)}
.cand:active{transform:scale(0.97)}
.cand.active{border-color:var(--green);background:var(--green-lt);color:var(--green-dk)}
.cand .ct{color:var(--muted);font-size:11px}
.cand.active .ct{color:var(--green)}

.detail{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:13px;margin-bottom:12px}
.detail .l{color:var(--muted);font:bold 10px/1 var(--cond);letter-spacing:.06em;text-transform:uppercase}
.detail .v{font:14px/1.3 var(--mono);word-break:break-all}

.matrix{overflow-x:auto;margin-top:6px}
table.mx{border-collapse:collapse;font:13px/1 var(--mono)}
table.mx th,table.mx td{border:1px solid var(--border);padding:6px 8px;text-align:right;min-width:54px}
table.mx th{background:var(--bg-soft);font:bold 11px/1 var(--cond);letter-spacing:.06em;text-transform:uppercase;color:var(--muted);text-align:center}
table.mx th.color{text-align:left;min-width:160px;font-family:var(--sans)}
table.mx td.color{text-align:left;font-family:var(--sans);background:var(--bg-soft);font-weight:bold;font-size:13px}
table.mx td.q-zero{color:var(--muted-lt)}
table.mx td.q-pos{color:var(--green-dk);background:var(--green-lt)}
table.mx td.q-hi{color:var(--green-dk);background:#cfe5d8;font-weight:bold}

.stats{display:flex;gap:20px;margin:8px 0 0;font-size:12px;color:var(--muted)}
.stats b{color:var(--text);font-family:var(--mono);font-size:14px}

.log{background:#0F0F0D;color:#A8E08A;font:12px/1.5 var(--mono);padding:12px;border-radius:var(--radius);margin-top:8px;max-height:200px;overflow:auto}
.log .err{color:#FF8B7A}
.log .warn{color:#FFD27A}
.log .step{color:#9DC9FF}

.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1>SLC Inventory Test</h1>
  <div class="sub">v10 · diagnostic · brand+style → productId + inventory + pricing</div>
  <div class="row">
    <div class="field">
      <label>Brand (lineName)</label>
      <select id="brand">
        <option value="Bella + Canvas">Bella + Canvas</option>
        <option value="Gildan">Gildan</option>
        <option value="Comfort Colors">Comfort Colors</option>
        <option value="Independent Trading Co">Independent Trading Co</option>
        <option value="Next Level Apparel">Next Level Apparel</option>
        <option value="Rabbit Skins">Rabbit Skins</option>
      </select>
    </div>
    <div class="field">
      <label>Style code (substring match)</label>
      <input id="style" type="text" placeholder="3001" value="3001">
    </div>
    <button id="go">Resolve & Load</button>
    <div class="token">
      <span class="muted" style="font-size:11px">SLC creds in worker</span>
    </div>
  </div>
</header>

<div id="status"></div>

<section class="panel" id="resolverPanel" style="display:none">
  <h2>Step 1 · Brand catalog (getProductSellable)</h2>
  <div id="resolverInfo" class="muted">No catalog loaded yet.</div>
  <div class="candidates" id="candidates"></div>
</section>

<section class="panel" id="productPanel" style="display:none">
  <h2>Step 2 · Inventory for selected productId</h2>
  <div id="productInfo"></div>
</section>

<section class="panel" id="logPanel">
  <h2>Log</h2>
  <div class="log" id="log"></div>
</section>

</div>

<script>
//==============================================================================
// SLC TEST v10 — diagnostic page for productId resolution + inventory + pricing.
//
// v10 CHANGE: catalog call MUST include isSellable=true.
//   SLC's getProductSellable rejects lineName-only filtering with a generic
//   "Unexpected subelement {.../}GetProductSellableRequest" fault. Adding
//   isSellable=true completes the schema-required filter set and returns the
//   full brand catalog (~2.3 MB for Gildan). Yesterday's working envelope had
//   it; v9 dropped it accidentally.
//
// v9 CHANGE: added getConfigurationAndPricing alongside inventory.
//   - Pricing fetched in parallel with inventory after candidate chip clicked.
//   - Per-part price map joined on partId (same 12-digit GTIN as inventory).
//   - Matrix gains a "Price" column showing per-color modal price.
//   - Pricing summary line below the matrix shows distribution + pending count.
//   - Worker v8 unlocked this — getConfigurationAndPricing now returns real data.
//
// The diagnostic that drove v8's design:
//   - productId 31225 (Gildan 5000B) returns real stock (5,625 units across 58 SKUs)
//   - productId 315 (legacy Bella+Canvas 3001) returns all zeros across 764 SKUs
//   - Both responses parse identically; the data is genuinely zero
//   - This means productId 315 is deprecated. The current B+C 3001 lives at a
//     different productId, discoverable via getProductSellable.
//
// Flow:
//   1. User picks brand + types style substring (e.g. "Bella + Canvas" + "3001")
//   2. Page calls getProductSellable(lineName=brand) → list of (productId, partId) pairs
//   3. Page groups by productId, sorts by partId-count descending (most-stocked first)
//   4. User clicks a productId chip → page calls getInventoryLevels + getConfigurationAndPricing in parallel
//   5. Page reads partDescription, renders matrix with stock + price, summary banner
//   6. If all zero stock, banner suggests trying a different productId chip
//   7. If pricing partially zero (SLC data reload in progress), summary shows pending count
//==============================================================================

var WORKER = 'https://pine-workers.stephen-dab.workers.dev/proxy/slc';

// Namespace constants for response parsing (use NS-aware lookups via wildcard)
var INV_NS    = 'http://www.promostandards.org/WSDL/Inventory/2.0.0/';
var PROD_NS   = 'http://www.promostandards.org/WSDL/ProductDataService/2.0.0/';
var SHARED_INV_NS  = 'http://www.promostandards.org/WSDL/Inventory/2.0.0/SharedObjects/';
var SHARED_PROD_NS = 'http://www.promostandards.org/WSDL/ProductDataService/2.0.0/SharedObjects/';

var state = {
  brand: null,            // string (current brand)
  candidates: [],         // [{productId, partCount}] sorted desc
  selectedProductId: null,
  invByProductId: {},     // cache: productId → parsed inventory result
  priceByProductId: {}    // cache: productId → parsed pricing result (v9)
};

//------------------------------------------------------------------------------
// DOM helpers
//------------------------------------------------------------------------------
function $(id){ return document.getElementById(id); }
function el(tag, cls, txt){ var e=document.createElement(tag); if(cls)e.className=cls; if(txt!=null)e.textContent=txt; return e; }
function clear(node){ while(node.firstChild) node.removeChild(node.firstChild); }

//------------------------------------------------------------------------------
// Logging
//------------------------------------------------------------------------------
function log(msg, kind){
  var line = el('div', kind||null);
  var ts = new Date().toLocaleTimeString();
  line.textContent = '['+ts+'] '+msg;
  $('log').appendChild(line);
  $('log').scrollTop = $('log').scrollHeight;
}

//------------------------------------------------------------------------------
// Worker calls — all SOAP-via-JSON via the Cloudflare worker.
//
// v10 NOTE: SOAP services return HTTP 500 when they emit a SOAP Fault. The
// worker streams that through unchanged. We don't treat 500 as a hard error;
// instead we return the body and let downstream parseXML + checkServiceMessage
// extract a readable fault. Only treat NON-XML 5xx responses (where text doesn't
// start with <?xml or <soap) as a hard worker error.
//------------------------------------------------------------------------------
async function workerCall(service, body){
  var url = WORKER + '/' + service;
  log('POST '+url+' op='+body.operation, 'step');
  var t0 = performance.now();
  var res = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  var text = await res.text();
  var ms = Math.round(performance.now() - t0);
  log('  ← '+res.status+' '+text.length+'B in '+ms+'ms', res.ok?null:'warn');
  // If non-2xx but body looks like SOAP/XML, return it and let the parser surface the fault.
  var trimmed = (text || '').trim();
  var looksXml = trimmed.startsWith('<?xml') || trimmed.startsWith('<soap') || trimmed.startsWith('<SOAP');
  if(!res.ok && !looksXml){
    throw new Error('Worker '+res.status+': '+text.slice(0,200));
  }
  return text;
}

//------------------------------------------------------------------------------
// Response parsing — wildcard NS lookup handles both per-element prefixes
// (sellable responses use s506:productId, s507:partId etc.) and bare-default
// namespace elements (inventory responses).
//------------------------------------------------------------------------------
function parseXML(text){
  var doc = new DOMParser().parseFromString(text, 'application/xml');
  var err = doc.querySelector('parsererror');
  if(err) throw new Error('XML parse error: '+err.textContent.slice(0,200));
  return doc;
}

function checkServiceMessage(doc){
  // ServiceMessageArray with severity=Error → SLC handler returned a structured error
  var msgs = doc.getElementsByTagNameNS('*', 'ServiceMessage');
  for(var i=0;i<msgs.length;i++){
    var sevEl = msgs[i].getElementsByTagNameNS('*','severity')[0];
    if(sevEl && (sevEl.textContent||'').toLowerCase().indexOf('error') >= 0){
      var code = msgs[i].getElementsByTagNameNS('*','code')[0];
      var desc = msgs[i].getElementsByTagNameNS('*','description')[0];
      throw new Error('SLC '+(code?code.textContent:'?')+': '+(desc?desc.textContent:'(no description)'));
    }
  }
  // Raw SOAP Fault → parser/routing layer rejection
  var fault = doc.getElementsByTagNameNS('*', 'Fault')[0];
  if(fault){
    var fs = fault.getElementsByTagName('faultstring')[0];
    throw new Error('SOAP Fault: '+(fs?fs.textContent:'(unknown)'));
  }
}

function parseSellable(doc){
  checkServiceMessage(doc);
  var pairs = [];
  var sellables = doc.getElementsByTagNameNS('*', 'ProductSellable');
  for(var i=0;i<sellables.length;i++){
    var s = sellables[i];
    var pidEl = s.getElementsByTagNameNS('*','productId')[0];
    var partEl = s.getElementsByTagNameNS('*','partId')[0];
    if(pidEl && partEl){
      pairs.push({productId: pidEl.textContent.trim(), partId: partEl.textContent.trim()});
    }
  }
  return pairs;
}

function parseInventory(doc){
  checkServiceMessage(doc);
  var productEl = doc.getElementsByTagNameNS('*','productId')[0];
  var productId = productEl ? productEl.textContent.trim() : null;
  var parts = [];
  var partInvs = doc.getElementsByTagNameNS('*', 'PartInventory');
  for(var i=0;i<partInvs.length;i++){
    var p = partInvs[i];
    var partId = first(p,'partId');
    var color  = first(p,'partColor');
    var size   = first(p,'labelSize');
    var desc   = first(p,'partDescription');
    // quantityAvailable > Quantity > value
    var qty = 0;
    var qaEl = p.getElementsByTagNameNS('*','quantityAvailable')[0];
    if(qaEl){
      var valEl = qaEl.getElementsByTagNameNS('*','value')[0];
      if(valEl) qty = parseInt(valEl.textContent.trim(), 10) || 0;
    }
    parts.push({partId:partId, color:color, size:size, desc:desc, qty:qty});
  }
  return {productId: productId, parts: parts};
}
function first(parent, tag){
  var e = parent.getElementsByTagNameNS('*', tag)[0];
  return e ? e.textContent.trim() : '';
}

// Parse getConfigurationAndPricing response (v9).
// Schema (per actual SLC response 4/28/26):
//   <ns3:GetConfigurationAndPricingResponse>
//     <ns3:Configuration>
//       <ns3:PartArray>
//         <ns3:Part>
//           <partId>191675398254</partId>                  ← 12-digit GTIN, same key as inventory
//           <partDescription>Gildan ... Dusty Rose XS</partDescription>
//           <ns3:PartPriceArray>
//             <ns3:PartPrice>
//               <minQuantity>1</minQuantity>
//               <price>2.50</price>                        ← 0 means "pending data reload"
//               <priceUom>EA</priceUom>
//             </ns3:PartPrice>
//             (...possibly more tiers at different minQuantity...)
//           </ns3:PartPriceArray>
//         </ns3:Part>
//       </ns3:PartArray>
//     </ns3:Configuration>
//   </ns3:GetConfigurationAndPricingResponse>
//
// Returns { byPartId: { partId: { price, minQuantity, desc, tiers:[...] } }, summary: {...} }
function parsePricing(doc){
  checkServiceMessage(doc);
  var byPartId = {};
  var partEls = doc.getElementsByTagNameNS('*', 'Part');
  for(var i=0;i<partEls.length;i++){
    var p = partEls[i];
    // partId may be prefixed (e.g. <s320:partId>) — wildcard NS lookup handles it
    var partId = first(p, 'partId');
    if(!partId) continue;
    var desc = first(p, 'partDescription');
    // Collect all price tiers
    var tiers = [];
    var priceEls = p.getElementsByTagNameNS('*', 'PartPrice');
    for(var j=0;j<priceEls.length;j++){
      var pp = priceEls[j];
      var pr = first(pp, 'price');
      var mq = first(pp, 'minQuantity');
      var uom = first(pp, 'priceUom');
      if(pr === '') continue;
      tiers.push({
        price: parseFloat(pr) || 0,
        minQuantity: parseInt(mq || '1', 10) || 1,
        uom: uom || 'EA'
      });
    }
    // Sort tiers by minQuantity ascending so [0] is the base price
    tiers.sort(function(a,b){ return a.minQuantity - b.minQuantity; });
    byPartId[partId] = {
      partId: partId,
      desc: desc,
      price: tiers.length ? tiers[0].price : 0,
      minQuantity: tiers.length ? tiers[0].minQuantity : 1,
      tiers: tiers
    };
  }
  // Build summary stats
  var partIds = Object.keys(byPartId);
  var priced = [], pending = [];
  for(var k=0;k<partIds.length;k++){
    var pr2 = byPartId[partIds[k]].price;
    if(pr2 > 0) priced.push(pr2);
    else pending.push(partIds[k]);
  }
  var summary = {
    totalParts: partIds.length,
    pricedCount: priced.length,
    pendingCount: pending.length,
    minPrice: priced.length ? Math.min.apply(null, priced) : 0,
    maxPrice: priced.length ? Math.max.apply(null, priced) : 0
  };
  return { byPartId: byPartId, summary: summary };
}

//------------------------------------------------------------------------------
// Step 1: getProductSellable for brand → group by productId
//------------------------------------------------------------------------------
async function loadCatalog(brand){
  log('Loading catalog for brand: '+brand, 'step');
  // isSellable=true is REQUIRED by SLC's parser — lineName alone faults.
  var text = await workerCall('productdata', {
    operation: 'getProductSellable',
    lineName: brand,
    isSellable: true
  });
  var doc = parseXML(text);
  var pairs = parseSellable(doc);
  log('  parsed '+pairs.length+' (productId, partId) pairs');

  // Group by productId, count parts
  var counts = {};
  for(var i=0;i<pairs.length;i++){
    counts[pairs[i].productId] = (counts[pairs[i].productId]||0) + 1;
  }
  var grouped = Object.keys(counts).map(function(pid){
    return {productId: pid, partCount: counts[pid]};
  });
  // Sort by partCount desc — most-stocked styles first
  grouped.sort(function(a,b){ return b.partCount - a.partCount; });

  log('  → '+grouped.length+' distinct productIds');
  return grouped;
}

//------------------------------------------------------------------------------
// Step 2: getInventoryLevels for one productId
//------------------------------------------------------------------------------
async function loadInventory(productId){
  if(state.invByProductId[productId]){
    log('Using cached inventory for productId='+productId);
    return state.invByProductId[productId];
  }
  log('Fetching inventory for productId='+productId, 'step');
  var text = await workerCall('inventory', {
    operation: 'getInventoryLevels',
    productId: productId
  });
  var doc = parseXML(text);
  var inv = parseInventory(doc);
  log('  parsed '+inv.parts.length+' parts');
  state.invByProductId[productId] = inv;
  return inv;
}

//------------------------------------------------------------------------------
// Step 3: getConfigurationAndPricing for one productId (v9)
//
// Returns a soft-fail: pricing errors don't break inventory rendering. The
// caller checks for `.error` and degrades gracefully (matrix renders without
// a Price column).
//------------------------------------------------------------------------------
async function loadPricing(productId){
  if(state.priceByProductId[productId]){
    log('Using cached pricing for productId='+productId);
    return state.priceByProductId[productId];
  }
  log('Fetching pricing for productId='+productId, 'step');
  try {
    var text = await workerCall('pricing', {
      operation: 'getConfigurationAndPricing',
      productId: productId
    });
    var doc = parseXML(text);
    var pricing = parsePricing(doc);
    log('  parsed '+pricing.summary.totalParts+' parts, '+
        pricing.summary.pricedCount+' priced, '+
        pricing.summary.pendingCount+' pending');
    state.priceByProductId[productId] = pricing;
    return pricing;
  } catch(e){
    log('  pricing fetch/parse failed: '+e.message, 'warn');
    var fallback = { byPartId:{}, summary:{totalParts:0,pricedCount:0,pendingCount:0,minPrice:0,maxPrice:0}, error: e.message };
    state.priceByProductId[productId] = fallback;
    return fallback;
  }
}

//------------------------------------------------------------------------------
// Style-substring filtering of candidates
//
// We can't filter candidate productIds by style code from getProductSellable
// alone (it has only productId+partId, no descriptions). So the "style"
// field is purely a hint to the user during candidate selection — we'll
// apply it to partDescription text once we fetch inventory.
//
// Heuristic: highlight the candidate whose first-fetched description matches.
//------------------------------------------------------------------------------
function styleMatches(desc, styleQuery){
  if(!styleQuery) return false;
  if(!desc) return false;
  // Substring match, case-insensitive, with simple word-boundary preference
  var d = desc.toLowerCase();
  var s = styleQuery.toLowerCase().trim();
  if(!s) return false;
  return d.indexOf(s) >= 0;
}

//------------------------------------------------------------------------------
// Rendering
//------------------------------------------------------------------------------
function renderResolver(){
  $('resolverPanel').style.display = 'block';
  var info = $('resolverInfo');
  info.innerHTML = 'Brand <b>'+esc(state.brand)+'</b> · '+state.candidates.length+
    ' distinct productIds · sorted by part count (most-stocked styles first). Click a chip to load inventory.';

  var box = $('candidates');
  clear(box);
  state.candidates.forEach(function(c){
    var chip = el('div','cand');
    chip.dataset.pid = c.productId;
    chip.appendChild(el('span',null,'pid '+c.productId));
    chip.appendChild(el('span','ct',c.partCount+' parts'));
    chip.addEventListener('click', function(ev){
      ev.preventDefault();
      ev.stopPropagation();
      log('CLICK chip productId='+c.productId, 'step');
      selectProductId(c.productId).catch(function(e){
        log('CLICK handler error: '+e.message, 'err');
      });
    });
    box.appendChild(chip);
  });
  log('Rendered '+state.candidates.length+' chips. Click any to load inventory.', 'step');
}

function highlightActiveCandidate(productId){
  var chips = $('candidates').querySelectorAll('.cand');
  for(var i=0;i<chips.length;i++){
    if(chips[i].dataset.pid === productId) chips[i].classList.add('active');
    else chips[i].classList.remove('active');
  }
}

function renderProduct(inv, styleQuery, pricing){
  $('productPanel').style.display = 'block';
  var box = $('productInfo');
  clear(box);

  // Detail block — productId + sample description + stock summary
  var firstDesc = inv.parts.length ? inv.parts[0].desc : '';
  var totalStock = inv.parts.reduce(function(a,p){ return a+p.qty; }, 0);
  var nonzero = inv.parts.filter(function(p){ return p.qty>0; }).length;
  var matchesStyle = styleMatches(firstDesc, styleQuery);

  // Banner — guidance based on result shape
  var bnr;
  if(nonzero === 0){
    bnr = el('div','banner amb');
    bnr.innerHTML = '<b>All zero stock.</b> productId <code>'+esc(inv.productId)+
      '</code> may be deprecated. Try another candidate above — most-stocked productIds are listed first.';
  } else if(styleQuery && !matchesStyle){
    bnr = el('div','banner amb');
    bnr.innerHTML = '<b>Style mismatch?</b> You typed "'+esc(styleQuery)+
      '" but description is "'+esc(firstDesc)+'". Try another productId chip if this isn\'t what you meant.';
  } else {
    bnr = el('div','banner grn');
    bnr.innerHTML = '<b>'+totalStock.toLocaleString()+' units</b> across '+nonzero+' SKUs.';
  }
  box.appendChild(bnr);

  // Pricing summary banner (v9) — separate from stock banner
  if(pricing){
    var psum = pricing.summary;
    var pbnr;
    if(pricing.error){
      pbnr = el('div','banner red');
      pbnr.innerHTML = '<b>Pricing unavailable:</b> '+esc(pricing.error);
    } else if(psum.totalParts === 0){
      pbnr = el('div','banner amb');
      pbnr.innerHTML = '<b>No pricing data</b> returned for this productId.';
    } else if(psum.pricedCount === 0){
      pbnr = el('div','banner amb');
      pbnr.innerHTML = '<b>All prices pending</b> ('+psum.totalParts+
        ' parts at $0.00). SLC data reload may be in progress — try again later.';
    } else {
      var range = psum.minPrice === psum.maxPrice
        ? '$'+psum.minPrice.toFixed(2)
        : '$'+psum.minPrice.toFixed(2)+'–$'+psum.maxPrice.toFixed(2);
      var msg = '<b>'+psum.pricedCount+' of '+psum.totalParts+'</b> parts priced ('+range+')';
      if(psum.pendingCount > 0){
        msg += ' · <span style="color:var(--amb)">'+psum.pendingCount+' pending</span>';
      }
      pbnr = el('div','banner grn');
      pbnr.innerHTML = msg;
    }
    box.appendChild(pbnr);
  }

  // Detail rows
  var detail = el('div','detail');
  function addRow(label, value){
    detail.appendChild(el('div','l',label));
    var v = el('div','v'); v.textContent = value || '—'; detail.appendChild(v);
  }
  addRow('productId', inv.productId);
  addRow('Sample partDescription', firstDesc);
  addRow('Total parts', String(inv.parts.length));
  addRow('Stock total / SKUs in stock', totalStock.toLocaleString()+' units / '+nonzero+' SKUs');
  if(pricing && pricing.summary.pricedCount > 0){
    var range2 = pricing.summary.minPrice === pricing.summary.maxPrice
      ? '$'+pricing.summary.minPrice.toFixed(2)
      : '$'+pricing.summary.minPrice.toFixed(2)+' – $'+pricing.summary.maxPrice.toFixed(2);
    addRow('Customer price range', range2 + ' EA');
  }
  box.appendChild(detail);

  // Matrix: rows = colors, cols = sizes, with price column (v9)
  if(inv.parts.length > 0){
    box.appendChild(buildMatrix(inv.parts, pricing));
  }
}

function buildMatrix(parts, pricing){
  // Collect distinct sizes in canonical order, distinct colors as encountered
  var sizeOrder = ['XS','S','M','L','XL','2XL','3XL','4XL','5XL','6XL','One Size','OS'];
  var seenSizes = {};
  var sizes = [];
  var seenColors = {};
  var colors = [];
  var grid = {}; // grid[color][size] = qty
  var priceGrid = {}; // priceGrid[color][size] = price (v9)

  for(var i=0;i<parts.length;i++){
    var p = parts[i];
    if(!seenColors[p.color]){
      seenColors[p.color] = true; colors.push(p.color);
    }
    if(!seenSizes[p.size]){
      seenSizes[p.size] = true; sizes.push(p.size);
    }
    if(!grid[p.color]) grid[p.color] = {};
    if(!priceGrid[p.color]) priceGrid[p.color] = {};
    // If duplicate (e.g. SLC-short + GTIN for same size+color), sum them
    grid[p.color][p.size] = (grid[p.color][p.size] || 0) + p.qty;
    // Pricing join — partId from inventory == partId from pricing (12-digit GTIN)
    if(pricing && pricing.byPartId && pricing.byPartId[p.partId]){
      priceGrid[p.color][p.size] = pricing.byPartId[p.partId].price;
    }
  }
  // Sort sizes by canonical order; unknowns to the right
  sizes.sort(function(a,b){
    var ai = sizeOrder.indexOf(a); var bi = sizeOrder.indexOf(b);
    if(ai<0 && bi<0) return a.localeCompare(b);
    if(ai<0) return 1;
    if(bi<0) return -1;
    return ai - bi;
  });
  // Sort colors by total stock desc (so non-zero colors float to top)
  colors.sort(function(a,b){
    var ta = sizes.reduce(function(s,sz){ return s+(grid[a][sz]||0); },0);
    var tb = sizes.reduce(function(s,sz){ return s+(grid[b][sz]||0); },0);
    return tb - ta;
  });

  // Per-color modal price (most common non-zero price across that color's sizes)
  // Returns {price, allSame, anyPending}
  function colorPrice(color){
    var found = []; var pending = 0;
    for(var s=0;s<sizes.length;s++){
      var px = priceGrid[color][sizes[s]];
      if(px === undefined) continue;
      if(px > 0) found.push(px); else pending++;
    }
    if(found.length === 0){
      return {price: 0, allSame: true, anyPending: pending > 0};
    }
    // Mode (most common); fall back to min if multimodal
    var counts = {};
    for(var f=0;f<found.length;f++){
      counts[found[f]] = (counts[found[f]]||0) + 1;
    }
    var modePrice = found[0]; var modeCount = 0;
    for(var k in counts){
      if(counts[k] > modeCount){ modeCount = counts[k]; modePrice = parseFloat(k); }
    }
    var distinct = Object.keys(counts).length;
    return {
      price: modePrice,
      allSame: distinct === 1,
      anyPending: pending > 0
    };
  }

  var hasPricing = pricing && pricing.byPartId && Object.keys(pricing.byPartId).length > 0;

  var wrap = el('div','matrix');
  var t = el('table','mx');
  var thead = el('thead'); var hr = el('tr');
  hr.appendChild(el('th','color','Color'));
  sizes.forEach(function(sz){ hr.appendChild(el('th',null,sz)); });
  hr.appendChild(el('th',null,'Total'));
  if(hasPricing) hr.appendChild(el('th',null,'Price'));
  thead.appendChild(hr); t.appendChild(thead);
  var tbody = el('tbody');
  colors.forEach(function(c){
    var tr = el('tr');
    tr.appendChild(el('td','color',c));
    var rowTotal = 0;
    sizes.forEach(function(sz){
      var q = grid[c][sz] || 0; rowTotal += q;
      var td = el('td',null, q.toLocaleString());
      if(q===0) td.className = 'q-zero';
      else if(q>=200) td.className = 'q-hi';
      else td.className = 'q-pos';
      // Add price tooltip if available
      var px = priceGrid[c][sz];
      if(px !== undefined && px > 0){
        td.title = 'partId price: $'+px.toFixed(2);
      } else if(px === 0){
        td.title = 'price pending (SLC data reload)';
      }
      tr.appendChild(td);
    });
    var tot = el('td',null,rowTotal.toLocaleString());
    tot.style.fontWeight='bold';
    if(rowTotal===0) tot.className='q-zero';
    tr.appendChild(tot);

    if(hasPricing){
      var cp = colorPrice(c);
      var pcell;
      if(cp.price > 0){
        var label = '$'+cp.price.toFixed(2);
        if(!cp.allSame) label += '*'; // asterisk indicates variance
        if(cp.anyPending) label += '⏳';
        pcell = el('td',null,label);
        pcell.style.fontFamily = 'var(--mono)';
        pcell.style.color = 'var(--text)';
        pcell.style.fontWeight = 'bold';
        if(!cp.allSame || cp.anyPending){
          pcell.title = (cp.allSame ? '' : 'Prices vary across sizes. ')
            + (cp.anyPending ? 'Some sizes pending SLC data reload.' : '');
        }
      } else {
        pcell = el('td','q-zero','—');
        pcell.title = 'All prices pending SLC data reload';
      }
      tr.appendChild(pcell);
    }

    tbody.appendChild(tr);
  });
  t.appendChild(tbody);
  wrap.appendChild(t);

  // Footer note about price column conventions (v9)
  if(hasPricing){
    var note = el('div','muted');
    note.style.fontSize = '11px';
    note.style.marginTop = '6px';
    note.style.fontStyle = 'italic';
    note.innerHTML = 'Price column shows the modal price across the color\u2019s sizes. ' +
      '<b>*</b> = prices vary across sizes (hover for detail). ' +
      '<b>⏳</b> = some sizes have pending prices ($0.00 from SLC, awaiting data reload).';
    wrap.appendChild(note);
  }

  return wrap;
}

function esc(s){ return String(s||'').replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
}); }

//------------------------------------------------------------------------------
// Event flow
//------------------------------------------------------------------------------
async function onGo(){
  $('go').disabled = true;
  $('status').innerHTML = '';
  state.brand = $('brand').value;
  state.candidates = [];
  state.selectedProductId = null;
  state.invByProductId = {};
  $('candidates').innerHTML = '';
  $('productPanel').style.display = 'none';
  try {
    state.candidates = await loadCatalog(state.brand);
    renderResolver();
    if(state.candidates.length === 0){
      $('status').appendChild(banner('amb','No productIds returned for brand "'+esc(state.brand)+'". Try another brand.'));
    }
    // No auto-select — user clicks a chip when ready
  } catch(e){
    log('FAIL: '+e.message, 'err');
    $('status').appendChild(banner('red','Catalog fetch failed: '+esc(e.message)));
  }
  $('go').disabled = false;
}

async function selectProductId(productId){
  log('selectProductId('+productId+') start', 'step');
  state.selectedProductId = productId;
  highlightActiveCandidate(productId);
  try {
    // Fetch inventory + pricing in parallel (v9)
    var both = await Promise.all([
      loadInventory(productId),
      loadPricing(productId)
    ]);
    var inv = both[0];
    var pricing = both[1];
    log('  inventory: '+inv.parts.length+' parts; pricing: '+
        pricing.summary.pricedCount+'/'+pricing.summary.totalParts+' priced');
    try {
      renderProduct(inv, $('style').value, pricing);
      log('  render OK');
    } catch(re){
      log('  render error: '+re.message+' — '+(re.stack||'').split('\n')[1], 'err');
      $('productPanel').style.display = 'block';
      var box = $('productInfo'); clear(box);
      box.appendChild(banner('red','Render failed: '+esc(re.message)));
    }
  } catch(e){
    log('  inventory fetch failed: '+e.message, 'err');
    $('productPanel').style.display = 'block';
    var box2 = $('productInfo'); clear(box2);
    box2.appendChild(banner('red','Inventory fetch failed: '+esc(e.message)));
  }
}

function banner(kind, html){
  var d = el('div','banner '+kind);
  d.innerHTML = html;
  return d;
}

document.addEventListener('DOMContentLoaded', function(){
  $('go').addEventListener('click', onGo);
  $('style').addEventListener('keydown', function(ev){ if(ev.key==='Enter') onGo(); });
  window.addEventListener('error', function(ev){
    log('UNCAUGHT: '+(ev.message||'?')+' @ '+(ev.filename||'?')+':'+(ev.lineno||'?'), 'err');
  });
  window.addEventListener('unhandledrejection', function(ev){
    log('UNHANDLED PROMISE: '+(ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason)), 'err');
  });
  log('Ready. Pick a brand and click Resolve & Load.', 'step');
});
