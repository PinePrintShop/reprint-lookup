<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pine UPC Manager v10</title>
    
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    
    <style>
        /* Pine Central Design System */
        :root {
            --bg: #F2F2EE;
            --surface: #fff;
            --border: #E5E5E0;
            --border-dk: #D0D0CA;
            --green: #1e6b45;
            --green-lt: #e8f5ee;
            --green-dk: #144d31;
            --text: #0D0D0B;
            --muted: #888880;
            --muted-lt: #BBBBB5;
            --yellow: #E8E832;
            --yellow-dim: #E8E83230;
            --yellow-border: #E8E83250;
            --red: #c0392b;
            --red-bg: #fdf2f2;
            --red-bd: #f5c6c6;
            --amb: #b7791f;
            --amb-bg: #fffbeb;
            --amb-bd: #fde68a;
            --sb-bg: #0A0A08;
            --sb-border: #1A1A16;
            --sb-active: #141410;
            --sans: Helvetica, Arial, sans-serif;
            --radius: 4px;
            --radius-lg: 6px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .header p {
            color: var(--muted);
            font-size: 14px;
        }
        
        /* Token Section */
        .token-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .token-input-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        
        .token-input {
            flex: 1;
        }
        
        /* Status Messages */
        .status {
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
        }
        
        .status.success {
            background: var(--green-lt);
            color: var(--green-dk);
            border: 1px solid var(--green);
        }
        
        .status.error {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-bd);
        }
        
        .status.loading {
            background: var(--amb-bg);
            color: var(--amb);
            border: 1px solid var(--amb-bd);
        }
        
        .status.info {
            background: var(--yellow-dim);
            color: var(--text);
            border: 1px solid var(--yellow-border);
        }
        
        /* Grid Layout */
        .grid {
            display: grid;
            gap: 20px;
        }
        
        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }
        
        @media (max-width: 900px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        
        /* Sections */
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .section-header {
            background: var(--sb-bg);
            color: var(--surface);
            padding: 16px 20px;
        }
        
        .section-header h2 {
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .section-content {
            padding: 20px;
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            color: var(--text);
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-dk);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--surface);
            color: var(--text);
            font-family: var(--sans);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--yellow);
            box-shadow: 0 0 0 2px var(--yellow-dim);
        }
        
        /* Buttons */
        .btn {
            padding: 10px 16px;
            border: 1px solid var(--border-dk);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-family: var(--sans);
        }
        
        .btn:hover {
            background: var(--yellow-dim);
            border-color: var(--yellow);
        }
        
        .btn-primary {
            background: var(--yellow);
            border-color: var(--yellow);
            color: var(--text);
        }
        
        .btn-primary:hover {
            background: var(--yellow);
            opacity: 0.9;
        }
        
        .btn-green {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }
        
        .btn-green:hover {
            background: var(--green-dk);
        }
        
        .btn-red {
            background: var(--red);
            border-color: var(--red);
            color: white;
        }
        
        /* Line Item Cards */
        .line-item-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 16px;
            background: var(--surface);
        }
        
        .line-item-header {
            padding: 12px 16px;
            background: var(--yellow-dim);
            border-bottom: 1px solid var(--border);
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .line-item-body {
            padding: 16px;
        }
        
        .line-item-meta {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        
        .barcode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-top: 12px;
        }
        
        .barcode-item {
            text-align: center;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
        }
        
        .barcode-size {
            font-weight: 600;
            font-size: 11px;
            margin-bottom: 2px;
        }
        
        .barcode-code {
            font-family: monospace;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 4px;
            word-break: break-all;
        }
        
        .barcode-missing {
            color: var(--red);
        }
        
        /* Upload Preview */
        .upload-preview {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        
        /* Print Preview */
        .print-preview {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-top: 16px;
            text-align: center;
        }
        
        /* Loading States */
        .loading {
            color: var(--muted);
            font-style: italic;
            text-align: center;
            padding: 20px;
        }
        
        /* Print Styles */
        @media print {
            body {
                background: white;
            }
            .container {
                max-width: none;
                margin: 0;
                padding: 0;
            }
            .section:not(.print-section) {
                display: none;
            }
            .print-section {
                position: static;
                background: white;
                border: none;
            }
            .btn {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>UPC Manager & Label Printer</h1>
            <p>Search, upload, and print any barcode format for fulfillment</p>
        </div>

        <!-- Token Section -->
        <div class="token-section">
            <div class="section">
                <div class="section-header">
                    <h2>Airtable Connection</h2>
                </div>
                <div class="section-content">
                    <div id="tokenStatus" class="status" style="display: none;"></div>
                    <div class="token-input-group">
                        <input type="password" 
                               id="tokenInput" 
                               class="form-input token-input" 
                               placeholder="Enter Airtable Personal Access Token">
                        <button id="tokenSave" class="btn btn-primary">Save</button>
                        <button id="tokenClear" class="btn">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="grid grid-2">
                <!-- Left Column: Search & Upload -->
                <div class="left-column">
                    
                    <!-- Search Existing Codes -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Search Existing Codes</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <label class="form-label">Search by Customer or Order Number</label>
                                <input type="text" 
                                       id="searchInput" 
                                       class="form-input" 
                                       placeholder="e.g. 'Topo' or '9677'">
                                <button id="searchBtn" class="btn btn-primary" style="margin-top: 8px;">Search</button>
                            </div>
                            <div id="searchResults">
                                <p style="color: var(--muted); text-align: center; padding: 20px;">Enter a search term to find existing UPC/barcode data</p>
                            </div>
                        </div>
                    </div>

                    <!-- Bulk Upload -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Bulk Code Upload</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <label class="form-label">Upload Excel/CSV File</label>
                                <input type="file" 
                                       id="fileUpload" 
                                       class="form-input" 
                                       accept=".xlsx,.xls,.csv"
                                       style="padding: 8px;">
                            </div>
                            <div class="form-group">
                                <button id="processUpload" class="btn btn-primary">Process Upload</button>
                                <button id="downloadTemplate" class="btn">Download Template</button>
                            </div>
                            <div id="uploadPreview" style="display: none;">
                                <div class="form-label">Preview:</div>
                                <div id="uploadPreviewContent" class="upload-preview">
                                    <!-- Preview content -->
                                </div>
                                <div style="margin-top: 12px;">
                                    <button id="confirmUpload" class="btn btn-green">Save to Airtable</button>
                                    <button id="cancelUpload" class="btn">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Right Column: Label Printing -->
                <div class="right-column">
                    
                    <!-- Universal Label Printing -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Universal Label Printing</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <label class="form-label">Barcode/UPC/SKU Code</label>
                                <input type="text" 
                                       id="printCode" 
                                       class="form-input" 
                                       placeholder="Any format: UPC, EAN, SKU, internal code">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Product Name (Optional)</label>
                                <input type="text" 
                                       id="productName" 
                                       class="form-input" 
                                       placeholder="Product description for label">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Barcode Format</label>
                                <select id="barcodeFormat" class="form-input">
                                    <option value="UPC">UPC-A (12 digits)</option>
                                    <option value="EAN13">EAN-13 (13 digits)</option>
                                    <option value="CODE128">Code 128 (Alphanumeric)</option>
                                    <option value="CODE39">Code 39 (Alphanumeric)</option>
                                    <option value="ITF14">ITF-14 (14 digits)</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Label Size</label>
                                <select id="labelSize" class="form-input">
                                    <option value="zebra_2125x1125">Zebra 2.125" × 1.125" (Standard)</option>
                                    <option value="zebra_1x15">Zebra 1" × 1.5" (Narrow)</option>
                                    <option value="avery5160">Avery 5160 (2⅝" × 1")</option>
                                    <option value="avery5163">Avery 5163 (2" × 4")</option>
                                    <option value="individual">Individual Label</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <button id="generateLabel" class="btn btn-primary">Generate Label</button>
                                <button id="printLabel" class="btn btn-green" style="display: none;">Print</button>
                            </div>
                        </div>
                    </div>

                    <!-- Label Preview -->
                    <div class="section print-section">
                        <div class="section-header">
                            <h2>Label Preview</h2>
                        </div>
                        <div class="section-content">
                            <div id="labelPreview" style="display: none;">
                                <!-- Generated label appears here -->
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let airtableToken = '';
        let uploadData = [];
        const BASE_ID = 'appJkaLk8DykjsgHR';
        const LINE_ITEMS_TABLE_ID = 'tblJx5UlwO7oMSk5H';
        const IMPRINTS_TABLE_ID = 'tbln9oAGvz2PNBZLV';

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
            setupEventListeners();
        });

        function initializeApp() {
            // Load token from localStorage
            const stored = localStorage.getItem('pine_at_key');
            if (stored) {
                airtableToken = stored;
                document.getElementById('tokenInput').value = stored;
                showMainContent();
                showStatus('success', 'Token loaded from storage');
            } else {
                showStatus('info', 'Please enter your Airtable token to get started');
            }
        }

        function setupEventListeners() {
            // Token management
            document.getElementById('tokenSave').addEventListener('click', saveToken);
            document.getElementById('tokenClear').addEventListener('click', clearToken);
            document.getElementById('tokenInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') saveToken();
            });

            // Search functionality
            document.getElementById('searchBtn').addEventListener('click', searchCodes);
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchCodes();
            });

            // Upload functionality
            document.getElementById('processUpload').addEventListener('click', processUpload);
            document.getElementById('downloadTemplate').addEventListener('click', downloadTemplate);
            document.getElementById('confirmUpload').addEventListener('click', confirmUpload);
            document.getElementById('cancelUpload').addEventListener('click', cancelUpload);

            // Label printing
            document.getElementById('generateLabel').addEventListener('click', generateLabel);
            document.getElementById('printLabel').addEventListener('click', printLabel);
        }

        // Token Management
        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showStatus('error', 'Please enter a token');
                return;
            }
            
            if (!token.startsWith('pat')) {
                showStatus('error', 'Token should start with "pat" - please check your Airtable personal access token');
                return;
            }
            
            // Test the token before saving
            testToken(token);
        }

        async function testToken(token) {
            showStatus('loading', 'Testing token...');
            
            try {
                // Simple test call to verify token works
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${LINE_ITEMS_TABLE_ID}?maxRecords=1&returnFieldsByFieldId=true`, {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Token test failed:', errorText);
                    
                    let errorMessage = `Token test failed (${response.status})`;
                    if (response.status === 401) {
                        errorMessage += ' - Invalid token. Please check your Airtable Personal Access Token.';
                    } else if (response.status === 403) {
                        errorMessage += ' - Token lacks required permissions.';
                    } else if (response.status === 404) {
                        errorMessage += ' - Base not found. Check if token has access to this base.';
                    }
                    
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                console.log('Token test successful, sample record count:', data.records.length);
                
                // Token works, save it
                localStorage.setItem('pine_at_key', token);
                airtableToken = token;
                showStatus('success', 'Token saved and verified successfully!');
                showMainContent();
                
            } catch (error) {
                console.error('Token test error:', error);
                showStatus('error', error.message);
            }
        }

        function clearToken() {
            localStorage.removeItem('pine_at_key');
            airtableToken = '';
            document.getElementById('tokenInput').value = '';
            document.getElementById('mainContent').style.display = 'none';
            showStatus('info', 'Token cleared');
        }

        function showMainContent() {
            document.getElementById('mainContent').style.display = 'block';
        }

        function showStatus(type, message) {
            const status = document.getElementById('tokenStatus');
            status.className = `status ${type}`;
            status.textContent = message;
            status.style.display = 'block';
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 5000);
            }
        }

        // Search Functionality
        async function searchCodes() {
            const searchTerm = document.getElementById('searchInput').value.trim();
            if (!searchTerm) {
                showStatus('error', 'Please enter a search term');
                return;
            }

            if (!airtableToken) {
                showStatus('error', 'Please enter and save your Airtable token first');
                return;
            }

            showStatus('loading', 'Searching...');
            const container = document.getElementById('searchResults');
            container.innerHTML = '<div class="loading">Searching for codes...</div>';

            try {
                let filterFormula = '';
                
                // Auto-detect search type and use correct field IDs
                if (/^\d+$/.test(searchTerm)) {
                    // Order number search - use the correct field ID for Invoice / Order Number Lookup
                    filterFormula = `{fldRNXpvna5jpa1v5} = ${searchTerm}`;
                } else {
                    // Customer name search - use the correct field ID for [TEXT] Customer Name
                    filterFormula = `SEARCH(UPPER("${searchTerm}"), UPPER({fldB4mKfMl2Lp9UK0}))`;
                }

                console.log('Searching with formula:', filterFormula);
                console.log('Using token:', airtableToken.substring(0, 10) + '...');

                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${LINE_ITEMS_TABLE_ID}?filterByFormula=${encodeURIComponent(filterFormula)}&returnFieldsByFieldId=true&maxRecords=50`, {
                    headers: {
                        'Authorization': `Bearer ${airtableToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                console.log('Response status:', response.status);

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('API Error:', errorText);
                    
                    let errorMessage = `Search failed (${response.status})`;
                    if (response.status === 401) {
                        errorMessage += ' - Invalid token. Please check your Airtable Personal Access Token.';
                    } else if (response.status === 403) {
                        errorMessage += ' - Permission denied. Check token permissions.';
                    } else if (response.status === 404) {
                        errorMessage += ' - Base or table not found.';
                    }
                    
                    throw new Error(errorMessage);
                }

                const data = await response.json();
                console.log('Found records:', data.records.length);
                
                await displaySearchResults(data.records);
                
                const searchType = /^\d+$/.test(searchTerm) ? 'order number' : 'customer name';
                showStatus('success', `Found ${data.records.length} line items for ${searchType} "${searchTerm}"`);

            } catch (error) {
                console.error('Search error:', error);
                showStatus('error', error.message);
                if (container) {
                    container.innerHTML = '<p style="color: var(--red); text-align: center; padding: 20px;">Search failed. Please check your token and try again.</p>';
                }
            }
        }

        async function displaySearchResults(lineItems) {
            const container = document.getElementById('searchResults');
            if (!container) {
                console.error('searchResults container not found');
                return;
            }
            
            if (lineItems.length === 0) {
                container.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 20px;">No results found</p>';
                return;
            }

            container.innerHTML = '';

            for (const lineItem of lineItems) {
                try {
                    const card = await createLineItemCard(lineItem);
                    if (card) {
                        container.appendChild(card);
                    }
                } catch (error) {
                    console.error('Error creating line item card:', error);
                    const errorDiv = document.createElement('div');
                    errorDiv.innerHTML = `<p style="color: var(--red); padding: 8px;">Error loading line item: ${error.message}</p>`;
                    container.appendChild(errorDiv);
                }
            }
        }

        async function createLineItemCard(lineItem) {
            const fields = lineItem.fields || {};
            
            // Extract line item data
            const lineItemRef = fields['fldU6oLyZnxhhm2kX'] || 'Unknown';
            const garmentName = fields['fldKhz9uZgXwfeIto'] || 'No garment';
            const customerName = fields['fldB4mKfMl2Lp9UK0'] || 'Unknown Customer';
            const productDesc = fields['fldBGLb39lznbSibX'] || 'No description';
            const orderNumbers = fields['fldRNXpvna5jpa1v5'] || [];
            const orderNumber = Array.isArray(orderNumbers) ? orderNumbers[0] : orderNumbers || 'Unknown';
            const linkedImprints = fields['fldTFz4ZzfOthqkg6'] || [];

            const card = document.createElement('div');
            card.className = 'line-item-card';

            const header = document.createElement('div');
            header.className = 'line-item-header';
            header.innerHTML = `
                <span>${lineItemRef}</span>
                <span style="font-size: 11px; color: var(--muted);">${linkedImprints.length} imprint(s)</span>
            `;

            const body = document.createElement('div');
            body.className = 'line-item-body';
            body.innerHTML = `
                <div class="line-item-meta">
                    <strong>${customerName}</strong> • Order #${orderNumber}<br>
                    <strong>Garment:</strong> ${garmentName}<br>
                    <strong>Product:</strong> ${productDesc}
                </div>
                <div id="codes-${lineItem.id}">
                    <div class="loading">Loading barcode data...</div>
                </div>
            `;

            card.appendChild(header);
            card.appendChild(body);

            // Load codes from linked imprints
            if (linkedImprints.length > 0) {
                loadCodesForLineItem(lineItem.id, linkedImprints);
            } else {
                const codesContainer = card.querySelector(`#codes-${lineItem.id}`);
                if (codesContainer) {
                    codesContainer.innerHTML = '<p style="color: var(--muted); font-size: 13px;">No imprints linked - no codes available</p>';
                }
            }

            return card;
        }

        async function loadCodesForLineItem(lineItemId, imprintIds) {
            const container = document.getElementById(`codes-${lineItemId}`);
            if (!container) {
                console.error(`Container codes-${lineItemId} not found`);
                return;
            }
            
            try {
                const imprintFilter = `OR(${imprintIds.map(id => `RECORD_ID()='${id}'`).join(',')})`;
                
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${IMPRINTS_TABLE_ID}?filterByFormula=${encodeURIComponent(imprintFilter)}&returnFieldsByFieldId=true`, {
                    headers: {
                        'Authorization': `Bearer ${airtableToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if (!response.ok) throw new Error('Failed to load codes');

                const data = await response.json();

                if (data.records.length === 0) {
                    container.innerHTML = '<p style="color: var(--muted); font-size: 13px;">No codes found</p>';
                    return;
                }

                let html = '';
                data.records.forEach(imprint => {
                    const fields = imprint.fields || {};
                    const imprintId = fields['fldDFfwFQ9B20n2kT'] || 'Unknown';
                    const productName = fields['fldYdLLSPHGyPd788'] || '';

                    // Get all UPC codes
                    const codes = {
                        'XS': fields['fldUydgmhCzYaL2Pr'] || null,
                        'SM': fields['fldtzbuXsaIIv0Hlo'] || null,
                        'MD': fields['fldsZ4HyQ5iKSoRXG'] || null,
                        'LG': fields['fld9scnm0DDuCt1Ik'] || null,
                        'XL': fields['fldkXYaivC4MgQ8jc'] || null,
                        '2X': fields['fldW0rCDHfE5Bs4Lj'] || null,
                        '3X': fields['fldgjW3pOYblUij7W'] || null,
                        '4X': fields['fldkHHzHORDugRfo6'] || null,
                        '5X': fields['fldS10NkFCn0g9bwx'] || null,
                        'OSFA': fields['fldvLltsI1nBtOWTR'] || null
                    };

                    const hasCodes = Object.values(codes).some(code => code);

                    html += `
                        <div style="border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; background: ${hasCodes ? 'var(--yellow-dim)' : 'var(--muted-lt)'};">
                            <div style="font-weight: bold; margin-bottom: 6px;">${imprintId}</div>
                            ${productName ? `<div style="font-size: 12px; margin-bottom: 8px; color: var(--muted);">${productName}</div>` : ''}
                            <div class="barcode-grid">
                                ${Object.entries(codes).map(([size, code]) => `
                                    <div class="barcode-item">
                                        <div class="barcode-size">${size}</div>
                                        <div class="barcode-code ${code ? '' : 'barcode-missing'}">
                                            ${code || 'Missing'}
                                        </div>
                                        ${code ? `<button class="btn" style="font-size: 10px; padding: 4px 6px;" onclick="useCodeForPrint('${code}', '${productName || imprintId}', '${size}')">Print</button>` : ''}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });

                container.innerHTML = html;

            } catch (error) {
                console.error('Error loading codes:', error);
                if (container) {
                    container.innerHTML = `<p style="color: var(--red); font-size: 13px;">Error loading codes: ${error.message}</p>`;
                }
            }
        }

        function useCodeForPrint(code, productName, size) {
            document.getElementById('printCode').value = code;
            document.getElementById('productName').value = `${productName} - ${size}`;
            
            // Auto-detect format
            if (code.length === 12 && /^\d{12}$/.test(code)) {
                document.getElementById('barcodeFormat').value = 'UPC';
            } else if (code.length === 13 && /^\d{13}$/.test(code)) {
                document.getElementById('barcodeFormat').value = 'EAN13';
            } else if (/^[A-Z0-9]+$/.test(code)) {
                document.getElementById('barcodeFormat').value = 'CODE39';
            } else {
                document.getElementById('barcodeFormat').value = 'CODE128';
            }
            
            // Scroll to print section
            document.querySelector('.right-column').scrollIntoView({ behavior: 'smooth' });
            showStatus('success', `Code loaded for printing: ${code}`);
        }

        // Template Download
        function downloadTemplate() {
            const templateData = [
                ['Order Number', 'Product Description', 'Product Name', 'XS', 'SM', 'MD', 'LG', 'XL', '2X', '3X', '4X', '5X', 'OSFA'],
                ['9754', 'Black T-Shirt Front Logo', 'Custom Tee - Black', '', '', '', '', '', '', '', '', '', ''],
                ['9754', 'White Hoodie Back Design', 'Custom Hoodie - White', '', '', '', '', '', '', '', '', '', ''],
                ['', '', 'Instructions:', 'Fill in', 'your UPC/', 'barcode', 'codes for', 'each size', 'you need', 'Delete', 'unused', 'rows', 'Add more as needed']
            ];

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(templateData);

            ws['!cols'] = [
                {wch: 12}, {wch: 30}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 15},
                {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}
            ];

            XLSX.utils.book_append_sheet(wb, ws, 'UPC Upload Template');
            XLSX.writeFile(wb, 'UPC_Upload_Template.xlsx');

            showStatus('success', 'Template downloaded! Fill in your codes and upload.');
        }

        // File Processing (Placeholder)
        function processUpload() {
            const fileInput = document.getElementById('fileUpload');
            if (!fileInput.files.length) {
                showStatus('error', 'Please select a file to upload');
                return;
            }
            
            showStatus('info', 'Upload processing feature coming soon');
        }

        function confirmUpload() {
            showStatus('info', 'Upload confirmation feature coming soon');
        }

        function cancelUpload() {
            document.getElementById('uploadPreview').style.display = 'none';
            document.getElementById('fileUpload').value = '';
        }

        // Universal Label Generation
        function generateLabel() {
            const code = document.getElementById('printCode').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const format = document.getElementById('barcodeFormat').value;
            const labelSize = document.getElementById('labelSize').value;

            if (!code) {
                showStatus('error', 'Please enter a barcode/UPC/SKU code');
                return;
            }

            try {
                const preview = document.getElementById('labelPreview');
                preview.innerHTML = '';

                const labelContainer = document.createElement('div');
                
                // Set label dimensions and barcode parameters
                let labelStyle = 'text-align: center; border: 2px dashed #999; background: white; padding: 8px; display: inline-block; box-sizing: border-box; overflow: hidden;';
                let barcodeWidth = 1.2;
                let barcodeHeight = 35;
                let fontSize = '11px';
                let maxBarcodeWidth = '90%';

                switch(labelSize) {
                    case 'zebra_2125x1125':
                        labelStyle += 'width: 2.125in; height: 1.125in;';
                        barcodeWidth = 1.0;
                        barcodeHeight = 30;
                        fontSize = '9px';
                        maxBarcodeWidth = '85%';
                        break;
                    case 'zebra_1x15':
                        labelStyle += 'width: 1in; height: 1.5in;';
                        barcodeWidth = 0.7;
                        barcodeHeight = 25;
                        fontSize = '8px';
                        maxBarcodeWidth = '80%';
                        break;
                    case 'avery5160':
                        labelStyle += 'width: 2.625in; height: 1in;';
                        barcodeWidth = 1.2;
                        barcodeHeight = 32;
                        fontSize = '10px';
                        maxBarcodeWidth = '88%';
                        break;
                    case 'avery5163':
                        labelStyle += 'width: 2in; height: 4in;';
                        barcodeWidth = 1.0;
                        barcodeHeight = 40;
                        fontSize = '11px';
                        maxBarcodeWidth = '85%';
                        break;
                    default:
                        labelStyle += 'padding: 16px; width: 300px;';
                        barcodeWidth = 1.5;
                        barcodeHeight = 50;
                        fontSize = '12px';
                        maxBarcodeWidth = '90%';
                }

                labelContainer.style.cssText = labelStyle;

                // Add product name with proper wrapping
                if (productName) {
                    const nameDiv = document.createElement('div');
                    nameDiv.textContent = productName;
                    nameDiv.style.cssText = `
                        font-weight: bold; 
                        margin-bottom: 4px; 
                        font-size: ${fontSize}; 
                        line-height: 1.1; 
                        word-wrap: break-word;
                        overflow-wrap: break-word;
                        max-width: 100%;
                    `;
                    labelContainer.appendChild(nameDiv);
                }

                // Create barcode container with better centering
                const barcodeContainer = document.createElement('div');
                barcodeContainer.style.cssText = `
                    width: 100%;
                    max-width: ${maxBarcodeWidth};
                    margin: 0 auto;
                    overflow: hidden;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    text-align: center;
                `;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.style.cssText = `
                    max-width: 100%;
                    height: auto;
                    display: block;
                    margin: 0 auto;
                `;

                try {
                    JsBarcode(svg, code, {
                        format: format,
                        width: barcodeWidth,
                        height: barcodeHeight,
                        displayValue: true,
                        fontSize: Math.max(7, parseInt(fontSize) - 3),
                        margin: 2,
                        background: '#ffffff',
                        lineColor: '#000000',
                        textAlign: 'center',
                        textPosition: 'bottom',
                        textMargin: 2
                    });
                } catch (barcodeError) {
                    throw new Error(`Invalid barcode format for "${code}": ${barcodeError.message}`);
                }

                barcodeContainer.appendChild(svg);
                labelContainer.appendChild(barcodeContainer);

                // Add code text below for larger labels only (avoid duplication)
                if (labelSize !== 'zebra_1x15' && labelSize !== 'zebra_2125x1125') {
                    const codeDiv = document.createElement('div');
                    codeDiv.textContent = code;
                    codeDiv.style.cssText = `
                        font-family: monospace; 
                        font-size: ${Math.max(7, parseInt(fontSize) - 2)}px; 
                        color: #666; 
                        margin-top: 2px;
                        word-break: break-all;
                        max-width: 100%;
                    `;
                    labelContainer.appendChild(codeDiv);
                }

                preview.appendChild(labelContainer);
                preview.style.display = 'block';
                document.getElementById('printLabel').style.display = 'inline-block';

                showStatus('success', `${format} label generated and sized correctly!`);

            } catch (error) {
                console.error('Label generation error:', error);
                showStatus('error', `Error generating barcode: ${error.message}`);
            }
        }

        function printLabel() {
            window.print();
        }

        // Syntax validation
        if (typeof console !== 'undefined') {
            console.log('Pine UPC Manager v7 loaded successfully');
        }
    </script>
</body>
