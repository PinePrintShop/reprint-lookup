<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pine UPC Generator v2</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #F2F2EE;
            --surface: #fff;
            --border: #E5E5E0;
            --border-dk: #D0D0CA;
            --text: #0D0D0B;
            --muted: #888880;
            --muted-lt: #BBBBB5;
            --yellow: #E8E832;
            --yellow-dim: #E8E83230;
            --green: #1e6b45;
            --green-lt: #e8f5ee;
            --red: #c0392b;
            --red-bg: #fdf2f2;
            --sans: Helvetica, Arial, sans-serif;
            --radius: 4px;
        }
        
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            line-height: 1.4;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .header h1 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: bold;
        }
        
        .header p {
            margin: 0;
            color: var(--muted);
            font-size: 14px;
        }
        
        .section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        
        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(232, 232, 50, 0.08);
        }
        
        .section-header h2 {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }
        
        .section-content {
            padding: 20px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
            background: var(--surface);
        }
        
        .form-input:focus {
            outline: none;
            border-color: var(--yellow);
            box-shadow: 0 0 0 2px var(--yellow-dim);
        }
        
        .btn {
            display: inline-block;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        
        .btn:hover {
            background: var(--yellow-dim);
            border-color: var(--yellow);
        }
        
        .btn-primary {
            background: var(--yellow);
            border-color: var(--yellow);
            color: var(--text);
        }
        
        .btn-primary:hover {
            background: #d4d42a;
        }
        
        .btn-green {
            background: var(--green);
            border-color: var(--green);
            color: white;
        }
        
        .btn-green:hover {
            background: var(--green-dk);
        }
        
        .grid {
            display: grid;
            gap: 16px;
        }
        
        .grid-2 {
            grid-template-columns: 1fr 1fr;
        }
        
        .grid-3 {
            grid-template-columns: 1fr 1fr 1fr;
        }
        
        .status {
            padding: 12px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 16px;
        }
        
        .status.loading {
            background: var(--yellow-dim);
            border: 1px solid var(--yellow);
        }
        
        .status.error {
            background: var(--red-bg);
            border: 1px solid var(--red);
        }
        
        .status.success {
            background: var(--green-lt);
            border: 1px solid var(--green);
        }
        
        .token-section {
            margin-bottom: 20px;
        }
        
        .token-input-group {
            display: flex;
            gap: 8px;
        }
        
        .token-input {
            flex: 1;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 8px;
        }
        
        .imprint-card {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
        }
        
        .imprint-header {
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 16px;
        }
        
        .imprint-meta {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 12px;
        }
        
        .upc-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }
        
        .upc-item {
            text-align: center;
            padding: 8px;
            border: 1px solid var(--border-dk);
            border-radius: var(--radius);
            font-size: 12px;
        }
        
        .upc-size {
            font-weight: bold;
            margin-bottom: 4px;
        }
        
        .upc-code {
            font-family: 'Courier New', monospace;
            color: var(--muted);
            font-size: 11px;
        }
        
        .upc-missing {
            color: var(--red);
            font-style: italic;
        }
        
        .barcode-canvas {
            margin: 8px 0;
        }
        
        .print-section {
            position: sticky;
            top: 20px;
        }
        
        .print-preview {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-top: 16px;
            background: white;
        }
        
        .label-format-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        @media print {
            body { background: white; }
            .container { max-width: none; margin: 0; padding: 0; }
            .section:not(.print-section) { display: none; }
            .print-section { position: static; }
            .btn { display: none; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>UPC Generator & Label Printer</h1>
            <p>Generate UPC-A codes and print labels for fulfillment</p>
        </div>

        <!-- Token Section -->
        <div class="token-section">
            <div class="section">
                <div class="section-header">
                    <h2>Airtable Connection</h2>
                </div>
                <div class="section-content">
                    <div id="tokenStatus" class="status" style="display: none;"></div>
                    <div class="token-input-group">
                        <input type="password" 
                               id="tokenInput" 
                               class="form-input token-input" 
                               placeholder="Enter Airtable Personal Access Token">
                        <button id="tokenSave" class="btn btn-primary">Save</button>
                        <button id="tokenClear" class="btn">Clear</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="mainContent" style="display: none;">
            <div class="grid grid-2">
                <!-- Left Column: Data & Generation -->
                <div class="left-column">
                    <!-- Imprints with UPCs -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Imprints & UPC Codes</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <button id="loadImprints" class="btn btn-primary">Load Recent Imprints</button>
                                <button id="searchImprints" class="btn">Search by Order #</button>
                            </div>
                            <div id="searchGroup" class="form-group" style="display: none;">
                                <label class="form-label">Order Number</label>
                                <input type="text" id="orderSearch" class="form-input" placeholder="e.g. 9677">
                            </div>
                            <div id="imprintsContainer">
                                <!-- Imprints will be loaded here -->
                            </div>
                        </div>
                    </div>

                    <!-- UPC Generator -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Generate New UPC Code</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <label class="form-label">Client GS1 Prefix</label>
                                <input type="text" 
                                       id="clientPrefix" 
                                       class="form-input" 
                                       placeholder="e.g. 123456"
                                       maxlength="11"
                                       pattern="[0-9]*">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Product Code</label>
                                <input type="text" 
                                       id="productCode" 
                                       class="form-input" 
                                       placeholder="e.g. 12345"
                                       maxlength="5"
                                       pattern="[0-9]*">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Generated UPC-A</label>
                                <input type="text" 
                                       id="generatedUPC" 
                                       class="form-input" 
                                       readonly
                                       placeholder="Check digit will be calculated automatically">
                            </div>
                            <div class="form-group">
                                <button id="generateUPC" class="btn btn-green">Generate UPC-A Code</button>
                            </div>
                        </div>
                    </div>

                    <!-- Bulk UPC Upload -->
                    <div class="section">
                        <div class="section-header">
                            <h2>Bulk UPC Upload</h2>
                        </div>
                        <div class="section-content">
                            <div class="form-group">
                                <label class="form-label">Upload Excel/CSV File</label>
                                <input type="file" 
                                       id="upcFileUpload" 
                                       class="form-input" 
                                       accept=".xlsx,.xls,.csv"
                                       style="padding: 8px;">
                            </div>
                            <div class="form-group">
                                <button id="processUpload" class="btn btn-primary">Process Upload</button>
                                <button id="downloadTemplate" class="btn">Download Template</button>
                            </div>
                            <div id="uploadPreview" style="display: none; margin-top: 16px;">
                                <div class="form-label">Preview:</div>
                                <div id="uploadPreviewContent" style="max-height: 200px; overflow-y: auto; border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; font-family: monospace; font-size: 12px; background: white;">
                                    <!-- Preview content -->
                                </div>
                                <div style="margin-top: 12px;">
                                    <button id="confirmUpload" class="btn btn-green">Confirm & Save to Airtable</button>
                                    <button id="cancelUpload" class="btn">Cancel</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right Column: Label Printing -->
                <div class="right-column">
                    <div class="section print-section">
                        <div class="section-header">
                            <h2>Label Printing</h2>
                        </div>
                        <div class="section-content">
                            <div class="label-format-grid">
                                <div class="form-group">
                                    <label class="form-label">Label Format</label>
                                    <select id="labelFormat" class="form-input">
                                        <option value="avery5160">Avery 5160 (2⅝" × 1")</option>
                                        <option value="avery5163">Avery 5163 (2" × 4")</option>
                                        <option value="individual">Individual Label</option>
                                        <option value="sheet">Custom Sheet</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Product Name</label>
                                    <input type="text" id="productName" class="form-input" placeholder="Product name for label">
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">UPC Code to Print</label>
                                <input type="text" 
                                       id="printUPC" 
                                       class="form-input" 
                                       placeholder="Enter or select UPC code"
                                       maxlength="12"
                                       pattern="[0-9]*">
                            </div>
                            
                            <div class="form-group">
                                <button id="generateLabel" class="btn btn-primary">Generate Label</button>
                                <button id="printLabel" class="btn btn-green">Print</button>
                            </div>
                            
                            <div id="printPreview" class="print-preview" style="display: none;">
                                <!-- Generated labels will appear here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let airtableToken = '';
        let uploadData = [];  // Store processed upload data
        const BASE_ID = 'appJkaLk8DykjsgHR';
        const IMPRINTS_TABLE_ID = 'tbln9oAGvz2PNBZLV';
        const UPCS_TABLE_ID = 'tbl3xyDfFTItbf9Dy';
        
        // Field IDs from reference
        const FIELD_IDS = {
            // Imprints table
            IMPRINT_ID: 'fldDFfwFQ9B20n2kT',
            PRINT_DESCRIPTION: 'fld0jStSNsRNjjeZy',
            CUSTOMER: 'fldeLMIAC0ABQAjYJ',
            ORDER_NUMBER: 'fldZAIMnXPYF9LiXq',
            XS_UPC: 'fldUydgmhCzYaL2Pr',
            SM_UPC: 'fldtzbuXsaIIv0Hlo',
            MD_UPC: 'fldsZ4HyQ5iKSoRXG',
            LG_UPC: 'fld9scnm0DDuCt1Ik',
            XL_UPC: 'fldkXYaivC4MgQ8jc',
            X2_UPC: 'fldW0rCDHfE5Bs4Lj',
            X3_UPC: 'fldgjW3pOYblUij7W',
            X4_UPC: 'fldkHHzHORDugRfo6',
            X5_UPC: 'fldS10NkFCn0g9bwx',
            OSFA_UPC: 'fldvLltsI1nBtOWTR',
            PRODUCT_NAME_UPC: 'fldYdLLSPHGyPd788',
            
            // UPCs table
            UPC_NAME: 'fldRbyacPqLrOykZX',
            UPC_BARCODE_VALUE: 'fld4aM7jFwwZjZbxb',
            UPC_SIZE: 'fldtdN1HSCyyR17eY',
            UPC_IMPRINT_RECORD: 'fldvQWtPhBEBj3B2i'
        };

        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            initializeTokenHandling();
            initializeEventListeners();
            loadSavedToken();
        });

        function initializeTokenHandling() {
            const tokenInput = document.getElementById('tokenInput');
            const tokenSave = document.getElementById('tokenSave');
            const tokenClear = document.getElementById('tokenClear');
            
            tokenSave.addEventListener('click', saveToken);
            tokenClear.addEventListener('click', clearToken);
            tokenInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') saveToken();
            });
        }
        
        function initializeEventListeners() {
            // Main functionality
            document.getElementById('loadImprints').addEventListener('click', loadRecentImprints);
            document.getElementById('searchImprints').addEventListener('click', toggleSearch);
            document.getElementById('orderSearch').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') searchByOrder();
            });
            
            // UPC generation
            document.getElementById('clientPrefix').addEventListener('input', updateGeneratedUPC);
            document.getElementById('productCode').addEventListener('input', updateGeneratedUPC);
            document.getElementById('generateUPC').addEventListener('click', generateUPCCode);
            
            // Label printing
            document.getElementById('generateLabel').addEventListener('click', generateLabel);
            document.getElementById('printLabel').addEventListener('click', printLabel);
            
            // Bulk upload
            document.getElementById('processUpload').addEventListener('click', processUpload);
            document.getElementById('downloadTemplate').addEventListener('click', downloadTemplate);
            document.getElementById('confirmUpload').addEventListener('click', confirmUpload);
            document.getElementById('cancelUpload').addEventListener('click', cancelUpload);
        }
        
        function loadSavedToken() {
            const saved = localStorage.getItem('pine_at_key');
            if (saved) {
                document.getElementById('tokenInput').value = saved;
                airtableToken = saved;
                showMainContent();
            }
        }
        
        function saveToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showStatus('error', 'Please enter a token');
                return;
            }
            
            localStorage.setItem('pine_at_key', token);
            airtableToken = token;
            showStatus('success', 'Token saved successfully');
            showMainContent();
        }
        
        function clearToken() {
            localStorage.removeItem('pine_at_key');
            airtableToken = '';
            document.getElementById('tokenInput').value = '';
            document.getElementById('mainContent').style.display = 'none';
            showStatus('success', 'Token cleared');
        }
        
        function showMainContent() {
            if (airtableToken) {
                document.getElementById('mainContent').style.display = 'block';
            }
        }
        
        function showStatus(type, message) {
            const status = document.getElementById('tokenStatus');
            status.className = `status ${type}`;
            status.textContent = message;
            status.style.display = 'block';
            
            if (type === 'success') {
                setTimeout(() => {
                    status.style.display = 'none';
                }, 3000);
            }
        }
        
        function toggleSearch() {
            const searchGroup = document.getElementById('searchGroup');
            const isVisible = searchGroup.style.display !== 'none';
            searchGroup.style.display = isVisible ? 'none' : 'block';
            if (!isVisible) {
                document.getElementById('orderSearch').focus();
            }
        }
        
        // Calculate UPC-A check digit
        function calculateCheckDigit(code) {
            if (code.length !== 11) return null;
            
            let sum = 0;
            for (let i = 0; i < 11; i++) {
                const digit = parseInt(code[i]);
                if (i % 2 === 0) {
                    sum += digit;
                } else {
                    sum += digit * 3;
                }
            }
            
            const checkDigit = (10 - (sum % 10)) % 10;
            return checkDigit;
        }
        
        function updateGeneratedUPC() {
            const prefix = document.getElementById('clientPrefix').value;
            const productCode = document.getElementById('productCode').value;
            
            if (prefix && productCode) {
                const combined = prefix + productCode;
                if (combined.length === 11) {
                    const checkDigit = calculateCheckDigit(combined);
                    const fullUPC = combined + checkDigit;
                    document.getElementById('generatedUPC').value = fullUPC;
                } else {
                    document.getElementById('generatedUPC').value = '';
                }
            } else {
                document.getElementById('generatedUPC').value = '';
            }
        }
        
        function generateUPCCode() {
            const upc = document.getElementById('generatedUPC').value;
            if (upc && upc.length === 12) {
                document.getElementById('printUPC').value = upc;
                showStatus('success', 'UPC code generated! You can now create labels.');
            } else {
                showStatus('error', 'Please enter valid prefix and product code');
            }
        }
        
        async function loadRecentImprints() {
            showStatus('loading', 'Loading recent imprints...');
            
            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${IMPRINTS_TABLE_ID}?maxRecords=20&returnFieldsByFieldId=true&sort[0][field]=${FIELD_IDS.IMPRINT_ID}&sort[0][direction]=desc`, {
                    headers: {
                        'Authorization': `Bearer ${airtableToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to fetch imprints');
                }
                
                const data = await response.json();
                displayImprints(data.records);
                showStatus('success', `Loaded ${data.records.length} recent imprints`);
                
            } catch (error) {
                showStatus('error', `Error loading imprints: ${error.message}`);
            }
        }
        
        async function searchByOrder() {
            const orderNum = document.getElementById('orderSearch').value.trim();
            if (!orderNum) return;
            
            showStatus('loading', 'Searching for order...');
            
            try {
                const filterFormula = `{${FIELD_IDS.ORDER_NUMBER}} = ${orderNum}`;
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${IMPRINTS_TABLE_ID}?filterByFormula=${encodeURIComponent(filterFormula)}&returnFieldsByFieldId=true`, {
                    headers: {
                        'Authorization': `Bearer ${airtableToken}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('Failed to search imprints');
                }
                
                const data = await response.json();
                displayImprints(data.records);
                showStatus('success', `Found ${data.records.length} imprints for order ${orderNum}`);
                
            } catch (error) {
                showStatus('error', `Error searching: ${error.message}`);
            }
        }
        
        function displayImprints(records) {
            const container = document.getElementById('imprintsContainer');
            container.innerHTML = '';
            
            if (records.length === 0) {
                container.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 20px;">No imprints found</p>';
                return;
            }
            
            records.forEach(record => {
                const imprint = createImprintCard(record);
                container.appendChild(imprint);
            });
        }
        
        function createImprintCard(record) {
            const fields = record.fields || {};
            
            const card = document.createElement('div');
            card.className = 'imprint-card';
            
            // Extract data using field IDs
            const imprintId = fields[FIELD_IDS.IMPRINT_ID] || 'Unknown';
            const description = fields[FIELD_IDS.PRINT_DESCRIPTION] || 'No description';
            const customer = fields[FIELD_IDS.CUSTOMER] || 'Unknown Customer';
            const orderNumber = Array.isArray(fields[FIELD_IDS.ORDER_NUMBER]) ? 
                fields[FIELD_IDS.ORDER_NUMBER][0] : fields[FIELD_IDS.ORDER_NUMBER] || 'Unknown';
            const productName = fields[FIELD_IDS.PRODUCT_NAME_UPC] || '';
            
            // UPC codes by size
            const upcCodes = {
                'XS': fields[FIELD_IDS.XS_UPC] || null,
                'SM': fields[FIELD_IDS.SM_UPC] || null,
                'MD': fields[FIELD_IDS.MD_UPC] || null,
                'LG': fields[FIELD_IDS.LG_UPC] || null,
                'XL': fields[FIELD_IDS.XL_UPC] || null,
                '2X': fields[FIELD_IDS.X2_UPC] || null,
                '3X': fields[FIELD_IDS.X3_UPC] || null,
                '4X': fields[FIELD_IDS.X4_UPC] || null,
                '5X': fields[FIELD_IDS.X5_UPC] || null,
                'OSFA': fields[FIELD_IDS.OSFA_UPC] || null
            };
            
            card.innerHTML = `
                <div class="imprint-header">${imprintId}</div>
                <div class="imprint-meta">
                    <strong>${customer}</strong> • Order #${orderNumber}<br>
                    ${description}
                    ${productName ? `<br><em>Product: ${productName}</em>` : ''}
                </div>
                <div class="upc-grid">
                    ${Object.entries(upcCodes).map(([size, code]) => `
                        <div class="upc-item">
                            <div class="upc-size">${size}</div>
                            <div class="upc-code ${code ? '' : 'upc-missing'}">
                                ${code || 'Missing'}
                            </div>
                            ${code ? `<button class="btn" style="font-size: 10px; padding: 4px 8px; margin-top: 4px;" onclick="selectUPCForPrinting('${code}', '${productName || description}', '${size}')">Print</button>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
            
            return card;
        }
        
        function selectUPCForPrinting(code, productName, size) {
            document.getElementById('printUPC').value = code;
            document.getElementById('productName').value = `${productName} - ${size}`;
            showStatus('success', `Selected UPC for ${size}: ${code}`);
        }
        
        function generateLabel() {
            const upc = document.getElementById('printUPC').value.trim();
            const productName = document.getElementById('productName').value.trim();
            const format = document.getElementById('labelFormat').value;
            
            if (!upc || upc.length !== 12) {
                showStatus('error', 'Please enter a valid 12-digit UPC code');
                return;
            }
            
            try {
                const preview = document.getElementById('printPreview');
                preview.innerHTML = '';
                
                const labelContainer = document.createElement('div');
                labelContainer.style.cssText = 'text-align: center; padding: 20px; border: 1px dashed #ccc;';
                
                if (productName) {
                    const nameDiv = document.createElement('div');
                    nameDiv.textContent = productName;
                    nameDiv.style.cssText = 'font-weight: bold; margin-bottom: 8px; font-size: 14px;';
                    labelContainer.appendChild(nameDiv);
                }
                
                const barcodeContainer = document.createElement('div');
                barcodeContainer.style.margin = '12px 0';
                
                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                labelContainer.appendChild(barcodeContainer);
                barcodeContainer.appendChild(svg);
                
                JsBarcode(svg, upc, {
                    format: 'UPC',
                    width: 2,
                    height: 60,
                    displayValue: true,
                    fontSize: 12,
                    margin: 10
                });
                
                const codeDiv = document.createElement('div');
                codeDiv.textContent = upc;
                codeDiv.style.cssText = 'font-family: monospace; font-size: 12px; color: #666; margin-top: 4px;';
                labelContainer.appendChild(codeDiv);
                
                preview.appendChild(labelContainer);
                preview.style.display = 'block';
                
                showStatus('success', 'Label generated successfully!');
                
            } catch (error) {
                showStatus('error', `Error generating barcode: ${error.message}`);
            }
        }
        
        function printLabel() {
            const preview = document.getElementById('printPreview');
            if (preview.style.display === 'none') {
                showStatus('error', 'Please generate a label first');
                return;
            }
            
            window.print();
        }
        
        // Bulk Upload Functions
        function downloadTemplate() {
            const templateData = [
                ['Imprint ID', 'Product Name', 'XS', 'SM', 'MD', 'LG', 'XL', '2X', '3X', '4X', '5X', 'OSFA'],
                ['9754-A', 'Lords of Merch Tee - Black', '123456789012', '123456789013', '123456789014', '123456789015', '123456789016', '', '', '', '', ''],
                ['9754-B', 'Lords of Merch Tee - White', '', '123456789021', '123456789022', '123456789023', '', '', '', '', '', '123456789020']
            ];
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(templateData);
            
            // Set column widths
            ws['!cols'] = [
                {wch: 12}, {wch: 25}, {wch: 15}, {wch: 15}, {wch: 15}, 
                {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}, {wch: 15}
            ];
            
            XLSX.utils.book_append_sheet(wb, ws, 'UPC Template');
            XLSX.writeFile(wb, 'UPC_Upload_Template.xlsx');
            
            showStatus('success', 'Template downloaded! Fill in your UPC codes and upload.');
        }
        
        function processUpload() {
            const fileInput = document.getElementById('upcFileUpload');
            const file = fileInput.files[0];
            
            if (!file) {
                showStatus('error', 'Please select a file first');
                return;
            }
            
            showStatus('loading', 'Processing file...');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let data;
                    
                    if (file.name.toLowerCase().endsWith('.csv')) {
                        // Parse CSV
                        const text = e.target.result;
                        data = parseCSV(text);
                    } else {
                        // Parse Excel
                        const workbook = XLSX.read(e.target.result, {type: 'array'});
                        const sheetName = workbook.SheetNames[0];
                        const worksheet = workbook.Sheets[sheetName];
                        data = XLSX.utils.sheet_to_json(worksheet, {header: 1});
                    }
                    
                    processUploadData(data);
                    
                } catch (error) {
                    showStatus('error', `Error processing file: ${error.message}`);
                }
            };
            
            if (file.name.toLowerCase().endsWith('.csv')) {
                reader.readAsText(file);
            } else {
                reader.readAsArrayBuffer(file);
            }
        }
        
        function parseCSV(text) {
            const lines = text.split('\n');
            const data = [];
            
            for (let line of lines) {
                if (line.trim()) {
                    // Simple CSV parsing - handles quoted fields
                    const row = [];
                    let current = '';
                    let inQuotes = false;
                    
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        if (char === '"') {
                            inQuotes = !inQuotes;
                        } else if (char === ',' && !inQuotes) {
                            row.push(current.trim());
                            current = '';
                        } else {
                            current += char;
                        }
                    }
                    row.push(current.trim());
                    data.push(row);
                }
            }
            
            return data;
        }
        
        function processUploadData(rawData) {
            if (rawData.length < 2) {
                showStatus('error', 'File appears to be empty or invalid');
                return;
            }
            
            const headers = rawData[0];
            const rows = rawData.slice(1);
            
            // Expected headers
            const expectedHeaders = ['Imprint ID', 'Product Name', 'XS', 'SM', 'MD', 'LG', 'XL', '2X', '3X', '4X', '5X', 'OSFA'];
            
            // Validate headers
            if (!expectedHeaders.every(header => headers.includes(header))) {
                showStatus('error', `Invalid headers. Expected: ${expectedHeaders.join(', ')}`);
                return;
            }
            
            // Process rows
            uploadData = [];
            const preview = [];
            
            for (let row of rows) {
                if (row.length === 0 || !row[0]) continue; // Skip empty rows
                
                const rowData = {
                    imprintId: row[0],
                    productName: row[1] || '',
                    upcs: {
                        XS: row[2] || '',
                        SM: row[3] || '',
                        MD: row[4] || '',
                        LG: row[5] || '',
                        XL: row[6] || '',
                        '2X': row[7] || '',
                        '3X': row[8] || '',
                        '4X': row[9] || '',
                        '5X': row[10] || '',
                        OSFA: row[11] || ''
                    }
                };
                
                // Validate UPC codes
                const validUpcs = {};
                let hasValidUpc = false;
                
                for (let [size, upc] of Object.entries(rowData.upcs)) {
                    if (upc && upc.length === 12 && /^\d{12}$/.test(upc)) {
                        validUpcs[size] = upc;
                        hasValidUpc = true;
                    }
                }
                
                if (hasValidUpc) {
                    rowData.upcs = validUpcs;
                    uploadData.push(rowData);
                    
                    const upcCount = Object.keys(validUpcs).length;
                    preview.push(`${rowData.imprintId}: ${upcCount} UPCs (${Object.keys(validUpcs).join(', ')})`);
                }
            }
            
            if (uploadData.length === 0) {
                showStatus('error', 'No valid UPC data found in file');
                return;
            }
            
            // Show preview
            const previewContainer = document.getElementById('uploadPreview');
            const previewContent = document.getElementById('uploadPreviewContent');
            
            previewContent.innerHTML = `
                <div style="font-weight: bold; margin-bottom: 8px;">Found ${uploadData.length} imprints with valid UPCs:</div>
                ${preview.join('<br>')}
            `;
            
            previewContainer.style.display = 'block';
            showStatus('success', `Processed ${uploadData.length} imprints. Review and confirm to save.`);
        }
        
        async function confirmUpload() {
            if (uploadData.length === 0) {
                showStatus('error', 'No data to upload');
                return;
            }
            
            showStatus('loading', `Saving ${uploadData.length} imprints to Airtable...`);
            
            try {
                let updatedCount = 0;
                
                for (let item of uploadData) {
                    // Find the imprint record first
                    const searchResponse = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${IMPRINTS_TABLE_ID}?filterByFormula={${FIELD_IDS.IMPRINT_ID}} = "${item.imprintId}"&returnFieldsByFieldId=true`, {
                        headers: {
                            'Authorization': `Bearer ${airtableToken}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    if (!searchResponse.ok) continue;
                    
                    const searchData = await searchResponse.json();
                    if (searchData.records.length === 0) continue;
                    
                    const recordId = searchData.records[0].id;
                    
                    // Build update fields
                    const updateFields = {};
                    
                    if (item.productName) {
                        updateFields[FIELD_IDS.PRODUCT_NAME_UPC] = item.productName;
                    }
                    
                    // Map UPC codes to field IDs
                    const sizeFieldMap = {
                        'XS': FIELD_IDS.XS_UPC,
                        'SM': FIELD_IDS.SM_UPC,
                        'MD': FIELD_IDS.MD_UPC,
                        'LG': FIELD_IDS.LG_UPC,
                        'XL': FIELD_IDS.XL_UPC,
                        '2X': FIELD_IDS.X2_UPC,
                        '3X': FIELD_IDS.X3_UPC,
                        '4X': FIELD_IDS.X4_UPC,
                        '5X': FIELD_IDS.X5_UPC,
                        'OSFA': FIELD_IDS.OSFA_UPC
                    };
                    
                    for (let [size, upc] of Object.entries(item.upcs)) {
                        const fieldId = sizeFieldMap[size];
                        if (fieldId) {
                            updateFields[fieldId] = upc;
                        }
                    }
                    
                    // Update the record
                    const updateResponse = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${IMPRINTS_TABLE_ID}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${airtableToken}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            records: [{
                                id: recordId,
                                fields: updateFields
                            }]
                        })
                    });
                    
                    if (updateResponse.ok) {
                        updatedCount++;
                    }
                    
                    // Small delay to avoid rate limits
                    await new Promise(resolve => setTimeout(resolve, 100));
                }
                
                showStatus('success', `Successfully updated ${updatedCount} of ${uploadData.length} imprints`);
                
                // Clear upload data
                cancelUpload();
                
                // Reload imprints if any were displayed
                const container = document.getElementById('imprintsContainer');
                if (container.children.length > 0) {
                    loadRecentImprints();
                }
                
            } catch (error) {
                showStatus('error', `Error uploading: ${error.message}`);
            }
        }
        
        function cancelUpload() {
            uploadData = [];
            document.getElementById('uploadPreview').style.display = 'none';
            document.getElementById('upcFileUpload').value = '';
            showStatus('success', 'Upload cancelled');
        }
    </script>
